body:
  text: 歷代詩話卷七十七歸安吳景旭撰癸集中之下泣孝宗西山日記曰李獻吉郎尸部時上孝宗皇帝萬言書酷似賈長沙劾夀寧侯鶴齡兄弟有張氏語中宫疑其訕已也左右競前激上怒請杖之上持不可話劉忠宣曰一杖夢陽死矣竟釋之孝宗崩夢陽有十年放逐同梁苑中夜悲歌泣孝宗之句吳旦生曰獻吉本關中人從父宦遂寓大梁邊廷實所謂却望泰山懷故道即歸梁苑亦他鄉也𢎞治中應詔陳言二病三害六漸末及鶴齡為外戚驕恣之漸繫錦衣獄旋釋之一夕醉遇鶴齡大市街以鞭梢擊之墮二齒鶴齡隱忍而止後有詩云半醉唾罵文成侯蓋指此也正德初代尚書韓貫道草奏劾八閹復逮繫劉瑾必欲殺之獻吉出片紙曰對山救我秦人皆言瑾恨不能致康德涵德涵往獻吉可生也乃往謁瑾瑾大喜盛稱德涵真狀元為關中增光德涵曰海何足言今關中自有三才老先生之功業張尚書之政事李郎中之文章瑾曰李郎中非夢陽耶應殺無赦德涵曰殺之關中少一才矣明日瑾奏上赦出蓋獻吉實賴德涵營救而脫後德涵得罪獻吉議論稍嚴刻馬中錫作中山狼傳詆之四友齋叢説云𢎞治正德間李空同何大復康滸西邊華泉徐昌穀一時共相推轂倡復古道而南京王南原顧東橋寶應朱菱溪則其流亞也稍後則有亳州薛西原蕙祥符髙子業叔嗣廣西戴時亮欽沁水常明卿倫河南左中川國璣關中馬西玄汝驥諸人薛西原規模大復時出入初唐而過於精潔失其本色髙子業是學中唐者故愈淡而愈見其工耳馬西玄極重戴時亮二公皆工初唐故也左國璣常明卿宗李翰林皆翩翩欲度驊騮前者也他如王庸之教李川甫濓則空同門人樊少南鵬戴仲鶡冠孟望之洋則大復門人譬之孔門其田子方荀卿子之流歟樂陵令詩話類編曰何仲默與李獻吉齊名然讀其樂陵令行一篇亦何嘗規規模古蓋不過就當日時事鋪敘結搆自具古體其詩云山東郡縣一百八無有一城無戰場到今漂血成野水如山白骨橫秋霜雲臺砌髙將不收投筆亦有書生謀黃金大印賜豪貴白面豈得言封侯唐朝公卿集如雲平原太守名不聞二十四城見賊走抗城乃是平原守君不見前者冦到時縣吏州官各亡命北梁白馬終日行濟上黃旗錯相映不聞開門戰但聞開門迎吁嗟乎平原太守樂陵令夫此詩以樂陵配平原亦偶然耳然平原幸脫祿山竟陷希烈許公初成却敵之功後卒死逆藩二人忠節遭際蓋略相似矣吳旦生曰當時何李同聲獻吉以觸宦官外戚得罪仲默因天變上封事曰義子不當畜宦官不當寵蓋指錢寧劉瑾也又如上書辨獻吉江西之訟奉詔雲南却象犀珍貝之贈則其正骨剛風兩人如一稟矣故於樂陵令援往徵今直攄其中而出之略無辭飾按仲默十五舉於鄉又四年舉進士三十九而卒使假以年其境詣當何如也送别藕居士詩話曰何仲默城邊客散重回首愁見孤鴻落晚汀與嚴維日晚江南望江北寒鴉飛盡水悠悠同一意而嚴有蕭寥不盡之情然不如太白孤帆逺影碧空盡惟見長江天際流更黯渺此俱本南華送君者自涯而返君自兹逺之意吳旦生曰國風燕燕之次章云瞻望弗及佇立以泣此為千古送别之祖王摩詰詩車徒望不見時見起行塵東坡别子由詩登髙回首坡隴隔時見烏紗出復沒亦此意也楊升菴引禽經謂鳥向飛背宿燕向宿背飛莊薑取其背飛之義則又固於説燕矣文章煙月藕居士詩話曰裴愈送魯秀才南遊詩東吳山色家家月南楚江聲浦浦風徐昌穀少時所作文章江左家家玉煙月揚州樹樹花似出此而藻麗過之吳旦生曰昌穀自琴川徙家吳縣與唐子畏祝希哲文徵仲號吳中四才子所著有談藝録文徵仲云文章煙月之句至今令人口吻猶香閻起山云論者以為此集中警句雖沈宋無以加皇甫百泉云昌榖自評其詩若棄妻怨妾此特其少年體耳傲睨藕居士詩話曰孫太初蓬首提籃直入邵文莊公宅自移榻坐南面典謁駴而報公公知必太初倒屣出見太初不交一言即起去但曰十年吟破吳門月剛得梅花一句詩蓋謂公吳中一人也吳旦生曰傲睨是太初本色嘗攜鶴入南屏山其新卜居詩養鶴似嫌雙口纍為漁又過一生身許九杞為買鶴田嵗輸糧於萬峰深處因立鶴田劵時費子充罷相訪之值其晝寢故卧不起久之出亦不謝送及門第矯首東望曰海上碧雲起遂接赤城大奇大奇子充出語人曰我一生未嘗見此人也余有過歸雲菴詩坐來風暖紅偏落目極晴空翠欲微海上碧雲遙接處百年猶向此中歸蓋道其事石扉彛白齋詩話曰孫太初歸雲菴詩沙晴竹碧鷗出飛野老候余開石扉古之人但言柴扉荆扉並無石扉之理如漢人發哀公冢云初至一戶無扃鑰石牀方四尺牀上有石几左右各三石人立侍皆武冠帶劒復入一戶石扉有鎖鑰太初好奇初不知石扉乃墓中石門耳故詩貴乎允當吳旦生曰一元字太初不知何許人自云關中嘗棲太白之巔稱太白山人或云安化王之親支有託而逃也徐文長作孫山人考云以抄書役某府中府公為補吏會覲槖白金使山人致布政使被盜無以報命遂亡抵浙此説悮正德中紹興守劉麟去官卜築吳興之南坦建業龍霓以按察挂冠隱西溪郡人御史陸崑亦在罷長興吳珫隱居蒙山招太初作湖南雅社稱苕溪五隱戊寅太初來僦居湖南后林村就婚施氏生一女而卒葬道場山之麓而歸雲菴乃其所棲止也中有挂瓢堂按太初嘗以鐵笛鶴瓢自隨顧華玉所謂龍笛吟風鶴瓢酌月鄭善夫弔太初于道場山中宿歸雲菴詩雲藏伏虎寺花近挂瓢堂顧華玉為浙左藩時物色太初不可得稍間輒道衣幅巾放舟湖上幾行求得之月下有舟泊段橋下一僧一鶴一童子煮茗笑曰此必太初也移舟就之遂往還無間闌干孫太初詩山中芝草闌干長吳旦生曰凡以橫斜為義皆可言闌干今太初亦謂芝草之橫斜耳非指闌楯而言薛珍君題壁詩苜蓿長闌干正同此意按階際朩勾欄曰闌干字從朩作欄杆蓋以木縱橫為之也如曹植詩月落參橫北斗闌干蓋言其橫斜貌也白樂天長恨歌云玉容寂寞淚闌干韻書眼眶謂之闌干淚出於眼亦有縱橫之意也王元昌云闌干淚不斷之貌亦未盡其義至於左太沖吳都賦金鎰磊珂珠琲闌干皆言其多也富嘉謨明氷篇云南山闌干晝夜氷岑參白雪歌云瀚海闌干百丈氷是大概言其濶逺也湧幢小品云闌干之名起於北魏南蠻中依樹積朩以居名曰闌干大小隨其家口之數往往推一長者為王入唐此二字成雅語矣用修藝苑巵言曰楊用修工于證經而疏于解經博于稗史而忽于正史詳于詩事而不得詩旨精于字學而屈于字法求之宇宙之外而失之耳目之前凡有援據不妨墨守稍涉評擊未盡輸攻吳旦生曰用修博覽羣籍研心考訂武廟閲文獻通考天文星名有注張亦作汪張下問厯官史館皆愕然用修復曰注張栁星也周禮以注鳴者注云注咮也鳥喙也音呪南方朱鳥七宿栁為鳥之咮也史記律書西至于注張漢書天文志栁為鳥喙又湖廣土官水盡源通塔平長官司入貢同官疑為三地名用修曰此六字地名也取大明官制證之凡所考據手薈成書焦氏特標百餘種余購求二十年僅得寶其強半然廣引生瑕亦所不免余詩話中時時正救之非故取一代之偉人而好為鐫譙音煎嚼也鄙意誠如弇州所云耳用修兩上議大禮疏率羣臣撼奉天門大哭廷杖者再謫戍雲南永昌衛投荒三十餘年其七十行戍稿有病中感懷詩七十餘生已白頭明明律例許歸休歸休已作巴江叟重到翻為滇海囚遷謫本非明主意網羅巧中細人謀故園先隴癡兒女泉下傷心也淚流詞人讀之至今血口按在滇時嘗醉鉛粉傅面作雙丫髻插花門生舁之遊行城市諸伎以精白綾作裓服之酒間乞書醉墨淋漓好事者購歸裝潢成卷繼室黃氏有寄夫詩鴈飛曽不到衡陽錦字何由寄永昌三春花栁妾薄命六詔風煙君斷腸曰歸曰歸愁嵗暮其雨其雨怨朝陽相聞空有刀環約何日金雞下夜郎久為藝林傳誦惜其詩不多作故用修亦云易求海上瓊枝樹難得閨中錦字香信天翁蘭廷瑞詩荷錢荇帶緑江空唼鯉含沙淺水中波上魚鷹貪未飽何曽餓死信天翁吳旦生曰朝景迂集黃河有信天緣常開口待魚潛確類書名天然樓攻愧云水禽有名信天公容齋五筆云瀛莫二州之境塘濼之上有禽二種其一類鵠色正蒼而喙長凝立水際不動魚過其下則取之終日無魚亦不易地名曰信天緣其一類鶩奔走水上不問腐草泥沙唼唼然必盡索乃已無一息少休名曰漫畫信天緣若無能者乃與漫畫均度一日無飢色而反加壯大二禽稟性不同如此子衡李舒章曰當何李時長於五言古詩者有王子衡薛君采子衡峻麗得其雄分君采雋潔得其英分宋轅文曰舒章所言似謂子衡似空同君采近大復也吳旦生曰子衡君采大抵規摹三謝故五言神似子衡之論詩曰詩貴意象透瑩不喜事實黏滯古謂水中之月鏡中之影可以目覩難以實求是也三百篇比興雜出意在辭表離騷引喻借論不露本情東國困於賦役不曰天之不恤也曰維南有箕不可以簸揚維北有斗不可以挹酒漿則天之不恤自見齊俗婚禮廢壞不曰婚不親迎也曰俟我于著乎而充耳以素乎而尚之以瓊華乎而則壻不親迎可知不曰已德之修也曰余既滋蘭之九畹兮又樹蕙之百畝畦留夷與揭車兮雜杜蘅與芳芷則已德之美不言而章不曰已之守道也曰固時俗之工巧兮偭規矩以改錯背繩墨以追曲兮競周容以為度則已之守道緣情以灼斯皆包韞本根標題色相鴻材之妙擬哲匠之冥造也觀此則子衡之於詩固韞義深矣西山日記云鄭善夫初不識子衡作漫興十首中有云海內談詩王子衡春風坐遍魯諸生後鄭卒王為位而哭走使千里致奠為經紀其喪仍刻其遺文歷代詩話卷七十七
