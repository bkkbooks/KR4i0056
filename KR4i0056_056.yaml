body:
  text: 歴代詩話巻五十六歸安吳景旭撰辛集上之中宋詩進退韻緗素雜記曰鄭谷與僧齊已黄損共定今體詩格云凡詩用韻有數格一曰葫蘆一曰轆轤一曰進退葫蘆韻者先二後四轆轤韻者雙出雙入進退韻者一進一退失此則謬矣按唐介為臺官廷疏文彦博仁宗怒謫英州别駕朝中士大夫以詩送行李師中詩曰孤忠自許衆不與獨立敢言人所難去國一身輕似葉髙名千古重於山並逰英俊顔何厚未死姦諛骨已寒天為吾君扶社稷肯教夫子不生還此正進退韻格也難寒二字在二十五寒韻山還二字在二十六刪韻誠合體格豈率爾而為之哉近閱冷齋夜話乃以此詩為落韻詩蓋渠不見鄭谷所定詩格有進退之說而妄為云云也吳旦生曰李師中此律為進退韻余於律格圖證既載之矣後見陸放翁東山避暑詩避暑穿林隨所之一奴毎負胡床隨望秋槁葉有先隕未暮赫日無餘暉輪囷離竒澗松古鈎輈格磔蠻禽悲北巖竹間最慘慄清歗倚石真忘歸按此隨悲字在四支韻暉歸字在五微韻正所謂進退韻也而放翁題中自注云用轆轤體則又何耶又見韓子蒼五言詩盜賊猶如此蒼生困未蘇今年起安石不用哭包胥子去朝行在人應問老夫髭鬚衰白盡痩地日携鉏亦是蘇夫字在七虞韻胥鉏字在六魚韻也詩話類編載葫蘆韻格謂前少後多前二後四今録太白一首未知然否其獨酌清溪江石上云我携一尊酒獨上江左石自從天地開更長幾千尺舉杯向天笑天回日西照永賴坐此石長垂嚴陵釣寄謝山中人可與爾同調又轆轤韻格單轆轤者單出單入兩句換韻雙轆轤者雙出雙入四句換韻今亦録太白一首未知然否其妾薄命云漢帝寵阿嬌貯之黄金屋咳唾落九天隨風生珠玉寵極愛還歇妬深情却疎長門一步地不肯暫回車雨落不上天水覆難再收君情與妾意各自東西流昔日芙蓉花今成斷腸草以色事他人能得幾時好太白此詩是四句兩變韻恐未為雙轆轤格其法疑如前二韻在東字韻次二韻入冬字韻第三兩韻還入東字韻第四兩韻却入冬字韻也若爾則又與進退韻無甚異豈有律與古之辨乎玉堂許彦周詩話曰㑹老堂口號云金馬玉堂三學士清風明月兩閒人初謂清風明月古今通用語後讀南史謝譓傳入吾室者但有清風對吾飲者惟當明月文忠公文章固優辭亦精緻如此吳旦生曰李肇翰林志云居翰苑者皆謂凌玉清遡紫霄豈止於豋瀛洲哉亦曰豋玉堂焉石林燕語云學士院正㕔曰玉堂蓋道家之名繼古藂編云天上神仙壁記之地亦名玉堂名山仙人所居之地亦有玉堂然余按漢之待詔者或在公車或在金馬門或在宦者或在黄門時李尋待詔黄門哀帝使侍中往問災異對曰臣尋位卑術淺偶遇䝉賢待詔食大官衣御府乆汚玉堂之廬顔師古注云玉堂殿在未央宫蓋玉堂本是殿名而待詔者有直廬在其側耳三輔黄圖有大玉堂殿小玉堂殿據此則漢時已有其稱豈必取義於道家耶宋淳化二年十月翰林學士蘇易簡有劄子乞御書玉堂之署太宗乃以紅羅飛白四字賜之其後以署字犯英廟諱故元符中只云玉堂紹興末學士周麟之又乞髙宗御書玉堂二字掲於直廬已而議者謂玉堂乃殿名不得為臣下直舍當如承明故事請曰玉堂之廬可也西清詩話云歐陽永叔與趙平叔同在政府相得懽甚平叔先告老歸睢陽永叔相繼謝事歸汝隂平叔一日單車往過之時年幾八十矣留劇飲踰月縱逰而後返永叔因榜其遊從之地為㑹老堂倦遊錄云時吕晦叔知潁開宴召二公永叔自為口號真一時之嘉㑹也合此觀之益見歐公二語之工紫微詩話云崇寜初滎陽公與相州太守劉夀臣唐大學士兩易㑹於滑州守陳修伯師錫殿院也坐中有詩云金馬舊遊三學士玉麟交政兩諸侯蓋記當時之事皮絃歐陽永叔詩坐中醉客誰最賢杜彬琵琶皮作絃自從彬死世莫傳避暑錄話曰琵琶以下撥重為難猶琴之用指深故本色有轢絃䕶索之稱文忠嘗使彬教他樂工試為之下撥絃皆斷因笑曰如公之絃無乃皮為之耶故有皮作絃之句非真以皮為絃也孔毅夫談苑曰元祐五年彬子焯在金陵或問皮何以作絃焯曰永叔詩詞之過也琵琶乃國初老聶工造今尚收藏在家但無皮絃事耳呉旦生曰酉陽雜俎載開元中叚師彈琵琶用皮絃五代史補云馮吉瀛王道之子能彈琵琶以皮為絃世宗嘗令彈於御前深善之因號其琵琶曰繞殿雷也蓋前此實有皮作絃者何獨於杜彬而疑之按釋氏書言獅子筋為絃鼓之衆絃皆絶樂府雜録賀懐智以石為槽鵾雞筋作絃用鐵撥彈之又房千里大唐雜録春州土人彈小琵琶以狗腸為絃聲甚悽楚觀此獨不可以皮為耶班齊永叔詩玉勒争門隨仗入牙牌當殿報班齊吳旦生曰宋制朝殿争門者往往隨仗而入及在廷排立定駕將御殿閣門持牙班排齊小黄門接入上先坐後幄黄門復出揚聲云入人齊未行門當頭者應云人齊上即出方轉照殿衛士即鳴鞭罷此乃是駕出時也温公詩話云文徳殿百官常朝之所也宰相奏事畢乃來押班常至日旰守堂卒好以厚朴湯飲朝士朝士有乆無差遣厭苦常朝者戲為詩曰立殘階下梧桐影喫盡街頭厚朴湯亦朝中實事也羊胛永叔謝人寄牡丹詩云邇來不覺三十年嵗月纔如熟羊胛吳旦生曰西清詩話云史載海東有國曰骨利幹地近扶桑國人初夜煮羊胛方熟而日已出言其疾也漁隠樷話云通鑑唐太宗時骨利幹遣使入貢骨利幹於鐵勒諸部為最逺晝長夜短日没後天色正曛煮羊脾適熟日已復出矣余觀西清作胛反聲漁隐作脾平聲相去固懸也及攷唐書天文志云貞觀中史官所載鐵勒廻紇部在薛延陁之北去京師六千九百里又有骨利幹居迴紇北方瀚海之地草多百藥地出名馬駿者行數百里北又距大海晝長而夕短既日没後天色正曛煮一羊髀纔熟而東方已曙蓋近日出入之所則是胛也脾也髀也一舉而三字殊焉郭次象謂羊胛至㣲薄不應太疾如此當以脾為是王勉夫謂脾者肩也髀者股也二字意雖不同為熟之時似不相逺至胛則太速矣余觀農田餘話云至元中遣官十四員分道測日影用四丈之表至北海北極出地五十六度夏至景長六尺七寸八分晝八十二刻夜十八刻疑即唐貞觀二十年骨利幹來朝言其國日入後煮羊脾熟已天明者此地是也據此則夜雖極短猶待十八刻而熟蓋終以脾字為正然宋元詩人率作胛字何也如黄山谷詩數面欣羊胛論詩喜雉膏迺易之詩帳廬宿頓供羊胛部落晨炊爨馬通袁徳長詩氊屋起營羊胛熟土房催頓馬駧乾陸儼山云厯家大抵以漏刻極長於六十極短於四十惟正統已巳官厯晝刻三十九夜刻六十一以為隂過故及於變元授時厯則長極於六十二刻短極於三十八刻以為驗於燕地稍偏比故然海國有蒸羊脾未熟而天明者則短又不止於三十八刻而已豈漏刻隨日因地有不同者如此初不全繫於隂陽之消長也作閙隠居詩話曰晏元獻殊作樞宻使一日雪中退朝有二客乃歐陽學士修陸學士經元獻喜曰雪中詩人見過不可不飲也因置酒共賞即席賦詩是時西師未解歐陽修句有主人與國共休戚不惟喜樂將豐登須憐鐵甲冷徹骨四十餘萬屯邊兵元獻怏然不樂嘗語人曰裴度也曽燕客韓愈也㑹做文章但言園林窮勝事鐘鼓樂清時却不曽恁地作閙吳旦生曰按次日蔡君謨上其事元獻坐此罷相故云作閙永叔頗聞元獻有後語乃作啟以致謝意終不平然其憂國愛民之意溢於言表得二雅正變之深㫖人多取其聚星堂對雪賦詩禁體物語凡玉月梨梅練縞白舞鵞鶴銀等事皆請勿用永叔於艱難中特出竒麗然而原其風㫖終遜作閙一詩䂬溪詩話云執政以永叔為作閙殊不知老杜夏日歎云浩蕩想幽薊王師安在哉夏夜歎云念我荷戈士窮年守邊疆此仁人君子之用心也如退之始知神官未賢聖䕶短憑愚要我敬雪徑詆樵叟風廓接談僧真作閙詩也謝吏部永叔贈荆公詩云翰林風月三千首吏部文章二百年吳旦生曰南齊書吏部侍郎謝朓長五言詩與沈約友善約嘗謂二百年來無此詩也永叔引此事人徒見荆公答詩有他日若能窺孟子終身何敢望韓公之句遂認吏部為韓公耳葉石林謂荆公自期於孟子而處歐公以韓愈正坐此悮也鴨脚永叔詩鴨脚生江南名實未相浮絳囊因入貢銀杏貴中州吳旦生曰銀杏一名鴨脚子謂其葉頗似鴨脚也江南人共呼為白菓此果北地不能種故永叔云爾梅聖俞詩北人見鴨脚南人見胡桃識内不識外疑是橡栗韜陸放翁詩鴨脚葉黄烏桕丹草烟小店風雨寒春渚紀聞云元豐間禁中有鴨脚子四樹皆合抱其三在翠芳亭之北嵗收實至數斛其一在太清樓之東未嘗著一實裕陵戒圃者善視之明年朩遂花而得實數斛裕陵大悦宴太清以賞之綠蘿永叔詩江上孤峰蔽緑蘿吳旦生曰讀之似謂孤峰䝉藤蘿耳不知其上下為緑蘿谿也按陜州西山甘泉寺其右曰孝婦泉泉上有龎氏祠謂姜詩妻龎氏也永叔詩叢祠巳廢姜祠在事迹難尋楚語訛而綠蘿句乃此詩首章也蒼龍闕永叔早朝詩月在蒼門闕角西吳旦生曰漢高帝本紀蕭何治未央宫立東闕北闕師古注云未央殿雖南向而上書奏事謁見之徒皆詣北闕公車司馬亦在北焉是則以北闕為正門至今只説天北闕而又有東門東闕至於西南兩面無門闕矣蓋何初立未央宫以厭勝之術理宜然耳闗中記云東有蒼龍闕北有𤣥武闕𤣥武所謂北闕也古今注云蒼龍闕畫蒼龍𤣥武闕畫𤣥武今據歐詩觀之是以當前闕狀蒼龍故云月在西也則知宋制與漢闕不同宋龎右甫過汴京詩蒼龍觀闕東風裏黄道星辰北斗邊月照九衢平似水羌兒吹笛内門前元楊仲𢎞紀夢詩海上垂綸有㡬年平居何事夢朝天蒼龍觀闕東風裏黄道星辰北斗邊治世祇今逢五百前程如此隔三千楊雄解奏甘泉賦應有聲名逹帝前則頷聨全用右甫句何也河豚毅父雜録曰永叔稱聖俞河豚詩春洲生荻芽春岸飛楊花河䐁於此時貴不數魚蝦意謂河䐁食栁絮而肥聖俞破題兩句便説盡河豚好處乃永叔褒譽之詞其實不爾此魚盛於二月至栁絮時魚已過矣石林詩話曰浙人食河豚於上元前方出時一尾直千錢二月後一尾纔百錢栁絮時巳不食謂之班子而江西人方得食蓋河豚出於海初與潮俱上至春深其類稍流入於江歐公吉州人所知者江西事也吳旦生曰至今蘇俗以上元前為貴後此則直漸減此風尚固然要不可執是以言詩也倦逰録云栁花飛此魚大肥江淮人更相贈遺腐其肉雜蔞荻芽瀹而為羮則是江淮間豈盡效江西耶韓致堯詩栁絮覆溪魚正肥則凡魚食楊花即肥亦不止河豚矣如東破詩竹外桃花三兩枝春江水暖鴨先知蔞蒿滿地蘆芽短正時河豚欲上時漁隠樷話又謂此二月景致是時河豚已盛矣欲上之語似為未稳不知此題小景詩乃作景語耳是上水之上非初上之上韻語陽秋改作河豚欲到時大失其意劉原父戲謂鄭都官復有梅都官鄭有鷓鴣詩時呼鄭鷓鴣梅有河豚詩可呼梅河豚耶則當時之推許此詩至矣太武梅聖俞詩魏武敗亡歸孤軍駐山頂吳旦生曰陸放翁入蜀記云過𤓰步山山蜿蜒蟠伏臨江起小峯頗巉峻絶頂有元魏太武廟太武以宋文帝元嘉二十七年南侵至𤓰步建康戒嚴太武鑿𤓰步山為蟠道於其上設氊廬大㑹羣臣疑即此地王文公詩所謂樷祠𤓰步認前朝是也按太武初未嘗敗聖俞悮以佛貍為曹瞞耳􅚢梅聖俞送張沆詩竹存帝女啼䕫學林雍􅚢吳旦生曰􅚢音磬一足行也左傳苑字刜林雍斷其足􅚢而乘於他車以歸按沆時為寜鄉令其地有䕫䕫一足故聖俞狀之杜子美詩山鬼獨一脚黄魯直箋云山魈出江州獨足鬼白樂天詩山鬼跳蹻惟一足正所謂䕫也楊升菴云説文䕫神魖也如龍一足山海經禺魖處東海王弇州云傳謂䕫一足而莊子又有䕫憐蚿蚿憐風世人真以䕫一足矣獨韓非子明之哀公問孔子曰䕫一足信乎曰夔人也何故以足彼其無他異而獨通於聲堯曰䕫一而足矣使為樂正非一足也酴醿韓持國咏酴醿云典刑元在酒盃中吳旦生曰酴酒母也麥酒不去滓飲也醿酒本也或作酶一作䊈一作媒孟康曰酒教齊人名麴餅曰媒王直方詩話云酴醿本酒名世以其開花顔色似之故以取名山谷所以有名字因壺酒風流付枕幃之句又云風流徹骨成春酒夢寐宜人入枕囊海録碎事云酴醿本作稌縻後又加酉墨莊澷録云酴醿或作荼醿一名朩香有二品一品花大而棘長條而紫心者為酴醿一品花小而繁小枝而檀心者為朩香張文潜詩萬紫千紅休巧笑人間春色在檀心冷齋夜話云花詩多比美女山谷酴醿詩露濕何郎試湯餅日烘荀令炷爐香乃用美丈夫比之坐謾韓持國寄兄子華詩云移病蹔休丞相府坐謾猶著侍臣冠吳旦生曰子華自相府以病乞補外出鎮北門持國以論事不當罷猶帶職名故云移病謂移書言病見楊敞傳坐謾見孝武功臣表謾誑也音漫陸放翁詩未俗紛紛只有謾惟公肯向静中觀藝林伐山云以言相欺曰謾以言相誣曰誺佛書空谷傳聲曰赤諱一作白誺又偈曰掉弄花唇取次謾一有誺字桐木陸農師為韓子華挽章云棠棣行中排宰相梧桐名上識韓家吳旦生曰子華玉汝兄弟相繼為宰相其家呼為二相公未㡬持國拜門下侍郎甚有援立之望呼為三相公因建堂榜曰三相又家門有梧桐朩京師人呼為桐朩韓家以别魏公子華以辰年辰月辰日辰時薨農師又有詩云非闗庚子曽占鵩自是辰年併直龍子華發解過省殿試皆第三以元祐三年三月薨皆三數亦異事也故蘇頌挽詩云三登慶厯三人第四人熙寜四輔尊蓋自樞副遷叅政宣撫陜右即軍中拜昭文相再入史館相也滄浪亭石林詩話曰姑蘇州學之南積水瀰數十頃傍有小山高下曲折相望蓋錢氏廣陵王所作既積土為山因以為池瀦水瑞光寺即其宅而此其别圃也慶厯間子美謫廢以四十千得之為居傍水作亭曰滄浪歐公詩所謂清風明月本無價可惜只賣四萬錢者也子美既死其孤不能保遂屢易主今為章子厚家所有廣其故地為大閣又為堂山上亭北跨水復有山名洞山章氏併得之既除地發其下皆嵌空大石又得千餘樹亦廣陵時所藏蓋以増累其隙兩山相對遂為一時雄觀土地各有所歸也吳旦生曰梅聖俞晚年卜築滄浪之傍與子美相隣愛其地也觀子美獨步滄浪亭詩花枝低欹草生迷不可騎入步是宜時時携酒只獨往醉倒惟有春風知其一時閒適之致幽人勝地可稱雙絶子美又有滄浪詩云野蔓蟠青入破忩雖佳句然破忩野蔓蟠其中似無人居矣雖客死高橋遂以為䜟其人亡而地且屢易也紹興初沈元叔詩只今惟有亭前水曽識春風載酒人程致道詩醉倒春風載酒人蒼髯猶想見長身蓋亦遊其地而感其人耳中吳紀聞云滄浪亭為中吳軍節度使孫承祐之池館其後蘇子美得之我家舊與章莊敏俱有其半今盡為韓王所得吳縣志云韓蘄王軍行潤州過而樂之章氏不解意今督軍餉始大懼獻而祈免千指一夕而散余觀子美自為滄浪亭記云愛而裴回遂以錢四萬買之洪景盧云今蘄王家價值數百萬矣元末張伯雨猶慕之詩云闔閭城中可終老安得四萬買滄浪避暑録話云禹貢導漾東流為漢又東為滄浪之水滄浪地名非水名也孔氏謂漢水别流在荆州者孟子記孺子之歌所謂滄浪之水可以濯纓者屈原楚辭亦載之此正楚人之辭蘇子美卜居吳下前有積水即吳王僚開以為池者作亭其上名之曰滄浪雖意取濯纓然似以滄浪為水渺瀰之狀不以為地名則失之矣滄浪猶言嶓冡桐柏也今不言水而直曰嶓冡桐柏可乎大抵禹貢水之正名而不可單舉者則以水足之黒水弱水灃水之類是也非水之正名而因以為名則以水别之滄浪之水是也瘞鶴銘蘇子美詩山隂不見換鵞經京口新傳瘞鶴銘吳旦生曰瘞鶴銘刻京口焦山之麓記載其跡言人人殊要以黄伯思之說為正知子美詩悮也顧元慶作瘞鶴銘考録其全文銘七十二字序六十一字集古録云瘞鶴銘題華陽真逸撰刻於焦山之足常為江水所沒好事者伺水落時摹而傳之徃徃祗得其數字云鶴夀不知其㡬而已世以其難得尤以為竒惟予所得六百餘字獨為多也按潤州圗經以為王羲之書字亦竒特然不類羲之筆法而類顔魯公不知何人書也華陽真逸是顧况道號金石録云遍撿唐史及顧况文集皆無此號惟况撰湖州刺史㕔記自稱華陽山人爾蔡君謨云瘞鶴文非逸少字東漢末𨽻最盛晉魏之分南北差異鍾王楷法為世所尚元魏間盡習𨽻法自隋平陳多以楷𨽻相叅瘞鶴文有楷𨽻筆當是隋代書張子厚云瘞鶴銘今存焦山凡句讀之可識及㸃畫之僅存者百三十餘言而所亡失㡬五十字計其完書蓋九行行之全者二十五字而首尾不與焉熈寧三年於焦山之隂偶得十二字於亂石間其後又有丹陽外仙江隂真宰八字與華陽真逸上皇山樵似是真侣之號廣川書䟦云歐陽文忠謂得六百字今以石校之為行凡十行為字二十五安得字至六百蔡佑云其側有司兵叅軍王瓉題名小字數十與瘞鶴銘字畫一同雖無嵗月可考官稱乃唐人東觀餘論云文忠以為不類王書法而類顔魯公又疑是顧况道號又疑王瓉僕今審定文格字法殊類陶𢎞景𢎞景自稱華陽隐居今曰真逸者豈其别號與續博物志云陶隠居書自竒世傳畫板帖及焦山下瘞鶴銘皆其遺跡西清詩話云讀道蔵陶隠居外傳號華陽真人晩號華陽真逸道書言華陽金壇之地第八洞天東北門俱潤州境也丹陽與茅山相犬牙又三茒陶故居則瘞鶴銘為隠居不疑漁隠樷話載黄伯思與劉無言論書云唐王瓉一詩字畫全類此銘不知即瓉書抑瓉學銘中字而書此詩也劉曰疑即瓉書也下有上皇山樵人逸少書非王逸少也蓋唐有此人亦號逸少耳昵古録云黄伯思以瘞鶴銘為陶隠居書似矣獨謂以朱陽帖叅之絶類則予所不許朱陽帖出於信本蓋不足復疑且其寒峭取姿與銘體方嚴乃一二相反安得強合笭箵蘇子美松江長橋觀魚詩鳴榔莫觸蛟龍睡舉網時聞魚鱉腥我實宦游無况者擬來随爾帯答箵吳旦生曰漁隠樷話辨笭箵二字音韻甚詳而詩林廣記引元次山集自釋云帯笭箵而畫船注云上丁郎切下桑荒切竹器也故唐書音訓云讀作郎桑見元結本集音訓又音上力丁切下息極切取魚籠也蓋有平仄兩音自釋又云能帯笭箵全獨而保生能學聱齖保宗而全家傲也如此漫乎非耶其語雖叶韻然廣韻集韻於庚清青三韻中不收此箵字並於上聲迥字韻中收之子美此詩悮叶為平聲矣又黄魯直過石塘詩長虹垂地若篆字晴岫揷天如畵屏耕夫荷鋤解撥襫漁父㬠網投笭箵秦少㳺徳清道中還寄子瞻詩叢薄開羅帳淪漪寫鏡屏踈籬窺窅窕支港泛笭箵皆於青字韻中叶之真悞也陶南邨詩風簷縣襏襫烟艇帯笭箵自注云笭箵元結自釋音郎當蓋竹籠也其全詩以堂張黄為韻叶蓋從唐書音訓也大唐新語云漁具縂曰笭箵漁服縂曰䘨襫澄心堂紙王直方詩話曰澄心堂紙乃江南李後主所製國初不甚為貴自劉貢父首為題之又邀諸公賦之世為貴重貢父詩云當時百金售一幅澄心堂中千萬軸後人聞名寧復得就令得之當不識文忠公詩云君不見曼卿子美真竒才乆矣零落埋黄埃君家雖有澄心紙有敢下筆知誰哉梅聖俞云寒溪浸楮㫪夜月敲氷舉簾勻割脂焙乾堅滑若鋪玉一幅百金曽不疑東坡云詩老囊空一不留一番曽作百金收又從宋肇求此紙云知君也厭雕肝腎分我江南數斛愁吳旦生曰澄心堂紙取李氏澄心堂樣製也堂在建業後山談樷云澄心堂南唐烈祖節度金陵之宴居也世以為元宗書殿悮矣後主時製紙極光潤滑膩往往書畫多藉之宋初紙猶有存者按淳化閣帖皆此紙所搨歐公五代史亦用此屬草公曽以二軸贈聖俞聖俞以詩謝云江南李氏有國日百金不許市一枚又云堪入右軍跡慙無㓜婦辭劉原父詩斵氷折圭作宫紙王文正公詩魚涸肯數荆州池呵膠劉貢父和陸子履詩云此膠出從遼水魚白羽補綴随呵嘘吳旦生曰呵膠出遼中可以羽箭又宜婦人貼花鈿呵嘘随融故謂之呵膠洞㝠記云善苑國常貢一蟹長九尺有百足四螯因名百足蟹煮其殻勝於黄膠亦謂之螯膠勝於鳳喙之膠也沈東老侯鯖錄曰熈寧中有稱回道人或曰此吕洞賓也過沈東老飲酒寫絶句於壁云西隣已富憂不足東老雖貧樂有餘白酒釀来縁好客黄金散盡為收書七年坡過晋陵見東老之子能道其事時東老已歿三年矣坡為和其詩吳旦生曰余家前谿距數里而南為東林山有沈東老名思字持正以藥十八味釀為十八仙酒楊鐡厓所謂眀晨紗㡌青藜杖更訪東林十八仙也熈寧元年八月十九日客號回道人來訪求一醉因出酒器十數於席回曰飲器中鐘鼎為大屈巵螺盃次之梨花蕉葉最小當為公自小至大飲之東老鼓琴回浩歌以和自日中至暮已飲數斗無酒色将逹旦瓮無餘瀝矣舉席上石榴皮題詩庵壁其色微黃而漸加黒約此去五年復遇今日當化去行至舍西石橋不知所適至熈寧五年中秋之吉東老屬其族人而告之及期捐館東坡和其詩曰世俗何知貧是病神仙可學道之餘但知白酒留佳客不問黃金覔素書苻離道士晨興際華岳先生尸解餘忽見黃庭丹篆字罔傳青紙小朱書凄凉雨露三年後彷彿塵埃數字餘至用榴皮縁底事中書君豈不中書齊東野語云沈偕君與即東老之子也饒於財少逰京師好狎逰時蔡奴聲價甲於都下沈呼一賣珠人於其門首議價不售撒其珠於屋上笑曰依汝所索還錢蔡於簾中窺見後數日乃詣之其家喜相報曰撒珠郎至矣接之甚至於是豪侈之聲滿三輔時賈耘老隠居苕城南橫塘上沈以詩遺之蠏曰黃秔稻熟墜西風肥入江南十月雄橫跪蹣跚鉗齒白圓臍吸脇斗膏紅虀須園老香研柚羮藉庖丁細劈葱分寄橫塘溪上客持螯莫放酒杯空耘老得之不樂曰後進輕我且聞其不羈因和韻詆之云彭越孫多伏下風蝤蛑奴視敢稱雄江湖縱養膏腴紫鼎鑊終烹爪眼紅嗍稱吳兒牙似鍍劈慚湖女手如葱獨憐盤内秋臍實不比溪邊夏殻空君與怒曰賈與郡將往還預政言人短長為人所訟我以長上推之乃鄙我如此復用韻報之云蟲腹無端苦動風團雌還却勝尖雄水寒且弄雙鉗利湯老難逃一背紅液入幾家煩海滷醢成何處汚園葱好收心躁潛蛇穴毋使雷驚族類空賈晚娶真氏人謂賈秀才娶真縣君沈所指團雌為此賈尋悔之而戯語已傳播矣月卿楊察詩人若月分卿吳旦生曰洪範王省惟嵗卿士惟月注云卿士各有所職若月之有分也伊尹曰九卿通寒暑按察謫守信州送行者十二人因作詩以謝曰十二天之數今宵席客盈位如星占野人若月分卿極醉巫山側聨吟嶰管清他年為舜牧恊力濟蒼生三謂十二野四謂十二月五謂十二峰六謂十二律結謂十二牧皆用十二故實水閣漁隠樷話曰賈耘老有水閣在苕溪之上景物清曠東坡作守時屢過之題詩畫竹於壁間沈㑹宗又為賦小詞云景物因人成勝㮣滿目更無塵可礙等閒簾幙小闌干衣未解心先快明月清風如有待誰信門前車馬隘别是人間閒世界坐中無物不清凉山一帶水一派流水白雲常自在其後水閣屢易主今已摧毁乆矣遺址正與余水閣相近同在一㟁悉如㑹宗之詞故予嘗有鄙句云三間小閣賈耘老一首佳詞沈㑹宗無限當時好風月如今總屬績溪翁蓋謂此也吳旦生曰堯山堂外紀作遺址與沈存中水閣相近後絶句亦屬存中作非也按胡元任卜居吳興以魚釣為適自號苕溪漁隠臨流數椽亦以此命名僧了宗為畫苕溪漁隠圖嘗得句即題其上云溪邊短短長長柳波上來來往往船鷗鳥近人渾不畏一雙飛下鏡中天巻起綸竿撇櫂歸短篷斜掩宿漁磯日髙春睡無人喚撩亂楊花繞夢飛其標致似耘老而小詩亦不減㑹宗詞矣元任住績溪歴代詩話巻五十六
