body:
  text: 歷代詩話卷三十七歸安吳景旭撰已集中之上杜詩鐵堂鐵堂峽詩硤形藏堂隍壁色立積鐵吳旦生曰硤藏於兩山之間有如堂隍蓋用秦風終南何有有紀有堂之語吕居仁詩弱水不勝舟有此積立鐵又云何知若人胸中有積立鐵則又用老杜積鐵語矣狨石龕詩熊羆咆我東虎豹號我西我後鬼長嘯我前狨又啼吳旦生曰蔡傅卿注狨音戎猿狖之屬詩話以為狨類鼠而大余考埤雅狨大小類猿長尾尾作金色俗謂之金線狨是也生川陜深山中人以藥矢射殺之取其皮為臥褥鞍被坐毯之用狨甚愛其尾中矢毒即自齧斷其尾以擲之惡其為身患也狨一名猱詩曰無教猱升朩顔氏以為其尾柔長可籍然則制字從柔以此故也黃山谷箋云招隱篇熊羆咆兮虎豹號黃獨後山詩話曰黃獨無苖山雪盛儒者不解黃獨義改為黃精以豫考之蓋黃獨是也本草赭魁注黃獨肉白皮黃巴漢人蒸食之江東謂之土芋江西謂之土卵煮食之類芋魁云吳旦生曰詩話皆以為芋魁非也觀其雪盛而無苖可知非芋魁矣乃其類芋魁而小者張文濳謂其根惟一顆而色黃故名黃獨饑嵗土人掘食以充糧故老杜云爾沈存中證赭魁最詳謂今南中極多膚黑肌赤似何首烏切破其中赤白理如檳榔有汁赤如赭南人以染皮製鞾閩嶺人謂之餘糧本草禹餘糧注中所引乃此物述異記云藥中有禹餘糧者昔禹治水棄其所餘糧於江中生為藥洪武初僧宗泐有斸黃獨詩向來垂涕人遙遙千載慕蓋指老杜也戴叔倫詩地瘦無黃獨春來草更深裛狂夫詩雨裛紅蕖冉冉香吳旦生曰古音所載裛者說文以為書囊也字林以為香襲衣也三蒼以為露坌花也西都賦裛以藻繡乃書囊義古詩胡香裛還幰乃香襲衣義杜詩此句乃露坌花義古今字義相承之異也石筍石筍行云君不見益州城西門陌上石筍雙髙蹲古來相傳是海眼苔蘚蝕盡波濤痕雨多往往得瑟瑟此事恍惚難明論恐是昔時卿相墓立石為表今仍存吳旦生曰酉陽雜爼云蜀石筍街夏中大雨往往得雜色小珠俗謂之地當海眼莫知其故故蜀僧惠嶷曰前史說蜀少城飾以金璧珠翠桓溫怒其太侈焚之今在此地或拾得小珠時有孔者得非是乎又華陽記云開明氏造七寶樓以珍珠結成簾漢武帝時蜀郡火燒數千家樓亦以燼今人往往於砂土上獲真珠又蜀郡故事云石筍在衙西門外二株雙蹲云真珠樓基也昔有胡僧於此立寺為大秦寺其門樓十間皆以真珠翠碧貫之為簾後摧毁墜地至今基腳在每有大雨其前後人多拾得珍珠瑟瑟金翠異物今謂石筍非為樓設而樓之建適當石筍附近耳蓋大秦國多璆琳琅玕明珠金碧水道通益州永昌郡則寺疑此國人所建也又後漢書方術任文公傳公孫述時武擔山折文公曰西州智士死我乃當之三月果卒唐章懷太子賢注云武擔山在今益州成都縣北百二十步揚雄蜀王本紀云武都大夫化為女子顔色美絶蓋山精也蜀王納以為妃無幾物故乃發卒之成都擔土葬於成都郭中號曰武擔以石作鏡一枚表其墓華陽國志曰王哀念之遣五丁之成都擔土為妃作冢蓋地數畝髙七尺其石今俗名為石笋梁益記云石笋二在子城西門外按圖經在少城中夏門外一百五十步曽折再立之各髙丈餘圍六七尺云其下是海眼即非也又益州名畫録云孟蜀時畫工李文才寫義興門雙石笋告道士范德昭昔云真珠樓基或云是海眼未審孰是德昭曰吾聞諸至人斯乃蠶叢啓國鎮蜀之碑中以鐵柱貫之以橫石相鎮埋於地際上有文字言嵗時豐儉兵革水火之事諸葛曾掘驗之真珠樓基海眼皆非也云出方圓記據此則或云城或云樓或云寺或云碑則非墓矣章懷太子云是妃墓則豈是昔時卿相邪歷稽諸言與老杜不合為詳載之稚子冷齊夜話曰筍根稚子無人見世不解稚子為何等語唐人有食笋詩稚子脫錦䙀駢頭玉香滑則稚子為笋明矣桐江詩話曰唐詩蓋謂笋之脫籜如小兒之解䙀冷齊以稚子便作笋則非也吳旦生曰或引交州記以為竹鼠或引爾雅以為野雉舊注以為宗文字稚子種種可笑余觀杜牧之詩小蓮娃欲語幽笋稚相携此言筍如稚子即以小杜作大杜注腳可也蘇東坡送笋詩駢頭玉嬰兒一一脫錦䙀雖本唐句然嬰兒即稚子也張廣神異經竹子笋子亦此意如謝宗可同根竹詩競秀亭亭一種竒駢頭曽脫錦䙀兒張伯雨竹石詩龍孫乍脫䙀兒錦石面都皴彈子窩岑靜能食新筍詩脫䙀錦紋散切玉霜刀弄李西涯謝惠笋詩襪材有𣲖分洋谷䙀錦無心鬬馬嵬又以此作錦䙀注腳梅雨庚溪詩話曰江南五月梅熟時霖雨連旬謂之黃梅雨然少陵曰南京西浦道四月熟黃梅湛湛長江去冥冥細雨來蓋唐人以成都為南京則蜀中梅雨乃在四月也及讀柳子厚詩曰梅實逄時雨蒼茫值晚春時候所至早晚不同吳旦生曰范石湖吳船録謂蜀無梅雨子美梅熟時經行偶值雨耳恐後人便指為梅雨故辨之據此則庚溪誤認為梅雨而謬為其說也老學庵筆記云子美雨詩蓋成都所賦也今成都乃未嘗有梅雨惟秋半積隂氣令蒸溽與吳中梅雨時相類耳豈古今地氣有不同邪埤雅云今江湘二浙四五月之間梅欲黃落則水潤土溽礎壁皆汁蒸鬱成雨其霏如霧謂之梅雨沾衣服皆敗黦故自江以南三月雨謂之迎梅五月雨謂之送梅轉淮而北則否亦梅至北方變而成杏地氣使然也月令廣義云黴音梅黰音軫溽濕之氣也一作黴黕廣韻黰又作􅀢東絹雙松圖歌我有一匹好東絹重之不减錦繡段吳旦生曰舊注鵝溪地名在梓州鹽亭縣出絹甚良謂之鵝溪絹即東絹也文與可詩待將一段鵝溪絹東坡答與可詩為愛鵝溪白繭光元何太虗詩千黃金雙白璧鵝溪白繭才數尺韻語陽秋云祕省古今名畫如所用絹素凡涉名筆必密緻緊厚蓋慮其易敗也米元章畫史云古畫唐初皆生絹後來皆以熱湯湯熟入粉槌如銀版故作人物精彩今人收唐畫必以絹辨見文粗便謂不是非也余謂用粉槌絹固善然視他絹丹青恐易渝也閭丘贈蜀僧閭丘師兄詩題下公自注曰太常博士均之孫吳旦生曰成都文類均銅梁人與杜審言同年均善書即所云世傳閭丘筆峻極逾崑崙者雪嶺多其碑碣甫時尚存僧在成都與甫通家來往唐詩紀事云吾祖詩冠古同年䝉主恩謂審言以詩均以字同侍武后也困學紀聞云鳳藏丹霄暮龍去白水渾蓋稱均之文也舊史景龍中均為安樂公主所薦拜太常博士公主誅貶循州司倉進不以道其文不足觀已芧栗詩話類編曰芧栗朩果也莊子所謂狙公賦芧是也杜詩園收芧栗未全貧正指此物今以芧栗解作蹲鴟之芋一何遠哉吳旦生曰爾雅櫟其實救櫟橡實也救盛實之房也唐風集于苞栩陸璣云今柞櫟也徐州謂櫟為杼或謂之為栩其子為皂或言皂斗其殼為汁可以梁皂今京洛及河內多言杼斗或云橡斗謂櫟為杼五方通語也則作櫟也杼也栩也皆橡櫟之通名風土記云吳越之間名柞為櫪古今注云杼實為橡據此則芧栗即橡栗為其形如栗也即老杜同谷歌所謂嵗拾橡栗隨狙公也按韻書芧羊諸切櫟狼狄切由栩而杼由杼而茅由櫟而栗字變而聲不變也若以為蹲鴟之芋芋羊茹切字與聲皆變誠去之遠矣顔氏家訓云有一權貴讀誤本蜀都賦注蹲鴟芋也而為羊字後有人餉羊肉答書云損惠蹲鴟青棠集云張九齡送芋與蕭炅書稱蹲鴟炅不學答曰損惠芋拜嘉惟蹲鴟未至耳然僕家多怪亦不願此惡鳥也談賔録云馮光震注蹲鴟為今之芋子即是著毛蘿蔔種種可資笑柄漁隱叢話云舊本栗字今作粟子美以其園猶有芧栗收所以為不全貧若園更以收粟是豈得為貧也野航漁隱叢話曰野航恰受兩三人航當作艇航是大舟野客叢書謂漁隱蓋見左思賦長鯨吞航子美詩已具浮天航樂天詩野艇容三人故有是說不知航亦有小者詩所謂一葦杭之豈大舟也吳旦生曰釋名方舟謂之杭即詩一葦杭之俱作虗用昔秦王捨舟於餘杭因名杭州不從舟而從朩亦此義勉夫引杭以證航看得最活後人必於此字論量大小拙甚矣黃山谷云艇改作航殊無理此特吳體不必盡律楊升菴云艇字有平音古樂府沿江有百丈一壖多一艇上水郎擔篙何時至江陵艇音廷杜詩用此音也余以航字本當必欲抑而為艇字因一作仄一作平何紛紛也廣雅舼艇皆舟也淮南子越舼蜀艇不能無水而行皮襲美答魯望惠魚詩何事貺君偏得所只緣同是越舼郎海録碎事云舼渠恭切小舟也公用野航亦有所出按晋郭翻乘小舟歸武昌安西將軍庾亮造之以其船狹小就引大船翻曰使君不以鄙賤而猥辱臨之此固野人之船也揚州韻語陽秋曰杜詩東閣官梅動詩興還如何遜在揚州按遜傳無揚州事而遜集亦無揚州梅花詩但有早梅詩云兔園標物序驚時最是梅銜霜當露發映雪凝寒開枝橫却月觀花繞凌風臺應知早飄落故逐上春來杜公前詩乃逄早梅而作故用何遜事又意却月凌風皆揚州臺觀名爾近有假東坡名作老杜事實一編謂遜作揚州法曹廨舍有梅一株遜吟咏其下豈不誤學者吳旦生曰墨莊漫録時南平王為揚州刺史愛客開東閣遜以詞藝早聞故引為水部行參軍事仍掌文記室然東晋宋齊梁陳皆以建業為揚州則遜之所在揚州乃建業耳非今之廣陵也野客叢書云西漢揚州治無定所後漢治厯陽後治壽春後又徙曲阿至隋唐方治今之廣陵則廣陵之為揚州亦未甚久也煬帝行幸時避諱故改言江都據此則遜在建業無疑馮惟訥乃云維揚新志載遜此詩題曰揚州法曹梅花盛開或有據也不知近來志記等書漫無確據可信如廣輿記亦引廨舍咏梅入廣陵南北朝名宦中可笑惟一統志不混入然考之梁書且巳載此又何論其他舍南舍北客至詩舍南舍北皆春水吳旦生曰韋述開元譜倡優之人取媚酒食居社南者呼社南氏社北者呼社北氏楊升菴據此謂子美正用其事不知者改為舍耳胡元瑞謂此在蜀草堂詩也花溪僻地何得有倡優居之且既曰倡優所居必酒食豐渥之地而杜詩下有盤餐市遠之句何邪又既曰倡優取媚酒食而杜之遺杯殘瀝不以及之乃與鄰翁對酌何邪余以只看皆春水三字便與花徑蓬門景物映帶宜從舍字若作社則下截反搭不上矣顧修遠謂公之南鄰則朱山人北鄰則王明府也肯與共飲竟可呼取而來見平日忘形之至也音夜老學菴筆記曰先夫人幼多在外家朝氏言諸朝讀杜詩稚子也能賖又晚來幽獨恐傷神也字恐字皆作去聲讀吳旦生曰劉須溪謂放翁以也字作夜音最得杜意余觀老杜有野人送朱櫻詩西蜀櫻桃也自紅又遣悶詩青袍也自公元微之寄樂天詩也向慈恩寺裏遊凡此數也字本皆音夜詩家往往用此劉貢父所謂不可如字讀竹根少年行云莫笑田家老瓦盆自從盛酒長兒孫傾銀注玉驚人眼共醉終同臥竹根吳旦生曰段氏蜀記巴州以竹根為酒注子為時珍貴也陳晦伯天中記云庾信謝趙王賜酒詩山杯捧竹根杜詩共醉終同臥竹根酒譜蓋以竹根為飲器也董遐周駁之云臥之與捧豈可强合晦伯未繹詩情耳余以瓦盆貯酒竹根為注巴俗皆然此即蘆酒之意同醉而臥不必泥其地也李長吉詩山杯鎖竹根蓋捧與鎖與臥一也鶴林玉露云蓋言以瓦盆盛酒與傾銀壺而注玉杯者同一醉也由是推之蹇驢布韉與金鞍駿馬同一逰也松床管席與繡帷玉枕同一寢也知此則貧富貴賤可以一視矣賣文聞斛斯六官未歸云本賣文為活翻令室倒懸吳旦生曰賣文為活段湛事而揚子雲亦賣文論衡子雲作法言蜀富賈人賫錢千萬願載於書子雲不聽曰夫富無仁義猶圈中之鹿欄中之羊也安得妄載濳居録云子雲以賣文自贍文不虗美人多惡之及卒其怨家取法言益之曰周公以來未有漢公之懿也勤勞則過於阿衡云云田藝衡云子雲家無擔石之儲却蜀賈錢若韓退之譽墓中人得金視圈鹿欄羊何如也故子美二語有深意矣顧修遠云唐史拾遺斛斯融字子明尤工碑銘四方以金帛求其文者嵗不减十萬隨得隨費室人至貧窶不給故曰賣文倒懸此道其實也結語云老罷休無賴謂其所得十萬隨得隨盡此少年無賴之事今老且罷矣無如少年之無賴可也此論一出覺從前以為矜髙之意公取自况者俱是隔膜花卿楊升菴曰唐人樂府多唱詩人絶句王少伯李太白為多杜子美七言絶近百當時妓女獨唱其贈花卿一首所謂錦城絲管日紛紛半入江風半入雲此曲只應天上有人間能得幾回聞也蓋花卿在蜀頗僭用天子禮樂子美作此諷之而意在言外最得詩人之旨當時妓女獨以此詩入歌亦有見哉胡元瑞曰花卿蜀小將耳雖恃功驕橫然非有韋臯嚴武之權王建孟昶之力即欲僭用天子禮樂惡得而僭之用修以子美贈詩為諷真兒童之見也凡詞人贊嘆聲色不曰傾城則曰絶代子美蓋贈歌者偶姓字相合亦云花卿實何戡薛濤輩用修便以破段子璋者當之然求其說不得也故有僭用禮樂之解吳旦生曰升菴此解甚得元瑞强欲折之然宋人已發其旨不自升菴始也杜有戲作花卿歌漁隱叢話云花卿雖有平賊之功驕恣不法子美不欲顯言但云人道我卿絶世無既稱絶世無天子何不喚取守京都語句含蓄鶴林玉露云全篇形容其勇鋭有餘而忠義不足故雖可以守京都而天子終不敢信用之語意涵蓄不迫切使人咀嚼而自得之觀此則花卿豈何戡薛濤輩乎花卿名敬定舊史崔光遠傳髙適傳皆載其名作驚定字黃山谷云花卿塜在丹稜之東鎮館至今有英氣血食其鄉天中記云花敬定長安人至德中從崔光遠入蜀討段子璋有功封嘉祥縣公後又平寇單騎鏖戰巳喪其元猶騎馬荷戈至鎮下馬沃盥適浣紗女語云無頭何以盥為遂僵仆居民葬之溪上廟祀之杜詩成部猛將有花卿學語小兒知姓名元瑞又云工部諸絶非漫興則拗體以入歌曲自不宜獨此首風致翩翩音節調美故諸妓女習之其為贈歌者益明如楊說則一老頭巾詠史語耳風致音節何在竊以風致音節之美妓女唱習便謂是贈歌者則唐世名公絶句取為樂府以唱習之者豈皆歌樓贈答詩邪其諸詩類多從軍離别之辭豈盡作頭巾語邪按杜公此詩在樂府為入破第二疊王維秦川一半夕陽開為相府蓮訛為想夫憐秋風明月獨離居為伊州歌岑參西去輪臺萬里餘為簇拍六州伊州渭州梁州氐州甘州凉州謂之六州盛小叢鴈門山上鴈初飛為突厥三臺三臺曲名自漢有之韋應物集有上皇三臺元曲有鬼三臺訛為三台王昌齡秦時明月漢時關為蓋羅縱張仲素亭亭孤月照行舟為胡渭州王之奐黃河逺上白雲間為梁州歌張祐十指纎纎似笋紅為氐州第一苻載月裏嫦娥不畫眉為甘州歌無名氏千年一遇聖神朝為水調歌雕弓白羽獵初回為水鼓子後轉為漁家傲功曹劉貢父詩話曰杜詩功曹無復漢蕭河按光武紀帝謂鄧禹曰何以不掾功曹又曹參嘗為功曹云酇侯非也焦氏筆乘曰虞翻為孫策功曹策曰孤有征討事未得還府卿復以功曹為吾蕭何守㑹稽耳廣德元年子美在梓州補京兆府功曹故以自况吳旦生曰考之鄧禹是空說未實為功曹曹參亦未為功曹公乃用史記中事非誤也蕭相國世家云以文無害為沛主吏椽曹相國世家云蕭何為主吏居縣為豪吏矣髙祖本紀云吕公善沛令辟仇從之客因家沛焉沛中豪傑吏聞令有重客皆往賀蕭何為主吏主進注云主吏功曹也元遺山送馬郎中詩功曹此日漢蕭何家世當年老伏波三竒野望云白雪三竒戍吳旦生曰行本作三城戍王原叔注謂西山三城列戍髙適疏論不納一本作三年皆非困學紀聞云按唐地理志彰州導江縣有三竒戍韋臯傳遣大將陳洎等出三竒西南備邊録所謂三竒營也當從古本三竒為是公有西山詩辛苦三城戍長防萬里秋按唐志注唐興有羊灌田朋笮繩橋三城也又對雨詩雪嶺防秋急繩橋戰勝遲此乃三城之一耳蕩船送段功曹歸廣州詩湖日落船明吳旦生曰蔡興宗改落作蕩謂非久在江湖間者不知蕩字之為工也而竹坡老人反疑之以為不若落字為佳耳王勉夫謂蕩之一字勝落字遠甚使其日晚泛湖此景便見他如謝混詩惠風蕩繁圃姚合詩春風蕩城郭陸龜䝉詩微雨蕩春醉用此一字景象迥别余見行本皆作落今從蔡王之論决宜定為蕩字雨蕩風蕩較之日蕩猶遜錦竹楊升菴曰子美有從韋明府續處覓錦竹三數叢詩黃鶴注云考竹譜竹紀無錦竹意以其文如錦名之竹紀有蒸竹菡墮竹其皮類繡豈即此乎近閲梅宛陵集錦竹詩雖作湘江紋還非楚筠質化龍徒有期待鳯曽無實本與凡草俱偶親君子室又注其下云此草也似竹而斑始知黃鶴有金注之昏耳吳旦生曰行本作綿竹蔡傅卿注引唐志漢州有綿竹縣縣有紫巖山綿竹蓋産於此山也其說恐非按綬草一名錦竹爾雅釋草綬似綬組似組陳風卭有旨鷊注云鷊小草雜色如綬說文􅀢綬也從草鶪詩曰卭有㫖􅀢是五狄切述異記吐綬鳥若天晴淑景則吐綬長一尺一名錦帶功曹即詩所謂㫖虉也虉本草名而紋似綬故字從鷊從草皂帽癸辛雜識曰管寧白帽之說尚矣雖杜詩亦云白帽應須似管寧然幼安本傳止云嘗著皂帽又云著絮帽布衣而已初無白帽之事獨杜佑通典帽門載管寧在家嘗著帛帽豈以帛為白乎然宋齊之間天子燕私多著白髙帽或以白紗今所畫梁武帝像亦然當時國子生亦服白紗巾晉人著白接䍦謝萬著白綸巾南齊桓崇祖白紗帽南史和帝時百姓皆著下簷白紗帽唐六典天子服有白紗帽他如白帢白幍之類通為慶弔之服白紵歌質如輕雲色如銀製以為袍餘作巾杜詩光明白㲲巾常念著白帽白樂天詩青笻竹杖白紗巾古所以不忌白者蓋喪服皆用麻重而斬齊輕而功緦皆麻也惟以升數多寡精粗為異耳自麻之外繒縞固不待言苧葛雖布屬亦皆吉服縞帶苧衣昔人為贈則亦何忌之有漢髙為義帝發喪兵皆縞素行師權制固不備禮後世多忌諱喪服求殺今有以縞素為緦功者宜巾帽之不以白也吳旦生曰辨陽老人言殊博辨然以證世俗巾帽之色則佳若謂管寧為白帽恐誤也余按杜詩劉㑹孟本王洙本及他善本皆曰皂帽應兼似管寧魏志云管寧在家恆著皂帽布𥜗隨時單復白氏六帖亦云幼安恆著皂帽布𥜗袴若杜氏通典所載帛帽當是皂字傳寫之差錯耳安得以帛為白也蓋皂染草也釋名云皂早也日未出時早起視物皆黑此色如之也不可援幼安以硬證白帽明矣孔氏六帖載地理志湖州土貢折皂巾乳酒謝嚴中丞送青城山道士乳酒一瓶云山城乳酒下秋雲吳旦生曰運斗樞酒乳也所以柔身扶老也乳忍九切春秋緯酒者乳也王者法酒旗以布政施天乳以哺人梁張率對酒詩如花良可貴似乳更堪珍言酒之香如花色似乳也行本作山瓶乳酒下青雲按此酒必青城山道士所造當依古本作山城為是作山瓶不成語檻江上值水如海勢聊短述云新添水檻供垂釣吳旦生曰說文檻櫳龍可豢故從龍也一曰圈飬畜之間也也趙凡夫以為溷槏槏戶也子美亦如其誤小雅觱沸濫泉石經通本並誤作檻泉非是釋名水正出曰濫泉濫銜也如人口有所銜口闓則見也爾雅濫水出正即檻泉也沃泉下出汍泉穴出灉者反入汧者出不流又水决之澤為汧肥者出同而歸異皆禹所名也銷夏集云泉出於山正出曰檻泉縣出曰沃泉穴出曰汍泉同出異歸曰肥泉異出同歸曰瀵泉生成屏跡二首云桑麻深雨露燕雀半生成吳旦生曰或以生成對雨露嫌其虗實不類然生為造成為化正與雨露字相敵如陳后山詩輟耕扶日月起廢極吹噓吹為隂噓為陽其銖兩足配日月也王伯厚云生成吹噓字若輕而實重萬里絶句云門泊東吳萬里船吳旦生曰老杜有草堂在萬里橋之西而東吳船泊乃其門頭即景也范石湖吳船録云合江亭者岷江别𣲖自永康離堆入成都及彰蜀諸郡合於此以下新津緑野平林煙水清遠極似江南亭之上曰芳華樓前後植梅甚多故事臘月賞梅於此管界巡檢在亭傍每花開及三分巡檢司具申一兩日開燕鹽司預焉蜀人入吳者皆自此登舟其西則萬里橋諸葛孔明送費禕使吳曰萬里之行始於此後因以名橋子美詩門泊東吳萬里船此橋正為吳人設揚雄蜀記云星橋上應七星李膺益州記云一長星橋今名萬里二員星橋今名安樂三機星橋今名建昌四彜星橋今名雀橋五尾星橋今名禪尼六沖星橋今名永平七曲星橋今名升仙華陽國志云李氷造七橋應七星故世祖謂吳漢曰安軍置在七星間玉帳送嚴公入朝詩空留玉帳術愁殺錦城人吳旦生曰王洙注玉帳術兵書也增釋又引唐藝文志有玉帳經一卷雲谷雜記云公又送盧侍御詩但促銅壺箭休添玉帳旗注則云見玉帳術注中然句中無術字則不當引前注按顔之推觀我生賦守金城之湯池轉絳宫之玉帳韋卓遁甲專征賦或倚直使之遊宫或居貴神之玉帳蓋玉帳乃兵家厭勝之方位謂主將於其方置軍帳則堅不可犯猶玉帳然其法出於黃帝遁甲以月建前三位取之如正月建寅則已為玉帳主將宜居李太白司馬將軍歌身居玉帳臨河魁戌為河魁謂主將之帳在戍也一㸃玩月詩關山同一㸃楊升庵曰東坡洞仙歌一㸃明月窺人用其語也赤壁賦山髙月小用其意也坊本改㸃作照語意索然胡元瑞詩藪中辨其非㸃字而筆叢又引坡詞乃繡簾開一㸃㸃字句絶者以證楊之誤吳旦生曰㸃字較勝工詩者自知楊何必引坡詞即據嘯餘譜所載洞仙歌凡四體而前段皆同後段小變坡詞乃第一體也繡簾開一㸃明月窺人九字為一句元瑞謂㸃字句絶是未按本調妄自為說也九字連讀則一㸃非月而何西溪叢話云孟蜀王水殿詩東坡續為長短句氷肌玉骨清無汗水殿風來暗香滿簾開明月解窺人欹枕叉橫雲鬢亂夜深瓊户寂無聲時見飛星渡河漢屈指西風幾時來只恐流年暗中換一云昶與花蘂夫人避暑摩訶池上所咏玉樓春詞也一云東坡少年遇美人喜洞仙歌又邂逅處景色暗相似故櫽括稍協律以贈之也然考東坡洞仙歌序云眉州宋尼年九十餘自言入蜀宫中一日大熱蜀主與花蘂夫人夜起避暑摩訶池上作一詞宋具能記之今四十年來已死矣獨記其首兩句云氷肌玉骨自清凉無汗豈洞仙歌令乎乃為足之云田子藝云岑嘉州嚴灘一㸃舟中月又赤驃馬歌草頭一㸃疾如飛又西看一㸃是關樓朱灣白鳥翔翠微詩淨中雲一㸃宋張安國詞洞庭青草近中秋更無一㸃風色夫月雲風也馬也樓也皆謂之一㸃甚竒蔚藍老學菴筆記曰蔚藍乃隱語天名非可以義理解也杜子美金華山詩上有蔚藍天垂光抱瓊臺猶未有害韓子蒼乃云水色天光共蔚藍乃直謂天與水之色俱是藍耳恐又因杜詩而失之吳旦生曰蔚藍字度人經作鬱繿今陸放翁謂隱語不可理解之物反增一障此明是天之色故老杜言垂光也范德機詩隔水照見蔚藍天則又借水寫出正得垂光之意余即觀放翁詩微風蹙水魚鱗浪薄日烘雲卵色天此亦言天之色耳豈隱語邪東坡詩共把鴟夷一樽酒相逢卵色五湖天則先放翁用之天啓中沈景倩詩襯日魚鱗水烘人卵色天又全用放翁語矣花間詞云一方卵色楚南天注以卵為泖而注坡詩者改卵色為柳色皆說者之過蓴羮鹽豉泛房公西池詩䜴化蓴絲熟藝苑雌黃曰世說陸機詣王武子指羊酪曰卿江東何以敵此陸曰有千里蓴羮但未下鹽豉耳蓴羮得鹽豉尤美故梅聖俞詩鹽豉煮蓴香味全黃山谷詩鹽豉欲催蓴菜熟蓋千里湖名也千里湖之蓴菜以之為羮可敵羊酪然未可猝致故云未下鹽豉耳吳旦生曰一日與韓人穀舉此云羊酪不受五味調劑所謂蓴羮可敵者謂蓴羮可敵羊酪但羮以受和而更美耳若云未可猝致又添語障余以人榖之言即劉須溪所云言外謂下鹽豉後尚未止此也陸放翁詩湘湖蓴菜豉偏宜自注云蓴菜最宜鹽豉所謂未下鹽豉者言下鹽豉則非羊酪可敵蓋盛言蓴羮之美爾據此則其義益明按逸雅豉嗜也五味調和須之而成乃可甘嗜也說文解豉字云配鹽幽菽也蓋豉本豆也以鹽配之幽閉於甕盎中故曰幽菽皇甫庸云吳人善作豆豉遂以呼之宋京師謂豉曰鹽䜴或因此云史記糵麴鹽䜴蓋四物也後漢書羊續為南陽太守鹽豉共器千里湖在溧陽至今産美蓴俗呼千里淹按晉書載陸機答武子云千里蓴羮末下鹽豉張巨山詩一出修門道重嘗末下蓴又以末下為地名沈明逺引齊高帝設蓴事亦曰千里末下皆地名也陳眉公云或說千當作芊末當作秣千末皆省文也秣下即秣陵據此則全異世說矣說文羮五味之和也羮一名湆音泣一名臛左傳晏子曰和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以泄其過君子食之以平其心草堂老學庵筆記曰杜少陵在成都有兩草堂一在萬里橋之西一在浣花皆見於詩中萬里橋故迹湮沒不可見或云房季可園是也吳旦生曰萬里橋之西草堂即裴中丞所營也結廬枕江竹朩觴咏之地房氏因以為園耳按公草堂有四其一在西枝村未成其一在瀼西則所謂乾坤一草亭者是也其一在東屯則所謂兼茅屋者是也其一在浣花則所謂斷手寶應年者是也浣花草堂三年後成成數月為秋風所破其流落亦甚矣韻語陽秋云老杜當干戈騷屑之時間關秦隴於是入蜀始有草堂之居觀其乞樹本於何少府乞果栽於徐少卿以至詰王録事許修草堂資不到蓋其流離貧窶不能自給皆因人而成也然避成都之亂入梓居閬其心未嘗一日不在草堂遣弟檢校草堂云鵝鴨宜長數柴荆莫浪開寄題草堂云尚念四小松蔓草易拘纒送韋郎歸成都云為問南溪竹抽梢合過牆每致意如此成都亂定再依嚴武復歸草堂云不忍竟捨此復來理榛蕪入門四松在步堞萬竹疏則其喜可知矣未幾嚴武卒復捨之而去以史及公詩考之草堂斷手於寶應之初而永泰元年四月嚴武卒是年秋公已在雲安此草堂終始祇得四載而其間居梓閬三年公詩所謂三年奔走空皮骨是也則安居草堂僅閲歲而已其起居寢興之適不足償其經營往來之勞可謂一世之羈人也漏天朱文公語録曰杜詩最多誤字如蜀有漏天以其西北隂盛常雨如天之漏也故詩云鼓角漏天東後人不曉其義遂改漏字為滿似此類極多吳旦生曰梁益記大小漏天在雅州西北山谷髙深沈晦多雨黎縣常多風故謂黎風雅雨寰宇記卭都縣漏天秋夏常雨故曰漏天僰道有大黎山小黎山四時霖霪不絶俗呼為大漏天小漏天古詩地近漏天終歲雨其著名已久人自不曉妄加改易耳元二送元二適江左劉會孟本公自注元結也舊箋曰按次山退居樊上未嘗至蜀廣德元年授道州刺史未嘗適江左碑傳及次山集可考宋刻善本亦無此六字吳旦生曰觀詩中晋室丹陽公孫白帝絶不類次山末云經過自愛惜取次莫論兵尤非對次山語按本傳結嘗奏免稅租及和市雜物十三萬緡又奏免租庸十餘萬緡因之流亡盡歸即其舂陵行序云道州舊四萬餘户經賊已來不滿四千大半不勝賦稅到官未五十日承諸使徴求符牒二百餘封皆曰失其限者罪至貶削故老杜謂得結輩十數公落落然參錯天下為邦伯萬物吐氣天下少安可待矣國史補云天寶之亂乃舉義師宛葉之間有嬰城扞冦之功曽此人而區區戒以莫論兵邪却小箋曰劉辰翁謂衣冠却扈從為還京之喜與先時不及扈從而今扈從道旁觀者之歎班行回首之悲盡在一却字中辰翁評杜多於虗字著眼亦小小間架耳於杜詩實無所解吳旦生曰此辰翁為陳宏叟詩序中語也王生學詩又云徒一却字而昔之宜扈從而不扈從與後之欣喜復辟舍其枯而集其菀者具是有焉辰翁神悅一却字而諄復如是余以虗字見意老杜所長辰翁拈出不為無識殆未可以小視之也左擔焦弱侯曰杜詩左擔解者不知其說按華陽國志自僰道至朱提有水步道水道有黑水及陽官水至險難行步道度三津亦艱阻行人為語曰楢溪赤朩盤蛇七曲盤羊烏櫳氣與天通庲降賈子左擔七里左擔才見此耳吳旦生曰左擔地名注謂當作武擔或改作立擔皆非太平御覽引蜀記云蜀山自綿谷葭萌即杜此詩上句葭萌氐種逈也道徑險窄北來擔負者不容易肩謂之左擔道任豫益州記云左擔道在隂平縣北於成都為西其道至險自北來者擔在左肩不得度右肩也鄧艾束馬懸車之處楊升菴云據三書是左擔有三綿谷一也隂平二也朱提三也義則一而已朱提今之烏撒雲貴往來之西路也反舌後山詩話曰讀周書月令云反舌有聲佞人在側乃解老杜百舌詩過時如發口君側有讒人之句吳旦生曰蔡君謨以反舌為蝦蟆陳藏器謂今之鶯一名反舌余展卷及此輒為大噱按易通卦驗云百舌者反舌鳥也能反覆其舌隨百鳥之音劉孝綽詩復值懷春鳥枝頭弄好音徐悱妻劉氏詩風吹桃李氣過傳春鳥聲韋鼎詩萬里風煙異一鳥忽相驚此皆梁陳之句在老杜前者至唐張籍試反舌無聲詩破題云夏朩多好鳥偏知反舌名此其為百舌無論矣然於春則有聲於夏則無聲可悟老杜過時之義故劉夢得百舌吟云天生羽族爾何微舌端萬變隨春輝南方朱鳥一朝見索寞無言蒿下飛許填注淮南子云五月陽氣盛於上隂氣起於下百舌無音故無聲也朝野僉載云百舌春囀夏正惟食蚯蚓正月後凍開蚓出而來十月後蚓藏而往蓋物之相感也古今辭章中多取此以况人之巧言者故老杜詩云爾余觀春秋保乾曜云江充之害其萌反舌鳥入殿則氣類實有以相召又不止辭章之取况而已讀君側讒人之語可不為寒心哉醉如泥寄嚴鄭公詩先判一飲醉如泥吳旦生曰墨莊漫録南海有蟲無骨名泥在水則活失水則醉如一堆泥然五國故事云僞閩王延慶為長夜之飲以銀葉作杯柔弱為冬瓜片酒既盈不可置杯惟盡乃已名曰醉如泥後漢周澤為太常清潔循行盡敬宗廟嘗卧疾齊宫其妻闞問所苦澤怒以妻干齊禁遂收詔獄時人為之語曰生世不諧叶奚作太常妻一嵗三百六十日三百五十九日齊叶一日不齊醉如泥既作事復低迷惆悵墨莊漫録曰丹青引贈曹霸詩也有云至尊含笑催賜金圉人太僕皆惆悵說者謂帝喜霸之能寫真畫馬也故催金賜之而圉人太僕自歎其無技以䝉恩賚耳如此說則意短殊不知深譏肅宗也始云先帝天馬玉花驄畫工如山貌不同是日牽來赤墀下迥立閶闔生長風帝既見先帝之馬當軫羮墻之念反含笑而賜金曽不若圉僕見馬能惆悵而懷先帝吳旦生曰此贈曹將軍詩張彥遠畫記乃云贈韓幹非是因想其拂絹之時意匠慘淡曹將軍滿肚感槩矣肅宗無父之心老杜託之興諷不一而足乃其眷懷先帝尤所不忘故韋宅觀曹畫馬又云憶昔巡幸新豐宫翠華拂天來向東騰驤磊落三萬匹皆與此圖筋骨同蓋明皇幸驪山溫泉宫在長安東新豐縣王毛仲以廄馬數萬從幸每色為一隊相間若錦繡老杜有盛衰存歿之思故往往及之歷代詩話卷三十七
