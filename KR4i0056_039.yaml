body:
  text: 歷代詩話卷三十九歸安吳景旭撰已集中之下杜詩紅鮮茅堂檢校收稻詩紅鮮終日有玉粒未吾慳吳旦生曰此即桃花米也宋武帝張妃桃花米飯任昉卒於新安惟有桃花米二十斛公又詩云玉粒足晨炊紅鮮任霞散烏鬼戲作俳諧體遣悶云家家飬烏鬼頓頓食黃魚吳旦生曰烏鬼馬永卿漫叟以為豬謂川人嗜豬頭肉家家飬豬每呼豬則作烏鬼聲故號豬為烏鬼劉克陸佃胡苕溪黃朝英陸農師焦淡園以為鸕鷀謂䕫州圖經稱峽中人以鸕鷀為烏鬼繩繫其頸使之捕魚得魚則倒提出之而人得食魚也僧惠洪王勉夫以為烏蠻鬼謂唐書南蠻傳俗尚巫鬼大部落有大鬼主百家則置小鬼主一姓白蠻五姓烏蠻所謂烏蠻則婦人衣黑繒白蠻則婦人衣白繒也沈存中邵博以為嵗正月十百為曹設牲酒於田間已而操兵大噪謂地近烏蠻戰場多厲用以禳之蔡寬夫黃山谷羅泌以為鴉謂峽中飬鴉雛帶以銅錫環獻之神祠中謂之烏鬼余以此說為可信按元微之詩鄉味尤珍蛤家神悉事烏又云病賽烏稱鬼巫占瓦代龜注南人染病競賽烏鬼則為烏鴉之烏非烏黑之烏矣復齊漫録云食可以言頓世說羅友曰欲乞一頓食續釋常談亦引世說以證一頓二字出處野客叢書云頓字豈惟食可用如前漢書一頓而成是言事也唐書打汝一頓是言杖也晉書一時頓有兩玉人是言人也宋明帝王忱嗜酒時以大飲為上頓是言飲也豈獨食哉吕太一自平宫中吕太一收珠南海千餘日葉少藴曰此詩似為哥舒晃作太一以廣德二年反晃大厯八年以循州刺史反相去蓋十年自此而上五篇疑皆失題但以首語名之讀者多不能遽了韓宗武曰代宗紀廣州市舶使吕太一反或疑宫中二字恐誤韋倫傳言宦者吕太一則中人為宫市於嶺南者爾故稱市舶使蘇東坡曰讀𤣥宗實録有宫人吕太一叛於廣南故下文有收珠南海之句吳旦生曰唐書有兩吕太一中宗朝一為文士以才稱代宗朝一為宦者以反戮唐世說載吕太一拜監察御史裏行自負才華而不即真因咏竹以寓意曰濯濯當軒竹青青重嵗寒心貞徒見賞籜小未成竿芥隱筆記開元中中書舍人吕太一與張嘉正號四俊者即此人蓋與老杜所咏明明别是一人也老杜所咏斷是宦者觀諸將詩南海明珠久寂寥則此詩為廣州市舶使明矣戮之以建平定之功故曰平惟屬宦者故曰宫中詩話乃謂唐時有自平宫謬甚舞劍器盧德水曰觀公孫大娘弟子舞劍器序與詩俱登神品蓋因臨潁美人而遡及其師又追想聖文神武皇帝撫時感事悽惋傷心念彼風塵澒洞以來女樂梨園俱付之寒煙老朩况自身業已白首而美人亦非盛顔則五十年間真如反掌以此思悲悲可知矣一篇中具全副造化波瀾莫有濶於此者吳旦生曰序言開元三載豫尚童稚記於郾城觀公孫氏舞劍器按睿宗太極元年公始生至𤣥宗開元三年才四嵗耳便能觀公孫氏渾脫舞且知其瀏灕頓挫獨出冠時邪而白首猶記及邪異人早慧乃爾李太白詩公孫大娘渾脫舞即此時事吕元濟上書比見方邑相率為渾脫隊駿馬戎服名曰蘇幕遮今之曲名取此太甲出瞿唐峽詩五雲高太甲六月擴摶扶墨莊漫録曰鮑欽正鄧睿思范元實及世行王原叔注皆不詳五雲太甲之義豫讀王勃孔子廟堂銘序云帝車南指遁七曜於中階華蓋西臨載五雲於太甲然則為𤣥象而言矣燕公讀此碑不解訪之一公一公言北斗建午七曜在南方有是之祥無位聖人當出華蓋已下卒不可悉則五雲太甲一公燕公不知之况餘人乎吳旦生曰嚴羽卿謂太甲不可曉得非高太乙邪乙與甲蓋相近以星對風亦從其類也此說殊陋困學紀聞引晉天文志云華蓋杠旁六星曰六甲太甲恐是六甲一星之名留青日札引五車證五雲云五車以五寅日候之有雲各具其色者賢人隱其下也甲寅為五候之首故曰太甲吹景集云隋書載天子欲有所逰往其地先發天子氣或如華蓋在霧氣中或有五色蒼帝起青雲扶日赤帝起赤雲扶日黃帝起黃雲扶日白帝起白雲扶日黑帝起黑雲扶日孔子衰周而素王故以天子氣喻之華蓋五雲之說確本於此京氏易納甲以甲屬乾宫甲為歲陽首故曰太甲太甲者借爾雅太歲在甲字面也按斗為帝車運乎中央蓋斗君象故謂之帝運動不居故為之車古者造車之初有取於斗柄下鐫龍角之象則所謂帝車亦因其象而名之遮莫鶴林玉露曰遮莫今俗語所謂儘教也杜詩巳判野鶴如雙鬢遮莫鄰雞下五更言鬢如野鶴已判老矣儘教鄰雞下五更日月逾邁不復惜也有用為禁止之辭誤矣吳旦生曰禁止既失而儘教亦太無賴蓋遮莫即莫是之意言鶴髮已老而約略曉籌又為雞報那得不催人老也嗟遲怨暮一段亡聊情况從兩語唱嘆而出下字即漏下幾㸃之下遮莫唐人俚語也當時有遮莫爾古時五帝何如我今日三郎之說李太白詩遮莫墓枝長百丈不如當代幾人還遮莫親姻連帝城不如當身自簮纓元微之詩從兹罷馳騖遮莫寸隂斜羅鄴詩南山遮莫倚樓臺龜年野客叢書曰子美逄李龜年詩岐王宅裏尋常見崔九堂前幾度聞退之井詩賈誼宅中今始見葛洪山下昔曽窺韓詩亦自杜詩中來吳旦生曰明皇雜録崔九即漢中令湜之弟也江季共說龜年詩非甫所作蓋岐王死時與崔滁死時年尚幼又甫天寶亂後未嘗至江南也范攄言明皇幸岷山伶官奔走李龜年奔迫江潭甫以詩贈龜年云云又言龜年曽於湘中採訪使筵上唱紅豆生南國秋來發幾枝贈君多採擷此物最相思云云歌闋莫不望行在而慘然龜年唱罷忽悶絶仆地以左耳微暖妻子未忍殯殮經四日乃蘇曰我遇二妃令教侍女蘭亭唱祓禊畢放還且言主人即復長安也時甫正在湘潭或有此詩老馬江漢詩古來存老馬不必取長途吳旦生曰韓子載管仲隰朋從桓公伐孤竹春往而冬返迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道焉東坡代滕逹道疏云自念舊臣譬之老馬雖筋力已衰不堪致遠而經涉險阻粗識道路范德機畫馬詩不待老能知失道固應求是涉流沙顧八分送顧八分文學云中郎石經後八分蓋憔悴顧侯運爐錘筆力破餘地吳旦生曰舊注卒不知顧何名又醉歌行云君不見東吳顧文學黃鶴注云即顧八分文學乃公自注顧汜或云况誤刋汜吳人蓋公既自注則不可謂顧何名矣及觀困學紀聞云趙氏金石以為前太子文學翰林院待詔顧誡奢醉歌行所云即誡奢也注謂顧况誤東觀餘論亦云此詩蓋謂顧誡奢也觀其遺蹟乃知子美弗虛稱之據此則所謂公自注者猶有後人所托未可全信邪砅送重表姪王砅評事使南海題下注云砅理罽切水深至心曰砅今作厲吳旦生曰說文砅力制切履石渡水也集韻類篇亦言履石渡水則鄭注以為水深至心何以成渡乎詩深則砅直是古厲字又豈特今作乎字書有云砅水擊石聲亦作砯砰作平聲者觀李太白詩砯崖轉石萬壑靁則此語亦未誣矣郭璞江賦砯巖鼓作字加㸃音平聲王圭母妻西清詩話曰唐書列女傳王圭微時母盧氏嘗云子必貴但未知汝與遊者圭一日引房𤣥齡杜如晦過之母曰汝貴無疑及質之少陵送重表姪王砅云我之曽老姑爾之髙祖母爾祖未顯時歸為尚書婦則圭母杜氏非盧氏又云隋朝大業末房杜俱交友長者來在門荒年自糊口家貧自供給客位但箕帚俄頃羞頗珍寂寥人散後入怪鬢髮空吁嗟為之久自陳剪髻鬟鬻市充沽酒上云天下亂宜與英俊厚向竊窺數公經綸亦俱有次問最少年虬髯十八九子等成大名皆因此人手下云風雲合龍虎一吟吼願展丈夫雄得辭兒女醜秦王時在坐真氣驚戶牖及乎貞觀初尚書踐台斗夫人常肩輿上殿稱萬壽六宫師柔順法則化妃后至尊均嫂叔盛事垂不朽其上下詳締如此而史謬誤之甚吳旦生曰桐江詩話今觀其詩不特不姓盧乃王圭之妻非母也容齊隨筆按唐列女傳元無此事圭傳末只云始隱居時與房𤣥齡杜如晦善二人過其家母李窺之知其必貴蔡說妄云有傳又誤以李為盧矣余觀層層駁擊使有可據詩之所以貴有話也第考傳文與詩辭合前人故致疑於母妻間耳因觀野客叢書云傳言母李而詩言妻杜有以知婦姑皆賢其髙識遠見非常人所能及者母見房杜則謂二客公輔才汝貴不疑妻見太宗則謂子等成大名皆因此人手其事甚異詩傳互相發明皆可為據也庚溪詩話云少陵所稱杜氏者實圭之妻而史所稱乃圭之母兩事自不同想以其詩中有剪髻鬟充杯酒事與陶侃母同故亦以為圭母然以圭之賢上稟訓於賢母下得助於賢妻宜其為一代宗臣也龍鳯姿許彥周詩話曰老杜詩不可議論亦不必稱讚茍有所得亦不可不記也如唐太宗相工見之龍鳯之姿天日之表而杜詩云真氣驚戶牖可謂工而盡吳旦生曰杜又詩䜟歸龍鳯質威定虎狼都按史記秦虎狼之國也唐史太宗龍鳯之姿詩話謂其各易一字最為妙處然總不若真氣二字不落皮相套子此後漢所謂知帝王自有真也蘇渙容齊三筆曰子美贈蘇渙詩序云蘇大侍御渙靜者也不交州府之客人事都絶久矣肩輿江浦忽訪老夫請誦近詩肯吟數首書篋几杖之外殷殷留金石聲賦八韻記異亦記老夫傾倒於蘇至矣詩有再聞誦新作突過黃初詩之語又寄裴道州并呈蘇侍御云致君堯舜付公等早據要路思捐軀其褒重之如此唐藝文志有渙詩一卷云渙少喜剽盜善用白弩巴蜀商人苦之稱白跖以比莊蹻後折節讀書進士及第湖南崔瓘辟從事繼走交廣與哥舒晃反伏誅然則非所謂靜隱者也渙在廣州作變律詩十九首上廣府帥可以知其人矣杜贈渙詩名為記異語意不與他等厥有㫖哉吳旦生曰間氣集渙本不平者稱其文意長於諷刺有陳拾遺一鱗片甲至比之蒯通詞說祖君彥檄書觀其廣州變律之作此所謂不平者也觀其不交州府人事都絶此所謂靜者也以為不平者則人比之蒯通祖君彥詩比之陳拾遺以為靜者則人比之龎公詩比之黃初蓋老杜傾倒之下序與詩未免稱過其實然用記異二字亦是其自出脫處盧德水云蘇之為人起手結局幾於龍蛇起陸然其不交州府忽訪江浦則其人固卓詭而具心眼者可念也子美所以記異也王季友潘子真詩話曰可歎詩丈夫正色動引經鄷城客子王季友羣書萬卷常暗誦孝經一通看在手貧窮老瘦家賣履好事就之為携酒豫章太守髙帝孫引為賔客敬頗久蓋髙帝孫者李勉也鄭惠王元懿生安德郡公琳琳生擇言擇言生勉勉自河南尹徙江西觀察使吳旦生曰篋中集姓氏載季友河南人一云鄷城人家貧賣履博極羣書李勉引為賔客河嶽英靈集稱其詩愛竒務險遠出常情之外然而白首短褐良可悲夫錢起有贈季友赴洪州幕下詩云列郡皆用武南征所從誰諸侯重才略見子如瓊枝此即豫章賔客之事也然觀季友雜詩云采山仍采隱在山不在深又寄韋子春河嶽英靈集作山中贈十四祕書兄詩云雀鼠晝夜無知我厨廩貧此亦足標其髙致也已行藥風疾舟中伏枕書懷云行藥病涔涔吳旦生曰車𦙍讀書鼓樓山一日行藥次得金於眢井中鮑昭行藥至城東橋詩五臣注云昭因疾服藥行而宣導之常建詩行藥至石壁東風變萌芽陸龜䝉詩更擬結茅臨水次偶因行藥到村前白樂天詩已遣平治行藥徑更教掃拂釣魚船陸放翁詩筍生遮道妨行藥果熟垂枝礙整冠放翁又有舍北行飯書觸目二首奪胎詩眼曰古人學問必有師友淵源漢楊惲一書迥出流輩則司馬遷外孫故也杜審言已工詩沈佺期宋之問等同在儒館為交游故老杜律詩布置法度全學沈佺期更推廣集大成耳沈云人如天上坐魚似鏡中懸杜云春水船如天上坐老年花似霧中看不免蹈襲前輩然前後傑句亦未易優劣吳旦生曰僧慧標咏水詩舟如空裏泛人似鏡中行沈佺期釣竿篇人如天上坐魚似鏡中懸老杜奪胎於二詩自成警句山谷云春水船如天上坐祖述佺期之語也繼之以老年花似霧中看蓋觸類而長之碧溪詩話又云春水船如天上坐不若老年花似霧中看尤為具眼識者參之野客叢書云佺期此語又有所自觀陳釋慧標詩舟如空裏泛人似鏡中行王逸少詩山隂道上行如在鏡中遊得非祖此乎杜子美詩曰春水船如天上坐李白曰人行明鏡中鳥度屏風裏盧懷謹曰樓臺影就波中出日月光疑鏡裏懸是皆體貼此意齧膝清明詩爭道朱蹄驕齧䣛吳旦生曰王叔原注朱建平善相馬魏文帝將出取馬入建平曰此馬今日死矣及將乘馬惡香齧帝䣛帝怒遂使殺之胡苕溪謂王褒聖主得賢臣頌云駕齧䣛注良馬低頭口至䣛故曰齧䣛子美意出於此余觀謝世修注亦引王褒傳洵魂文非佳事不足證也折風兩看舟前落花云赤憎輕薄遮人懷珍重分明不來折吳旦生曰玉宇别集劉公幹居鄴下一日桃花爛熳值諸公子遊賞久之遂去公幹謂其僕曰損花乎僕曰無但愛賞而巳公幹曰珍重輕薄子不來損折使老夫酒興不空老杜用此王原叔謂本作不來接一作折然接字何義劉須溪云折字是蓋亦有據而批此邪周顒避暑録話曰久為野客尋幽慣細學何顒免興孤何顒後漢人見黨錮傳與詩不類當作周顒周何字相近而訛周顒奉佛有隱操詩意當在周顒吳旦生曰公又有兜率寺詩庾信哀雖久何顒好不忘注云何𦙍侈於食味周顒勸之食菜應作周顒豈誤記何𦙍邪余觀韻語陽秋載周顒有云性命之在彼極切滋味之於我可賖今人以活臠而資口腹者誠何心哉於此知周之勸人食菜誠有然者而久為野客二語公於嶽麓道林二寺而作則必為奉佛之周顒矣金陵舊事云釋慧約姓婁少逹妙理周顒於所居鍾山舊館作草堂寺以處荆公詩周顒宅作阿蘭若婁約身歸窣堵波阿蘭若猶言遠離處窣堵波猶言廟皆梵語也南齊書周顒於鍾山西立隱舍休沐則歸之蓋其所謂隱操如此何至山隂一出孔稚圭作北山移文以絶之曰請回俗士駕為君謝逋客此又何說耶髙氏小史云周顒字彥倫始置四聲切韻行於時何氏語林云吳興沈休文陳郡謝𤣥暉琅邪王元長以氣類相推轂汝南周彥倫善識聲為文皆用宫商以平上去入為四聲以此制韻不可增减謂之永明體據此則公慕其奉佛或又慕其聲韻之學邪詩末即云延清題壁亦從此入想李杜長沙送李銜詩李杜齊名真忝竊吳旦生曰范母謂滂汝得與李杜齊名死亦何恨蓋指李膺杜密也按太尉李固杜喬為梁冀所殺故掾楊生上書乞李杜二公骸骨使得歸葬又白馬令李雲𢎞農五官掾杜衆同死獄中其役襄楷上言稱為李杜又韓退之稱太白子美云李杜文章在光芒萬丈長今公自稱銜為李杜抑何李杜之多也歷代詩話卷三十九
