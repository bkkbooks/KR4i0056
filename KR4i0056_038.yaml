body:
  text: 歷代詩話卷三十八歸安吳景旭撰已集中之中杜詩浣花溪絶句云移船先主廟洗藥浣花溪吳旦生曰方輿勝覽浣花溪在成都府城西一名百花潭按吳中復作冀國夫人任氏碑記云夫人微時以四月十九日見一僧墮汚渠為濯其衣頃刻百花滿潭因名百花潭蜀志補遺浣花溪有石刻浣花夫人像夫人姓任氏崔寧之妾也通鑑載成都節度使崔旴入朝楊子琳乘虗突入成都旴妾任氏出家財募兵得數千人自帥以擊之子琳敗走朝廷加旴尚書賜名寧任氏封夫人公建草堂於溪上故有寄題江外草堂詩乃自梓州所寄也永泰元年正月三日歸溪上有詩乃自嚴幕歸此溪也費著嵗華記麗以四月十九日浣花夫人誕辰太守出窄橋門至梵安寺謁夫人祠就宴於寺之設廳既宴登舟觀諸軍騎射倡樂導前泝流至百花潭觀水嬉競渡官舫民船乘流上下或幕帟水濵以供逰賞謂之大逰江浣花遨頭詳於辛集東坡詩雲根題忠州龍興寺所居院壁云忠州三峽內井邑聚雲根吳旦生曰趙注雲根言石也詩人多以雲根為石以雲觸石而生也蜀中詩話今其驛名曰雲根驛有筆亦名雲根筆然按沈約賦户接雲根庭流松響裴粲傳棲素雲根餌芝清壑古詩黕黕布雲根宋孝武詩積水溺雲根則早已引用之雨腳茅屋為秋風所破歌雨腳如麻未斷絶吳旦生曰語云種胡麻截斷雨腳公用此語也冷齋夜話以老杜雨腳泥滑滑世俗為兩腳泥滑滑又有寄岑參詩出門復入門雨腳但仍舊然觀張協雜詩雨足灑四溟又云森森散雨足則前人早用其意矣唐僧子蘭詩踈鐘搖雨腳孟浩然詩夕陽連雨足公有羌村詩崢嶸赤雲西日腳下平地因按李白詩日足森海嶠虞騫詩落暉散長足劉禹錫詩雲銜日腳成山雨石延年卒後留詩云花影長隨日腳流陳輔詩白下風輕日腳斜余有西湖晚眺詩山腰漸滅荒煙起日腳初沈逺水開白樂天詩水面初平雲腳低明光石硯詩公含起草姿不逺明光殿吳旦生曰原叔注明光殿霍去病借以避暑修可注漢殿名元后傳成都侯借以避暑是已野客叢書云漢有兩明光宫一明光殿按三輔黃圖一明光宫屬北宫一明光宫屬甘泉宫屬北宫者正成都侯商避暑之所屬甘泉宫者乃武帝所造以求仙者所謂明光殿自在桂宫三者元不相干諸家之注認為一處顚倒錯亂莫知其非至以避暑事為去病極可笑考漢紀太初四年起明光宫師古注成都侯避暑借明光宫蓋謂此師古之注已有此謬諱間明道雜志曰杜甫之父名間而詩不諱間試問王仲至討論之果得其由大抵本誤也寒食詩田父邀皆去鄰家間不違仲至家有古寫本作問不違作問實勝間又諸將詩曽閃朱旗北斗間寫本作殷字亦有理語更雄健又有娟娟戲蝶過間幔寫本作開幔開幔語更工因開幔見蝶過也吳旦生曰唐重家諱以性篤忠孝如公而不避忌諒無此理况所易字皆義勝而辭工也即如北斗間一句虞伯生注云此責諸將汝當樹旗於北斗城中以享安間之富貴今日始勞何用愁乎此解甚牽合不若薛樞密家得五代時故本乃是殷字音黫煙赤黑色左傳左輪朱殷謂赤黑為殷色岑參詩桞嚲鶯嬌花復殷英華辨證曰漢書有朱旗絳天老杜此句則因朱旗絳天閃見北斗亦赤也是殷字何疑杜詩七律舊稱虞注楊文貞公序云必伯生能為此也天啓中張濟美始辨其為元進士張性伯成氏所著且有曽昻夫所撰本傳可據又徐興公家有張刻古本名杜律演義元吳慶伯挽伯成有箋疏空令傳杜律之句王禹稱詩話云子美避地蜀中未嘗有一詩説著海棠以其生母名海棠也余觀吳中復詩子美詩才猶閣筆至今寂寞錦城中石曼卿詩杜甫句何略薛能詩未工鄭谷詩浣花溪上堪惆悵子美無情為發揚錢希白詩子美無情甚郎官著意頻然自來詩人不過言公之閣筆與無情而未嘗云為母名而避也後人遂附會其説以入詩話不知公詩偶不及海棠耳如三百篇多識草朩之名而花不及杏果不及梨橘草不及蕙朩不及槐原其初亦偶焉而已按許元寄歐陽公詩芍藥瓊花應有恨維揚新什獨無名公答云偶不題詩便怨人故周必大有芍藥小詩云六一先生舊帥揚分寧太史尹西昌只緣未識紅都勝如杜詩中缺海棠蓋紅都勝芍藥名公偶不題芍藥與杜之偶缺海棠一也投懷錦水居止云遠投錦江波吳旦生曰古音載投音豆其義有三皆假借也一借為逗留之逗唐盧潘辨合肥文西投於江淮杜詩逺投錦江波一借為句讀之讀馬融長笛賦察度於句投注猶章句也亦作句讀一借為酘酒之酘梁元帝樂府宜城投酒今行熟酘酒重釀酒也北堂書抄云宜城九醖酒曰酘酒杜鵑東坡外篇曰王誼伯書江濵驛垣謂子美詩歷五季兵火多舛缺竒異如西川有杜鵑東川無杜鵑涪萬無杜鵑雲安有杜鵑蓋是題下注斷自我昔遊錦城為首句誼伯誤矣蓋子美詩備諸家體非必率合程度侃侃者然也其篇句落處凡五杜鵑類有所感托物以發蓋譏當時刺史有不禽鳥若也嚴武在蜀雖橫斂刻薄而實資中原是西川有杜鵑耳其不受王命負固以自抗擅軍旅絶貢賦如杜克遜在梓州為朝廷西顧憂是東川無杜鵑耳至於涪萬雲安刺史微不可考凡尊君者為有懷二者為無不在杜鵑之真有無也吳旦生曰子美劈頭連下四句是其縱筆亦其拙筆變換無端難為拘律若云非體則樂府江南曲魚戲蓮葉東魚戲蓮葉西魚戲蓮葉南魚戲蓮葉北連下四句蓋前此矣元末劉德元作蕨萁行云東山有蕨萁南山有蕨箕西山有蕨萁北山有蕨萁亦其縱筆處也古今文人筆底孰敢以體程尺之邪若東坡謂譏刺史則又穿鑿學林新編云此非子美自注蓋皆詩也自四句而下繼曰我昔遊錦城結廬錦水邊有竹一頃餘喬朩上參天蓋鵑字繼之以邊字天字可見矣又子美絶句云前年渝州殺刺史今年開州殺刺史羣盜相隨劇虎狼食人更肯留妻子此詩正與杜鵑詩相類乃自是一格也哺子咏杜鵑云生子百鳥巢百鳥不敢嗔反為哺其子禮若奉至尊吳旦生曰杜鵑不自哺子寄哺於百鳥巢內亦或有之然老杜忠愛性成興託至此骨性筆力一時迸露不禁其言之津津耳其别一杜鵑行云誰言飬雛不自哺此語亦足為愚蒙王氏談録謂此正破前篇之非余以篇中毛衣慘悴上訴蒼穹之語而結以深宫嬪嬙明是憤鬱寓言此即前篇奉至尊之意也最可笑者江崑嶽云此鳥不自營巢當生卵時竊睹他鳥離巢輒吞其卵而自遺卵他鳥歸誤以為已卵哺而出之車若水云杜鵑鷂屬梟之徒也飛入鳥巢鳥見而去因生子於其巢鳥歸不知是别子也遂為育之既長乃欲噉母蓋其璅鄙至此而反議杜詩體物未真邪汝陽八哀詩汝陽讓帝子眉宇真天人虬髯似太宗色映塞外春吳旦生曰羯鼓録汝陽王璡姿容妍美秀出藩邸嘗戴砑絹帽打曲上自摘紅槿花一朵置於帽上笪處因誇曰花奴汝陽小名非人間人必神仙謫墜也寧王謙謝隨而短斥之上笑曰大哥不在過慮夫帝王之相且須英特越逸之氣不然有深沉包育之厚若花奴但秀邁人悉無此狀因無猜也而又舉止淹雅當更得公卿間令譽耳據此則汝陽眉宇自是不凡老杜稱為天人亦因玄宗有神仙謫墜之語而云邪潑剌野客叢書曰杜詩船尾跳魚潑剌鳴不曉者讀為撥次按張衡思玄賦彎威弧之撥剌注剌力逹反太白詩雙鰓呀呷鬐鬛張跋剌銀盤欲飛去李以撥為跋所謂撥剌者劃烈震激之聲箭鳴亦然又勢有不便順謂之乖剌乖剌者乖戾也如東方朔謂吾強乖剌而無當杜欽謂陛下無乖剌之心是也今人言作事不順猶有此語剌呼為賴聲之轉也古音略曰毛詩鱣鮪發發説文作鮁籕文作癹韓詩作鱍鱍象魚撥剌之狀劉向傳膠戾乖剌太史公書無乃與僕私心剌謬南都賦天地之睢剌睢剌喻禍亂諡法暴戾無親曰剌漢有燕剌王唐有巢剌王今俗稱暴橫者亦曰剌虎云吳旦生曰王勉夫楊升菴之言皆證剌為盧逹切許愼云剌戾也從束從刀刀者剌之也徐鍇云剌乖違也束而乖違者莫若刀也亦作盧逹切趙凡夫箋云劉向封事膠戾乖剌詛楚文刑剌不辜按詩序下以風刺上石經作刺通讀作刺七鍚切劉協書記論曰剌者逹也許以戾訓犬出户下為解戾盩二字古今通借也又按詩是以為刺韻協辟轉避摕都計切則非刺矣諡法愎佷遂過不思忘愛並曰刺俗讀盧逹切非是字學集要云周官司刺掌三刺注刺殺也訊而有罪則殺之又刺史官名又書姓名於奏白曰刺後漢書漫刺糢糊也又刺芒本作朿俗從束約之束誤四十闈夢溪筆談曰霜皮溜雨四十圍黛色參天二千尺四十圍乃是徑七尺無乃太細長乎麈史曰凡朩始曰拱把才數寸耳大曰圍則尺也既曰合抱則五尺也莊子櫟社朩其大蔽牛挈之百圍疏云以繩束之圍度百尺是也今人以兩手指合而環之適周一尺杜詩四十圍是大四丈沈存中謂徑七尺不知何法以凖之若徑七尺則圍當二丈一尺孔子身大十圍以其大也如沈言才今之三尺七寸有竒耳何足為異周之尺當今之七寸三分緗素雜記曰古制以圍三徑一四十圍即百二十尺圍有百二十尺即徑四十尺矣安得云七尺也若以人兩手大指相合為一圍則是一小尺即徑一丈三尺三寸又安得云七尺也武侯廟柏當從古制為定則徑四十尺其長二千尺宜矣豈得以太細長譏之乎吳旦生曰沈存中一經丈量便來兩家之駁蓋運思所及脫腕抽毫握之不盈掬放之彌乎六合何處著一算博士挈短衡長積銖黍於其間哉徐興公引段文昌作武侯廟古柏丈云合抱在於旁枝駢梢葉之青青百尋及於半身蓄風雷之冥冥觀旁枝合抱則見幹之四十圍百尋半身則見髙之二千尺二公詩文暗合余謂必舉段文以實之猶拘虗之見也王勉夫謂杜新松詩何當一百丈欹蓋擁髙簷縱有百丈松豈有百丈之簷此如晉人峩峩如千丈松之意言其極髙耳余意亦如東坡與文同論竹云葉落空庭影許長方是解人詩眼云詩有形似之語若詩人之賦蕭蕭馬鳴悠悠斾旌是也有激昻之語若詩人之興周餘黎民靡有孑遺是也古柏詩所謂柯如青銅根如石此形似之語霜皮溜雨四十圍黛色參天二千尺雲來氣接巫峽長月出寒通雪山白此激昻之語不如此則不見古柏之髙大也文章警䇿處端在此兩體耳逸雅黛代也滅眉毛去之以此畫代其處也説文黱畫眉也箋云漢宫中妝有逺山眉文章家逺山青碧遂借凡青黝色通稱杜詩黱色參天改作黛草書訛黱首如代也六書言唐本説文作黛當是臆説未必也最能最能行云瞿塘漫天虎鬚怒歸州長年與最能吳旦生曰劉辰翁謂最能者負船水手之稱觀長年與最能可見余按杜又詩云長年三老歌聲裏白晝攤錢髙浪中陸放翁問蜀人云攤錢博也梁冀好意錢之戲注云即攤錢也容齋五筆云意錢賭博皆以四數之謂之攤廣韻攤字下云攤蒲四數也資暇集云意錢當曰攤鋪疾道之訛其音為蒲此説不然張仲素詩林間踏青去席上意錢來一作億吳幼清云億賭錢也以意猜度如漢人射覆之類故曰億古今詩話謂川峽以篙手為三老乃推一船之最尊者言之耳輟耕録謂吾鄉稱舟人之老者曰長老長上聲海舶中以司柁曰大翁是亦長老三老之意述異記云鄧通以棹船為黃頭郎曰土勝水其色黃故刺船郎皆著黃帽七修類藁云古有輯濯丞郎輯濯舟官名海録碎事云三門篙工謂之門匠陜人云自古無門匠墓言行舟皆溺死亦過語也西溪叢語云今人不善乘船謂之苦船北人謂之苦車苦音庫律細皇甫百泉曰杜甫晚於律細故林逋謂詩應細評然又須玩理於趣中逆志於言外若謂諌草非獻君之物鳴鐘豈夜半之時則是明月不獨照乎巴川而周民誠無遺種於雲漢矣吳旦生曰晚節漸於詩律細蓋公自謂也百泉之説以之律人則可蓋律已貴嚴而律人尚通也盧德水謂子美一生詩只受用一細字不止晚節為然詩不細不清詩不細不逺詩不細不能變化詩不細不敢縱橫也余觀公又云詩律羣公問按海録碎事云王仲宣流落荆南多有名士日問詩律故公詩云爾河嶽英靈集論曰昔伶倫造律蓋為文章之本也是以氣因律而生節假律而明才得律而清焉寧預於詞場不可不知音律焉東坡云敢將詩律鬬深嚴蓋未有不細而可言深嚴者也酒盧遣懷詩憶與髙李輩論交入酒盧吳旦生曰新唐書甫從李白及髙適過汴州酒酣登吹臺殆謂此時也按黃公酒盧文君當盧盧字不從土蓋買酒區也顔師古云賣酒之處纍土為盧以居酒甕四邊隆起其一面髙形如煅爐故名非溫酒壚也漢書食貨志令官作酒以二千五百石為一均率開盧以賣而臣瓚注謂盧為酒甕則誤矣楊升菴謂當盧蓋治酒也今燒酒法云起自文君唐詩卓女燒春醴是也此語益誣岑參詩一曲狂歌盧上眠觀一眠字可見阿假老杜詩有題云示獠奴阿假吳旦生曰趙注但云陶侃之子其於阿假似無相干而未釋阿假之義按北史獠無名字以長幼次第呼之丈夫稱阿謨阿假婦人稱阿夷阿等之類皆語之次第稱謂也按蜀土先無獠至李勢僭稱漢主時獠從山出自巴西至犍為梓童布滿山谷大為民患邵二泉云按韻獠音寥注云宵獵為獠又音老滄江樹燕間録曰風吹滄江樹雨洗石壁來以實字作虗字用樹樹立之樹晦翁以為誤字欲更為去對來字恐未然東坡詩天外黑風吹海立浙東飛雨過江來祖此但不若杜之簡雅逺矣吳旦生曰吹景集言樹當作澍蓋峽中波浪險絶長風吹江濤驚沫濺勢如暴雨之澍也洞簫賦聲􅐀􅐀而澍淵李善云澍古注通風吹滄江注一語嵯峨蕭瑟不可言余曰否否樹作樹立殊有神解即東坡詩天外黑風吹海立何元章云立水湧起貌出老杜三大禮賦四海之水皆立胡苕溪亦云先君有幾日北風江海立之句楊仲宏詩洶若北風吹海立袁海叟詩海水蕩潏如山立然則江樹與海立皆千古竒語矣存歿存歿口號二首席謙不見近彈碁畢曜仍傳舊小詩玉局他年無限笑白楊今日幾人悲鄭公粉繪隨長夜曹霸丹青已白頭天下何曽有山水人間不解重驊騮吳旦生曰洪容齋謂每篇一存一歿蓋席謙曹霸存畢曜鄭虔歿也黃魯直荆江亭即事云閉門覔句陳無已對客揮毫秦少遊正字不知溫飽味西風吹淚古藤州乃用此體時少遊歿而無已存也余觀鶴林玉露引此句謂少遊特流連光景之詞而無已意髙詞古直欲追蹤騷雅正自不可同年語漁隱叢話亦引此句謂魯直以今時人形入詩句取法少陵然不知其法少陵存歿之感而非但法其時人入句也二公皆失考歸田詩話云山谷此詩喻二人才思遲速之異也無巳詩如壞墻得雨蝸成字古屋無人燕作家寥落之狀可想少遊詩如翡翠側身窺緑酒蜻蜓偷眼避紅粧艷冶之情可見二人他作亦多類此無已宿齋宫驟寒或送綿半臂却之不服竟感疾而終少遊謫藤州以玉盂汲水笑視而卒二人於臨終屯泰不同又如此北斗歷歷詩秦城北斗邊吳旦生曰三輔黃圖長安故城城南為南斗形城北為北斗形故號斗城然觀公秦城近斗杓北斗故臨秦之句當是長安上直北斗也而秦中詩春城依北斗郢樹發南枝春字無義亦不可對郢當是秦城字耳劉禹錫望賦城依斗兮闌干與公同義荔枝解悶詩側生野岸及江蒲趙注自戎僰而下例以畝為蒲今官私契約皆然因以押韻不熟丹宫與玉壺雲壑布衣台背老勞人害馬俗本作勞生重寫誤今從歐本翠眉須一作踈誤或作鬚益誤楊升庵曰左思蜀都賦旁植龍目側生荔枝故張九齡賦云雖觀上國之光而被側生之誚老杜諱荔枝為側生蓋以時事不欲直道也末二句言布衣抱道有老死雲壑而不徴者乃勞人害馬以給翠眉之須何為者邪山谷謂雲壑布衣指後漢唐羌諌止荔枝貢者此俗所謂厚皮饅頭夾紙燈籠矣吳旦生曰王勉夫言漢和帝時南海獻荔枝十里一置五里一堠奔騰險阻死者繼路唐羌上書曰交州獻荔枝生鮮致之驛馬晝夜傳送至有遭虎狼之害頓仆死亡不絶道路詩之勞人害馬正引此故實為言耳子美自傷以有用之才見棄邱壑終老不用果物奪於愛姬之嗜欲及時致之雖勞人害馬有所不恤杜又有詩云憶昔南州使奔騰獻荔枝百馬死山谷到今耆舊悲舉此以驗勞人害馬之説為不誣矣觀此則引唐羌止以證勞人害馬四字而餘文俱以老杜已意足成之其説極確惜升庵不考及此漢武帝元鼎六年破南粵起扶荔宫荔枝自交趾移植於庭數嵗後一株稍茂終無花實一日萎死因不復蒔其實則嵗貢焉郵傳者疲斃於道極為民患至後漢安帝時交趾邵守極陳其弊乃始罷貢社日西溪叢語曰尚想東方朔詼諧割肉歸社日用伏日事蘇黃皆以為誤史記秦德公二年始作伏祠社乃同日至漢方有春秋二社與伏分也吳旦生曰邵氏聞見後録以割肉為社日皆引用之誤按十二諸侯年表秦德公二年初作伏祠社磔狗邑四門則祠社用伏日此詩用伏日事何礙野客叢書云漢書載揚雄解嘲曰東方朔割名於細君師古注謂以肉歸遺細君是割損其名而文選載此文則曰東方朔割炙於細君良注謂朔拔劔割肉以歸炙亦肉也二説雖不同皆通於理含蓄顧修逺曰勳業頻看鏡公意猶未忘勳業也頻頻取鏡而看胸中稷契眼底長安只看我此際作何面目猶未老否尚可自振否都在明鏡中了了看出又行藏獨倚樓其行其藏倚樓之際獨自躊躇藏既不甘行又難必無限心事他人不能知故獨自徘徊倚樓而不能自已吳旦生曰陳後山言裕陵嘗稱此二句子美之詩皆不逮此正以其含蓄無際裕陵雖未指出而早已看出也冷齋夜話云詩有句含蓄者如杜曰勳業頻看鏡行藏獨倚樓鄭雲叟曰相看臨逺水獨自上孤舟是也有意含蓄者如宫詞曰銀燭秋光冷畫屏輕羅小扇撲流螢天街夜色涼於水臥看牽牛織女星又班姬詩曰怪來籹閣閉朝下不相迎總向春園裏花間笑語聲是也有句意俱含蓄者如九日詩曰明年此會知誰健醉把茱萸子細看宫苑詩曰玉容不及寒鴉色猶帶昭陽日影來是也此等引論最足啓發詩思凡詩惡淺露而貴含蓄淺露則陋含蓄則旨令人再三吟咀而有餘味久之而其句與意之微乃可得而晰也孤帷步簷郭彥深詩筏曰杜甫夜詩第二句空山獨夜旅魂驚第三句忽説孤帆與空山不屬當是踈燈自照孤帷宿古人搗衣兩女子各執一杵後易作雙杵一人執之故曰新月猶懸雙杵鳴末句步簷倚杖看牛斗楊用修云簷與櫩同並是古簷字後人妄作步蟾與上新月復而且俗又梁陸倕鍾山寺詩步簷時中宿沈氏滿願詩步簷隨新月上林賦步櫩周流注步廊也杜詩實本此吳旦生曰田子藝謂俗本作步蟾夫以月而為步蟾則又易之踏兔走蜍可乎蓋步簷以混成而言如今之飛簷步廊也屋之半間亦曰一步非言行步於簷下也古者六尺為步今之廊簷大率廣六尺即步簷之明證也余以升庵證蟾為簷彥深證帆為帷皆出卓識直令子美此詩重開生面為録子藝語以廣之秋蓴秋日題鄭監湖上亭云羮煮秋蓴弱杯迎露菊新吳旦生曰此秋深景物故蓴與菊同稱則蓴羮宜於九月矣墨莊漫録云子美祭房相國九月用茶藕蓴鯽之奠蓴生於春至秋則不可食不知何謂而張翰以秋風動思鱸固秋物蓴不可曉也余以此語大謬方言春夏為絲蓴入秋為油蓴故秋蓴肥如氷筋陳眉公謂春蓴如亂髮不足異秋蓴長丈許凝脂甚滑季鷹秋風正饞此也按書至冬為豬蓴又云龜蓴又云七八月以前曰絲蓴秋末冬初曰塊蓴四月曰雉尾蓴據此則九月蓴正美也安得謂秋不可食哉張翰吳人辟齊王東曹掾不樂於官在京師見秋風起作歌棄官歸宋王贄過吳江有詩云因想季鷹當日事歸來未必為蓴鱸謂翰度時不可為故決去非實為蓴鱸也至東坡咏三賢則云不須更説知幾早只為蓴鱸也自賢其意又髙一著矣䂬溪詩話云臨川慷慨秋風起悲歌不為鱸眉山不須更説知幾早只為蓴鱸也自賢反覆曲折同歸一意余以東坡拓開一步正得晉人曠逹風味而臨川詩即贄意耳何謂同歸一意哉蟬精雋載一詩云黃犬東門事巳非華亭鶴唳漫思歸直須死後方回首誰肯生前便拂衣此日區區求適志他年往往見知幾不須更説蓴鱸美但在淞江水亦肥雖其姓氏不詳觀其落句似又從東坡推入一層令人尋繹之下如剝蕉心卷曲脫換益歎詩思之無窮也點朝班秋興詩幾回青瑣點朝班吳旦生曰點字張禺山作音玷束晢詩莫之點辱陸厥詩復點銅駝門楊升庵引漢書祗足以發笑而自點耳與此同顧修逺引公詩凡才汚省郎即此意也焦弱侯云若作玷不得用幾回字王建詩殿前傳點各依班唐人屢用之可證余考公於肅宗至德二載五月拜左拾遺八月即放還則列朝班僅僅三月此點字不過謂曽備員來合之一臥滄江撫今追往怨而不怒何必去聲讀一作照朝班倒句秋興詩紅稻啄殘鸚鵡粒碧梧棲老鳯凰枝吳旦生曰此為倒裝句法乃以反言之也若正言之當云鸚鵡啄殘紅稻粒鳯凰棲老碧梧枝公慣有此句法如他詩黃鵠髙於五尺童化為白鳬似老翁若正言之當云五尺童時似黃鵠化為老翁似白鳬也後見顧修逺云詩意本謂香稻乃鸚鵡啄餘之粒碧梧則鳯凰棲老之枝蓋舉鸚鵡鳳凰以形容二物之美非實事也重在稻與梧不重鸚鵡鳯凰若云鸚鵡啄殘香稻粒鳯凰棲老碧梧枝則實有鸚鵡鳯凰矣又謝世修云其意謂黃鵠髙於五尺之童本有雲霄之志今化為白鳬則似老翁由大而小不得志也可知余喜二説更有思致伊吕蕭曹讀杜二箋曰伯仲之間見伊吕指揮若定失蕭曹張輔葛樂優劣論曰孔明殆將與伊吕爭儔豈徒樂毅為伍後魏崔浩著論亮不能為蕭曹亞匹謂陳壽貶亮非為失實公此詩以伊吕蕭曹相提而論所以伸張輔之論而抑崔浩之黨陳壽也吳旦生曰見字失字下得神妙見字從伯仲之間生來失字從指揮若定生來鶴林玉露載孔明曰吾心如稱不為人作輕重信能此則吾心即造化也乃知長嘯草廬時其所講不在伊吕下或謂既比之伊吕又比蕭曹何也豫曰下句蓋惜其指揮未定而死耳指揮若定雖蕭曹且不能當况司馬仲逹乎指揮蓋措置經畫也如兵民雜耕留屯久駐之類失猶無也故末句有志決身殱之嘆焦弱侯云三分割據紆籌策萬里雲霄一羽毛人以三分割據為孔明功業不知此其所輕為正如雲霄一羽毛耳必也偶伊吕而失蕭曹乃盡公之才惜乎運移身殱僅以三分之業自見此天也非人也此詩八句一意讀者逐句解之失其旨矣悶西清詩話曰子美作悶詩乃云捲簾惟白水隱几亦青山若使豫居此當卒以樂死豈復有悶乎墨莊漫録曰子美居西川憂在王室而又生理不具與死為鄰故對青山青山悶對白水白水悶平時可愛樂之物皆寓之為悶也蔡約之處富貴所欠二物耳其後竄逐經歷﨑嶇必悟此詩之工吳旦生曰蔡絛看出憂中有樂張邦基説得樂中有憂總之作詩者與看詩者隨其興會即各具一造物不妨異轍而同途也張云經歷﨑嶇必悟其工此非善於論蔡乃善於論杜按李伯紀之序亦云蓋其開元天寶太平全盛之時迄於至德大歷干戈離亂之際凡四千四百餘篇其忠義氣節羈旅艱難悲憤亡聊一寓於詩平時讀之未見其工逮親更兵火喪亂之後誦其詩如出乎其時犂然有當於人心然後知其語之妙也按唐僧栖白詩捲簾當白晝移坐向青山元范德機詩青山入坐席白水抱門流其語意皆出於杜却皆説向樂邊添線海録碎事曰杜詩刺繡五紋添弱線魯直詩宫線添尺餘嵗時記謂魏晉間宫中以紅線量日影冬至後日影添長一線未知孰是吳旦生曰公有至目遣興詩愁日愁隨一線長魯直云釋此句者引嵗時記紅線量影之説而唐雜録謂宫中以女工揆日之長短冬至後日晷漸長比常日增一線之工此説為是則知魯直已有確據故其所云宫線添尺餘者亦指刺繡言耳陶南村掖庭記云元時有刺繡亭冬至則候日於此亭邊有一線竿竿下為緝衮堂至日命宫人把刺以驗一線之功書雲小至詩云雲物不殊鄉國異吳旦生曰詩話舊謂冬至用書雲事宋人小説以為分至啓閉必書雲物獨以為冬至事非也按春秋感精符云冬至有雲迎送日者來嵗美宋忠注曰雲迎日出雲送日入也冬至獨用書雲事指此未為偏失也然余觀左傳僖公五年正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也凡分至啓閉必書雲物為備故也杜預注云周正月今十一月分春秋分也至冬夏至也啓者立春立夏閉者立秋立冬雲物者氣色災變也漢明帝永平二年春正月辛未宗祀光武畢登靈臺觀雲物據此則四時八節皆可用書雲昔人偶於冬至用之亦可而後人遂援為故實則非矣文苑英華載令狐楚冬至進鞍馬狀云迎日良辰書雲令節落句范公稱過庭録曰小宋舊有一帖論杜詩至於實下虗成亦何可少也先子未逹後問朝以道云昔聞於先人蓋為縳雞行之類如小奴縳雞向市賣是實下也末云雞蟲得失無了時注目寒江倚山閣是虗成也蓋堯民親聞於小宋焉謹退而記之吳旦生曰落句之妙忽入他意靈變莫測非後人之所可擬真西山引黃山谷書酺池寺云小黠大癡螳捕蟬有餘不足夔憐蚿退食歸來北窗夢一江風月趂漁船步里客談又引山谷水仙花詩坐對真成被花惱出門一笑大江橫師民瞻引蘇子瞻二蟲詩二蟲愚智俱莫測江邊一笑無人識洪容齋引李德逺東西船行云東西相笑無已時我但行藏任天理數詩語意互相祖述然與老杜自懸殊也動搖竹坡詩話曰凡詩人作語要令事在語中而人不知讀太史公天官書天一鎗棓矛盾動搖角大兵起杜詩五更鼓角聲悲壯三峽星河影動搖蓋暗用遷語而語中乃有用兵之意詩至此可以為工吳旦生曰西清詩話引漢武故事星辰搖動東方朔以為民勞之應剡溪漫筆又引天官書注左旗九星在河鼓左右旗九星在河鼓右是天之旗鼓動搖主兵天爵堂筆餘云杜公雖破萬卷恐未必拘拘證古若此暑月夜半露坐時觀晴空星河影隱映錯落儼然動搖處處若此况三峽乎余觀此詩起句云嵗暮隂陽催短景天涯霜雪霽寒宵雖不可例以暑夜目之然必以星垣配合亦殊損其寥曠也按三峽有二自夷陵州西上南津關始入西陵峽再為明月峽北峰上有石穴如規故名再上即黃牛峽南有黃陵廟宜都記云自黃牛灘東入西陵界一百里許山水紆曲林朩髙茂哀猿三聲巖谷響應者即此此楚西之三峽峽之南門蜀江之委尻也上溯歸州由巴東過東西瀼溪始入巫峽再經巫山入鬼門關為歸峽再上即瞿塘峽在白帝城西舊亦名西陵峽灔澦堆當其口水經云杜宇所鑿連亘七百里重岩疊嶂隱蔽天日非亭午夜分不見日月者即此此川東之三峽峽之北戶蜀江之咽喉也澶漫聞河北諸道節度使入朝歡喜口號云澶漫山東二百州吳旦生曰澶音憚遠也莊子聖人澶漫為樂摘僻為禮而天下始分矣南都賦其竹則緣衍抵坂澶漫陸離柳子厚鐃歌云澶漫萬里宣唐風楊仲𢎞詩澶漫渠河方涉夏蕭條竹樹已迎秋又云南山多白雲澶漫塞崕谷司馬相如子虗賦案衍壇曼向注云平寬貌揚雄甘泉賦平原唐其壇漫翰注云廣大貌老子麈史曰子美李潮八分歌云苦縣光和尚骨立筆法瘦硬方通神按神仙傳老子苦縣瀨鄉人漢書稱桓帝夢見老子命中常侍左悺於瀨鄉致祭詔邉韶立祠兼刻石即蔡雍書也今考桓帝紀年乃建和而光和為靈帝年號豈傳寫之誤邪或以亳有太清殘缺碑猶有光和二字又不知太清之名始於何代兼譙去苦縣尚兩舍即非邉韶所刻石也吳旦生曰綱鑑桓帝延熹八年春正月遣中常侍左悺之苦音怙縣祠老子注云苦縣故城在開封府鹿邑縣東老子祠在鳯陽府亳縣按建和至延熹凡四改元則非是建和明矣生於苦而祠於亳判然兩地靈帝光和時蔡雍輩尚在安知非另有碑刻况太清又明是老子稱號也老杜或指亳碑而苦縣乃以老子生地連屬言之不為乖謬潘子真詩話云北嶽碑後漢光和二年立苦縣老子廟亦漢碑俱蔡雍書杜詩苦縣光和謂二碑也屠蘇楊升庵曰蕭子雲雪賦韜罦罳之飛棟沒屠蘇之髙影杜子美冷淘詩願憑金騕裊走置錦屠蘇屠蘇庵也廣雅云屠蘇平屋也通俗文云屋平曰屠蘇魏略云李勝為河南太守郡廳事前屠蘇壞唐孫思邈有屠蘇酒方蓋取庵名以名酒後人遂以屠蘇為酒名矣何遜詩郊郭勤二頃形體憩一蘇又大冠亦曰屠蘇禮曰童子幘無屋凡冠有屋者曰屠蘇晉志元康中商人皆著大障諺曰屠蘇障日覆兩耳會見暍兒作天子吳旦生曰廣韻廜㢝草庵詩話補遺云周王褒詩飛甍雕翡翠繡桷畫屠蘇屠蘇本草名畫於屋上因草名以名屋此又一解時鏡新書云晉董勛曰正旦飲酒先從小者何也俗以小者得嵗故先酒賀之老者失時故後飲酒四民月令云正旦進酒次第當從小起以年小者起先裴夷直詩自知年紀偏應小先把屠蘇不讓春顧况詩還丹寂寞羞明鏡手把屠蘇讓少年古雋考略云廜㢝酒名元日飲之可除瘟氣本作酴酥四時纂要作屠蘇屠者屠絶鬼氣蘇者蘇醒人魂雲麓漫抄云按荆楚嵗時記正月旦日進椒柏酒飲桃湯服却鬼丸敷於散次第從小起注云以過臘日故崔實月令過臘一日謂之小嵗又曰小嵗則用之漢朝元正則行之晉世蓋漢嘗以十月為嵗首也又云敷於散即胡洽方云許山赤散並有斤兩則知敷於音訛轉而為屠蘇小嵗訛而為自小起云石榞上後園山腳詩石榞遍天下水陸兼浮沉吳旦生曰榞音原朩名按石榞子如芎藭其皮可以禦飢時天下荒亂小民轉溝壑水陸並載石榞以充糧白鳥寄劉伯華使君詩江湖多白鳥天地有青蠅吳旦生曰鮑注與白鷗波浩蕩意同言自適也是直解作飛鳥蔡寬夫謂或以為鷺大謬按月令仲秋之月羣鳥飬羞注引夏小正曰九月丹鳥羞白鳥蓋有翼謂之鳥謂螢與蚊蚋也羞進也舊注又以白鳥為蚊蚋非是豈有兩句皆説讒成甚律度余以詩人青蠅刺讒固矣注家不識白鳥為戒貪而猥測之也金樓子載齊威公臥於柏寢白鳥營飢而求飽公開翠紗之厨而進焉有知禮者不食而退有知足者雋肉而退有不知足者長噓短吸而食及其飽者腹為之潰蓋戒夫貪也然則公詩蓋言天下多貪讒之人耳荆州髙齋夏月無白鳥昭明太子於此齋造文選崑崙月窟魏將軍歌被堅執鋭略西極崑崙月窟東巉巗吳旦生曰注家昧其義此即北斗歸南之意林下偶談云崑崙月窟在西而謂之東蓋謂魏將軍略地至西方之極而回顧崑崙月窟却在東也揚雄長楊賦西壓月􅒸東震日域注云月窟月所生處在西日域日初出處在東水明樓稗編載蘇尚書符嘗與人論詩曰祖父謂老杜四更山吐月殘夜水明樓以為古今絶唱乃祖父於此有妙悟處他人未易曉也吳旦生曰檮杌云偽蜀嘉王宗壽每諌諍衍不樂燕會衍命宫人李玉簫歌其所撰宫詞送宗壽酒宗壽懼禍乃飲佞臣潘在迎曰嘉王聞玉簫歌即飲請以玉簫賜之衍曰王必不納其歌詞云暉暉赫赫浮五雲宣華池上月華春月華如水浸宫殿有酒不醉真癡人觀此即詞曲月明如水浸樓臺所自出也水浸二字便涉纎麗其去王建天街夜色涼如水遠矣况與杜句何啻天壤歷代詩話卷三十八
