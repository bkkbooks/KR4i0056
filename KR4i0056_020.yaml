body:
  text: 歷代詩話卷二十歸安吳景旭撰丙集下之中賦試賦懶真子曰玉禹玉年二十許就揚州秋解試瑚璉賦官韻端朩賜為宗廟之器滿場中多於第二韻用朩字云唯彼聖人粵有端朩禹玉獨於第六韻用之上睎顔氏願為可鑄之金下笑宰豫恥作不雕之朩亦何奇巧吳旦生曰限字為韻自唐以律賦取士已有此體如崔損北斗賦以成象在天維北有斗為韻皇甫湜履薄氷賦以戒慎之心如履氷上為韻是也然其韻數多寡平側次敘初無定格至宋太平興國三年九月始詔禮部試進士律賦並以平側次用韻其後亦有不依次者宋時試賦最重破題警切場屋間每於此定魁選如天之厯數在舜躬賦暨陶破題云神聖相授天人會同何謳歌不之堯子蓋厯數在於舜躬又君人成天地之化賦熊節破題云物産於地形鍾自天賴君人之有作成化功之未全又大椿八千嵗為春秋賦滿場破題皆閣筆時陳元裕主文衡遂自作云物數有極椿齡獨長以嵗厯八千之久成春秋二序之常故有破題中一字未安輒為改易者如文帝前席賈生賦陳尹破題云文帝好問賈生力陳忘其勢之前席重所言之過人吳郛改勢作分陳大服又皇極統三德五事賦魁者破題云極有所會理無或遺統三德與五事貫一中於百為陳季陸考較嫌第四句貫百為於一中似乎倒置改貫作寓較有意思又圜丘象天賦滕甫破題云大禮必簡圜丘自然鄭獬云禮大必簡丘圜自然滕曰公在我先矣鄭果第一按唐時亦重破題如李程試日五色賦楊於陵詢其破題曰德動天鑒祥開日華於陵謂須作狀元翌日無名於陵攜此賦詣主文於是擢為狀元後浩虛舟應宏詞復試此題程慮浩愈於巳馳介取至觀浩破題曰麗日焜煌中含瑞光程喜曰李程在裏中有打花格如前席賈生有云金蓮燭煥煌煌漢天子之儀玉漏聲沈纚纚洛陽人之語試官喜此一聨陳季陸用髙皇對小白則知賦亦有假對法也又有假人名以體狀題意者如武為救世砭劑賦云唐制中興賴藥師而克濟漢家外患藉去病以皆除又蘇東坡贈趙德麟秋陽賦云生於不土之里而詠無言之詩蓋寓畤字也秦少遊云凡小賦如人之元首而破題二句乃其眉惟貴氣貌有以動人故先擇事之至精至當者先用之使觀之便知妙用然後第二韻探原題意之所從來不便用議論第三韻方立議論明其旨趣第四韻結斷其説以明題意思全備第五韻或引事或反説第七韻反説或要終立義第八韻卒章尤要好意思爾賦中工夫不厭仔細先尋事以押官韻及先作諸隔句凡押官韻須是穩熟瀏亮使人讀之不覺牽強賦中用事唯要處置才見題便類聚事實看緊慢分布在八韻中如事多者須精擇其可用者用之可不用者棄之不必惑於多愛留之徒為纍耳如事少者須於合用者先占下别處要用不可那輟不賦中用事如天然全具對屬親確者固為上如長短不等對屬不的者須别自用其語而裁剪之不可全務古語而有疵病也賦中用事直須主客分明當取一君二民之義借如六字句中兩字最緊即須用四字為客兩字為主其為客者必須協順賓從成就其主使於句中煥然明白不可使主客紛然也賦中作用與雜文不同雜文則事詞在人意氣變化若作賦則惟貴鍊句之功鬬難鬬巧鬬新借如一事他人用之不過如此吾之所用則雖與衆同其語之巧迥與衆别然後為工也賦家句脈自與雜文不同雜文語句或長或短一在於人至於賦則一言一字必要聲律凡所言語須當用意屈折斫磨須令協於調格然後用之不協律義理雖是無益也凡賦句全藉牽合而成其初兩事甚不相侔以言貫穿之便可為吾所用此鍊句之工也今賦乃江左文章雕敝之餘風非漢賦之比也赤壁蘇軾前赤壁賦西望夏口東望武昌山川相繆鬱乎蒼蒼此非曹孟德之困於周郎者乎吳旦生曰東坡所賦赤壁乃黃州西下津江百步赤壁磯土人訛為赤鼻非故地也故東坡赤壁記云黃州守居之數百步為赤壁或言即周瑜破曹公處不知果是否蓋亦疑之矣按江夏辨疑云江漢之間赤壁有三一在江漢之側竟陵之東竟陵今復州一在齊安郡之步下齊安今黃州一在江夏西南二百里許今屬漢陽縣蓋郡之西南者正曹公所敗之地也赤壁山考云湖廣赤壁有五漢陽漢川黃州嘉魚江夏皆有之惟武昌嘉魚縣西南八十里大江濱北岸烏林南岸赤壁是也韻語陽秋云曹操入荆州孫權遣周瑜與劉備併力逆曹公遇於赤壁曹公軍馬燒溺死者甚衆蓋謂鄂州蒲圻縣赤壁也詩話類編云今嶽陽之下嘉魚之上有烏林赤壁蓋周瑜自武昌列艦風帆便順泝流而上遇戰於赤壁之間也杜牧有寄嶽州李使君詩烏林芳草逺赤壁健帆開此真敗魏軍之地也昵古録云董玄宰晚泊祭風臺即周郎赤壁在嘉魚縣南七十里雨過有箭鏃於沙渚間出里人拾鏃試之火能傷人是當時毒藥所造耳楊世昌蘇軾前赤壁賦客有吹洞簫者倚歌而和之吳旦生曰成化中吳原博詩西飛孤鶴記何詳有客吹簫楊世昌當日賦成誰與注數行石刻舊曽藏按圖繪寶録云道士楊世昌字子京武都山人與東坡遊善畫山水則赤壁所謂吹簫之客即其人也微原博詩誰復知世昌者栖鶻馮夷蘇軾後赤壁賦攀栖鶻之危巢俯馮夷之幽宫吳旦生曰東坡謫黃州五年每遊赤壁見巨鶻栖喬朩之上故云靖康初韓子蒼守黃因遊赤壁而鶻已亡作詩示何次仲云豈有危巢尚栖鶻亦無陳迹但飛鷗次仲和云二賦人間真吐鳳五年江上不驚鷗蟹當見水人猶怒鶻有危巢孰敢留蓋鶻一微族因人見重遂流連歌咏如此按山海經從極之淵惟氷夷恆都焉齊地記作水夷穆天子傳作無夷淮南子作馮遲太公金匱作馮修李善注思玄賦云河伯姓馮氏名夷浴於河中而溺死抱朴子云八月上庚日溺河龍魚河圖云河伯姓吕名公子夫人姓馮名夷唐有河侯新祠頌云河伯姓馮名夷字公子清冷傳云馮夷華隂潼鄉隄畔人也服八石得水仙是為河伯酉陽雜俎云河伯人面乘兩龍一曰氷夷一曰馮夷胡元瑞引竹書紀年洛伯用與河伯馮夷鬬遂以河伯為諸侯而馮夷非神鬼恐誤蓋洛伯亦洛水之神也楊升庵引洛神賦屏翳收風謂即馮夷余謂不然觀植賦云屏翳收風又植詰咎文云屏翳司風似以為風師耶韋昭以為雷師吕覽以為雲師然按屈原天問蓱號起雨注云蓱蓱翳雨師名蓱一作荓一作萍即屏翳也廣雅雨師謂之屏翳山海經屏翳在海東人謂之雨師虞喜志林雨師屏翳大象賦太白降神於屏翳注云其精降為雨師之神據此則為雨師無疑其與河伯有異矣况洛神賦云於是屏翳收風川后靜波馮夷鳴鼓女媧清歌此之所謂馮夷者余考漢郊祀歌馮夷切和注云馮夷水神命靈􅏲也説文􅏲鳴如鼓則是鳴者􅏲而命之者馮夷故曰馮夷鳴鼓也杜子美詩遂有馮夷來擊鼓用此然觀洛神賦中屏翳與馮夷並稱即不得一視之爾孤鶴蘇軾後赤壁賦適有孤鶴橫江東來翅如車輪玄裳縞衣戛然長鳴掠豫舟而西也須臾客去豫亦就睡夢二道士羽衣翩躚過臨臯之下揖豫而言曰赤壁之遊樂乎問其姓名俯而不答嗚呼噫嘻我知之矣疇昔之夜飛鳴而過我者非子也耶道士顧笑豫亦驚悟吳旦生曰詞人下筆最須照顧雖才大如海一指摘便覺礙眼如東坡此賦莽莽誦過何異村究獨漁隱叢話云初言適有孤鶴橫江東來中言夢二道士羽衣翩躚末言疇昔之夜飛鳴而過我者前後皆言孤鶴則道士不應言二矣余喜此言讀古細心宜陸逺為之閣筆吾僕蘇軾濁醪有妙理賦云濁者以飲吾僕清者以飲吾友吳旦生曰杜子美晦日詩濁醪有妙理庶用慰沈浮東坡因以為題按昔人自稱曰僕謂飲已以濁而飲友以清也或作奴僕之僕非無鄉黃庭堅畫枯朩道士賦懼夫子之獨立而矢來無鄉乃作女蘿施於朩末婆娑成隂與世宴息吳旦生曰韓非子矢來有鄉鄉方也有從來之方則積鐵以備一鄉謂聚鐵於身以備一處即甲之不全者矢來無鄉則為鐵室以盡備之謂甲之全者自首至足無不有鐵故曰鐵室備之則體無傷故彼以盡備之不傷此以盡敵之無姦也言君亦當盡備於臣皆所防疑則姦絶也按此山谷用事誠僻而非張子賢之達識亦安能破從來之疑乎靈棊朝補之求志賦訊黃石以吉凶兮棊十二而星羅吳旦生曰此謂靈棊經也異苑云十二棊卜出自張文成受法於黃石公行師用兵萬不失一東方朔密以占衆事此後祕而不傳晉法味道人遇一老公授此書遂復流傳瓜芋洪邁老圃賦織女耀而瓜薦大昂中而芋食吳旦生曰續漢書牽牛星主關梁織女主瓜果因觀荆楚嵗時記云七夕婦人結綵樓穿七孔針陳瓜果於庭中以乞巧有喜子網於瓜上則以為得天寶遺事云宫女以錦結成樓殿髙百尺陳以瓜果酒炙設坐具以祀牛女二星蓋以其主瓜果故所陳亦必是物也孝經援神契云仲冬昴星中收莒芋宋均云莒亦芋説文齊謂芋為莒豐城陸遊豐城劒賦吳亡而氣猶見其應晉室之南遷吳旦生曰雷次宗豫章記云吳未亡恆有紫氣見牛斗之間張華問之雷孔章曰是寶物也精在豫章豐城華遂以孔章為豐城令至縣掘得玉匣開之得二劍孔章留其一以一進華後華遇害劍飛入襄城水中孔章亡後其子為建安從事經淺瀨劍忽於腰間躍出遂見二龍相隨焉按孔章名煥乃次宗之族後來詞人往往用合劍故實相沿而不察困學紀聞引劉知幾所云莊子鮒魚之對賈生鵩鳥之辭施於寓言則可求諸實録則否而唐史官之撰晉史者取之後人因而言之誤矣顔師古注漢書凡撰述方志新異穿鑿者皆不録注史猶不取况作史乎歷代詩話卷二十
