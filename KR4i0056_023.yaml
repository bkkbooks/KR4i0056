body:
  text: 歴代詩話巻二十三歸安吳景旭撰丁集上之下古樂府聲辭楊升庵曰漢鐃歌十八曲古今樂録謂其聲辭相雜不復可分是也大字是辭細字是聲聲辭合寫故致然爾此說卓矣近世有好奇者擬之韻取不協字用難訓亦好古之弊胡元瑞曰鐃歌聲文相亂處誠有之然如妃呼豨收中吾之類亦不多見其他句字嵲屼自是一時體格如此觀繆襲韋昭所擬其時去漢不逺其體格大率相同即漢人本詞可知吳旦生曰漢時有鼓吹曲而短簫鐃歌其一章耳諸曲調皆有聲有辭故聲辭合寫此不易之論也按鐃歌之妃呼豨收中吾與他曲之羊吾夷伊那何之類乃遲其聲以送之耳夫被於歌聲而又譜以辭者殆所謂聲依永也後人擬之縦循厥本旨酷肖體裁而難協於律終是永依聲矣况復辭乖其旨背離寖失耶沈休文云樂人以音聲相傳詞詁不復可解正謂聲辭相雜而胡元瑞以嵲屼為體格非深於樂府者尤笑王弇州謂鐃歌十八中有難解及迫詰屈曲者如絲如魚乎悲矣堯羊蜚従王孫行之類或有缺文斷簡其誤處既不能曉佳處又不能識直以為不足觀曽解人而作是語也陸文裕公曰鄭漁仲謂樂以詩為本詩以聲為用又謂古之詩今之詞曲也若不能歌之但能誦其文而說其義可乎世儒義理之說日勝而聲歌之學日微馬貴與則謂義理布在方册聲則湮没無聞其言皆有見而朱文公亦謂聲氣之和有不可得聞者此讀詩之所以難也夫樂之義理詩詞是也聲歌猶後世之腔調也兩者俱詣乃為大成漁仲又謂樂之失自漢武始盖言亡其聲耳漢世樂府如朱鷺君馬黄雉子斑等曲其辭皆存而不可讀想當時自有節拍短長髙下故可合於律吕後來擬作者但詠其名物詞雖有倫恐非樂府之全也且唐世之樂章即今之律詩而李太白立進清平調與王維之陽闗曲於今皆在不知何以被之弦索宋之小詞今人亦不能歌矣今人能歌元曲南北詞皆有腔拍如月兒髙黄鶯兒之類亦有律呂可按一入於耳即能辨之恐後世一失其聲亦但咏月咏鶯而巳此樂之所以難也朱鷺樂府原題曰鷺惟白色漢有朱鷺之祥因而為詩梁元帝放生碑云𤣥龜夜夢終見取於宋王朱鷺晨飛尚張羅於漢后謂此也樂府解題曰此盖因飾皷以鷺而名曲焉吳旦生曰朱鷺者據樂志建皷殷所作棲鷺於其上取其聲揚或云鷺者皷之精故吳王啟地門以厭越越為雷門擊大皷於下而地門聞焉後移皷建康之端門有雙鷺出皷而飛乎雲末或云詩振振鷺鷺于飛皷咽咽古之君子悲周之衰頌聲息飾鼓以存鷺然此皆言鷺鳥也至宋何承天作朱路篇云朱路揚和鸞翠盖耀金華直稱為路車與漢曲異矣禽經云朱鳶不攫肉朱鷺不吞鯉梁簡文與劉孝儀令云鷁舟乍動朱鷺徐鳴詩義疏云楚威王時有朱鷺合沓飛翔而來舞雅荷朱鷺魚以烏鷺何食食茄下吳旦生曰烏字與雅同言朱鷺之威儀魚魚雅雅也說文茄芙蕖莖俗但借為蔬蓏名非本訓也爾雅荷芙蕖其莖茄其葉蕸其本蔤其華菡萏其實蓮其根藕其中菂菂中薏郭璞云蜀人以藕為茄張楫云茄音荷國風有蒲與荷樊光注爾雅引詩有蒲與茄揚雄反離騷云衿芰茄之緑衣注茄古荷字張衡西京賦蔕倒茄于藻井注茄藕莖也李白詩胡為啄我茄下之紫鱗金人蕭真卿採蓮曲云田田青茄荷艷艷紅芙蕖艾如張樂府原題曰温子昇辭云誰在閑門外羅家諸少年張機蓬艾側結網槿籬邊若能飛自勉豈為繒所纒黄雀儻為戒朱絲猶可延此艾如張之事也觀李賀詩有艾葉緑花誰翦刻中藏禍機不可測似翦艾葉為蔽張之具也吳旦生曰艾與刈同說文芟草也如讀為而猶春秋星隕如雨也故古辭艾而張羅其意盖謂刈而張羅也按穀梁傳艾蘭以為防置旃以為轅門謂因蒐狩以習武芟草以為田之大防是也若云張機蓬艾側是以艾為蓬艾恐失本意上之回樂府解題曰漢武帝元封初因至雍遂通回中道後數遊幸焉其歌稱帝遊石關望諸國皆美當時之事也吳旦生曰三輔黄圖云回中宫史記秦始皇二十七年巡隴西北地出笄頭過回中漢書文帝十四年十四萬騎入蕭闗殺都尉燒回中宫候騎至雍武帝元封四年冬行幸雍祠五畤通回中道遂北出蕭關歴獨鹿鳴澤又有三良宫相近上邪漢鐃歌上邪其辭曰上邪我欲與君相知吳旦生曰邪音移故邪與知叶何承天擬曲云上邪下難正悞作邪正之邪矣按尚書考靈耀云虚為秋候昴為冬期隂氣相佐德乃不邪又星名歸邪梅花落復齋謾録曰古曲有梅花落非謂吹笛則梅落詩人用事不悟其失耳漁隠樷話曰詩人因笛中有梅花落曲故言吹笛則梅落者甚衆若以為失則梅花落之曲何為笛中獨有之决不虛設也李白觀吹笛詩何人吹玉笛一半是秦聲十月吳山曉梅花落敬亭戎昱聞笛詩平明獨惆悵飛盡一庭梅崔櫓梅詩初開已入雕梁畫未落先愁玉笛吹黄庭堅侍兒詩催盡落梅春已半更吹三弄乞風光泛觀古人用事一律可見復齋之妄辯也吳旦生曰梅花落自是笛中曲當以胡苕溪之說為正唐大角曲亦有大梅花小梅花等曲是也按鮑明逺梅花落曲中云念其霜中能作花露中能作實盖就二句中上句花字與上之嗟字叶下句實字忽復折入與下之日質字叶奇變不測裲襠瑯琊王歌陽春二三月單衫綉裲璫吳旦生曰釋名衫芟也衫末無袖端也裲襠其一當胸其一當背也海篇作兩當王筠咏裁衣云裲襠雙心共一抹正謂此宋書薛安都脫兜鍪解所帶鎧惟著絳納兩襠衫馳入賊陣所向無當其鋒者齊書文宣郊天陽休之為驍騎將軍衣兩襠用手持白棓議者服其達曠企喻歌云齊著鐵裲襠乃馬上飾鞍之具朩蘭滄浪詩評曰朩蘭歌最古然朔氣傳金柝寒光照鐵衣之類已似太白必非漢魏人詩也隠居詩話曰木蘭詩有髙致世傳為曹子建作似矣然其中云可汗大㸃兵漢魏時未有可汗之名不知果誰詞也吳旦生曰王弇州謂不必用可汗為疑朔氣寒光致貶要其本色自是梁陳及唐人手段余觀其敘事布辭蒼拙近古决非唐手所及况魏太武時柔然已號可汗非始於唐也解者謂朩蘭朱氏女今黄州黄陂縣北七十里即隋朩蘭縣有朩蘭山將軍塜忠烈廟然據湧幢小品云隋煬帝時姓魏氏亳之譙人也従軍一紀閱十八戰除尚書不受歸而改粧以事聞帝奇之欲納諸宫中對曰臣無嫓君之禮以死誓拒廹不巳遂自盡追贈將軍謚孝烈立廟嵗以四月八日致祭盖其生辰云明駝酉陽雜俎曰朩蘭篇明駝千里脚多悞作鳴字駝卧腹不貼地屈足漏明則行千里吳旦生曰太真外傳上賜妃瑞龍腦十枚妃私發明駝使持三枚遺禄山明駝者腹下有毛夜能明日馳三百里楊升庵謂唐置驛有明駝使哥舒翰以白駝遞而耕餘博覽乃以明駝使為異人也恐悞漢書大月支出一封駞注脊上有一封李義山詩取酒一封駞歴代詩話巻二十三
