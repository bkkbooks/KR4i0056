body:
  text: 歷代詩話卷六十歸安吳景旭撰辛集下之上宋詩宅家唐子西內前行云宅家喜得調元手吳旦生曰唐宫中稱天子為宅家資暇集云至尊以天下為宅四海為家不敢斥呼故曰宅家亦猶陛下之義公主已下加子字呼為宅家子按通鑑韓建發兵圍十六宅諸王呼曰宅家救兒劉季述等至思政殿皇后趨拜曰軍容勿驚宅家蔣濟萬機論云五帝官天下故傳之賢三王家天下故傳之子今指天子為官家猶言帝王也杜鎬對太宗李仲容對真宗皆述此義水晶宫漁隱叢話曰吳興謂之水晶宮不載之於圖經但吳興集刺史楊次公九月十五夜絶句云江南地暖少嚴風九月炎涼正得中溪上玉樓樓上月清光合作水晶宫因此詩也吳旦生曰方輿勝覽載此為楊傑次公明月樓詩也薑堯章云吳興虢水晶宫荷花盛麗漁隱叢話載汪彥章自吳興移守臨川曽吉甫以詩迓之云白玉堂中曽草詔水晶宫裏近題詩以示韓子蒼子蒼為改兩字云白玉堂深曽草詔水晶宫冷近題詩蓋句中有眼也據此則水晶宫正指其自吳興移守耳詩人玉屑載此而芟去自吳興三字殆不知何指林子中聞滕元發知湖州詩欲識玉皇香案吏水晶宫裏謫仙人歐陽公詩吳興水晶宫樓閣在寒鑑三興居士詩三吳家近水晶宫行坐紅香緑影中陶南村題趙待制山水詩水晶宫裏清幽地不信無人著釣舟成原常送盛克明移家吳興詩辟掾逺移青瑣闥移家喜近水晶宫張翥陪吳興諸府公宴詩我亦玉堂揮翰手題詩合在水晶宫楊鐵崕詩湖州野客似玄真水晶宫中烏角巾陳熙文送周文煥之吳興詩事簡好將樵唱曲水晶宫裏坐吹笙鄭長卿題管夫人畫詩白鳯一雙何處下水晶宫裏赤闌橋魏仲房題趙松雪小像詩天潢玉樹漙華滋水晶宫小春遲遲輟耕録云趙松雪刻私印曰水晶宫道人周草窗戲以瑪瑙寺行者屬比之松雪遂不用此印贋本竹坡老人詩話曰楊次翁守丹陽米元章過郡留數日而去元章好易他人書畫次翁作羮以飯之曰今日為君作河豚其實他魚元章疑而不食次翁笑曰公可無疑此贋本耳其行送之以詩有淮海聲名二十秋之句林子中見之謂次翁曰公言無乃過歟次翁笑曰二十年來何處不知有米顛子耶吳旦生曰鵝酷似鴈而德不然故凡以偽亂真者曰鴈韓非子云齊伐魯索饞鼎魯人以其鴈往齊人曰鴈魯人曰真陸機云人莫分於真鴈韓愈詩居然見真鴈古乃以鴈為贋亦借用也今作贋宋華願兒稱廢帝為贋天子贋字始於此楊升菴謂梁書檄文濳窺鴈鼎疑用戰國䇿顔率求鼎難事又或用栁下惠岑鼎事升菴亦無確據乎廣韻及字書云贋五晏切注偽物也詩話類編云元章書畫竒絶從人借古本自臨拓臨竟併與臨本真本還其家家不能辨也以此得古人書畫甚多山谷嘗戲贈云滄江靜夜虹貫月定是米家書畫船元章嘗以九物換劉季孫子敬帖不獲其意歉然張藝叟詩云請君出竒帖與此九物并今日投汴水明日到滄溟亦可警膏肓於書畫者王直方詩話載東坡跋元章所收書畫云畫地為餅未必似要令癡兒出饞水又云錦囊玉軸來無趾山谷和之云百家傳本略相似如月行天見諸水又云拙者竊鈎輒折趾皆謂元章好奪取人書畫也潘邠老冷齋夜話曰黃州潘大臨工詩有佳句然貧甚東坡山谷尤喜之臨川謝無逸以書問近新作詩否潘答書曰秋來景物件件是詩思恨為俗氣所蔽翳昨日清卧聞攪林風雨聲遂起題壁曰滿城風雨近重陽忽催租人至令人敗思止此一句奉寄聞者莫不笑其迂濶吳旦生曰諷玩此書嵯峨瀟飋已無一字不是詩何必成篇王弇州謂境涉小佳大有可議則不復知有詩意矣詩説云詩之有思卒然遇之而莫遏有物敗之則失之矣故昔人言覃思垂思抒思之類皆欲其思之來而所謂亂思蕩思者言敗之易也鄭棨詩思在灞橋風雪中驢子上唐求詩所遊歷不出二百里則所謂思者豈尋常咫尺之間所能發哉花信風東臯雜録曰江南自初春至初夏五日一番風候謂之花信風梅花風最先楝花風最後凡二十四番以為寒絶也徐師川詩二十四番花信風吳旦生曰清波雜志亦言江南自初春至首夏有二十四番風信因引潘元質有捲簾試約東君問花信風來第幾番之句余以此與東臯雜録所謂初春初夏者皆記載之訛耳按師川詩所云二十四番者自小寒至穀雨也蠡海集云蓋自冬至後三候為小寒十二月之節氣月建於丑地之氣闢於丑天之氣會於子日月之運同在玄枵而臨黃鍾之位黃鍾為萬物之祖是故十一月天氣運於丑地氣臨於子陽律而施於上古之人所以為造厯之端十二月天氣運於子地氣臨於丑隂吕而應於下古之人所以為候氣之端是以有二十四番花信風之語也一月二氣六候自小寒至穀雨凡四月八氣二十四候每候五日以一花之風信應之世所言始於梅花終於楝花也小寒之一候梅花二候山茶三候水仙大寒之一候瑞香二候蘭花三候山礬立春之一候迎春二候櫻桃三候望春雨水之一候菜花二候杏花三候李花驚蟄之一候桃花二候棣棠三候薔薇春分之一候海棠二候梨花三候朩蘭清明之一候桐花二候麥花三候栁花穀雨之一候牡丹二候酴醿三候楝花花竟則立夏矣演繁露云風名花信似謂此風來報花之消息耳按吕氏春秋謂春之德風風不信則其花不成乃知花信風者風應花期其來有信也按師川諱俯忠愍公之子黃山谷其舅也故為豫章宗派圖中人其詩云一百五日寒食雨二十四番花信風焦氏筆乘引下句以為唐人詩元遺山中州集又謂金人張元石有此二句皆誤慈姥磯吕氏童蒙訓曰徐師川言作詩自立不可蹈襲前人因誦其所作慈母溪詩且言慈母溪與望夫山相對望夫山詩甚多而慈母溪古今無人題詩末兩句云離鸞只説閨中事舐犢那知母子情吳旦生曰三山采石相近處有名慈姥磯師川以為慈母溪則誤蓋姆從女傍與姥同然是山而非溪也陸放翁入蜀記云慈姥磯磯之尤巉絶峭立者徐師川謂詩人未嘗挂齒牙然梅聖俞護母喪歸宛陵發長蘆江口有詩云南國山川都不改傷心慈姥舊時磯師川偶忘之耳聖俞又有過慈姥磯下及慈姥山石崖上竹鞭詩皆極高竒與此山稱炙面韓子蒼題昭君圖詩寄語雙鬟負薪女炙面慎勿輕離家吳旦生曰子蒼敘昭君圖末云昭君南郡人今姊歸縣有昭君村村人生女必以艾灼其面慮以色選故也唐逸士傳云昭君村至今生女必炙其面白樂天詩至今村女面燒灼成瘢痕海録碎事云緑珠井在白州雙角山下耆老言汲此井者誕女必美有識者以美色無益於時以巨石鎮之雖産女端研者七竅四支多不完具竹尊者詩人玉屑載崇勝寺有竹千餘竿獨一根秀出人呼為竹尊者覺範為賦詩云高節長身老不枯平生風骨自清癯愛君修竹為尊者却笑寒松作大夫未見同參朩上座空餘聽法石於莬戲將秋色供齋鉢抹月批風得飽無黃山谷見之喜因手為書之以故名顯吳旦生曰山谷題竹尊者軒云平生脊骨硬如鐵聽風聽雨隨宜説百尺竿頭放步行更向腳跟參一節豈喜覺範句而亦作此耶覺範自記景德寺與謝無逸輩觀禪月所畫十八應供像而失第五軸有未知何處羅齋去不見雲堂第五尊之嘲何不以竹尊者補入而煩兵妻引歸壁間物耶一笑牆東硯北朝以道感事詩云干戈難作牆東客疾病猶存硯北身吳旦生曰後漢王應仲遭亂不仕隱牆東時人為之語云避世牆東王君公按逢萌傳王君公襘牛自隱注謂平會兩家賣買之傳陸放翁詩人怪羊裘忘富貴我從牛儈得賢豪漢上題襟集段成式書云杯宴之餘常居硯北又云長疏硯北天機素少又云筆下詞文硯北諸生蓋言几案面南人坐硯之北也余有贈友詩硯北停雲思碧樹窗西舊雨話黃梅婪露護霜周紫芝詩雨細方婪露雲疏欲護霜吳旦生曰吳中以八月露下而雨謂之婪露九月霜降而雲謂之護霜紫芝以方言入咏也陸放翁詩雲輕無力護清霜高季迪詩江雲薄護霜留青日札云天有雲則無霜名護霜天則誤矣冠帶鄧肅於徽宗朝獻十諷詩有云但願君王安百姓國中無日不春風吳旦生曰先是太學生無上詩者獻之自肅始靖康中公議讜言多出太學世稱為無官御史臺按肅字志宏别號栟櫚其風雅調笑又有足異者溪山餘話載朱章齋即晦菴父一日觴客栟櫚以冠帶寓之醉起韋齋曰留以質紙筆明日如約韋齋受筆還冠以紙少留帶栟櫚寄一詩曰歸帽納毫真得䇿索箋留帶計還疏公如買菜苦求益我已忘腰何用渠閉户羽衣聊自適推窗柿葉對人書帝都聲價君知否寄付新傳折檻朱前輩標致正自不羣也歷代詩話卷六十
