body:
  text: 歴代詩話巻二十七歸安吳景旭撰丁集下之下古樂府路傍兒張率走馬行云歛轡且歸去吾畏路傍兒吳旦生曰樂府集載張敞為京兆尹無威儀時罷朝㑹過走馬章臺街風俗曰殺君馬者路傍兒也言長吏馬肥觀者快之乗者喜其言驅馳不止至于死故曰吾畏路傍兒按崔豹古今注曰走馬引樗里牧恭所作也為父報怨殺人而亡匿於山之下有天馬夜降圍其室而鳴覺聞其聲以為吏追奔而亡去明旦視之乃天馬跡也因惕然大悟曰豈吾所處之將危乎遂荷糧而逃入于沂澤中援琴而鼓之為天馬之聲曰走馬引解題一曰天馬引大風唐溪詩話曰漢髙帝大風歌不事華藻而氣槩逺大真英主也至武帝秋風辭言固雄偉而終有感慨之意故其末年幾至於變魏武魏文父子横槊賦詩雖遒壯抑揚而乏帝王之度六朝以後人主言非不工而纎麗不逞無足言也吳旦生曰大風歌史記樂書謂之三侯章令沛得以四時歌舞宗廟盖欲使後之子孫知其祖創業之勤不可怠於守成爾索隠曰侯語辭也兮亦語辭也歌有三兮故曰三侯按兮侯古韻通據此則髙帝過沛時已有此歌惠帝二年命夏侯寛為樂府令而漢書云武帝立樂府後人遂謂樂府起於武帝非也蘇潁濱云髙帝豈以文字髙世者哉帝王之度固然發於其中而不自知也李白詩反之曰但歌大風雲飛揚安用猛士守四方其不識理如此香宇外集云彈鋏歌一句易水歌二句大風歌三句南風歌四句夏人歌五句扊扅歌六句夫歌以永言今只此數篇略略數句而聖賢王霸俠士婦人氣象自别又何必連篇累牘以辭相侈哉柏瓠子之歌云魚弗鬱兮柏冬日吳旦生曰柏與迫同按柏人城在順德府唐山縣漢髙過此欲宿心動問縣何名曰柏人髙祖曰柏人者迫於人也不宿而去瓠子注云水長涌溢穢濁不清故魚不樂又迫冬日將甚困也李夫人歌許彦周詩話作立而望之偏云此退之走馬來看立不正之所祖也吳旦生曰齊人少翁有神術能令武帝遙見好女如李夫人之貌還幄坐而步不得就視帝益悲感而作歌所以狀其髣髴據樂府古本作翩字合下姍姍仍得妙麗善舞之遺態原非偏而不正之謂况此歌乃之遲叶韻翩字應屬下句若屬上則不成句史記武帝本紀云上有所幸王夫人卒少翁以方術夜致王夫人貌又徐廣注封禪書謂外戚傳曰趙之王夫人則與李夫人異矣香囊繁欽定情篇香囊繫肘後焦仲卿妻古辭四角垂香囊吳旦生曰晉謝𤣥佩紫羅香囊謝安患之而不欲傷其意因戲賭取焚之按婦人之幃謂之縭即香囊也楚辭蘇糞壤以充幃王逸注幃謂之幐幐香囊也榝又欲充其佩幃注幃盛香之囊也說文幐本作幃韻㑹幐囊可帶者後漢儒林傳制為縢囊注即幐也南史麝幐注今之香袋雙鍼繁欽定情篇云何以結中心素縷連雙鍼吳旦生曰昔有姜氏與隣人文胄通殷勤文胄以百鍊水晶鍼一函遺姜氏姜氏啟履箱取連理線貫雙鍼結同心花以答之見謝氏詩源長楸曹植名都篇鬬雞東郊道走馬長楸間吳旦生曰選注古人種楸于道故曰長楸沈烱邊馬有歸心詩彌憶長楸道金鞍背落暉老杜玉腕騮詩頓驂飄赤汗跼蹐顧長楸東坡題牧馬圖詩至今霜蹄踏長楸山谷和詩長楸落日試天步皆原本陳思寒鼈楊升庵曰曹子建名都篇寒鼈炙熊膰此舊本也五臣妄改作炰鼈盖炰鼈膾鯉毛詩舊句淺識者孰不以為寒字誤而従炰字耶不思寒與炰字形相逺音呼又别何得誤至於此文選李善注云今之時餉謂之寒盖韓國饌用此法鹽鐵論羊淹雞寒崔駰傳亦有雞寒曹植文寒鶬蒸麑劉熙釋名寒雞為正古字寒與韓通也吳旦生曰改寒作炰五臣之陋不足攻矣第攷文選宋板善本李善注並無今之時餉謂之寒句據曹子建七啟云寒芳蓮之巢龜注謂今之􅙰寒也資暇集李氏云今之腊肉謂之寒今􅙰肉也廣韻云煮肉熟食曰􅙰或者時餉二字乃腊肉之譌而升庵好異一時悞録不遑致詳耳何元朗云升庵不當謂韓國饌法盖膾臇炙皆言烹飪不容寒獨稱地當是鼈與雞皆性寒易凍如今人言凍鼈雞凍是也若云韓鼈猶可通以雞寒為雞韓可乎余以元朗通士乃作此懘語按逸雅云韓羊韓兔韓雞本法出韓國所為也猶酒言宜城醪蒼梧清之屬也此證最確以寒訓凍可笑乗蹻曹子建升天行乗蹻追術士逺之蓬萊山吳旦生曰抱朴子乗蹻可以周流天下蹻道有三法一曰龍蹻二曰氣蹻三曰鹿盧蹻字學集要云蹻有五音音皎舉足加髙貌彊直貌武貌又音喬驕也慢也又音脚舉足行髙又與屩同履也又音噱驕甚井公王褎輕舉篇云誰能攬六博還當訪井公吳旦生曰楊升庵謂古樂府井公能六博玉女善投壺盖因井星形如博局而附㑹之亦詩人北斗挹酒漿之意也胡元瑞引穆天子傳第五巻紀王與隠士井公博三日不决一巻中凡兩見井公必當時有道之士致周穆以萬乗之尊屢從博戲亦奇矣王褎二語正用周穆訪隠士事若天上井星従何訪之庾信詩藏書凡幾代㸔博已千年圖經稱穆天子藏書於大酉山小酉山亦用周穆事也余觀神異經亦載井公事愈知元瑞之說較升庵為確樂府登名山行有藏書凡幾代看博巳經年為隋李巨仁作又升庵謂六博即骰子元瑞謂其時未有也余觀西京雜記云許博昌善陸博法用六箸以竹為之長六分王逸注楚辭云投六箸行六棊故為六博以箆簵作箸象牙為棊麗而且好也說文六箸十二棊也鮑宏博經云六博用十二棊分白黒各半擲之據此則曹植所云仙人攬六箸對博太山隅與其旨義悉合何得謂是骰子閶門樓陸機吳趨行云閶門何嵳峩飛閣跨通波重欒承游極逈軒啟曲阿吳旦生曰吳地記閶闔門者吳王闔閭所作也名為閶闔門髙樓閣道後従此出伐楚改曰破楚門故士衡云爾至宋淳熙間其閶門之舊樓三間猶存建炎兵火之後不復有矣蘇子美詩年華冉冉催人老雲物蕭蕭又變秋家在鳳凰山下住江山何事苦相留子美猶及見此樓也香王直方詩話云古辭云博山鑪中百和香鬱金蘓合及都梁又云􅉊毺􅂒􅚊五朩香迷迭艾蒳及都梁按廣志都梁香出交廣形如藿香迷迭出西域魏文帝有迷迭賦信乎不行一萬里不讀萬巻書不可讀老杜詩也漁隠樷語曰王直方何鹵莽如此方論古辭香事初不論杜詩遽有不行一萬里不讀萬巻書不可㸔杜詩之語野客樷書曰漁隠不深察耳直方盖謂大凡古詩中多有事蹟但人讀書不多見識不廣所以不知使不觀廣志等書孰知都梁等香事因悟所謂不行一萬里不讀萬巻書不可看杜詩之語為信然漁隠自鹵莽如此反謂直方鹵莽其可笑也迷迭賦如曹植王粲應瑒陳琳之徒皆有是作不但文帝一人而巳故梁元帝志蕭琛曰迷迭成章江總表曰迷迭之文云云吳旦生曰此吳均行路難之語也數香皆非僻産何足聚訟按史記武帝元朔二年封長沙定王子遂為都梁侯水經注云都梁縣有小山山有渟水其中悉生蘭草緑葉紫莖芳風藻川蘭馨逺馥俗呼蘭為都梁山因以號縣受名焉荆州記云蘭草名都梁香形如藿香廣志云都梁香出交廣亦名煎澤草按魏畧云鬱金生大秦國二三月花如紅藍四五月採之其香十二葉為百草之英埤雅鬱之為草若蘭說文鬱芳草也十葉為貫百廿貫築以煮之為鬱漢制攷云鬱鬯百草之華逺方鬱人所貢芳草合釀之以降神鬱今鬱林郡也觀禮以鬯草生庭為瑞則鬱本逺方所貢粧樓記云染婦人衣最鮮明然不耐日炙染成衣則微有鬱金之氣按南史云大秦國出蘇合香是諸香汁煎之非自然一物也又大秦人采蘇合先笮其汁以為香膏乃賣其滓夢溪筆談云今之蘇合香如堅朩赤色又有蘇合油如􅤽膠今多用此為蘇合香考劉夢得傳信方云皮薄子如金色按之即小放之即起良久不定如蟲動裂者佳據此則酉陽雜俎謂獅子糞固非即陶隠居所稱色如紫檀重如石燒之灰白者亦未真也黄姑古辭東飛伯勞西飛燕黄姑織女時相見吳旦生曰張平子天象賦河鼔集軍以嘈雜囋張茂先李淳風等注云河鼓三星在牽牛星北主軍鼓盖天子三軍之象淮南子所謂烏鵲填河成橋而渡織女俗傳七夕牛女相過者此也海録碎事云楚人呼牽牛星為檐鼓爾雅云何鼓謂之牽牛何荷也亦檐義也荆楚嵗時記云河鼔黄姑牽牛也皆語之轉若李後主詩迢迢牽牛星杳在河之陽粲粲黄姑女耿耿遙相望則誤認黄姑為織女矣李太白詩黄姑與織女相去不盈尺然以星厯攷之牽牛去織女隔銀河七十二度古詩所謂盈盈一水間黙黙不得語安得謂不盈尺耶焦林大斗記云天河之西有星煌煌與參俱出謂之牽牛天河之東有星微微在氐之下謂之織女春秋斗運樞云牽牛神名石氏星經云牽牛名天闗佐助期云織女神名收隂史記天官書云織女是天帝外孫漢書天文志云天之貞女至於道書云牽牛娶織女取天帝錢二萬備禮久而不還被驅在營室劉子儀詩天帝聘錢還得否而盧仝有癡牛騃女之句亦誣甚矣容齋隨筆云蒼梧王當七夕令楊玉夫伺織女渡河曰見當報我不見當殺汝蒼梧荒悖小兒不足笑梁劉孝儀詩欲待黄昏至含嬌淺渡河唐人七夕詩皆有此說自是牽俗遣詞之過按天上經星終古不動安有所謂渡河之理故老杜有詩云牽牛出河西織女處其東萬古永相望七夕誰見同神光竟難候此事終䝉朧其識非他人比也厮養卒楊升庵樂府序曰觀樂府有邯鄲才人嫁為厮養卒婦篇特亡其辭亦失其解及考史記張耳傳洎楚漢春秋并云趙王武臣為燕軍所獲囚於燕獄先後使者往請輒為燕所殺趙有厮養卒謝其舍中曰吾將載趙王歸舍中人笑之乃走燕壁以利害說燕將燕以為然乃歸趙王厮養卒御王以歸武臣歸趙以美人妻養卒以報之是其事也吳旦生曰李蓘謂張耳傳祗云厮養卒並無才人嫁為婦語曷以知所嫁者即此卒耶陳耀文謂此事史漢并同注中俱無楚漢春秋字余按古辭巳亡謝朓所作但言自宫閣而出徒増悲羞亦不及武臣陷燕意也然據升庵引張耳傳洎楚漢春秋明是兩種書陳晦伯謂注中無楚漢春秋字是不細看升庵一洎字也升庵淹博必見楚漢春秋有此語因合張耳傳而並舉之以立此說張耳傳趙有厮養卒蘇林注云厮取薪者也養養人者也盖厮主樵蘓養主烹飪此通鑑所謂竈下養中郎將也本皆賤者之事田子藝謂厮養卒當為厮扈卒按左傳厮役扈養注養馬者曰扈炊烹者曰養則扈别是一役矣愛妾換馬樂府解題曰舊說淮南王所作淮南王即漢劉安也古辭今不傳吳旦生曰中唐張祜作此題二律亦引樂府解題自注其下然觀魏任城王曹彰性倜儻見駿馬愛之其主所惜也彰曰予有美妾可換惟君所選馬主因指一妓彰遂換之馬號白鶻後因獵獻於文帝竊以任城之說較淮南為可據宋人詩話乃以鮑生出四絃換韋生紫叱撥為證余按唐李玖異聞實録云鮑以女伎善四絃者換韋紫叱撥㑹飲未終有二人造席適聞以妾換馬可作題共聫賦否一曰香暖深閨未厭夭桃之色風清廣陌曽憐噴玉之聲一曰香散緑騣意已忘於鬢髮汗流紅額愛無異於凝脂客自稱江淹謝莊也則是開成以後事引此較淮南更悞流蘇徐陵雜曲云流蘇錦帳挂香囊織成羅幌隠燈光吳旦生曰流蘇者乃盤線繡繪之毬五色錯為之同心而下垂所謂雜綵為同心垂垂若流蘇也前漢禮樂志薛瓉注作流遡周禮金鐲節鼓鄭𤣥注云後世合宫懸用之而有流蘇之飾盖古者樂器之飾而後世用為幃帳之懸自晉以後始也又析羽曰流蘇摰虞云緝鳥尾垂之若流然以其蕊下垂故曰蘇今之旌竿上綴旒也又晉書割流蘇為馬帴南都賦駙承華之蒲梢飛流蘇之騷殺注蒲梢汗血馬也言取華廏蒲梢之馬而以流蘇五采為馬飾也騷殺飄揚貌又石頭百姓歌云庾公還揚州白馬牽流蘇焦仲卿妻云躑躅青驄馬流蘇金鏤鞍則不止幃帳間所懸而且飾旌又飾馬矣昔昔鹽貴耳集曰薛道衡空梁落燕泥之句詩名昔昔鹽十韻樂苑以為羽調曲𤣥怪録載籧篨三娘唱阿鵲鹽又有突厥鹽黄帝鹽白鴿鹽神雀鹽疎勒鹽滿座鹽歸國鹽唐詩媚賴吳娘唱是鹽更奏新聲刮骨鹽謂之鹽者吟行曲引之類樂府解題謂之杖鼔曲也吳旦生曰楊升庵謂梁樂府夜夜曲或名昔昔鹽昔即夜也引列子昔昔夢為國君證之余觀海録碎事云十四昔十四夕也信其說為最確升庵别本乃引戴記示之禽而鹽諸利注與艷同使歆艷也鹽者艷之轉聲也此語殊誤余且以他曲例之如禰衡鼓歌云邊城晏開漁陽摻黄塵蕭蕭白日暗吳淑改摻字為操徐鍇曰摻音七鑒反皷曲也以其三撾故因謂之摻又如韓臯皷廣陵散其說謂母丘儉諸葛誕刺揚州舉兵討晉不成而散於廣陵耳劉道原謂漢魏時揚州治夀春儉誕皆死夀春至隋唐廣陵始為揚州而散平聲是琴曲名如操弄摻淡序引之類然則鹽與摻散皆是曲之别名也唐詩紀事云施肩吾詩顛狂楚客歌成雪媚賴吳娘笑是鹽盖闗中人謂好為鹽也皇甫百泉云昔昔鹽亦此意也樂府有魏俞吳俞劍俞矛俞弩俞俞善也元遺山詩鹽紅忘後顧黧黒見前驅按此鹽字作去聲蕋女樂府解題曰桓帝初京都童謠云車班班入河間者言桓帝將崩乗輿班班入河間迎靈帝也河間姹女工數錢者靈帝既立其母永樂太后好聚金錢也吳旦生曰以姹女指太后此說大謬及觀善本乃作蕋女按闗尹子嬰兒蕋女謂未破𤓰時也本草荳蔻含胎之語出此留青日扎云月運紅潮取以入藥則名紅鉛女子十四而天癸發取其初發之中有一粒如小荳者色微黄即所謂黄花也盖黄花之義亦従蕋字生雞鳴歌東方欲明星爛爛汝南晨雞登壇喚吳旦生曰徐陵烏棲曲惟憎無賴汝南雞天河未落猶争啼野客樷書引李賀詩雄雞一聲天下白温飛卿詩碧樹一聲天下曉謂出於古之雞鳴歌汝南晨雞登壇喚月没星稀天下旦據此則直謂是雞鳴矣漢舊儀云汝南出長鳴鷄余竊以為皆謬也按漢時於汝南取能雞鳴歌之人耳樂府廣題云漢有雞鳴衛士主鷄唱宫外漢書云髙祖圍項羽垓下羽是夜聞漢軍四面皆楚歌應劭注楚歌者鷄鳴歌也窮袴守宫樂辭云愛惜加窮袴防閑託守宫吳旦生曰僧惠洪於客邸破篋中見詩編皆晉簡文時名公卿而樂府有此二語按說文袴脛衣也釋名袴跨也兩股各跨别也方言齊魯之間謂之䙭或謂之襱關西謂之袴大袴謂之倒頓小袴謂之䘨楚通語也又袴謂留幕冀州所名又新羅國謂袴曰柯半而窮袴之義何居西漢上官后傳宫人使令皆為窮袴多其帶服䖍注云窮袴有前後襠不得交通也師古注即今之裩襠袴也則知古人袴皆無襠女人用襠者其制起自上官后為霍光外孫欲擅寵而使宫人為之今則男女皆服之矣楊升庵云裩三代不見所述周文王所製裩長至膝謂之弊衣賤人不下服曰良衣盖良人之服也至魏文帝賜宫人緋交襠即今之裩方言秦晉西夏謂之守宫或謂之蠦􅨦或謂之蜤易其在澤中者謂之易蜴南楚謂之蛇醫或謂之蠑螈東齊海岱謂之螔䗔北燕謂之祝蜒桂林之中守宫大者而能鳴謂之蛤解博物志云蜥蜴或名蝘蜓以器養之食以朱砂體盡赤所食滿七斤搗萬杵㸃女人支體終身不滅惟房室事則滅故號守宫傳云東方朔奏漢武試之有驗誠齋雜記云秦始皇時有人進守宫謂能典鑰人不敢竊發又謂置於宫中宫人之有異志者即吐血汚其衣此二說與博物志異景泰中湯公讓守宫詩誰解秦宫一粒丹記時容易守時難鴛鴦夢冷腸堪斷蜥蜴魂銷血未乾榴子色分金釧曉茜花光映玉鞲寒何時試拭香羅袖笑語東君仔細看劉欽謨曰此何減李商隠灧澦歌蜀中詩話曰梁簡文灔澦歌灧澦大如馬瞿塘不可下金沙浮轉多桂浦忌經過鄭樵云天下水之險者惟蜀之瞿塘百粤之桂浦此歌言行瞿塘者準灧澦行桂浦者準金沙也楊用修以為商估刺水行舟歌非簡文之作俗本改桂浦作桂楫尤非按灧澦一作滛預一作猶豫載各不同吳旦生曰鄭樵樂府原題載其辭云滛預大如服瞿唐不可觸金沙浮轉多桂浦忌經過此舟人商客刺水行舟之歌亦非簡文所作也蜀江有瞿唐之患桂江有江浦之難故過瞿塘者則准灧澦涉桂浦者則准金沙又有灧豫如馬瞿唐莫下灧豫如象瞿唐莫上之語是單言瞿唐也據此則曹能始所載之歌馬下叶者與樂府本辭異是悞以如馬如象之語入灔豫金沙之歌矣况行舟之歌非簡文作此即鄭樵語也乃於引據鄭樵之後另標用修云云是但見用修詩話謂屬其語不知用修往往採古人之言而述其善者能始實未攷鄭樵全本也三峽歌云巴東三峽巫峽長猿鳴三聲淚沾裳復齋以為峽州行者歌而漁隠據為簡文作亦悞也水經注謂是漁者歌樂府解題云瞿盛也唐陂池也言盛水其中可以行舟也又云夏則為瞿冬則為唐水經注灧澦堆在䕫州府城西有孤石冬出水二十餘丈夏即没益州記又曰猶預言舟子取途不决水脈故猶預也類要云滛預大如鼈瞿塘行舟絶滛預大如龜瞿塘不可窺南史灧澦如牛一作襆本不通瞿塘水退為庾公李太白詩五月不可觸猿鳴天上哀杜子美詩沈牛答雲雨如馬戒舟航歴代詩話巻二十七
