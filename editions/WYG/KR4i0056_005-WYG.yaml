body:
  text: 歴代詩話巻五歸安呉景旭撰甲集下之上三百篇藎臣王之藎臣呉旦生曰爾雅藎進也揚子太𤣥云雉之不祿而雞藎穀亦訓進余按藎草名所以染朱者則藎臣亦取其忠赤之義元稹詩顧我無衣搜藎篋亦是一朱篋云耳今本妄改作畫篋可笑本草唐注云藎草生平澤溪澗之側荆襄人鬻以染黄色極鮮好業簴業維樅呉旦生曰逸雅簴上之版曰業刻為牙捷業如鋸齒也說文業大版也所以飾縣鐘鼓捷業如鋸齒以白畫之象其鉏鋙相承也其說皆與毛氏同趙凡夫云詩有兢兢業業借戒慎貌又四牡業業漢傳解髙大也業當是古承簡册之器故藏書曰業架韓氏謂鄴侯家多藏書故得名未必也辟廱胡氏管見曰靈臺詩所謂於樂辟廱言鳥獸昆蟲各得其所鼓鐘簴業莫不均調於此所論之事惟鼓鐘而已於此所樂之徳惟辟廱而已辟君也雍和也文王有聲所謂鎬京辟廱義亦若此而已且靈臺之詩叙臺池苑囿與民同樂故以矇瞍奏公終之何為勦入學校之可樂與鐘鼓諧韻而成文哉文王有聲止於繼武功作豐邑築城池建垣翰以成京師亦無縁遽及學校之役上章曰皇王維辟下章曰鎬京辟廱則知辟之為君無疑也呉旦生曰說者皆言辟與璧通廱澤也水旋丘如璧以節觀者故曰璧廱然古無辟廱之名其說見於王制云辟廱為天子學名泮宫為諸侯學名王制乃漢文帝時儒家所作至今猶以辟作璧為圓水之形皆漢儒為之也後之識者起而駁之謂與學校無預其見最超按莊子言歴代樂名曰文王有辟雍書大傳樂云舟張辟雍說文云廦牆也廱天子享宴廦廱也鄭氏云辟雍及三靈謂靈臺靈囿靈沼皆同處在郊魯詩解云辟雍太王宫名也各有可據尤不若胡致堂以辟為君葢人君有和徳則天地之和應之而天下之心服之也詞義正大當令漢儒語塞鼉鼓鼉鼓逢逢侯鯖錄曰集韻鱓音鮀魚也皮可冒鼓今多以鼉鼓使鼉字非也此水蟲耳呉旦生曰說文長箋鱓訓皮可冒鼓而古今但言鼉鼓不言鱓鼓當是二字本一而二蟲大小強弱判别古今異用矣然余觀周禮王會江鱓大龜王㑹又云㑹稽以􅥜乃作􅥜字夏小正二月剝鱓以之為鼓勾踐歸國求得古皇之驥湘沅之鱓李斯上始皇書樹靈鱓之鼔太史公叙傳斷髪文身黿鱓與處王褒九懷鯨鱓兮幽潛蜀都賦感鱓魚動侯則似二字通用故鱓字直作鼉字也埤雅鼉鼓非特有取於皮亦其鼓聲逢逢然象鼉之鳴故謂之鼉鼓也晉安海物記曰鼉宵鳴如桴鼔今江淮之間謂鼉鳴為鼉鼓亦或謂鼉更更則以善夜鳴其數應更故也一名鱓呉越謂之鱓更葢如初更輒一鳴而止二即再鳴也長箋又云今鰌鰻之類稱鱓魚其脩握尺無可鼓之義葢借名也方言改作鱔或謂就烹時母鱓匊躬䕶子其慈仁足感人為善故从善會意兼聲寓敎也抱朴子云荇莖苓根土龍之屬化而為鱓有黄白二種白鱓出交趾亦音善山海經云求如之山滑水出焉其中多滑魚其狀如鱓注鱓魚似蛇音善本草作鮀陶隠居云鮀即今鼉也皮可以冒鼓抌舀或舂或揄或簸或蹂呉旦生曰王伯厚謂董氏引韓詩或舂或抌說文作或簸或舀姚令威謂注云揄抒米以出臼也箋云舂而抒出之周官舂人女舂二人鄭注云抌抒臼也詩曰或舂或抌音由又音榆或羊笑反揄時女反據許叔重說文揄引也羊朱切抒把也神與切舀抒臼也从爪臼引詩曰或簸或舀又作抗􅀈音以治切又集韻抌舀揄並音由又抗舀音以紹切縁詩揄與舀並音由義亦同故後人改舀為蹂也音以沼者乃今人以手舀物之舀也蘊隆蘊隆蟲蟲呉旦生曰荀子富國篇夏不宛暍冬不凍寒注宛讀曰蘊暑氣也家語富有天下而無宛財禮記事大積焉而不宛古蘊宛通埤雅云蘊蘊而暑隆隆而雷蟲蟲而熱也說者以為隆隆而雷非雨雷也王伯厚詩攷鬱隆烔烔徒東切又作爞爞申甫維申及甫維周之翰呉旦生曰書吕刑孔氏注吕侯後為甫侯故或稱甫刑朱氏曰甫即吕也國語史伯曰當成周者南有申吕又富辰曰齊許申吕由大姜左傳楚子重請取於申吕以為賞田申公巫臣曰不可此申吕所以邑也於是為賦以御北方若取之是無申吕也故平王以申近楚遣畿内之民戍之甫以申故而并戍之後竟為楚所滅而楚始強據此則申甫之地為形勢控扼之要所以為周室之屏翰也按漢地理志南陽郡宛縣故申伯國括地志云故申城在鄧州南陽縣北三十里故吕城在鄧州南陽縣西四十里吕氏春秋吕在宛縣西伯夷主四嶽之祀水經注亦謂宛西吕城四嶽受封然則申吕漢之宛縣也高帝與楚相持常出武闗收兵宛葉間光武起南陽以宛首事其形勢可概見矣李忠定曰天下形勢闗中為上襄鄧次之郡國志汝南新蔡有大吕亭故吕侯國輿地廣記蔡州新蔡縣古吕國今以左傳攷之楚有申吕時新蔡屬蔡非楚邑子重不當請為賞田宜以在宛縣為正仲山甫衮職有闕維仲山甫補之呉旦生曰國語所載立魯公子戲則仲山甫諫之料民太原則仲山甫諫之所以稱補闕也當時惟虢文公諫不籍千畝而他無聞焉此詩人有愛莫助之歎按國語云樊仲山父是為樊國之君也父與甫同權徳輿集云魯獻公仲子曰山甫入輔於周食采於樊王伯厚云仲山甫猶儀禮所謂伯某甫也據此則仲是其行山甫其字也觀後漢志陽樊攢茅田服䖍注云楚仲山所居楊修答臨淄侯牋云仲山周旦之儔張無盡和山字詩云安得將相似仲山葢詩文亦有稱仲山者兹維昔之富不如時維今之疚不如兹呉旦生曰一云昔時之富今年之疚此倒字句葢古人以兹為年也吕氏春秋今兹美禾來兹美麥詳其語意是謂今年熟來年又熟不與此詩適相反乎左傳今兹注云此嵗古詩十九首有云為樂當及時誰能待來兹亦謂來年歷代詩話巻五
