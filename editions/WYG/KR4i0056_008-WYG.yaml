  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0056_WYG_008-1a, image: WYG1483/WYG1483-0059a.png}
body:
  text: 歴代詩話巻八歸安吳景旭撰乙集上之下楚辭九歌西溪樷語曰九歌章句名曰九而載十一篇何也曰九以數名之如七啟七發非以其章名吳旦生曰舊注楚國南郢之邑沅湘之間其俗信鬼而好祀作歌樂鼓舞以樂諸神原以其詞鄙陋為作九歌之曲王逸謂屈子特修祭以宴天神二説皆非詳其㫖趣直是楚國祀典如漢人樂府之類而原更定之也其篇目有東皇太乙雲中君湘君湘夫人大司命小司命東君河伯山鬼國殤禮魂共十一篇梁昭明以大司命東君河伯國殤禮魂不入選或云國殤禮魂不在數故曰九歌或云大司命與小司命合為一體禮魂則諸篇之亂辭故曰九歌洪興祖云九歌十一首九章九首皆以九為名者取簫韶九成啟九辯九歌之義騷經曰奏九歌而舞韶兮聊假日以媮樂即其義也宋玉九辯以下皆出於此張銳云九者陽數之極自謂否極取為歌名也九辯舊注云九者陽之數道之綱紀也故天有九星以正璣衡地有九州以成萬邦人有九竅以通精明諸說紛紛余獨喜楊升庵之言云九歌乃十一篇九辯亦十篇宋人不曉古人虚用九字之義强合九辯二章為一章以協九數兹大可笑如公羊傳云葵丘之㑹桓公震而矜之叛者九國九國謂叛者多非實有九國也猶漢紀云叛者九起云爾古人言數之多止於九逸周書云左儒九諫于王孫武子善攻者動于九天之上蹉對九歌蕙肴蒸兮蘭藉奠桂酒兮椒漿吳旦生曰當以蒸蕙肴對奠桂酒今倒用之謂之蹉對蹉音千古反按史記封禪書率邇逖聽漢書嚴安書馳車轂擊韓退之羅池神碑春與猿吟兮秋鶴與飛此皆楚辭吉日辰良句法盖欲錯綜成文則語勢矯健耳然觀論語迅雷風烈必變已有此格非始於楚辭也藝苑雌黄云冷齋夜話載王介甫詩春殘葉密花枝少睡起茶多酒盞疎多字當作親盖欲以少對密以疎對親殊不曉古人詩格盖以密字對疎字以多字對少字正交股用之所謂蹉對法也偃蹇九歌靈偃蹇兮姣服吳旦生曰王逸注偃蹇舞貌言巫之舉足奮袂而舞也按離騷望瑤臺之偃蹇兮注髙貌何瓊佩之偃蹇兮注衆盛貌則一楚辭中而二字異義如此又觀左傳哀公二年彼皆偃蹇將棄子之命注偃蹇驕慢貌則又一義矣猋九歌猋逺舉兮雲中吳旦生曰朱子辯證猋說文従三犬而釋為羣犬走貌然大人賦有猋風涌而雲浮者其字従三大盖别一字也此類皆當従三火余觀世本皆作焱諸注焱卑遙反去疾貌王逸注言神之徃來急疾焱然逺舉復還其處也按焱讀為艷火焰也恐非既音卑遙反而訓去疾當従猋字為是爾雅焚輪謂之積頽同扶搖謂之猋標注云穨暴風従上下也猋暴風従下上也杜若九歌采芳洲兮杜若吳旦生曰謝𤣥暉詩芳洲采杜若盖用此語而勝韻不減本辭乃古人筆妙也本草經云杜若一名杜蘅范子計然云杜若生南郡漢中按唐貞觀中尚藥求杜若勑下度支省郎判送坊州貢之本州曹官判云坊州不出杜若應讀謝脁詩悞郎官如此判事豈不畏二十八宿笑人耶晉書天文志郎位十五星在帝座東北依烏郎府是也州曹徒知郎官上應列宿而不知非二十八宿也朱子注杜若葉似姜而有文理味辛按即今之髙良姜也本草圖經云杜若苗似山薑花黄赤子赤色大如辣子中似豆蔻出峽山嶺南北正是髙良薑其子乃紅蔻也本草經杜若一名杜蘅一名土鹵按杜蘅爾雅所謂土鹵也杜若廣雅所謂楚蘅也其類自别瑤華九歌折疎麻兮瑤華將以遺兮離居吳旦生曰韻語陽秋瑤華謂麻之華白也詩載朩桃朩李握椒芍藥之類皆相贈問之物所謂疎麻者所以贈問離居也謝靈運南樓遲客詩云瑤華未堪折蘭苕已屢摘路阻莫贈問何以慰離析越嶺溪行云握蘭徒勤摘折麻心莫展駱賓王思家詩云旅行悲泛梗離恨斷疎麻錢起題輞川詩云折麻定延竚乗月期相尋皆用楚辭意用於離居至於起贈趙給事詩乃云不惜瑤華報朩桃則是以瑤華為玉悞矣楊升庵云楚辭注以疎麻即麻也近見南越志載疎麻大二圍髙數丈四時結實無衰落則自有此一種朩也幼艾九歌竦長劒兮擁幼艾吳旦生曰王逸注幼少也艾長也言執長劒以誅凶惡擁䕶萬民少長各得其命也文選五臣注亦主此解又見昔人謂孟子人少則慕父母知好色則慕少艾當讀多少之少謂人既知好色則慕父母之心少艾艾言息也按此二說皆作耆艾之義然余意擁少艾者總是托巫者之口以寓神靈忽怳之辭當作少美二字看戰國策不以予工乃與幼艾注引孟氏慕少艾之語齊王有七孺子注云孺子謂幼艾美女也說文竦敬也从立从束束自申束也箋云九歌竦字當用立部竦義稍近之通作慫非是簫鐘九歌縆瑟兮交鼓簫鐘兮瑤簴吳旦生曰朱子集注謂周禮有鐘笙之樂注云與鐘聲相應之笙則簫鐘與簫聲相應之鐘歟然昔洪慶善注楚辭至此篇引儀禮鄉飲酒章間歌魚麗笙由庚歌南有嘉魚笙崇丘為比云簫鐘者取二樂聲之相應者互奏之既鏤板置於墳庵一蜀客過而見之曰一本簫作㩋廣韻訓為擊也盖是擊鐘正與縆瑟為對耳慶善謝而亟改之南浦九歌子交手兮東行送美人兮南浦吳旦生曰江夏記南浦在江夏縣南三里其源出京首山流入大江春冬涸竭秋夏泛漲商旅往來皆於浦停泊以其在郭之南故稱南浦江淹别賦送君南浦傷如之何李賀詩南浦芙蓉影愁紅獨自垂洪興祖云屈原有以美人喻君者恐美人之遲暮是也有喻美人者滿堂兮美人是也有自喻者送美人兮南浦是也又云屈原托江海之神送迎已者言時人之不然也杜詩岸花飛送客檣燕語留人亦此意媵九歌魚鱗鱗兮媵予楊升庵曰江海間有魚遊必三如媵隨妻先一後二人號為婢妾魚唐詩江魚羣従稱妻妾塞雁聨行號弟兄古者一國嫁女同姓二國媵之儀禮有媵爵謂先飲一爵後二爵従之也吳旦生曰詞人率多影畧字升庵鑿鑿引據便多事如比目曰鰈比翼曰鶼比肩曰蟨義形配偶取其意可也鱗鱗媵予魚之取象於人也貫魚以寵人之取象於魚也其義一也惡得泥迹以求之哉按焦氏筆乗云媵說文送也史載湯壻有莘以伊尹為媵送女故稱有莘媵臣爾雅亦云媵將送也即不指為妾今考魯共姬嫁於宋而衛齊晉三國來媵傳云媵賤事也諸侯有三歸嫡夫人行則姪娣従二國來媵亦姪娣従凡一娶九女所以廣繼嗣三國來媵非禮也遂以為従嫁之女夫共姬雖賢其肯以姪娣為妾乎如傳之言則伊尹為媵亦謂之妾可乎江有汜詩注因以為美媵釋名又以姪娣曰媵謂媵承也承事適也今二品曰姬五品曰媵三國之於共姬可若是擬乎容齋三筆云周易咸卦象曰咸其輔頰舌滕口說也釋文云滕達也九家皆作乗而鄭康成虞翻作媵而亦訓為送䑕璞云媵特送㛰之名猶喪之賵與賻野客樷書云詩求爾新特由不以禮嫁故父母之家男子婦女皆無肯媵之獨自而來故謂之新特元吳立夫詩一雙赤鯉媵來多正得其義述異記云和州歴陽淪為湖中有奴魚婢魚緑珠傳云大荒山上有池池中有婢妾魚爾雅魚婢小魚也亦曰妾魚古今注云江東呼青衣魚為婢􅀈朱少章詩穴邊酣戰君臣蟻波上羣嬉婢妾魚皆不可强據以証媵字薜茘山鬼篇被薜茘兮帶女蘿吳旦生曰字學薜茘香草也王逸注薜茘無根縁物而生按思美人云令薜茘以為理兮憚舉趾而縁朩是屈子自下注脚矣山海經小華之山其草多草茘即薜茘也楊升庵謂據本草絡石也在石曰石鱗在地曰地錦繞樷木曰長春藤又曰龍鱗薜茘又曰扶芳藤今京師人家假山上種巴山虎是也又曰凡木蔓生皆曰薜茘齊書隠逸傳該討芝桂借訪薜蘿宜笑山鬼曰既含睇兮又宜笑子慕予兮善窈窕吳旦生曰莊子西施捧心而嚬隣人效之皆棄而走宋玉神女賦頩薄怒以自持兮曽不可乎犯干按頩音疋零反歛容怒色也則美人之容不獨宜笑而又宜嚬又宜怒耶葩九歌傳葩兮代舞吳旦生曰王逸解香草而改作芭讀作巴音義全乖葩華也从艸皅普巴切亦作苩按草華之白曰葩鳥羽之白曰㿥詩白鳥鶴鶴景福殿賦㿥㿥白鳥音義同日光之白曰皜月光之白曰皎霜雪之白曰皚男子之白曰晢女子之白曰皉詩皉兮皉兮老人之白曰皤歴代詩話巻八
