body:
  text: 歴代詩話巻七歸安吳景旭撰乙集上之上楚辭評騷劉勰曰自風雅寢聲莫或抽緒奇文蔚起其離騷哉固已軒翥詩人之後奮飛辭家之前豈去聖之未逺而楚人之多才乎昔漢武愛騷而淮南作傳以為國風好色而不淫小雅怨誹而不亂若離騷者可謂兼之蟬蛻穢濁之中浮游塵埃之外皭然涅而不淄雖與日月爭光可也班固以為露才揚已忿懟沈江羿澆二姚與左氏不合崑崙懸圃非經義所載然而文辭麗雅為詞賦之宗雖非明哲可謂妙才王逸以為詩人之提耳屈原婉順離騷之文依經立義駟虬乗鷖則時乗六龍崑崙流沙則禹貢敷土名儒詞賦莫不擬其儀表所謂金相玉質百世無匹者也及漢宣嗟嘆以為皆合經術揚雄諷味亦言體同詩雅四家舉以方經而孟堅謂不合傳褒貶任聲抑揚過實可謂鑒而弗精翫而未覈者也將覈其論必徵言焉故其陳堯舜之耿介稱禹湯之祗敬典誥之體也譏桀紂之猖披傷羿澆之顛隕規諷之㫖也虬龍以喻君子雲蜺以譬讒邪比興之義也每一顧而淹涕歎君門之九重忠怨之辭也觀兹四事同於風雅者也至於託雲龍說迂怪豐隆求宓妃鴆鳥媒娀女詭異之辭也康回傾地夷羿蔽日一夫九首土伯三足譎怪之談也依彭咸之遺則従子胥以自適狷狹之志也士女雜坐亂而不分指以為樂娛酒不廢沈湎日夜舉以為懽荒淫之意也摘此四事異乎經典者也故論其典誥則如彼語其夸誕則如此固知楚辭者體憲於三代而風雅於戰國乃雅頌之博徒而辭賦之英傑也觀其骨鯁所樹肌膚所附雖取鎔經意亦自鑄偉辭故騷經九章朗麗以哀志九歌九辯綺靡以傷情逺遊天問瓌詭而惠巧招魂招隠耀艷而深華卜居標放言之致漁父寄獨往之才故能氣往轢古辭來切今驚采絶艷難與並能矣自九懐以下遽躡其跡而屈宋逸步莫之能追故其叙情怨則鬱伊而易感述離居則愴怏而難懐論山水則循聲而得貌言節候則披文而見時枚賈追風以入麗馬揚沿波而得奇其衣被詞人非一代也故才髙者菀其鴻裁中巧者獵其艷詞吟諷者銜其山川童䝉者拾其香草若能憑軾以倚雅頌懸轡以馭楚篇酌奇而不失其貞翫華而不墜其實則顧盼可以驅辭力欬唾可以窮文致亦不復乞靈於長卿假寵於子淵矣洪興祖曰藝文志云屈原賦二十五篇然則自騷經至漁父皆賦也後之作者茍得其一體可以名家矣而梁蕭統作文選自騷經卜居漁父之外九歌去其五九章去其八然司馬相如大人賦率用逺遊之語史記屈原傳獨載懐沙之賦揚雄作伴牢愁亦旁惜誦至懐沙統所去取未必當也自漢以來靡麗之賦勸百而諷一無復惻隠古詩之義故子雲有曲終奏雅之譏而統乃以屈子與後世詞人同日而論其識如此則其文可知矣朱熹曰楚辭寓情草朩託意男女以極游觀之適者變風之流也其叙事陳情感今懐古以不忘乎君臣之義者變雅之流也至於語冥昬而越禮攄怨憤而失中則又風雅之再變矣其語祀神歌舞之盛則幾乎頌而其變也又有甚焉其為賦則如騷經首章之云也比則香草惡物之類也興則託物興辭初不取義如九歌沅芷澧蘭以興思公子而未敢言之屬也然詩之興多而比賦少騷則興少而比賦多要必辨此而後詞義可尋讀者不可以不察也祝堯曰騷者詩之變也詩無楚風楚乃有騷何耶愚按屈原為騷時江漢皆楚地盖自文王之化行乎南國漢廣江有汜諸詩已列於二南十五國風之先其民被先王之澤也深風雅既變而楚狂鳳兮之歌滄浪孺子清兮濁兮之歌莫不發乎情止乎禮義而猶有詩人之六義故動吾夫子之聽但其歌稍變於詩之本體又以兮為讀楚聲萌蘖久矣原最後出本詩之義以為騷但世號楚辭初不正名曰賦然賦之義實居多焉自漢以來賦家體製大抵皆祖原意故能賦者要當熟復於此以求古詩所賦之本義則情形於辭而其意思髙逺辭合於理而其㫖趣深長成周先王二南之遺風可以復見於今矣吳旦生曰比於乾卦禹貢方之南董比興猶云似也中壘尊之為經而世直稱騷經謂招字以錫號或作志以程篇猶云始也荆溪言昭明文選不併歸賦門而别名為騷後人沿以騷稱不知題義以余論之此正所謂揚之過實抑之損真者矣經之後賦之先天地間忽出此一種文字自是别具一體以騷命之可也而牽文之見必起而問曰史記離騷者猶離憂也言憂愁幽思冀幸君之一悟也王逸序離别也騷愁也言已放逐離别中心愁思以諷諫君也說文騷擾也言憂煩擾也解者紛更奚以名篇余以所釋雖殊總覽斯文風格鑿空不經人道自應别名一體以騷命之可也經者常也賦者鋪也夫既命之矣即後之擬騷騷也反騷亦騷也皆以騷命之可也一體也困學紀聞云楚語伍舉曰德義不行則邇者騷離而逺者距違注騷愁也離畔也伍舉所謂騷離屈平所謂離騷皆楚語也揚雄為畔牢愁與楚語注合庚寅離騷帝髙陽之苗裔兮朕皇考曰伯庸攝提貞于孟陬兮惟庚寅吾以降王逸注皇美也言我父體有美德以忠輔楚世有令名以及於己寅為陽正故男始生而立於寅庚為隂正故女始生而立於庚言已以太嵗在寅正月始春庚寅之日下母之體而生得隂陽之正中也吳旦生曰癸辛雜識皇祖皇考者按詩思皇多士詩記引顔注漢書云美也皇􅇥就章為顔注云正也大也泰誓我皇多有之孔傳訓皇為前趙南塘云此訓為是皇不仕者乃故不仕也嬾真子云皇覽揆予所謂皇者三閭稱其父也後人遂以皇覽為進御之書悞矣正月始春厥日庚寅盖木德王於春令稟氣之正因名正則此所謂揆予而錫予也名字離騷皇覽揆予于初度兮肇錫予以嘉名名予曰正則兮字予曰靈均王逸注言正平可法則者莫過於天養物均調者莫神於地髙平曰原故名為平以法天字為原以法地吳旦生曰五臣注正則猶云原也靈均猶云平也舊注以平為名原為字與前引自詆誤然則王叔師謂名平法天字原法地誤矣聽雨紀談云古之人有小名有小字盖屈原字平而正則靈均則其小名小字也理差勝戈莊樂參疑云名在庚韻均在真韻舊本皆不注叶音考之真庚韻又無古叶按道藏歌云𤣥廷自嘉㑹金書東華名賢安密所戒相期陽洛汧名彌延切汧苦堅切韓愈東野夫子詩問天主下人薄厚胡不均天曰天地人由來不相闗均居員切闗圭𤣥切俱入先韻江離秋蘭離騷扈江離與辟芷兮紉秋蘭以為佩吳旦生曰宋板作離今作蘺王逸注但謂江離辟芷香草名困學紀聞云江離吳録謂臨海水中生正青似亂髮廣志為赤葉紅花今芎藭苗曰江離緑葉白花又不同藥對以為麋蕪一名江離按芎藭藁本江離麋蕪並相似非是一物也淮南子云亂人者若芎藭與藁本顔師古云江離似水薺今無識之者然非麋蕪也藥對悞耳古今注謂芍藥可離唐本草可離江離然則芍藥江離也傳曰德芬芳者佩蘭古之佩者各象其德故芬芳者佩蘭也邵伯温云細葉者春花花少濶葉者秋花花多周益公云予問園丁則曰春蘭夏芷秋蕙冬蓀葉莖花色往往多寡不同予以古書考之屈原離騷紉秋蘭以為佩張衡東京賦秋蘭被涯又思𤣥賦幽蘭可喻潘尼贈河陽詩流聲秋蘭之類言蘭以秋而花也屈原九歌春蘭秋菊隋陽烟花録用此句陸機庭中奇樹詩勸友蘭時往注春時也梁元帝詩春蘭本無絶唐太宗詩春暉開紫苑淑氣媚蘭湯之類此言蘭以春而花也宋玉招魂光風轉蕙汜崇蘭抱朴子春惠秋蘭陸機悲歌行春芳傷客心蕙草饒淑景是蕙亦可言春矣本草圖經蕙七月中旬開花至香是蕙亦可言秋矣故離騷曰蘭芷變而不芳荃蕙化而為茅說文荃蓀同音文選以蓀壁為荃壁盖合四者而言之湘君歌亦云薜荔柏兮蕙綢荃橈兮蘭旌湘夫人則並言蓀壁蘭橑蕙穆芷葺司馬相如長門賦摶芬若以為枕席荃蘭而茝香乃知四時香草同出異名葉常青而花隨時自屈宋至漢唐皆於蘭蕙互言春秋園丁未為無據離騷有春蘭秋蘭石蘭王逸注皆曰香草不分别也本草又有澤蘭如薄荷微香荆湘嶺南家多種之與蘭草大抵相類師古以蘭為澤蘭非也劉次莊云九歌秋蘭兮青青緑葉兮紫莖今沅澧所生花在春則黄在秋則紫然春黄不若秋紫之芬馥也楊升庵云人家盆植如蒲萱者乃蘭之别種曰蓀與芷耳惟緑葉紫莖春華秋馥則楚騷所稱紉佩之蘭也宿莽離騷朝搴阰之朩蘭兮夕攬中洲之宿莽吳旦生曰王叔師注宿莽遇冬不枯屈原以喻讒人雖欲困已已受天性終不可變易也余按南越志云寧鄉縣草名巻施拔心不死江淮間謂之宿莽郭璞賛云巻施之草拔心不死屈平嘉之諷詠以比取類雖邇興有逺㫖李詩云長短春草緑縁階如有情巻施心獨苦抽却死還生睹物知妾意希君種後庭謝翺云非宿草也先路離騷來吾道夫先路吳旦生曰王逸注路道也為君導入聖王之道也此屬强解按先路車名郊特牲先路三就左傳鄭賜子展先路子産次路蘭蕙離騷予既滋蘭之九畹兮又樹蕙之百畆吳旦生曰山谷謂蘭似君子蕙似士大夫盖山林中千蕙而一蘭也觀楚辭知不獨今為然楚人賤蕙而貴蘭亦久矣蘭蕙叢生初不殊也至其發花一幹一花而香有餘者蘭也一幹五七花而香不足者蕙也蕙雖不若蘭其視椒榝則逺矣困學紀聞云夾漈草朩畧以蘭蕙為一物皆今之零陵香也然離騷滋蘭樹蕙招魂轉蕙汜蘭是為二草不可合為一謝翺以蕙即薰草亦悞北夢瑣言云凡地十二畆曰畹九畹一百零八畆也蘭臯椒丘離騷步余馬於蘭臯兮馳椒丘且焉止息吳旦生曰朱子集註澤曲曰臯其中有蘭故曰蘭臯余觀蜀都賦蘭臯臯澤也故知澤曲為臯所謂蘭者特美言之也曹植應詔詩夕宿蘭渚顔延之曲水詩幙帷蘭甸又蘭野茂荑英其義同朱子集註丘上有椒故曰椒丘余觀廣雅云土髙四墮曰椒字學集要云山顛曰椒淮南注云山頂曰冢亦曰顛亦曰俶一作嶕椒乃嶕字之假借漢武帝李夫人賦釋輿馬於山椒謝靈運北固詩稅鑾登山椒謝惠連泛湖詩悲猨響山椒海氓呼海中石亦曰椒初服離騷進不入以離尤兮退將復修吾初服吳旦生曰昔人謂離騷搆法全亂不可謂似亂非亂王弇州亦謂騷辭所以總雜重複興寄不一者大抵忠臣怨夫惻怛深至不暇致詮亦故亂其叙使同聲者自尋修郄者難摘耳余獨謂其搆法極整如一服字該下衣裳冠佩諸項而佩繽紛其繁飾兮一佩字又總上衣裳冠佩而言此極有結搆文字何曽亂也初服未仕之時李太白詩久辭榮禄遂初衣即初服也女嬃離騷女嬃之嬋媛兮申申其詈予注云女嬃屈原之姊吳旦生曰賈侍中說楚人謂姊為嬃非也彼以髙陽之苗裔伯庸之皇考其家世何等也名曰正則字曰靈均盖其筆錫誠嘉而女嬃之所詈者乃以判獨離為其病豈賢姊哉水經注原有賢姊聞原放逐來歸諭令自寛夫諭令自寛之人而反申申詈之耶則女嬃之决非原姊矣按易經歸妹以嬃本義云須女之賤者天官書須女四星陸震云織女三星貴須女賤盖須即嬃字集解亦云嬃者賤妾之稱比黨人也彼薋菉葹即其朋耳今秭歸縣有女嬃廟又荆州圖經云南北岸者屈原之鄉里原忽然歸因名南岸曰歸鄉岸姊聞原還亦來歸又名北岸曰姊歸岸皆曲說也至於九歌女嬋媛兮為余太息王逸注亦云女謂女嬃屈原姊使其易行隨俗也更悞相羊離騷折若朩以拂日兮聊須臾以相羊吳旦生曰須㬰一作逍遙而相羊即徜徉之義逺遊云聊仿佯而逍遙同此意也選注謂相羊猶徘徊即上下求索之意非行樂也恐非悼李夫人賦惟幼眇之相羊馮衍賦乗翠雲而相羊一作相佯玉篇作穰徉周禮作相翔吳王濞傳作方洋郊祀歌作常羊老子指歸作常翔張衡賦作儴佯王勃賦作尚羊御離騷吾令鳳凰飛騰兮又繼之以日夜飄風屯其相離兮帥雲霓而來御吳旦生曰王逸注御迎也當音迓儀禮媵御沃盥交公羊傳眇者御眇者跛者御跛者列子御而行之大雅刑于寡妻至于兄弟以御于家邦閶闔離騷吾令帝閽開闗兮倚閶闔而望予吳旦生曰淮南子排閶闔瀹天門注云閶闔始升天之門也天門上帝所居紫微宫門也張淵觀象賦儼閶闔以洞開注云宫牆兩藩正南開如門象者名閶闔門張衡賦呌帝閽使闢扉兮覿天皇於瓊宫漢郊祀歌天門開詄蕩蕩天馬歌游閶闔觀玉臺注云上帝所居天中記云楚人名門皆曰閶闔潘岳賦夢良人兮來遊若閶闔兮洞開爾雅闔謂之扉左傳以枚數闔公羊傳齒著于門闔荀子外闔不閉月令乃修闔扇注云治門戸用朩曰闔用竹筆曰扇或謂雙曰闔闔門也單曰扇扇戸也又月令仲春修闔扇孟冬修鍵閉服度云闔扇所以開鍵閉所以塞閶闔一作閶􅱩儀禮又作㧁筳篿離騷索瓊茅以筳篿兮命靈氛為余占之吳旦生曰王逸注瓊茅靈草筳小折竹也楚人名結草折竹以卜曰篿因考趙古則云束草折竹達厶於神曰叀从屮厶中象纒束之形古作但象束艸形通用専作篿非篿俗字也叀音専說文小謹也从幺省屮財夢溪筆談云審方面勢覆量髙深逺近算家謂之叀術叀文象形如繩朩所用墨㪷也方技傳梃専須㬰孤虚之術蘭椒朱子辯證曰此辭之例以香草比君子王逸之言是矣然屈子以世亂俗衰人多變節故自前章蘭芷不芳之後乃更歎其化為惡物至於此章遂深責椒蘭之不可恃以為誅首而揭車江離亦以次而書罪焉盖其所感益以深矣初非以為實有是人而以椒蘭為名字者也而史遷作屈原傳乃有令尹子蘭之說班氏古今人物表又有令尹子椒之名既因此章之語而失之使此詞首尾横斷意思不活王逸因之又訛以為司馬子蘭大夫子椒而不復記其香草臭物之論流誤千載遂無一人覺其非者甚可嘆也使其果然則又當有子車子離子榝不知其幾人矣吳旦生曰蘭棄美以従俗盖指楚懐王之弟司馬子蘭也椒専佞以干進盖指楚大夫子椒也王逸注有此意而朱子非之何耶按韓退之逰湘西寺詩靜思屈原沈逺憶賈誼貶椒蘭爭妬忌絳灌共讒諂則蘭椒之指二人明矣近張伯起謂蘭椒指二人則揭車江離誰指此祖朱子之說也余竊以此其自况故下云兹佩可貴而前言委厥美乃其自棄後言委厥美乃王棄之耳歴代詩話巻七
