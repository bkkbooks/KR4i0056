body:
  text: 歴代詩話巻七十歸安吳景旭撰壬後集下之上元詩鐵史曹石倉曰亷夫樂府原編十六巻今只存四巻又門人顧亮所編詠史不在此内又抄本者亦係詠史詩也先生詩集多係其門人吳復所編先生自以為古樂府辭世人罕習善和予者惟五峰李季和而已季和死命吳復録季和死後凡若干首至其墓焚之則先生之與季和自相期許可知矣晚年門人章琬復輯其後所製者二百首與吳復所編三百首名曰鐵雅蓋先生詠史詩名曰鐵史而鐵崖其所居山名也少年過太湖得鏌鎁煉為鐵笛又嘗自稱為鐵笛道人云吳旦生曰張伯雨謂善用吳才老韻書以古語駕馭之李季和楊亷夫遂稱作者章楓山謂亷夫與季和相倡和為漢魏樂府辭直欲度越齊梁而上薄騷雅又亷夫自言用三體詠史用七言絶句體者三百首古樂府體者二百首古樂府小絶句體者四十首絶句人易到吾門章朩能之古樂府不易到吾門張憲能之至小樂府二三子不能惟吾能之故五峰李著作推為咏史上手余觀其氷稜魁崛之氣不自掩抑上下千百年發而為詠史樂府諸篇章髙自期待而又得季和左右之誠杰搆也王弇州謂雜以斷案何元朗謂非正脈李西涯謂恃才縱筆不能合度皆未知亷夫者按亷夫又有鐵龍精鐵仙鐵龍仙伯老鐵之稱卞宜之作鐵笛詩寄之云一叚清氷百鍊鋼曽翻宫徵事虚皇裂開黃鶴磯頭石驚落青鸞鏡裏霜仙子佩環新樂府翰林風月舊文章道人清節磨礱乆却笑桓伊獨據床又楊孟載有詩名亷夫戲以所號鐵笛為題使其賦之孟載效老鐵體呈歌云鐵崖道人吹鐵笛宫徵含嚼太古音一聲吹破混沌竅一聲吹破天地心一聲吹開虎豹闥彤庭跪獻丹扆箴問君何以得此曲妙諧律吕何以召陽而呼隂都將春秋一百二十四年筆削手譜成透天之竅價重雙南金亷夫注春秋一本名透天闗掉頭玉署不肯入直入弁峰絶頂俯瞰東溟深王綱正統著髙論唾彼傳僻兼書淫時人不識我不厭㑹有使者徵球琳具區下浸三萬六千頃之白銀浪洞庭上立七十二朶之青瑶岑莫邪老鐵作龍吼丹山鳳舞江蛟吟朂哉宗彦吾所欽赤泉之盟猶可尋更吹一聲振我清白祖大鳴盛世載賡阜財解愠南風琴陳眉公云鐵笛今在張仲仁處聞其色有緑羽損而多坎吹之不能成聲矣素雲楊亷夫詩椰漿半斗破明月鐵笛一聲停素雲吳旦生曰仲瑛與亷夫飲侍姬素雲行椰子酒今人以椰子漿為椰子酒而不知椰子花可以釀酒殷堯封詩椰花為好酒誰伴醉如泥海録碎事云椰子為越王頭亷夫乘興奏鐵龍之笛仲瑛口占云鐵笛一聲停素雲亷夫遂足成之仲瑛次韻云并刀落手碎玉斗椰蜜分香屬紫雲倪元鎮寄亷夫詩彈琴吹鐵笛中有古衣巾亷夫寄元鎮詩祇佗山下問幽居新長青松七八株見說近前丞相怒歸來自寫草堂圖亦足見兩人之標興矣余尤愛建文時龔大章一聨云好事主人金粟老能文館客鐵龍仙二子平生能以健筆括盡蘇談云阿瑛好事而能文當時楊亷夫鄭明德張伯雨倪元鎮皆其往還客也尤宻者為秦約于立釋良琦有二妓曰小瓊花南枝秀毎㑹必在焉余因按玉山詩序有侍姫小瓊英調筝即其人也詩云金杯素手玉嬋娟照見青天月子圓銀筝彈盡鴛鴦曲都在秋風十四絃讀之風流欲溯詩話類編云亷夫晚寓松江優㳺光景殆二十年姬妾十數人曰桃葉曰柳枝曰璚華曰翠羽年既八十精力不衰璚華尚有弄璋弄瓦之喜客有小海生者賀之為江山風月福人貌亷夫像而賦詩其上曰二十四考中書令二百六字太師銜不如八字神仙福風月湖山一擔擔天年只至九十九好景常如三月三小素小蠻休比似桃根桃葉尚宜男亷夫和之曰紅兜羅巾白㲲衫金鑾致仕得頭銜家無撲滿從誰破世有鐵枷人自擔黃白未嘗傳八八龍蛇奚用辨三三人間黃閣在平地付與西京妾一男亷夫云有才力者韻愈險句愈竒二詩全不為險韻所縛所謂縳虎手也按至正戊子二月十九日玉山雅集張渥用李龍眠白描體作圖亷夫為之記云冠鹿皮衣紫綺坐案而伸巻者鐵笛道人㑹稽楊維楨也執笛而侍者姫為翡翠屏也琴書左右捉玉麈從容而色笑者即玉山主者也姫之侍為天香秀也美衣巾束帶而立頥指僕從治酒者玉山之子元臣也奉肴核者丁香秀也持觴而聽令者小瓊英也不屈南濠詩話曰張士誠據吳中東南名士多往依之不可致者楊亷夫一人一日聞其來吳使人要於路亷夫乃至賔賢館時元主方以龍衣御酒賜士誠喜亷夫至即飲以御酒亷夫作詩云江南嵗嵗烽烟起海上年年御酒來如此烽烟如此酒老夫懐抱㡬時開士誠知不可屈吳旦生曰亷夫髙狷性成晚年益縱詩酒用自晦耳洪武二年遣詹同文趣召亷夫作老客婦謡上之同文為作老客婦傳其自為詩云皇帝書徵老秀才秀才懶下讀書臺宋潛溪送以詩云不受君王五色詔白衣宣至白衣還藝苑巵言云髙皇徵脩元史亷夫不屈乃放之歸時危太樸為𢎞文館學士上一日聞履聲問為誰太樸率然曰老臣危素上不懌曰吾以為文天祥耶謫佃臨濠死人以定楊危之優劣菽園雜記云髙皇厭危素自稱老臣令余闕廟燒香蓋余危皆元臣余為元死節故以愧之閒中今古録云太祖設宴使元時舊象舞象伏不起殺之次日作二朩牌一書危不如象一書素不如象掛於危素兩肩聽雨紀談云唐宋人無有書進士於官銜之上者建元猶然獨楊亷夫當元世之季書李黼榜進士至用刻之印章蓋黼死節之臣亷夫書之者欲自附於忠節之後其意固有在也枝山前聞云今士庶所戴方頂大巾相傳太祖召亷夫戴此以見上問所戴何巾亷夫對曰四方平定巾上恱遂令士庶依其製戴胭脂井楊亷夫為賦胭脂井詞云昨夜韓擒虎金陵奏凱回井中人不死重帶美人來吳旦生曰隋克䑓城後主投井中軍人窺井呼不應欲下石乃聞呌聲以繩引之頗訝其重乃與張貴妃孔貴嬪同束而上此杜牧所謂三人出眢井也按井在金陵法寳寺有石欄紅痕若臙脂相傳後主與張孔淚痕所染故名胭脂井石欄上刻後主事迹八分書乃大厯中張著文又有篆書戒哉戒哉數字寺即景陽宫故地也故井在焉後人又名為辱井宫人斜亷夫樂府又賦胭脂井云井中人不殉死宫人斜在雷塘址吳旦生曰春明退朝録唐内人墓謂之宫人斜秦京雜記長安舊牆外長三里曰宫人斜風雨夜多聞歌哭聲雍裕之詩㡬多紅粉委黃泥野鳥如歌又似啼應有春魂化為燕年年飛入未央棲據此則唐時事也按廣輿記隋煬帝葬宫人處名玉鈎斜在江都治之西則亷夫何不指玉鈎斜于雷塘較合石婦亷夫作石婦操其引曰石婦即望夫石在處有之不必問其主名也為補入琴操云峩峩孤竹岡上有石魯魯山夫折山華嵗嵗山頭歌石婦行人㡬時歸東海頭有時聚行人歸啼石柱石婦岑岑化黃土吳旦生曰後山詩話望夫石在處有之古今詩人共用一律惟劉夢得云望來已是㡬千嵗只似當年初望時語雖拙而意工黃叔達魯直之弟也以顧况為第一云山頭日日風和雨行人歸來石應語語意皆工江南有望夫石毎過其下不風即雨疑况得句處也復齋漫録云王建集載望夫石詩望夫處江悠悠化為石不回頭山頭日日風和雨行人歸來石應語乃知非顧况作漁隠樷話云荆公選唐百家詩亦以此詩列建集中事物攷云昔人有逺戍其婦山頭望之化為石其母為餅將以為餉使其子偵之恐其焦不可食也往已無及矣因化此鳥但呼婆餅焦也今江淮有之梅聖俞作禽言詩云婆餅焦兒不食爾父向何之爾母山頭化為石山頭化石可奈何遂作微禽啼不息羊車楊亷夫和薩天錫宫詞云簷前不挿鹽枝竹卧聽金羊引小車吳旦生曰通鑑正史皆言晉武帝平吳後頗事逰幸宫中乘羊車任所適幸之宫人競以鹽汁灑地竹葉挿户欲引羊以希幸亷夫正咏其事也李君實謂羊性狠劣不能駕車考隋輿服志羊車晉司𨽻校尉劉毅奏置蓋䕶軍羊琇私乘者也其制如軺車金寳飾紫錦幰朱絲網馭童二十人皆兩鬟髻服青衣取年十四五者謂之羊車小史駕以果下馬其大如羊帝之所乘實此車也挿竹灑鹽殊為附㑹按王伯厚漢制攷云羊車注羊善也善車若今定張車疏謂漢世去今乆逺未知定張車將何所用但知在宫内所用故差小為之謂之羊車也釋名云羊祥也祥善也善飾之車今犢車是也據此則宫内用羊車其制已古而晉武乘以荒逰為失其初耳竊以此義較君實為確警枕楊亷夫作警枕辭云不睡龍醒復醒珊瑚圎朩揺金鈴吳旦生曰吳越志載錢王鏐自少在軍中夜未嘗寐倦極則就圓朩小枕或枕大鈴寐熟輙欹而寤曰警枕因名不睡龍故亷夫咏之按禮記注穎警枕也刀之在手謂之穎禾之秀穂亦謂之穎枕之警動亦謂之穎困學紀聞引作熲謂之熲者熲然警悟也蔡邕警枕銘云應龍蟠蟄潛徳保靈制器象物示有其形哲人降靈居安慮傾范淳甫記司馬君實以圓朩為警枕少睡則枕轉而覺乃起讀書鞋盃雲林遺事曰楊亷夫耽好聲色一日與元鎮㑹飲友人家亷夫脫妓鞋置酒盃其中使坐客傳飲名曰鞋盃元鎮素有潔疾見之大怒翻案而起連呼齷齪而去吳旦生曰瞿宗吉年十四見亷夫香奩八題即席倚和亷夫因以鞋盃命題宗吉作沁園春云笑書生量窄愛渠儘小主人情重酌我休遲亷夫大喜即命侍妓歌以行酒人何元朗遇王弇州夜集元朗袖中偶帶王賽玉鞋一隻出以行酒弇州作長歌有云手持此物行客酒欲客齒頰生蓮花元朗為之歎賞然攷前此已有之墨莊漫録載王深詩云時時行地羅裙掩雙手更擎春㶑灧傍人都道不須辭儘做十分能㡬㸃春柔淺醮蒲萄暖和笑勸人教引滿路塵忽浥不勝嬌剗蹈金蓮行欵欵凸凹楊亷夫作内人剖𤓰詞云玉郎渇甚索相嘲可忍食殘團月凹吳旦生曰韓退之雪詩凹中初蓋底凸處遂成堆歐陽永叔古瓦研歌誰使鐫鑱凸與凹能盡二字之理楊升菴謂土窪曰凹土髙曰凸古之象形字也周伯温乃云凹當作㘭凸當作垤俗作凸凹非是反以古字為俗字也東方朔神異經云大荒石湖千里無凸凹平滿無髙下畫記云張僧繇畫一乘寺壁逺望如凹凸近視則平遂呼為凹凸寺一云尉遲乙善繪凹凸花升菴又云䆟突即凹凸此二字出蒼頡篇極古陳恕仁云經史直音䆟音渇合也突音亦穴也蝶裙楊亷夫作續奩集其於學書有云新詞未上鴛鴦扇醉墨先汚蛺蝶裙吳旦生曰唐闕史云京兆韋進士納洛妓五年而卒有言嵩山任處士有返魂之術韋求見之任云須得一經衣之衣以導其魂韋搜得一裙之金縷者任為致之無異平生韋為詩云惆悵金泥簇蝶裙春來猶得伴行雲陸魯望有金縷裙記酉陽雜俎云秀才顧非熊少時嘗見鬱棲中壊緑裙幅旋化為蝶埤雅云朽朩化為蟬壊裙化為蝶腐菌化為蜂射鴨楊亷夫題繆佚寫林塘圖云清流帶古郭中有射鴨堂吳旦生曰常熟繆貞為江浙掾史其子佚讀書能畫故亷夫詩先美貞以及佚也按孟郊為溧陽尉開射鴨堂葢性喜射鴨為樂有不如竹枝弓射鴨無是非之句東坡題縣尉水亭詩已作觀魚檻還開射鴨堂又讀孟郊詩云桃弓射鴨罷獨速短蓑舞麒麟楦楊亷夫詩不才何用麒麟楦吳旦生曰楦許怨切朝野僉載云楊炯毎見朝官目為麒麟楦言其無徳而衣朱紫也陸放翁詩殘骸皆作麒麟楦舊友仍非處士牙審雨堂楊亷夫詩王侯螘穴一夢覺歸作槐隂審雨堂吳旦生曰窮神秘苑云元魏時盧汾嘗叩樹有一女子衣青出引汾入見㕔堂危豁有堂題曰審雨堂葢古槐中蟻穴也范石湖詩垤鳴東山鸛堂審南柯蟻邏檀楊亷夫琵琶怨云蜀絲鴛鴦織錦縚邏檀鳳凰斷金槽吳旦生曰譚賔録開元中有中官白季貞自蜀使回得琵琶以獻其槽以邏逤檀為之温潤如玉光耀可鑒有金縷紅紋蹙成雙鳳楊妃毎抱是琵琶奏於梨園而諸王貴主自虢國已下競為貴妃琵琶弟子毎受曲畢皆廣有進獻太真外傳云絃乃末訶彌羅國永泰元年所貢者渌水蠶絲也光麗如貫珠西湖竹枝楊亷夫西湖竹枝歌云蘇小門前花滿株蘇公堤上女當壚南官北使須到此江南西湖天下無鹿頭湖船唱郝郎船頭不宿野鴛鴦為郎歌舞為郎死不惜真珠成斗量家住城西新婦磯勸君不唱縷金衣琵琶元是韓朋朩彈出鴛鴦一處飛勸郎莫上南髙峰勸我莫上北髙峰南髙峰雲北峰雨雲雨相催愁殺儂湖口樓船湖日隂湖中斷橋湖水深樓船無柁是郎意斷橋有柱是儂心病春日日可如何起向西忩理琵琶見說枯槽能卜命柳州衖口問來婆小小渡船如缺𤓰船中少婦竹枝歌歌聲唱入箜篌調不遣狂夫橫渡河石新婦下水連空飛來峰前山萬重妾死甘為石新婦望郎忽似飛來峰望郎一朝又一朝信郎信似浙江潮床脚搘龜有時爛臂上守宫無日銷吳旦生曰藝苑巵言元時法網寛人不必仕宦浙中毎嵗有詩社聘一二名宿如亷夫輩主之刻其尤者為式此西湖竹枝詞所由作也故山西和維序之曰亷夫晚嵗寓居西湖留連詩酒乃賦西湖竹枝詞若干首一時和者數百家雖婦人女子之作亦為收録亷夫加評㸃板行海内乆之湮滅今得詞一百八十五首計一百二十人余從本集録亷夫九首復於徐興公選本録和者二十五首於他選本録和者十八首及他本所見一二首徐野君取洪永以後所咏為西湖竹枝詞續集余選二十五首附於後為暇日流覽焉興公選本蘇小門前騎馬過相逢白髪老宫娥自言記得前朝事只說當年賈八哥宇文子真手種宜男寄去時花開灼灼子離離芳心不似䕷蕪草一任春風爛熳吹陸繼之南北髙峰作鏡臺十里湖光如鏡開行人有心都照見勸郎肝膽莫相猜朱仲文湖上采菱菱濕衣泥中取藕偶來歸快殺鴛鴦不獨宿却嫌鸂􅈑傍人飛釋道元儂家住在湧金門青見髙峰白見雲嶺上並無丞相宅湖邊猶有岳王墳于彦成楊柳樹頭雙鵓鴣雨來逐婦晴來呼鴛鴦到死不相背雙飛日日在西湖又郎去東征苦未歸妾去采桑長忍饑養蠶成絲不敢賣留待織郎身上衣釋雷隠十五女兒羅髻垂照水學畫雙蛾眉長橋橋下彎彎月偏向儂家照别離郗九成妾家西湖住橫塘門前楊柳萬條長願郎醉後莫折斷留待重來繫馬韁又郎去天涯妾在樓西湖楊栁又三秋郎情莫似湖頭水城北城南隨處流楊子壽楊白花開風滿天花開成絮不成綿不如落向西湖水化作浮萍箇箇圓顧進道郎子别時秋月明説道歸時春水生曉起門前聽過馬馬嘶都是别人行又孤山梅花開雪中恰似阿儂冰雪容不學畫橋南畔栁春來容易嫁東風王彦强與郎别乆夢相思不作西園蝴蝶飛化作春深題鴂鳥一聲聲是勸郎歸馬民立銷金鍋邊瑪瑙坡争似儂家春最多蝴蝶滿園飛不去好花紅到剪春羅熊進德湖湖艇艇風徐徐秋水蕩漾金芙蕖釣魚不是貪雙鯉為恐腹中藏素書韋德圭湖中采蓮蓮刺長芡頭新剥掌中粧掌中芡子眼中淚化作鮫珠遺我郎楊宗善西湖女兒似西施𤓰皮小船歌竹枝郎心如月有時黒妾心如山無動時張大本蘇公堤上柳枝枝月子彎彎似妾眉記得雙雙拜新月只今獨有影相隨又儂自西湖日日愁郎船只在浙江頭憑誰移得吳山去湖水江波一處流沈自誠楓篁嶺下月色凉無數竹枝官道傍東家為愛青青節截作叅差吹鳳凰别里沙彦誠湖中日日坐船忩水面鯉魚長一雙好寄尺書問郎信惱人湖水不通江吳彦章美人絶似董嬌嬈家住南山第一橋不肯隨人過湖去月明夜夜自吹簫士女曹妙清比玉憶抱明珠買妾時妾起梳頭郎畫眉郎今何處妾獨在怕見花開雙蝶飛張妙净恵蓮蘇公堤上楊柳青人來人去綰離情東風為爾叮嚀道折斷柔條莫再生無名氏雲髻髙梳髩不分掃除虚室事元君新糊白紙屏風上盡畫蓬萊五色雲潘子素水仙祠前湖水深岳王墳上有􅆐吟湖船女子唱歌去月落滄波無處尋黄子乆昨夜西湖月色多照見郎君金叵羅明朝江頭放船去江亭風雨奈君何曹新民茜紅裙子柳黃衣花間采蓮人不知唱歌蕩槳過湖去荷葉荷花風亂吹陳敬德牡丹開時花滿闌芍藥開時春已殘等過三春今半夏重樓日日倚闌干顧國衡阿儂心似湖水清願郎心似湖月明南山雲起北山雨雲雨朝朝何處晴顧翼之十三女兒不出門父娘墳在葛嶺根同携女伴踏青去不上道傍蘇小墳宋無逸湖上采薪春復春養蠶長見繭絲新老蠶不識人間事猶趂東風了此身又湖光照儂雙畫眉鬢邊照見一莖絲東家女伴多年别昨日携來十嵗兒又湖頭女兒二十多春山兩㸃明秋波自從湖上送郎去至今不唱江南歌馬文璧潮去潮來春復秋錢塘江水通湖頭願郎也似江潮水暮去朝來不斷流張芸已孤山脚下三义路孤山墳上好梅花不似馬塍桃李樹隨春供送到人家張希顔水長西湖一尺過湖頭狂客奈愁何鯉魚吹浪楊花落聽得櫓聲歸思多葉居仲蘇公堤上草離離春盡王孫尚未歸風度珊瑚簾影直一雙紫燕近人飛周正道采菱女兒新樣粧𤓰皮船小水中央郎心只如菱刺短妾情謾比藕絲長又湖上女兒不解愁二三蕩槳百花洲貪看花間雙蛺蝶蜻蜓飛上玉搔頭嚴景安湖上女兒學琵琶滿頭都挿閙粧花自從彈得陽闗曲只在湖船不在家強彦栗初三月子似彎弓照見花開月月紅月裏蟾蜍花上蝶憐渠不到斷橋東繆叔正升菴詩話一首盡説盧家好莫愁不知天上有牽牛賸抛萬斛燕支水溜向銀河一色秋徐延徽歸田詩話二首瞿宗吉云惜不記其人姓名春暉堂上挽郎衣别郎問郎何日歸黄金䑓髙尚回首南髙峰頂白雲飛官河遶湖湖遶城河水不如湖水清不用千金酬一笑郎恩才重妾身輕選野君續本望郎不歸春又深相思敲斷碧瑶簮南髙峰頭有香願早買湖船出湧金瞿宗吉西子湖邊楊柳枝千條萬縷盡垂絲東風日暮花如雪飛入雕牆兩不知又春來芳草踏成蹊半是車輪半馬蹄多謝清明三日雨舊痕新緑一般齊楊孟載湖日初明湖水涯門前鵲噪郎到家折得草花還自喜挿向阿奴雙髻了孫太初春風楊栁緑絲絲似妾千思復萬思妾家有酒沙糖味郎若來嘗便得知沈石田杏子單衫窄樣裁荷花嬌貌一般開心中有事誰知得酸去酸來只怨梅又討筊祈籖問後因大槐宫裏話前程憑君金玉過於斗四月啼䳌能㡬聲釋心一一灣髙㟁㡬家船聚族成村到市㕓解語小兒知物價而今猶數宋時錢申瑶泉酒盡壚青客未休脫衣走馬恣風流西湖亦有橫塘曲一拍風吹入秀州王辰玉錦馬穿花十八娘春風吹過草生香珊瑚鞭墜不回顧却折柳枝三尺長田子藝白公堤畔草離離别樣湖山絶可思箇中風景誰當似蘇小當年未嫁時卓左車雙雙夫婦進香歸北到孤山南净慈偶向岳王墳裏過囑郎須買耍孩兒王季重南屏鐘罷黒稜層二十亨亨月二更畫舸香車都不見西陵橋下數漁燈又湧金門外水微茫問水亭邊上小航三十六橋隨意去阿誰風色似錢塘李長蘅湖南柳大解拖烟湖北花開不賣錢儂正南來郎北去相逢憎殺兩來船呉去塵杭州纎趾四方傳踏破蘇堤一寸烟新月吐時真像月蓮花開處又生蓮徐野君個個春衫簇繡裙滿湖風月㡬家分妾心堅似南山石郎情薄似北山雲又陸公祠下酒如泉十五小姫向晚妍兩頰欲言紅似火低頭學索酒家錢胡彦逺人依三竺結樓臺竹嶺松坪酒肆開貸得僧錢娶新婦夜深花燭拜如來黄伯傳大小兩山猶號孤虧儂獨自住西湖少年若也能留佩何必兒家日望夫王丹六青陽處處賣湖堤白墮家家颭水旗不道岳墳春似海果然人像午潮時邵古菴一羣野烏立樹了一雙好鳥睡淺沙生憎我郎顛倒甚藕花不采采梨花徐幼夌西子湖頭賣酒家春風揺蕩酒旗斜行人沽酒唱歌去踏碎滿街山杏花女子朱静菴橫塘秋老藕花殘兩兩吳姬蕩槳還驚起鴛鴦不成浴翩翩飛過白蘋灘又紅漆車兒駕白羊吳鹽空灑竹枝香不知羊角如心曲纔聽車輪欲斷腸無名氏蘇臺竹枝詩話類編曰楊亷夫竹枝詞一時和者五十餘人有瞿宗吉竹枝詞云月落西邊有時出水流東去㡬時還早起腥風滿城市郎從海口販鮮回尤越出亷夫矣吳旦生曰剪燈新話載聨芳樓記此非宗吉詩也按至正初吳郡姓薛者有二女長曰桂英次曰蕙英皆能詩賦建一樓以處之名曰蘭蕙聨芳之樓有詩數百篇號聨芳集時亷夫竹枝鏤板書肆二女見之笑曰西湖有竹枝曲東湖獨無竹枝曲乎乃製蘇臺竹枝曲十章亷夫見其稿手寫二詩於後姑蘇臺上月團團姑蘇臺下水潺潺月落西邊有時出水流東去㡬時還館娃宫中麋鹿逰西施去泛五湖舟香魂玉骨歸何處不及真娘葬虎丘虎丘山上塔層層静夜分明見佛燈約伴燒香寺中去自將釵釧施山僧門泊東吳萬里船烏啼月落水如烟寒山寺裏鐘聲早漁火江楓惱客眠洞庭金柑三寸黃笠澤銀魚一尺長東南佳味人知少玉食無縁進上方荻芽抽筍楝花開不見河豚石首來早起腥風滿城市郎從海口販鮮回楊栁青青楊栁黃青黃變色過年光妾似栁絲易憔悴郎如栁絮太顛狂翡翠雙飛不待呼鴛鴦並宿㡬曽孤生憎寳帶橋頭水半入吳江半太湖一緺鳳髻緑於雲八字牙梳白似銀斜倚朱門翹首立往來多少斷腸人百尺髙樓倚碧天䦨干曲曲畫屏連儂家自有蘓臺曲不去西湖唱採蓮亷夫二詩錦江只說薛濤牋吳郡今傳蘭蕙篇文采風流知有自連珠合璧照華筵難兄難弟並有名英英端不讓瓊瓊好將筆底春風句譜作瑶筝絃上聲歴代詩話巻七十
