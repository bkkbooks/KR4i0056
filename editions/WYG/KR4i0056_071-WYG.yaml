body:
  text: 歴代詩話巻七十一歸安吳景旭撰壬後集下之下元詩柯敬仲倪元鎮題柯敬仲竹云檢韻蕭蕭人品係篆籀渾渾書法俱奎章博士生冣晚耽詩愛畫同所趍吳旦生曰徐克昭稗史集傳云柯九思字敬仲遇文宗於潛邸及即位置奎章閣特授學士院鑒書博士凡内府所藏咸命鑒定寵顧日隆由是見忌御史章入文宗重違諌臣意勅除外諭其少避俟至上京宣汝矣未㡬大行上賔敬仲流寓中吴善冩竹石自謂冩幹用篆法枝用草書法葉用八分或用魯公撤筆法朩石用金釵股古漏痕之遺意則元鎮題竹而及人品書法亦摭實也堯山堂外紀云敬仲在奎章得出入内廷後失寵退居吳下虞伯生作風入松長短句寄之云畫堂紅袖倚清酣華髪不勝簮㡬回晩直金鑾殿東風軟花裏停驂書詔許燃官燭輕羅初試朝衫御溝氷泮水挼藍飛燕語呢喃重重簾幕寒猶在憑誰寄錦字泥緘報道先生歸也杏花春雨江南詞翰兼美一時争相傳誦機坊以此織成帕云鵯鵊倪元鎮聞鵯鵊詩林影曨曨鵯鵊聲歐陽詩句最闗情吳旦生曰歐陽永叔鵯鵊詞云紅紗蠟燭愁夜短緑忩鵯鵊催天明此元鎮所稱闗情句耶乃催明之鳥故韓致堯詩殘夢依依酒力餘城頭批頰伴啼烏張文潛詩紙忩將白燭微明鵯鵊枝頭一兩聲皆與永叔同意按鵯鵊作批鵊亦作批頰其頰上有二㸃白故名今名山呼一名夏雞俗名隔隥雞韻㑹以為杜鵑非也留青日札云至蠶候乃鳴者俗曰扎山扎火亦因其聲也盧延遜詩樹上諮諏批頰鳥忩間壁剥叩頭蟲又見海録碎事載一詩云小鳥聞批頰微蟲弄叩頭豈其偶同耶天啟間黃太穉詩割樹放飛批頰鳥䦨雲留養剔牙松皆於頰字見工異苑云有小蟲形色如大豆呪令叩頭如所教然後請放稽顙輙七十而有聲傅咸有叩頭蟲賦霍小玉傳有叩頭蟲匡山倪元鎮為張來儀賦匡山讀書處云廬山鬱岧嶤上有香爐峰吳旦生曰漢郡國志廬江郡潯陽縣南有廬山恵逺廬山記云有匡續一作俗非先生出殷周之際受道於仙人而適㳺其巖時人感其所止為神仙之廬因名廬山按匡續字子孝豫章舊志謂漢時封於潯陽恐悞謝顥廣福碑云周威烈王以安車迓匡續續仙去惟廬存因命其山為靖廬山邦人以先生姓呼匡山又曰匡阜按續師柱下史住南障山改呼匡廬建章實録云隆安六年桓𤣥遺書於匡山恵逺法師則匡山之為廬山固在潯陽矣如老杜贈太白云匡山讀書處乃蜀中彰明縣之大匡山也學林新編以為太白舊㳺廬山子美欲招隠為廬山之逰余於已集杜詩中詳辨其悞今元鎮借五字為篇題起手即說廬山而全篇絶不渉太白庶無礙也養鴨倪元鎮詩笠澤至今能養鴨山隂何處覔籠鵝吳旦生曰談苑陸龜䝉居笠澤有一内臣自長安使杭州舟經舍下彈其一緑頭鴨死龜䝉遽從舍出大呼云此緑鴨有異善人言適將獻天子今將此死鴨以詣官内使少長宫禁信以為然厚以金帛遺之徐問此鴨何言龜䝉曰常自呼其名東坡題三賢堂詩却因養得能言鴨驚破王孫金弹丸馬虚中詩昭諌謾愁花解語天隨曽聽鴨能言百顆倪元鎮送甘允從詩奉橘定應題百顆籠鵝即欲寫千行蘭亭書法人間少好去山隂覔野航吳旦生曰韋應物青橘絶句云書後欲題三百顆洞庭須帶滿林霜黃山谷謂右軍一帖云奉橘三百枚霜未降不可多得韋詩蓋取諸此東坡書劉景文所藏帖云君家子敬十二字氣壓鄴侯三萬籖則悞以為子敬帖矣山谷謝黃柑云書後合題三百顆頻隨驛使未應慳漁隠樷話謂右軍又一帖云奉黃柑二百不能佳想故得至耳山谷悞用為三百右軍前一帖在賜書堂法帖中後一帖在劉次莊法帖中犢鷗倪元鎮苦雨詩云十里荒凉黃犢草五湖浩蕩白鷗波吳旦生曰詩話盧仝詩陽坡草軟厚如織因與鹿麛相對眠荆公止用五字道盡兩句云眠分黃犢草豈不簡而妙乎天厨禁臠云沙草則衆人所謂水邊林下之物所與㳺處者牛羊鷗鳥耳荆公造而為語曰眠分黃犢草坐占白鷗沙其筆力髙妙殆若天成今元鎮脫换其語便寫出積雨瀦水之景尤使人一唱而三歎也顧仲瑛存餘堂詩話曰舊藏顧仲瑛詩帖一紙乃次韻劉孝章治中邀夏仲言郎中逰永安湖詩二首字畫絶工楊鐵崖嘗和之中有一聨云啄花鸎坐水楊柳雪藕人歌山鷓鴣極為鐵史所稱許楊支硎跋其後云吾家鐵先生平日豪氣塞雲漢未嘗輕易假人以稱可語今為仲瑛拈出一聨低頭遜避乃知先生目中自有人也仲瑛在當時能以俠勝詩筆特其餘耳今求斯人又何可得家有數百頃田被新衣駕大舫赫赫買冠帶欺鄉里愚民彼視文事為何物然則雖有吾家先生當何所詣哉吳旦生曰此詩不載玉山草堂集按仲瑛雄於貲折節讀書築别業於茜涇西曰玉山佳處日夜與客置酒賦詩其中因刻交逰諸公詩自鐵崖而下四十餘家曰草堂雅集或頌云追草𤣥於西蜀軼浣花於南杜李祁謂使是集與蘭亭桃花園序並傳天壤間則後之覽者安知其不我若耶同時有沈萬三及福山曹氏亦以財雄於吴而文雅不及宜支硎之感歎於䟦尾也仲瑛自記云玉山中亭舘凡二十有四其扁題皆名公鉅卿髙人韻士口咏手書以贈予者玉山草堂蜀郡虞集伯生𨽻書遂昌鄭元祐為記痩影在忩梅得月凉隂滿地竹籠烟玉山佳處馬九霄篆書楊亷夫陳敬初為記翠痕新得月玉氣暖為雲釣月軒京兆杜本𨽻書月華中夜滿雲影一絲懸芝雲堂吴興趙孟頫篆書雲蒸瑞氣芝三秀風動天香桂一枝可詩齋京兆杜本書正聲存大雅古調有遺音讀書舍吴興趙雍書學時時習徳日日新種玉亭京兆杜本書𤣥圃分仙種藍田發夜光小蓬萊吴興趙孟頫篆書鶴羣長遶三珠樹鰲背髙瞻五色雲碧梧翠竹堂吴興趙孟頫篆書楊亷夫記髙則誠後記嶧陽古調來鸞鵠嶰谷春聲吹鳳凰湖光山色樓吳興趙奕仲光篆書天連逺樹三千頃雲擁晴巒十二鬟浣華館吳興趙雍仲穆篆書顧仲瑛自記波暖花明狀元浦竹寒沙碧拾遺詩栁塘春馬九霄篆書金縷和烟春漠漠赤欄倚月水溶溶漁莊白野達兼善𨽻書柯九思記興入水雲頻放艇夢回烟雨聽鳴榔金粟影白野達兼善𨽻書波澄月影秋痕冷露浥天香夜氣浮書畫舫濮陽吳孟思篆書楊亷夫為記書帖畫圖浮彩鷁筆牀茶竈狎輕鷗春暉樓吳興沈明逺書花下稱觴介眉夀簾前舞綵報春暉秋華亭檇李鮮于樞伯機篆書凉月掛簷成夜色秋華滿樹作天香淡香亭秦約嘗得趙孟頫所篆淡香二字以遺仲瑛遂作亭以顔之暖香春淡淡夜月水溶溶君子亭吳興趙孟頫書聨闕雪巢白野達兼善書花雨空青迷鶴夢忩含虚白失鷗羣春草池周雪坡篆書聨闕緑波亭吳興沈明逺𨽻書逺夢生青草芳池看緑波綘雪亭聨闕聽雪齋京兆杜本書夜色飛花合春聲度竹深白雲海范陽盧熊公武篆書聨闕來龜軒聨闕拜石壇白野達兼善篆書聨闕寒翠所白野達兼善書聨闕後斷髪自稱金粟道人自畫小像浴馬摘阮補釋典寫道經最後則方床曲几與一老翁對語而題詩其上云儒衣僧帽道人鞋天下青山骨可埋若說向時豪俠處五陵鞍馬洛陽街五像有石刻傳吳中又自為壙志戒其子以紵衣桐㡌㯶鞵布襪纒襪入土裹雨交顧仲瑛詩舊雨不來今雨來故交那在新交右吳旦生曰白孔六帖載杜子美卧病長安旅次多雨生魚青苔及榻常時車馬之客舊雨來新雨不來按舊雨即舊日也陸放翁詩少陵今雨無客至寂寞衡門晝常閉蘇東坡詩新巢語燕還窺硯舊雨來人不到門劉無黨詩客裏厭聞今舊雨夢餘愁聽短長更王仲澤詩舊雨故人應念我不來聨句夜煎茶范德機詩頗怪來今雨相看語後天成化中邵國賢詩客復來今雨山如對此翁程克勤詩百年老友不復見舊雨故人空一來朱性甫詩老夫把巻仍自讀舊雨到門今不來滕王劉仲脩鍾陵眺望詩蝶失滕王畫棟雲吳旦生曰王建宫詞搨得滕王蛺蝶圖按酉陽雜俎云嘗見滕王蝶圖有名江夏斑大海眼小海眼村裏來菜花子圖繪寳鑑云滕王湛然善畫花鳥蠭蜨此是滕王湛然也王勃詩珠簾暮捲西山雨畫棟朝飛南浦雲按唐書云元嬰為荆州刺史驕佚失度及遷洪州都督以貪聞髙宗給麻二車助為錢緡故滕王閣記云南昌故郡洪都新府此是滕王元嬰也今仲脩詩蝶與棟雲並入一句混甚謝豹戴叔能詩百年世事醯雞變一夜鄉心謝豹啼吳旦生曰老學庵筆記吳人謂杜宇為謝豹杜宇初啼時漁人得蝦曰謝豹蝦市中賣筍曰謝豹筍顧况詩緑樹村中謝豹啼若非吳人不知為何物禽經云杜鵑啼苦則倒懸於樹自呼曰謝豹又按謝豹人也抱恥而死其魄為蟲潛行地中羞見人掘出之猶以雙足覆面作忍恥狀酉陽雜俎云虢州有蟲名謝豹常在深土中司馬裴沈子常掘坑獲之小類蝦蟆而圓如毬見人以前兩脚交覆首如羞狀能穴地如鼢䑕頃刻深數尺或出地聽謝豹聲則腦裂而死俗因名之成幹詩杜䳌花與鳥怨艷兩何賖疑是口中血滴成枝上花一聲寒食夜數朶野僧家謝豹出不出遲遲日又斜張泌詩髙林帶雨楊梅熟曲㟁籠雲謝豹啼周衡之詩東風一樹棠梨老落日千山謝豹啼葉子竒詩待尋無樹人家宿免得中宵謝豹啼𢎞治中鄭繼之詩謝豹見人啼出血王孫上樹捷如風雙廟張思亷雙廟詞末云唐家宫殿秋草生二十一陵如掌平獨遺雙廟門前石日有行人來繫牲吴旦生曰珊瑚鈎詩話睢陽雙廟俗謂之五侯廟雙廟者為張許建也五侯者南雷賈亦作像於廊廡耳王荆公詩就死得處所至今猶耿光此獨身如在誰令國不亡黄豫章詩縱使賀蘭非長者未妨南八是男児余按廵字廵鄧州人博通羣書為文章不立藁其守睢陽城孤勢蹙猶激勵將士賦詩云裹瘡猶出陣飲血更登陴又聞笛詩云不辨風塵色安知天地心其謝金吾將軍表與許逺祭城隍文皆嚼齒穿齦之辭劉禹錫云此二公天賛其心俾之守死善道向若救至身存不過一張僕射耳則廵逺之名安得以耀萬古哉金人趙周臣詩男兒生不功名死無益莫言簿領卑凡職君不見當時髯張一尉耳至今雙廟令人起草朩子云近有以張廵傳糊窓者一士人見之題云坐守睢陽當豹關江淮頼此得全安至今青史雖零落猶障窓風一面寒南濠詩話云㑹稽張思亷流寓吳門時張士誠欲結内逰客大開賔賢之館聞思亷名禮致為樞宻院都事遂委身事焉未㡬張敗思亷變姓名走杭州寄食報國寺旦暮手一編人不得窺後思亷死寺中人取視之乃其平生所作詩也白翎雀輟耕録曰白翎雀者教坊大曲也始甚雍容和緩終則急躁繁促殊無有餘不盡之意竊嘗病焉後見陳雲嶠云白翎雀生於烏桓之地雌雄和鳴自得其樂世皇因命伶人碩德閭製曲以名之曲成上曰何其末有怨怒衰嫠之音乎時譜已傳矣故卒莫能改張思亷作歌曰真人一統開正朔馬上鞮鞻手親作教坊國手碩德閭傳得開基太平樂檀槽頷呀鳳凰齶十四銀環掛氷索摩訶不作兠勒聲聽奏筵前白翎雀霜皬皬風彀彀白草黃雲日色薄玲瓏碎玉九天來亂撒氷花灑毡幕玉翎琤􅀈起盤礴左旋右折入寥廓崒嵂孤髙繞羊角啾啁百鳥紛叅錯須臾力倦忽下躍萬㸃寒星墜叢薄䂮然一聲震雷撥一十四弦喑一抹驚鴦飛起暮雲平鷙鳥東來海天濶黃羊之尾文豹胎玉液淋漓萬夀盃九龍殿髙紫帳暖踏歌聲裏懽如雷白翎雀樂極哀節婦死忠臣摧八十一年生草萊鼎湖龍去何時回吳旦生曰觀王原吉書無題後云莫䜟白翎終曲語蛟龍雲雨發無時正以其有怨嫠之音為曲終之䜟也張光弼詩傷哉不聞白翎雀但見落日生寒烟亦同此意蓉塘詩話云朔地無他禽鳥惟鴻鴈與白翎雀鴻鴈畏寒秋南春北白翎雀雖窮冬沍寒亦不易處故世祖作樂名白翎雀札朩嘗言於王汗曰我於君是白翎雀他人是鴻鴈耳正謂此按每嵗此鳥先駕往返故楊亷夫宫詞云天上駕鵞先有信九重鑾駕上都迴永樂中周藩誠齋作元宫詞云上都隨駕自西回女伴遥騎駿馬來踏遍路傍青野韭白翎飛上李陵臺厄閏吳文可擬李長吉十二月樂辭末有閏月云山中獨厄黃楊樹吳旦生曰蘇子瞻退圃詩園中草朩知無數獨有黃楊厄閏年自注俗說黃楊朩無火嵗長一寸遇閏退一寸故宋人閏月表云梧桐之葉十三黃楊之厄一寸洪武時李仲脩十二月樂章其閏月云嬴皇當極黃楊死一寸霜皮生不起嶧陽老榦青銅根玉葉排秋十三子遁甲注云梧桐以知日月正閏生十二葉一邊有六葉從下數一葉為一月有閏則十三葉視葉小者則知閏何月也廣雅云芙葉一葉一花花葉常偶生故謂之藕藕生應月月生一節遇閏則益一節留青日札云鳬茈藉菰芋皆應月十二子閏益一子石室竒方云椶櫚俗名棕披其朩應月生片遇閏則生半片嵗長十二節閏年増半節羽毛攷異云鳯尾十二翎遇閏嵗生十三翎今樂府小調尾聲一十二板以象鳥尾故曰尾聲或増四字亦如一板以象閏宫詞王叔明宫詞云南風吹斷采蓮歌夜雨新添太液波水殿雲廊三十六不知何處月明多吳旦生曰仁和俞友仁見叔明宫詞歎曰此唐人得意句也遂以其妹妻之或以此詞為永樂時王甸字子宣作恐悞按叔明為趙松雪之甥畫山水得外氏法方希直所謂吳下王䝉藝且文吳興趙公之外孫也隠於黃鶴山號黃鶴山樵與大癡老人黃公望子乆梅道人吳鎮仲圭趙孟頫子昻稱為元四大家畫成化間平仲微題叔明畫云我昔見之湖上居當門萬朶翠芙蕖承平公子有故態文敏外孫多異書閒吮彩毫消白日夢騎黄鶴上清虚此圖定倚吳山閣醉㸃南屏春雨餘四友齋樷說云叔明洪武初為泰安知州㕔事後有樓正對泰山叔明張絹素於壁興至即着筆凡三年而畫成一日㑹陳惟允值大雪叔明謂曰改此畫為雪景何如惟允為小弓夾粉筆張滿彈之粉落絹上儼如飛舞之勢相顧以為神竒叔明題其上曰岱宗宻雪圖禽蟲夷白齋詩話曰元釋溥光字元暉俗姓李氏特封昭文館大學士榮禄大夫賜號立悟大師有二絶句云蟭螟殺敵蚊眉白作巢上蠻觸交争蝸角中何異白作應是諸天觀下界一微塵裏白作内鬬英雄荳苗鹿嚼觧烏毒艾葉雀啣奪燕巢鳥獸不曽看本草諳知藥性是誰教吳旦生曰此非元釋溥光詩也白樂天集禽蟲十二章自序云莊列寓言風騷比興多假禽蟲以為筌蹄故詩義始於闗睢鵲巢道說先乎鯤鵬蜩􅀈之類是也予閒居乘興偶作一十二章頗類志怪放言毎章可致一哂一哂之外亦有以警其衰髦封執之惑焉微之夢得云此乃九奏中新聲八珍中異味也按前二首外有可采者如云燕違戊已鵲避嵗兹事因何羽族知疑有鳳凰頒鳥厯一時一日不參差又云江魚羣從稱妻妾塞雁聨行號弟兄但恐世間真眷屬親疎亦是強為名又云蠶老繭成不庇身蜂饑蜜熟屬他人須知年老憂家者恐是二蟲虚苦辛又云一䑕得仙生羽翼衆䑕相看有羨色豈知飛上未半空已作烏鳶口中食其於物理人事叅勘了達非樂天未易到此遯齋閒覽云鸂􅈑能勑水故宿水而物莫能害鶴能巫歩禁蛇故食蛇啄朩遇蠧穴能以嘴畫字成符即蠧蟲自出鵲有隠巢朩故鷙鳥能免燕啣泥避戊已日故巢固而不傾觀有長水石故能於巢中養魚而水不涸燕惡艾雀欲奪其巢即啣艾置其巢中燕見艾避去此皆鳥之有智者歴代詩話巻七十一
