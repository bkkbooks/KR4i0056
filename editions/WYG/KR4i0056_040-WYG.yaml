body:
  text: 歴代詩話巻四十歸安吳景旭撰已集下之上律詩法楊仲𢎞序曰予少年從叔父楊文圭逰西蜀抵成都過浣花溪求工部先生之祠而觀焉有主祠者工部九世孫杜舉也居於祠之後予造而問之曰先生所藏詩律重寳不猶有存者乎舉曰吾鼻祖審言以詩鳴於當世厥後言生閑閑生甫甫又以詩鳴至於今源流益逺矣然甫不傳諸子而獨於門人呉成鄒遂王恭傳其法故予傳之三子者雖復先生之重寳而得之不易也今子自逺方而来敢不以三子所授者與子言之子其謹之㢤予遂讀之朝夕不置乆之恍然有得益信杜舉所言非妄也京城陳氏子有志於詩故書舉之傳予戒予者貽之旹至治壬戌四月望書收東京三首曲而直婉而成章言不廹切意已獨至仙仗離丹極㐫星照玉除此十字説一塲世亂天時人事之駭異有過此者乎字既停當語尤涵粹比漁陽鼙鼓動地来之句霄壤懸隔須為下殿走不可好樓居語帶前咏下殿走好樓居使事停當須為不可四字𦂳嚴又包得興兵當割愛之意暫屈汾陽駕聊飛燕將書汾陽帝駕可乆屈乎故下一暫字燕將之書未能必於感動聊復爾爾此二字下得有味依然七廟畧更與萬方初祖宗之廟謨已壊然不最言稱依然焉其更也人皆仰之則日月已食更與萬方初當時宇宙再造之懐可知生意甘衰白天涯正寂寥衰白之時生意自少故下一甘字他字便不可代忽聞哀痛詔又下聖神朝聖人之朝豈有哀痛之詔縱使有之一巳甚可又下乎忽聞又下四字多少驚且欵意盖是𤣥宗播遷巳有詔罪巳矣肅宗即位又一詔焉羽翼懐商老文思憶帝堯此十字渾涵多少意思撫軍監國天子事何乃促取大物為山谷用十四字太露如何有此十字之髙叨逢罪已日霑灑望青霄汗馬收宫闕春城鏟賊壕第三篇方説戰功只十字見用力之不易如此先宮闕後城壕有次序賞應歌枤杜歸及薦櫻桃雜冦横戈數以數字貫功臣甲第髙萬方頻送喜無乃聖躬勞今日收復一處明日收復一處奏凱之音日報喜達行在所三首西憶岐陽路無人遂却回言昔道梗也下五字好眼穿當落日愁望之極也心死着寒灰幾不可生也霧樹行相引蓮峯望或開言喜達意所親驚老瘦辛苦賊中来愁思胡笳夕凄凉漢苑春雖達行在而風景如此生還今日事間道暫時人司𨽻章初覩南陽氣已新初字已字不是容易下喜心翻倒極嗚咽欲沾巾甚是可喜可悲死去憑誰報歸来始自憐十字妙至今使人憐其意也猶瞻太白雪時未和也喜遇武功天漸近日也影静千官裏心蘇七校前昔也陪千官之榮今也弔一影之静盖是朝無人焉然猶幸熊羆之士為國討賊毎至其前心少蘇焉今朝漢社稷新數中興年猶司𨽻南陽之意歸夢逕路時通塞江山日寂寥偷生惟一老伐叛已三朝巳字好雨急青楓暮雲深黑水遥天地昏塞時也夢歸歸未得不用楚辭招過斛斯校書莊二首纒綿悽愴句句字字可法此老巳云沒鄰人嗟未休或以為杜老自稱豈無宣室召徒有茂陵求傷其臨老方得一官句字皆停當文帝召賈誼於宣室武帝求相如遺文妻子寄他食園林非昔逰意涵粹比寡妻無子息破屋帶林泉者不同空餘蕙帷在淅淅野風秋蕙帷猶在而妻子寄食於他所可哀也燕入非旁舎旁無歸人怕此空宅耳鷗歸祗故池景在人目斷橋無復板卧柳自生枝十字好遂有山陽作遂有二字好向秀傷嵇康過山陽作思舊賦多慚鮑叔知素交零落盡白首淚雙垂讀之可以敦伐朩之意詠懐古跡五首句字皆雅實意度極髙逺其一三峽五溪結上生下格支離東北風塵際飄泊西南天地間呉氏曰支離其神於東北風塵之際飄泊其身於西南天地之間則其所懐為何如也故其身在於西南而神則逰於東北此二句詠懐以起第三聮也三峽樓臺淹日月五溪衣服共雲山三峽指東北而言五溪指西南而言淹日月共雲山非懐而何此言又指古跡蠻方事主終無賴詞客哀時且未還王氏曰五溪即蠻方也詞客指庾信也此聮言蠻方事主以結上四句之意詞客哀時以生結句之意所謂古跡也庾信平生最蕭瑟暮年詩賦動江闗其二宋玉宅抝句格揺落深知宋玉悲風流儒雅亦吾師呉氏曰宋玉賦云凡草朩揺落而變衰故甫誦此而知宋玉之悲此専咏宋玉所懐之實悵望千載一灑淚蕭條異代不同時王氏曰悵望宋玉巳經千載不復得見而空灑淚矣蕭條異代不得與之同時也呉氏曰悵望者以其風流儒雅也蕭條者以其揺落之悲也此二句承上聮而言江山故宅空文藻雲雨荒臺豈夢思鄒氏曰宋玉有宅在并州故宅空文藻以其儒雅也宋玉有神女賦曰雲雨荒臺以其風流也曰空曰豈不復見其風流儒雅者也最是楚宫俱泯沒舟人指㸃至今疑王氏曰楚宫即故宅荒臺之地此句承上二句而終首聮之意也其三昭君墓牙鎖格羣山萬壑赴荆門生長明妃尚有村王氏曰荆門舊有明妃村呉氏曰此専言明妃事也一去紫臺連朔漠獨留青塜向黄昏上句起第三聫上句下句起三聫下句紫臺漢宫名言明妃入漢宫而後嫁於逺而卒死於逺也畵圖省識春風靣環珮空歸月夜魂上句承二聫上句而言明妃去矣惟見畵圖下句承二聫下句而言明妃死矣惟於月下想其魂之歸也惟其去紫臺所以有畵圖可省惟其有塜所以歸夜月之魂交互曲折各盡其妙耳千載琵琶如解語分明哀怨曲中論此結起句以終其意其四蜀主廟節節生意格蜀主窺呉幸三峽崩年亦在永安宫王氏曰此咏劉備也永安宫在三峽之地翠華想像空山裏玉殿虚無野寺中上句言英靈猶在下句言寺猶在也王氏曰山有卧龍寺先主之祠廟在焉野廟松杉巢水鶴嵗時伏臘走村翁上句承上聮下句言之野廟即先主之祠也武侯祠屋長鄰近一體君臣祭祀同其五孔明廟抑揚格諸葛大名垂宇宙功臣遺像肅清髙鄒氏曰此専指諸葛也三分割據紆籌䇿萬古雲霄一羽毛諸葛之才本可以兼天下今三分割據不得展其才雖紆籌䇿而名之垂宇宙自若也萬古雲霄即宇宙也羽毛之在雲霄即肅清髙也上句少抑下句即揚以應起句伯仲之間見伊吕指揮若定失蕭曹言諸葛在伊吕之間指揮若定雖蕭曹之智謀亦失之矣運移漢祚終難復志决身殱軍務勞呉氏曰此五首以詠懐古蹟為題大㮣皆叙古蹟而詠懐亦是傷感之意愁句法皆峻峭山谷機局多如此江草日日喚愁生草之生喻愁之多喚字妙巫峽泠泠非世情巫峽阻險水之泠泠豈世之情㢤盤渦鷺浴底心性潔身於險阻何自苦獨樹花發自分明章美於榮枯欲何傷十年軍馬暗南國暗字好異域賓客老孤城渭水秦川得見否人今罷病虎縱横已上十五首按詩宗云且如看杜詩自有正法眼藏毋為旁門邪論所惑今於集中取其鋪叙正波瀾濶用意深琢句雅使事當下字切五七言律十五首學者不可草草看過如此去看古人詩胸中所閲義理既多則知近世詩格卑氣弱莫能逃矣秋興七首其一接項格玉露凋傷楓樹林巫山巫峽氣蕭森呉氏曰此第一句以起第三聮興第二句以起第二聮興也玉露言秋露白也楓樹凋傷言秋之深也巫山以山言巫峽以水言蕭森以山水之氣言皆秋深之景物也江間波浪兼天湧塞上風雲接地隂江間即巫峽兼天湧接地隂山水之氣蕭森也此景物接第二句也叢菊兩開他日淚孤舟一繫故園心甫居䕫州二年見菊之開者二次皆為他日傷感之淚也凡遇秋景慘澹人情孰不思歸然甫在夔州巫峽時雖值秋深而世之阻隔於兵戈故心常念故園而反為孤舟所繫也非孤舟能繫奈阻隔於兵戈無由到故園矣寒衣處處催刀尺白帝城髙急暮砧催刀尺急暮砧皆秋深之景以結第三聮并起句之意白帝城在巫峽之上以結第二句之意也鄒氏曰因言寒單而有刀尺暮砧之事其二交股格夔府孤城落日斜毎依北斗望京華第二句交股起後二聮長安有北斗城又指北斗言依者不逺也又言依北斗為標凖而望京華也聴猿實下三聲淚奉使虚随八月槎上句應第一句聴猿夔府事也下句應第二句奉使京華事也思長安之深故聴猿而至下淚思君之深故乗槎而今虛随聴猿三聲必下淚奉使八月而乗槎此對其意之虚實非對其字者也畵省香爐違伏枕山樓粉堞隠悲笳上句言夔府長安之相違也下句指夔府孤城之女墻也悲笳之聲隠於女墻此城中落日之時也請看石上藤蘿月已映洲前蘆荻花結第一句之意也首言落日斜此言月映洲前日月相催起結相應此時之興何如㢤其三纎腰格又名開闔格千家山郭静朝暉日日江樓坐翠微鄒氏曰此詩前四句一意後四句一意亦有相續起句之意隠而不覺耳翠微非可坐盖坐江樓而對翠微也信宿漁人還泛泛清秋燕子故飛飛此皆應起聮二句之意而亦托興於無聊再宿為信以舊為故只此二字可見其毎日坐江樓也漁人泛泛燕子飛飛皆江樓所見托物以喻巳也匡衡抗䟽功名薄劉向傳經心事違甫意自謂非不欲如匡衡抗疏奈我之功名薄何非不欲如劉向傳經奈我之心事違何此二句雖以興轉然亦因前四句而發矣同學少年多不賤五陵衣馬自輕肥甫之同學雖貴又不如甫之卒致髙位比之劉向軰而反毎日坐江樓然彼之富貴自若而此窮困自如人何以係累予㢤此二句實結第二聮之意要知前四句既言無聊後四句復言無聊也呉氏曰興者既言他物以引起所咏之詞而申其意公在夔府因秋之景物時事以起興而歌八章此三章皆言夔府以寓其傷已云爾其四雙蹄格聞道長安似奕碁百年世事不勝悲王氏曰此統咏長安起句乃一篇之大意後六句無非發明悲字之意二句雖各異事而意實相承鄒氏曰第一句起第二聮意第二句起第三聫意也王侯第宅皆新主文武衣冠異昔時王氏曰此應前二句悲字之意鄒氏曰此二句應第一句之意也又王侯第宅文武衣冠公言長安之事而曰皆新主異昔時則見第宅衣冠之似奕碁矣直北闗山金鼓振征西車馬羽書馳鄒氏曰此二句應起聮二句之意直北金鼓征西羽書應百年世事不勝悲者也魚龍寂寞秋江冷故國平居有所思此結前六句之意以魚龍寂寞譬君臣亂離平居有所思者亦思此而已上句雖譬詞而實所謂歸題下句雖思此而實聞道之言其首尾相貫如此其五續腰格蓬莱宫闕對南山承露金莖霄漢間王氏曰此詩正作起句三字比而興也承露盤蓬莱宫有之天子在長安而有此事西望瑶池降王母東来紫氣滿函闗王氏曰直叙蓬莱之事比之天子皇后也昔者闗令尹見紫氣滿函闗曰必有聖人過後見老子騎青牛度闗周穆王宴瑶池在西故耳上句言君見臣下句言臣見天子皆蓬莱宫之事雲移雉尾開宫扇日繞龍鱗識聖顔王氏曰上言君見臣下言臣見天子一卧滄江驚嵗晩幾回青鎖㸃朝班對結此二句始言長安前六句特言蓬莱之事以喻長安之事鄒氏曰雖在蓬莱今則滄江矣其六首尾互換格瞿唐峽口曲江頭萬里風烟接素秋呉氏曰瞿塘在峽口曲江在長安此之去彼萬里之遥此言夔府之接長安因第一句帶第二句之意正所謂變中之不變也花蕚夾城通御氣芙蓉小苑入邊愁此言曲江之地勢宫苑如此花蕚芙蓉曲江之苑名也通御氣入邊愁言素秋之景致也珠簾繡柱圍黄鵠錦纜牙檣起白鷗此言曲江之景䌓華如此昔時有之而今則無矣應在下句回首可憐歌舞地秦中自古帝王州回首縂言上六句歌舞地指中四句見其興替如此秋興之不淺也鄒氏曰上句應起聮下句應二聮盖歌舞地指曲江也惟有風烟而無繁華故云可憐也其七載壬集朩天禁語中其八單蹄格昆吾御宿自逶迤紫閣峯隂入漢陂吳氏曰此言二苑而後及於紫閣峯與渼陂之事紅稻啄殘鸚鵡粒碧梧棲老鳯凰枝此錯綜句法上句昆吾之物下句長安之物也佳人拾翠春相問僊侣同舟晩更移上句言𤣥宗御宿昆吾之時而佳人采拾翠草相問多少也下句言𤣥宗與貴妃諸臣放舟於渼陂而晩又移也觀此二句其為淫樂可知矣綵筆昔曽干氣象白頭吟望苦低垂昆吾御宿紫閣渼陂昔逰之地白頭吟望甫之思逰也呉氏曰四章縂言長安五章言蓬莱六章言曲江七章言昆明八章言昆吾御宿等景雖體制不同而末聫悉歸已意盖不如此則無以見其自夔州而思長安因秋之日托物起興也讀之使人自健羡吹笛應句格變正中之吹笛秋山風月清誰家巧作斷膓聲王氏曰此二句一篇之主明出風月二字以貫二聫誰家二字以貫三聫正此局也風飄律吕相和切月傍闗山幾處明此應起聫第一句也鐵騎中宵堪北走武陵一曲想南征此應起聫第二句也故園楊柳今揺落何得愁中却盡生此縂結上六句曲名折楊柳送韓十四歸江東省親開合格變變中之兵戈不見老莱衣歎息人間萬事非王氏曰兵戈阻隔父子相離人間萬事非矣尚安得舞斑衣以娯親也呉氏曰此因韓之省親而有感也我巳無家尋弟妹君今何處訪庭闈此承上二句而言兵戈之阻隔也呉氏曰言何處二字以問之第三聫正答此問也黄牛峽静灘聲轉白馬江寒樹影稀此訪庭闈處也呉氏曰此應上問云耳此别相期各努力故鄉猶恐未同歸燕子来舟中開合變格變變中之不湖南為客動經春燕子啣泥兩度新王氏曰此詩以燕子之飄泊比巳之飄泊上句以人言下句以物言舊入故園還識主如今社日逺看人可憐處處巢居室無異飄飄老此身比興兼有老一作托暫語船檣還起去穿花渡水益沾巾此始見舟中所作甫因為客於外因見燕子而思昔在故園燕子亦在故園人物之情初非相逐此合而結之十二月一日作即看燕子入山扉豈有黄鸝厯翠微此作第三聫意短短桃花臨水㟁輕輕柳絮㸃人衣此作第七句意亦粘起聫所以入山扉者以其有桃花所以厯翠微者以其有柳絮然臘月豈有是㢤前有即看後有春来他日等語則非指今日矣春来凖擬開懐乆老去親知見面稀此上句應前四句他日一盃難强進重嗟筋力故山違王氏曰上句結凖擬開懐之意而實二聫他日與春来也下句結老去見面稀之意此四句縂結前四句登髙句應句格風急天髙猿嘯哀渚清沙白鳥飛廻此上句起二聫上句言山中所見景物下句起二聫下句言江中所見景物無邊落朩蕭蕭下不盡長江滚滚来應起聫登髙而言此者盖俯視之也前四句以景物言萬里悲秋長作客百年多病獨登臺上句起後聫上句下句起後聫下句艱難苦恨䌓霜鬢潦倒新亭濁酒盃結此二句應上二句後四句以人事言奉使蜀州柏别駕將中丞命赴江陵起居衛尚書太夫人因示從弟行軍司馬佐叙事格變正中之中丞問俗畫熊頻愛弟傳書彩鷁新上句言中丞下句言别駕將丞命也漢官制曰丞相車以畫熊為飾遷轉五州防禦使起居八座太夫人上句言中丞赴江陵也下句起居衞尚書夫人也此四句將物言人事也楚宫臘送荆門水白帝雲偷碧海春上句言江陵之景楚宫在江陵下句言此處景與報恵連詩不惜知吾斑鬢縂如銀寄從弟位以恵連比弟也諸將五首其一結上生下格韓公本意築三城擬絶諸邊拔漢旌呉氏曰韓公築三城以絶諸𦍑以拔漢旌其本意如此也本字起下豈字豈謂盡煩回紇馬翻然逺救朔方兵呉氏曰豈謂𦍑人却為本國救患難也此皆諸將之過也𦍑来不覺潼闗隘龍起猶聞晉水清王氏曰上句縂結上四句而生下三句呉氏曰此二句言是𦍑人入闗不覺潼闗之隘矣而吾君崛起晉水之清也獨使至尊憂社稷諸君何以答昇平王氏曰承上意言之所以深責之也呉氏曰此前四句一意皆諸將之不能輔君也鄒氏曰一句生一句意其二歸題格漢朝陵墓對南山𦍑騎千秋尚入闗王氏曰言漢家有此陵墓而𦍑騎入闗皆崛地也昨日玉魚䝉𦵏地早時金盌出人間此言因𦍑人入闗而漢朝陵墓遭發掘之患如此玉魚金盌皆當時殉𦵏之物見愁汗馬西戎逼曽閃朱旗北斗閑此言𦍑人入闗之害城上旗幟本以防冦今𦍑騎入闗則北城之朱旗亦閑而不用多少材官守涇渭將軍且莫破愁顔言𦍑騎發處擾民之甚故必須材官守涇渭將軍未可樂也公憂國憂民如此其三續意格洛陽宫殿化為烽休道秦闗百二重此言責諸將戒其不可恃險也上歇下續滄海未全歸禹貢薊門何處覓堯封曰禹曰堯比當朝也此二句應起句畧開意言非特闗中而遐陬之處亦皆賦地矣朝廷衮職誰能補天下軍儲不自供上句責諸將之無補稍喜臨邊王相國肯銷金甲事春農此歸美一相國有興天下之志其四前多後少格回首扶桑銅柱標㝠㝠氛祲未全銷呉氏曰此言嶺海皆為人所䧟而兵氛未息越裳翡翠無消息南海明珠乆寂寥此言職貢之不通以深責諸將不能掃除祲氛殊錫曽為大司馬縂戎皆揷侍中貂此言朝廷待諸將非不厚而諸將何以報效乎炎風朔雪天王地只在忠臣翊聖朝如云日月所照霜露所墜舉南北而言也言天王之地只在忠臣輔相之耳上句結前四句下句結第三聫也其五前開後合格錦江春色逐人来巫峽清秋萬壑哀上句言甫到䕫州見春之来也下句言又見秋之来也正憶往時嚴僕射共迎中使望鄉臺此上四句言昔時之事開也主恩前後三持節軍令分明數舉杯上句言嚴武前後三為節度使今昔對言合也下句言武之如此説今日之事開也西蜀地形天下險安危須仗出羣才西蜀縂言錦江巫峽出羣才指嚴武此詩専謂嚴武諸將皆用而止有嚴武出諸將之右故知前開説後合説也峽中覽物興兼比格曽為掾吏趨三輔憶在潼闗詩興多此言在華州時而此詩在夔州作故有曽為憶在四字巫峽忽如瞻華岳蜀江猶似見黄河此言在䕫州猶在華岳也舟中得病移衾枕洞口經春長辟蘿此言見䕫州景如在華州時也形勝有餘風土惡幾時回首一髙歌形勝有餘結第二聫比也風土惡結第三聫比也下句結起聫興也客至興兼賦格舎南舎北皆春水但見羣鷗日日來先言無客至而有如此物興也花逕不曽縁客掃蓬門今始為君開上句興下句賦也二句方見題意盤飱市逺無兼味尊酒家貧只舊醅肯與鄰翁相對飲隔溪喚取盡餘盃四句一意終一篇也和裴廸登蜀州東亭送客逢早梅相憶見寄正而變格特結異耳東閣官梅動詩興還如何遜在揚州王氏曰上句起三聫之意下句起二聫之意此時對雪遥相憶送客逢春可自由此應上第二句幸不折来傷嵗暮若為看去亂鄉愁此應起句傷嵗暮亂鄉愁因梅之動興也江邊一樹垂垂發朝夕催人自白頭逢梅得詩彼此相憶交情可見返照比興格楚王宫北正黄昏白帝城西過雨㾗鄒氏曰此不特咏物而前四句托物引興返照入江翻石壁歸雲擁樹失山村此聫分應上二句以見題也衰年肺病惟髙枕絶塞愁時蚤閉門病時見返照則髙枕而巳愁時見返照則閉門而已不可乆留豺虎亂南方實有未招魂上句結傷時之意下句結自病之意後四句雖自為一意又句句照前後則末句生開題意尤為妙也送韋二少府逍遥公後世多賢送爾維舟惜别筵念我能書數字至將詩不及萬人傳後二句見少府之賢四句一意時危兵甲黄塵裏日短江湖白髪前此言别時之意髪一作鳥古往今來皆涕淚斷膓分手各風煙縂結上見别之意也秋夜連珠格露下天髙秋氣清空山獨夜旅魂驚呉氏曰此詩前後四句各意然細看之則空山秋氣獨宿實行乎其中踈燈自照孤帷宿新月猶懸雙杵鳴上句見獨宿下句見秋氣南菊再逢人卧病北書不至鴈無情上句甫自嘆之意猶見獨宿下句結憶舊之意猶見秋天步檐倚杖看牛斗銀漢遥應接鳯城上句接自歎下句結憶舊狂夫歸題格似而變前後相萬里橋西一草堂百花潭水即滄浪鄒氏曰此詩前四句一意復四句一意風含翠篠娟娟浄雨裛紅蕖冉冉香上言橋西草堂之景下言百花潭水之景厚禄故人書斷絶恒飢稚子色凄凉上句憶舊下句思家欲填溝壑惟踈放自笑狂夫老更狂上句終憶舊之意下句結思家之意呉氏曰此詩以狂夫為題前四句言疎狂之意後四句言思家憶舊之情狂中之窮愁也身且欲填溝壑而反踈狂盖其自歎也恨别一意格洛城一别四千里𦍑騎長驅五六年王氏曰上句起三聫别之之實下句起二聫别之之由草朩變衰行劔外兵戈阻絶老江邊王氏曰所以如此阻絶者皆𦍑騎長驅之故也因此相别耳思家步月清宵立憶弟看雲白日眠倒意句此一别四千里之實而其恨之深也聞道河陽近乗勝司徒急為破幽燕幽燕州名河陽地名司徒官名言别恨而去也盖幽燕羌騎之所也為破𦍑騎未得歸故鄉則見别意也暮登四安寺鐘樓寄裴十廸兩重格暮倚髙樓對雪峯僧来不語自鳴鐘王氏曰前四句言暮登樓也後四句言寄裴廸也孤城返照紅將斂近市浮煙翠且重言登樓也多病獨愁常閴寂故人相見未從容故人指裴廸也知君苦思縁詩瘦太向交㳺萬事慵結上二句意也野望變字格金華山北涪水西仲冬風日始凄凄呉氏曰明出山水二字以起二聫之句言仲冬以貫三聫之景山連越嶲蟠三蜀水散巴渝下五溪此應起句白鶴不知何事舞飢烏似欲向人啼此應第二句射洪春酒寒仍緑極目傷神誰為擕極目結山水傷神結凄凄誰為擕結春酒也閣夜前實後虚格嵗暮隂陽催短景天涯霜雪霽寒宵此言實景以起第二聫也五更鼓角聲悲壯三峡星河影動揺雪霽則鼔角聲悲壯三峡星河應寒宵此四句言景野哭千家聞戰伐𦍑歌幾處起漁樵此以嵗暮人事言之卧龍躍馬終黄土人事音書乆寂寥因嵗暮而感卧龍躍焉富貴皆空嘆巳之不遇證末聫謂人事音書乆寂寥者也宣政院退朝晩出左掖藏頭格天門日射黄金榜春殿晴熏赤羽旗此言宣政院之儀衛也宫草微微承委佩爐烟細細駐逰絲此言宣政院之景物也雲近蓬莱常五色雪晴鳷鵲亦多時侍臣緩步歸青瑣退食從容出毎遲前六句言侍朝之事此二句方言退朝晚出也題張氏隠居先體後用格春山無伴獨相求伐朩丁丁山更幽此前四句一意言隠居之景物也後四句一意言隠居之興味也言相求故取伐朩義澗道餘寒厯氷雪石門斜日到林丘言春山之景物而獨相求山更幽之意亦可見此四句言體也不貪夜識金銀氣逺害朝看麋鹿逰此隠居之由也乗興杳然迷出處對君疑是泛虚舟虛舟言外意也此四句言用事者也對酒城上春雲覆苑墻江亭晩色静年芳此二句一篇之綱領林花着雨臙脂濕水荇牽風翠帶長林花乃苑墻所見水荇乃江亭所見應起聫也龍武新軍深駐輦芙蓉别殿謾焚香上貼苑墻一句下貼江亭一句何時詔此金錢㑹暫醉佳人錦瑟旁小至天時人事日相催冬至陽生春又来此縂結後句刺繡五紋添弱線吹葭六琯動飛灰上句人事下句天時㟁容待臘將舒柳山意衝寒欲放梅此應第二句雲物不殊鄉國異教兒且覆掌中杯此結小至故以雲物結天時以鄉國結人事也贈田九判官崆峒使節上青霄河隴降王欵聖朝上句言田九入京一句指定宛馬縂肥春苜蓿將軍只數漢嫖姚陳留阮瑀誰争長京兆田郎早見招麾下賴君才並入獨能無意向漁樵此上句縂就田生結之下句甫欲田生薦巳也宿府清秋幕府井梧寒獨宿江城蠟炬殘起二聫也永夜角聲悲自語中天月色好誰看風塵荏苒音書絶闗塞蕭條行路難宿府感也巳忍伶俜十年事强移棲息一枝安縂結宿府冬至雙字起結格年年至日長為客忽忽窮愁泥殺人此以雙字起句而結則數目字也律詩多如此格江上形容吾獨老天涯風俗自相親至日為客之窮愁末言心折無一寸者盖為此也杖藜雪後臨丹壑鳴玉朝来散紫宸此甫自嘆為客尚思向時是至日朝覲也心折此時無一寸路迷何處見三秦或起雙字中間以數目字承之歴代詩話巻四十
