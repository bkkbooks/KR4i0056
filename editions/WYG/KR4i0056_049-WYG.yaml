body:
  text: 歴代詩話巻四十九歸安吳景旭撰庚集中之上唐詩琥珀冷齋夜話曰韋應物作琥珀詩云曽為老茯苓元是寒松液蚊蚋落其中千年猶可覿舊説松液入地千年所化令燒之尚作松氣嘗見琥珀中有物如蜂然此物自外國來地有茯苓處皆無琥珀不知韋公何以知之呉旦生曰通志云虎魄西域傳作虎魄蜀都賦作虎珀中有一蜂形色如生者可以拾芥名靈魄又老君玉䇿云松脂入地千年作茯苓茯苓千年作琥珀琥珀千年作石膽石膽千年作威喜神仙傳云琥珀一名江珠今泰山出茯苓而無琥珀益州永昌出琥珀而無茯苓清異録云琥珀孫松脂也本草松脂一名松膏一名松肪鄭嵎津陽門詩孔雀松殘赤琥珀注云世傳孔雀松下有赤茯苓入土千年則成琥珀廣雅云琥珀生地中其上及旁不生草深者八九尺大如斛削去皮成琥珀如斗大初時如桃膠堅凝乃成也李長吉詩桃膠迎夏香琥珀一云桃瀋入地所化又虎目光入地化物如琥珀又龍血入地所化金樓子云楓脂入地千嵗為琥珀爾雅翼云楓脂一名白膠香李長吉詩楓香晩花静博物志引神農本草云雞卵可作琥珀其法取伏卵毈黄白渾雜者煑及尚軟随意刻作物件以苦酒漬數宿既堅内着粉中佳者乃亂真矣通志云有煑青魚枕偽為之者南蠻記云寧州沙中有折腰蜂㟁崩則蜂出土人燒冶以為琥珀兎絲琥珀苖也晝公嬾真子曰呉興老釋子野雪盖精廬此蘓州招晝公詩即皎然也居於湖舊説皎然欲見韋蘓州恐詩體不合遂作古詩投之蘓州一見大不滿意繼而皎然復獻舊詩蘓州大稱賞曰幾悞失大名何不止以所長見示而輙希老夫之意呉旦生曰顧况劉長卿丘丹秦系皎然之儔得與蘓州相倡和故作詩招之也皎然姓謝氏靈運十世孫字清畫招之稱畫公字之也嘗論僧不當以字行按古者生子三日父名之二十而冠父字之所以表徳也禮所謂冠而字之敬其名也今僧棄父母屏妻子已絶子父之道頭童而不櫛不可冠何字之有魏鶴山云古人稱字者最不輕儀禮子孫於祖禰皆稱子孔門諸子多稱夫子為仲尼子思孫也孟子又子思弟子也亦皆稱仲尼羅大經謂魯哀公誄孔子亦曰尼父周益公謂夀皇毎稱東坡唯曰子瞻而不名盖重之也觀古今士大夫贈僧詩文每稱其字者非是陳眉公云稽山徹上人與道標皎然齊名呉人為之語曰餘杭標摩雲霄霅溪畫能清秀稽山徹洞氷雪字訛韋應物滁州西澗詩獨憐幽草澗邊行尚有黄鸝深樹鳴春潮帶雨晚來急野渡無人舟自横呉旦生曰此太清樓帖所刻手書也係蔡元長校鑒自属真本何元朗言憐草而行於澗邊當春深之時而黄鸝尚鳴始於性情有闗今本行作生尚作上則於我了無干涉矣楊升菴亦云生本作行上作尚見古法帖歐陽永叔云滁州城西乃是豐山無所謂西澗者獨城北有一澗極淺不勝舟又江潮不至胡元瑞謂宋人不知詩人遇興立言大則須彌小則芥子寧此拘拘也綵幟韋應物酒肆行云銀題綵幟邀上客呉旦生曰韓非子云宋人有酤酒者懸幟甚高斗槩甚平而酒不售遂至於酸唐韻帘字注云酒家望子容齋二筆云今都城與郡縣酒務及凢鬻酒之肆皆揭大帘於外以青白布數幅為之㣲者隨其高卑大小村店或挂缾瓢標箒秆唐人多咏於詩鳬舄猪肝獨孤及酬常郿縣詩謂乗鳬舄朝天子却媿猪肝累主人呉旦生曰風俗通後漢書皆言葉令王喬有神術毎月朔望常自縣詣䑓朝帝恠其來數而不見車騎宻令太史伺之言其至輙有雙鳬從東南飛來於是候鳬至舉羅張之但得隻舄焉乃詔上方諦視則四年中所賜尚書官屬履也毎當朝時葉門下皷不擊自鳴聞於京師喬卒百姓為立廟號葉君祠祈禱無不應若有犯亦能為祟帝乃迎取其皷置都亭下無復聲焉風俗通又云按左傳葉公子高忠於社稷萬民欣戴白公勝作亂子西等刼惠王以兵葉公自葉而入攻白公奔山而縊生烹石乞迎反恵王退而老於葉及其終也葉人立祠功施于民以勞定國兼兹二事固祀典之所先也此乃春秋之時何有近孝明乎國家畏天之威思求譴告故於上西門城上候望近太史寺令丞躬親靈䑓懼有得失所参之也何有伺一飛鳬遂建其處乎世之矯誣豈一事哉陳晦伯云此皆應劭説也范書愛竒遺其通義後人據以為縣令事矯誣抑又甚矣余觀李君實云人知葉令王喬之舄為雙鳬不知晉南海太守鮑靚之履為雙燕靚在南海時葛稚川隠羅浮靚毎宻過之談論達旦始去而門無車馬之跡獨雙燕徃還人恠而問之則其雙履也以鳬属令以燕属守特為拈出以丐脩詞者據此則仙靈幻跡世所常有一守一令徴為故實亦韻事也而執葉公以証葉令之非殊不必爾東觀漢記云閔仲叔居安邑家貧不能得錢買肉安邑令候之問諸子何飯食對曰但食豬肝屠者或不肯與之令出勅市後嘗輙得仲叔恠問其子道如此乃歎曰叔豈以口腹累安邑耶遂去輕煙本事詩曰韓翃閒居將十年李相勉鎮夷門又署為幕吏時韓已遲暮同職皆新進後生不能知韓舉目為惡詩韓邑邑殊不得意多辭疾在家唯末職韋廵官者亦知名士與韓獨善一日夜將半韋叩門急韓出見之賀曰員外除駕部郎中知制誥韓大愕然曰必無此事定悞矣韋就座曰留邸狀報制誥闕人中書兩進名御筆不㸃出又請之且求聖㫖所與徳宗批曰與韓翃時有與翃同姓名者為江淮刺史又具二人同進御筆復批曰春城無處不飛花寒食東風御栁斜日暮漢宫傳爉燭輕煙散入五侯家又批曰與此韓翃韋又賀曰此非員外詩也韓曰是也是知不悞矣呉旦生曰汝南先賢傳太原舊俗以介子推焚骸一月寒食世謂禁火起於此然按左傳但云與母偕隠而死史記但云亡入綿上山中並無焚骸之説異苑謂子推抱樹燒死晉文伐以製展有悲乎足下之語則誣甚矣丹陽記云龍星朩之位也春東方心為大火懼火盛故禁之是以寒食龍忌之禁所謂禁烟未必為子推設也按周書司烜氏仲春以朩鐸循火禁於國中注云為季春將出火也今準節氣寒食是仲春之末清明是季春之初則禁火乃周制矣但周制四時變火春取榆柳之火夏取棗杏之火季夏取桑柘之火秋取柞槱之火冬取槐檀之火今觀春明退朝録唐惟取榆栁火以賜近臣戚里之家君平詩煙散侯家盖紀實云按後漢禮儀志清明騎士傳火故君平云日暮漢宫也然觀子美清明詩朝來新火起又家人鑚火用青楓皆在寒食三日之後而君平寒食即事乃云傳燭散煙則不待清明而已傳新火何耶按後漢書周舉傳云太原郡舊俗以介子焚骸有龍忌之禁至其亡月咸言神靈不樂舉火莫敢煙㸑嵗多死者周舉為刺史作書置子推之廟言盛寒去火殘損民命非賢者意今則三日而已宣示愚民使還温食桓譚新論云太原民隆冬不火食為子推也則是寒食乃在冬中非今二三月間也琴操又謂子綏燒死文公令民五月五日不得發火其説皆殊按淮南要畧云操舍開塞各有龍忌注中土以鬼神之亡日忌北幽南越皆謂之請龍人參韓翃詩應是人參五葉齊呉旦生曰續博物志髙麗人參賛云三椏五葉背陽向隂欲來求我椵樹相尋椵音賈朩葉似桐甚大隂廣參多生其隂叚成式求人參詩九莖仙草真難得五葉靈根許恵無皮襲美謝恵人參詩神草延年出道家是誰披露記三椏蘓東坡次韻正輔詩細斸黄土栽三椏皆用賛語也坡自注云正輔分人參歸種韶陽來詩本用䃁字惠州無書不見此字所出故且从朩奉和説文作人葠字書作蓡或作蔘參李君實雜綴云人參名人蓡寖者漸漬之義以其得地氣浸漸成長如人形故也又名人㣲亦㣲漸之意一名黄參以其得土膏土色属黄又名人御以其生有階級又名鬼盖以其生背陽向隂又有神草地精海腴之目大約標其滋益於人耳海録碎事云天狗人參也春秋斗運樞云揺光星散為人參廢江淮山瀆之利則揺光不明人參不生按三月生葉小花核黒莖有毛九月採根有頭足手靣目如人亦可収子於十月下種如種菜法生上黨山谷者最良遼東次之高麗百濟又次之潞州紫團山與太行相連出參名紫團參即上黨也周繇以人參遺成式詩人形上品傳方志我得真英自紫團擅塲國史補曰郭曖尚昇平公主盛集文士即席賦詩公主帷而觀之李端中宴詩成有薰香荀令偏憐小傅粉何郎不觧愁之句衆稱絶妙或謂宿搆端曰願賦一韻錢起曰請以起姓為韻復有新開金埒看調馬舊賜銅山許鑄錢之句曖大喜出名馬金帛為贈是㑹也端擅塲送丞相王縉之鎮幽朔韓翃擅塲送丞相劉晏之巡江淮錢起擅塲呉旦生曰唐人讌集每賦詩必推一人擅塲此其例也寳厯中楊於陵僕射入覲其子嗣復率兩榜門生迎於潼闗宴新昌里第諸生翼兩序元白在席楊汝士詩云文章舊價留鸞掖桃李新隂在鯉庭元白覽之失色汝士歸謂子弟曰今日壓倒元白又裴令公居守東洛宴酣索句公為破題次至汝士云昔日蘭亭無艶質此時金谷有高人白遽裂之曰笙歌鼎沸勿作冷澹生活元顧曰樂天能全其名此二則亦不得不推擅塲皇甫百泉舉高氏晦日林亭㑹崔劉二詩何足與此栁塘花塢聖俞曰若夫狀難寫之景含不盡之意如嚴維栁塘春水慢花塢夕陽遲則天容時態融和駘蕩豈不在目前乎呉旦生曰陳隨隠亦云春物融冶人心和暢言不能盡余謂此煉第五字法也以慢字狀春水遲字狀夕陽滿前化工矣却從栁花帶出見全是三春景象則摹神在慢與遲設色在栁與花字字雅貼無可復議劉貢父詩話云夕陽遲則繫花春水慢不須栁漁隠樷話云春水慢不須栁此真確論但夕陽遲則繫花此論非是盖夕陽遲乃繫於塢初不繫花以此言之則春水慢不必柳塘夕陽遲豈獨花塢哉余以論詩拘泥至此直令千古竒致一齊抹煞惡極惡極獨眠顧况詩服藥不如獨自眠呉旦生曰列仙傳彭祖姓苑云姓籛名鏗籛音翦云上士别牀中士異被服藥百裹不如獨睡古今諺云服藥千裹不如一宵獨卧服藥千朝不如獨卧一宵顧退翁詩用此也陸放翁詩九十老翁縁底健一生强半是單棲亦此意古今説海云包宏齋恢年八十有八陪祀豋拜郊臺賈秋壑問其必有衛飬之術答曰有一服丸子藥乃不傳之秘秋壑欲授其方徐徐笑曰恢喫五十年獨睡丸按退翁改字逋翁志尚踈逸近於方外時宰招以好官翁答詩云此身還似籠中鶴東望瀛洲呌一聲遂隠于茅山菖蒲潭石墨池上年九十卒呉中皆言翁得道尸觧音假去則獨眠之句自是神仙種子也然觀彭鏗進雉羮於堯後隠雲母山飡雲母又為商大夫路史稱其夀七百六十七嵗胡為乎更厯四十九妻五十四子而究敗道於妖淫晩娶之鄭氏抑又何説耶北史邢子才傳云邵率情簡素内行修謹與婦甚疎未嘗内宿嘗云晝入内閤為狗所吠言畢撫掌大笑然於崔㥄傳載㥄寵妾馮氏長且姣朝士邢子才輩多姦之則所云内閤狗吠者何在殆與老彭之言獨睡同一疑案矣郎罷顧况有詩云郎罷别囝囝别郎罷及至黄泉不得在郎罷前呉旦生曰閩中風俗呼父為郎罷罷音擺呼子為囝囝音蹇退翁作補亡訓傳十三章因唐世多取閩童為閹奴故為哀囝之詞取此方言以諷焉山谷送陳少章住餘杭從蘓公詩云斑衣兒啼真自樂從師學道也不惡但使新年勝故年即如常在郎罷前唐子西詩兒餒嗔郎罷宋子虚詩郎罷滕隂老淚澘皆用退翁語北史謂父為鮮甲呉人呼父曰爸音覇訛而為拜平聲唐小説爹字作㸙或又為音播通鑑回紇呼父曰阿多北史謂母為鐵弗淮南子注江淮謂母為社説文江淮之間謂母曰媞方言南楚瀑洭之間母謂之媓集韻淮南呼母曰媣呉俗呼母曰㜆音寐訛如埋齊人呼曰阿㜷音迷字又作又曰嬭音膩字又作㚷客座贅語留都呼母曰字或作􅐣又作􅐣俱音麽羌人呼母曰毑音姐字又作她閩人曰郎奶困學紀聞云集韻呉人謂赤子曰孲􅀈音鴉牙雜記注嬰猶鷖彌也孟子音義倪謂繄倪小兒也萎蕤宛轉顧况詩春樓不閉萎蕤鎖緑水廻通宛轉橋呉旦生曰録異記萎蕤鎖金樓相連屈伸在人詩話類編云唐詩望見葳蕤舉翠華葳㽔旗名鹵簿中有之孫氏瑞應圖云葳蕤瑞草王者禮備至則生今之字書例觧為草朩之狀未得其原也輿地志云齊文恵太子治𤣥圃有明月觀宛轉橋徘徊廊麴塵西溪樷語曰劉禹錫龍墀遥望麴塵絲禮記月令薦鞠衣于上帝告桑事注云如鞠塵色周禮内司服鞠衣鄭司農云鞠衣黄桑服也色如鞠塵象桑葉始生漁隠樷話曰鞠者草名花色黄遂以麴塵為鞠塵其説非是呉旦生曰埤雅云周官后蠶服鞠衣鞠衣色黄象鞠鞠盖華於隂中其華則又中之色也后帥内外命婦而蠶則使天下之嬪婦取中焉則鞠之花色黄固自無論如金人劉無黨詩麴塵半著鴛鴦繡乃專言服色也今按禹錫句乃其所作楊栁枝辭也楊巨源亦有江邊楊柳麴塵絲之句乃是借色字與太白之黄金嫩荆公之鵞黄裊裊同意即作鞠塵亦通况白樂天詩晴沙金屑色春水麴塵波汪彦章詩細細麴塵波毛文鍚詞垂楊低拂麴塵波亦可以水言之吳文可詩云麴塵絲拂晴波暖是又栁與水映帶言之矣餳劉賔客嘉話録曰為詩用僻字須有來處宋考功詩馬上逄寒食春來不見餳嘗疑此字因讀毛詩鄭箋説吹簫處云即今賣餳人家物六經惟此注中有餳字後軰業詩即須有據不可學常人率爾而道韻語陽秋云禹錫厯陽書事詩湖魚香勝肉官酒重於餳則何嘗按六經所出耶呉旦生曰周禮小師掌教簫注云簫編小竹管如今賣飴餳者所吹也詩簫管備舉鄭箋與周禮注同按釋文餳夕精反又音唐方言餳謂之餹凢飴謂之餳自闗而東陳楚宋衛之通語也釋名餳洋也煮米消爛洋洋然也樊鯈傳三嵗獻甘醪膏餳鄴中記云并州之俗冬至一百五日為冷節作乾粥即今麥餻也世俗毎至清明以麥成秫以杏酪煑為薑粥俟凝冷裁作薄葉沃以餳若蜜而食之謂之麥糕李義山詩粥香餳白杏花天宋子京詩簫聲吹暖賣餳天又客甌餳粥對離中歐陽永叔詩杯盤餳粥春風冷又多病止愁􅄳粥冷蘓長公詩温風散粥餳盖清明寒食多用之矣糕聞見後録曰劉夢得作九日詩欲用糕字以六經中無之輙不復為宋子京以為不然特於九日詩中用糕字為古今絶唱詩云飈舘輕霜拂曙袍糗餈花飲鬬分曹劉郎不敢題糕字空負詩中一世豪呉旦生曰周禮籩人羞籩之實糗餌粉餈鄭箋云二物皆粉稻黍米所為合蒸曰餌餅之曰餈盖餌即餻也賈佩蘭説宫中九月九日食蓬餌令人長夀方餌謂之餻或謂之粢或謂之􅀈或謂之餣或謂之䬧嵗時記民間九日餻上置小鹿數枚號食禄高字學集要云餻亦作糕􅀈􅀈鶴林玉露云白樂天詩移坐就菊叢餻酒前羅列則固已用之矣劉白唱和之時不知曽談及此否余因攻樂天詩宜城酒似餳黏䑓酒似餳緑餳黏盞杓如餳氣味緑黏䑓則禹錫之疑字豈倡和時亦未談及耶山圍潮打劉禹錫金陵五題自序云山圍故國周遭在潮打空城寂寞廻淮水東邊舊時月夜深還過女墻來樂天掉頭苦吟歎賞良乆曰石頭詩潮打空城寂寞廻吾知後之詩人不復措辭矣呉旦生曰張表臣述其自矜云餘雖不及然亦不辜樂天之賞則禹錫亦不復許後人措辭矣觀東坡詩山圍故國城空在潮打西陵意未平薩天錫登鳯凰䑓詩千古江山圍故國幾番風雨入空城皆落牙後正為浪措辭也而天錫招隠首山又云千古江山圍故國五更風雨入空城奈何復自拾其瀋耶亥夢得送人赴絳州詩午橋羣吏散亥字老人迎呉旦生曰左傳師曠釋絳縣老人年數云亥有二首六身盖離折亥字㸃畫而上下之如筭籌縱横然則二首為二萬六身各一縱一横為六千六百六十正合其甲子之日數乃是七十三年也楊巨源送絳州盧使君詩絳老問年須筭字庚公逢月要題詩李義山贈絳䑓老驛吏詩過客不勞詢甲子惟書亥字與時人張伯雨元日詩問年書亥字獻嵗出辛盤西溪樷語載絳縣老人云臣生之嵗正月甲子朔四百有四十五甲子矣其季於今三之一也季者未也今今日也謂已得四百四十五全甲子其末一甲子六十日而今日乃癸未纔得二十日也故曰三之一文公之十一年至襄公三十年通七十四年以年表考之文公之十一年嵗在已已襄公之三十年嵗在戊午今乃云七十三年者盖謂襄公之三十年上距文公之十一年得七十三年也所謂亥二首六身者注云亥字二畫在上併三六為身如筭之六盖古之亥字如此二多寫故曰二首六身其下六畫如筭子三個六數也所謂下二如身是其日數則六千六百六旬也故曰是日數也且四百四十五甲子合得二萬六千七百日乃差四十日則前所謂其季於今三之一謂其末一甲子纔得二十日故少四十也且不謂之日而謂之旬者盖古以甲子數日故謂之旬如今隂陽家所謂甲子旬中甲午旬中之類是也與書朞三月有六旬同平淮西全唐詩話載劉禹錫曰栁八駁韓十八平淮西碑云左飱右粥何如我平淮西雅云仰父俯子韓碑兼有㡌子使我為之便説用兵伐叛矣自為詩云城中晨雞喔喔鳴城頭皷角聲和平美愬之入蔡城也須㬰之間賊無覺者又落句云始知元和十二載重見天寳昇平時以見平淮之年呉旦生曰隠居詩話禹錫稱城中二句為盡李愬之美始知二句為盡憲宗之美吾不知此句為何等語野客樷書云禹錫城中二句見李愬不動風塵曉入蔡州擒捕渠魁如此始知二句見憲宗當徳宗姑息藩鎮之後能毅然削平祻亂使人復見太平官府如此此兩聫正得當時之意余詳禹錫詩中歸美李愬其沾沾自喜或有微意觀唐史云退之淮西碑多歸裴度功李愬妻唐安公主不平訴之於帝謂愈文不實遂斵其碑更命叚文昌為之則禹錫之自許有以也丁用晦芝田録云有老卒推倒淮西碑羅隠石烈士説云石烈士名孝忠嘗為李愬前驅一日熟視裴碑作力推去韻語陽秋云愬之子訟於朝憲宗使文昌别作李義山詩云句竒語重喻者少讒之天子言其私長繩百尺拽碑倒麤沙大石相磨治則是天子自使人拽倒詩話東坡謫官過舊驛壁間見有人題一詩云淮西功業冠吾唐吏部文章日月光千古斷碑人膾炙世間誰數段文昌坡喜而誦之余按此東坡自作盖避忌而托之人題耳坡在翰林被㫖作上清儲祥宫碑哲宗親書其額紹聖黨禍起磨去坡文命蔡元長别操則此詩直是坡自况也霓裳羽衣曲太真外傳曰霓裳羽衣曲者是𤣥宗登三鄉驛望女几山所作也故劉禹錫有詩云伏覩𤣥宗皇帝望女几山時小臣斐然有感開元天子萬事足惟惜當時光景促三鄉驛上望仙山歸作霓裳羽衣曲仙心從此在瑶池三清八景相追隨天上忽乗白雲去世間空有秋風詞呉旦生曰此曲攸始載者異辭如六一詩話載王建霓裳詞弟子部中留一色聴風聴水作霓裳不知聴風聴水為何事也白樂天有霓裳歌亦無風水之説余觀西域記云龜兹國王與臣庻知樂者於大山間聴風水之聲均節成音後翻入中國如伊州凉州甘州皆龜兹至也鄭嵎津陽門詩注云葉法善引上入月宫時秋已深上苦凄冷不為乆留歸於天半間尚聞仙樂及上歸記憶其半遂於笛中寫之㑹西凉都督楊敬述進婆羅門曲與其聲調相符遂以月中所聞為之散序用敬述所進曲作其腔而名霓裳羽衣法曲逸史云羅公逺八月十五夜取一枝桂向空擲之化為橋請上同登至大城闕曰月宫仙女數百素練寛衣舞于黄庭上問此何曲曰霓裳羽衣也上宻記其聲調諭伶官作霓裳羽衣曲津陽門詩注明皇録高道傳皆云葉法善引遊月宫唐逸史云與羅公逺同逰異人録云與申天師同遊西清詩話云唐有兩霓裳曲開成初尉遲璋嘗放古作霓裳羽衣曲以獻詔以曲名賜貢院為題此自一曲也是嵗榜首李肱所試詩即此題其詩始言開元太平時萬國賀豐嵗梨園獻舊曲玉座流新製末言蓬壺事巳空仙樂功無替詎肯聴遺音聖功知善繼則亦是祖述開元遺聲耳此曲世無譜好事者每惜之江表志載周后獨能按譜求之徐常侍鉉有聴霓裳送以詩云此是開元太平曲莫教編作别離聲則江南時猶在也韻語陽秋云白樂天答元㣲之歌蘓州七縣十萬户無人知有霓裳舞惟寄長歌與我來題作霓裳羽衣譜想其千姿萬狀綴兆音聲具載於長歌惜元集不載頼有白詩可見一二爾虹裳霞帔步揺冠細纓纍纍佩珊珊言所飾之服也又曰散序六奏未動衣中序擘騞初入拍繁音急節十二遍唳鶴曲中長引聲言所奏之曲也而唐㑹要謂破陣樂赤白桃李花望瀛霓裳羽衣搃名法曲今世所傳望瀛亦十二遍散序無拍曲終亦長引聲亦可彷彿其遺意也又曰由來此舞難得人須是傾城可憐女言所用之人也若曰玉鈎欄下香案前案前舞者顔如玉則疑用一人若曰張態李娟君莫嫌亦疑隨宜且教取又疑用二人然明皇毎用楊太真舞故長恨詞云風吹仙袂飄飄舉猶似霓裳羽衣舞當以一人為正夢溪筆談云國史補言客有以按樂圖示王維維曰此霓裳第三疊第一拍也客未然引工按曲乃信此好竒者為之盖霓裳曲凡十三疊前六疊無拍至第七疊方謂之疊遍自此始有拍而舞作故白樂天詩中序擘騞初入拍中序即第七疊也第三疊安得有拍但言第三疊第一拍即妄也烏衣青瑣摭遺曰王榭金陵人一日海中失船泛一朩登㟁見一翁一嫗皆衣皂乃烏衣國也以女妻之榭思歸復乘雲軒泛海至其家有二燕棲梁上榭招止臂上書小紙繫其尾曰誤到華胥國裏來主人終日苦憐才雲軒飄去無消息洒淚臨風幾百回來春燕又飛榭身上有詩云昔日相逢真數合如今暌逺是生離來春縱有相思字三月天南無鴈飛因目榭所居為烏衣巷劉禹錫有詩云朱雀橋邊野草花烏衣巷口夕陽斜舊時王謝堂前燕飛入尋常百姓家呉旦生曰丹陽記烏衣之起呉時烏衣營處所也江左初立琅邪諸王所居輿地志晉時王導自立烏衣宅世説王公謂吾角巾徑還烏衣僉陵舊事謝鯤與族子靈運瞻曜洪㣲並以文義賞㑹居在烏衣巷謂之烏衣游鯤詩云昔為烏衣游戚戚皆子姪禹錫所咏盖指江左王氏謝氏二族之盛第宅丘墟故有舊時王謝之感若指泛海烏衣事何以言尋常百姓耶元張思亷子夜歌云朱雀街頭雨烏衣巷口風飛來雙燕子不入景陽宫按朱雀橋即在烏衣巷口也故咏金陵者毎連舉之野客叢書云王謝與王榭相類而又有烏衣之名或者徃徃誤焉張仲均家有陳唯室親染此詩謝字從言盖此也呉曽澷録藝苑雌黄所説正合輕車劉夢得送渾大夫赴豐州詩精兵願逐李輕車呉旦生曰漢武帝元朔五年以代相李蔡為輕車將軍有功封樂安侯乃李廣之從弟故稱李輕車鮑昭樂府云後逐李輕車許渾詩昔事李輕車張光弼詩將軍須用李輕車後漢輿服志云輕車古之戰車也不巾不盖孔叢子巾車命駕注云以衣飾車也按韻㑹輕牽正切疾也左傳昭公二十五年注左師展欲與公俱輕歸輕遣政反漢書發輕騎夜追之亦音罄今唐元人詩皆作平聲用似失本㫖漢夀劉夢得漢夀城春望詩漢夀城邊野草春荒祠古墓對荆榛呉旦生曰郝天挺注城在四川保寧府今廣元縣程篁墩謂漢夀縣名在犍為即今之叙州府禹貢潜水注水出岷山之西東流過漢夀南流有高山上合下開水經其中曰沫水又複水從漢中沔陽縣南流至梓潼漢夀縣三國史云費褘遇害于漢夀又建安五年曹操表闗某為漢夀亭侯則是漢夀為封地而亭侯為封爵之通稱也㑹典稱之為夀亭侯是悞以漢為國號而以夀亭為封地矣漢法十里一亭十亭一鄉亭留㑹宿之處也凡封侯初封亭侯即秦亭長之遺生宋景文筆記曰晏元獻常問曽明仲云劉禹錫詩瀼西春水縠紋生生字作何意明仲曰作生育之生丞相曰非也作生熟之生語乃健莊子曰生熟不盡于前王建詩自别城中禮數生呉旦生曰卲氏聞見後録汪彦章詩野田無雨出龜兆湖水得風生縠紋此以生對出則作生長之生矣豈不聞元獻之説耶楊升菴亦以元獻之説為信是謝眺詩逺樹曖芊芊生煙紛漠漠亦然小謝之句實本靈運靈運撰征賦云披宿莽以迷徑覩生煙而知墟余觀白樂天詩絃生管澁未堪聴熊孺登詩水生風熟布㠶新楊㢘夫續奩集有咏習舞云十六天魔教已成背翻蓮掌苦嫌生夜深不管排塲歇尚向燈前蹋影行皆用此生字又蔡敬夫詩花心猶怯怯鶯語乍生生其於疊字更峭賔鴻䂬溪詩話曰東坡云賔鴻社燕巧相違月令來賔事嘗疑人未曽用及觀劉夢得秋江晩泊云暮霞千萬狀賔鴻次第飛顧况云安得凌風翰肅肅賔天京又别浦鴈賔秋更佳呉旦生曰月令八月鴻鴈來九月鴻鴈來賔周書白露之日鴻鴈來寒露之日又來既是一種何得前後不齊如此許叔重注二鴈則以仲秋之鴈從北地中來過周雒南去至彭蠡季秋之鴈亦從北地中來南之彭蠡以為八月來者其父母也是月來者其子也羽翼稚弱故在後耳禮云仲秋來者為主季秋來者為賔也困學紀聞云時訓月令七十二侯鴈凢四見孟春鴻鴈來夏小正曰鴈北鄉吕氏春秋淮南時則訓曰候鴈北月令注今月令鴻皆為候而不言北盖來字本北字康成時猶未悞故曰鴈自南方來將北反其居其後傳寫者因仲秋鴻鴈來悞以北為來仲秋鴻鴈來吕氏淮南曰候鴈來季秋鴻鴈來賔爵入大海為蛤小正曰九月遰鴻鴈吕氏淮南曰侯鴈來高誘許叔重注以候鴈來為句賔爵老爵也栖宿人堂宇之間有似賔客故曰賔爵季冬鴈北鄉小正在正月易説在二月正義謂節氣有早晚可中劉禹錫生公講堂詩高坐寂寥塵漠漠一方明月可中庭呉旦生曰舊言宋文帝大㑹沙門食至良乆衆疑日過中僧律不當食帝曰始可中耳生公曰白日麗天天言可中何得非中遂舉箸而食禹錫即以生公事咏生公堂也余又按僧規以六時經行曰幽谷時寅也高山時卯也日照高山平地時辰也可中時已也正中時午也鹿苑時未也張喬詩猶向山中禮六時劉長卿詩六時行徑空秋草是也則可中本出釋語洪駒父詩話云山谷至廬山一寺因舉此詩云一方明月可中庭一僧率爾云何不曰一方明月滿中庭山谷笑去畬田劉夢得竹枝辭云銀釧金釵來負水長刀短笠去燒畬呉旦生曰談苑江南人多畬田先熂爐熂音餼熂縱火燒草也爐火燒山界也俟經雨乃下種厯三嵗土脉竭不可復種藝但生草朩復熂旁山詞林海錯云燒田而種曰疁故野燒曰疁火疁音留宋西陽王子尚所部鄞縣有疁田子尚言山湖之俗熂山封水澤山須熂爐後種又夢得適連州作畬田詩何處好畬田團團縵山腹下種暖灰中乘陽拆芽蘖蒼蒼一雨後苕頴如雲發李文饒嶺南道中詩五月畬田収火米則不獨江南為然矣爾雅一嵗曰菑二嵗曰新三嵗曰畬羊諸反易曰不菑畬説文菑不耕田也从艸甾徐鍇曰當言从艸从从田田不耕則艸塞之故从音灾則凡三嵗而不可復種盖取畬之義也重用字夢得贈樂天中兩聫云雪裏高山頭早白海中仙果子生遲于公必有高門慶謝守何煩曉鏡悲呉旦生曰夢得自注高山本高高門使之高二字為義不同三山老人語録云樂天寄劉詩有歎早白無兒之語劉以此詩贈之自注二高字唐人忌重疊用字今人則疊用字甚多楊升菴謂此類為傍犯之例謝茂秦謂兩聫最忌重字或犯首尾可矣子美江閣邀賔許馬迎醉於馬上徃來輕摩詰尚衣方進翠雲裘萬國衣冠拜冕旒二公重字不害為大家東坡送江公著詩云忽憶釣臺歸洗耳又云亦念人生行樂耳自注二耳義不同故得重用因按古人一字二義徃徃重押如古詩晨風懐苦心蟋蟀傷局促又云音响一何悲絃悲知柱促曹子建美女篇明珠交玉體珊瑚間朩難又云佳人慕高義求賢良獨難謝靈運初去郡詩或可優貪競豈足稱達生又云畢娶類尚子薄遊似邴生陸士衡豫章行泛舟清川渚遥望江山隂又云寄世將幾何日昃無停隂江淹雜體詩韓公淪賣藥梅生隠市門又云太平多歡欵飛盖東都門王仲宣從軍詩連舫踰萬艘帶甲千萬人又云我有素餐責誠愧伐檀人至唐時效此重押者不一而老杜之詩尤多細腰劉禹錫踏歌行云為是襄王故宫地至今猶自細腰多呉旦生曰南楚謂細腰曰嫢音惟野客叢書據傳曰楚王好細腰宫中多餓死荀子乃曰楚王好細腰故朝有餓人淮南子亦曰靈王好細腰民有殺食而自飢也人君好細腰不過宫人豈欲朝臣與國人皆細腰乎余觀墨子載靈王好細腰故其臣皆三飯為節脇息然後帶縁墻然後起韓非子載莊王好細腰一國皆有饑色當時子書不言宫中而言朝與野率有此謬今禹錫詩作襄王亦謬文苑瀟湘曰夢得用字極謹嚴然其答樂天而有筆底心猶毒杯前膽不呼闗反此何謂也呉旦生曰漢皋詩話趙勰有吞舡酒膽弱之句禮部韻不収唐韻亦無西溪樷語云集韻在山字韻音乎闗切頑也元和脚楊升菴曰栁宗元詩栁家新様元和脚言字變新様而脚則元和也脚盖懸針垂露之體耳呉旦生曰此劉賔客答栁儀曹詩而升菴直以為栁詩悞矣復齋謾録云子原寄劉夢得詩書成欲寄庾安西紙背應勞手自題聞道近來諸子弟臨池尋已厭家雞盖其家有右軍書毎紙背庾翼題云王㑹稽六紙其詩謂此也故夢得有酬家雞之贈乃答前詩也其中有栁家新様元和脚人竟不曉高子勉舉以問山谷山谷云取其字製之新昔元豐中晁無咎作詩文極有聲陳無已戯之曰聞道新詞能入様相州紅纈鄂州花盖相纈織鄂州花也則栁家新様元和脚者其亦此類歟頃見徐仙者效山谷書而無已以詩紀之曰肯學黄家元祐脚則知山谷之言無可疑最後見東坡栁氏求筆迹詩君家自有元和手莫厭家雞更問人其義相同但手字為異耳蔡寛夫詩話云栁子厚書跡江湘間多有其碑刻而體不一或疑有假托其名者惟南岳彌陀和尚碑最善大抵規模虞永興矣然不知栁家新様元和脚者何如也天中記作柳公權在元和間書有名故劉禹錫有此詩恐悞石皷韻語陽秋云左傳周成王蒐於岐陽而韓退之石皷歌則曰宣王所謂宣王憤起揮天戈蒐於岐陽騁雄俊是也韋應物石皷歌則曰文王所謂周文大獵岐之陽刻石表功何煒煌是也歐永叔云前世所傳古逺竒恠之事類多虚誕而難信况傳記不載不知韓韋二君何據而有此説也呉旦生曰帝京景物略云廟門内之石皷也其質石其形皷其高二尺廣徑一尺有竒其數十其文籕其辭誦天子之田初潜陳倉野中唐鄭餘慶取置鳯翔之夫子廟而亡其一皇祐四年向傅師得之民間十數乃合宋大觀二年自京兆移汴梁初置辟雍後保和殿嵌金其字隂錯錯然靖康二年金人輦至燕剔取其金置皷王宣撫家復移大興府學元大徳十一年虞集為大都教授得之泥草中始移國學大成門内左右列矣掲曼碩詩孔廟頽墻下周宣石皷眠揭與虞同時此正大徳間詩也謂周宣王之皷韓愈張懐瓘竇臮也謂文王之皷至宣王刻詩焉韋應物也謂秦氏之文宋鄭樵也謂宣王而疑之歐陽脩也謂宣王而信之趙明誠也謂成王之皷程琳董逌也謂宇文周作者馬子卿也據今搨本則甲皷字六十一乙皷字四十七丙皷字六十五丁皷字四十七戊皷字一十二已皷字四十一庚皷字八壬皷字三十八癸皷字六共三百二十五字存惟辛皷字無存者金石錄云石皷文世傳周宣王刻石史籀書集古録云至於字畫亦非史籀不能作東觀餘論云筆法如圭璋特達非後人所能贗作聴琴西清詩話曰三呉僧義海以琴名世六一居士嘗問東坡琴詩孰優東坡答以退之聽穎師琴公曰此祗是聼琵琶耳或以問海海曰歐陽公一代英偉然斯言悞矣眤眤兒女語恩怨相爾汝言輕柔細屑真情出見也劃然變軒昻勇士赴敵塲言精神餘溢竦觀聴也浮雲栁絮無根蔕天地濶逺隨飛揚言縱横變態浩乎不失自然也喧啾百鳥羣忽見孤鳯凰又見脱穎孤絶不同流俗下里聲也躋攀分寸不可上失勢一落千丈强言起伏抑揚不主故常也皆指下絲聲妙處惟琴為然琵琶格上聲烏能爾耶呉旦生曰許彦周謂浮雲柳絮無根蔕天地濶逺隨飛揚此泛聲也謂輕非絲重非朩也啾啾百烏羣忽見孤鳯凰泛聲中寄指聲也躋攀分寸不可上吟繹聲也失勢一落千丈强順下聲也合參二氏得琴之理得詩之神然彦周更沈着矣義海又論東坡聴維賢琴詩云春温㢘折亮以清絲聲皆然何獨琴也又特言大小絃聲不及指下之韻牛鳴盎中雉登朩槩言宫商耳八音皆然豈獨絲也以為坡未知琴然余觀坡之論中㪚琴賦云間遼故音痺絃長故㣲鳴所謂痺者猶今俗云㪇音鮮聲也兩絃之間逺則有㪇故曰間遼絃鳴云者今之所謂泛聲也絃虛而不按乃可按故云絃長而㣲鳴也此豈未知琴者潜蛬韓退之詩幽響泄潜蛬呉旦生曰蛬音拱又居用切一作爾雅云蟋蟀也埤雅云隂陽率萬物以出入至於悉􅢊能帥隂陽之悉者也詩義問云蟋蟀食蠅而化一名趣織語曰趣織鳴孏婦驚一名蜻蛚里語云蜻蛚鳴衣裘成方言南楚之間謂之蚟孫雜見諸書者曰吟蛩曰蛩秋曰投機曰紡緯曰絡緯袁瓘秋日詩芳草不復緑王孫今又歸人都不解施䕃曰王孫蟋蟀也帝京景物畧云秋七八月游閒人提竹筒過籠銅絲罩詣藂草處缺墻頽屋處甎甓土石堆磊處側聴徐行若有遺亡跡聲所縷發而穴斯得乃掭以尖草不出灌以筒水躍出矣視其躍狀而佳逐且捕之捕得色辨形辨之辨審飬之飬得其性若氣試之試而才然後以鬬促織經曰蟲生於草土者身軟磚石者體剛淺草瘠土者性和磚石深坑及地陽向者性劣若是者穴辨凢促織青為上黄次之赤次之黒又次之白為下號紅麻頭白麻頭青項金翅金絲額銀絲額上也黄麻頭次也紫金黒色次也若是者色辨首項肥腿脛長背身濶上也不及斯次反斯下也其號之油利撻蟹殻青棗核形土蜂形金琵琶紅沙青沙紺色為一等長翼梅花翅土狗形螳螂形飛鈴為一等皂雞蝴蝶形杳獅子為一等若是者形辨飬有飼焉有浴焉有病用醫焉饅魚稻撮蟲水蜘蛛匾擔蟲溝紅蟲蠏白栗黄米飯食養也榨小青蟲汁而糖調之以浴隨净甜水以滌水養也蟲病而治之水畔紅蟲主積食蚊帯血者主冷蛆蜕厠上曰棒槌蟲主熱粉青小青蝦主鬬後自然銅浸水㸃者主鬬損茶薑㸃者主牙損童便調蚯蚓糞㸃者主咬傷竹蝶主氣弱蜂主身瘕醫養也如是促織性良氣全矣中則有材焉者間試而亟蓄其鋭以待鬬初鬬蟲主者各内蟲乎比籠身等色等合而内乎鬬盆蟲勝主勝蟲負主負勝者翹然長鳴以報其主然必無負而偽鳴與未鬬而已負走者其収辨其飬素其試審也蟲鬬口者勇也鬬間者智也鬬間者俄而鬬口敵蟲弱也鬬口者俄而鬬間敵蟲强也閔景賢觀鬬蟋蟀歌云戰勝長鳴鳴以股主人奪采盆安堵保抱小蟲歌大武指盆笑謂將軍府用韻六一居士詩話曰退之工於用韻盖其得韻寛則波瀾横溢泛入旁韻乍還乍離出入回合殆不可拘以常格如此日足可惜之類是也得韻窄則不復旁出而因難見巧愈險愈竒如病中贈張十八之類是也嘗與聖俞論此謂譬如善馭良馬者通衢廣陌縱横馳逐惟意所之至於水曲蟻封疾徐中節而不少蹉跌乃天下之至工也呉旦生曰西清詩話秦漢已前字書未備既多假借而音無反切平仄皆通用自齊梁後槩拘以四聲又限以音韻故士率以偶儷聲病為工文氣安得不卑弱惟陶淵明韓退之擺脱拘忌皆取其傍韻用盖筆力自足以勝之學林新編又引此謂字有通作他聲押韻者於古詩則可若於律詩則謂之落耳餘冬序録乃云秦漢已前韻有平仄皆通用者古韻應爾豈為字書未備淵明退之集多用古韻淵明潠下田舍與退之元和聖徳此日足可惜之類於古俱是一韻何傍之有六一所謂傍韻就今韻而言非謂其兼取於彼此也緗素雜記云世俗相傳古詩不必拘於用韻予謂不然如杜少陵早發射洪縣南途中作及字韻詩皆用緝字一韻未嘗及外韻也及觀東坡與陳季常汁字韻一篇詩而用六韻殊與老杜異其他側韻詩多如此以其名重當世無敢疵議至荆公則無是弊矣其得子固書因寄以及字韻詩其一篇中押數韻亦止用緝字一韻他皆類此正與老杜合漁隠樷話云黄朝英之言非也老杜側韻詩何嘗不用外韻如戲呈元二十一曹長未字韻一篇詩而用五韻南池谷字韻一篇詩而用四韻客堂蜀字韻一篇詩而用三韻其他如此者甚衆今若以一篇詩偶不用外韻遂為定格則老杜何以謂之能兼衆體也黄既不細考老杜諸詩又且輕議東坡尤為可笑六一謂韓退之得韻寛則不復傍出退之用韻猶能如此孰謂老杜反不能之是又非黄所能知也訓子冷齋夜話曰予嘗熟味退之詩真出自然其用事深宻高出老杜之上如符讀書城南詩少長聚嬉戲不殊同隊魚又腦脂盖眼卧壯士大招挂壁何由彎皆自然也呉旦生曰符讀書城南一章洪景盧謂一為公與相潭潭府中居不見公與相起身自犁鋤此等語乃是􅀈覬富貴為可議也王荆公集四家詩亦不取此章王彦輔云是詩教子以取富貴宜荆公之不取也恵洪不識作詩頭腦稱其高出老杜之上非知詩矣胡不觀東坡之論云退之有示兒詩開門問誰來無非卿大夫不知官高卑玉帶懸金魚又云凡此座中人十九持鈞樞所示者皆利禄事耳老杜則不然示宗武云曽參與游夏達者得升堂所示者聖賢事也余故特標數子以折惠洪之妄按退之子㫤為集賢校理史傳有金根車秦因殷得瑞山車曰金根車故用金為飾謂之金根車而為帝軫立旗竿斿以從水徳漢制副車黄屋左纛如金根之制昶以為悮悉改根為銀士林嗤之豈亦貽謀之過耶然昶子綰衮皆擢第衮為狀元此則愜公意矣松竹影松江詩話曰有松棚詩採來猶帯煙霞氣月明滿地金釵細可為佳句野客叢書曰月照松影但見參差黒影耳安知其為金釵松葉比之金釵者謂架上月照映則可不可謂地上之影也不如曰月明滿架金釵細前軰謂韓退之竹影金鎻碎之語非直謂竹影謂竹間之日影耳以此驗之益信韓偓詩長松夜落釵千股此語無病李涉詩踈林透明月散亂金光滴此正退之竹影金鎖碎呉旦生曰沈存中言退之城南聫句所謂金鎖碎者乃日光非竹影也若題中有日字則可余以聫句詩佳在碎字涉詩佳在滴字二字皆善言影也然言滴則須㸃出月來言碎則不待㸃而日光自在可與觧者言之即松棚詩所云滿地金釵亦云影也盖以金釵况松已帶迹象復云滿架則俚若論不可謂地上之影詳察上句猶是新綠蓊鬱恐架上亦是一片黒影韓致堯詩長松夜落釵千股小港春添水半腰自是晚唐手筆如劉宗起殘菊詩深夜雪霜金鎖碎清晨風雨玉離坡亦自是元人手筆韻語陽秋云沈存中以退之金鎖碎句恨題中無日字然杜子美詩老身倦馬河堤永踏盡黄榆緑槐影亦何必用日字作詩正欲如此余據蘓長公外紀云劉貢父一日問子瞻老身倦馬河堤永踏盡黄榆緑槐影非閣下之詩乎子瞻曰然貢父曰是日影耶月影耶子瞻曰竹影金鎖碎又何嘗説日月也則葛常之謂子美詩亦悞記矣遯齋閒覽云凡物因日有影茍無日影何從生言竹影即日光在其中矣如荆公詩江月入松餘破碎亦須藉松影方見月之破碎却恠題中無影字善論詩者正不應爾鳥名黄玉林曰韓退之詩喚起牎全曙催歸日未西喚起催歸固是二鳥名然題曰贈同遊者實有㣲意盖牎已全曙鳥方喚起何其遲也日猶未西鳥已催歸何其早也豈二鳥無心不知同遊者之意乎更與我盡情而啼早喚起而遲歸可也呉旦生曰黄魯直謂喚起聲如絡緯圓轉清亮偏於春曉鳴江南謂之春喚楊㢘夫樂府云喚起喚起東方明隋煬帝詩笑勸上林中除却司農鳥司晨鳥即喚起也史記厯書百草奮興姊規先滜索隠云一名催歸師曠禽經甌越間曰怨鳥夜啼達旦血漬草朩華陽風俗名杜鵑玉篇布榖也闗西曰巧婦闗東曰鸋鴂金䑓録石誼未娶聞子規聲嘆曰此物催人要歸故曰催歸葉天經謂鳥名詩起此王勉夫謂其體自六朝觀梁元帝嘗有是作退之非祖此乎黄魯直謂之禽言詩梅聖俞亦有泥滑滑婆餅焦提葫蘆不如歸去之類是也前榮韓退之示兒詩前榮饌賔親冠㛰之所集呉旦生曰士冠禮設洗直於東榮退之取此而為言也漢制攻云榮屋翼也即今之摶風言榮者與屋為榮飾言翼者與屋為翅翼夢溪筆談云見人為文章多言前榮榮者夏屋東西序之外屋翼也謂之東榮西榮四注屋則謂之東霤西霤未知前榮安在藝苑雌黄云如存中之言則退之亦悞矣考王元長曲水詩序云負朝陽而撫殿跨靈沼而浮榮五臣注則以榮為屋檐檐一名樀一名宇即屋之四垂也又謂之楣又謂之㭒集韻云屋㭒之兩頭起者為榮其謂之翼則言櫩宇之張如翬斯飛耳故禮記升自東榮降自北西榮上林賦偓佺之倫暴于南榮則所謂榮者東西南北皆有之故李華含元殿賦有風交四榮之説由是而言則沈存中筆談未為確論噤瘁韓退之鬬雞詩􅣭毛各噤㾕怒癭争碨磊呉旦生曰韓致堯詩禁㾕餘寒酒半醒盖人之衝寒而肌粟卒起曰噤㾕是皆以俗語入咏耳説文㾕寒也所臻切集韻寒病也所錦切費冠卿詩入林寒㾕㾕近瀑雨濛濛張孟陽詩營生生愈㾕愁來不可割朩華賦澎濞灪䃶碨磊山壟注云碨磊不平貌甜酒三山老人曰唐人好飲甜酒殆不可曉子美云人生幾何春與夏不放香醪如蜜甜退之云一尊春酒甘若飴丈人此樂無人知呉旦生曰王勉夫謂以酒比飴蜜大率醇乎醇者耳非謂好飲甜酒也子美句與巴子歌同巴子歌曰香醪甜似蜜峽魚美可鱠樂天有户大嫌甜酒才高咲小詩之句正屬退之非好甜酒矣然余觀魯望詩酒滴灰香似去年樂天詩燒酒初開琥珀香則似唐人好飲灰酒赤酒又何説耶香漁隠樷話曰退之詩云香隨翠籠擎偏重色照銀盤瀉未停櫻桃初無香退之以香言亦是一語病呉旦生曰竹初無香杜甫有雨洗涓涓静風吹細細香之句雪初無香李白有瑶䑓雪花數千㸃片片吹落春風香之句雨初無香李賀有依㣲香雨青氛氲之句雲初無香盧象有雲氣香流水之句妙在不香説香使本色之外筆補造化而漁隠乃病之我恐此老膏肓正甚戀嫪韓退之詩感物増戀嫪呉旦生曰顧師古嫪居蚪反許慎云即到反史炤釋文盧道切非説文嫪婟也按倡謂游壻曰婟嫪秦始皇九年文信侯詐以舍人嫪毐為宦者坐滛誅故秦俗罵滛曰嫪毐音澇藹士人之無行者郭璞䟽云澤虞一名鶭即婟嫪也聲類云婟嫪戀惜也以此鳥戀惜池澤見人不去因名婟澤鳥虱韓退之瀧吏詩不知官在朝有益國家否得無風其間不武亦不文仁義飾其躬巧姦敗羣倫呉旦生曰古本風作虱字觧者悞引步兵禈虱事姚令威言公孫鞅靳命篇云國以功授官予爵則治省言寡以六蝨授官予爵則治煩言生六蝨曰禮樂曰詩書曰修善曰孝悌曰誠信曰貞亷曰仁義曰非兵曰羞戰國有十二者上無使農戰必貧至削十二者成羣此謂君之治不勝其臣官之治不勝其民此謂六蝨勝其政也杜牧之云彼商鞅者能耕能戰能行其法基秦為强曰彼仁義蝨官也可以置之余因觀劉勰云韓魏力政燕趙任權五蠧六蝨嚴於秦令惟齊楚兩國頗有文學退之詩定指此而言瀧韓退之瀧吏詩南行逾六旬始下昌樂瀧呉旦生曰瀧音雙奔湍也韓子年譜載此詩又云下此三千里有州始名潮公以正月十四日去國行逾六旬三月幾望矣遂以二十五日至潮則是十許日行三千里盖瀧水湍急故也歐陽文忠云韶州圖經樂昌縣西一百八十里武溪驚湍急石流數百里按武水源出郴州武縣其俗謂水湍峻為瀧劉仲章者前為樂昌令予初以韓詩云昌樂疑其悞乃改從樂昌仲章云不然縣名樂昌而瀧名昌樂其舊俗所傳如此韓詩不悞也陸放翁詩四方行役男兒事常笑韓公賦下瀧聫句雲浪齋日記曰退之聫句古無此法乃自退之開闢也呉旦生曰詩話皆言聫句自栢梁始則漢時有之何得以石鼎聫句便云退之開闢也然余攻泊宅編云聫句起於栢梁非也式㣲詩曰胡為乎中露盖泥中中露衛之二邑名劉向以為此詩二人所作則一在泥中一在中露其理或然此則聫句所起也蠔山韓退之詩蠔相粘為山十百各自生呉旦生曰本草衍義牡蠣附石而生磈礧相連如房故名蠣房讀如阿房之房音傍見史記一名蠔山初生海畔才如拳石四靣漸長有一二丈者一房内有蠔肉一塊肉之大小隨房所生每潮至則諸房皆開有小蟲入則合之以充腹宋翟忠恵焦山詩僧居蠔山迷向背佛宇蜃氣成吹嘘楊升菴載賛云海曲蠣房或名蠔山眉渠磊砢牡牝異斑氍毹韓退之詩兩廂鋪氍毹呉旦生曰説文氍毹氊緂之屬海録碎事云氍毹音瞿輸亦作􅉤毹杜陽編新羅進五色氍毹以籍地高帝紀賈人毋得衣􅄢居例反師古注云􅄢織毛若今氍毹之類毹一作􅀈四愁詩美人贈我氈氍􅀈古樂府請客上北堂坐氈及氍􅀈按周官掌皮供毳毛為氈氈之異名曰毛席㲜之異名曰毛褥通俗文云織毛褥謂氍􅀈細者謂之毾㲪出天竺大秦等國毾㲪者施大床之前小蹋床之上蹋而登床者王子猷詣郄雍州㕔事上鋪毾㲪是也楊㢘夫詩杪欏樹子風前落吹傍恩公舊毾㲪自注云音榻登西域毛席大床前小榻以上香者一云氍􅀈恐即是渠搜國名音同而字不同耳渠搜出書禹貢桃笙復齋謾録曰東坡論子厚詩盛時一失貴反賤桃笙蔡扇安可常不知桃笙為何物偶閲方言簟宋魏之間謂之笙乃悟桃笙以桃竹為簟也按叚公路北户録云瓊州出紅藤簟方言謂之笙或曰籧篨又曰行唐沈約奏彈歙令仲文秀恣横云令吏輸六尺笙四十領東坡何亦忘此耶呉旦生曰方言簟與筕篖原分二條郭璞觧筕篖云江東呼笪音靼夢溪筆談云趙韓王治第盖屋皆以板為笪上以方塼甃之然後布瓦一云覆舟簟則筕篖之非簟明矣復齋何得混引况東坡偶爾見遺復齋乃欲以一二記憶與之折角耶余且廣其説于左按説文簟竹席也釋名簟簟也布之簟然平正也尚書顧命云敷重篾席孔安國謂桃枝竹王伯厚漢制攷云周禮繅席次席注繅席削蒲蒻展之編以五采若今合歡矣次席桃枝席有次列成文疏漢有合歡席故舉漢法况之漢世以桃枝竹為席次第列成文章東觀漢記云馬稜為㑹稽太守詔詰㑹稽車牛不務堅强車皆以桃枝細簟山海經云嶓冢之山嚚水之上多桃枝竹魏志云倭國有桃枝竹廣州記云廣州有桃枝竹華陽國志云竹朩之璝者有桃支靈夀荆州記云安城郡今属江州出桃枝席一統志云四川保寧出桃笙即竹簟庾翼與王公書云今致桃枝簟十枚簡文答湘東王獻簟書云五離九折出桃枝之翠笋庾信竹杖寡人有銅環靈夀銀角桃枝郭璞江賦桃枝篔簹實繁有叢左思呉都賦笙象簟韜於筒中劉禹錫詩月露濡桃笙曽文清詩霧帳桃笙畫寢餘梅聖俞詩桃簟冷如氷劉少宣詩桃笙乗勢獻㣲凉石邦彦詩藤牀桃簟多敗績成化中洪唯卿詩一簾秋水浸桃笙天啟中許令則詩桃笙煙帳小宗香中州集朱師美詩葵扇風未來桃笙汗初浹盖用子厚語也竹譜云桃枝竹皮赤編之滑勁可以為席東坡云葉如椶身如竹宻節而實中犀理瘦骨古雋考畧云竹性中虛桃竹獨實類於朩韻語陽秋謂之慈竹言生不離本也恐非按海録碎事云赤玉脂桃竹也紫雲盖慈竹也晉陽秋云謝太傳鄉人有罷中宿縣詣安安問歸資答曰惟有五萬蒲葵扇安取其中者執之其價數倍蒲葵掠櫚也李義山詩何人書破蒲葵扇趂虚栁子厚栁州峒岷詩緑荷包飯趂虚人呉旦生曰舊言聚落相近期其旦集交易閧然其名為虚後觀青箱雜記云嶺南謂村市為虚凡市之所在有人則滿無人則虚嶺南村市滿時少虚時多謂之為虚不亦宜乎據此則古語曰市朝滿而夕虚正此虚字也子厚童區寄傳云之虚所賣之王荆公詩花間人語趂朝虚黄山谷詩人集春蔬好趂虚陸放翁詩趂虚茶嬾鬬旗鎗馬虚中詩避社燕歸楊栁合趂虚人散鷺鷥來嚴正卿詩趂虚人去市橋静罷釣翁歸溪水清至於楊孟載荷葉詩溪友裁巾幘虚人作飯包乃用子厚語青箱襍記云嶺南謂水津為步言步之所及也迷異記云水際謂之步呉楚間謂浦為步語之訛耳按栁子厚鐵鑪步志云江之滸凡舟可涉而上下者曰步韓退之孔戣墓誌蕃船至泊步有下碇之税又羅池廟碑言步有新船或改步為涉謬矣上虞縣有石駞步呉中有魚步龜步湘中有靈妃步揚州有爪步洪州有觀步鸚鵡洲對岸有炭步閩中謂水涯為溪步金陵有邀笛步王徽之邀桓伊吹笛處也有罾步即漁人施罾處有船步即人渡船處温庭筠詩妾住金陵步門前朱雀航䑓城妓詩那堪回首處江步野棠飛東坡詩蕭然三家步横此萬斛舟成原常詩紫步于今無士馬滄溟何處有神仙然則虚即所謂墟步即所謂埠也楊升菴云唐詩春雲生嶺上積雪在囂間山凹之地堪為墟市者曰囂説文囂聲也氣出頭上故从㗊从頁頁頭也牛刀切今讀作梟非左傳晏子之居近市湫隘囂塵杜預注囂聲也周禮司市之文曰禁其鬬囂注鬬以力争囂以口争交市之地必多争故禁之市之名囂亦猶後世名市曰墟也言有人則囂無人則墟也了欸楊升菴曰朱子辨證栁宗元詩欸乃一聲山水緑注欸乃一本作襖靄按欸音靄乃音襖近日倒讀之悞矣項氏家説云劉蜕文集有湘中靄廼歌劉言史瀟湘詩有閒歌曖廼深峽裏靄廼也欸乃也皆一事但用異字耳此雖字音之㣲而襖靄當作靄襖自朱子始正世俗倒讀之悮靄廼欵乃自項平菴始正前人混淆之失呉旦生曰黄山谷謂元次山欵乃曲欸音襖乃音靄湘中節歌聲也次山集音注亦云棹舟之聲嘯餘譜云是漁歌張邦基以為嶺外之音非也冷齋夜話作􅀢音襖靄合二字書之其説益紛升菴以為欸音靄乃音襖是矣據説文長箋云了欸船櫓揺曵聲有了欸歌譌作乃歀又倒其詞作歀乃謬甚然則字當從説文而音即當作襖靄此栁集注云一作襖靄亦有據也山谷之於元集亦知之字作欸乃盖俗寫之譌升菴屢証之而實未確攻耳字彚云篆作了象氣出之難也籕又作國老柳子厚詩蒔藥閒庭延國老開尊虚室值賢人呉旦生曰埤雅蘦大苦今之甘草是也杭州小説甘草市語國老然此不可謂市語確有至理按本草云甘草一名國老觧百藥毒安和七十二種石一千二百種草故號國老之名國老者賔師之稱盖藥有一君二臣三佐四使甘草又其賔師也故藥罕不用者雖非其君而君實宗焉魏志尚書郎徐邈飲醉問以曹事邈曰中聖人因白之太祖太祖怒鮮于輔進曰平日酒客謂酒清者為聖人濁者為賢人醉鄉日月云凡酒以色清味重而甜者為聖色濁如金而味醇且苦者為賢李太白詩醉月頻中聖迷花不事君元遺山詩開尊便覺賢人近汚足寧論力士羞高舂栁子厚詩空齋不語坐高舂呉旦生曰淮南子日經于泉腢是謂高舂頓于連石連音爛是謂下舂注云尚未㝠上䝉先舂曰上舂將欲㝠下䝉悉舂曰下舂姚令威引此注云虞淵地名高舂時始戍民碓舂時也連石西山名言將暝下民悉舂故曰下舂李君實云治粟者落杵曰舂日之經天自日禺中至日晡皆横過再向晚則日影旁射側落如舂者直下其杵故曰高舂曰下舂言日落之漸次也梁元帝詩斜景落高杵李義山詩紅燭近高舂薛能詩隔溪遥見夕陽舂或云見舂米非也王僧孺致仕表云高舂之景一斜不周之風忽至煙樹栁子厚别弟宗一詩云欲知此後相思夢長在荆門郢樹煙呉旦生曰墅談稱此詩無一字不佳竹坡老人乃謂夢中焉能見郢樹煙欲易煙以邊又以犯第二句江邊而改云欲知此後相思處望斷荆門郢樹煙此真癡人前説不得夢也不知天下夢境極靈極幻疑假疑真著一煙字綴之使糢糊離迷於其間以夢為體以煙為用説出一種相思况味詩人神行處也如太白詩相思若煙草歴亂無冬春盖善説相思無如煙樹煙草矣歴代詩話巻四十九
