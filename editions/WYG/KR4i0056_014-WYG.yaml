body:
  text: 歴代詩話巻十四歸安吴景旭撰丙集上之中賦鳬藻班彪冀州賦感鳬藻以進樂吴旦生曰光武時上䟽云將帥和睦士卒鳬藻注言其和睦歡恱如鳬之戲於水藻也桓帝時上議云靈臺有子来之人武旅有鳬藻之士注周武王之旅鳬得水藻言喜悦也則知漢時自有此語耳梁簡文𤣥圃頌序云鳬與藻抃獨瑩心靈顔延年秋胡詩云捨車遵往路鳬藻馳目成奚斯班固兩都賦序云臯陶歌虞奚斯頌魯同見采於孔氏列於詩書其義一也吴旦生曰魯頌閟宫之詩云新廟奕奕奚斯所作毛注謂大夫公子奚斯者作是廟也鄭箋謂奚斯者教護屬功課章程也則知作姜嫄之廟者奚斯矣子夏序云僖公能遵伯禽之法季孫行父請命於周而史克作頌則知作閟宫之頌者史克矣班氏悮以魯頌為奚斯所作爾如王延夀魯靈光殿賦其首云恭王好治宫室遂因魯僖基兆而營焉謂僖公使奚斯新姜嫄之廟於前故恭王得因其基而立靈光殿此語可通至於下云奚斯頌僖歌其路寢而功績存乎辭徳音昭乎聲則亦與班氏所言同悮按毛鄭未行之前揚子法言云正考甫嘗睎尹吉甫矣公子奚斯嘗睎正考甫矣宋克注謂奚斯慕考甫而作魯頌司馬温公注謂正考甫作商頌奚斯作閟宫之詩故云又史記宋世家襄公之時修仁行義欲與盟主其大夫正考甫美之故追道契湯髙宗殷所以興作商頌注云韓詩章句美襄公樂記温良而能斷者宜歌商鄭康成注謂商宋詩蓋本韓詩之説也然考之世本正考甫生孔父嘉為宋司馬華督殺之而絶其世此非在襄公之前乎左傳正考甫佐戴武宣曹氏曰自戴公至襄公凡一百五十有一年正考甫既佐戴公而能至襄公之時作頌乎後漢曹襃云奚斯頌魯考甫詠商注引薛君韓詩傳曰是詩公子奚斯所作正考甫孔子之先也作商頌十二篇宋鮑昭河清頌云藻彼歌頌則奚斯之徒蓋其承譌已久墄平班固西都賦於是左墄右平吴旦生曰注墄階級也右乗車上故使平左人上故為級摯虞决疑要注云凡大殿乃有陛堂則有階無陛也左墄右平平者以文磚相亞次墄者為階級也九錫之禮納陛以登謂受此陛以上然此僅釋其字而不知左右之别固有深義也蓋古者以西為尊左東也右西也東則為墄若世所謂澁道乃羣臣所由登降之階西則為平羣臣不敢升自西階故不為墄正所以尊西也如王者之廟太祖坐西三昭坐北而面南三穆坐南而面北所以尊祖於西也故謂正太祖東向之位也又賓主之席主東而賓西所以尊賔於西也故謂客降一等則就主人之位乃客不敢自西階欲隨主而東主人辭而客始西階升也􅒀稜金爵班固西都賦設璧門之鳳闕上觚稜而棲金爵吴旦生曰儀禮騰觚於賔又云小臣請騰爵蓋古者獻以爵酬以觚也博古圖觚口容一爵足容二爵説文觴受二升者謂之觚按腹之四稜削之可以為圓故漢書曰破觚為圜也足之四稜漢宫鳳闕取其制以為角隅安獸處然則觚爵皆酒器而其後借觚為闕角之稱蓋取其有四稜也王直方詩話載宋秦少游嘗晚出右掖門有詩云金爵觚稜轉夕暉飄飄宫葉上秋衣出門塵漲如黄霧始覺身從天上歸識者以為少游作一黄門校勘而衒耀如此必不逺到余觀此後入咏者不一如蘓子瞻上元詩壁月掛罘罳珠星照觚稜王子端詩回首觚稜雲氣隔六年侍從小臣心李長源詩長樂觚稜青似染建章馳道直於絃元遺山詩但見觚稜上金爵豈知荆棘卧銅駝又過晉陽詩東望蒼龍西白虎金爵觚稜上雲雨廼易之雪霽詩風廻闕角瑶華亂冰溜觚稜玉筯懸馬虚中積雪詩凍雲晴已散濛宻聚觚稜又清遊詩觚稜轉影日過午鶗鴂不鳴春滿山貢仲章𤣥真宫詩觚稜生曉煙𤣥風凌紫虚杜瑛弔故宫詩月上觚稜椒壁濕飢烏啄碎琅玕石劉彦昺早朝詩紫禁觚稜曙色㣲五更三㸃聽朝雞揭孟同豋琉璃塔詩罘罳映落花觚稜却飛鳥孫仲衍南京行云却日觚稜駕寥廓行空複道侵箕尾注金爵鳳也余觀説文飲器象爵者取其鳴節節足足也宋符瑞志鳳凰其鳴雄曰節節雌曰足足則愈知金爵之為鳳矣白間班固西都賦招白間下䨇鵠投文竿出比目吴旦生曰太平御覽引風俗通云白間古弓名也白間與文竿作對當是弓弩之屬文選作白鷴劉良注白鷴䨇鵠皆鳥也甚悮潘岳射雉賦捧黄間以宻彀注黄間弩名劉劭賦曰器用則六弓四弩緑沈黄間予樂班固東都賦揚世廟正予樂吴旦生曰東漢明帝分樂為四品一曰大予樂郊廟上陵用之二曰雅頌樂辟雍鄉射用之三曰黄門鼓吹樂天子宴羣臣用之四曰短簫鐃歌樂軍中用之按是時依䜟文改樂為大予李善注亦謂大予自五臣解為正樂妄改予字作雅今行本遂作正雅樂悮太牢班固東都賦嘉珍御太牢饗吴旦生曰注牛曰太牢饗享羣臣也世多以牛為太牢羊為少牢故唐人戯以太牢呼牛僧孺少牢呼楊虞卿而不知其失考也按禮記郊特牲而社稷太牢又曰卿大夫少牢士以特豕又曰特羊周禮䟽曰齋必變食故加牲體至三太牢謂牛羊豕具為一牢漢禮儀志皇后以中牢羊豕祭蠶神苑窳據此則所謂太牢者乃牛羊豕具也所謂少牢者乃去牛惟用羊豕也豈得以習俗傳譌之語漫為注脚哉嘉祐雜志載常禹錫判太僕供祫祭太牢祗供特牛而不供羊豕正狥俗之過鱻班固幽通賦鱻生民之晦在吴旦生曰説文鱻新魚精也从三魚不變魚徐鍇曰三衆也衆而不變是鱻也相然切元包三三大有燾宀宀音綿彡音衫鱻鱻音鮮䀠音懼鎣音瑩于頁音頡晶灼于天周禮􅈄人辦魚物為鱻薧以共王膳羞注云生肉曰鱻乾肉曰薧張衡南都賦黄稻鱻魚郭璞江賦食惟蔬鱻余按已上鱻字音義皆作新鮮之鮮叶平聲孟堅賦鱻字音義是作鮮少之鮮叶上聲今五臣本妄改鱻作鮮則嚼蠟矣當作古本鱻字為正慶班固幽通賦恐魍魎之責景兮慶未得其云已吴旦生曰漢書音義云慶音羌班氏漢書有直作羌字者故此賦文選本亦改慶作羌字矣揚雄反離騷云慶夭顇而喪榮注慶辭也屈原離騷云羌中道而改路注羌楚人發語辭據此則二字音義皆同蓋慶字即羌字也小雅維其有章矣是以有慶矣慶虚羊反與章叶揚子太𤣥凡用慶字皆與陽韻叶又甘泉賦直嶢嶢以造天兮厥髙慶而不可乎彊度李長吉樂府天髙慶蓋用此黄震云易經必有餘慶慶當作平聲與下文殃字協韻上文乃終有慶亦與應地無彊平聲相協暌卦志行也往有慶也亦協韻益卦其道大光中正有慶亦協韻他如井困豐兌凡易中慶字無不與平聲協韻者䕫魖獝狂揚雄甘泉賦梢夔魖而抶獝狂吴旦生曰注䕫魖耗鬼也獝狂亦惡鬼也按詞林海錯云䕫魖朩石之怪埤蒼云獝狂無頭鬼因觀張衡東京賦捎魑魅斮獝狂斬蜲蛇腦方良囚耕父於清泠溺女魃於神潢殘䕫魖與罔象殪野仲而殱游光八靈為之震慴况魃􅈮與畢方此一段離竒光怪才氣横溢而陳氏謂漫及大儺無闗鉅典亦拘墟之見也魑魅山澤之神蜲蛇大如車轂方良草澤之神耕父女魃皆旱鬼罔象亦朩石之怪野仲游光兄弟八人恒在人間作怪害者魃􅈮小鬼畢方老鬼旄揚雄甘泉賦流星旄以電爥兮咸翠盖而鸞旗吴旦生曰周禮王㑹星旄者弭旄鄭𤣥云可以為旌旗也補曰旄以旄牛尾山海經潘侯山有獸狀如牛而四節生毛名曰旄牛注云背膝及胡尾皆有長毛爾雅犣牛旄牛也顔師古云今謂犏牛一統志臨洮出釐牛尾為旌旄後漢書旄牛無角一名童牛肉重千斤其毛可以為旄荀子西海文旄新荑并閭揚雄甘泉賦平原唐其壇漫兮列新荑於林薄攢并閭與茇葀兮紛被麗其亡鄂吴旦生曰注新荑香草也按古本作新雉五臣本改作新荑然新雉即新荑一作辛夷其為樹甚大非香草也韓退之感春詩辛夷花髙最先開洪慶善注云辛夷髙數丈江南地暖三月開北方地寒四月開初發如筆北人呼為朩筆其花最早江南人呼為迎春漁隠叢話謂是兩種朩筆色紫迎春色白朩筆叢生二月方開迎春髙樹立春已開然則所云辛夷者乃此花耳又名女郎花陸放翁有辛夷花詩粲粲女郎花忽滿庭前枝注并閭其葉隨時改政平則平政不平則傾也師古云如所説自是平慮耳白虎通云王者使賢不肖位不相踰則平露生庭狀如蓋政平則正不平則傾一名平慮按吴歸命侯天紀三年有蕒菜生吴平家髙四尺厚三分如枇杷形上廣尺八寸下莖廣五寸兩邊生葉緑色東觀按圖名蕒菜作平慮草以吴平為平慮郎銀章青綬據此則為嘉瑞矣然余觀晉安帝義熈二年有苦蕒菜生揚州營士陳蓋家莖髙四尺六寸廣二尺二寸是後嵗多征伐人民疾苦故苦蕒者買苦也唐中宗景龍二年岐州王上賔家有苦蕒菜髙三尺餘上廣尺餘厚二分蓋蕒菜即苦蕒今俗呼為苦苣者是也然則此種豈是嘉生而子雲以之頌禱甘泉耶玉樹野客叢書云揚雄甘泉賦玉樹青蔥顔師古注玉樹武帝所作集衆寳為之向注文選亦謂武帝植玉樹於此宫以碧玉為葉按三輔黄圖云甘泉宫北有槐樹今謂玉樹根幹盤峙三二百年朩也楊震闗輔古語記云耆老相傳咸謂此樹即揚雄甘泉賦玉樹青蔥者也又觀隋唐嘉話國史纂要長安記聞見録等雜書皆言漢宫以槐為玉樹因知晉人所謂芝蘭玉樹者指此物也師古與向之注甚謬吴旦生曰王褒雲陽宫記甘泉宫北有槐樹今為玉槐樹與三輔黄圖所載同紀少瑜詩玉樹起千層曹植詩緑蘿縁玉樹余以為皆拘説也按漢武内傳云以琉璃珠玉明月夜光雜錯天下珍寳為甲帳其次為乙帳甲以居神乙上自御之前庭植玉樹珊瑚為枝碧玉為葉此武帝事也至成帝為趙飛燕無子往祀甘泉宫雄待詔承明之庭奏此賦因引武帝之所居神者以形容成帝之祀事亦無不可而師古與向之注未為失也况賦云翠玉樹之青蔥兮璧馬犀之璘㻞注翠碧也則以碧玉為葉與璧作馬犀為飾者同即觀下句可見而翠與璧正是以實字作虚字用法伽揚雄蜀都賦盛冬育筍舊菜増伽吴旦生曰章樵注伽古茄字酉陽雜爼云茄字革遐反今呼伽未知所自因下食有茄子數蒂問張周封故事張云一名落蘓事具食療本草湘煙録載馮元成曰小菰即茄名也見晉先蠶儀注余按晉先蠶儀注云車駕住吹小箛發吹大箛箛即笳也蓋此之所謂笳者乃鳴笳疊皷之笳𦍑人捲蘆葉吹之以作樂也詳於戊集謝詩中故字首从竹不从艸豈謂茄子哉酉陽不審茄之為伽湘煙悮載笳之為茄皆欲噴飯大業拾遺録云四年改茄子為崑崙紫苽酉陽雜俎云錢王有子跛足以聲相近故止呼落蘇風簫王褒洞簫賦風洪洞而不絶兮優嬈嬈以婆娑吴旦生曰李周翰注洪洞相連貌風吹其聲相連不絶也按范傳正省試風過竹賦叚柯古引荀子云如風過簫忽然已化義同草上之風必偃及讀淮南子云若風之過簫也忽然感之可以清濁應矣髙誘注云清商濁宫也乃知為从竹之簫非蕭艾之蕭也援此證王賦更佳李君實云洞簫即今短簫獨管所裁者若簫史弄玉吹以引鳳者乃古編簫形如鳳翼按誠齋襍記云宣王之末史籍散亂簫仙能文著本末以備史之不及人以史稱之實無名也首陽杜篤首陽山賦厥𦙍孤竹作藩北湄少名叔齊長曰伯夷吴旦生曰莊綽雞肋編謂太史公作伯夷傳但云伯夷叔齊孤竹君之二子也而論語音註引春秋少陽篇謂伯夷姓墨名允一名元字公信叔齊名智字公逹夷齊諡也吾衍閒居録云孤竹君姓墨音眉名台音怡初見孔叢子注中子名伯遼見周曇詠史詩注伯當作仲陶南村謂若如吾説則伯夷叔齊似又是名非諡按今之盧龍故孤竹也城西有伯夷叔齊祠嘉靖中王世貞奉使過此為作弔夷齊辭然論語注以蒲阪為首陽統志云首陽在蒲州即禹貢雷首山也石曼卿詩恥生湯武干戈日寧死唐虞揖讓區盖蒲阪舜都也又阮瑀弔伯夷云適彼洛師瞻彼首陽敬弔伯夷則首陽乃在洛陽矣河南志云言首陽者五處未知孰的偃盖上官遜松賦莫不對偃盖以瀟灑仰山雲而揺曵吴旦生曰抱朴子天陵偃盖之松大谷倒生之栢凡此諸朩皆與天齊其長與地齊其久玉䇿云千載松栢樹枝葉上杪不長望如偃盖其中有物如青牛青羊人服皆萬嵗廣博物志云鶴千嵗棲於偃盖松據此則偃盖自是神異之品杜詩所謂欲存老盖千年意也廣志云松命根遇石則偃所謂樓松也恐非鐘虡張衡西京賦洪鐘萬鈞猛虡趪趪負筍業而餘怒乃奮翅而騰驤吴旦生曰梓人為簨虡天下大獸五脂者膏者臝者羽者鱗者宗廟之事脂者膏者以為牲臝者羽者鱗者以為筍虡外骨内骨卻行仄行連行紆行以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胷鳴者謂之小蟲之屬以為雕琢故擊其所懸而由其虡鳴小首而長摶身而鴻若是者謂之鱗屬以為簨初學記云鐘磬各有筍虡寫鳥獸之形大聲有力者以為鐘虡清聲無力者以為磬虡漢郊祀志師古注云虡神獸名也懸鐘之朩刻飾為之因名曰虡也平子盖言虡力猛怒能勝筍業而如欲飛馳耳班固東都賦於是發鯨魚鏗華鐘薛注云海中有大魚曰鯨海邊又有獸名蒲牢蒲牢素畏鯨鯨魚擊蒲牢輙大鳴凢鐘欲令聲大者故作蒲牢於上所以撞之者為鯨魚之狀何晏景福殿賦華鐘杌其高懸悍獸仡以儷陳井幹張衡西京賦井幹疊而百層吴旦生曰班固西都賦攀井幹而未半按漢書武帝立井幹樓髙五十丈又觀鄴中記魏武於鄴城西北立三䑓中名銅雀臺南名金虎臺北名冰井臺水經注云銅雀臺髙十丈有屋一百一間金虎臺髙八丈有屋一百九間冰井臺亦髙八丈有屋一百四十五間左思魏都賦曰三臺列峙而峥嶸者也謝朓詩繐帷飄井幹注云銅雀臺一名井幹樓余按銀牀謂之井幹其形四角或八角蓋井上朩欄也其樓若井幹之形故名賦中又云蔕倒茄於藻井注藻井當棟中交朩方為之如井幹也按山節藻棁蓋藻非特取其文亦以禳火今藻井取象於此風俗通云殿堂宫室象東井形刻作荷菱荷菱水草也所以厭火與此同義左思魏都賦綺井列䟽以懸蔕注以板為井形飾以丹青如綺也夢溪筆談云屋上覆橑古人謂之綺井亦曰藻井又謂之覆海今謂之鬬八吴人謂之罳項楊升菴云今俗謂天花板也四宫名張衡西京賦馺娑駘盪燾奡桔桀枍詣承光睽罛庨豁吴旦生曰注馺娑駘盪枍詣承光並臺名潘岳西征賦縈馺娑而欵駘盪􅞂枍詣而轢承光注皆䑓名班固西都賦經駘盪而出馺娑洞枍詣以與天梁注又云馺娑駘盪枍詣承光四殿名天梁宫名余以為注家之皆妄而未審四者皆宫名也按三輔黄圖云馺娑宫馺娑馬行疾貌馬行迅疾一日之間遍宫中言宫之大也説文馺馬行相及也方言馺馬馳也郭璞云馺索答反娑字有兩音一叶索可反徐陵云陪遊馺娑聘纎腰於結風長樂鴛鴦奏新聲於度曲是也一叶先河反揚雄羽獵賦神明馺娑漸䑓太液是也三輔黄圖云駘盪宫春時景物駘盪滿宫中也江總詩春心既駘盪謝朓詩春物方駘盪注云駘盪猶施散也李君實云駘盪状其緩行以狥景物之華􅀢􅀢状其促轡以週道里之廣悉倚馬命名竒甚金壺字考云駘音待三輔黄圖云枍詣宫枍詣朩名宫中美朩茂盛也詞林海錯一作枍栺枍音翳楊升菴云枍詣殿漢本榽橀殿蓋二朩所構因以為名如長楊五柞之例枍詣文選假借字耳爾雅注引齊諺上山斫檀榽橀先彈二朩與檀相似也漢宫闕名載長安有承光宫漢書本傳云順帝擢种暠監太子於承光宫邪贏張衡西京賦何必昏於作勞邪贏優而足恃吴旦生曰言市販之人不必勉於作勞其邪偽之利自饒而足恃也杜子美述古云所務榖為本邪贏無乃勞蓋本此一作嬴一作羸非是殊不知贏之為言利也九百張衡西京賦匪惟翫好廼有秘書小説九百本自虞初吴旦生曰五臣注小説醫巫厭祝之術凢有九百四十三篇言九百舉大數也蘓東坡作艾子有云彭祖八百嵗其婦哭之以九百者尚在也李方叔謂俗以憨􅂒駱駝為九百豈可筆之文字間坡因舉西京賦及注語以告之方叔後讀文選見其注始歎坡之精通陳后山云世人以癡為九百謂其精神不足也朱彧云青州王大夫為俚詞獻其季父為青掾者他日見其子謝之其子日大人九百亂道玷凟髙明蓋精神不足為九百豈以一千即足數耶汪司業云九百草書喬字也虞初洛陽人明醫術事漢武帝時乗馬衣黄衣號黄衣使者其説亦號九百以其能通小説家書也方萬里挽王防禦云温飽逍遙八十餘稗官原是漢虞初世間􅬝事皆能説天下鴻儒有不如聳動九重三寸舌貫穿千古五車書哀江南賦箋成傳從此韋編鎻蠧魚蓋防禦在宋亦以説書供奉得官耳度曲張衡西京賦度曲未終雲起雪飛吴旦生曰李善注引漢書元帝自度曲臣瓉云歌終更授其次謂之度曲此音義引以注西京賦極確而瓉以此注漢元帝賛則失之矣按度之音義有二其一度徒故切乃度次之度謂歌曲也如宋玉笛賦度曲羊腸杜甫泛江詩翠眉縈度曲與此度字同故謂注西京賦極確其一度大各切乃隠度之度非謂歌曲也漢元帝紀賛云自度曲被歌聲應卲注自隠度作新曲因持曲以為歌詩聲也師古以應説為是如唐書段安節善樂律能自度曲又與此度字同故謂瓉之注漢元帝賛則失􅏲張衡東京賦淵游龜􅏲吴旦生曰五臣注􅏲龜類郭璞謂靈􅏲能鳴則此龜屬鳴者也説文􅏲以胸鳴其音如皷非是按考工記梓人刻畫祭器狀諸蟲有以胸鳴者有以胃鳴者􅏲是胃鳴之蟲字林云大龜似猬則知似猬乃以胃二字寫悮謻門張衡東京賦謻門曲榭吴旦生曰注謻門冰室門也夢溪筆談云按字訓謻别也東京賦但言别門耳故以對曲榭非有定處也余觀劉曜傳云未央朝寂謻門旦開石林燕語云真宗時内香藥庫在謻門外則是門名也説文周景王作洛陽謻臺尺氏切帝王世紀云洛陽南宫謻䑓周人名曰逃債䑓則又䑓名也陸士龍與兄書云曹公所為屋折其謻堂不可壊直以斧折之則又堂名也劉孝綽詩反景照謻塘則又塘名也按謻臺一作誃臺又作簃臺謻塘又作誃塘又作夷塘集韻謻字或作簃以為宫室相連之稱朱子楚辭辯證云無朩謂之臺有朩謂之榭一云凡屋無室曰榭説文乃云臺觀四方而髙者榭臺有屋也説文與二説不同然以春秋宣榭火觀之則榭有屋明矣龍􅔀張衡東京賦日月㑹於龍􅔀恤民事之勞疚吴旦生曰􅔀丁遘反賈逵云􅔀龍尾星也國語觀射父對楚昭王曰日月㑹於龍􅔀土氣含収天明昌作百嘉備舍國家於是乎蒸嘗月令孟冬日在尾蓋十月時也民勞於嵗事故天子當此時愍䘏勞來之汃張衡南都賦砏汃輣軋吴旦生曰注謂波相激之聲余按爾雅西至於邠國謂之四極朱晦翁云邠國近在秦隴非絶逺之地然説文引爾雅曰西至汃國謂西極汃府巾切西極之水也又汃月之諺汃讀為怕平聲東方朔傳隠語云令壺齟老栢塗塗與汃同文加切解云塗者漸洳徑也魏文帝愁霖賦塗漸洳以沉懘潦淫衍而横湍栁子厚詩善幻迷水火齊諧笑栢塗蓋用此觀禹貢厥土惟塗泥小雅雨雪載塗乃雨濕泥濘之義爾雅十二月為畢塗月折盤張衡南都賦結九秋之増傷怨西荆之折盤吴旦生曰陸機日出東南隅行丹脣含九秋妍迹陵七盤按九秋曲名七盤楚舞言歌舞兩絶也衡賦二語似與機同意李善注亦謂西荆楚舞也折盤舞貌余按衡賦所云折盤乃取盤旋之義然盤字古作槃其義有二蓋又有槃舞也張衡七槃舞賦云歴七槃而縱躡卞蘭許昌宫賦云興七槃其迭奏王粲七釋云七槃陳於廣庭鮑昭詩云七槃起長袖凢此皆謂用槃七枚而舞耳梁魏有舞槃伎宋書樂志曰槃舞漢曲也漢世惟有柈舞而晉加之以杯言接盃槃於手上而反覆之以不堕為工也非取盤旋之義仁里張衡思𤣥賦匪仁里其焉宅兮匪義迹其焉追吴旦生曰論語里仁為美擇不處仁本以為隣里之里簡擇之擇也乃賦注引之作里仁為美擇不處仁謂里宅皆居也葉石林云以擇為宅則里猶宅也蓋古文云然今以宅為擇而謂里為所居乃鄭氏訓解而何晏從之當以古文為正胡致堂云里居也居仁如里安仁者也飛遯張衡思𤣥賦文君為我端蓍兮利飛遯以保名吴旦生曰周易遯卦肥遯无不利子夏曰肥饒裕也肥字古作􅖦與古蜚字相似即今之飛字後世遂改為飛字故本義作肥遯而引用者多作飛遯九師道訓云遯而能飛吉孰大焉曹植七啟云飛遯離俗平子善易解故此段竟以蓍體作賦亦竒蓋内為艮外為巽故曰歴衆山以周流兮翼迅風以揚聲上九變為咸咸感也巽長女兑少女故曰二女感於崇嶽兮三至五為乾乾為冰故曰或冰折而不營四至乾變為兑故曰天蓋髙而為澤兮髙者可下故誰云路之不平乾為玉故曰勔自彊而不息兮蹈玉階之嶢峥郎濳張衡思𤣥賦尉龎眉而郎濳兮逮三葉而遘武吴旦生曰顔駟老於郎署厯漢文景至武帝擢㑹稽都尉故謂三葉今作馮唐用由左太冲詩悮也蓋郎濳字甚佳宋周煇自郎遷卿久阨以咨投秦檜有云郎久濳於省闥卿尚少於朝班檜亟賞之蘓東坡詩莫歎郎濳生白髪聖朝求舊鄙鳶肩咎繇張衡思𤣥賦咎繇邁而種徳兮樹徳懋於英六吴旦生曰史記禹本紀云臯陶卒封臯陶之後於英六按文選注英六至楚末始滅然觀英布封九江王復都於六蓋以布自謂臯陶後也漢高末年布反始滅亦見種徳之餘慶矣自左傳臧文仲聞六蓼㓕曰臯陶庭堅不祀忽諸而後人悮以臯陶真不祀遂為刑官無後之説得平子賦語可破其疑抱朴子謂伯益即臯陶子非是按伯益即伯翳乃大業之子其後為秦咎繇即古臯陶字書經作臯陶漢武帝本紀作咎繇他或作臯繇按周禮追師注歩揺作歩繇魏鍾繇字元常取咎繇陳謨彰厥有常之義世説庾翼謂鍾㑹曰何以望君遥遥不至又司馬景王問鍾毓曰臯繇何如人皆舉其父諱戲之可証蘤張衡思𤣥賦歌曰天地絪緼百卉含蘤吴旦生曰蘤古花字五臣本妄改為含葩殊不知花者草朩之葩也而非葩字即花字按蘤呼𤓰切班固傳摛藻如春蘤是也葩披巴切張衡西京賦披紅葩之狎獵是也兩字自有别五臣未辨觀王勃採蓮賦紅葩絳蘤電爍千里蓋其一句並用冣有分别豐隆列缺雲師凍雨張衡思𤣥賦豐隆軒其震霆兮列缺􅈌其照夜雲師􅞝以交集兮凍雨沛其灑途吴旦生曰霻霳雷師水經作封隆穆天子傳封豐隆之塟以詔後世郭璞云豐隆筮師御雲得大壯卦遂為雷師淮南子云季春三月豐隆乃出以將其雨抱朴子云故聾瞽在乎形器則不信豐隆之與𤣥象矣列缺電也司馬相如大人賦貫列缺之倒景服䖍云天閃也元命苞云噬嗑列缺摶䃱磹灼傳曰列缺摶雷之動也䃱磹灼電之耀也䃱音線磹音店太平廣記月支獻猛獸兩目如天䃱碑之炎光文選注云諸家皆以豐隆為雲師此賦别言雲師明豐隆為雷也余觀屈原九章云願寄言於浮雲兮遇豐隆而不將王逸注雲師徑逝不我聽也世以豐隆為雲師當亦由此耶爾雅暴雨謂之凍郭璞注云今江東呼夏月暴雨為凍雨凍同東西之東離騷云使凍雨兮灑塵杜子美枯柟詩凍雨落流膠碌碌馮衍顯志賦馮子以大人之徳不碌碌如玉硌硌如石吴旦生曰老子不欲碌碌如玉落落如石馮賦用此王弼以為琭琭然唐韻以為娽娽王逸九思云哀世兮睩睩莊子漁父云禄禄而受變於俗史記毛遂云公等録録漢書蕭何賛當時録録未有奇莭顔師古注云録録猶鹿鹿言在凡庶之中也馬援傳云今更共陸陸則是一字而八變其體丸馬融長笛賦丸梴雕琢吴旦生曰注丸折也按韓詩外傳松栢丸丸薛君注云丸取也蓋取而伐斵之使其圓且澤故曰丸丸則訓折者與取同義楊升菴謂山海經鳳卵作鳳丸又建朩其葉如羅其實如欒欒即卵也古字丸卵欒皆通何也彈丸之形如雞之卵故卵可借丸梓人伐材謂之欒削其刻朩為鳥獸形者曰雕欒匠謂欒削其朩丸如卵也此升菴以訓詩松栢丸丸謂毛氏解丸丸為直恐非然以訓賦之丸梴更切盖丸梴雕琢刻鏤鑚笮合言之皆所以成器也簻夢溪筆談曰馬融長笛賦裁以當簻便易持李善注簻馬策也裁笛以當長簻便易持此謬説也笛安可為馬策簻管也古人謂樂之管為簻故潘岳笙賦云脩簻内辟餘簫外逶裁以當簻者餘器多裁衆簻以成音此笛但裁一簻五音皆具當簻之工不假繁猥所以便而易持也西溪叢語曰據説文簻撾並音張𤓰反箠也不聞以簻為樂管潘岳笙賦乃用檛字云脩檛内辟注云脩長檛大辟開也自與簻字不同言𦍑人裁之以當馬䇿言易執持而復可吹也牽强為説殊無義理吴旦生曰馬策之説固非蓋本文使易持夢溪作便易持恐悮然余觀選注笛賦云簻管也古人謂樂之管為簻又選注笙賦云脩檛長管也餘簫衆管也兩注自甚明確况長管正所謂長笛也字異而器同又何支説之有按周禮笙師掌教龡竽笙塤籥簫箎􅐟管鄭司農謂箎七孔音池杜子春謂讀􅐟為蕩滌之滌五孔即笛之古字也馬融之所謂長笛者本四孔京房加一孔於下為商聲沈約宋書所云京房備其五音也觀李善於賦題下注云七孔長一尺四寸此乃今之横笛在鼓吹曲謂之横吹而以此注𦍑人截竹之笛此真謬説蓋𦍑笛與雅笛不同器也文獻通考云唐之七星管古之長笛也其狀如箎而長其數盈尋而七竅顧况七星管歌曰龍吟四澤欲興雨鳳引九雛驚宿烏余以為亦悮認耳荷王延夀魯靈光殿賦荷天衢以元亨吴旦生曰易經何天之衢程子云天之衢亨誤加何字朱子云何天之衢何其通逹之甚也讃之也王晦叔云何當作行惟梁武帝以何作荷負也乃與延夀同余深契其言此與詩商頌何天之龍作荷天之寵同一㫖趣又班媫妤自悼賦何性命之淑靈注云何任也負也歴代詩話巻十四
