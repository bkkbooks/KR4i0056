body:
  text: 歴代詩話巻十歸安吳景旭撰乙集中之下楚辭九陽困學紀聞云吕氏春秋禹南至九陽之山羽人祼民之處不死之鄉此屈子逺游所謂仍羽人于丹丘兮留不死之舊鄉朝濯髮于暘谷兮夕晞余身于九陽吳旦生曰王伯厚引此以証不死之鄉則可盖九陽謂日也山海經墨齒之北曰暘谷上有扶桑十日所浴居水中有大木九日居下枝一日居上枝仲長統詩云沆瀣當餐九陽代燭春秋元命苞云陽成於三故曰中有三足烏營魄逺遊篇載營魄而登霞兮淹浮雲而上征霞古遐字借用吳旦生曰按王莽傳人民正營正音征漢書鍾離意上疏曰不勝愚戇征營辠當萬死征營不自安也江淹倡婦自悲賦傷營魄之巳盡陸機詩營魄懐兹土謝靈運詩得以慰營魄此與屈子逺遊所云魂營營而至曙同一義也陸倕思田賦作魂焭焭以至曙又按王粲大暑賦起屏營而東西欲避之而無方陸機詩營道無烈心注云營營道路也石崇詩佇立以屏營古雋考畧云屏營音平盈作丙榮悞注云迴行貌此與屈子九章所云魂識路之營營同一義也注云精靈主行往來數也焦弱侯云老子營魄抱一能無離乎營如經營屏營怔營皆不安之意猶云魂魄不安也意云以不安之魄而欲抱守真一能保其不離乎朱晦翁云屈子載營魄之言本於老氏而揚雄又因其語以明月之盈闕其所指之事雖殊而立文之意則一顧為三書之解者皆不能通其說今合而論之庶乎其足相明也盖以車承人謂之載古今之通言也以人登車亦謂之載如漢紀云劉章従謁者與載韓集云婦人以孺子載皆此意而三子之言其字義亦如此也但老子屈子以人之精神言之則其所謂營者字與榮同而為晶明光炯之意其所謂魄則若予所論於九歌者耳揚子以日月之光明論之則固以月之體質為魄而日之光耀為魂也以人之精神言者盖以魂陽動而魄隂靜魂火二而魄水一故曰載營魄抱一能勿離乎言以魂加魄以動守靜以火迫水以二守一而不相離如人登車而常載於其上則魂安靜而魄精明火不燥而水不溢固長生久視之要訣也以屈子無滑而魄虛以待之之語推之則其意當出此矣其以日月言者謂日以其光加於月魄而為之明如人登車而載於其上也故曰月未望而載魄於西既望則終魄於東其遡於日乎言月之方生則以日之光加被於魄之西而漸滿其東以至於望而後圜及既望矣則以日之光終守其魄之東而漸虧其西以至其晦而後盡盖月遡日以為明未望則日在其右既望則日在其左故各向其所在而受光如民向君之化而承俗也三子之言雖為兩事而所言載魄則其義同故丹經歴術皆有納甲之法互相資取以發明盖其理不異也衛逺遊云左雨師使徑待兮右雷公而為衛吳旦生曰衛音越范􅈌靈帝賛微亡備兆小雅盡缺麋鹿霜露遂栖宫衛曹嘉贈石崇詩入仕于皇閣出則登九列疇昔謬同位情至過魯衛皆音越又按衛亦讀意張華尚書令箴法制不修不長厥裔尚臣司臺敢告侍衛如此音讀則上句路曼曼其修逺兮徐弭節而髙厲亦可如字叶卜居朱文公曰屈原哀憫當世之人習安邪佞違背正直故陽為不知二者之是非可否而將假蓍龜以决之遂為此辭發其取舍之端以警世俗說者乃謂原實未能無疑於此而始將問諸卜人則亦悞矣吳旦生曰陳第言舊説原憫世之違正習邪故假卜以警俗非真有疑而問也按離騷索瓊茅以筳篿兮命靈氛為予占之又曰巫咸將夕降兮懐椒糈而要之皆卜居之意原猶以為未盡也故八設條目以行之必不能兼事之必致相反者决去就定従違且以見已之廉貞不以見棄而悔改也余竊以原卜居之意又不止於此盖原之所謂居非宫室之搆造也亦非世塗之栖息也直是其安身立命處故離騷凡二千四百九十二言而以一居字結之吾従彭咸早已自卜余知其居久在香蘺芳桂叢中矣宋玉宅李君翁詩話曰寧誅鋤草茅以力耕乎詩人皆以為宋玉事豈卜居亦宋玉擬屈原作耶庾信哀江南賦云誅茅宋玉之宅吳旦生曰晁無咎謂大招古奥疑是原作焦弱侯謂九辯皆自為悲憤之言絶無哀悼其師之意即原自作余殊服此二言因攷班固漢志曰屈原賦二十五篇韓愈詩曰離騷二十五王逸序天問曰屈原凡二十五篇洪興祖之論逺遊曰離騷二十五篇今楚辭所載止二十三篇是并大招九辯而為二十五也君翁反以卜居為玉作何耶按范石湖吳船録云秭歸縣傳為宋玉宅杜子美詩宋玉悲秋宅謂此縣傍有酒壚或為題作宋玉東家又唐余古渚宫故事云庾信因侯景之亂自建康遁歸江陵居宋玉故宅宅在城北三里故其賦曰誅茅宋玉之宅穿徑臨江之府老杜送李功曹歸荆南云曽聞宋玉宅每欲到荆州是也李義山亦云却將宋玉臨江宅異代仍教庾信居漁父韻語陽秋曰予觀漁父告屈原之語曰聖人不凝滯於物而能與世推移又云衆人皆濁何不掘其泥而揚其波衆人皆醉何不哺其糟而啜其醨此與孔子和而不同之言何異使屈原能聽其說安時處順寘得喪於度外安知不在聖賢之域而仕不得志狷急褊躁甘葬江魚之腹知命者肯如是乎故班固謂露才揚已忿懟沈江劉勰謂依彭咸之遺則者狷狹之志也揚雄謂遇不遇命也何必沈身哉孟郊云三黜有愠色即非賢哲模孫郃云道廢固命也何事葬江魚皆貶之也而張文潛獨謂楚國茫茫盡醉人獨醒惟有一靈均哺糟更使同流俗漁父由來亦不仁此詩可謂得靈均之心矣吳旦生曰古來三漁父一出莊子一出屈子一出桃花源記皆其洸洋迷幻感憤膠葛因托為其辭以寄意焉豈必真有其人哉岳州屈子立廟以漁父配享余竊笑之迺葛常之以不聽其説督責屈子張文潛又轉而督責漁父把一漁父粘作實實地而太史公屈原傳劉向新序嵇康髙士傳各採屈子莊子漁父之言以為實録又一漁父粘作實實地王維韓愈劉夢得之詩競以神仙有無推勘桃源而三洞羣仙録漁人乃黄道真廣川畫跋以為即黄聞道人盖李衛公所謂黄尊師者又一漁父粘作實實地洪景盧云自屈原辭賦假為漁父日者問答之後作者悉相規倣司馬相如子虚上林賦以子虚烏有先生亡是公揚子雲長楊賦以翰林主人子墨客卿班孟堅兩都賦以西都賓東都主人張平子西都賦以憑虚公子安處先生左太冲三都賦以西蜀公子東吳王孫魏國先生皆改名換字踏襲一律無復超然新意祝堯云賦也格轍與前篇同篇中句末用乎字疑辭亦與前篇義同其即荀卿諸賦句末者耶者歟等字之體也古今賦中或為歌曰莫非以騷為祖他有誶曰重曰之類即是亂辭中間作歌如前赤壁之類用倡曰少歌曰體賦尾作歌如齊梁以來諸人所作用此篇體三閭漁父見而問之曰子非三閭大夫與吳旦生曰三閭之職掌王族三姓曰昭屈景屈原序其譜屬率其賢良以厲國士漢興徙楚昭屈景於長陵以强幹弱支則三姓至漢初猶盛也莊子曰昭景也著戴也甲氏也著封也非一也說云昭景甲三者皆楚同宗也甲氏其即屈氏歟秦欲與楚懐王㑹武闗昭睢屈平皆諫王無行襄王自齊歸齊求東地五百里昭常請守之景鯉請西索救於秦東地復全三閭之賢者忠於宗國所以長久詳困學紀聞歴代詩話巻十
