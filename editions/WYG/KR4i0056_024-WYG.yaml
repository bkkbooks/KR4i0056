body:
  text: 歴代詩話巻二十四歸安吳景旭撰丁集中之上古樂府箜篌引唐子西曰古樂府命題皆有主意後人用樂府為題者當代其人而措辭如公無渡河須作妻止其夫之詞太白輩或失之吳旦生曰古今注箜篌引即公無渡河霍里子髙妻麗玉所作子髙晨起刺船有白首狂夫被髮提壺亂流而渡其妻隨止不及遂溺死於是援箜篌鼓之作公無渡河之曲曲終亦投河死子髙還以聲語麗玉麗玉以箜篌寫其聲曰箜篌引余觀曹植云置酒髙殿上親友従我遊似言及時行樂又云久要不可忘薄終義所尤似及交情大非古辭之意李白有二篇一曰公無渡河乃言渡河事一曰箜篌引亦言交情此子西所謂失之也吳正子謂歴觀前作大抵以箜篌引命題者不言叟溺以公無渡河命題者則及之皆不足語樂府矣漢書禱祀太乙后土作坎侯坎聲也使樂人侯調作之取其坎坎應節也因其姓命曰坎侯古今韻㑹云漢武令樂人侯暉依琴造竷竷空侯也一名坎侯竷即古坎字野客樷書云坎國之侯名暉也楊升庵曰當作空侯今作箜篌加竹贅矣其器只絲朩二物與竹了不相干大樂部空侯二十三絃在樂器中最大且髙凡琴瑟􅌙箏琵琶阮咸之屬絲木相去皆未寸許惟空侯絲與朩相去逺聲自空出空侯之名或因此釋名箜篌師延所作靡靡之音空國之侯所好也容齋隨筆謂考侯國無名空者余以此言大是憒憒按樂府雜録云箜篌乃鄭衛之音權輿也以其亡國之音故號空國之侯陌上桑樂府解題曰古辭日出東南隅照我秦氏樓舊說邯鄲女子姓秦名羅敷為邑人千乗王仁妻仁後為趙王家令羅敷出採桑于陌上趙王登臺見而恱之置酒欲奪焉羅敷善彈箏作陌上桑以自明不従按其歌辭稱羅敷採桑陌上為使君所邀羅敷盛誇其夫為侍中郎以拒之與舊說不同若陸士衡扶桑昇朝暉等但歌佳人好㑹與古調始同而末異吳旦生曰吳兢以侍中郎之詞與家令不合遂病之樂府原題云侍中郎漢官也恐仁為趙王家令後為漢侍中郎也余最喜樂府集有云大抵詩人感咏隨所命意不必盡當其事所謂不以辭害意也且發乎情止乎禮義古詩之風也今次是詩益將體原其蹟而以辨麗是逞約之以義殆有所未合而盧思道傅縡張正見復不究明更為祖述使若其夫不有東方騎不為侍中郎不作専城居乃得従使君之載歟如劉邈王筠之作蠶不飢日未暮亦安得徬徨為使君留哉蕭撝殷謀曽不足道而沈君攸所謂看金怯舉意求心自可知亦庶幾焉故秋胡婦曰婦人當採桑力作以養舅姑亦不願人之金此真烈婦之詞耳王子喬王弇州曰仙人有兩王喬其一即太子晉其一栢人令天降玉棺者也楊升庵曰史記封禪書注引裴秀冀州記云緱氏仙人廟者昔有王僑犍為武陽人為栢人令於此登仙非王子喬也唐詩王子求仙月滿臺又云可憐緱嶺登仙子猶自吹笙醉碧桃盖世以王僑為王子喬誤也久矣胡元瑞曰汲冡書師曠稱晉為王子故樂府稱王子喬非姓王氏也喬當是晉别名惟為葉縣令而飛鳬與為柏人令而食芝者則名姓俱同又同為令最易相亂非精加考核未易得之吳旦生曰劉向列仙傳云王子喬者周靈王太子晉也好吹笙作鳳鳴浮丘公接以上昇三十餘年見者曰告我家七月七日待我緱氏山頭果乗白鶴翔山頭舉手謝人而去為立祠於維氏山下據此則緱氏仙人廟乃太子晉事封禪注悞引入王伯僑之下而升庵反悞認為非王子喬也元瑞指出晉為王子而葉縣柏人又有兩人極為顯著故弇州概稱兩王喬亦未安按海録碎事云一王子晉王喬二葉令王喬三服肉芝王喬皆神仙也長歌行滄浪詩評曰文選長歌行只有一首青青園中葵者郭茂倩樂府有兩篇次一首乃仙人騎白鹿者仙人騎白鹿之篇予疑此詞岧岧山上亭以下其義不同當又别是一首郭茂倩不能辨也吳旦生曰觀魏文帝所賦似擬仙人騎白鹿一首陸士衡所賦似擬青青園中葵一首其詞意各合古辭而解題謂曹魏改奏晉陸士衡不與古文合何也岧岧山上亭以下細閱絶不相䝉嚴氏駁之有見當藝苑巵言曰古樂府悲歌可以當泣逺望可以當歸二語妙絶老杜玉佩仍當歌當字出此用修引孟德對酒當歌云子美一闡明之不然讀者以為該當之當矣大瞶瞶可笑孟德正謂遇酒即當歌也下云人生幾何可見矣若以對酒當歌作去聲有何趣味吳旦生曰焦弱侯謂元美此言悞㑹用修之意矣用修正讀當為平聲如當時之當言人生對酒與當歌之時無幾耳何嘗作去聲如當泣當歸之當哉子美詩當亦作平聲若如元美讀不成詩矣杜康武帝短歌行何以解憂唯有杜康吳旦生曰選注杜康或云黄帝時宰人號大謬盖古之造酒者武帝用東方生銷憂唯酒之意故不言酒直言杜康耳束晳勸農賦盖田熟啖紆其腹而杜康咥其胄白樂天詩杜康能解悶潘佑詩直儗將心付杜康亦如劉白墮工釀東坡乃云獨對紅蕖傾白墮也眉公筆記杜康泉在舜祠東廡下世傳杜康用斯泉釀酒或以揚子江水并惠山泉稱之一升重二十四銖是泉重二十三銖莊􅠤王粲従軍詩館宇充􅆵里士女滿莊馗自非聖賢國誰能享兹休吳旦生曰五臣作􅠤音仇協韻李善注引肅肅兔罝施于中馗楊升庵謂作􅠤音求字从九从酋為是又說文馗音逵九逵道也似龜背故曰馗从九首一道為一首與􅠤同義而異音今人不識􅠤字皆従首悞矣升庵此說最當而正楊謂韻㑹支尤二韻通作馗恐未足以折升庵也豫章行樂府解題曰古辭今闕悞不傳陸士衡泛舟清川渚傷離别言夀短景馳容華不久若曹植擬豫章行為窮達傅休奕苦相篇云苦相身為女言盡力於人終以華落見棄亦題曰豫章行吳旦生曰樂府集謂豫章邑名漢南昌縣隋為豫章有豫章江江連九江有釣磯陶侃少時嘗宿此夜聞人唱聲如量米者訪之吳時有度支於此亡今考傅𤣥陸機輩所作多叙别離怨恨思即知豫章昔為華艷盛麗之區耳至唐杜牧詩尚過稱其侈靡焉董逃行古辭言神仙事傅休奕九弈篇十六章乃叙夫婦别離之思非也吳旦生曰樂府原題謂此辭作於漢武之時盖武帝有求仙之興董逃者古仙人也後漢遊童競歌之終有董卓作亂卒以逃亡此則謠䜟之言因其所尚之歌故有是事實非起於後漢也余觀别本逃一作桃梁簡文行幸甘泉宫歌云董桃律金紫賢妻侍禁中似引董賢及子瑕殘桃事終云不羨神仙侣排煙逐駕鴻皆所未詳詩話又引漢武内傳王母觴帝索桃七枚以四㗖帝自食其三因命董雙成吹雲和笙侑觴作者取此竊以樂府之題亦如關雎葛覃之類只取篇中一二字以命詩非有義也若以董字桃字泥其義此與作鐃歌巫山髙雜以陽臺神女之事君馬黄但言馬者其荒陋一也蔡寛夫所云烏生八九子但咏烏雉朝飛但咏雉雞鳴髙樹巔但咏雞大抵類此而甚有相府蓮訛為想夫憐楊㜑兒訛為楊叛兒者矣七十二春渚紀聞曰玉臺詩入門時左顧但見雙鴛鴦鴛鴦七十二羅列自成行孟郊薔薇歌仙機軋軋飛鳳凰花開七十有二行不知皆用七十二取義何也吳旦生曰田子藝言是美人之數也古人多言三三美人夫三三則六而六六則為三十六矣左右各三十六合之則為七十二矣盖六者隂數之極而六六三十六者又純隂之數故用之婦人也余以此語未免穿鑿後見真率筆記云霍光園中鑿大池植五色睡蓮養鴛鴦三十六對望之爛若披錦故相逢行云鴛鴦七十二羅列自成行按玉臺詩乃樂府相逢行古辭也乃知古辭確有所祖可以釋陶南村之疑矣梁簡文筝賦鴛鴦七十二亂舞未成行李太白詩七十紫鴛鴦雙雙戲庭幽皆取當時相對之義雞鳴又云舍後有方池池中雙鴛鴦鴛鴦七十二羅列自成行盖言方池正従園中大池入想也此樂府亦用霍家事實楊廉夫詩别院三千紅芍藥洞房七十紫鴛鴦此亦影借句耳若楊升庵詩芳池七十二寶帳三千重則是池有七十二耶楊廉夫金臺篇云上有七十二鳳凰金鼎玉食髙頡頏丈人顔氏家訓曰古樂府歌辭先述三子次及三婦婦是對舅姑之稱其末章云丈人且安坐調絃未遽央古者子婦供事舅姑旦夕在側與兒女無異故有此言丈人亦長老之目今世俗猶呼其祖考為先亡丈人又疑丈當為大北間風俗婦呼舅為大人公丈之與大易為悞耳近代文士頗作三婦詩乃為匹嫡並耦巳之羣妻之意又加鄭衛之辭何其謬乎吳旦生曰顔之推疑大悞為丈不知古有丈人之稱唐翊仁鮫人潛織詩三日丈人嫌武則天怒魏𤣥同賜死于家監刑御史房濟曰丈人何不告密可以自直史記索隠注韋昭云古者名男子為丈人尊父嫗為丈人故漢書宣元六王傳所云丈人謂淮陽憲王外王母即張博母也黄震云易經丈人程子謂尊嚴之稱朱子謂長老之稱丈者黍龠尺引之積說文云周制以八寸為尺十尺為丈人長八尺故曰丈夫論衡云人形以一丈為正故名男子為丈夫尊翁嫗為丈人淮南子云老者杖於人為丈人野客樷書云今人呼丈人為泰山或者謂泰山有丈人峯故云青城山記云青城為五嶽之長名丈人山俗呼人婦翁為令嶽妻之伯叔為列嶽因此歐陽永叔云呼妻父為嶽翁以泰山有丈人峯呼妻母為泰水不知出何書據雜俎載明皇東封張說為封禪使三公以下皆轉一品說以壻鄭鎰官九品因說遷五品𤣥宗怪而問之黄幡綽對曰泰山之力也與前說不同陳后山送外舅詩丈人東南英注謂丈人為婦翁之稱三國志獻帝舅車騎將軍董承而裴松之注謂古無丈人之名故謂之舅晉書王忱任達婦父常有慘忱乗醉弔之舊唐書獨孤郁以婦父辭内職憲宗曰權德輿有此佳壻按裴松之宋元嘉時人呼婦翁為丈人已見此時余因樂府丈人之語附入此條竊以松之古無丈人之言未曽深考而勉夫謂南史時已見亦失之也觀史記漢天子我丈人行則三國前早已有之漢書郊祀志大山川有嶽山小山川有嶽壻豈以山嶽有壻因謂婦翁為嶽耶㮴㮴甄后塘上行邊地多悲風樹朩何㮴㮴吳旦生曰㮴音颼古本楚辭風䬃䬃兮朩㮴㮴今本作蕭而音亦叶颼故樂府亦作蕭蕭又作翛翛總不若搜搜字之古也按甄后中山無極人為文帝后其後為郭貴嬪譛賜死臨終作此詩而前志云晉樂奏魏武帝蒲生我池中至今題下刋魏武帝字皆譌秋胡妻劉子𤣥曰列女傳載秋胡妻者尋其始末了無才行可稱直以怨懟厥夫投川而死輕生同於古冶徇節異於曹娥此乃凶險之頑人强梁之悍婦輒與貞烈為伍有乖其實焉吳旦生曰按秋胡宦歸路見美婦願奉以金婦曰婦人當採桑力作以養舅姑不願人之金只此數語節孝昭彰此傅𤣥所謂烈烈貞女忿言辭厲秋霜也卒惡其行投河而死謂非列女不可自子𤣥之論一出楊升庵謂當祠於妬婦津以劉伯玉妻配享胡元瑞謂當名秋胡妻所投水曰悍婦川皆非允論横汚古烈文人口業一至於此西京雜記云杜陵秋胡為翟公所禮欲以兄女妻之或曰秋胡已經娶而失禮妻遂溺死不可妻也馳象曰今之秋胡非昔之秋胡也豈得以昔之秋胡失禮而絶㛰今之秋胡哉枯桑海水飲馬長城窟行枯桑知天風海水知天寒入門各自媚誰肯相為言吳旦生曰翰注謂枯桑無葉則不知天風海水不凍則不知天寒喻婦人在家不知夫之消息也善注謂枯桑無枝尚知天風海水廣大尚知天寒喻夫在逺不知婦之憂戚也余意合下二句總看乃云枯桑自知天風海水自知天寒以喻婦之自苦自知而他家入門自愛誰相為問訊乎戰國趙燕皆築長城以備邊自隂山止遼東謂之古長城至秦始皇西起臨洮東入髙麗連亘萬里按酈道元水經注及樂府廣題謂其南北皆有泉窟漢時征戍之士飲馬於此乃作是曲王僧䖍伎録以為相和歌辭之瑟調曲也凡婦人思逺者亦借此題以寄情焉此則其辭也雙鯉魚夷白齋詩話曰客従逺方來遺我雙鯉魚呼童烹鯉魚中有尺素書魚腹中安得有書古人以喻隠密也魚沈潛之物故云吳旦生曰五臣注相思感通夢寐之間若有使來遺者又云命家童殺而開之中遂得書不知此乃想像之詞借枯桑海水以喻他鄉異縣字字神境若說殺魚無乃痴騃按漢時書札相遺或以絹素結成雙鯉之形即緘也非如今人用蠟唐李氏季蘭結素魚貽人云尺素如殘雪結為雙鯉魚欲知心裏事看取腹中書盖其遺制長城陳琳飲馬長城窟行云生男慎莫舉生女哺用脯君獨不見長城下死人骸骨相撑拄吳旦生曰秦築長城時死者相屬民歌云生男慎勿舉生女哺用脯不見長城下尸骸相支柱則孔璋乃用其時諺語也竹竿卓文君白頭吟云竹竿何嫋嫋魚尾何簁簁吳旦生曰漢鐃歌二十二曲今所傳朱鷺等十八曲而務成𤣥雲黄雀釣竿四曲無傳焉余嘗擬朱鷺等因為補四曲是也其所謂釣竿者古今注云伯常子避仇河濱為漁父其妻思之每至河側作釣竿之歌後司馬長卿作釣竿詩今傳為古曲也故文君言竹竿魚尾正引伯常子事以諷長卿耳劉坦之補注云嫋嫋簁簁並搖動貌以比相如之心不定又將他圖也梁父樂府解題曰梁甫吟盖言人死葬此山亦葬歌也吳旦生曰西溪叢語謂張衡四愁詩欲往従之梁父難注云泰山東嶽也君有德則封此山願輔佐君王致於有德而為小人讒邪之所阻梁父泰山下小山名諸葛好為梁父吟恐取此意按青州圖經云三士冡在臨淄縣南一里三墳週圍一里髙二丈六尺張朏齊記云是烈士公孫捷田開疆古冶子三士冢所謂二桃殺三士者遙望蕩隂里解題作追望隂陽里嚴滄浪云青州有隂陽里歴代詩話巻二十四
