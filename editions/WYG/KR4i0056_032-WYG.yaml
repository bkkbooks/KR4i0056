body:
  text: 歴代詩話巻三十二歸安呉景旭撰戊集下之上漢魏六朝一麾顔延之詠阮始平云屢薦不入官一麾乃出守呉旦生曰山濤啟事曰咸若在官人之職必妙絶於時舉咸為吏部郎三上武帝不能用潘子真詩話亦謂山濤三薦咸為吏部郎武帝不能用荀朂一麾之則左遷始平太守野客樷書云延年賦此盖有為也徐羡之不悦延年出爲始安太守謝晦謂延年曰昔荀朂忌阮咸斥為始平郡今卿為始安可謂二始延年後復為劉湛出爲永嘉太守怨憤之甚故有是作舊注但云延年踈曠劉湛出為永嘉太守而不及其他是未深知其意夢溪筆談曰今人守郡謂之建麾盖用顔延年詩悞也延年謂一麾者乃指麾之麾非旌麾之麾也自杜牧之有擬把一麾江海去始悞用一麾自此遂爲故事緗素雜記曰自謂一麾於理無礙但不可以此言贈人宋景文詩使麾領得印垂腰又一封通奏領州麾是真得延年之意也野客樷書曰唐人皆用一麾事獨牧之把一麾為露圭角似失本意張説詩湘濱擁出麾此亦何害筆談謂守郡為建麾自牧之始按三國志擁麾守郡文選建麾作牧此語在牧之前乆矣謂把一麾之悞則可謂建麾之悞則不可若雜記徒妄説耳牧之正悞以為旌麾之麾景文之悞亦然乃謂牧之不當言擬把而景文自用爲宜然則牧之擬把一麾江海去豈不自用景文使麾請得印垂腰獨非旌麾耶所謂貶辭者麾去云爾既是旌麾何貶之有埋照顔延之詠阮歩兵云沈醉似埋照呉旦生曰杜詩遂令阮籍軰熟醉為身謀許彦周稱其善㸔史書鍾伯敬謂晉文王目歩兵為慎已是㸔得深一歩矣然實被阮公瞞過其作用在此五字余考宋書言延之領歩兵好酒踈誕不能斟酌出為永嘉守甚怨憤故於沈醉䖏形容入微其謂阮埋照正為顔寫照洵五君詠多自寓也王弇州云沈醉似埋照寓辭類托諷鸞翮有時鎩龍性誰能馴以比已之骯髒也韜精日沈飲誰知非荒晏以觧已之任誕也屢薦不入官一麾乃出守以感巳之濡滯也千翼顔延之詩千翼泛飛浮註云翼舟也兵法有大翼中翼小翼之名呉旦生曰越絶書闔閭見子胥問船運之備對曰船名大翼小翼突冐楼船橋船大翼者當陵軍之車小翼當陵軍之輕車又水戰兵法内經云大翼一艘廣一丈五尺三寸長十丈中翼一艘廣一丈三尺五寸長九丈小翼一艘廣一丈二尺長五丈六尺盖戰船也而詩家泛以舟用之如張景陽七命云爾乃浮三翼戲中沚梁元帝云日華三翼舸張正見云三翼朩蘭船元微之云光隂三翼過詩禍吟牕雜録曰池塘生春草園柳變鳴禽謝靈運坐是詩得罪遂託以阿連夢中授此語有客以請舒王曰不知此詩何以得名於後世何以得罪於當時王曰權德輿已甞評之其畧云池塘者泉水瀦溉之地今曰生春草是王澤竭也􅃎詩所紀一蟲鳴則一候變今曰變鳴禽是候變也呉旦生曰謝氏家録言康樂毎對惠連輙得佳語後在永嘉西堂思詩竟日不就寤寐間忽見惠連即成池塘生春草故常云此語有神助非吾語也以此韻事譜此韻語可令千載遥溯權文公謂其託諷深重為廣州祻張本此等附㑹惡劣勝致頓削余所恨恨而荆公天資巉刻取為美談乃東坡詩案禍所由階王百禄所謂此安石鵪鶉獄也謂相牽引以入䂬溪詩話以園林變鳴禽不若前句以此知全寳不易得余竊以上句生字嫌其未亮下句變字筆㡳有造化遷移最為神活石林詩話作變夏禽失其㫖矣皎然詩式云客有問予謝公二句優劣奚若予謂如池塘生春草情在言外明月照積雪㫖冥句中風力雖並取興各别古今詩中或一句見意或多句顯情王昌齡云日出而作日入而息謂一句見意為上此殊不爾夫詩人作用勢有通塞意有盤礴勢有通塞者謂一篇之中後勢突起前勢似斷如驚鴻背飛却顧儔侣即曹植詩云浮沉各異勢㑹合何時諧願因西南風長逝入君懐是也意有盤礴者謂一篇之中雖詞歸一㫖而興乃多端用識與才蹂踐理窟如卞子採玉徘徊荆岑恐有遺璞其有二義一情一事者如劉越石詩曰鄧生何感激千里來相求白登幸曲逆鴻門頼留侯重耳用五賢小白相射鉤茍能隆二伯安問黨與讐是也情者如康樂公池塘生春草是也抑由情在言外故其辭如澹而無味常手覧之何異文侯聽古樂哉捫虱新語云詩有格有韻淵明悠然見南山之句格髙也康樂池塘生春草之句韻勝也格髙似梅花韻勝似菊花牽絲謝康樂詩牽絲及元興觧龜在景平五臣注云牽絲謂牽王如絲之言而仕也李善云牽絲謂牽朱絲初仕也觧龜謂觧去所佩龜印去官也呉旦生曰按應休璉詩不悟牽朱絲三署來相尋則李善之言可信文苑英華康子元判云萬里牽絲俄畢子荆之任觀此則五臣所釋王言如絲復成何語鳴䈔蘭巵謝靈運送孔令詩鳴䈔戾朱宫蘭巵獻時哲呉旦生曰劉履補注云䈔蘆也以蘆為首竹為管似觱篥但無竅耳晉先蠶儀注云凡車駕所止吹小箛發吹大箛箛即䈔也余觀陸士衡詩鳴䈔泛蘭汜海録碎事云䈔謂笛也恐非國秀集沈宇詩𦍑笛胡䈔淚滿衣若䈔即是笛則沈不當並舉此其譌立見矣漢郊祀歌云百末㫖酒布蘭生顔師古謂百末百草華之末也㫖美也以百草花末雜酒故香且美也晉灼謂芬香布外若蘭之生也枚乘七發云蘭英之酒酌以滌口良注謂酒中漬蘭葉取其香也龍城録云魏證能治酒有名曰醽渌翠濤常以大金甕内貯盛十年其味不敗太宗賜詩稱醽渌勝蘭生翠濤過玊薤蘭生即漢武百味㫖酒也玊薤煬帝酒名送孔令瑯琊漫抄曰謝靈運送孔令詩季秋邉朔苦旅雁違霜雪凄凄陽卉腓皎皎寒潭潔上二句見孔令避地之意三句喻時四句美孔賦而比也在宥天下理吹萬羣方悦詩意微婉喻宋公尤妙呉旦生曰臨川詩良辰感聖心豫章詩聖心眷嘉節時宋公将踐阼故多尊稱之而孔令且辭事東歸焉臨川詩末之傷薄劣豫章詩末之嘆飛蓬亦自㣲婉孫光庭云豫章送孔令詩風至授寒服霜降休百工延濟注霜降膠漆堅可以為噐故美百工之功也按月令季秋霜始降則百工休注謂膠漆之作停也宣逺亦用此意言嵗時晏授寒衣停百工人民安可以謀讌飲餞賔客也而延濟訓休為美言霜降膠漆堅可為噐物則興工勞苦何歡讌之有且時方寒凛非用膠漆之日延州楚老謝康樂廬陵王墓下詩延州恊心許楚老惜蘭芳觧劍竟何及撫墳徒自傷呉旦生曰焦氏筆乘謂以後二句足前二句也李太白亦有此格如毛遂不堕井曽参寕殺人虚言談公子投杼惑慈親是也至老杜徃徃有之喜弟觀到詩待爾嗔烏鵲抛書示鶺鴒枝間喜不去原上急曽經寄張山人詩曹植休前軰張芝更後身􅂾篇吟可老一字買堪貧卧病詩滑憶雕胡飯香聞錦帶􅃵溜題兼暖腹誰欲致盃罌晴詩啼烏争引子鳴鶴不歸林下食遭泥去髙飛恨乆隂術謝康樂詩天路非術阡呉旦生曰選注術阡道路也言若登天無道路可測度也余按廣雅云畛涂阡陌術亦道路别名也吕氏春秋云孟春審端徑術注端正其徑路不得邪行也謝康樂羅浮山賦洞穴之寳衢海靈之雲術王子安七夕賦躍麟軒於霧術搴斾羽於星橋左太冲詠史詩冠盖䕃四術朱輪竟長衢劉義恭詩飛流界桂道深林冐蘭術説文術邑中道也从行术則知術字中當作术字今俗文作木字非是示兒編云莊子謂人相忘於道術當讀如經術之術廣雅曰術亦道路别名吕氏春秋曰子産相鄭桃李垂於術謝靈運登石門最髙頂云來人迷新術去子惑故磎注曰術磎皆山路也陳晉之觧學記術有序曰鄉飲酒荘周皆有道術之説是途之大者謂之道小者謂之術信乎荘周以湖江對道術而言則直指為道路無疑矣杜甫寄韋尹丈人云牢落乾坤大周流道術空以道術對乾坤皆明此意遲客謝靈運南楼中望所遲客云登樓為誰思臨江遲來客呉旦生曰古音云遲音滯待也欲速而以彼為緩曰遲使彼徐行以待亦曰遲易曰遲歸有時荀子遲彼止而待我漢髙紀遲明圍宛城三匝又遲旦注旦遲於事故曰遲旦公孫𢎞傳臣竊遲之光武詔曰思遲直士側席異聞趙壹報皇甫規書曰實望仁兄昭其懸遲謝安與支遁書思君日積計辰傾遲庾杲之與劉虬書勝槩冥通諒有風期之遲今俗亦有遲滯之言而字别作滯云雲錦韻語陽秋曰文選海賦雲錦散文於沙汭之際故謝靈運詩有赤玊隠瑶溪雲錦彼沙汭之句觀其語意正言沙石五色如雲錦被於岸爾世見韓退之作曲江荷花行云撑舟昆明度雲錦遂謂退之以雲錦二字狀荷花其實非也謂之度雲錦言舟行於五色沙石之際豈謂荷花哉呉旦生曰酈道元所謂湘川清照五六丈下見底石如摴蒱白沙如霜雪赤崖若朝霞正與此同意然此詩乃江文通所擬非康樂作也汭音爇説文水相入也廣韻水曲詩話水内曰汭字學水北曰汭奔崩謝康樂七里瀬詩徒旅苦奔峭呉旦生曰古奔與崩通用故奔峭注謂崩落按鮑昭詩客行惜日月崩波不可留崩波即奔波也杜甫詩楓栝隐奔峭注奔謂奔流峭謂峭峰尚子謝康樂初去郡詩畢娶類尚子呉旦生曰稽康髙士傳尚長字子平為子嫁娶畢勑家事勿復相闗當如我死范􅈌後漢書尚作向余觀從來稱引或作尚平或作向平豈各據所出汔無定屬耶張伯起云古人姓名且不免有悞况其遺事哉三殤謝瞻遥和張子房詩苛慝暴三殤呉旦生曰禮有上中下三殤謂秦政兇暴戮及孥稚也五臣注及劉履補注皆以㤗山婦人所云吾舅死於虎吾夫又死焉吾子又死焉是謂三殤絶不思舅與夫可謂殤乎舊知明牧謝瞻詩方舟析舊知對筵曠明牧呉旦生曰文選詩題下注云王𢎞為撫軍将軍庾登之以西陽太守入為太子庶子撫軍送至湓口瞻賦是詩盖詩專為别庾西陽也舊知明牧俱當指庾而言李善注以舊知為庾明牧為王五臣注以明牧為王庾俱非誕謝瞻答靈運詩華宗誕吾秀之子紹前𦙍呉旦生曰生民之詩多用誕字後人遂以生辰為誕辰此謝宣逺詩所自來也然生民篇上文明言載生載育故下文云誕彌厥月誕寘之隘巷連下􅂾誕字未嘗訓為生育也吕氏讀詩紀云誕字疑但發語辭似與誕先登於岸一例如云誕生也按左思贈妹詩峩峩令妹應期誕生陸機詩誕育洪曹纂成於魯左九嬪誄篤生公土誕膺休禎則言誕復言生不幾重耶如云誕大也玊篇天子生曰降誕謂天子所生之大也按書多方乃大降罰崇亂有夏亦可云誕降耶大誥云有大艱於西土殷小腆誕敢紀其序康誥云天乃大命文王殪戎殷誕受厥命多方云有夏誕厥逸乃大滛昏不克終日則大與誕毎連用之豈必以誕訓大耶如云誕乃也按大禹謨帝乃誕敷文德則乃誕並言何耶如云誕欺也按荀子云匿行曰詐易言曰誕淮南説林云管子以小辱成大榮蘓秦以百誕成一誠劉琨答盧諶書云然後知􅆅周之為虛誕嗣宗之為妄作晉中興書孫承公少任誕不羈晉陽秋羅友誕肆非治民才宋符瑞志武帝少時誕節嗜酒據此觧豈是美事而今之祝壽曰誕是直以放誕相詬厲耳寒螀謝惠連擣衣詩烈烈寒螀啼呉旦生曰劉坦之補注引髙誘淮南子注云寒螀水鳥也此觧悞按風土記蟪蛄鳴於朝寒螀鳴於夕楊升菴謂此蟬也而分二蟪蛄朝蟬寒螀夜蟬也方言蟬楚謂之蜩音調宋衛之間謂之螗蜩似蟬而小鳴聲清亮江南呼螗蛦陳鄭之間謂之蜋音良蜩秦晉之間謂之蟬海岱之間謂之䗁齊人呼為巨䗁音枝其大者謂之蟧或謂之蝒馬按爾雅云蝒馬者蜩非别名蝒馬也此方言悞耳其小者謂之麥蚻如蟬而小青色今關西呼麥􅝺音癰􅂒之􅂒有文者謂之蜻蜻即蚻也爾雅云耳其雌蜻謂之疋祖一反大而黒者謂之䗃音棧黒而赤者謂之蜺音霓蜩蟧謂之􅫞蜩江東呼為􅫞􅝺也􅣒謂之寒蜩寒蜩瘖蜩也按爾雅以蜺為寒蜩月令亦曰寒蜩鳴知寒蜩非瘖者也此諸蝉名通出爾雅而多駁雜未可詳據也寒蜩螀也似小蝉而色青􅣒音應余觀郭璞觧云寒蜩螀也亦可証然謂寒蜩非瘖考之陸佃埤雅云寒蜩即今啞蟬啞蟬初瘖及得寒露冷風乃嗚故芻蕘論曰秋風至而寒蟬吟正謂此也然則方言原其始故謂之瘖蜩串謝惠連秋懐詩因歌遂成賦聊用布親串呉旦生曰串讀為慣爾雅串習也向注串狎也言因歌咏成賦此詩聊用布與親狎之人桓子野對孝武請一吹笛人云臣有一奴善相便串梁簡文妾薄命云長嚬串翠眉徐興公謂美女嚬眉額痕成串也裴諴南歌子詞云不是厨中串争知炙裏心嘉月惠連獻康樂詩漾舟陶嘉月呉旦生曰注陶喜也按王褒九懐云陶嘉月兮總駕王逸注及吉時也梁昭明答湘東書云陶嘉月而嬉逰藉芳草而眺矚蕭子範家園三日賦懽兹嘉月悦此時良宗衮謝𤣥暉和王著作詩阽危頼宗衮微管寄明牧呉旦生曰𤣥暉又詩英衮暢人謀泛言宰相耳此言宗衮謝安也明牧謝𤣥也李善注甚當而五臣荒陋極矣容齋随筆云謝安於𤣥暉為逺祖以其為相故曰宗衮而李周翰注宗衮謂王導導與融同宗言晉國臨危頼王導而破苻堅牧謂謝𤣥亦同破堅者夫以宗衮為王導固可笑猶以和王融之故微為有説至以導為與𤣥同破苻堅全不知有史䇿而狂妄注書所謂小兒強觧事賈誼曰安有天下阽危若是注臨危曰阽音鹽野客叢書曰取論語㣲管仲之義歇後語也潘安仁詩豈敢陋㣲管宋氏詔曰謝元勲叅微管劉義康傳臣以頑昧獨獻㣲管傅亮碑道亞黄中功叅微管又陳蕭沇表曰功深㣲禹亦取㣲禹吾其魚之義余觀傅季友修張良廟教云㣲管之歎黄山谷䟦仁宗賜王太尉書云當時士大夫亦有微管之歎者陸放翁詩垂死功名亦未晩安知無人歎㣲管洪武初趙子常詩向無㣲管歎孰憶到於今萬厯中張德馨過三歸臺詩㣲管勛名賁草萊齊原東望起髙䑓平楚唐子西語録曰謝𤣥暉詩寒城一以望平楚正蒼然平楚猶平野也吕延濟乃用翹翹錯薪言刈其楚謂楚為朩叢便意象殊窘凡五臣之陋類若此呉旦生曰朩之孑然特出者為楚從城而眺一槩如平所謂望平地樹如薺也楊升菴云楚樷朩也平楚猶詩所謂平林也陸機詩安轡遵平莽謝語本此唐詩燕掠平蕪去又逰絲蕩平緑又因謝詩而衍之也余謂此語殊妙若作平野有何意象張恊詩青苕日夜黄芳蕤成宿楚注亦云樷朩也澄江謝𤣥暉詩澄江静如練王弇州曰後人以澄静複義欲改秋江予不敢以為然盖江澄乃静耳呉旦生曰囘首長安飛甍参差皆從澄字中看来一篇着力此一字即題中還望京邑具有包藴在改作秋江奚啻萬里郭彦深云澄字調足而氣充秋字調輕而氣薄平氣吟之澄字如權衡之不欹秋字如衡之上指權之跳躍若改作春字如衡低而權下墜矣明道雜志云宣城去江近百里州治左右無江但有両溪耳或當時謂溪為江亦未可知也藝苑雌黄云按𤣥暉晩登三山還望京邑作詩有澄江之語三山在江寕縣北十二里濵江地名則此詩非在宣城州治所作也髙卧謝𤣥暉詩淮陽股肱郡髙卧猶在兹呉旦生曰李周翰注漢淮陽太守汲黯上書言病上曰淮陽吾股肱郡卿為我卧理之野客樷書云按漢書文帝謂季布曰河東吾股肱郡故特召君耳而武帝謂汲黯則曰君薄淮陽耶吾今召君矣初無淮陽吾股肱郡之説又按汲黯傳言淮陽卧治初無髙卧之説劉禹鍚詩肯放淮陽髙卧人盖祖𤣥暉詩也龍山鮑明逺詩寒風吹朔雪千里度龍山呉旦生曰大招云北有寒山逴龍赩只王叔師注逴龍山名言北方有常寒之山隂不見日名曰逴龍陸昭仲謂逴龍當作燭龍悞明逺稱為龍山此本晚唐李義山對雪詩龍山萬里無多逺則明逺又為唐人借資矣歴代詩話巻三十二
