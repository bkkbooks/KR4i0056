body:
  text: 歴代詩話巻六十六歸安吳景旭撰壬後集上之中元詩四大家輟耕録曰嘗有問於虞伯生曰仲𢎞詩如何伯生曰仲𢎞詩如百戰健兒徳機詩如何曰徳機詩如唐臨晉帖曼碩詩如何曰曼碩詩如美女簪花先生詩如何笑曰虞集乃漢廷老吏盖先生未免自負公論以為然吳旦生曰元詩以虞待制伯生諱集楊編脩仲𢎞諱載范應奉徳機諱椁掲應奉曼碩諱徯斯為稱首謂之四大家唯趙承㫖松雪諱孟頫得頡頏其間李元仲云豫章三日新婦掲蒲城百戰健兒楊蜀郡唐臨晉帖虞清江漢法令師范語與輟耕小異掲曼碩為徳機詩序云伯生嘗評仲𢎞詩如百戰健兒徳機如唐臨晉帖以予為三日新婦而自比漢廷老吏也又與元仲小異堯山堂外紀云揭聞三日新婦之語不悦嘗中夜過伯生問及兹事一言不合揮袂遽去後以詩寄伯生曰奎章分署隔忩紗不㫁香風别殿花留守日頒中賜果宣徽月送上供茶諸生講罷仍番直學士吟成毎自誇五載光隂如過客九疑無處望重華伯生得詩謂門人曰揭公才力竭矣就答以詩云故人不肯宿山家夜半驅車踏月華寄語旁人休大笑詩成端的向誰誇并題其後云今日新婦老矣掲召至都果疾卒伯生麓堂詩話曰極元之選惟劉靜脩虞伯生二人皆能名家世恒為劉左袒予獨於虞有取焉吳旦生曰輟耕録載楊仲𢎞毎言伯生不能作詩虞載酒問作詩之法楊既酒酣盡為傾倒虞遂超悟其理繼有詩送袁伯長扈駕上都以所作詩介他人質諸楊楊曰此非伯生不能也或曰先生嘗謂伯生不能作詩何以有此曰伯生學問髙予曽授以作詩法餘莫能及又以此詩詣趙松雪有山連閣道晨留輦野散周廬夜屬橐之句趙曰若改山為天野為星則尤美虞深服之詩話類編曰伯生在宜黄時嘗倚樓吟詩有五更皷角吹殘雪之句忽隔溪一童揖而言曰角可吹皷不可吹亟命召之已失所在盖詩鬼也滕王閣麓堂詩話曰胡澹菴集載虞伯生滕王閣三詩其曰天寒髙閣立蒼茫百尺闌干送夕陽曰燈火夜歸湖上雨隔簾呼酒説干將信非伯生不能作也今道園遺稿如此詩者絶少吳旦生曰葉盛謂道園文集往時劉伯温所刻大字本有歐陽圭齋序今板已亡矣近見崑山新刻幹克莊建本遂於先生四世從孫虞湜家摸得此序并書一通冠諸首云然則伯生詩文㪚落必多今本之所無安知非大字本所有耶李西涯極許伯生故特蒐其逸句又稱伯生畫竹詩古來篆籀法已絶祗有朩葉雕蠶蟲畫馬詩貌得當時第一匹昭陵風雨夜聞嘶成都詩頼得郫筒酒易醉夜歸衝雨漢州城真得少陵家法詩話類編載辛好禮諸人問伯生曰西江登眺之所據江山之勝無踰於滕王閣望湖亭二處公幾過皆不留題何也伯生曰諸公曽見東坡及僧晦幾詩否請與誦之晦幾滕王閣詩云檻外長江去不回檻前楊栁後人栽當時惟有西山在曽見滕王歌舞來四句含無窮之意寓無窮之感東坡望湖亭詩云黒雲翻墨未遮山白雨跳珠亂入船驀地風來忽吹㪚望湖亭下水連天隂陽變化開闔於頃刻之間其氣雄語壯所謂呑雲夢者二詩皆不可及是以無題也餘冬序録云胡頥菴集記伯生最愛晦幾此詩至登閣不敢留題一日為諸生所强乃即席賦三律并一絶其絶句云豫章城上滕王閣不見鳴鑾佩玉聲惟有當時簾外月夜深依舊照江城或謂此劉夢得石頭城語予以為只是要翻晦幾意耳黄鶴樓崔李事與此相類前輩服善毎如此三律者天寒江濶立蒼茫百尺闌干送夕陽嵗久魚龍非故物春深蛺蝶是何王帆檣星斗通南極車盖風雲接豫章燈火夜歸湖上雨隔林呼酒説干將髙閣城頭户牖開江中照見碧崔嵬文章誰復三王後雲氣長從五老來畫角數聲南斗落白鹽萬斛北風回洲南先有蛟龍窟恠得詩成急雨催危樓百尺倚闌干滿目青山不厭看空翠逺凝江樹小落霞飛送酒杯乾千年劍氣侵牛斗半夜天香下廣寒我欲乗鸞朝帝闕五雲深處是長安李西涯嘗誦之為予言宋元來學杜之作惟虞為近而虞此詩尤近杜者此詩今載道園遺稿詩話類編又云吳江虞拳言家有伯生三像其一素冠竹杖其一自書邈乎千載之讃其一歸休戴笠圗自書四律詩今道園學古篇道園遺稿皆無之其辭曰浮雲滿空無所依髙岡獨峙來者稀仙人冉冉遺松老鳴鹿呦呦生草􅏂伐朩逺聞何處谷傾筐近得故時薇山中欲雨霧先合此日先生戴笠歸又南園多竹暑氣㣲由來結屋相因依掛巾石壁晝霧濕沐髪池水朝陽晞頻年車馬踐霜雪六月裳衣無綌絺隣翁問舊坐來久此日先生戴笠歸又老去懸車百慮灰西風獨愛菊花開田家酒熟邀皆去茅屋詩成懶更裁欲及天清飱沆瀣要觀日出上蓬萊赤松有約應相待此日先生戴笠來又莫問隣家駟馬車此身全不要人扶雲霄一羽山頭杜風雨孤村海上蘇薄命長鑱尋積雪多情破帽落輕烏莫圍玉帶垂朱紱此是先生戴笠圗然余觀道園學古篇却載此詩題云陳可復為予寫戴笠圗賦詩四首又見一絶題陳可復所寫像云歸來江上一身輕野服初成拄杖行祗好白雲相伴住天台廬阜聴松聲此所謂素冠竹杖之一像耶草朩子云伯生㓜年過薊門酒樓題詩於壁曰連十八書其詩曰耳目聰明一丈夫飛行八極隘寰區劍吹白雪妖邪滅䄂拂春風朽槁蘇氣集酒酣雙國士情如花擁萬天姝如今一去無消息只有中天月影孤當時皆以為吕洞賓作爭傳誦之撥鐙楊升菴曰虞伯生題畫古朩詩後主撥鐙法盖江南李後主云書有七字法謂之撥鐙法曰擫壓鈎揭抵導送也鐙古燈字撥鐙畫沙懸針垂露皆喻言撥鐙如挑燈不急不徐也楊鐵崖與顧玉山聨句云書出撥鐙侵繭帖可証其音讀吳旦生曰此後主書迹述所云也錢若水云陸希聲得筆法凡五字擫壓鈎掲抵用筆雙鈎則㸃畫遒勁而盡妙矣謂之撥鐙法希聲以授沙門䛒光光入長安為翰林供奉江南後主亦得此法復増二字曰導送王氏談録云江南李主及二徐傳二王撥鐙筆法中朝士人吳遵路待詔尹希古悉得之吳尤以為秘所傳二人與范宗傑而已其法五字擫厭抵鈎掲吳又云更有二字曰蹲送者蹲鋒迎送之謂耳據此則本是五字而後増之為七字矣然觀林韞撥鐙序則其字又有異者序略云廬陵盧肇忽相謂曰吾昔授教於韓吏部其法曰撥鐙今將授子子勿妄傳推拖撚拽是也解大紳云執筆之法虛圎正𦂳又曰淺而堅謂撥鐙令其和暢勿使拘攣真書去毫端二寸行三寸草四寸掣三分而一分着紙勢則有餘掣一分而三分着紙勢則不足此其要也而擫捺鈎掲抵拒導送指法亦備其曰擫者大指當㣲側以甲肉際當管傍則善而又曰力以中駐中筆之法中指主鈎用力全在於是又有扳罾法食指拄上甚正而竒健撮管法撮聚管端草書便提筆法提挈其筆署書宜此執筆之功也説文鐙錠也從金登聲徐鉉曰錠中置燭故謂之鐙急就篇顔注鐙所以盛膏夜燃燎者也其形若杅而中施釭有柎者曰鐙無柎者曰錠柎謂下施足也按古無燈字至漢祠太乙自昬至曉燃燈故有七枝燈百枝燈之類然上林賦鐙字從金旁是以五金鑄之也宋玉招魂云蘭膏明燭蕐鐙錯些梁簡文有列鐙賦陳後主有光壁殿遥咏山鐙詩劉公榦詩明鐙熺炎光岑嘉州詩寒鐙靜深屋髙達夫詩髙舘張鐙酒復清盖鐙本是古字豈待鐵崖詩証其音讀耶玉山草堂集鐵崖詩作撥蹬誤牛衣虞伯生詩牛衣春夢鬢蒼浪吳旦生曰演繁露王章卧牛衣中注龍具也龍具之制不知何若按食貨志董仲舒云貧民常衣牛馬之衣而食犬彘之食然則牛衣者編草使暖以被牛體盖蓑衣之類也劉兼詩王章莫耻牛衣淚潘岳休驚鶴鬢霜陸放翁詩牛衣未起王章疾馬磨何傷許靖貧盖用此也又陸魯望詩病中祗自悲龍具世上何人識羽袍陸放翁詩生涯破碎餘龍具學問荒唐守兔園則復用注中語桄榔虞伯生題儋耳東坡載酒堂云翳翳儋耳城歴歴桄榔樹吳旦生曰海槎餘録謂載酒堂即蘇長公寓儋耳逰宴之地也今有堂三楹祀公像於中元亷訪使伯琦周公𨽻書碑文一道列堂東隅堂周遭有墻相去百步有塘寛百餘畆水土深淺異處蒲􅀢蘆葦之属最茂宻毎春秋二祀例率郡僚師儒會飲堂中即漁此塘以為樂名濁勞會亦洗闔境諸祀之勞之謂也故傳乳井泉桄榔菴茉莉軒今皆湮廢遺址尚存桄榔朩類紵􅀈樹樹杪挺出數枝毎枝必贅青珠數條毎條不下百餘顆計一樹可得青珠百餘條團團懸掛若傘盖然可愛也其朩最重番舶用為鎗以代鐵其鍾重鋒鋩侔於鐵也東坡寄文潜桄榔杖詩江邉曵杖桄榔痩林下尋苗蓽撥香述異記桄榔皮裏出屑如麫用作餅食之與麫相似因謂之桄榔麫蜀都賦麫有桄榔伽藍記所謂麫朩是也松煙楊升菴曰朱萬初善製墨純用松煙盖取三百年摧朽之餘精英之不可冺者用之非常松也天厯乙已開奎章閣㨂儒臣親侍翰墨榮存初喀喇子山皆侍閣下以朱萬初所製墨進大稱㫖得禄食藝文舘虞伯生贈詩云霜雪摧殘澗壑非深根千嵗斧斤違寸心不逐飛煙化還作𤣥雲繞紫㣲盖紀兹事也吳旦生曰上古無墨竹挺㸃漆而書中古方以石磨汁至魏晉時始有墨丸乃漆煙松煤夾和為之曹子建所謂墨出青松煙而晉人多用凹心硯者欲磨墨貯瀋耳或謂燎松丸墨起於唐王方翼不知前此已有也唐髙麗嵗貢松煙墨用多年老松煙和麋鹿膠造成唐末奚超與子廷珪至歙州其地多松因留居以墨名家尚用松煙宋元佑間潘谷作墨東坡謂其雜用髙麗煤故詩云徂徠無老松易水無良工珍材取樂浪妙手惟潘翁亦用松煙也熈豐間張遇供御墨用油煙入腦麝金箔謂之龍香劑徽宗以蘇合油搜煙為墨金章宗購之一兩墨價黄金一斤伯生又有跋云近世墨以油煙易松煙嘗謂松煙墨深重而不姿媚油煙墨姿媚而不深重若以松脂為炬取煙二者兼矣行李楊仲𢎞作劉將軍詩云往年鄂州省綏靖失其理交馳赤白囊來告犯邉鄙遣人覘虛實在廷孰可使矯矯劉將軍一旦備行李吳旦生曰左傳僖公三十年行李之往來共其乏困襄公八年亦不使一介行李告於寡人此用李字昭公十三年行理之命無月不至國語行理以節送之此用理字騎官左角曰理史記天官作李管子書大理皆作李古文二字通用然觀杜預注左云行李使人也後之逺行束装稱為行李而不知是行使也按舊文使字作􅡛使字山下人人下子傳寫之悞遂作李焉今仲𢎞所用乃得使字意劉孝威結客少年塲行云少年李六郡遨遊遍五都李作使音麥光楊仲𢎞詩麥光人共賞棘刺巧無窮吳旦生曰蜀中方物記紙曰麥光杜子美詩麥光鋪几淨無瑕蘇子瞻詩香雲靄麥光王原吉詩儻寄麥光牋子瞻云海東羅文麥光紙堅韌異常贈石塘楊仲𢎞贈胡石塘詩先生惟達道久矣樂山林致聘無雙璧為生過十金身閒雲出岫髪短雪盈簪遁世猶吾志同盟欲自今吳旦生曰婺州三胡先生長誠仲次穆仲次汲仲而石塘乃汲仲號也清介孤髙仲𢎞一詩字字為其實録趙松雪嘗為羅司徒奉鈔百錠為石塘潤筆請作乃父墓銘石塘怒曰我豈為宦官作墓銘耶是日正絶糧其子千里以情白坐上諸客咸勸受之卻愈堅送蔡如愚歸東陽詩薄糜不繼襖不煖謳吟猶是鍾球鳴嘗語惟善曰此予秘宻藏中休糧方也東園友聞云趙松雪挽胡穆仲詩淚濕黔婁被情傷郭泰巾觀此則其為人可知矣相於楊仲𢎞送范徳機詩往嵗從君直禁林相於道義最情深吳旦生曰繁欽定情詩何以結相於金薄畫搔頭唐太宗詩此時歡不及調軫坐相於杜子美詩良友幸相於元稹詩未面西川張校書書來稠疊頗相於劉得仁詩便欲去隨為弟子片雲孤鶴肯相於按相於即綢繆也徳機有云浦君髙價本璠璵多幸蒹葭得所於亦此義杰句范徳機詩黄河西去從天下泰華東來拔地髙吳旦生曰此徳機杰句有函盖有振盪不徒以氣象求之如云日月雙吟鬢乾坤獨病身又云乾坤雙蠟屐江海一漁舟又云世故風塵雙短屐生涯天地一扁舟三詩辭致若一且俱在頸聫要其興會所属意到筆落不自知其髣髴也生平與仲𢎞契分談詩最合故徳機有進三朝實録詩三后龍光周典冊羣臣鵠立漢衣冠仲𢎞則有寄袁伯長詩祀事悉稽周典禮頌聲須假漢文章又西曹即事詩李耳舊藏周典禮蕭何元得漢圗書即兩人各自意到筆落亦不自知其髣髴也糞巷范徳機詩門巷祗今埋糞壤輪蹄自昔走雷霆吳旦生曰東坡因子過讀南史卧而聴之語過曰王僧䖍居建康禁中里馬糞巷子孫質實謙和時人稱馬糞諸王為長者東漢賛論李固云視胡廣趙戒如糞土糞之穢也一經僧䖍便為佳號而以比胡趙則糞有時而不幸汝可不知乎今徳機詩正用王僧䖍事鬼趣草朩子曰危太樸嘗與范徳機秋夜同步徳機得二句云雨止脩竹間流螢夜深至喜甚既而曰語太幽殆類鬼作不復綴筆吳旦生曰此徳機感秋詩也集中具有全作豈終自眷惜為之綴筆耶詩云蒼山秋意長池舘靜而閟雨止脩竹間流螢夜深至羲黄世已逺雅俗日凋弊舉手遏頽波誰識作者意烏啼魯東門泗水不染袂後出三千年直可肩聖智機闗係風化詞語特細事月落閉虛簾坐夢太古帝揚眉順玉色盡發飬生秘勿謂仙學難此道可立致觀其託㫖深長寄懐神聖盖將示來學以趨歸其自家胸次豈復墮鬼趣哉要知類鬼一語即是其教來學者知所避就爾庾樓掲曼碩過江州詩落日照庾樓驚風滿湓浦吳旦生曰世説庾亮在武昌秋夜景清殷浩王胡之之徒登南樓理咏庾公步來諸賢欲起避之公徐云諸君少住老子於此處興復不淺因據匡牀與諸人咏謔據此則武昌事也范石湖吳船録云泊江州登庾樓前臨大江後對匡廬名山大川悉萃此樓庾元規故事本是武昌南樓後人以元規嘗刺江州故亦以庾名然景物則有南樓不逮者陸放翁入蜀記云庾亮嘗為江荆豫州刺史其實則治武昌若武昌南樓名庾樓猶有理今江州治所在晉特柴桑縣之湓口闗耳此樓附會甚明然白樂天詩潯陽欲到思無窮庾亮樓南湓口東固已承悞久矣張芸叟南遷録云庾陽鎮潯陽經始此樓其悞尤甚曼碩復爾承襲未之深考也余於元詩體要讀施鈞武昌南樓二聨云匡床老子三更月鐵笛仙人一曲秋流水白雲吳夏口西風黄鶴晉磯頭亦自雄渾寓諷詩話類編曰黄子肅為翰林供奉人有以且耕亭求詩者黄贈詩云萬里扶揺鶴未回荷鋤聊復此徘徊閒雲照水自舒巻幽鳥愛山時往來琴榻松風寒帶雨硯池花露碧生苔且耕亭上春如錦想見斑衣戲老萊盖其人有親在堂乃逺㳺奔競曠其家園故詩寓意云爾吳旦生曰子肅深於徳機之學故其含辭託㫖要有古詩之義如送王君冕云君子希道徳永言結同心呈貢侍御云寄語東家兒紅粧莫輕嫁殷勤嘱付河梁何讓焉古樂府二首尤可愛玩一云君好錦繡段妾好明月珠錦繡可為服服美令人愚不如珠夜光可以照讀書又云君好春芍藥妾好夏池蓮芍藥多艷色春風迷少年不如蓮有實可以壽君筵銅爵硯傅與礪銅爵硯歌云石麟暗刻魏春秋銅爵空題漢年月吳旦生曰按漢孝獻皇帝丙子改元建安至庚寅十五年冬曹操作銅爵臺於鄴余於逆旅主人見一古瓦長尺有三寸濶八寸質理堅潤穹腹背多鑱紋中有六字曰建安十五年造𨽻書凸起字徑寸餘此劉夢吉所云却愛曹瞞臺上瓦至今猶属建安年也道山清話云世傳銅爵瓦騐之有三錫花雷斧鮮疵三者是也然皆風雨彫鐫不可得而偽東觀餘論云硯譜謂相州真古瓦朽腐不可用世俗尚其名爾今人乃以澄泥如古瓦状埋土中久而研之近有長安民獻秦武公羽陽宫瓦十餘枚若今之筩瓦然首有羽陽千嵗萬嵗字其瓦殊不朽腐比相州瓦又増古矣則知相州古瓦未必朽腐盖傳聞之悞耳余觀洪武中宋季子得未央宫瓦頭一片上有未央長樂四字貝季翔作未央宫瓦頭歌此亦不减羽陽瓦也然觀偃曝談餘云銅雀瓦世傳鄴城古瓦夫魏之宫室焚蕩於汲桑之亂久矣鄴中記曰北髙起鄴南城屋瓦皆以核桃油油之光明不蘚筒瓦覆故油其背版瓦仰故油其面筒瓦長二尺濶一尺版瓦之長亦如之而其濶倍之今得其真者當油處必有細紋俗曰琴紋有白花曰錫花傳言當時以黄丹鉛錫和泥積嵗乆而錫花見古磚大者方四尺上有盤花鳥獸紋千秋萬嵗字其紀年非天保則興和盖東魏北齊也又有磚筒者花紋年號如磚内員外方用承簷溜亦可以為研鄴人有言曰銅雀瓦研體質細潤而堅如石不費筆而發墨此古所重者而今絶無鄴民乃偽造以給逺方王荆公詩吹盡西陵歌舞塵當時屋瓦始稱珍甄陶往往成今手尚托虛名動世人又容齋續筆云先公得二硯小者腹有六篆字曰大魏興和年造中皆作小簇花團興和乃東魏孝靜帝紀年也予為銘曰元魏之東狗脚於鄴髙澄侍宴以大觴属孝静帝帝不勝忿曰自古無不亡之國朕何用生為澄怒曰朕朕狗脚朕吁其瓦存亦禪千刼上林得鴈獲貯歸笈玩而銘之衰淚棲睫又楊升菴云曹操臺瓦已不可得宋人所收乃髙歡避暑宫氷井臺香姜閣瓦也予得一瓦上有香姜字又見京師人家藏一瓦有元象字元象孝靜帝年號也蜑户傅與礪送盧茂實之廣東憲幕云鮫宫織罷魚龍出蜑户珠還蚌蛤來吳旦生曰後山談樷云二廣居山谷間不𨽻州縣謂之徭人舟居謂之蜑人島上謂之黎人輟耕録云廣東採珠之人懸絙於腰沈入海中良久得珠撼其絙舶上人挈出之𦵏於黿鼉蛟龍之腹者比比有焉有司名曰烏蜑户蜑音但桂海虞衡志云蜑海上水居蠻也合浦珠池蚌蛤惟蜑能没水探取先煮毳衲極熱出水急覆之不然寒慄而死或遇蛟鼉所觸往往潰腹折肢人見血一縷浮水靣知蜑死矣升菴外集云漁蜑取魚蠔蜑取蠔朩蜑伐山皆生死短蓬間生食海物其生如浮而各以疆界役於官蕙蘭堯山堂外紀曰蕙蘭寓殯湘中傅與礪念之不置賦詩云湘臯煙翠碧紛紛淚灑東風憶細君浪説嫦娥能入月虛疑神女解為雲花隂晝坐閒金剪竹裏春逰冷翠裙留得舊時殘錦在傷心不忍讀廽文呉旦生曰與礪誌其妻殯云君諱淑字蕙蘭姓孫氏年二十三歸我於湘中五月而卒又序其遺藁云故妻蕙蘭早失母父周卿先生以孝經論語及女誡之書教之詩固未之學也因其弟受唐詩家法於庭得其音格輒能為近體既卒出其藁得五言七首七言十一首五七言未成章者廿六句編集成帙題曰緑忩遺藁序而藏之其詩備載輟耕録中皆雅秀可誦特取一二絶句以見其大槩蕙蘭詩樓前楊栁發青枝樓下春寒病起時獨坐小忩無氣力隔簾風亂海棠絲緑忩寂寞掩殘春繡得羅衣懶上身昨日翠帷新病起滿簾飛絮正愁人與礪追和詩小忩開盡碧桃枝憶得青鸞化去時昨夜秋風妬幽怨夢中吹㫁素琴絲江上愁時復值春帶圍寛盡不宜身階前舊種櫻桃樹日暮飛花故著人歴代詩話巻六十六
