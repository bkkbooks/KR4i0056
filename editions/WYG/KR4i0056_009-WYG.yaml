body:
  text: 歴代詩話巻九歸安吳景旭撰乙集中之上楚詞天問朱子辨證曰古今說天問者皆本山海經淮南子今以文意考之疑此二書皆縁天問而作吳旦生曰離騷啟九辨與九歌兮夏康娛以自縦九辨九歌皆禹樂也天問啟棘賓商九辨九歌注棘當作夢商當作天以篆文相似而誤是也據天問之意但謂啟夢賓于天得二樂而山海經以為上三嬪於天得九辨九歌又以西南海之外有人曰夏后開珥蛇乗龍胡元瑞謂此本離騷天問二章之説而譌者乃信朱子為不誣矣史記云禹乃興九招之樂帝王世紀云啟升后十年舞九韶竹書云夏后開舞九招艾軒謂勸之以九歌即九招之樂按吕氏春秋帝嚳作九招而帝舜修九招也焦氏筆乗云離騷啟九辨與九歌兮即後之九歌九辨皆原自作無疑王逸因夏康娛以自縦之句遂解九歌為禹不知時事難於顯言乃托之古人此詩人依倣形似之語耳不然則上所謂就重華而敶詞豈真有重華可就耶陳深云天問發難至千五百言書契以來未有此體原創為之先儒謂其文義不次乃原雜書其壁而楚人輯之今讀其文章句之短長聲勢之詰崛皆有法度似作也非輯也屈子以文自聖且在無聊何之焉而不為作也嘗愛曽子問五十餘難亦至奇之文說者乃曰非曽不能問非孔不能答非也禮家托於曽孔以盡禮之變耳抑獨出於曽氏之門乎何文之辯而理也夜光天問有云夜光何德死則又育厥利維何而顧菟在腹吳旦生曰皇甫謐年厯云月羣隂之宗光内日影以宵曜名曰夜光廣雅云夜光謂之月王逸注言月中有菟何所貪利居月之腹而顧望乎朱晦翁云菟與兔同世俗桂樹蟾兔之傳其惑久矣或以為日月在天如兩鏡相照而地居其中四旁皆空水也故月中微黒之處乃鏡中大地之影畧有形似而非真有是物也按晦庵所引乃沈存中之言也存中又言月本無光日耀之乃光光之初生日在其傍故光側而所見纔如鈎耳日漸逺則斜照而光稍滿對照則正圓也酉陽雜俎云佛言須彌山南面有閻扶樹月過樹影入月中或言月中蟾桂地影也空處水影也王荆公云月中彷彿有物乃山河影也東坡鑒空閣詩明月本自明無心孰為境挂空如水鑑寫此山河影妄云桂兔蟇俗説皆可屏據此則晦庵之辨為有理楚辭作此説何耶按晉志云羲和占日常儀音蛾占月區車占星登真隠訣云上真之道七鬱儀奔日文為最結隣奔月文為次鬱儀者羲和也結隣者嫦娥也唐麟德殿東有鬱儀結隣樓李肇韋執誼所記皆書隣為麟程太之曰當作隣上清紫文黄庭經又作結璘張平子云羿請無死之藥於西王母羿妻姮娥竊之以奔月是謂蟾蜍搜神記作蟾蠩緯書云嫦娥小字純狐小説家又謂廣寒清虚之府皆可笑羿天問云帝降后羿革孽夏民吳旦生曰羿稱善射弑夏后相此書所謂有窮后羿是也然按說文羿帝嚳時射官又山海經堯時十日並出堯命羿射其九合觀數代若不一其人者則知羿乃射官故世有其稱也朱晦翁云按此十日本是自甲至癸耳而傳者悞為十日並出之說楊升庵云古傳言羿射日落九烏烏最難射一日落九烏言射之捷也而後世不得其說者遂以為射九日矣鑠金惜誦云故衆口其鑠金兮初若是而逢殆吳旦生曰王勉夫謂補引鄒陽衆口鑠金積毁銷骨之語在後豈應引證不知在楚人之前嘗有此語矣觀鄧析子曰古人有言衆口鑠金三人成虎鄧析春秋魯定公時人鄧謂古人有言則此語又見於鄧之先矣補引漢人語是未見鄧析子書耳且在鄒陽之前張儀亦嘗有此語其後李善注文選鄒陽語引國語伶州鳩衆心成城衆口鑠金要未為廣論衡曰衆口鑠金口者火也在五行二曰火五事二曰言言與火直故云鑠金風俗通云俗說有美金在此衆人咸共詆訿言其不純賣金者欲其售因取鍛燒以見真此謂衆口鑠金欸九章涉江云乗鄂渚而反顧兮欸秋冬之緒風步余馬兮山臯低余車兮方林吳旦生曰楊升庵謂欸即唉从欠从口如歎與嘆欬與咳歗與嘯實一字耳尸子禹有進善之皷備訊唉也韋孟詩勤唉厥生史記范増撞破玉斗曰唉方言南楚謂然曰唉余謂此朱晦庵之語悞看説文而强合之也按説文唉譍也亞改切又焉開切欸訾也烏開切又凶戒切解作唉非是盖説文業早辨之矣安得謂說文二字音義並同以悞後人哉方言欸􅬢然也南楚凡言然者曰欵或曰􅬢則方言亦作欸字楚辭注欸歎聲注緒風餘風也顧迴瀾云緒風相續不斷風也謝靈運詩初景革緒風用楚辭語按風孚金切古每與心林淫音為韻如今之侵韻毛詩凄其以風與實獲我心叶鴆彼晨風與鬱彼北林叶其為飄風與祗攪我心叶如彼遡風與民有肅心叶莊子蚿憐蛇蛇憐風風憐目目憐心枚乗七發梧桐并閭極望成林衆芳紛鬱亂於五風相如長門賦天飄飄而疾風與神怳怳而外淫叶蔡邕詩君子博文貽我德音辭之集矣穆如清風據此則古韻皆作孚金切而無作方中切者惟賈誼惜誓右大夏之遺風與天地之圜方叶乃是孚光切意至漢去古音漸逺轉而為孚光切之音漸復轉而為方中切之音如今之讀耶舲涉江篇乗舲船余上沅兮齊吳榜而擊汰吳旦生曰舲音零船有牕牖曰舲字學集要云􅦬舟有牕者亦作舲􅫲􅀈當亦取牕櫺之義耶王維詩擊汰復揚舲全用其語橘頌橘頌云受命不遷生南國兮深固難徙更壹志兮吳旦生曰考工記鸜鵒不踰濟橘踰淮而北為枳地氣然也晏子橘生于淮北為枳水土異也説文橘果名出江南諸處在在有之南中尤勝長箋云橘踰淮而化為枳故曰江南因其不可移故屈平有橘頌以自况余按屈雖頌橘之根葉華實而義兼比賦故篇内以不遷難徙為言耳朱子編楚辭後語坡公他詞皆不取惟録服胡麻賦以為近於橘頌黄棘悲回風云借光景以往來兮施黄棘之枉策吳旦生曰解者謂以棘為策取其芒刺則馬傷深而行愈逺余以棘刺豈堪鞭騎其說不通薛符溪云秦楚嘗盟于黄棘後懐王再㑹武關遂被執是黄棘之盟楚禍所始朱子以黄塵荆棘解之繆矣歴代詩話巻九
