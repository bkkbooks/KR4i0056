body:
  text: 歴代詩話巻六十七歸安吳景旭撰壬後集上之下元詩詩法正論傅與礪述或問作詩下手處先生曰作詩成法有起承轉合四字以絶句言之第一句是起第二句是承第三句是轉第四句是合律詩則第一聫是起第二聨是承第三聫是轉第四聫是合或一題而作兩詩則兩詩通為起承轉合如子美詩中八月十五夜月二首滿目飛明鏡以下四句説客中對月是起水路凝雪霜以下四句形容月明是承稍下巫山峽以下四句言月出没晦明之地就含結句之意是轉刁斗皆催曉以下四句言兵亂對月之感是合如作三首以上及作古詩長律亦以此法求之大抵起處要平直承處要舂容轉處要變化合處要淵永起處戒陡頓承處戒促廹轉處戒落魄合處戒㫁送起處若必突兀則承處必不優柔轉處必至窘束合處必至匱竭矣又以一詩全首論之須要有賦有比有興或興而兼比尤妙三百篇多以比興重複置之章首唐律多以比興作景聨古詩則比興或在起處或在轉處或在合處長篇長律則轉處或有再轉三轉方合者或作三四十韻以上則先須布置語意不可錯陳長篇則當先得起句絶句則當先得後二句律詩則當先得中四句律句固以對偶為工然得意處則意對而語不對亦可長篇古體則參差中時出整齊語尤見筆力最戒似對不對或曰如子美老夫清晨梳白頭𤣥都道士來相訪此二句是起語極平直似鄙俗而實非鄙俗也握髪呼兒延入户手提新畫青松障此二句是承語便舂容障子松林靜窈㝠以下是轉已知仙客意相親更覺良工心獨苦是再轉語意極變化之妙松下丈人巾屨同以下是合乃借松障中實景與當時人事感慨結之意兼比興可謂淵永之至矣及太白憶昔洛陽董糟丘為余天津橋南造酒樓一詩往昔看此等起處皆恠其朴陋今以起處要平直之説求之方知平生論詩未及此也先生曰然此二詩起得有法故下面承轉處自然舂容變化然詩法有正有變如子美一片花飛減却春風飄萬㸃正愁人起處似甚突兀然通篇意是惜春起處正合如此乃痛快語而非陡頓語也且看欲盡花經眼莫厭傷多酒入唇一句承上一句起下甚得舂容之體第三聨江上小堂巢翡翠苑邉髙塜卧麒麟就景物中寓感慨意政是轉處變化之法結句細推物理須行樂何用浮名絆此身若非第七句沈着淵永則第八句便有㫁送之句矣又如送王司直詩云王郎酒酣抜劍斫地歌莫哀我能拔爾抑塞磊落之竒才起處亦甚突兀然意却平直大槩只是説王郎有雄豪之氣之才耳與今人尚險詐者不同下面承兩句云豫章翻風白日動鯨魚跋浪滄溟開此申説才字意便舂容整齊若不如此即非典雅之作亦接上兩句不住且脱劍珮休徘徊以下三句是轉力量已極勻稱又就情景上轉云仲宣樓頭春已深青眼髙歌望吾子却以眼中之人吾老矣一句結之七字而含無限之意勢力如截奔馬此又詩之變而不離乎正者也又若太白詩云君不見黄河之水天上來又有云棄我去者昨日之日不可留亂吾心者今日之日多煩愛又曰攀天莫登龍走山莫騎虎或以興為起或以比為起一皆不踰此法未可以矢口成文視之也或曰子美醉歌行贈公安顔少府請顧八題壁云神仙中人不易得顔氏之子才孤標天馬長鳴待駕馭秋鷹整翮當雲霄君不見東吳顧文學又不見西漢杜陵老詩家筆勢君不嫌詞翰升堂為君掃是日霜風凍七澤烏蠻落照銜赤壁酒酣耳熱忘頭白感君意氣無所惜一為歌行歌主客此詩法度與贈王郎詩無一不合先生曰然又如范先生和鄧善之詩云曩承持節江之東騎鯨再上蓬萊宫蓬萊仙人歌白鶴聲落五湖煙雨中世間爵禄不易致何獨去就如飄風朝廷禮樂須制作六經隠義資發䝉論思廟堂集耆碩啟口寧讓前諸公閉門撥書古都市四方冠盖方隆隆我生生長在窮谷那有文字爭人雄謬䝉引諭百僚上負禄府署慚無功一别十年今又五昔者少壮今成翁誰知復客七閩下隔二千里來詩筒羸軀頓醒瘴癘惡賴以慰此心忡忡越王城南浪自白越王城西花自紅此以興為合者也又如虞公三鳯行贈海東之還江南詩云海東之兄弟三人如鳯凰胸臆羽翮皆文章九年三入天門翔伯冲天季驚人一日四海皆知名東之之文五色雲見者眩晃生眵昬三進三已之了若耳不聞二人得之喜未足云東之不愠乃可尊束書江上還見親君子之樂樂最真君不見匡廬之山崷崒而嵯峨左界豫章渚川匯為蠡鄱其隂浩浩源句導岷經潛沱山氣鬰蓄不得去上衝為紫盖直與天相摩為雲覆八極為雨漲九河海東之子能觀山以成徳其進盖未可量也偶爾小屈奈爾何此以比興為轉者也又如楊仲𢎞先生寄友詩云聞君逰宦處正值洞庭湖落日波濤壮晴天島嶼孤舟㠶通漢沔風物覧衡巫天下文章弊非公孰起予此以興為承賦為轉者也又如掲曼碩先生贈徐雲章詩云垂雲厲驚風萬里摩髙圎蟠泥鼓巨浪豈顧九重淵毛生入楚庭脫頴俄頃間粲粲徐公子長咲起丘樊朝辭豫章臺暮過匡廬山大帆割鸚鵡極目空波瀾黄鶴錦袍仙吹笙紫霞端相顧一笑粲青春滿南天黄金築髙臺更覺郭隗賢聫翩樂劇輩相逐入幽燕平明九門開劍佩如雲煙豈無一字薦傾倒平生言東風杏花開待我薊門前此以比興為起者也其他有通首皆賦而無比興者在風雅頌各有其例但更難作耳或又問曰周伯弜所編唐三體詩法以虛實二字為例若四實中早春逰望詩及經廢寳林寺詩中四句皆景物似與賦比興承轉之説不合何耶先生曰雲霞出海曙梅栁渡江春於六義属賦淑氣催黄鳥晴光轉緑蘋於六義属興池晴龜出曝松暝鶴飛迴兩句是景物於六義属興古砌碑横草隂廊畫雜苔兩句是説人事於六義属賦伯弜以四實槩言之其説疎矣又曰杜詩五七言絶句有四句皆對者又如何絶句者截句也後兩句對者是截律詩前四句前兩句對者是截律詩後四句四句皆對者是截律詩中四句四句皆不對者是截律詩前後四句雖正變不齊而首尾布置亦四句自為起承轉合未嘗不同條共貫也如杜詩遲日江山麗是中庸天地位之意第二句春風花草香是萬物育之意起承處可謂平直而舂容矣第三句第四句是申言萬物育之意然泥融飛燕子是言物之動者得其所也沙暖睡鴛鴦是言物之靜者亦得其所也轉合處可謂變化而淵永而升降開合之法見矣詩法黄子肅述大凡作詩先須立意意者一身之主也如送人則言離别不忍相捨之意寄贈則言相思不得見之意題咏花朩之類則用離騷芳草之意故詩如馬意如善馭者折旋操縱先後疾徐隨意所之無所不可此意之妙也又如將之用兵或攻或戰或屯或守或出竒以取勝或不戰以收功雖百萬之衆多多益辦而敵人莫能窺其神此意之妙也意在於假物取意則謂之比意在於託物興辭則謂之興意在於鋪張實事則謂之賦但貴圎活透徹辭語相頡頏常使意在言表涵蓄有餘不盡乃為佳耳是以妙悟者意之所向透徹玲瓏如空中之音雖有所聞不可彷彿如象外之色雖有所見不可描摸如水中之味雖有所知不可求索洞觀天地眇視萬物是為髙古剖出肺腑不借語言是為入神超達虛空了悟生死是為離衆寄興悠揚因彼見此是為造巧隔闗寫景不露形迹是為不俗故意在於閒適則全篇以雅淡之言發之意在於哀傷則全篇以凄惋之情發之意在於懐古則全篇以感慨之言發之此詩之悟意也意既立必須得句句有法當以妙悟為上第一等句得於天然不待雕琢律吕自諧神色兼備竒絶者如孤厓㫁峯髙古者如黄鐘大吕飄逸者如清風白雲森嚴者如旌旗甲兵雄壮者如千軍萬馬華麗者如竒花美女是為妙句其次必須造語精工或動靜或大小或真假或生死或逺近或今古或虛實或有無變化彷彿使一句之中常具數節意乃為佳句是以洞觀天地之句似放誕而非放誕了達生死之句似虛無而非虛無剖出肺腑之句似粗俗而非粗俗寄興悠揚之句意之所至信手拈來頭頭是道不待思索得之於自然隔闗寫景之句不落方體不犯正位不滯聲色左右上下無所不通似着題而非着題非悟者不能作也句既得矣於句中之字渾然天成者為佳下字必須清必須活必須響與一篇之意一句之意相通各自卓立而復相承是為本色若了達生死之句其字宜髙古宜真率洞觀天地之句其字宜籠放宜開闢宜雄渾剖出肺腑之句其字宜沈着宜痛快寄興悠揚之句其字宜涵蓄不露宜優游不廹隔闗寫景之句其字宜精工宜神竒宜飛動宜變化宜峻峭宜飄逸毎毎有似真非真似假非假若有若無若彼若此之意為得之縂而言之一詩之中必先得意一句之中必先得字先得意後得句而字在乎其中不待求索者上也若先得句因句之所在而生意或先或後使意能成就其句之美者次也若先得字因字而生句因字而生意意復與句皆成其字之美者又其次也故意也句也字也三者全備為妙悟意與句皆悟而字有虧欠則為小疵若有意無句則精神無光有句無意則徒事粧㸃句意俱不足而惟於一字求工何足取哉然意之所忌者最忌用俗最忌議論議論則成文字而非詩用俗則淺近而非古句之所忌者最忌虛中之虛實中之實須虚中有實實中有虛字之所忌者最忌粧㸃最忌襯貼盖非本句之所有而强牽合以成之是又不可不知詩宗正法眼藏揭曼碩述五言七言句語雖殊法律則一起句尤難起句先須濶占地步要髙逺不可茍且中間兩聫句法或四字截或兩字截須要血脉貫通音韻相應對偶相停上下勻稱有兩句共一意者有各意者若上聫已共意則下聫須各意前聫既咏景状後聫須説人事兩聨忌同律頸聫轉意要變化須多下實字字實則自然響亮而句法健其尾聨要能開一步别運生意結之然亦有合起意者亦妙世之學者多用意中間兩聫而不知首尾起結尤為難也詩句中有字眼兩眼者妙三眼者非且二聨用連綿字不可一般中腰虛活字亦須迴避五言字眼多在第三或第二字或第四字或第五字字眼在第三字皷角悲荒塞江蓮揺白羽竹光團野色星河落曉山天棘蔓青絲含影漾江流字眼在第二字屏開金孔雀碧知湖外草坐對賢人酒褥隠玉芙蓉紅見海東雲門聴長者車字眼在第五字兩行秦樹直香霧雲鬟濕市橋官栁細萬㸃蜀山尖清輝玉臂寒江路野梅香字眼在第二五字地折江㠶隠野潤煙光薄楚設闗河險天清朩葉聞沙暄日色遲吳呑水府寛杜詩法多在首聨兩句上句為頷聨之主下句為頸聨之主七言律難於五言律七言下字較粗實五言下字較細嫩七言若可截作五字便不成詩須字字不可去方是所以句要藏字字要藏意如聨珠不㫁為妙古詩要法凢作古詩體格句法俱要蒼古且先立大意鋪叙既定然後下筆則文脉貫通意無㫁續整然可觀五言古詩之法或興起或比起或賦起須要寓意深逺托辭温厚反覆優㳺雍容不廹或感古懐今或懐人傷已或瀟灑閒適寫景要雅淡推人心之至情寫感慨之㣲意悲喜含蓄而不傷美刺宛曲而不露要有三百篇之遺意觀漢魏諸古詩藹然有感動人處如古詩十九首皆當熟讀久之自見其趣七言古詩之法要鋪叙得好要有開闔要風度要迢逓要險恠雄偉要鏗鏘波瀾開闔如江海之波一波既作一波復隨又如兵陣方以為正又復為竒方以為竒又復是正出入變化不可紀極備是法者惟李杜也長篇妙在鋪叙時將一聫挑轉又平平説將去如此轉換數匝却以數語收拾則妙矣朩天禁語范徳機六闗篇法句法字法氣象家數音節右一篇詩成必須精研合此六闗方為佳不然則失之矣篇法有以字論者有以意論者有以故事論者有以血脈論者七言律詩篇法十三格一字血脈鴛鴦翠鬛紅衣舞夕暉水禽情似此禽稀纔分煙島猶回首只度寒塘亦共飛映霧盡迷朱殿瓦逐梳齊上玉人機采蓮無限蘭橈女笑指中流羡爾歸二字貫穿三字棟梁在内江村清江一曲抱村流長夏江村事事幽自去自來堂上燕相親相近水中鷗老妻畫紙為棊局稚子敲針作釣鈎多病所須惟藥物㣲軀此外更何求三字棟梁南遷瘴江南下接雲煙望盡黄茅是海邉山腹雨晴添象跡潭心日暖長蛟涎射工巧伺逰人影颶母偏驚賈客船從此憂來非一事可容華髪度流年數字連序中㫁在内中丞弟得除江陵并起居衛尚書夫人中丞問俗畫熊頻愛弟傳書彩鷁新遷轉九州防禦使起居八座太夫人楚宫臘送荆門水白帝雲偷碧海春為報惠連詩莫惜嗟予班鬢縂如銀鈎鎻連環草百花苑路易萋隂五糓塍疇苦見侵農父芟時嫌若刺宫人鬬處惜如金别離空惹王孫恨藨耨深勞稷畯心緑野荒蕪好歸去朱門閒僻少相尋順流直下張鍊師東岳真人張錬師髙情雅淡世間稀堪為烈女書青簡久事元君住翠㣲金縷機中抛錦字玉清壇上著霓衣雲衢不用吹簫伴只擬乗鸞獨自歸雙抛汴門用兵後隋堤風物已凄凉堤下仍多古戰塲金鏃有苔人拾得鐵衣無土鳥銜將邉聲暗促河聲急野色遥連日色黄獨上髙城更愁絶戍鼙驚起鴈行行單抛秋興其七昆明池水漢時功武帝旌旗在眼中織女機絲虛夜月石鯨鱗甲動秋風波漂菰米沈雲黒露冷蓮房墜粉紅闗塞極天惟鳥道江湖滿地一漁翁内剥玉臺觀中天積翠玉臺遥上帝髙居絳節朝遂有馮夷來擊皷始知嬴女善吹簫江光隠見黿鼉窟石勢參差烏鵲橋更有紅顔生羽翼便應黄髪老漁樵外剥錦瑟錦瑟無端五十絃一絃一柱思華年荘生曉夢迷蝴蝶望帝春心托杜鵑滄海月明珠有淚藍田日暖玉生煙此情可待成追憶只是當時已惘然前散送戴錬師歸隠桃花源裏玉堂仙秀攬千巖萬壑煙有客重尋鑑湖酒無人為上剡谿船龍行靈雨空壇淨鰲負神宫複道懸回首都門眇如許東風長記栁飛綿後㪚二字貫穿在内感興寄友十年京國搃忘憂詩酒淋漓共賞逰漢月夜吟鳷鵲觀苑雲春釀鷫鸘裘書來慰我臨池上秋去思君到水頭為憶故人張處士於今江海尚淹留五言長古篇法分段過脈回照讃歎先分為幾段幾節毎節句數多少要略均齊首段是序子序了一篇之意皆含在中結段要照起段且選詩分段節數甚均三句則皆三句四句六句八句則皆不參差杜却不甚如此太拘然亦不太長不太短也次要過句過句名為血脈引過次段過處用兩句一結上一生下為最難非老手未易了也回照謂十步一回頭要照題目五步一消息要閒語讃歎方不甚廹促長篇怕亂雜一意為一段以上四法備北征詩舉一隅之道也七言長古篇法分段過段突兀字貫讃歎再起歸題送尾分段如五言過段亦如之稍有異者突兀萬仭則不用過句􅈝頓便說他事杜詩大多如此岑参專尚此法為一家數字貫前後重三疊四用兩三字貫串極精神好誦岑参所長讃歎如五言再起且如一篇三段説了前事再提起從頭説去謂反覆有情如魏將軍歌松樹障子歌是也歸題乃本末一二句繳上起句又謂之顧首如蜀道難古别離洗兵馬行是也送尾則生一段餘意結末或反用或比喻用如墜馬歌曰君不見嵇康養生被殺戮又曰如何不飲令人哀長篇有此便不廹促甚有從容意思五言短古篇法辭簡意味長言語不可明白説盡含糊則有餘味如歩出城東門悵望江南路前日風雪中故人從此去忽見明月光疑是地上霜起頭望明月低頭思故鄉開簾見新月即便下階拜細語人不聞北風吹裙帶楊仲𢎞曰五言短古衆賢皆不知來處乃只是選詩結尾四句所以含蓄無限意自然悠長此論惟趙松雪翁承㫖深得之次則豫章三日新婦曉得清江知之却不多用七言短古篇法辭明意盡與五言相反如休洗紅洗紅紅色變不惜故縫衣記得初揉茜人命百年能幾何後來新婦今為婆石人前石橋邉六角黄牛二頃田帶經躬耕三十年樂府篇法張籍一王建為近體次之長吉虛妄不必效為岑參有氣惜語硬又次之張王最古上格如焦仲卿朩蘭詞羽林郎霍家奴三婦詞大垂手小垂手等篇皆為絶唱李太白樂府氣語皆自此中來不可不知也要訣在於反本題結如山農詞結却用西江賈客珠百斛船中養犬多食肉是也又有含蓄不發結者又有截㫁頓然結者如君不見蜀葵花是也老翁家貧在山住耕種山田三四畆苗疎稅多不得食輸入官倉化為土嵗暮鋤犁傍空室呼兒登山收橡栗西山賈客珠百斛船中養犬多食肉絶句篇法首句起畫松畫松一似真松樹待我尋思記得無曾在天台山上見石橋南畔第三株次句起金陵即事三句起前二句皆閒至第三句方咏本題扇對存殁口號二首席謙不見近彈棊畢曜仍傳舊小詩玉局他年無限笑白楊今日幾人悲鄭公綵繪隨長夜曹覇丹青已白頭天下何曾有山水人間不解重驊騮間對首句閒次句説本題第三句閒結再説本題應第二句即磨䈂山詩也順去松下問童子問余何事棲碧山湘中老人行到山窮水窮處首座茶藏咏逢李龜年岐王宅裏尋常見崔九堂前幾度聞正是江南好風景落花時節又逢君中㫁别意前二句説本題後二句説題外意願領龍驤十萬兵四句不聨兩箇黄鸝鳴翠栁遲日江山麗借喻借本題説他事如咏婦人者必借花為喻咏花者必借婦人為比右十法絶句之篇法也此最為𦂳推此以往思過半矣句法問答誰其獲者婦與姑何日東歸花發時當對白狐跳梁黄狐立婦女行泣夫走藏上三下四鳯凰樂奏鈞天曲烏鵲橋通織女河上四下三金馬朝回門似水碧雞天逺路如年上應下呼素練抹林雲氣薄明珠穿草露華新上呼下應林花著雨臙脂濕水荇牽風翠帶長行雲流水春日鶯啼脩竹裏仙家犬吠白雲中顛倒錯亂香稻啄殘鸚鵡粒碧梧棲老鳯凰枝言倒理順海岸夜深常見日寒巖四月始知春議論語宋人用之直書句鄭縣亭子澗之濱一去三年竟不歸兩句成一句屢將心上事相與夢中論蕭蕭千里馬箇箇五花文字法事文類聚事不可用多宋事也又不可用俚語偏方之言摘用史記西漢書東漢書新舊唐書晉書字棣集成聨對一副當白虎觀金僕姑碧雞坊玉具櫑眉語從長目成䕶短右用字琢對之法先須作三字對或四字對起然後粧排成全句不可逐句思量却似對偶不成作手也或二字對起亦可路頭差處在此捕風捉影如何成詩至謹至謹氣象翰苑輦轂山林出世偈頌神仙儒先石屏之類宋賢也江湖閭閻末學末學者道聴塗説得一二字面便雜揉用去不成一家又在江湖閭閻之下已上氣象各隨人之資禀髙下而發學者以變化氣質須仗師友所習所讀以開導佐助然後能脱去俗近以游髙明謹之慎之又詩之氣象猶字畫然長短肥痩清濁雅俗皆在人性中流出得八法便成妙染而洗吾舊態也儲泳曰性情褊隘者其詞躁寛裕者其詞平端靖者其詞雅疏曠者其詞逸雄偉者其詞壮醖藉者其詞婉㴠養性情發於色形於言此詩之本原也家數三百篇思無邪學者不察失於意見離騷激烈憤怨學者不察失於哀傷選詩婉曲委順學者不察失於柔弱太白雄豪空曠學者不察失於狂誕韓杜沈䧺厚壮學者不察失於麄硬陶韋含蓄優游學者不察失於迂濶孟郊竒險斬截學者不察失於恠短王維典麗靜深學者不察失於容冶李商隠㣲宻閒艶學者不察失於細碎已上略舉八九家數一隅三反之道也音節馬御史曰四方偏氣之語不相通曉互相憎惡惟中州音韻四方可以通行四方之人皆喜於習説盖中州天地之中得氣之正聲音㪚佈各能相入是以詩中宜用中州之韻則便官様大凡押韻不可用啞韻如五㣲十四鹽啞韻也凡例只要明暗二例諸作皆然杜甫鄭谷四詩可法明二首黒鷹杜甫黒鷹不省人間有渡海疑從北極來正翮摶風超紫塞窮冬幾夜宿陽臺虞羅自覺虛施巧春鴈同歸必見猜萬里寒空只一日金眸玉爪不凡材雙鷺鄭谷三體作雍陶雙鷺應憐水滿池風飄不動頂絲垂立當青草人先見行傍白蓮魚未知一足獨拳寒雨裏數聲相呌早秋時林塘得爾須増價况與詩家物色宜暗二首白鷹杜甫雲飛玉立盡清秋不惜竒毛恣逺遊在野只教心力破於人何事網羅求一生自獵知無敵百中爭能耻下鞲鵬礙九天須却避兎經三窟莫深憂鷓鴣鄭谷暖戲煙蕪錦翼齊品流應得近山雞雨昬青草湖邉過花落黄陵廟裏啼遊子乍聞征袖濕佳人才唱翠眉低相呼相喚湘江曲苦竹叢深春日西起句實叙状景問答反題故事順題故事吊古傷今頌美時序客愁感歎結句勸戒祝頌自感自愛問信寄憶寄書寄詩相思兵戈我亦懐古故事欣歡景燕激烈何年逰那可再何由往何日歸已上凡例明暗并起句結句四法律詩絶句長短篇通用無出此者惟童謡一家不在此例不可不知也作詩凖繩楊仲𢎞立意要髙古渾厚有氣槩要沈着忌卑弱淺陋錬句要雄偉清健有金石聲琢對要寧粗毋弱寧拙毋巧寧朴毋華忌俗野寫景景中含意事中瞰景要細宻清淡忌庸腐雕巧寫意要意中帶景議論發明書事大而國事小而家事身事心事用事陳古諷今因彼證此不可着迹只使影子可也雖死事亦當活用押韻押韻穏健則一句有精神如柱磉欲其堅牢也下字或在腰或在膝在足最要精思宜的當律詩要法起承轉合破題或對景興起或比起或引事起或就題起要突兀髙逺如狂風捲浪勢欲滔天頷聨或寫意或寫景或書事用事引證此聨要接破題要如驪龍之珠抱而不脫頸聨或寫意寫景書事用事引證與前聨之意相應相避要變化如疾雷破山觀者驚愕結句或就題結或開一步或繳前聨之意或用事必放一句作散塲如剡谿之棹自去自回言有盡而意無窮七言聲響雄渾鏗鏘偉健髙逺五言沈靜深逺細嫩五言古詩與詩宗正法眼藏同七言古詩與詩宗正法眼藏同絶句絶句之法要婉曲回環刪蕪就簡句絶而意不絶多以第三句為主而第四句發之有實接者有虛接者承接之間開與合相闗反與正相依順與逆相應一呼一吸宫商自諧大抵起承二句固難然不過平直叙起為佳從容承之為是至如宛轉變化工夫全在第三句若於此轉變得好則第四句如順流之舟矣榮遇之詩要富貴尊嚴典雅渾厚寫意宜閒雅美麗清細如王維賈至諸公早朝之作氣格雄深句意嚴整如宫商迭奏音韻鏗鏘真麟㳺靈沼鳯鳴朝陽也學者熟之可以一洗寒陋後來諸公應詔之作多用此體然多志驕氣盈處富貴而不失其正者幾希矣此又不可不知諷諌之詩要感事陳辭忠厚懇惻諷諭甚切而不失性情之正觸物感傷而無怨懟之辭雖美實刺方為有益之言也古人凡欲諷諌多借此以喻彼臣不得於君多借妻以思其夫或托物陳喻以通其意觀漢魏古詩及前輩所作可見未嘗有無為而作者登臨之詩不過感今懐古冩景嘆時思國懐鄉瀟灑逰適或譏刺歸美有一定之法律也中間宜寫四面所見山川之景庶幾移不動第一聨指所題之處宜叙説起第二聨合用景物實説第三聨合説人事或感歎古今或議論却不可用硬事或前聨先説事感歎則此聨寫景亦可但不可兩聨相同第四聨就題主意發感慨繳前二句或説何時再來征行之詩要發出悽愴之意哀而不傷怨而不亂要發興以感其事而不失情性之正或悲時感事觸物寓情方可若傷亡悼屈一切哀怨吾無取焉贈别之詩當寫不忍之情方見襟懐之厚然亦有數等如别征戍則寫死别而勉之努力效忠送人逺逰則寫不忍别而勉之及時早回送人仕宦則寫喜别而勉之憂國恤民或訴已窮居而望其薦抜如杜公惟待吹噓送上天之説是也凡送人多托酒以將意寫一時之景以興懐寓相勉之辭以致意第一聨叙題意起第二聨合説人事或叙别或議論第三聨合説景或帶思慕之情或説事第四聨合説何時再會或嘱付或期望於中二聨或倒亂前説亦可但不可重復須要次第末句要有規警意味淵永為佳詠物之詩要托物以伸意要二句詠状寫生忌極雕巧第一聨須合直説題目明白物之出處方是第二聨合咏物之體第三聨合咏物之用或説意或議論或説人事或用事或將外物體證第四聨就題外生意或就本意結之讃美之詩多以慶喜頌禱期望為意貴乎典雅渾厚用事宜的當親切第一聨要平直或隨事命意叙起第二聨意相承或用事必須實説本題之事第三聨轉説要變化或前聨不曾用事此正宜用引證盖有事料則詩不空疎結句則多期望之意大抵頌徳貴乎實若褒之太過則近乎諛讃美不及則不合人情而有淺陋之失矣賡和之詩當觀元詩之意如何以其意和之則更新竒要造一兩句雄健壮麗之語方能壓倒元白若又隨元詩脚下走則無光彩不足觀其結句當歸着其人方得體有就中聨歸着者亦可哭挽之詩要情真事實於其人情義深厚則哭之無甚情分則挽之而已矣當隨人行實作要切題使人開口讀之便見是哭挽某人方好中間要隠然有傷感之意歴代詩話巻六十七
