body:
  text: 歴代詩話巻十一歸安吳景旭撰乙集下之上楚辭送將藝苑雌黄曰九辯憭慄兮若在逺行登山臨水兮送將歸潘安仁秋興賦引此語而曰送歸懐慕徒之戀兮逺行有羇旅之憤臨川感流以歎逝兮登山逺懐以悼近彼四慼之疾心兮遭一途其難忍安仁以登山臨水逺行送歸為四慼予見張扶云若在逺行登山臨水送將歸是七件事謂逺也行也登山也臨水也送也將也歸也前輩詩中惟王介甫有一聨云一水䕶田將緑遶兩山排闥送青來下得將送二字與楚辭合嘗考詩之燕燕篇云之子于歸逺予將之之子于歸逺送于野一篇之中亦用此將送歸三字則楚辭之言亦有所本也安仁謂之四慼何也盖畧而言之耳吳旦生曰借逺行送歸以摹寫憭慄之情盖若在二字一氣趕下何得分為七件支離牽扯莫此為甚况毛詩將迎也迎亦送之意而九辯將字乃屬虚下何嘗本此觀梁簡文秋興賦復有登山望别臨水送歸則知昔人於秋率多此語何必畫而為四哉唐髙駢自渚宫移鎮揚州别晏口占楚辭云悲莫悲兮生别離登山臨水送將歸使幕客續之有一妓進曰賤妾感相公之恩續貂可乎即收淚吟曰武昌無限新栽栁不見楊花似雪飛合座賞歎駢厚贈之亦可證一氣為句矣朅宋玉九辯車既駕兮朅而歸不得見兮心悲詩話謂車既駕矣盍而歸乎以不得見而心悲也按呂氏春秋膠鬲見武王於鮪水曰西伯朅來無欺我也注朅何也則朅之為言盍也今文所用朅來者亦謂盍來非作發語之辭劉向云朅來歸耕永自踈顔延年云朅來空復辭皆謂盍來吳旦生曰文選注朅去也初疑去字當是盍字傳寫之譌脫耳後見字學集要云朅去也健也却也朅來猶聿來也又朅來言歸去來也則朅訓去亦得顔延年秋胡詩朅來空復辭補注云朅去也陳子昻感遇詩朅來豪游子朅來髙堂觀注亦云朅去也恢台宋玉九辯云收恢台之孟夏兮吳旦生曰舊注恢台廣大貌王逸章句本台字作炱徒來切黄魯直云恢大台即胎也言夏氣大而育物也徐季海詩髙閣無恢台直言無暑氣耳似不合古語爾雅夏為長嬴長嬴即恢台也若言髙閣無長嬴可乎余觀魯直此論因攷其詩遣悶悶不離眼前避愁愁亦知人處乃出庾子山愁賦云深藏欲避愁愁亦知人處此雖直用其語自饒蒼勁若世之傳奇家往往以昔人詩句寫入詞曲見之徒欲嘔耳衙衙宋玉九辯屬雷師之闐闐兮通飛廉之衙衙吳旦生曰升庵言衙音魚韓退之元和聖德詩魚魚雅雅魚魚亦衙衙也按說文衙行貌从行吾魚舉切箋云本訓惟姚合詩縦出多攜枕因衙始裹頭又可曽衙小吏恐謂踏青苔北人謂街巷為衙巷為衙衕讀若互字平聲改作衚古雋考畧云衙衙行貌又疎逺貌些夢溪筆談曰招魂尾句皆曰些蘇箇切䕫峽湖湘及南北江僚人凡禁呪旬尾皆稱㱔此乃楚人舊俗即梵語薩嚩訶也薩音桑葛反嚩無可反訶従去聲三字合言之即些字也吳旦生曰古雋考畧云些音梭去聲悮作些小之些嘯餘譜云些些二字形體不甚相逺而音聲意義懸殊上蘇箇切下乃些小之些耳余觀中州集載密公詩云始露雄文陵楚些又登長陌佩吳鈎元音補遺載宋衜詩今日悲秋哦楚些他年著論辨吳亡則其从去聲可證李周卿詩長溪霜練靜脩嶺蒼龍卧魂夢吾已安不勞歌楚些髙季迪詩歸來又辱寄新詩錦水湔腸珠落唾豪吟自欲寄燕歌悲調豈將同楚些此真得蘇箇切音韻也穱宋玉招魂稻粢穱麥挐黄粱些詞林海錯曰穱麥也韓愈詩納凉吸冷漬香穱南都賦夏穱冬稌吳旦生曰王逸注穱音捉訓擇也擇麥中先熟者言飯則以秔稻糅稷擇新麥糅以黄粱和而柔嬬且香滑也若竟訓作麥則楚辭不當說麥復說穱矣如賦所云夏穱與左思吳都賦穱秀菰􅀢當訓作麥臛蠵宋玉招魂露雞臛蠵厲而不爽些吳旦生曰臛羮也有菜曰羮無菜曰臛說文臛肉羮釋名臛者嵩也香氣嵩髙也蠵大龜也李賀詩臛蠵臛熊何足云王逸注楚人名羮敗曰爽言其清烈不敗也歴代詩話巻十一
