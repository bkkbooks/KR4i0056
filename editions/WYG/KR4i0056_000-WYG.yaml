body:
  text: 厯代詩話詩文評類提要臣等謹案厯代詩話八十巻國朝呉景旭撰景旭字旦生歸安人是書前後無序跋而中有塗乙之處盖猶初定之藁分為十集以十千為目甲集六巻皆論三百篇乙集六巻皆論楚詞丙集九巻皆論賦丁集六巻皆論古樂府戊集六巻皆論漢魏六朝詩已集十二巻前九巻論杜詩後三巻為杜陵譜系庚集九巻皆論唐詩辛集七巻皆論宋詩壬集十巻前三巻論金詩後七巻論元詩癸集九巻皆論明詩其體例仿陳耀文學林就正毎條各立標題先引舊説于前後雜采諸書以相考證或辨其是非或叅其異同或引伸其未竟或補綴其所遺皆下一格書之有舊説所無而景旭自立論者則惟列本詩于前而以已意發揮之雖皆採自詩話説部不盡根柢于原書又嗜博貪多往往借題曼衍失于芟薙然取材繁富能以衆説互相鈎貫以叅考其得失于雜家之言亦可謂淹貫者矣較以古人固不失苕溪漁隠叢話之亞也乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:22832fdc0fb7b920d572487734698b8f8c53d22bc353432b73662ec9866cf880
