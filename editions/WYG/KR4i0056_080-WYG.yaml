body:
  text: 歴代詩話巻八十歸安吳景旭撰癸集下之下格律陳卧子辱李司馬萍槎贈詩勉以世事兼許文筆云久瞻樞府重明光投我連城雲錦章傷亂已聞劉太尉賞音深愧蔡中郎九龍移帳春無草萬馬窺邊夜有霜蚤晩滄江驚驛使詔書先問右賢王朱雲子論此詩曰三四稳實五六巉秀方見配搭之妙向與卧子論李頎知君官屬一篇章法濃淡青節頓挫之妙深夜相與歎息可語格律者世無一二今閱卧子詩至此恍如當日呉旦生曰卧子此詩起二句見司馬贈詩頷聮之上句見世事下句見文筆輕将題面收拾已過而頸聮乃賛美司馬之辭結句又足成之卧子深于格律有筋節有氣韻故為七字擅場此法從唐律中得来如老杜奉送蜀州栢二别駕将中丞命赴江陵起居衛尚書太夫人因示從弟行軍司馬位其起居云中丞問俗畫熊頻愛弟傳書綵鷁新言栢中丞貞節遣弟别駕将命而徃也頷聮上句云遷轉五州防禦使言中丞時為䕫州都督也唐書䕫州兼峽忠歸萬為五州下句云起居八座太夫人言起居衛尚書伯玉之祖母也唐以六尚書左右僕射合為八座頸聨云楚宫臘送荆門水白帝雲輸碧海春乃是江陵與蜀州景語結句云與報惠連詩不惜知吾斑鬢總如銀則及示從弟意矣如孫逖和左司張員外自洛使入京中路先赴長安逢立春日贈韋侍御及諸公其起句云忽覩雲間數鴈迴更逢山上一花開第一句見使還第二句見立春也頷聨云河邊淑氣迎芳草林下輕風待落梅承第二句立春而言也頸聨上句云秋憲府中髙唱入言張之以詩贈韋也下句云春卿署裏和歌来自言以此詩和張也結句云共言東閣招賢地自有西征作賦才乃賛美張公耳觀杜孫二詩極完整却又極貫串凡作長題而有數事者皆於此等詩細求之則首尾部位自然勻美而何有凌雜之患哉即以李頎一篇言之送李囘起句云知君官屬大司農詔幸驪山職事雄言囘侍從而徃驪山也頷聨上句云嵗發金錢供御府是承第一句官司農而言也下句云晝看仙液注離宫是承第二句幸驪山而言也頸聨云千巖曙雪旌門上十月寒花輦路中是徃驪山景語葢此篇總以第二句為主也結句云不覩聲明與文物自傷留滯去闗東則頎之反而自道耳此等格律非盛唐何以有此大長秋陳卧子感懐詩羣臣多拜大長秋吳旦生曰通典戰國時有宦者令秦有中謁者令丞漢灌嬰為中謁者後常以閹人為之又有衛尉少府各一人漢景帝改為大長秋或用中人或用士人成帝加置太僕一人掌太后輿馬通謂之皇太后卿又有長信長樂少府職如長秋後漢大長秋常用宦者職掌奉宣中宫命中宫出則從師古云秋者收成之時長者恒久之義故以為皇后官名漢書戾太子傳夜入未央宫殿長秋門後漢書馬皇后傳有司奏立長秋宫注請立皇后不敢指言故以宫稱之南齊書秋宫亦遽軒景前虧梁書配徳早終長秋曠位隋書大長秋主諸宦者以司宫闈之職劉禹錫宫詞云日晩長秋簾外報于鵠少年行云少年初拜大長秋鴈塞陳卧子燕中雜詩鴈塞雲連陣龍沙月近樓吳旦生曰燕中用鴈塞字卧子似未確核嘗見今人所用紫塞鴈門鴈塞皆混而稱之莫攷其地按古今注云秦築長城土色皆紫漢塞亦然故稱紫塞焉周興嗣千字文鴈門紫塞鮑昭蕪城賦北走紫塞杜甫詩蕭蕭紫塞鴈李頻詩秦地山河連紫塞是矣山海經云鴈門山鴈出其間在髙栁北梁州記云梁州縣界有鴈塞山傳言此山有大池水鴈棲集之因名鴈塞顧太初有鴈塞考最審實可據葢云鴈門紫塞地皆在北今人稱北為鴈塞非也荆州記鴈塞北接梁州汶陽郡其間東西嶺屬天無際鴈飛翥至此即囘翼惟一處稍下每鴈飛達則矯翮裁度下處而過故名鴈塞地在蜀漢間也文無害黄太穉讀周元立兩都詩有懐云更誰年少文無害有客陽春和不多吳旦生曰野客叢書謂蕭何以文無害為沛主吏椽趙禹為丞相亞夫吏府中皆稱其亷平然亞夫不任曰極知禹無害然文深不可居大府張湯給事内史為寗氏掾以湯為無害言大府顔師古注無害言最勝又曰傷害也言無人能傷害之者僕觀後漢百官志秋冬遣無害都吏案訊諸囚注按律有無害都吏如今言公平吏漢書音義曰文無所枉害蕭何以文無害為沛主吏掾正如此也據此則文無害乃漢律中語太穉用作讀詩賛美之辭未之考究爾如楊仲𢎞詩慎密文無害詳觀獄有疑自是確當成語黄太穉寄懷三友其中二聮云以吾一日長乎爾如此三星粲者何漢口帆從鸚鵡落荆州士比鯽魚多吳旦生曰王直方詩話山谷嘗謂作詩使史漢間全語為有氣骨後因誦孟浩然詩見以吾一日長異方之樂令人悲及吾亦從此逝方悟山谷之言太穉正得此意故用成語獨蒼然北夢瑣言云江陵世號衣冠藪澤人言琵琶多如飯甑措大多如鯽魚串月徐元歎串月詩金波激射難可擬玉塔倒懸聊近似塔顛一月獨分明千百化身從此止吳旦生曰蘇俗每嵗八月十八夜士女凝粧挈壺罍艤舟于橋畔首尾鱗比僅出篷窻以遲月葢吳中盛水水與月相吞孕凡區一水即各給一月望之纍纍焉如編貝而成串謂之看串月故元歎詩序或云從寶帶橋外出數有七十二此横説也或云葑闗外極饒溪港是夜月出其方光影相傅望如塔燈此豎説也薄暮登楞伽山坐靈官殿庭逺水縱横昬昬莫辨更餘孤魄漸升從溪港一一現形分身無數始大異之二更後益奇總之所為玉塔者近是向之横豎俱不足言今取元歎之序與詩合觀之所謂串月宛在行間矣稻孫單蓴僧詩稻孫翻曉露鳩婦語晴煙呉旦生曰畨禺雜録稻再生曰稻孫又米元章秋日登無為州城樓宴集見田禾青青可愛問之老農云稻孫也稻已穫得雨復抽餘穗元章喜而名其樓曰稻孫樓今蓴僧句用此方瞳陳百史詩赤幢既獲老方瞳吳旦生曰潜確類書李根兩目瞳子皆方云八萬嵗則瞳子方拾遺記老耼居山父老五人皆方瞳玉面共談天地乃五方五行之精枕中書忽見一真人眼瞳正方頂負圓光玉顔絶世東坡詩白髪何足道要使雙瞳方楊仲𢎞詩已驚雙鬢短更待兩瞳方掲曼碩詩方瞳緑鬢紅氍毹仙書言陶通明晩年一眼有時而方搜神記偓佺兩目更方支離張鍾筠詩石拳磊亂排碁譜朩叟支離負斧形吳旦生曰研荘雜記鮮于伯機嘗於廢圃中得恠松一株移置所居齋前呼為支離叟朝夕撫翫以為適遂昌雜録云僧温日觀時至其家抱軒前支離叟或歌或笑其法中所謂散聖者其人也鍾筠用此按荘子支離疏者頥隠于齊肩髙于頂㑹撮指天㑹撮椎髻也五管在上五臟之管皆屬于背背曲僂則管在上也兩髀為脇此數句畫出䭾子形状葢支離者傴僂也肢體不收拾之貌而鮮于取以名松必此松之盤屈而傴僂矣春場劉同人詩云楊栁活楊栁多小孩小女閒不過絲線結鞭鞭陀羅鞭陀羅陀羅起陀羅起鞭不已鞭不已陀羅死又詩云楊栁青兒手空鐘不暫停空鐘空鐘舒而逺聽如蛣蜣起未觸于屏簫垂笛横絲絃合併大人為政小兒無此耐煩性又詩云倒掖器如甌落階瓶倒水勻勻呼吸吹薄紙吸少呼多脱瓶底藏爹錢瞞爹眼裏迷糊琉璃厰甸子兒迷糊倒掖器爹著汗嬷著淚吳旦生曰楊栁活楊栁青皆燕人習俗語而同人采之成咏也燕中兒謂之打拔拔按宋時寒食有抛堶之戲兒童飛瓦石之類也謂起于堯民之擊壤古童兒所戲之器非土壤也風土記云以朩為之前廣後銳長尺三寸其形如履先側一壤于地遥于三四十步外以手中壤擊之中者為上梅聖俞詩窈窕踏歌相把袂輕浮賭勝各飛堶七禾切葢同人與宛平于奕正蒐事摛辭著帝京景物略一書可為采風之助如春場一帙附載十二月事例詳善有致堪與荆楚嵗時記並傳帝京景物略云東直門外五里為春場場内春亭萬厯癸已府尹謝杰建也故事先春一日大京兆迎春旗幟前導次田家樂次勾芒神亭次春牛臺次縣正佐耆老學師儒府上下衙皆騎丞尹輿官皆衣朱簪花迎春自場入于府是日塑小春牛芒神以京兆生舁入朝進皇上春進中宫春進皇子春畢百官朝服賀立春候府縣官吏具公服禮勾芒各以綵仗鞭牛者三勸耕也退各以綵仗贈貽所知按造牛芒法日短至辰日取土水朩於嵗徳之方朩以桑柘身尾髙下之度以嵗八節四季日十有二時踏用府門之扇左右以嵗隂陽牛口張合尾左右繳芒立左右亦以嵗隂陽以嵗干支納音之五行三者色為頭身腹色日三者色為角耳尾為膝脛為蹄色以日支孟仲季為籠之索栁鞭之結子之麻苧絲牛鼻中朩曰拘脊子桑柘為之以正月中宫色為其色也芒神服色以日支受尅者為之尅所尅者其繫色也嵗孟仲季其老壮少也春立旦前後五日中者是農忙也過前農早忙過後農晩閒也而神並乎牛前後乎牛分之以時之夘後八曰燠亥後四曰寒為罨耳之提且戴以日納音為髻平梳之頂耳前後為鞋袴行纒之懸著有無也田家樂者二荆籠上著紙泥鬼判頭也又五六長竿竿頭縳脬如𤓰状見僧則捶使避匿不令見牛芒也又牛臺上花繡衣帽扮四直功曹立而兒童瓦石擊之者樂工四人也考漢郊祀志迎春祭青帝勾芒青車旗服歌青陽舞雲翹立青幡百官衣皆青郡國縣官下至令史服青幘今者朱衣唐制立春日郎官御史長貳以上賜春羅幡勝宰臣親王近臣賜金銀幡勝入賀帶歸私第民間翦綵為春旛簪首今惟元旦日小民以鬃穿烏金紙畫綵為閙蛾簪之正月元旦五鼓時不卧而􅅉􅅉則急起或不及衣曰卧􅅉者病也不卧而語言或戸外呼則不應曰呼者鬼也夙興盥漱啖黍糕曰年糕家長少畢拜婣友投箋互拜曰拜年也燒香東嶽廟賽放砲杖紙且寸東之琉璃厰店西之白塔寺賣琉璃瓶盛朱魚轉側其影小大俄忽别有銜而嘘吸者大聲􅺏􅺏小聲唪唪曰倒掖氣旦至三日男女於白塔寺遶塔旦至晦日家家竿標樓閣松栢枝䕃之夜燈之曰天燈是月也女婦閒手五丸且擲且拾且承曰㧓子兒丸用象朩銀礫為之競以輕捷八日至十八日集東華門外曰燈市貴賤相遝貧富相易貿人物齊矣婦女著白綾衫隊而宵行謂無腰腿諸疾曰走橋至城各門手暗觸釘謂男子祥曰摸釘兒擊太平鼓無昬曉跳百索無稚壮戴面具要大頭和尚聚觀無男女有以詩隠物幌於寺壁者曰商燈立想而漫射之無靈蠢十一至十六日郷村人縳秫稭作棚周懸雜燈地廣二畝門徑曲黠藏三四里入者誤不得逕即久迷不出曰黄河九曲燈也十三日家以小琖一百八枚夜燈之徧散井竈門戸砧石曰散燈也其聚如螢散如星富者燈四夕貧者燈一夕止又甚貧者無燈小兒共以繩繫一兒腰牽焉相距尋丈迭於不意中拳之以去曰打鬼不得為繫者兒所執執者閧然共捉代繫曰替鬼更繫更擊更執更代終日擊不為代則佻巧矣又繩以為城二兒帕䝉以摸一兒執敲城中輒敲一聲而輒易其地以誤之為摸者得則䝉執敲兒曰摸蝦兒望前後夜婦女束草人紙粉面首帕衫裙號稱姑娘兩童女掖之祀以馬糞打鼓歌馬糞薌歌三祝神則躍躍拜不已者休倒不起乃咎也男子衝而仆十九日集白雲觀曰要燕九彈射走馬焉廿五日大啖餅餌曰填倉二月二日曰龍擡頭煎元旦祭餘餅薰牀炕曰薰蟲兒謂引龍蟲不出也燕少蜈蚣而蠍其為毒倍焉少蚊而蠅其為擾倍焉蚤虱之屬臭蟲又倍焉所苦尤在編戸雖預薰之實未之除也小兒以朩二寸製如棗核置地而棒之一擊令起隨一擊令逺以近為負曰打拔拔古所稱擊壤者耶其謠曰楊栁兒活抽陀螺楊栁兒青放空鐘楊栁兒死踢毽子楊栁發芽兒打拔兒空鐘者刳朩中空旁口盪以瀝青卓地如仰鐘而柄其上之平别一繩繞其柄别一竹尺有孔度其繩而抵格空鐘繩勒右却竹勒左却一勒空鐘轟而疾轉大者聲鐘小亦蛣蜣飛聲一鐘聲歇時乃已製徑寸至八九寸其放之一人至三人陀螺者朩製如小空鐘中實而無柄繞以鞭之繩而無竹尺卓於地急掣其鞭一掣陀螺則轉無聲也視其緩而鞭之轉轉無復住轉之疾正如卓立地上頂光旋旋影不動也三月清明日男女掃墓擔提尊榼轎馬後掛楮錠粲粲然滿道也拜者酹者哭者為墓除草添土者焚楮錠次以紙錢置墳頭望中無紙錢則孤墳矣哭罷不歸也趨芳樹擇園圃列坐盡醉有歌者哭笑無端哀徃而樂回也是日簪栁逰髙梁橋曰踏青多四方客未歸者祭掃日感念出逰廿八日東嶽仁聖帝誕傾城趨齊化門鼔樂旗幢為祝觀者夾路是月小兒以錢泥夾穿而乾之剔錢泥片片錢状字幕備具曰泥錢畫為方城兒置一泥錢城中曰夘兒拈一泥錢逺擲之曰撇出城則負中則勝不中而指杈相及亦勝指不及而猶城中則撇者為夘其勝負也以泥錢别有挑用葦綳用指者與撇略同有撇用泥丸者與錢略同而其畫城廓逺四月一日至十八日傾城趨馬駒橋幡樂之盛一如嶽廟碧霞元君誕也立夏日啓氷賜文武大臣編氓得賣買手二銅盞疊之其聲磕磕曰氷盞氷著濕乃消畏隂雨天以綿衣蓋護燠乃不消八日捨豆兒曰結縁十八日亦捨先是拈豆念佛一豆佛號一聲有念豆至石者至日熟豆人徧捨之其人亦一念佛啖一豆也凡婦女不見答於夫姑婉若者婢妾擯於主及姥者則自咎曰身前世不捨豆兒不結得人縁也是日耍戒壇逰香山玉泉茶酒棚妓棚周山灣澗曲聞初説戒者先令僧了願如是今不説戒百年而年則一了願是月榆初錢麪和糖蒸食之曰榆錢糕五月一日至五日家家妍飾小閨女簪以榴花曰女兒節五日之午前羣入天壇曰避毒也過午出走馬壇之牆下無江城繫絲投角黍俗而亦為角黍無競渡俗亦競逰要南則要金魚池西要髙梁橋東松林北滿井為地不同飲醵熈逰也同太醫院官旗物鼓吹赴南海子捉蝦蟇取蟾酥也其法針棗葉刺蟾之眉間漿射葉上以蔽人目不令傷也漬酒以菖蒲插門以艾塗耳鼻以雄黄曰避蟲毒家各懸五雷符簪佩各小紙符簪或五毒五瑞花草項各綵繫垂金錫若錢者若鎖者曰端午索十三日進刀馬於闗帝廟刀以鐵重八十觔紙馬髙二丈鞍韉繡文轡銜金色旗鼓頭踏導之六月六日曬鑾駕民間亦曬其衣物老儒破書貧女敝緼反覆覲日光晡乃收三伏日洗象錦衣衛官以旗鼔迎象出順承門浴響閘象次第入於河也則蒼山之頺也額耳昂囘鼻舒糾吸嘘出水面矯矯有蛟龍之勢象奴挽索據脊時時出没其髻觀者兩㟁各萬衆面首如鱗次貝編焉然浴之不能須臾象奴輒調御令起云浴乆則相雌雄相雌雄則狂七月七日之午丟巧針婦女曝盎水日中頃之水膜生面繡鍼投之則浮則看水底鍼影有成雲物花頭鳥獸影者有成鞋及翦刀水茄影者謂乞得巧其影粗如槌細如絲直如軸蠟此拙徵矣婦或歎女有泣者十五日諸寺建盂蘭盆㑹夜於水次放燈曰放河燈最勝水闗次泡子河也上墳如清明時或製小袋以徃祭甫訖輒於墓次掏促織滿袋則喜秫竿肩之以歸是月始鬬促織壮夫士人亦為之鬬有場場有主者其養之又有師鬬盆筩礶無家不貯焉立秋日相戒不飲生水曰呷秋頭水生暑疿子八月十五日祭月其祭果餅必圓分𤓰必牙錯瓣刻之如蓮華紙肆市月光紙繢滿月像趺坐蓮華者月光徧照菩薩也華下月輪桂殿有兎杵而人立搗藥臼中紙小者三寸大者丈緻工者金碧繽紛家設月光位於月所出方向月供而拜則焚月光紙徹所供散家之人必徧月餅月果戚屬餽相報餅有徑二尺者女歸寧是日必返其夫家曰團圓節也九月九日載酒具茶爐食榼曰登髙香山諸山髙山也法藏寺髙塔也顯靈宮報國寺髙閣也釋不登賃園亭闖坊曲為娛耳麪餅種棗栗其面星星然曰花糕糕肆標紙綵旗曰花糕旗父母家必迎女来食花糕或不得迎母則詬女則怨詫小妹則泣望其姊姨亦曰女兒節十月一日紙肆裁紙五色作男女衣長尺有咫曰寒衣有疏印緘識其姓字輩行如寄書然家家脩具夜奠呼而焚之其門曰送寒衣新喪白紙為之曰新鬼不敢衣綵也送白衣者哭女聲十九男聲十一是月羊始市兒取羊後脛之膝之輪骨曰貝石置一而一擲之置者不動擲之不過置者乃擲置者若動擲之而過勝負以生其骨輪四面兩端凹曰真凸曰詭勾曰騷輪曰背立曰頂骨律其頂岐亦曰真平亦曰詭蓋真勝詭負而騷背閒頂平再勝頂岐三勝也其勝負也以貝石十一月冬至日百官賀冬畢吉服三日具紅箋互拜朱衣交於衢一如元旦民間不爾惟婦製履舄上其舅姑日冬至畫素梅一枝為瓣八十有一曰染一瓣瓣盡而九九出則春深矣曰九九消寒圖有直作圈九叢叢九圏者刻而市之附以九九之歌述其寒燠之候歌曰一九二九相喚不出手三九二十七籬頭吹觱篥四九三十六夜眠如露宿五九四十五家家堆鹽虎六九五十四口中呬暖氣七九六十三行人把衣單八九七十二猫狗尋隂地九九八十一窮漢受罪畢纔要伸脚睡蚊蟲䗶蚤出十二月一日至嵗除夜小民為疾苦者奉香一尺宵行衢中誦元君號自述香願其聲烏烏惻惻曰號佛行過井過寺廟則跪且拜而誦香盡尺乃歸八日先期鑿氷方尺至日納氷窖中鑑深二丈氷以入則固之封如阜内氷啓氷中涓為政凡蘋婆果入春而市者附藏焉附乎氷者啓之如初摘於樹離乎氷則化如泥其窖在安定門及崇文門外是日家效庵寺豆果雜米為粥供而朝食曰臘八粥廿四日以糖劑餅黍糕棗栗胡桃炒豆祀竈君以糟草秣竈君馬謂竈君翌日朝天去白家間一嵗事祝曰好多説不好少説記稱竈老婦之祭今男子祭禁不令婦女見之祀餘糖果禁幼女不令得啖曰啖竈餘則食肥膩時口圈黑也廿五日五更焚香楮接玉皇曰玉皇下查人間也竟此日無婦嫗詈聲三十日五更又焚香楮送迎送玉皇上界矣迎新竈君下界矣插芝蔴稭於門簷窻臺曰藏鬼稭中不令出也門牕貼紅紙葫蘆曰收瘟鬼夜以松栢枝雜柴燎院中曰燒松盆熰嵗也懸先亡影像祀以獅仙斗糖蔴花饊枝染五色葦架竹罩陳之家長幼畢拜已各自拜曰辭嵗已藂坐食飲曰守嵗是月小兒及賤閒人以二石毬置前先一人踢一令逺一人隨踢其一再踢而及之而中之為勝一踢即著焉即過焉與再踢不及者同為負也再踢而過焉則讓先一人隨踢之其法初為趾踵苦寒設今遂用賭如博然有司申禁之不止也凡嵗時不雨家貼龍王神馬於門磁瓶插栁枝掛門之傍小兒塑泥龍張紙旗擊鼔金焚香各龍王廟羣歌曰青龍頭白龍尾聲作以小孩求雨天歡喜麥子麥子焦黄起動起動龍王大下小下初一下到十八聲作巴摩訶薩初雨小兒羣喜而歌曰風来了雨来了禾場背了穀聲作古来了雨久以白紙作婦人首翦紅緑紙衣之以苕菷苗縳小帚令攜之竿懸簷際曰掃晴娘日月蝕寺觀擊鐘鼓家擊盆盎銅鏡救日月聲嘈嘈屯屯滿城中蝕之刻不飲不食曰生噎食病幼兒見新月曰月芽兒即拜篤篤祝乃歌曰月月月拜三拜休教兒生疥小兒遺溺者夜向參星叩首曰參兒辰兒可憐溺牀人兒見流火則啐之曰賊星夜不以小兒女衣置星月下曰女怕花星照兒怕賊星照亦不置洗濯餘水為夜逰神飲馬也曰不當價如呉語云罪過初聞雷則抖衣曰蚤虱不生見霓曰杠戒莫指謂生指頂瘡曰惡指也初雪戒不入口曰毒再雪則以炖茶積雪以塑於庭燕舊有風鳶戲俗曰毫兒今已禁風則剖秫稭二寸錯互貼方紙其兩端紙各紅綠中孔以細竹横安秫竿上迎風張而疾趨則轉如輪紅緑渾渾如暈曰風車歴代詩話巻八十
