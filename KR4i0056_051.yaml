body:
  text: 歷代詩話巻五十一歸安吳景旭撰庚集中之下唐詩夜半鐘張繼楓橋夜泊詩姑蘇城外寒山寺夜半鐘聲到客船歐公言句則佳也其如三更不是撞鐘時石林詩話曰公蓋未嘗至吳中今吳中寺實夜半打鐘也范元實詩眼曰南史齊武帝景陽樓有三更五更鐘丘仲孚讀書以中宵鐘為限阮景仲為吳與守禁半夜鐘今佛宫一夜鳴鈴俗謂之定夜鐘不知唐人所謂夜半鐘者景陽三更鐘耶今之定夜鐘耶然於義皆無害文忠偶不考耳吳旦生曰直方詩話引于鵠之遙聽緱山半夜鐘白樂天之半夜鐘聲後野客叢書引王建之未卧嘗聞半夜鐘許渾之月照千山半夜鐘復齋漫録引皇甫冉之夜半隔山鐘温庭筠之無復松牕半夜鐘陳羽之隔水悠揚午夜鐘以為唐人多用此語也余觀唐詩紀事云此地有夜半鐘謂之無常鐘繼志其異耳中吳紀聞云詩話嘗辨姑蘇寺鐘多鳴於半夜竊以其說為未盡姑蘇鐘惟承天寺至夜半則鳴其他皆五更鐘也此最核實可信宋孫覿作楓橋修造記引此詩為證又留題寒山寺云烏啼月落橋邉寺欹枕遙聞半夜鐘蓋信其非浪吟也䣜侯野客叢書曰酇有二地名屬南陽者音賛屬沛郡者音嵯按茂陵書曰蕭何國在南陽則是蕭何封賛明矣而沛有泗水亭班固銘曰文昌四友漢有蕭何序功第一就封於鄼悞以為沛地之嵯矣楊巨源詩請問漢家功第一麒麟閣上識鄼侯姚合詩鄼侯宅過謙賈島詩往歲鄼侯鎮諸家皆承此謬劉晏嵗輸至天子曰卿朕鄼侯也唐書釋文鄼南陽縣名則旰切此正得之吳旦生曰說文䣜沛國縣从邑虘切同虎昨何切長箋云當必以虎而名寓戒也蓋蕭何封䣜侯當從此䣜字人代紀要云蕭何受封於䣜則史傳作鄼相似之訛師古遂謂南陽之鄼耳觀鄧禹封鄼侯正取其在南陽則何從帝起沛封邑必近沛也李白寄譙郡元參軍詩䣜才何切臺之北又離羣唐書地理志亳州譙郡有䣜縣則非南陽屬縣愈明矣楊雄十八侯銘文昌四友漢有蕭何序功第一受封於䣜字從䣜與何叶諸唐詩直寫作䣜侯音義自當矣余所定唐律類裁中載楊巨源一詩直寫此䣜字楊升菴云蕭何封於鄼其後因以為姓而鄼訛為昝不意升菴悞至此魚橋李紳江南暮春寄家詩魚口橋逢雪送梅吳旦生曰元郝天挺注魚橋在蘇州子城西琴高於此乗鯉魚上昇余謂此非琴高事也按蘇之子城西有乗魚橋者北宋吳子英得赤鯉謂子英曰我迎汝汝上我背遂飛去蘇人高啟詩誰知有飛仙赤脚踏神鯉波驚風蕭蕭渡海秋萬里蓋指子英也紳詩亦當指此因考列仙傳琴高趙人以鼓琴為宋康王舍人浮㳺冀州二百餘年後辭入碭水中取龍子與弟子期曰齋潔候於水傍設祠屋果乘赤鯉來出祠中復入水去又名勝志琴高山在徑縣幙山之北琴高漢人也有隱雨岩是其控鯉上升之所岩下有釣臺臺下水即琴溪也據此則琴高在幙山碭水間何與蘇州事界徐凝廬山瀑布詩今古長如白練飛一條界破青山色吳旦生曰樂天刺杭州時徐凝與張祜各希首薦試詩賦訖解送凝為元祜次之祜自舉金山詩凝亦舉瀑布二語遂擅塲後東坡逰廬山見廬山記中云徐凝李白之詩不覺失笑因作一絶云帝遣銀河一派垂古来惟有謫仙詞飛流濺沫知多少不為徐凝洗惡詩蓋非之也然觀天台山賦赤城霞起以建標瀑布飛流而界道則是凝所云界破其亦有所本矣曹松詩廬山瀑布三千仞畫破青霄始落斜其意亦同劉兼征婦怨云玉筯闌干界粉腮則又脫胎於瀑布耶張祜太眞外傳曰天寶九載上舊置五王帳長枕大被與兄弟共處其間妃子竊寜王紫玉笛吹故張祜詩梨花靜院無人見閒把寜王玉笛吹吳旦生曰清河張祜字承吉詩藪云刻本祜作祐覽者莫辨縁承吉字祜祐俱通耳偶閱雜說張子小字冬𤓰或以譏之答云冬𤓰合出瓠子則張之名祜審矣雲溪友議云朱沖嘲祜詩冬𤓰堰下逢張祜牛矢灘邉說我能以祜時為堰官也二說皆未當按堯山堂外紀云張有二子詩椿兒遶樹春園裏桂子尋花夜月中以詩上牢盆使出其子授漕渠小職得冬𤓰堰或曰賢郎不宜作等職張曰冬𤓰合出祜子金華子雜說云祜死子求濟於裴𢎞慶署之冬𤓰堰官裴曰祜子守冬𤓰已過分矣張為作主客圖以白樂天為廣大教化主而以祜為入室即白公欵頭之謔亦一時欽籍語杜牧之詩誰人得似張公子千首詩輕萬户侯蓋指白公也要其宫體小詩諫諷怨譎與六義相左右未可以雕蟲小巧目之爾洪容齋稱其正月十五夜燈云千門開鎻萬燈明正月中旬動帝京三百内人連䄂舞一時天上著詞聲上巳樂云猩猩血染繫頭標天上齊聲舉畫橈却是内人争意切六宫紅袖一時招春鶯囀云興慶池南栁未開太眞先把一枝梅内人已唱春鶯囀花下傞傞軟舞來又有大酺樂邠王小管李謨笛寧哥來邠娘羯鼓退宫人耍娘歌悖拏兒舞阿䳰湯雨霖鈴香囊子等詩皆可補天寶遺事絃之樂府也容齋二筆云明皇兄弟五王兄申王撝以開元十二年寧王憲邠王守禮以二十九年弟岐王範以十四年薛王業以二十二年薨至天寶時已無存者楊太眞以三載方入宫而元稹連昌宫詞云百官隊仗避岐薛楊氏諸姨車鬬風李商隱詩云夜半宴歸宫漏永薛王沈醉壽王醒皆失之也野客叢書云楊妃以二十四年入宫號太眞是時申岐薛三王雖已死而寧邠二王尚存是以張祜目擊其事繫之樂章有曰日映宫城霧半開太眞簾捲畏人猜黄番綽指向西樹不信寧王迴馬來又曰虢國潛行韓國隨宜春小院映花枝金輿遠幸無人見偷把邠王小管吹蓋紀其實也容齋認楊妃為天寶三載方入宫所以有是失不知天寶初太眞進册貴妃非入宫時也余據勉夫之言可令容齋折角但寧邠以二十九年薨既載之唐史而外傳乃言天寶九載以竊笛事譴放出宫則何也集中謂虢國竊邠王笛而外傳謂楊妃竊寧王笛又不同若論薛王沈醉壽王醒之句不特薛王確而壽王亦確按唐明皇時孫遜集中有壽王瑁妃楊氏廢為道士制可見太眞果壽王妃也亥市張祜詩野橋經亥市山路至申州吳旦生曰青箱雜記荆吳俗有寅申巳亥日集於市故謂亥市蜀有痎市間日一集如痎瘧之發其俗又以冷熱發歇為市喻徐筠水志云分寧縣本常州亥市也西蜀曰痎如瘧疾間日復作也江南人惡以疾稱故止曰亥耳豫章漫抄云南中每以丑卯酉日為市故曰兔塲牛塲雞塲豈用亥日為市故謂之亥余按月令廣義云亥音皆釋名亥核也收藏百物核取其好惡眞僞也市之以亥或取此義當從亥日為正張文昌詩江村亥日長為市白樂天詩亥日沙頭始賣魚黄山谷詩魚収亥日妻到市除目鶴林玉露曰古詩云一日看除目三年損道心予謂人患道心不存耳道心果存豈看除目所能損哉彼慕膻齅餌之念洗滌未凈往往身寄山林而心存朝市跡履泉石而意繫軒冕視山林泉石反若籠檻桎梏宜其看除目而心為之損也特所損者人心耳豈道心哉伊川曰百官萬務金革百萬之衆曲肱飲水樂在其中矣萬變皆在人其實無一事朱文公云艮其背是止於止行其庭是止於動不獲其身是無與於己不見其人是亦不見人無人無己但見是此道理各止其所也止而至於如此其誰能動之昔有僧居深山中山鬼百計害之僧不為動乆乃寂然僧曰山鬼之伎倆有盡老僧之不聞不見無盡此即所謂不獲其身不見其人者也心安如是又豈除目所能損也吳旦生曰此二語姚合詩也宰相崇曾孫登元和進士第調武功主簿世號姚武功終秘書監又稱姚監嘗取王維等二十六人詩百篇為涵元集曰此詩中射鵰手也觀其送張宗原詩東門送客道春色如死灰自是㝠心入道之言又武功縣閒居詩縣去京城遠為官與隱齊馬隨山鹿放雞雜野禽棲尚何除目得入其胸次哉海録碎事云凡言除者除故官就新官也夢溪筆談云除拜官職謂除其舊籍不然也除猶易也以新易舊曰除如新舊歲之交謂之歲除易除戎器戒不虞以新易弊所以備不虞也堦謂之除者自下而上亦更易之義五粒李長吉五粒小松歌云新香幾粒洪崕飯姚令威曰五粒未詳吳旦生曰本草圖經五粒松粒當讀為鬛音之訛也言每五粒為一華或有三鬛七鬛者名山記云松有兩鬛三鬛五鬛者言如馬鬛形癸辛雜識云凡松葉皆雙股故世以為松釵獨栝松每穗三鬛而高麗所産每穗乃五粒今謂華山松是也五代史鄭遨聞華山有五粒松松脂入地千年化為藥去三尸因徙居華山求之韋應物詩碧澗蒼松五粒稀陸龜蒙詩霜外空聞五粒風李商隱詩松暄翠粒新劉夢得詩翠粒照晴露元好問詩土中松粒龍爪脫銅人緗素雜記曰魏明帝青龍五年三月改為景初元年是歲徙長安銅人重不可致而李賀謂青龍九年八月蓋明帝改元景初至三年而崩則無青龍九年明矣野客叢書曰據今賀集云青龍元年緗素誤認元年為九年耳吳旦生曰若書元年宜系以景初不當仍青龍矣按魏略云明帝景初元年徙長安鐘簴駱駝銅人承露盤盤折銅人重不可致留於霸城大發卒鑄作銅人二號曰翁仲列坐於司徒門外栁子厚所謂翁仲遺墟草樹平也吾衍云墓前石人通謂之翁仲按厯代小志文翁姓文名黨字仲翁漢景帝時為蜀郡太守即此人也陳眉公云文翁字漢書不載而吾衍亦未及檢證蓋墓前石羊名神羊石馬名駁馬翁仲身長二丈三尺氣質端勇少為縣吏為都郵所笞嘆曰人當如是耶遂入學究書史始皇并天下使翁仲將兵守臨洮秦人以為瑞翁仲死遂鑄銅為像置之咸陽宫司馬門外見之者猶以為生故古之墓間皆用之至於秦金人銘曰皇帝二十六年初兼天下以為郡縣正法律同度量大人來見臨洮身長五丈足六尺以為祥鑄金人象之其重二十四萬觔坐阿房宫前當漢而徙之未央宫王莽嘗鐫其膺又其後董卓以其九鑄錢而石虎以其三置鄴宫苻堅取之後置長安以其二為泉其一適至陜而堅亂民以其勞苦患之乃排䧟河中吳正子箋云按徙銅仙事陳壽正史不載特附註魏略云明帝景初元年徙長安銅人重不可致留霸城又引漢晉春秋云帝徙銅盤盤折聲聞數十里金人或泣因留霸城其年月與長吉所載不合故緗素雜記駁之曰青龍五年改為景初是嵗徙銅人而長吉云青龍誤矣然予按三輔黄圖則景初所徙者始皇銷鋒鏑所鑄之金人故黄圖厯載始皇所造之因及董卓銷毁之事而復曰尚餘二人未毁明帝欲徙之洛陽清明門至霸城重不可致其留霸城之說與魏略及漢晉春秋所載皆合特二書不以為秦皇銅人耳觀漢晉春秋金人之語則知非銅仙矣由是言之長吉所序亦未可非安知漢武銅仙不果徙於青龍元年耶又按長安記云仙掌大七圍魏文帝徙銅盤盤折聲聞數十里今魏略等書乃言明帝是則可疑漢書建章宫有神明臺三輔皇圖云神明臺上有承露盤銅仙舒掌捧盤及玉杯以承雲表之露和玉屑服之以求仙道甘泉宫通天臺上亦有銅仙承露盤四雨漁隱叢話曰桃花亂落如紅雨梨花一枝春帶雨小院深沈杏花雨梅子黄時日日雨皆古今詩詞之警句也予嘗欲作一草亭四面各植花一色榜曰四雨豈不佳哉吳旦生曰捫蝨新語梨花一枝春帶雨句雖佳不免有脂粉氣不似朱簾暮捲西山雨多少豪傑因謂樂天句似茉莉花王勃句似含笑花李長吉桃花亂落如紅雨似薝蔔花而王荆公以為總不如院落深沈杏花雨乃似闍提花野客叢書云前輩謂深院無人杏花雨之句極佳此非四雨之數當作去聲呼僕觀此句正祖南唐潘佑之意佑有詩曰誰家舊宅春無主深院簾垂杏花雨然佑句作上聲非去聲也其下曰香飛緑鎻人未歸巢燕承塵燕無語豈語字亦當作去聲耶花間集亦曰紅憲寂寂無人語黯澹梨花雨休齋云荆公以院落深沈杏花雨為佳予謂杏花雨固佳然而梨花院落溶溶月栁絮池塘澹澹風却於風月上寫出栁絮梨花尤有精神嘗欲轉移兩句作溶溶院落梨花雨澹澹池塘栁絮風此老杜紅稻啄餘鸚鵡粒碧梧棲老鳯凰枝格也踏哮虎李長吉秦宫詩紫繡麻霞踏哮虎吳旦生曰吳正子注踏虎則麻霞必履舄屬說文鞋跟曰䪗又云履跟後貼音同䪗今作此霞恐或訛踏哮虎羽獵賦所謂屨班首者是也班首虎頭也言其勇耳余觀古今注云古履絇繶皆畫五色至漢有伏虎頭始以布鞔繶上脫下加以錦為飾因按草曰屝麻曰屨凡布皆可謂之麻則所云紫繡乃繡於麻上也漢之伏虎頭亦猶東晉之鳯頭履西晉之伏鳩頭履子蓋一時之制也所云踏哮虎正指漢時鞋上之飾以形容其服御驕侈耳不以勇言魚須李長吉詩公主遣秉魚鬚笏吳旦生曰禮記玉藻之載笏有云大夫以魚須文竹鄭注謂文飾也陸氏音義謂以魚須飾文竹之邉須音斑據此則笏以竹為質而刻畫為魚斑之文以飾之也今長吉悞以須作鬚音訓全乖矣按司馬相如賦靡魚須之橈旃此則魚須為旃却不音斑高季迪樂府云前揚豹尾竿左靡魚須旃蓋用此也如徐師川詩頗知鶴脛縁詩瘦早棄魚須伴我閒元楊奐草堂詩魚須分浪細虎跡印沙圓王弇州詩家有魚鬚丞相笏囊餘雞舌侍臣香亦作魚鬚用矣惟楊廉夫樂府其咏司空圖墜笏事云重来手擲魚須竹鴛隼班中脱麋鹿獨不失禮經本意禮記笏天子以球玉為之挺然而方其首示無所屈於天下諸侯以象前詘後直圓其首屈於天子也大夫以魚斑飾竹士竹本前詘後詘又示無所不屈焉釋名笏忽也君有教命及所啟白則書其上備忽㤀也車服襍事云昔荆軻逐秦王其後謁者持匕首以備不虞從此侍宦執刀劒漢高祖偃武修文始制以手板代焉蟲西溪叢語曰李賀詩攢蟲鎪古栁劉禹錫詩秋蟲鏤宫樹此二句皆善吳旦生曰二語工刻正同不可謂注蟲魚非磊落矣王氏談録舊嘗得句云槐杪青蟲縋夕陽因思昔人似未曾道後閲杜詩有云青蟲懸就日尤歎其才思無所不周也雪浪齋日記云少㳺詩甚麗如青蟲相對吐秋絲之句是也若木李賀苦晝短詩云天東有若木下置銜燭龍吳旦生曰離騷析若木以拂日兮聊逍遙以相羊注云若木在西極謝莊月賦擅扶光於東沼嗣若木於西㝠五臣注云扶光日出處若木日沒處淮南子云若木在建木西燭龍在鴈門北蔽於委羽之山不見日故以目照之其神人面龍身而赤色山海經云西北海之外赤水之北有章尾山有神其暝乃晦其視乃明視燭九陰是謂燭龍詩含神霧云天不足西北無陰陽消息故有龍銜火精以照天門中者也張說賦云南窮火䑕之譯北盡燭龍之㑹據此則若木在西燭龍在北長吉言天東憒憒臺城李長吉詩臺城應教人吳旦生曰吳正子注晉成帝七年作新宫輿地圖云即臺城也在今上元縣東北五里周八里容齋隨筆云晉宋間謂朝廷禁省為臺故稱禁城為臺城官軍為臺軍卿士為臺官法令為臺格今人於他處指言建康為臺城非也秦法諸王公稱教言教示於人也蔡邕獨斷云諸侯之言曰教任昉文章縁起云漢王尊為京兆尹出教告屬縣則教之文起此魏晉以來人臣於文字間有屬和於天子曰應詔於太子曰應令於諸王曰應教賈島帝京景物略曰房山縣南十里睪然而土埠者詩人賈島墓也榛蕪不可識𢎞治中御史盧某訪得於石樓村讀仆斷碑有據乃植碑闢地三畝大學士西涯李公別樹一碑記焉按島字浪仙范陽人僧名無本初祝髪法善寺一曰雲蓋寺在瀛州城南今蕪沒無一椽夜或聞鈴鐸梵唄音焉島之入東都時吟落葉滿長安句卒求一聯未得因突京尹劉栖楚被繫一夕釋又一日苦吟驢上指畫錯然遇韓京兆愈不覺衝至第三節左右擁至尹前具云某方得句僧推月下門欲易敲字未安引手作推敲勢耳尹立馬良乆曰作敲字遂教島為文舉進士然舉輒不第文宗時得除長江簿卒年五十六島常以歳除取一年詩祭以酒脯曰勞吾精神以是補之島至老無子李洞慕其詩範銅事之常誦賈島佛今房山有石庵曰賈島庵景州西南五十里有賈島村一曰賈島峪蓋詩人丘里名島為多身後名島為乆吳旦生曰此麻城劉同人之紀房山縣賈島墓也同人稱島至老無子姚合哭島詩亦云有名傳後世無子過今生及觀唐釋可止哭島云官卑誤子孫又曹松弔島云稚子哭勝猿則何說也即島之哭孟郊詩云寡妻無子息破宅帶林泉乃唐史謂鄭餘慶廩郊之妻子意郊歿後子鄷郢之子而島亦有螟蛉耶䑕璞云緗素雜記及禹錫嘉話載賈島事一謂累舉不第文宗時坐飛謗貶長江簿一謂島為僧居法乾寺宣宗微行於案上取詩巻覽之島攘臂奪去帝慚恧遂除島長江簿唐宋遺史所載畧同程錡有奪巻忤宣宗之句能改齋漫録云浪仙主長江簿有題長江詩云歸吏封宵鑰行蛇入古桐桐在縣㕔前大觀中縣令胡同老惡其枯枿砍去李洞過島舊地詩境搜松雪仙人島吟歇林泉主簿㕔又賈島墓詩位卑終蜀土詩絶占唐朝蓋傷之矣目島為詩祖至於範銅禮之此亦金鑄少伯絲繡平原意也王維愛孟浩然吟哦風度繪為圖以翫之潘閬咏潮著名好事者以輕綃寫其容謂之潘閬咏潮圖還道今人有此舉動不得句臨漢詩話曰賈島詩獨行潭底影數息樹邉身其自注云二句三年得一吟雙淚流知音如不賞歸卧故山秋不知此二句有何難道至於三年始成而一吟下淚也吳旦生曰詩人得句取其精力所結獨地至到自味自甜未許旁人染鼎若向此處推勘工拙便减却興㑹矣江隣幾雜志云一僧賦中秋詩此夜一輪滿至来秋方得下句云清光何處無喜躍半夜起撞寺鐘城人盡驚李先主擒而訊之具道其事得釋蓋幸在南唐嘉斯標舉若遇高頭巾且道何必一年方對中州集黄子端中秋詩明月幾時有清光何處無全用此僧下句獻當事金陵語録曰聖俞嘗言賈島詩竹籠拾山果瓦瓶擔石泉姚合詩馬隨山鹿放雞逐野禽棲雖是山邑荒僻官况蕭條不如縣古槐根出官清馬骨高為工吳旦生曰翰府名談以雨後有人耕綠野月明無犬吠花村見令之教化仁愛民樂於耕耨且無盗賊之警士子投獻當事此為佳句余謂終不若縣古一聯寓情狀物妙於不經人道處字字穩貼至於方諤詩琴彈永日得古意印鏁經秋生蘚痕則印上豈是生蘚處以其守廣乃云鱷去溪潭韓吏部珠還合浦孟嘗君則珠還乃後漢孟嘗豈可混稱孟嘗君此皆失於詳審矣風凉癸辛新集曰唐文宗詩人皆苦炎熱我愛夏日長栁公權續以薰風自南來殿閣生微凉東坡惜其有美而無箴故為續之云一為居所移苦樂永相㤀願言均此施清陰分四方蓋栁句正所以諷也薰風之來惟殿閣穆清高爽之地始知其凉而征夫耕叟方奔馳作勞低垂喘汗於黄塵赤日之中雖有此風安知所為凉哉此與宋玉對楚王曰此謂大王之風耳庶人安得而共之者同意吳旦生曰時五學士屬和帝獨諷公權兩句辭清意足不可多得令公權題於壁上字方圓五寸帝視之嘆曰鍾王復生無以加矣陳輔之詩話云舊唐史公權應制聯句薰風自南來殿閣生微凉然當廣殿高閣南風之來不止微凉而已新史易曰殿桷生餘凉蓋屈桷叢椽受風勁快此兩字有功於修詞也藝苑雌黄云東坡端午帖子皇帝閣云微凉生殿閣習習滿皇都試問吾民愠南風為解無原其意蓋欲聖君推南風之徳以及於黎庶也謂公權有美而無箴因續四句其作端午帖子詩用此意也陳輔之謂有易殿桷生餘凉予謂此語無甚意義今世所傳只有公權舊語故東坡詩微凉生殿閣又云獨咏微凉殿閣風不聞有殿桷餘凉之說六出章孝標春雪詩六出花飛處處飄出音綴吳旦生曰太平廣記六出公謂雪也宋書正月朔雨雪太宰義恭衣有六出奏以為瑞朱晦翁謂地六為水之成數雪者水結為花故六出立春後則五出矣又史繩祖嵓桂詩四出花中異自注云土之生物其成數五故草朩花皆五出惟桂乃月中之木居西方地四乃西方金之生數故花四出而金色且開於秋云又蘇東坡雪詩薝葡無香散六花注云薝葡梔子花也與雪花皆六出按冬至陰極陽生梅桃李杏花皆五出夏至陽極陰生威靈仙鹿葱射干净瓶梔子花皆六出祥符問海陵人王綸有女年十四自稱燕華君一日作雪詩何似月娥欺不在亂飄瑞葉到人間父問瑞葉何出女曰天上有瑞木花開六出砌臺張仲素詩騁望臨香閣登高下砌臺吳旦生曰砌臺即今擦擦臺也王侯家作此以為臨觀之景清異錄所云金陵士大夫家飯可打擦擦臺是也王審琦都尉家其子曰承裕㓜時其父戲補砌臺使白樂天詩何處風光最可憐妓堂階下砌臺前楊汝士詩抛却弓刀上砌臺陸放翁詩水殿西頭起砌臺半日閒徐興公曰李涉㳺鶴林寺云終日昬昬醉夢間忽聞春盡强登山因過竹院逢僧話又得浮生半日閒曾子固續云昔人春盡強登山只肯逢僧半日閒何似一尊乘興去醉中騎馬月中還吳旦生曰談藪東坡一日訪佛印於竹寺印欵之坡因誦涉竹院二句印曰學士閒得半日老僧忙了半日相與發一大笑竹坡老人詩話云有數貴人遇休沐携歌舞宴僧舍者酒酣誦涉此二句僧聞而笑之貴人問師何笑僧曰尊官得半日閒老僧却忙了三日謂一日供帳一日燕集一日掃除也余以涉本愛竹因登山而作此句極韻事也佛印猶是雅謔至作三日勞碌乃以僧舎為郵亭貴人俗甚然亦僧自取耳杜牧入文公寺有僧擁褐獨坐問杜姓字旁人以累捷誇之顧而笑曰皆不知也杜因題曰家在城南杜曲傍兩枝仙桂一時芳禪師都未知名姓始覺空門意味長若此僧目無貴人何忙之有畫壁李徳裕詩畫壁看飛鶴吳旦生曰注謂唐翰苑粉壁畫海中曲龍山憲宗臨幸中使懼而塗之是後皆畫松鶴此李詩所云也然按秘閣廊壁薛稷畫鶴故鄭谷詩因看薛稷鶴共起五湖心集賢注記云集賢院北壁畫叢竹雙鶴則是禁壁畫鶴又不止李所云矣至於省中舊稱粉署者粉畫省也畫斷云畢宏大厯二年為給事中畫松石於左省㕔壁黄山谷云唐省中皆青壁畫雪然此不始於唐也按漢官典職云省中皆粉壁畫古列士列女東觀記云靈帝詔蔡邕畫赤泉侯五代將相於省沈約宋志云郎官奏事明光殿殿以胡粉畫古列賢列士則知省中畫壁有自矣白絹雲麓漫抄曰古結繩而治二帝以来始有簡册以竹為之而書以漆或用板以鉛畫之故有刀筆鉛槧之說秦漢末用縑帛如勝廣書帛内魚腹高祖書帛射城上至中世漸用紙趙后傳所謂赫蹏者注云薄小紙然其實亦縑帛蔡倫傳用縑帛者謂之紙縑貴重不便於人倫乃用木膚麻皮等則古之紙即縑帛字蓋從糸云故今人呼書曰䇿子取簡册之義又曰第幾巻言用縑素也江南行簡處州作槧版而髣髴古制盧仝詩首云諫議送書至白絹斜封三道印豈唐人又曽用絹封者耶吳旦生曰劉向校讐天禄閣先書竹其刊定可繕寫者以上素揚雄謂天下上計者吾當把三寸弱毫四尺油素以開其異蔡邕非流紈豐素不妄下筆按逸雅素朴素也已織則供用不復加巧飾也又物不加飾皆自謂之素此色然也則知盧仝白絹猶言素也飲馬長城窟行云中有尺素書注尺素絹也怨歌行云新置齊紈素劉履補注引荀悅漢紀云齊國獻紈素絹則是絹即素也周禮注云素紗者今之白縳也縳音絹今作絹字佛典多羅樹葉書凡有二百四十縳蓋借為巻字也則古字之借用多矣象外魏菊莊曰比物以意而不指言一物謂之象外句如無可詩聽雨寒更盡開門落葉深是以落葉比雨聲也又云微陽下喬木遠燒入秋山是以微陽比遠燒也用事琢句妙在言其用而不言其名吳旦生曰唐人琢句本自有法一經識者拈出或意言之外別具靈鋒或比偶之間獨存音節余不厭詳載之以見古今人手眼也魏鶴山謂詩家有影對如陳后山詩輝輝垂重露㸃㸃綴流螢是以上句對下句郭彦深謂借景顯題如杜審言詩日照虹霓似天清風雨聞是上句色下句聲瀑布水也金聖歎云唐人三四多作側卸最是好手而老杜為尤得其法如羞將短髪還吹帽笑倩旁人為正冠老去詩篇渾漫興春來花鳥莫深愁常怪偏禆終日侍不知旌節幾年回永夜角聲悲自語中天月色好誰看郡人入夜爭餘瀝稚子尋源獨不聞楚妃堂上色殊衆海鶴階前鳴向人我已無家尋弟妹君今何處訪庭闈石出倒聽楓葉下櫓搖背指菊花開竹葉於人既無分菊花從此不須開遷轉五州防禦使起居八座太夫人負鹽出井此溪女打鼓發船何郡郎悵望千秋一灑淚蕭條異代不同時不為困窮寜有此祇縁恐懼轉須親豈謂盡煩回紇馬翻然遠救朔方兵乘舟取醉非難事下峽消愁定幾巡花逕不曽縁客掃蓬門今始為君開此時對客遙相憶送客逢春可自由昔去為愁亂兵入今來已恐隣人非但使閭閻還揖讓敢論松竹乆荒蕪安得仙人九節杖拄倒玉女洗頭盆酒債尋常行處有人生七十古來稀且看欲盡花經眼莫厭傷多酒入唇苦遭白髪不相放羞見黄花無數新更為後㑹知何地忽漫相逢是別筵萬里傷心嚴譴日百年垂死中興時豈有文章驚海内謾勞車馬駐江干已知出郭少塵事更有澄江銷客愁其他如纔是寢園春薦後非關御苑鳥銜殘只言啼鳥堪求侣無那春風欲送行到來函谷愁中月歸去蟠溪夢裏山鴻鴈不堪愁裏聽雲山况是客中過越人自貢珊瑚樹漢使何勞獬豸冠葉縣已泥丹竈畢瀛洲當伴赤松歸寒雨送歸千里外春風沉醉百花前江客不堪頻北望塞鴻何事又南飛漁父置辭相借問郎官能賦許依投世事茫茫難自料春愁黯黯獨成眠眞僧出世心無事靜夜名香手自焚能令瀑水清人境直取流鶯送客盃青鏡流年看髪變白雲芳草與心違已被秋風教憶鱠更聞寒雨勸飛觴正當秋風渡遼水那值遠道傷離情蹔驚風燭難辭世便是蓮花不染身丹闕未承雙鳯詔開門空對楚人家不見山中人半載依然松下屋三間夜半聽雞梳白髪天明走馬入紅塵京邑舊㳺勞夢想厯陽秋色正澄鮮豈似滿朝承雨露共看傳賜出青㝠欲為聖朝除弊事肯將衰朽惜殘年組紃常在佳人手刀尺空勞寒女心知愛魯連歸海上可令王翦在頻陽楚山遠色獨歸去灞水空流相送回更無新燕來巢屋大有閒人去看花由來碧落銀河畔可要金風玉露時一春夢雨常飄瓦盡日臨風不滿旗玉璽不縁歸日角錦帆應自到天涯徒令上將揮神筆終見降王走傳車空庭苔蘚饒霜露時夢西山老病僧迎憂急鼓疎鐘斷分隔休燈㓕燭時巧囀豈能無本意良辰未必有佳期自欲放懷猶未得不知經世又何如塵世難逢開口笑菊花須揷滿頭歸何人更結王孫襪此客空彈貢禹冠兩見梨花歸不得每逢寒食一􅏰然千年事往人何在半夜月明潮自來一自仙娥歸碧落幾年春雨洗紅蘭行人自笑不歸去瘦馬獨吟真可哀正穿詰曲﨑嶇路更聽鉤輈格磔聲題詩朝憶復暮憶見月上弦還下弦居士祇今開梵處先生舊是草𤣥堂高忩曲檻仙侯府折葦荒芹白鳥家故山歳晚不歸去高塔天晴獨自登曹公尚不能容物黄祖何因反愛才聖主尚嫌蕃界近將軍莫恨漢庭遙人在下方衝月上鶴從高處破煙飛看處便須終日住筭來寧得此身閒四時最好是三月一去不回惟少年空庭日午獨眠覺旅夢天涯相見回惟對松篁聽刻漏更無塵土翳虛空為客正當無鴈處故園誰道有書來皆言洞裏千株好未勝庭前一樹幽雨裏共尋幽磵菊樽前俱是故鄉人四海共誰言近事九原從此負初心錦字莫辭連夜織塞鴻常是到春歸細草擁壇行不得落花沈磵水流香或於一様側缷中又毎每有作拗一句法者如只言啼鳥堪求侣無那春風欲送行朝瞻雙頂青㝠上夜宿諸天色界中逋客未能㤀逸興辟書翻遣脫荷衣江客不堪頻北望塞鴻何事又南飛不見山中人半載依然松下屋三間已脫素衣參幕客却為精舍讀書人客舎莫辭先買酒相門曾忝並登龍巧囀豈能無本意良辰未必有佳期浮世本來多聚散紅蕖何事亦離披一名我漫居先甲千騎君翻在上頭遙知楊栁是門處似隔芙蓉無路通仙籍不知名姓有世情真見往来疎晨雞未暇鳴山底早日先來照屋東近来雅道相親少惟仰吾師獨得深雖蒙靜置疎籠晚不似閒眠折葦秋雖愁野㟁花房凍還得山家藥笋肥蘭亭舊址雖曾見柯笛遺音已不傳振錫纔聞三徑草登船又掛一帆風新斸松蘿還不住愛尋雲水擬何之皆是於題外故作一拗以自攄其胸前離竒屈曲之氣此又非側缷一例之所得同也又見其於側缷之中另有陪一句之法如鴻鴈不堪愁裏聽雲山况是客中過天上河從關下過江南花向殿前生甲子不知風御日朝昬惟見雨来時門臨蒼莽經年閉身逐嫖姚何日歸漫有長書憂漢室空傳哀些弔沅湘暗寫五經収部帙初年七歳著衫衣門依高栁空飛錫身逐閒雲不在家身外盡歸天竺偈腰間未解㑹稽章眼穿常訝雙魚斷耳熱何辭數爵頻祇令文字傳青簡不使功名上景鐘登第早年同座主相思今日異州人花枝滿院空啼鳥塵榻無人憶卧龍半㟁泥沙孤鶴立三堂風雨四門開寺寺院中無竹樹家家壁上有弓刀碧落有情還悵望瑤臺無路可追尋拂曙紫霞生石壁何年絳節下層城金管曲長人盡醉玉簮恩重獨生愁愁裏又聞清笛怨望中不見白衣來去鴈遠衝雲夢澤離人獨上洞庭船蝴蝶夢中家萬里子規枝上月三更青雲滿眼不干禄白髪蓋頭惟著書月明南浦夢初斷花落洞庭人未歸一瓶一鉢垂垂老千水千山得得來皆是明明走出題外先陪一句然後只以一句便完正題也納納眈眈蜀中詩話曰薛濤所作江月樓詩秋風髣髴吳江冷鷗鷺參差夕陽影垂虹納納卧譙門雉堞眈眈俯漁艇陽安小兒拍手笑使君幻出江南景吳旦生曰曹能始謂江南抄本與蜀本之外搜閲而得此詩余觀垂虹二句風物流利即疊字亦不虛下納納用裴遜之詩納納江海深杜子美詩納納乾坤大而眈眈從睥睨生來左傳守睥者皆哭杜預注云睥者城上之睥睨逸雅云城上垣曰睥睨言於其孔中睥睨非常也亦曰女墻言其卑小比之於城若女子之於丈夫也字學集要云蓋女墻開箭眼以窺望城下因名睥睨正異作埤堄史記魏其傳作辟倪三蒼作嚲說文作俾倪韻㑹作壀堄正韻作䁹睨歷代詩話巻五十一
