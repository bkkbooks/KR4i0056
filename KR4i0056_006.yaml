body:
  text: 歴代詩話巻六歸安呉景旭撰甲集下之下三百篇丕不顯不承呉旦生曰毛氏訓文王之徳豈不顯乎豈不承乎按不字當作丕字讀即書所謂丕顯丕承也來牟貽我來牟呉旦生曰歐陽詩論來牟為麥始出於毛鄭而二家所據乃臆度之言然按劉向封事引飴我釐麰麥也文選注引韓詩貽我嘉􅓿薛君曰􅓿大麥也毛鄭之說未可以為非王伯厚謂毛傳牟麥也鄭箋赤烏以牟麥俱來廣雅始以為來小麥牟大麥以劉向說㕘考當從古註趙凡夫云石經貽我來牟後人尚茂密合二字而成麰後復尚簡改艸而為葦趨煩趨簡人心之無常也癸辛雜識云今人呼麥麪為來牟或曰牟粉皆非也來牟自是兩物周之所以受瑞麥即今之大麥按小麥生於桃後二百四十日秀之後六十日成秋種冬長春秀夏實具四時之氣兼有寒溫熱冷故小麥性㣲寒以為麯則溫麪則熱麩則冷酺王伯厚漢制攷曰以開百室箋百室者出必共洫間而耕入必共族中而居又有祭酺合醵之歡疏族師職云春秋祭酺注者為人物災害之神也因此祭酺聚錢飲酒故後世聽民聚飲皆謂之酺漢書每有嘉慶令民大酺五日是其事也呉旦生曰說文酺王徳廣布大飲酒也箋云古今多酒禁賜酺乃飲甫借大也故从甫葢四閭為族一族共計百家故族師可以證百室也按酺為人物烖害之神田有蝝螟厩有馬瘟皆祭之校人職又有冬祭馬步杜子春云步即酺也釋文酺音蒲又云步王伯厚又言漢時有蝝螟之酺神又有人鬼之步神未知其所祭何神葢亦為壇位如雩禜云趙世家載武靈王行賞大赦置酒酺五日漢律三人以上無故聚飲罰金四兩故漢以賜酺為惠澤令得羣飲酒也唐無酺禁亦賜酺者葢聚作伎樂高年賜酒宋祥符元年正月三日天書降大赦改元東都賜酺三日駉魯頌駉之篇駉駉牡馬在坰之野呉旦生曰說文駉牧馬苑也从馬冋詩曰在駉之野古熒切箋云傳者謂駉駉肥澤也坰郊野也說文不取篇名首句而取次句又以坰為駉初疑傳寫之誤正不然也因漢鄭氏解駉駉為腹榦肥張遂生異議如用本訓牧苑為解則知所引不謬矣不則坰野同作一句何說乎郡縣志坰澤俗名連泉澤在兗州曲阜縣東九里僖公牧馬之地劉楨魯都賦放戎馬於巨野之坰寰宇記大野在濟州鉅野縣東五里一名鉅野澤爾雅十藪魯有大野注今高平鉅野縣東北大澤作思無斁思馬斯作呉旦生曰斁音度作音做小雅采薇采薇薇亦作止曰歸曰歸嵗亦莫止荀子肉腐出蟲魚枯生蠧貪利忘身禍烖乃作漢書金可作世可度樂府安東平云微物雖輕拙手所作餘有三丈為郎別厝梁元帝詩芙蓉作船絲作索齊武帝臨終執鬱林王手曰若憶翁當好作此皆作讀為做也西清詩話載韓退之詩非閣復非船可居兼可過君欲問方橋方橘如此作乃從其方言為之者漁隠叢話引杜詩主人送客何所作謂此語已先退之用矣兩家曽不知自古已然耶白樂天詩作底歡娯過此夜洪武中謝子蘭詩傷哉脊令原黄蒿走狐兔别墅破垣在郵亭乃新作亦叶此音祝枝山詩小住祝郎三百嵗好為花作挽春工程孟陽詩衙齋天與閒人作好辦飢飡和困眠皆自注作去聲野客叢書云廣韻作字有三音一則洛切二臧路切三則邏切退之詩韻正叶則邏切音佐耳又後漢亷范傳云亷叔度來何暮不禁火民安作昔無襦今五袴此作字臧路切音措耳據此則楊升菴古音畧所引亷傳作字音做誤而諸書槩作做讀亦不無可識矣泮宫戴仲培䑕璞曰魯泮宫漢儒以為學予觀菁菁者莪序謂樂育人才而詩序敎養之盛中阿中陵孰不知為育才之地惟泮水序止曰頌僖公能修泮宫而詩言無小無大從公于邁則征伐之事言順彼長道屈此羣醜則克敵之功言攸服言卒獲則頌淮之服借曰受成於學獻馘獻囚可也於此受琛元龜象齒大賂南金之畢集何也或曰濟濟多士克廣徳心此在泮之士然不言敎養之功而繼以桓桓于征狄彼東南不過從邁之多賢何也又曰載色載笑匪怒伊敎此公之設敎然不言敎化及於羣才而先以其馬蹻蹻其音昭昭不過燕享之和樂何也合序與詩初無養才之說其可疑一也春秋二百四十二年所書莫大於復古僖公登臺望氣小事也左氏猶詳書之學校久廢而乍復葢闗吾道之盛衰何經傳略不一書其可疑二也駉序言史克作頌以修伯禽之法足用愛民務農重穀數事使果能興崇學校克何不表而出之以侈君之盛美其可疑三也上庠虞制也東序西序夏制也左學右學東膠虞庠商周之制也孟子言庠校序皆古之學使諸侯之學果名泮宫何他國略無聞焉其可疑四也記禮多出於漢儒其言頖宫葢因詩而訛鄭氏解詩泮言半諸侯之學東西門以南通水北無其解禮記頖言班以此班政敎使鄭氏確信為學何隨字致穿鑿之辭其可疑五也有此五疑予意僖公不過作宫於泮地落成之際詩人善禱欲我公戾止於此永錫難老而服逺人於此昭假孝享而致伊祜於此獻囚獻馘而受琛貢此篇與宣王考室之詩相表裏特周為居處之室魯為從㳺之宫祝頌有不同按通典言魯郡乃古魯國郡有泗水縣泮水出焉然後知泮乃魯水名僖公建宫於上詩言翩彼飛鴞集于泮林林者林木所聚以泮水為半水泮林亦為半林乎泮為地名與楚之渚宫晉虒祁之宫無以異呉旦生曰魯水名泮僖公作離宫於其上故此水之宫曰泮宫此水之林曰泮林皆因水得名也左傳晉侯濟自泮正在此水可為魯水名泮之證按傳僖公五年日南至公既視朔遂登臺以望而書故有書雲臺亦曰泮宫臺水經注云靈光殿東南即泮宫也有臺高八十尺詩所謂思樂泮水是也東逰記云臺有水自西南而來深丈餘而無源又可為魯水証矣初無與於學校漢儒附會謂東西南皆有水形如半璧今作半月形因以辟廱之辟亦轉為璧解以圓水何所本而云然哉按周官國子敎於大司樂魯孝公之為公子嘗入京師為國子人稱其孝宣王命之導訓諸侯然其時不聞有太學之名建於何所也漢景帝時文翁為蜀守首建學宫於成都市中設博士弟子員至孝武詔郡縣皆立學此特因蜀中而推廣之於他郡縣其實自文翁剙始也烏在其魯僖時巳有學校哉筠軒釋畧云胡氏謂魯人將有事於上帝必先有事於頖宫而鄭氏謂泮宫郊之學也有事於此告后稷也考諸禮記頖宫是廟之類也若非廟之類欲祀上帝而以始祖祭於學宫何義也哉以此可見頖宫之非學矣三夀三夀作朋呉旦生曰鄭氏以為三卿或謂公夀與岡陵等而為三以其下有如岡如陵句也皆屬強解按上夀百中夀八十下夀六十所謂三夀葢指此也晉姜鼎銘云保其孫子三夀是利王禹玉詩云簪纓三夀客筆削兩朝書張衡東京賦送迎拜乎三夀注三夀三老也蔡邕獨斷云天子父事三老兄事五更班固辟雍詩皤皤國老乃父乃兄三老者謂久也舊也夀也孫子荆詩三命皆有極劉履補注云三命謂上夀中夀下夀也鄭𤣥禮記注云司命主督察三命據此則三夀三老三命其義一也亂曰閔馬父曰正考甫校商之名頌十二篇於周大師以那為首其輯之亂曰自古在昔先民有作溫恭朝夕執事有恪呉旦生曰亂者樂之卒章自此而離騷而賦而樂府其後有亂曰云云葢昉此也洪興祖云離騷有亂有重亂者總理一賦之終重者情志未申更作賦也九圍帝命式于九圍呉旦生曰王制注殷湯更制中國方三千里之界分為九州而建千七百七十三國孔氏云九分天下各為九處規圍然故謂之九圍易氏云殷人九州之制不見於經傳是以後世莫詳焉爾雅云兩河間曰冀州河南曰豫州河西曰雝州漢南曰荆州江南曰揚州濟河間曰兖州濟東曰徐州燕曰幽州齊曰營州其九州之名與夫疆域所至與舜典異又與禹貢異孫炎故疑為殷制耳亦無明文言殷改夏也由今考之有舜之幽營徐而無舜之青梁幷是青入於徐梁入於雍幷入於冀也既分禹貢冀州之境而復舜之幽州又併青於徐而復舜之營州殷之九州粲然可考而其山川道里亦以類舉至周人則又分冀為并而併營於幽復禹之青州而省徐以入於青畷郵為下國綴旒呉旦生曰禮記注為下國畷郵正義云引齊魯韓詩也王伯厚詩攷郵謂民之郵舍言成湯施布仁政為下國諸侯在畷民之處所使不離散為下國駿厖荀子作駿䝉大戴禮作恂䝉歴代詩話巻六
