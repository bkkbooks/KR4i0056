body:
  text: 厯代詩話卷七十六歸安吳景旭撰癸集中之中忌辰存餘堂詩話曰西涯五月七日泰陵忌辰詩云祕殿深嚴聖語溫十年前是一乾坤孤臣林壑餘生在帝里金湯舊業存舜殿南風難解愠漢陵西望欲銷魂年年此日無窮恨風雨瀟瀟獨閉門讀之不能不使人掩卷流涕吳旦生曰西涯四嵗能大書景帝召見命書龍鳳龜麟十餘字書奏大喜抱置膝上賜珍果寶鏹六嵗八嵗兩召試尚書益稷篇命肄京庠天順中登進士時年十七陸鼎儀作瓊林醉歸圖詩行過玉河三百騎少年爭説李東陽後孝宗賜第在灰厰小巷因稱李閣老胡同析為民居嘉靖中贖還為公祠所傳雙朱履二寸許絆繫之一粗紵小衫公舉奇童時著以見景帝者公之受知最深宜其言咏之下如攀鼎髯而號痛也四友齋叢説云西涯當國時門生或朝罷或散衙後即集其家有一門生歸省兼告養病西涯集諸門人餞之即席賦贈汪石潭詩先成中一聨云千年芝草供靈藥五色流泉洗道機西涯將後一句抹去令石潭重改衆請曰此詩絶好師何故以為未善西涯曰歸省與養病是二事今兩句單説養病不及歸省便是偏枯且近於合盤即援筆改曰五色宫袍當舞衣衆始服詩弔墅談曰楊文貞公士奇於攻已者目為輕薄生事必欲黜之禁錮終身李文達公賢譏之以為有愧於文潞公之於唐介及其處羅狀元倫則與文貞不殊成化中大學士某卒有以詩弔之曰何事先生早蓋棺薤歌聲裏路人歡填門客散恩何在負郭田多死亦安鹽海已無前日利氷山誰障舊時寒九原若遇南陽李為道羅倫已復官嗚呼李文達豈料後人復以其譏楊文貞者而反譏之哉吳旦生曰李南陽遭喪朝廷留之羅彞正詣其第告以不可踰數日厯陳奪情起復非是援富弼及劉珙故事奏之學士陳文為李畫䇿彞正遂落職時論大不平明年陳薨於位薛御史之綱作此詩弔之時南陽已謝世而彞正召還復修撰矣楊南峰稱為詩史云把滑存餘堂詩話曰吳原博詩格尚渾厚琢句沉著用事果切無漫然嘲風弄月之語其雪後入朝詩云天門晴雪映朝冠步澀頻扶白玉闌為語後人須把滑正憂髙處不勝寒飢烏隔竹餐應盡馴象當庭踏又殘莫向都人誇瑞兆近郊或恐有袁安其愛君憂國感時念物之情藹然可掬至如古人隨車縞素灞橋驢背自是間話頭吳旦生曰岑參詩色借玉珂迷曉騎光添銀燭晃朝衣只説得早朝雪後之景耳今原博如許心腸冠之揆右自足衣被天下卒以老居臺閣不得大用自號匏庵亦自傷矣餘冬序録云今世俚語前人失腳後人把滑即漢諺前車覆後車戒之義因觀金人劉無黨敗車行云前車行後車逐車聲夜隨山詰曲前車失手落髙崖車輪直下聲如雷同行急救救不得人牛翻壓鳴聲哀我時濳聞後車説前車使牛何太拙只知拍手笑前人不道後來當改轍前途猶有坡陀在後車當以前車戒則先原博而暢言之矣禽言桑民懌既調栁林君待用以書來云栁州山水子厚為之出色今付公矣作詩答之曰鷓鴣知我行不得杜宇勸人歸去休吳旦生曰武廟之初李西涯柄政或題詩譏之曰回首湘江春草緑鷓鴣啼罷子規啼此直是民懌注腳吳郡二科志云桑悅字民懌嘗詮次古人以孟軻自况班馬屈宋而下不論也有問韓文曰此小兒號嗄之聲問翰林文學曰舉天下惟悅最髙耳其次祝允明其次羅玘由是喜俠者多慕焉部使者駐節海虞悅謁之書刺曰江南才子桑悅拜使者大駭問左右曰書生也乃延之校書而預刊落以試悅校至不屬即索筆請書足使者敬俯後以貢士試禮部文大奇典試曰豈江南桑生耶狂士狂士遂下第大學士丘濬慕其名召令觀所為文紿曰某人撰悅心知之曰何得若文而令悅觀濬曰生試為之歸撰以奏濬稱善初悅名在乙榜至是調某州博士山東提學掾將行詣濬别濬曰博士桑悅宜加優禮掾至州悅不為迎掾使吏促之來悅怒曰第還三日後來復則不來矣後三日悅詣長揖掾作厲曰博士不當跪耶悅前曰汲長孺不拜大將軍今明公以面皮相恐豈寥廓之士可籠之威重耶因解綬請去掾不得已容之按御史聞悅名召令坐講悅固跣足捫蝨御史不能禁令出後薦之遷長沙别駕尋轉栁州荒落殊甚悅不堪思歸因作詩有鷓鴣道我行不得杜宇勸人歸去休之句飛詩會堯山堂外紀曰祝允明嘗偕陸濟民張夢晉韓夀椿登虎丘浮屠至絶頂但見八荒洞然萬籟齊發飲酒樂甚夀椿出紙筆賦詩以紀其逰允明詩先成云草木衣裳下雲霞掌握中偶然飛咳唾珠玉滿天風濟民云極目飛鴻小致身雲路中詩人少知已發付與東風夢晉云慮遣塵寰外天歸眼界中新詩三百首句句答松風夀椿云詩寄千峯窟春橫一鏡中擕壺兼荷鍤不減晉人風詩成閣筆天風颯然飄其詩草盤旋直上太虛如神物掀舞將擲地又為蒼鷹所舉竟不知其所止也遂名為飛詩會吳旦生曰希哲年五嵗作徑尺字國寶新編云書學精工自急就以逮虞趙上下數千年變體罔不得其結搆若羲獻真行懷素狂草尤臻筆妙余觀其書優於詩詩優於文至於聲色自娛登場傅粉謔浪玩弄何有一世蔣子雲發龍門之嘆桑民懌僅三人之目誠有以窺其藴也閻起山謂惜乎不自厚分才雜劇此亦俳優工戲何異然此又烏足與語希哲乎希哲右手枝指因號枝指生按春秋正義手五指之名曰巨指儀禮大射孟子云巨擘食指左傳將指儀禮大射注無名指孟子小指儀禮云季指此困學紀聞所載也余又見吳越春秋云闔閭傷將指蓋將指足大指言其將領衆指也久雨程克勤與沈石田書曰舟次吳門匆匆竟不得一面君謙儀曹誦見贈佳作有人從今日去雨是幾時晴之句欲請書為行李之重不可得也吳旦生曰克勤舉成化丙戌進士厯官至宫詹先是臺臣論奏請退姦進賢克勤在所進中用是見忌會雨災言官請罷免以塞天變詔致仕沈石田送以詩云車馬出春明雨中人獨行人從今日去雨是幾時晴靜閣一杯酒亂聞千樹鶯故山堪注易天意就先生石田又於題下自注云因久雨為言者濫及去位據石田注與克勤書則知克勤以久雨去也實録云𢎞治元年十月以久隂不雨監察御史王嵩等疏陳修省劾禮書周洪謨及程敏政等上以敏政舊侍從官令致仕蓋作久隂不雨非是題畫四友齋叢書曰沈石田詩有絶佳者但為畫所掩世不稱其詩有題畫七言云幽居臨水稱冥栖蓼渚沙坪咫尺迷山雨忽來茒溜細溪雲欲墮竹梢低簷前故壘雌雄燕籬腳秋蟲子母雞此處風光小韋杜可能無我一青藜此詩情景皆到而律調亦清新今之作者豈容易可及吳旦生曰石田年十五遊金陵作百韻上地官崔侍郎面試鳳凰臺賦立就景泰間郡守以賢良應詔筮之得遁之九五乃決計隱遁以畫擅名其人碧眼飄髯儼若神仙一日登黃鶴樓數客飲其上石田題云昔聞崔皓題詩處今日始登黃鶴樓黃鶴已隨人去逺楚江依舊水東流照人惟有古今月極目深悲天地秋借問回仙舊時笛不知吹破幾番愁詩成大書於壁而去客驚謂曰此必仙也尋物色之乃知為石田石田所著客座新聞云各邉軍士從戰身荷鐵甲戰裙遮臂等具共重四十五斤鐵盔鐵腦蓋重七斤頓頂護心鐵脅重五斤弓撒箭袋重十斤腰刀三斤半蒺藜骨朵重三斤箭筒一斤通計八十八斤半豫聞之征人因偶成一篇用志邉軍勞苦云從軍莫從口外軍身挾戰具八十斤頭盔腦包重得七頓頂掩遮以五論惟甲所被四十五腰刀骨朵二四均精工精鐵始合度日夜磨淬光勝銀二五弓箭及其服隨身衣裳八乃足佩多身重難負荷還須上馬看輕速銀包酒袋煙烘麵得飲馬溺喉且沃將軍令嚴隨鼓進誓與敵軍爭一鏃此時顧功不顧身刀痕箭瘢無好肉歸來性命萬死餘便使封侯未堪贖江南一體行伍人美衣好食何苦辛將錢買貨事逰蕩有眼不曾經戰塵聼談邉軍却不信亦莫感愧朝廷恩余喜其辭致蒼直兵制見焉選家不之及蓋世之不稱石田詩久矣夜哭彞白齋詩話曰都穆少嘗學詩沈石田之門石田問近有何得意作都以節婦詩首聮為對其詩云白髮貞心在青燈淚眼枯石田曰詩則佳矣有一字未穩都茫然避席請教石田曰爾不讀禮經經云寡婦夜不哭何不以燈字為春字玄敬悅服吳旦生曰新知録云昔人謂詩有别才非關學也誠然矣其謂詩有别趣非關理也則殊未是唐寅送人下第詩曰王家空設網儒子尚懷珍唐荆川以為是有怨意因舉唐人詩曰明主既不遇青山胡不歸如此胸次方無係纍也沈石田以禮經寡婦不夜哭燈字改作春若謂詩非關理豈不謬哉按玄敬七嵗能詩好逰山水至屢空輒笑曰天地之間當不令都生餒死一嵗除夕絶糧作詩寄朱堯民曰嵗云暮矣室蕭然牢落生涯只舊氊君肯太倉分一粒免教人笑突無煙堯民儲千錢為嵗用分半贈之玄敬日事讎校吳門有娶婦者夜大風雨滅燭遍乞火無應者雜然曰南濠都少卿家有讀書燈在扣其門果得火邢麗文寄玄敬詩滿座賔朋應貰酒一樓燈火想讎書悼張都玄敬悼張夢晉詩髙樓明月依然在遼鶴歸來定幾年吳旦生曰張十四五作詩有髙樓明月清歌夜知是人生第幾回之句玄敬素愛其語至是舉以悼之按吳郡二科志云張靈字夢晉吳縣人與吳趨唐寅最善寅嘗邀逰武丘會數賈飲於可中亭靈更衣為丐者上謂亦能詩時賈所為詩有蒼官青士撲握伊尼諸詞因以問靈靈曰蒼官柏也青士竹也撲握兔也伊尼鹿也賈始駭令賡靈即揮毫不已凡百絶抵舟易維蘿隂下賈使人察之不見也皆以為神仙賈去復上亭朱衣金目作胡舞形狀殊絶初靈與寅俱為郡學生鄞人方志來督學惡古文辭察知寅欲中傷之靈悒欎不自遣寅曰子未為所知何愁之甚靈曰獨不聞龍王欲斬有尾族蝦蟆亦哭乎果為所斥罷存餘堂詩話云夢晉早嵗功名未偶落魄不羈寄情詩酒間臨終之前三日作詩云一枚蟬蛻榻當中命也難辭付大空垂死尚思元墓麓滿山寒雪一林松後一日又作詩云倣佛飛魂亂哭聲多情於此轉多情欲將衆淚澆心火何日張家再托生二詩可以想見其風致亦足悲夫畫菊駒隂冗記曰唐子畏旅宿寧德館人懸畫菊題絶句云黃花無主為誰容冷落踈籬曲徑中儘把金錢買脂粉一生顔色付西風蓋自况云吳旦生曰吳郡二科志唐寅字伯虎一字子畏中式第一先是洗馬梁儲校寅卷嘆曰解元在是矣儲事畢歸嘗從程詹事敏政飲敏政方奉詔典會試儲執巵進曰寅髙才惟君卿奬異之敏政曰吾固聞之寅江南奇士也會儲奉使南行寅感激持帛一端詣敏政乞文餞後被逮因此論之四友齋叢説云江隂富室徐經與子畏同鄉舉遂同至京徐有戲子日從子畏馳市中時屬目已衆徐營他徑以進子畏踈狂時漏言語因罣誤竟除籍初為諸生嘗作悵悵詩悵悵莫怪少時年百丈遊絲易惹牽何嵗逢春不惆悵何處逢情不可憐杜曲梨花杯上雪灞陵芳草夢中煙前程兩袖黃金淚公案三生白骨禪老後思量應不悔衲衣持鉢院門前觀其詞與其事合蓋語讖也何元朗稱此詩才情富麗何必減六朝人余按子畏集中除去何嵗逢春二語作一律與擁鼻行吟一律俱作漫興十首余購一畫乃子畏五旬之辰自寫一幀題云醉舞狂歌五十年花中行樂月中眠漫勞海內傳名字誰信腰間沒酒錢書本自慙稱學者衆人疑道是神仙些須做得工夫處不損胸前一片天是王文恪公所藏集中一詩云若還一日天塌了大家齊呌阿癐癐語雖俚亦有所本輟耕録云淮人寇江南日於臨陳之際齊聲大呌阿癐癐以助軍威雪濤詩評子畏題所畫小景云不煉金丹不坐禪不為商賈不耕田興來只寫江山賣免受人間作業錢又題一釣翁畫云直插漁竿斜繫艇夜深月上當竿頂老漁爛醉喚不醒滿船霜印蓑衣影皆有天趣月上四友齋叢説曰吳中舊事其風流有致足樂詠者朱野航乃葑門一老儒也頗攻詩在篠匾王氏教書王亦吳中舊族野航與主人晚酌罷主人入內適月上野航得句云萬事不如杯在手一年幾見月當頭喜極發狂大呌扣扉呼主人起咏此二句主人亦大加擊節取酒更酌至興盡而罷明日遍請吳中善詩者賞之大為張具徴戲樂留連數日而罷此亦一時盛事也吳旦生曰朱性甫精楷法手録前輩詩文積百餘家聞人有奇書輒借閲手自繕寫所纂集總數百卷其所著野航詩集今不傳與朱堯民齊名文徴仲志性甫之墓云兩人皆不仕成化𢎞治間其名奕奕於郡城之東人稱之曰兩朱先生正德壬申堯民死明年性甫又死自兩人死吳中故實往往無所於考而求其遺書亦無所得惜哉楊升菴云自元季逮國初博雅好古之儒總萃於中吳南園俞氏笠澤虞氏盧山陳氏書籍金石之富甲於海內景天以後俊民秀才汲古多藏繼杜東原邢蠢齋之後者則性甫堯民兩朱先生其尤也其他則又有邢量用文錢同愛孔周閻起山秀卿戴冠章甫趙同魯與哲之流皆専勤績學與沈啓南文徵仲相頡頏吳中文獻於斯為盛百年以來古學衰落而老生宿儒笥經蠧書者往往有之吳岫方山非通人也聚書逾萬卷錢叔寶畫史也與其子允治手鈔書至數千卷居今之世後生末學不復以讀書好古為事喪亂以後流風遺書益蕩然矣豫嘗欲取吳士自俞石澗王光庵以後網羅遺佚都為一編而吳岫諸人亦附著焉庶幾前輩風流不泯沒於後世且使吳人尚知有讀書種子在也厯代詩話卷七十六
