body:
  text: 厯代詩話巻七十四歸安吴景旭撰癸集上之下玉簫寧藩臞仙作宫詞云忽聞天外玉簫聲花下聼來獨自行三十六宫秋一色不知何處月偏明呉旦生曰永樂中賢妃權氏乃髙麗國王李芳逺所進維時髙麗例貢羙女故順妃任氏昭儀李氏婕妤吕氏羙人崔氏皆髙麗人至庚寅詔止之不復貢權氏尤穠粹善吹玉簫侍上至臨城薨諡恭獻以其最寵倖為臞仙所咏宫閨詩史以此詩為權妃作非也臞仙是髙皇十六子封大寜以靖難功文皇改封南昌所著宫詞一百七首又云宫漏已沉參倒影羙人猶自學吹簫又云三十六宫秋月白羙人花下教吹簫皆紀其事也宣徳中女官王司綵宫詞云贏得君王留步輦玉簫嘹喨月明中亦指此嚢雲臞仙嚢雲詩云蒸入琴書潤拈來几榻寒小齋非嶺上𢎞景坐相看呉旦生曰自陶𢎞景山中聚雲遇客輒放之為贈蘇子瞻山中見雲氣奔突遂以手開籠收之及歸放出作攓雲篇云道逢南山雲歘吸如電馬竟誰使令之衮衮従空下又云摶取置笥中提擕反茅舍開緘轉放之掣去仍變化宣和中艮嶽初成多造油絹嚢入水濕之曉張於絶巘危巒之上既而雲盡入遂括嚢題曰貢雲每車駕所臨則盡縦之滃然充塞如在千巖萬壑間今永樂中臞仙每月令人徃廬山之巔嚢雲以歸結小屋曰雲齋每月放雲一囊四壁氤氲裊動緑腰周藩誠齋作綠腰琵琶詩云綠腰舞困琵琶歇花落東風懶下樓呉旦生曰青箱雜記曲有錄要者錄霓裳羽衣曲之要拍海錄碎事載琵琶錄云康崑崙彈新翻羽調綠腰演繁露云今世亦有六么而其曲有髙平吕調不與羽調相協癸辛雜識云唐休樂志俗樂二十八調中吕髙平仙吕在七羽之數盖中吕夾鍾羽也髙平林鍾羽也仙吕夷則羽也安得謂不與羽調相協注即錄要也本自樂工進曲上令錄出要者乃以為名言綠腰悮也蔡寛夫詩話云綠腰本名錄要今又謂之六么螢雪樷説引律詩云白髪不愁身外事六么且聼醉中詞謂此詩之所以對者無非借數而己余觀其不用綠腰與白髪作正對而以六么借對者正以綠腰字為譌而不欲用之也楊升菴謂六博即今骰子而梟即骰子之么曲中有六么序義取六博之采反以錄要為妄説恐未必然也碧雞漫志云六么一名綠腰元㣲之琵琶歌綠腰散序多攏撚又云逡巡彈得六么徹霜刀破竹無殘節沈亞之歌者乗記云合韻奏綠腰又誌盧金蘭墓云為綠腰玉樹之舞白樂天楊栁枝詞六么水調家家唱白雪梅花處處吹又聼歌六絶句内樂世一篇云管急絃繁拍漸稠綠腰宛轉曲終頭誠知樂世聲聲樂老病殘軀未免愁注云樂世一名六么王建宫詞琵琶先抹六么頭故知唐人以腰作么惟樂天與王建耳或云此曲拍無過六字者故曰六么至樂天獨謂之樂世他書不見也歐陽永叔云貪看六么花十八此曲内一疊名花十八前後十八拍又四花拍共二十二拍樂家者流所謂花拍盖非正也濟遜誠齋元宫詞有云御前咸着只孫衣句内濟遜二字因係詞句姑存原文呉旦生曰周伯琦詐馬行序云濟遜宴者濟遜猶言一色衣也俗呼曰詐馬筵張昱輦下曲云祖宗詐馬宴灤都柯九思宫詞云千官一色真珠襖皆指此也輟耕錄云濟遜宴服者貴臣見饗於天子則服之今所賜絳衣是也貫大珠以飾其肩背間膺首服亦如之近峰聞畧云元親王及功臣侍宴者别賜冠衣謂之濟遜今儀従所服團花濟遜當是也長安客話云景泰中見下工部㫖造濟遜八百副皆不知濟遜何物乃知為上直校鵞㡌錦衣也海青誠齋作元宫詞云年年正旦将朝㑹殿内先觀玉海青吴旦生曰誠齋髙皇之孫洪熈初襲封所作元宫詞百首自序云永樂初賜一老嫗年七十乃元后之乳姆女常居宫中知元宫事一一備陳故詩皆實事有外人不得而知者誠齋别有宫詞云鷹坊下直人爭問誰貢河東白海青柯敬仲宫詞云元戎承命獵郊坰勅賜新羅白海青注海青海俊鶻也白者尤貴統志云五國城出海東青小而健能擒天鵞有重三十餘斤者以首得者為貴進御膳故名頭鵞賞黄金一錠今鼓吹中鎻刺曲有名海東青盖象其聲也六硯齋筆記云海東青大如鳩别一鳥名小青兒大如雀與海青同上俟其飛過天鵞小青銜去其帽海青俯視天鵞直下爪其眼灑血而墜白湛淵續演雅詩海青羽中虎燕燕能制之歐陽𤣥詞鷹房持獵回車駕却道海青逢燕怕楊升菴云海東青鷹之猛鷙者也燕子之弱能剪之秕言云吴中方言稱衣之廣袖者謂之海青按太白詩翩翩舞廣袖似鳥海東來盖言翩翩廣袖之舞如海東青也中秋七修類藳曰永樂中中秋開宴不見月聖情不懌學士解縉口占風落梅一闋云姮娥面今夜圓下雲簾不著臣見拚今宵倚闌不去眠看誰過廣寒宫殿又賦詩云吾聞廣寒八萬三千修月斧暗處生明缺處補不知七寳何以修合成孤光洞徹乾坤萬萬古三秋正中夜當午佳期不擬姮娥悮酒杯狼籍燭無輝天上人間隔風雨玉女莫乗鸞仙人休伐樹天柱不可登虹橋在何處帝閽悠悠呌無路吾欲斬蜍蛙磔冥兎坐令天宇絶纎塵世上青霄粲如故黄金為節玉為輅縹緲鸞車爛無數水晶簾外河漢横氷壺影裏笙歌度雲旗盡下飛𤣥武青鳥銜書報王母但期嵗嵗奉宸逰来看霓裳羽衣舞上覽之歡甚為停杯以待夜午月復明上大笑曰解縉真才子奪天手也命宫人滿酌宣勸盡歡而罷吴旦生曰石林詩話載晏元獻留守南郡王君玉以館職従公為簽判賔主相得日以賦詩飲酒為樂遇中秋隂晦君玉宻使人伺公曰已寝矣亟為詩以入云只在浮雲最深處試慿絃管一吹開公枕上得詩即索衣起召客治具大合樂至夜分果月出遂樂飲達旦觀此與大紳事同麓堂詩話云大紳才名絶世詩無全稿如采石弔李白中秋不見月不過數篇其餘真偽相半頓令觀者有楓落吴江冷之嘆桔橰烽觧大紳市橋㑹郭千戸作詩云沙磧茫茫塞草肥桔橰烽上暮煙飛呉旦生曰墨子作頡臯後漢書注邉方備警作土臺䑓上作桔橰頭上有兜零以薪草置其中常低之有冦即燃火舉之以相告曰烽火經史直音云晝曰烽夜曰燧戎昱詩山頭烽子聲聲叫烽子守烽卒也曹石倉十二代詩選悮烽作峰㡬不辨為何物按此乃唐人張仲素塞下曲有此二語不知大紳何以有之瑩中異林曰秀州沈氏入宫為給事中孝宗試守宫論沈文發端云甚矣秦之無道也宫豈必守哉上悦擢第一弟溥貢士就試春官沈贈以詩云自少辭家侍禁闈人間天上兩依稀朝隨鳳輦辭青瑣夕捧鸞書入紫薇銀燭燒殘空有淚玉釵敲斷竟無歸年来望爾登金籍同補山龍上衮衣吴旦生曰沈氏瓊蓮字瑩中世傳沈萬三之後有廷禮父子皆仕於朝因得通籍掖庭為女學士其作宫詞云中使傳宣光祿宴内家學士作新除又云明忩棐几净爐薫閒閲仙書小篆文又云水風凉好朝西坐専把書經教小王盖實譜也荆山居士異林曰姑蘇孟淑卿訓導澄之女自以配不得志號曰荆山居士嘗論宋朱淑真詩曰作詩須脱胎化質僧詩無香火氣乃佳女子鉛粉亦然朱生故有俗病李易安可與語耳其悼亡詩云斑斑羅袖濕啼痕深恨無香使返魂荳蔲花開人不見一簾明月伴黄昬又春歸云落盡棠梨水拍堤萋萋芳草望中迷無情最是枝頭鳥不管人愁只管啼又長信秋詞末韻云君意一如秋節序不教芳色得長春冬詞末韻云雙蛾争似庭前栁臘盡春来又放舒吴旦生曰蓬軒吴記云孟小姐嘗過恵日菴訪尼僧書其亭曰矮矮圍墻小小亭竹林深處晝㝠冥紅塵不到無餘事一炷煙消兩巻經此詩殊雅其集多桑間之咏不足傳也間中今古錄云瞿宗吉所著香臺集有易安樂府之目引漁隠樷話云趙明誠乃清獻公之子妻李氏能文詞號易安居士有樂府詞三巻名潄玉集明誠卒易安再適非類既而反目有啟與綦處厚學士猥以桑榆之晚景配兹駔儈之下才見者笑之此宗吉所以有清獻名家阨運乖羞将晩景對非才之句因嘆易安翁則清獻為時名臣夫則明誠官至郡守亦景薄桑榆何為而再適耶按易安名清照濟南李格非之女適明誠乃趙抃之子抃之諡清獻再適張汝舟厯代詩話巻七十四
