body:
  text: 厯代詩話卷七十三歸安吳景旭撰癸集上之中紅橋林子羽投紅橋詩桂殿焚香酒半醒露華如水點銀屏含情欲訴心中事羞見牽牛織女星吳旦生曰閩縣張氏女居紅橋之西因自號紅橋善屬文操觚之士咸托五字為媒王恭寄以詩不答王稱稅其鄰舍以居竊見張睡起寄以詩怒其輕薄遂不出林子羽鴻過其居見張焚香托鄰媪投此詩張援筆答曰梨花寂寂鬭嬋娟銀漢斜臨繡戶前自愛焚香消永夜從來無事訴青天嫗持詩賀鴻大喜過望使嫗通殷勤鴻逰三山歸夜至所居張方倚橋而望鴻作三絶句張倚和焉明年鴻有金陵之遊寄絶句七首張見詩感念成疾不數月而卒鴻歸道中作詩及至紅橋聞張已卒見床頭玉佩玦懸一緘拆之有七絶句鴻賦挽詞酹之子羽定情詩雲娥酷似董嬌嬈每到春來恨未銷誰道蓬山天樣逺畫欄咫尺是紅橋紅橋詩芙蓉作帳錦重重比翼和鳴玉漏中共道瑶池春似海月明飛下一雙鴻子羽夜至紅橋所居三首溶溶春水漾瓊瑶兩岸菰蒲長緑苗幾度踏青歸去晚却從燈火認紅橋素馨花發暗香飄一朵斜簪近翠翹寶馬歸來新月上緑楊影裏倚紅橋玉階涼露滴芭蕉獨倚屏山望斗杓為惜碧波明月色鳳頭鞋子步紅橋紅橋和詩桂輪斜落粉樓空漏水丁丁燭影紅露濕暗香珠翠冷赤欄橋上待歸鴻橋外千花照碧空美人遙隔水雲東一聲寶馬嘶明月驚起沙汀幾點鴻草香花暖醉春風郎去西湖妾向東斜倚石闌頻悵望月明孤影笑飛鴻子羽金陵寄詩七首女嫘江上送蘭橈長憶春纎折栁條歸夢不知江路逺夜深和月到紅橋驪歌聲斷玉人遙孤館寒燈伴寂寥我有相思千點淚夜深和雨滴紅橋殘燈暗影别魂消淚濕鮫人玉線綃記得雲娥相送處淡煙斜月過紅橋春衫初試淡紅綃寶鳳搔頭玉步搖長記看燈三五夜七香車子度紅橋一襟離恨怨魂消間却鳴鸞白玉簫燕子不來春事晚數株楊桞暗紅橋傷春兩淚濕鮫綃别鴈離鴻去影遙流水落花多少恨日斜無語立紅橋綺忩别後玉人遙濃睡才醒酒未消日午捲簾風力軟落花飛絮滿紅橋子羽道中詩三千客路動行鑣逺别歸來興欲飄祗恐鳳樓人待久玉鞭催馬上紅橋留别子羽七絶句牀頭絡緯泣秋風一點殘燈照藥叢夢吉夢凶都不是朝朝望斷北來鴻井落金瓶信不通雲山渺渺暗丹楓輕羅露濕鴛鴦冷間聼長宵嘹唳鴻寂寂香閨枕簟空滿階秋雨落梧桐內家不遣園陵去音信何緣寄塞鴻玉筯雙垂滿頰紅關山何處寄書筒緑忩寂寞無人到海濶天髙怨落鴻衾寒翡翠怯秋風郎在天南妾在東相見千回都是夢樓頭長日妬雙鴻半簾明月影朣朧照見鴛鴦錦帳中夢裏玉人方下馬恨它天外一聲鴻一南一北似飄蓬妾意君心恨不同他日歸來也無益夜臺應少繫書鴻子羽挽詞柔腸百結淚懸河瘞玉埋香可奈何明月也知留珮玦曉來長想畫青蛾仙魂己逐梨雲夢人世空傳薤露歌自是忘情惟上智此生長抱怨情多燕銜少室山房詩評曰林子羽七言律如珠林積雪明山殿玉澗飛流帶苑墻諸天日月環龍衮九域山河拱象筵衲經鴈宕千峯雪定入峨眉半夜鐘林邉夜火懸沙驛海上寒山出郡樓皆氣色髙華風骨遒爽而諸選家例取其堤栁欲眠鶯喚起宫花乍落鳥銜來等句乃其下者耳吳旦生曰堤栁一聨子羽東苑應制之作是其勝場但據歷來諸本俱作鳥銜來嘗疑以鳥對鶯虛實不倫如楊文敏詩東風葉暗留鶯語落日林深看鳥回余方病之子羽七律當家何亦作此失體語後見十二代詩選作燕銜來為之擊節送荆門徐氏筆精曰浦長源送人之荆門詩長江風揚布帆輕西入荆門感客情三國已亡遺舊壘幾家猶在住荒城雲邉路繞巴山色樹裏河流漢水聲若過旗亭多買醉不須弔古漫題名近見一詩話載此詩稍異今録于後匹馬南歸望古城半林殘雨夕陽明雲邉路繞巴山色樹裏河流漢水聲墮淚有碑苔色古甘棠無樹酒旗橫那堪回首成陳迹笳鼓西風慘客情詩話無名氏得之杭州僧房吳旦生曰長源聞林子羽名欲往訪之而無由以收買書籍至閩以詩謁子羽子羽不見使門人周元黃元問所從來長源出所懷詩投之曰以此相評耳二元讀之至雲邉路繞一聮驚嘆曰吾家詩也白子羽出見之相得益歡由是浦舍人詩名籍甚長源無錫人為晉王府引禮舍人故子羽送長源歸詩白髮相看閩海别青山遙送晉陵歸炮車颶母詹同文送徐復初海道知事詩云炮車雲起天垂野颶母風來雪湧波吳旦生曰臘一作炮國史補云暴風之候有炮車雲海録碎事載此作拋雲車恐悮王直方詩話云舟人占雲若炮車起輒急避之乃大風候也蘇東坡詩炮車雲起風欲作張文潛詩喜逢山色開眉黛愁對江雲起炮車颶説文從具俗本多作颶風非南越志云熙安間多颶風颶者具四面之風也一曰懼風常以六七月間發未至時三日雞犬為之不寧嶺表録異云秋夏間或雲物慘然有暈如虹長六七尺此候則颶風必發故呼為颶母見忽有震雷則颶風不作矣練伯上詩日落雷塘龍霧合虹消桂嶺颶風回南越志云颶母即孟婆按江南七月間有大風相傳以為孟婆發怒北齊李騊駼問陸士秀江南有孟婆是何神也士秀曰山海經帝女遊于江中出入必以風雨自隨以帝女故曰孟婆留青日札云易巽為風三隂卦以孟仲季言之故曰孟婆蔣捷詞春雨如絲繡出花枝紅裊怎禁他孟婆合皂巽亦東南之卦於時正春也一云風稱孟婆宋汴京勾欄語也宋徽宗詞孟婆孟婆你做些方便吹箇船兒倒轉番禺記云石尤風亦颶風之類按洪容齋謂打頭逆風也唐人多用之陳子昂入峽苦風詩寧知巴峽路辛苦石尤風戴叔倫送裴明州詩知君未得去慚愧石尤風司空文明留盧秦卿詩無將故人酒不及石尤風江湖紀聞有石氏女嫁為尤郎婦之説楊升菴謂石尤江中水蟲名此蟲出必有惡風舟人目打頭風曰石尤風猶嶺南人曰颶母黃河人曰孟婆也陳晦伯正楊云古樂府宋武帝歌願作石尤風四面斷行旅似非打頭風胡元瑞云當是巨颶狂飈之類今江湖間飄風驟起則舟俱不行舟人所謂大風三小風七其云四面斷行旅正指此若以為打頭風則固有可行者尚何四面斷行旅之有哉石尤一作石郵李義山詩來風怪石郵楊文公詩石郵風惡客心愁元宵張行中元宵詩云大地金蓮分夜色上方玉燭慰民心吳旦生曰帝京景物略云張燈之始也漢祀太乙自昏至明僧史謂西域臘月晦日名大神變燒燈表佛漢明因之然臘月也梁簡文有列燈賦陳後主有山燈詩亦復未知嵗燈何時月燈何夕也張燈之始上元初唐也睿宗景雲二年正月望日異人婆陀請燃千燈帝御安福門縱觀上元三夜燈之始盛唐也玄宗正月十五前後二夜金吾弛禁開市燃燈永為式上元五夜燈之始北宋也乾德五年太祖詔曰朝廷無事年榖屢登上元可增十七十八兩夜上元六夜燈之始南宋也理宗淳佑三年請預放元宵自十三日起巷陌橋道皆編竹張燈而上元十夜燈則始太祖建南都盛為綵樓招徠天下富商放燈十日今北都燈市起初八至十三而盛迄十七乃罷也永樂七年令元宵節賜百官假十日今市十日賜百官假五日內臣自秉筆篆近侍朝臣自閣部正外臣自計吏不得過市猶古罰㡩幕蓋帷意其他例得與吏士軍民等過市長洲楊補燈市竹枝詞云風定晴酣午氣煎今朝真箇踏燈天平添什物三分價撒盡官兒新俸錢皮絃聲裏識椒房內語咿啞喝道忙樓上眼光樓下落下頭人説上頭強須知各省計偕來外職京官雜秀才五日假恩中旨出閣門只有相公開犢禈磨著侍中璫簇簇燈光背月光多少侯家花半臂撾筝打碟舞郎當麻城劉侗竹枝詞云貂裝鞍馬象裝車不是勳家是戚家笑上街樓簾盡捲逰人團定候琵琶田家歌舞魏家漿海淀園林恭順香桃李莫分先後種恩波一片是春光燈樓絃管欲溫人樓下金珠飽殺春老米青煤明日客片時和哄可憐身鰲山一搭嵗千金蠲免爭傳此玉音平買市燈歸內裏明明照見市民心華亭汪厯賢竹枝詞云豐頥廣顙出侯門熊白方甘狐白溫聞賜燈棚添綵索千燈熖熖曉猶存長安燈市晝連宵遊女爭呈馬上腰踏踏鐙光莫歸去前門釘子玉河橋六更唐處敬詩宫中六更初罷鼓藍田璽玉沈崖浦吳旦生曰處敬咏謝臯羽事故引用宋初語汪水雲詩亂點籌殺六更亦指此也豹隱紀談引楊誠齋詩天上歸來有六更蓋內樓五更絶搒鼓交作謂之蝦蟇更禁門方開百官隨入所謂六更也外方則謂之攢點要之宋初六更自有微意間中今古録云宋太祖建隆庚申受禪後聞陳希夷只怕五更頭之言命宫中轉六更方鼓嚴鳴鐘太祖之意恐有不軌之徒竊發於五更時故終宋之世六更轉於宫中然後鳴鐘殊不省庚更同音也至理宗景定元年厯五庚申越十七年宋亡而希夷五更之數信矣元延佑七年庚申而順帝生當時人只呼庚申君觀庚申君大事記是也則與宋祖命轉六更之言益信數之不爽楊升菴云夜漏五五相遞為二十五唐李郢詩二十五聲五秋點長韓退之雞三號更五點是也至宋世有寒在更頭之忌宫掖及州縣更漏皆去五更後三點又并去初更二點以配之首尾止二十一點非古也七賢唐愚士詩云七騎從容出帝闉蹇驢驄馬雜山犉瀛州學士參差出十八人中一半人吳旦生曰七賢指瀛洲學士不知何據玉堂漫筆謂開元冬雪後張説張九齡李白李華王維鄭虔孟浩然出藍田關逰龍門寺而虔圖之張輅詩二李清狂狎二張吟鞭遙指孟襄陽鄭虔筆底春風滿摩詰圖中詩興長是必有所傳也然李白天寶間方來京師李華天寶間方拜官自與數人不同虞伯生題孟浩然像詩風雪空堂破帽溫七人圖裏一人存自注又不同人蓋唐有七愛宋有七老建安有七子未嘗稱賢也惟晉時竹林七人稱賢耳及考王戎嘗乘小馬驢也山濤乘驢劉伶乘鹿車餘則乘馬正符七人之數其乘鹿車者後人訛畫為牛也且接㒿烏帽晉人所戴而唐則巾矣元時曹文貞公伯啓集又有七子圖詩曰清談飄逸事陵遲七子髙風世所稀公室傾危無砥柱服牛乘馬欲何之此又一證也楊升菴云洪武中髙得暘題錢舜舉寒林七賢圖云詵然七子美風度乃有遺像圖生綃衣冠半帶晉季態人物絶是唐中朝想當朝政日休暇擬采野景歸風謡青騾黃犢踏凍雨蹇驢瘦馬衝寒猋醉鞭笑停似按轡銀蹬戲拍催聮鑣尚疑髙李六君子當時未見潘逍遙道同氣合志相感雖曠百世如同僚又熊直題云左遷與投散逝者良悠悠他人未足説所惜栁與劉天涯相聚一回首往事於人竟何有莫念元都舊種桃且往愚溪賸栽栁據此則髙適李白孟浩然與劉禹錫栁宗元不同時潘逍遙宋人又在後矣合而圖之謬甚亦不足深辨也梧桐園王仲光梧桐園詩七月交秋未變秋輕輕一葉下枝頭君王不在當時晤直到凋殘後始愁吳旦生曰述異記梧桐園在吳宫吳王夫差舊園也一名鳴琴川又云梧桐宫在句容縣傳云吳别館有楸梧成林焉梧子可食古樂府所謂梧桐秋吳王愁是也岸善崩童中州罱泥行云雨淋浪拍岸善崩嵗嵗罱泥增岸塍吳旦生曰前漢志岸善崩善訓多按國風女子善懷鄭箋善猶多也後漢記蠶麥善收晉春秋陸雲善笑皆訓多祝希哲題畫詩云總道江南風景好從來都讓罱泥人腕法張子宜詩鵝遊同腕法鸐舞按琴彈吳旦生曰埤雅鵝善轉旋其項古之學書者法以動腕羲之好鵝者以此張素正云善書者貴指實掌虛腕運而手不知鵝頸有腕法倘在是耶後山談叢云蘇黃兩公皆善書不能懸法逸少非好鵝效其腕頸爾正謂懸手轉腕而蘇公論書以手抵案使腕不動為法此其異也蓬軒吳記云張適字子宜七嵗習詩經十三赴鄉試稱奇童洪武初宋濓薦修元史拜水部郎中未幾辭歸與髙季迪啓楊孟載基張來儀羽徐幼文賁王止仲行梁用行時方以常錢彥周杜彥正寅浦長源源輩結為詩社號十才子紅兜歸田詩話曰叔祖士衡和楊亷夫宋故宫詩歌舞樓臺擬汴州可憐蠻觸戰蝸牛臨書玉枕雕簷靜行酒青衣罽帳愁卷土自應從亶父滔天誰復放歡兜臺空樹老寒鴉集落日白波江上秋亷夫喜其和兜字韻勝蓋亷夫詩用紅兜字元廢宋宫為佛寺西僧皆戴紅兜帽也然結句更陡健吳旦生曰瞿佑字宗吉年十四鄉人章彥復命賦雞詩大加稱賞手寫桂花一枝并題其上以贈云天上麒麟元有種定應髙折廣寒枝瞿翁遂構傳桂堂亷夫訪士衡於此堂逰宴纍日因和兜字韻詩時宗吉尚少見亷夫香奩八題即席倚和其花塵春迹云燕尾點波微有韻鳳頭踏月悄無聲黛眉顰色云恨從張敞毫邉起春向梁鴻案上生金錢卜歡云織錦軒忩聞笑語採蘋洲渚聼愁吁香頰啼痕云斑斑湘竹非因雨點點楊花不是春亷夫語士衡曰此君家千里駒也宗吉别有香奩集百餘首每題有引俱自為序春夢婆瞿宗吉詩主翁不悟榮華過一笑重煩春夢婆吳旦生曰東坡在昌化嘗負大瓢行歌田間有老婦謂坡云內翰昔年富貴一場春夢坡然之里人呼此嫗為春夢婆坡作詩有換扇惟逢春夢婆之句後楊亷夫賦春夢婆云黃栁城邉風雨多白頭宫女有遺歌東坡遍哨無知己賴有人間春夢婆洪武中王彥舉醉夢軒詩邯鄲枕上意如何笑殺當年春夢婆東谷贅言云士夫有與女流欵洽若交遊然者而君子無鐫譙焉若王右軍之於賣扇老媪杜少陵之于黃四娘白樂天之於潯陽商婦蘇東坡之于春夢婆是也厯代詩話卷七十三
