body:
  text: 歷代詩話卷三十三歸安吳景旭撰戊集下之下漢魏六朝無絶困學紀聞曰梁元帝賦得蘭澤多芳草詩古詩為題見於此吳旦生曰劉越石胡姬年十五沈休文江蘺生幽渚出自晉宋在梁前矣文苑英華辨證云蘭澤多芳草詩春蘭本無艷初學記作無絶按楚辭春蘭兮秋鞠長無絶兮終古則無絶字亦是徐幹室思詩其末句云自君之出矣明鏡暗不治思君如流水何有窮已時宋武帝擬之曰自君之出矣金翠暗無精思君如日月廽環晝夜生其時諸賢共賦遂以自君之出矣為題三味八蠶梁簡文詩糧持三味麥衣進八蠶綿吳旦生曰玄晏春秋稱衛倫過玄晏取糗糧以進玄晏嘗之曰麥也有杏李奈味三果之熟也不同子焉得兼之倫笑而不言退而告人曰士安之識過劉子陽哉吾家園樹實多杏時發糅以杏汁李奈發又糅以李奈汁故兼此三味耳吳都賦鄉貢八蠶之綿注引劉欣期交州記云一嵗八蠶繭出日南也雲南志云風土多暖至有八蠶言蠶飬至第八次不中為絲只可作綿故曰八蠶之綿吳録云南陽郡一嵗蠶八繢永嘉記云永嘉有八輩蠶一曰蚖珍蠶三月績二曰柘蠶四月初績三曰蚖蠶四月績四曰愛珍五月績五曰愛蠶六月末績六曰寒珍七月末績七曰四出蠶九月初績八曰寒蠶十月績凡蠶再熟者皆謂之珍此八蠶之實也海物異名記云八蠶共作一繭懸炭梁簡文詩月暈蘆灰缺秋還懸炭枯吳旦生曰懸炭古候氣法也按史記孟康云先冬至三日懸土炭於衡兩端輕重適均冬至日陽氣至則炭重夏至日隂氣至則土重蔡雍律厯紀候鍾律權土炭冬至陽氣應黃鍾通土炭輕而衡仰夏至隂氣應㽔賔通土炭重而衡低淮南子云隂氣為水水勝故夏至濕陽氣為火火勝故冬至燥燥故炭輕濕故炭重吹綸梁簡文詩枝間通粉色葉底映吹綸吳旦生曰注吹綸疑婦人所執暖扇之類一説吹綸美人衣飾按漢書齊國有吹綸絮顔師古注綸似絮而細名吹者言可吹噓也費昶詩金暉起遙步紅彩發吹綸刺閨梁戴皓從軍行云長安夜刺閨吳旦生曰注夜有急報投刺於宫門余觀唐鄭鍚出塞曲云不使軍書夜刺閨則與此注同意然楊升菴引南史陳文帝一夜內刺閨取外事分判者前後相續又是穴門以入非投刺之謂鄉里沈休文詩還家問鄉里詎堪持作夫吳旦生曰鄉里謂妻也西溪叢語引南史張彪傳呼妻為鄉里云我不忍鄉里落它處家世舊聞引楚公登科時第四人張中在殿廷喜甚挈楚公手云如何得鄉里知去楊升菴謂俗語云鄉里夫妻步步相隨言鄉不離里如夫不離妻也雜體詩竹林詩評曰江淹清婉秀麗才思有餘雜擬之作如季札聘魯四代之樂並歌於庭非天下之至聰其孰能喻吳旦生曰曽蒼山謂擬詩如學畫當識家數要先得其筆意運規製於胸中然後下筆乃可若展畫臨貌雖似亦下矣又錢希白作擬唐詩百篇備諸家之體自序云今之所擬不獨其詞至於題目豈欲拋離本集或有事疏斯亦見之本傳余嘗愛此二條為擬古之家懸一標的若文通雜體稱風人之極軌比情洽吻幾至亂真審乃要歸實臻斯旨鍾伯敬以擬古面目嗤而不為只是怕他余不敏著有擬古樂府十卷廣雜體詩百首未知有當否也故於漫興有云新翻杜老千家注廣擬江郎雜體詩聊以自志江郎擬陶遂刋本集東坡率爾和之非工妙不至此其擬班婕妤云畫作秦王女乘鸞向煙霧皎然稱其假使佳人玩之在手乘鸞之意飄然莫偕雖蕩如夏姬自忘情改節其擬休上人云日暮碧雲合佳人殊未來王勉夫稱其大意即毛詩君子于役之意又不止石林所引康樂圓景玄暉春草之句矣遁齊間覽云江淹挺湯惠休日暮碧雲合佳人殊未來今人遂用為休上人詩故事吳曽漫録引樂天與唐上人對答二詩為證野客叢書云此悮自唐巳然不但今也如韋莊詩曰千斛明珠量不盡惠休虛作碧雲詞許渾送僧南歸詩曰碧雲千里暮愁合白雪一聲秋思長曰湯師不可問江上碧雲深權德輿贈惠上人詩曰支郎有佳思新句凌碧雲孟郊送清逺上人詩曰詩誇碧雲句道證青蓮心張祜贈髙間上人詩曰道心黃檗老詩思碧雲秋雪竇詩曰碧雲流水是詩家曰湯惠休詞豈易聞暮風吹斷碧溪雲此等語皆以為湯詩用惟韋蘇州贈皎上人詩曰願以碧雲思方君怨别詞似不失本意印黃沙太平廣記吳均為詩云秋風瀧白水鴈足印黃沙沈約語之曰印黃沙語太險均曰亦見公詩云山櫻發欲然約曰我姑欲然卿已印訖吳旦生曰吳均字叔庠有雋才天監初栁惲刺我郡辟為主簿日與賦詩南史稱其清拔有古氣好事者效之號為吳均體今郡志載其青山偶書一首云家住青山下時向青山上青山不可上一上一惆悵又與施從事書云故鄣縣東有青山絶壁干天孤峰入漢緑嶂百里青川萬轉歸飛之鳥千翼競來企水之猿百臂相接秋露為霜春蘿被徑風雨如晦雞鳴不巳信足蕩纍頥物悟衷散賞余寓故鄣訪青山舊址每誦叔庠之詩與書以相盤礴嘗題寓廬云更聞詞客吳均體可要青山弔一杯蓋企之也而隱侯偶一戲之豈相訕耶詩話補遺云唐人以此類為險諢句傳竒詩多有之沈青箱夜月琉璃水春風卵色天是也韓退之水作青羅帶山如碧玊篸杜牧之詩錢唐鸚鵡緑吳岫鷓鴣斑東坡詩山為翠浪涌水作玉虹流大家亦時有之也擁劍西溪叢語曰何遜詩躍魚如擁劍孟浩然詩遊魚擁劍來按擁劍如彭蜞之類蟹屬一螯偏大故謂擁劍非魚也吳旦生曰何遜擁劍之誤顔之推已辨之矣酉陽雜爼云擁劍一螯極小以大者鬬小者食古今注云蟹有一螯偏大者名擁劍其螯赤一名執火本草又名桀步異物志云擁劍狀如蟹但一螯偏大爾俗謂之越王鈐大叢拾遺記云吳郡獻蜜擁劍四甕吳都賦所謂烏賊擁劍是也異魚圖贊云蟹有擁劔一螯偏大隨潮退殼隨退復裹力能鬬虎利甚戟銼吕亢作蟹圖十二種一曰蝤蛑二曰撥棹三曰擁劍四曰彭蝑五曰竭朴六曰沙狗七曰招潮八曰倚望九曰石􅀈十曰􅗶江十一曰蘆虎十二曰彭蜞雪花詩話補遺曰何遜與范雲聫句詩洛陽城東西却作經年别昔去雪如花今來花似雪李商隱送王校書分司詩多少分曹掌祕文洛陽花雪夢隨君定知何遜緣聫句每到城東憶范雲又漫成一絶云不妨何范盡名家未解當年重物華逺把龍山千里雪將來擬並洛陽花二詩皆用此事若不究其源不知為何説也吳旦生曰觀張説幽州新嵗詩去嵗荆南梅似雪今年薊北雪如梅則在初唐早用其語矣然何范之句又源於小雅云昔我往矣楊栁依依今我來思雨雪霏霏却有點化之功遂成佳唱如曹植詩昔我初遷朱華未希今我旋止素雪云飛則規倣拙甚所以詩貴點化爾錦纜張正見朔雪映夜舟詩檣風吹影落錦纜雜花浮吳旦生曰世言錦纜始於煬帝非也按吳志甘寧住止嘗以繒錦維舟去輒割棄以示奢侈合之張詩則吳陳之間已見矣續錦帶集迎候賔啓云水候錦纜陸遲華鑾老杜泛舟詩春風自信牙檣動遲日徐看錦纜牽石炭張正見詩竒香分細霧石炭搗輕紈吳旦生曰楊升菴謂石炭發香煤也蓋搗石炭為末而以輕紈篩之欲其細也今制宫中搗炭為末以梨棗汁合之為餅置於爐中以為香藉即此物也但古用石炭今用朩炭不同耳張正見又詩云名香散綺幕石墨雕金爐蓋石炭即是墨也石墨一名石涅一名墨石脂按廬山有石墨可書宜陽縣有石墨山汧陽縣有石墨洞贑州興國縣上洛山皆産石墨廣東始興縣小溪中亦産石墨婦人取以畫眉名畫眉石古者漆書之後皆用石墨以書大戴禮所謂石墨相著則黑是也漢以後松煙桐煤既盛故石墨遂湮廢并其名人亦罕知之東京賦黑丹石緇注引孝經援神契云德至於山陵則出黑丹魏都賦黑井鹽池玄液素滋注鄴西髙陵西伯楊城西有黑井今在彰德府南郭村井産石墨可以書水經注云鄴都銅雀臺北曰氷井臺髙八尺屋百餘間上有氷室𢾗井井深十五丈藏氷與石墨焉陸士龍與兄機云上三臺曹公藏墨𢾗十萬斤然不知兄曽見否今送二螺石燭一名水肥一名石脂一名石液今之延安石油也可熏煙為墨唐人延州詩有石煙多於洛陽塵之句八米啓顔録曰魏髙祖山陵既就詔令魏收祖孝徵劉逖盧思道等各作挽歌詞十首尚書令楊遵彥詮之魏收四首祖劉各二首而思道獨取八首故時人號八詠盧郎吳旦生曰北史本傳云齊文宣帝崩當朝文士各作挽歌十首擇其善者不過一二首惟思道獨有八篇故時人稱為八美盧郎西溪叢話云思道挽歌獨八首比時人最盛時謂之八米盧郎八米關中語嵗以六米七米八米分上中下言在榖為八米取𢾗之多也王伯厚謂米當為采徐鍇云八米以稻喻之若言十稻之中得八粒米也刻管續本事詩曰唐德州刺史王倚有筆一管粗於常筆刻從軍行人馬毛髮亭臺山水無不精絶刋兩句云亭前琪樹已堪攀塞北征人尚未還吳旦塵曰松窗雜録有筆管上鏤盧思道燕行歌即此也歷代吟譜云明皇自蜀回登勤政樓歌曰庭前琪樹已堪攀塞北征人竟未還此思道歌詞也盧氏雜説王使君有筆管每一事刻從軍行兩句殆非人功其畫迹若粉描向明方可辨之云用鼠牙雕刻崔鋋郎中文集有王氏筆管記體類韓退之記畫種羊北齊髙昻喜為詩嘗從征行有曰壠種千口羊泉連百壺酒吳旦生曰異物志大秦國北有羊子生於土中秦人候其欲萌為垣以繞之其臍連地不可以刀截擊鼓驚之而絶因跳鳴食草以一二百口為羣樂郊私語云楚石大師漠北懷古詩有自言羊可種不信繭成絲之句人以問師師曰大漠迤西俗能種羊凡屠羊用其皮肉惟留骨以初冬未日埋著地中至春陽季月上未日為吹笳咒語有子羊從土中出凡埋骨一具可得子羊𢾗隻此蓋四生胎外之化也吳立夫詩青草叢抽臍未斷馬蹄踣鐵繞垣行宋景濓連珠云西秦羊角土種之而成形桑落世説新語曰桑落多美酒庾信從蒲州刺史乞酒詩蒲城桑落酒吳旦生曰注謂廬山有桑落洲多美酒後史補云蒲中桑落坊有井每至桑落時取其寒暄得所以井水釀酒甚佳故號桑落酒舊京人呼為桑郎蓋語訛耳齊民要術云釀桑落酒亦以九月真率筆記云試鶯家多美釀不善飲時為宋遷索取試鶯曰此豈為某設哉祇當索與郎耳因名酒曰索郎總不若水經注之載蒲坂云民有姓劉名墮者宿擅工釀採挹河流醖成芳酎懸食同枯枝之年排於桑落之辰故酒得其名矣然香醪之色清白若滫漿焉别調氛氲不與他同蘭薰麝越自成香逸方土之貢選最佳酌矣自王公庶友牽拂相招者每云索即有顧思同旅語索郎反語為桑落也更為謝徵之雋句中書之英談伽藍記云河東劉白墮能釀酒季夏六月時暑赫曦以罌貯酒曝於日中經旬其酒不動飲之至醉經月不醒京師朝貴逺相餉饋逾於千里以其逺至號曰鶴觴亦名騎驢酒永熙中青州刺史毛鴻賔齎白墮所釀酒之藩路逢盜賊飲之即醉皆被擒獲遊俠語曰不畏張弓拔刀惟畏白墮春醪狸膏芥粉庾子山詩狸膏燻鬬敵芥粉壒春場吳旦生曰莊子羊溝之雞三嵗為株相者視之則非良雞也然數以勝人者以狸膏塗其頭也注云羊溝鬬雞處株魁帥也雞畏狸也曹子建鬬雞篇云願蒙狸膏助嘗得擅此場左傳季郈之雞鬬季氏介其雞郈氏為之金距杜預注云搗芥子播其羽也或曰以膠沙播之為介雞鄴都故事云魏明帝泰和中築鬬雞臺趙王石虎亦以芥羽漆砂鬬雞於此禇玠詩錦毛侵距散芥羽雜塵生劉孝威詩翅中含芥粉距外曜金芒王褒詩妬敵金芒起猜羣芥粉生歷代詩話卷三十三
