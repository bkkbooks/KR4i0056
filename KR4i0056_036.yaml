body:
  text: 歷代詩話卷三十六歸安吳景旭撰巳集上之下杜詩引坐陳無功曰晉以後有宫人參隨侍朝故杜詩云戶外昭容紫袖垂雙瞻御座引朝儀至朱梁革易遂沿後世肅觀吳旦生曰唐制天子坐朝宫人引至殿上故鄭谷入閣詩亦云導引出宫鈿也文昌雜録云天祐二年十二月敕曰宫嬪女職本備內任今後每遇延英坐朝日只令小黃門祗候引從宫人不得出內自此始罷宫人引導則是老杜出天祐前尚有此典制然在唐昭宗天祐間已罷非至朱梁始革易也開元禮疏云晉康獻褚后臨朝不坐則宫人傳百寮周隋相沿國家因之不改常參入閣晚出左掖詩春旗簇仗齊又臘日詩還家初散紫宸朝吳旦生曰唐故事天子日御殿見羣臣曰常參朔望薦食諸陵寢有思慕之心不能臨前殿則御便殿見羣臣曰入閣蓋宣政前殿也大明宫正殿曰含元含元之北為宣政即古之內朝也謂之衙衙有仗唐朝會之仗三衛番上分為五仗每月以四十六人立內廊閣外號曰內仗朝罷放仗紫宸便殿也宣政之北為紫宸即古之燕朝也謂之閣朔望不御前殿而御紫宸乃自正衙喚仗由閣門而入百官隨以入見故謂之入閣則知左掖詩為宣政之正衙而臘日詩為紫宸之內衙矣唐文武職事官九品以上望朔朝文官五品以上及兩省供奉監察御史員外太常博士日朝為常參武官三品以上三日一朝為九參五品以上及折衝當番五日一朝為六參時多御宣政正衙立仗廊飱而退開元以朔望上宗廟牙盤避正殿移御紫宸即喚仗入閣乾符以後因亂禮缺天子不能日見羣臣而見朔望故正衙廢仗而入閣有仗遂以入閣為重至御前殿猶謂之入閣其後入閣亦廢常參赴正衙對立宰相押班傳不坐即退後唐明宗詔五日一入見中興殿便殿也此入閣之遺制而謂之起居朔望一出御文明殿前殿也反謂之入閣李琪謂非唐故事請罷五日起居而復朔望入閣然終不能正也雞棲陳輔之詩話曰明晨有封事數問夜如何此幸而得之坐以待旦之意避人焚諫草騎馬欲雞棲所謂嘉謀嘉猷入告爾后於外曰斯謀斯猷惟我后之德吳旦生曰趙子常注結句見晚出之情騎馬見出欲雞棲見晚而他注引國風雞棲于塒以見日夕意耳余按魏文帝以劉放為中書監孫資為中書令魏晉世語云劉孫共典樞要夏侯獻曹肇心內不平殿中有雞棲樹二人相謂此亦久矣其復能幾指劉與孫也今公言簇仗則自宣政殿而出左有門下省右有中書省其於獻納焚草之餘猶有凛凛懷忠惟恐覆餗之懼故引雞棲樹以自勵此又朝乾夕惕若之旨也韋承慶詩清切鳳凰池扶疏雞樹枝張文琮詩影照鳳池水香飄雞樹風注云雞棲樹即皂莢樹紫邏送賈閣老守汝州詩雲山紫邏深吳旦生曰舊注邏塞也取巡邏之義余謂不然九域圖云汝州有紫邏山則是送賈至出守汝州故舉其地之山而言也元遺山寄王德新詩紫邏留行客黃流隔戍城時德新在汝州也按邏作去聲楊煥然詩紫邏堪高卧玄經擬共傳歐陽原功詩道吳山頭龍自卧疊嶂重岡深紫邏靈湫瀑布千尺長古寺神杉十圍大左省雍録曰宣政殿前有兩廡兩廡各有門其東曰日華日華之東則門下省也居殿廡之左故曰左省西廊有門曰月華月華之西即中書省也凡兩省官繫銜以左右者皆分屬焉故杜答岑參詩云窈窕清禁闥罷朝歸不同言分東西班各歸本省也岑為補闕屬中書省居右署公為拾遺屬門下省居左署所以歸不同也又云君隨丞相後我往日華東蓋丞相罷朝由月華門出而入中書凡西省官亦隨丞相出西也若左省官仍自東出故曰我往日華東吳旦生曰岑寄公詩聨步趨丹陛分曹限紫微正言其分左右以出入故公答岑詩亦云然也我往諸本皆作住舊注亦謂公拾遺在左闥故云住日華東然頷聨二句俱承罷朝歸而説自當作我往矣即看上句隨字可見復齋漫録云唐六典左右拾遺掌供奉諷諫凡發令舉事有不便於時不合於道者小則上封大則廷靜子美以至德二載拜左拾遺故寄賈司馬云法駕還雙闕王師下八川此時霑奉引佳氣拂周旋奉酬嚴公題野亭云拾遺曾奏數行書懶性從來水竹居奉引濫騎沙苑馬幽棲真釣錦江魚此兩詩所以言供奉也宿左省云明晨有封事數問夜如何晚出左掖云避人焚諫草此兩詩所以言小則上封大則廷諍也燕支竹坡詩話曰徐陵玉臺新咏序南都石黛最發雙蛾北地燕支偏開兩臉古今注云燕支出西方土人以染中國謂之紅藍以染粉為婦人色而俗乃用胭脂或胭脂字不知其何義也杜少陵林花著雨胭脂濕亦用此二字白樂天三千宫女胭脂靣却用此二字殊不可曉吳旦生曰古今原始載紂以紅藍花汁凝作脂以為桃紅粧則事物考謂秦宫中悉紅粧其物自秦始非也余氏辨林云蓋燕國所出故名胭脂今人寫燕字復加月甚有因傍加月者失其本矣余觀河西舊事云失我祈連嶺使我六畜不蕃息失我焉支山使我婦女無顔色蓋北方有焉支山山多紅藍北人采華染緋取其英鮮者作胭脂婦人粧作頰色鮮明可愛然則燕支焉支胭脂胭脂字皆可通用雲麓漫抄云舊謂赤白之間為紅即今所謂紅藍也西域一名黃藍博物志謂黃藍張騫所得收其花俟乾以染帛色鮮於茜謂之真紅亦曰乾紅目其草曰紅花以染帛之餘為燕支乾草初漬則色黃故又為黃藍也史記貨殖傳若千畝巵茜徐廣注云巵音支茜音倩一名紅藍其花染繒亦黃也知今之紅花乃古之茜而今茜係蘇朩棗朩染成非古之茜矣有以杜此句題壁者濕字為蝸蜒所蝕東坡云潤字山谷云老字少遊云嫩字佛印云落字覔集驗之乃濕字也出於自然而四人遂分生老病苦之説詩言志信矣請急逼側行云已令請急會通籍吳旦生曰釋名急及也言操切之使相逮及也山谷箋云晉令急假者五日一急一歲以六十日為限晉書車武子早急出詣子敬盡急而還是也余觀霍光傳光時休沐出上官桀代決事張安世休沐未嘗出如淳云漢律五日一賜休沐則是晉仍漢制也按休假休浣休急取急請急此皆休沐之名俗以上浣中浣下浣為上旬中旬下旬蓋本月制十日一休沐之義也因話録云沐無點者沐浴之沐也沭有點者音述古沭陽縣酒價玉堂詩話曰宋真宗宴羣臣於太清樓問唐酒價幾何無能對者丁晉公奏曰唐酒每斗三百上曰安知丁曰臣讀杜甫詩速令相就飲一斗恰有三百青銅錢是知一斗三百上大喜曰甫詩可為一時之史吳旦生曰郭次象謂杜詩可知當時酒價然樂天與夢得沽酒間飲詩共把十千沽一斗當劉白之時酒價何太不亷哉芥隱筆記云曹植樂府歸來宴平樂美酒斗十千十千恐未必酒價言酒美而價貴耳野客叢書云唐人引曹語如李白詩金尊沽酒斗十千王維詩新豐美酒斗十千崔輔國詩與沽一斗酒恰用十千錢許渾詩十千沽酒留君醉權德輿詩十千斗酒不知貴陸龜蒙詩十千沽一斗而一斗三百錢獨見子美所云故引以定當時之價唐食貨志云德宗建中三年禁民酤以佐軍費置肆釀酒斛收直三千又觀楊松玠談藪北齊盧思道嘗云長安酒賤斗價三百杜引此亦未可知典論曰漢孝靈帝末年百司湎酒一斗直千文此可證漢酒價肝義鶻行結句云聊為義鶻行永激壯士肝吳旦生曰老杜之義鶻行即太史公之遊俠傳也歷敘健鶻之急難即斗上捩孤影一句已極振動而修鱗巨顙紛紛欲墜乃曰此事樵夫傳將鶻事小挽住而轉句云飄蕭覺素髮凛欲衝儒冠其時之怒氣坌勃為何如也遂以肝字結之正不浪下説者謂肝主怒也章法字法俱絶蘇東坡詩一笑㵼肝胃正得斯旨埤雅云鶻有義性杜所賦義鶻行是也冬撮鳥之盈握者夜以燠其爪掌左右易之旦即縱之令去其往東矣則是日也不東嚮搏物南北亦然蓋其義性有擒有縱如此李雍鶻賦所謂營全鳩以自暖乃詰朝而見釋是也車箱箭栝望嶽詩車箱入谷無歸路箭栝通天有一門吳旦生曰寰宇記車箱谷一名車水渦在華隂縣西南深不可測水經注自下廟歷列柏南八十一里東回三里至中祠又西南出五里至南祠從北南入谷七里又屆一祠出一里至天井其路迂曲不可窮述征記云柏谷谷名也漢武帝徵行所至谷中無回車地夾以髙原柏林隂翳窮日幽暗殆弗覩陽景禹貢治梁及岐又曰荆岐既旅其山本以有兩岐故呼為岐路之岐今俗呼為箭栝嶺胡三省通鑑辨誤云箭筈嶺名有箭筈關在鳳翔西南界上宋髙宗紹興元年金自鳳翔攻箭筈關吳玠遣將擊退之蓋蜀口關隘處華山記箭栝峰上有穴才見天攀援自穴中而上如坐室窺窗三意早秋苦熱詩對食暫飱還不能吳旦生曰趙注但引蔡琰詩飢當食兮不能飱不知此七字已見堆案相仍之苦每至炎蒸之日盤飱具列聊一舉筯為煩暍所困不復下咽因念此句之妙即默坐猶難况簿書耶誠齋詩話曰詩有一句七言而三意者老杜云對食暫飱還不能韓退之云欲去未到先思回有一句五言而兩意者陳後山云更病可無醉猶寒已自和詩眼云昔嘗問山谷耕田欲雨刈欲晴去得順風來者怨山谷云不如千巖無人萬壑靜十步回頭五步坐蓋七言詩四字三字作兩節也此句法出黃庭經上有黃庭下關元已下多此體五言詩亦有三字二字作兩節者老杜云不知西閣意肯別定留人肯別耶定留人耶山谷愛之蓋與上七言同踏層氷早秋苦熱結句云安得赤腳踏層氷吳旦生曰蔡傅卿注引東方朔神異經云北方有層氷萬里陳無功謂馬融值史館蒸燠如坐甑中曰安得披襟赤腳踏隂山之層氷洗塵熱也老杜出此蓋無功所證固確然馬融亦用神異語意而蔡注未可謂妄引非據也陸放翁夏夜泛舟詩夜半歸來步松影真成赤腳踏層氷茱萸九日藍田崔氏莊詩明年此會知誰健醉把茱茰仔細看吳旦生曰注家但知引賈佩蘭説宫中九日佩茱茰事西京雜記云賈佩蘭乃戚夫人侍兒也初學記謂漢武宫人悮不知其來已久矣按禮記三牲用藙鄭玄注云藙煎茱茰也漢律會稽獻焉説文漢律會稽獻藙一斗音魚既切疏賀氏云今蜀郡作之九月九日取茱茰折其枝連其實廣長四五寸一升實可和十升膏名之藙也則周時已用而漢制特效之如風土記之折茱茰房以插頭齊諧記之帶茱茰囊以繫臂猶其後事耳劉會孟云舊曾手寫悮作好把便覺情性甚遠因贊醉把之妙然余按王仲言宣城本作再把茱茰仔細看覺再字更於明年此會呼吸有情劉禹錫云詩中用茱茰字者凡三人老杜醉把茱茰仔細看王維插遍茱茰少一人朱放學他年少插茱茰三君所用杜公為優洪容齋云唐人用此十餘家王昌齡茱茰插鬚花宜壽戴叔倫插鬢茱茰來未盡盧綸茱茰一朵映華簮權德輿酒泛茱茰晚易曛白居易舞鬟擺落茱茰房茱茰色淺未經霜楊衡強插茱茰隨衆人張諤茱茰凡作幾年新耿湋髮希那敢插茱茰劉商郵筒不解獻茱茰崔櫓茱茰冷吹溪口香周賀茱茰城裏一尊前比之杜句真不侔矣風土記云茱茰榝也九月九日熟色赤可采時也別名秋子蕭京兆遣興云赫赫蕭京兆今為時所憐吳旦生曰東坡謂玄宗雖誅蕭至忠然甚懷之侯君集云蹉跌至此至忠亦蹉跌者耶故子美亦哀之余按至忠自蒲州刺史附太平公主引為刑部尚書宋璟所謂非所望於蕭傳也王麟洲云璟取安仁西征賦中句殊有情實溫公通鑑改作蕭君雅俗逈別然未嘗歷京兆尹王原叔注謂蕭望之嘗為左馮翊後被讒自殺然亦非京兆也嘗考諸史天寶八年京兆尹蕭炅坐遷汝隂太守史稱其為林甫所厚為國忠誣奏譴逐則所謂蕭京兆蓋炅也故為人所羡今為人所憐用漢成帝童謡哀之亦刺之也雪滿山詩説雋永曰王性之嘗見唐人寫本杜詩愁對寒雲雪滿山乃白滿山也吳旦生曰吳本鶴本作雪黃遐周以雪字為正言山寒雲縞望如雪積即太白所云牀前明月光疑是地上霜霜之與月雪之與雲了不相關此中有賔主句雪之一字禪家句中眼也按升菴弇州俱以白字為善本殊遜其玄勝慳風漫叟詩話曰薑少府設鱠戲贈長歌首章云薑侯設鱠當嚴冬昨日今日皆慳風乃知慳風澀雨之句自古有之吳旦生曰借風雨以譏薑侯之慳老杜雖戲應不至此三山老人言嚴冬天寒又連日有風黃河氷益厚矣當此時而鑿氷取魚為鱠其意勤甚故曰黃河美魚不易得鑿氷恐侵河伯宫余因觀馬虛中詩地瘦仍慳雨桃羞未著花豈亦有譏耶腹腴薑少府設鱠戲贈云偏勸腹腴愧年少吳旦生曰庚集皮詩中辛集梅詩中河豚已互見矣今按魚腹下肥肉謂之腴禮記少儀云羞濡魚者進尾冬右腴夏右鰭注冬氣在上腴腹下也夏氣在下鰭眷也周禮疏燕人膾魚方寸切其腴以啖所貴引以證膴膴亦腹腴前漢書九州膏腴師古注云腹下肥曰腴蘇東坡詩更洗河豚烹腹腴黃山谷詩飛雪堆盤膾腹腴張伯雨詩苕溪斫鱠腹偏腴藝苑雌黃云河豚有毒肝與卵食之必死其子大才一粟浸之經宿如彈丸人中其毒以水調炒槐花末及龍腦皆可解吳人珍之以其腹腴為西施乳嘗戲作絶句云蔞蒿短短荻芽肥正是河豚欲上時甘美遠勝西子乳吳王當日未曾知雖然甚美必甚惡河豚味之美也吳人嗜之以喪其軀西施色之美也吳王好之以亡其國可為來者戒張鎬洗兵馬云張公一生江海客身長七尺鬚眉蒼謂張鎬也盧德水曰子長為救李陵而下腐刑子美為救房琯幾陷不測賴張相鎬申救獲免坐是流落劔外可謂千古大俠余嘗考諸史稱琯登相位奪將權聚浮薄之徒敗軍旅之事又言其髙談虛論招納賔客因董庭蘭以納賄蓋琯以宰相自請討賊可謂之奪將權乎劉秩固不足當曵落河王思禮嚴武亦可謂浮薄之徒乎門客受贓不宜見纍肅宗猶不能非張鎬之言而史顧以此坐琯乎賀蘭進明之譖琯謂於聖皇為忠於陛下則非忠聖皇於陛下何人也而敢以忠不忠為言肅宗讐父之心進明深知之矣李輔國言陳元禮高力士謀不利於陛下六軍將士盡靈武功臣皆反側不安琯與鎬在朝何啻十元禮百力士肅宗豈嘗須臾忘之故琯之求將兵知不安其位而以危事自效也許之將而又使中人監之不欲其專兵也兵敗不即去而以琴客之事罷俾正衙彈劾以穢其名也罷琯而相鎬不得已而從人望也五月相八月即出之河南不欲其久於內也六月貶琯而五月先罷鎬汲汲乎恐鉏之不盡也琯敗師而罷鎬有功而亦罷意不在乎功罪也自漢以來鈎黨之事多矣未有人主自鈎黨者未有人主鈎其父之臣以為黨而文致罪狀榜之朝堂以欺天下後世者吳旦生曰鎬與琯臭味而又力救公宜公之拳拳於鎬矣然觀獨孤及撰鎬神道碑云一命左拾遺二命右補闕三命侍御史四命諫議大夫五命中書侍郎平章事起家二年秉國鈞自古未有而鎬傳又云天寶末楊國忠執政求天下士為已重聞鎬才薦之釋褐拜左拾遺則是遷擢如此赫且疾而其始由壬人以進所謂七尺鬚眉安在公反咏其風雲遇會何也蕭嵩亦薦云用之為帝王師余竊有疑焉西清詩話云鎬雖史稱有王霸大略然當為相收復兩京時不聞別有竒功但有䇿史思明欲以范陽歸順為偽知許叔冀臨難必變二事耳然當時亦不果用也豈史氏或有遺耶匡山西溪叢語曰杜詩匡山讀書處頭白好歸來李太白青山人多遊匡廬故謂之匡山容齋二筆曰吳曾能改齋漫録內正辨是事引杜田杜詩補遺云范傳正李白新墓碑言白本宗室子厥先避仇客蜀居蜀之彰明太白生焉彰明綿州之屬邑有大小康山白讀書於大康山有讀書堂尚存其宅在清亷鄉後廢為僧房稱隴西院蓋以太白得名院有太白像吳君以是證杜句知康山在蜀非廬山也豫按當塗所刋太白集其首載新墓碑宣歙池等州觀察使范傳正撰凡千五百餘字但云自國朝以來編於屬籍神龍初自碎葉還廣漢因僑為郡人初無補遺所紀七十餘言豈非好事者偽為此書以附會杜詩耶歐陽忞輿地廣記云彰明有李白碑白生於此縣蓋亦傳説之誤當以范碑為正藝苑巵言曰南部新書白山東人父為任城令因家焉少與魯人隱徂徠山號竹溪六逸天寶初遊會稽因吳筠隱剡中俗稱蜀人非也今任城令廳有白之詞尚在至唐范傳正志其墓曰白涼武昭王九世孫昭王隴西人隋末子孫以罪徙碎葉神龍時白父客自西域逃居綿之巴西而白生焉唐魏顆李陽氷序其文劉全白撰其墓碣皆曰廣漢人故論白者或曰隴西或曰山東或曰蜀李陽氷云李翰林浪迹縱酒以自昏穢詠歌之際屢稱山東李白亦云以張垍讒逐遊海岱間子美所謂汝與山東李白好蓋白自號也然則白本隴西人産於蜀嘗流寓山東子美從遊時在山東故稱山東也此山東乃關東非今之山東也吳旦生曰舊唐書傳南部新書元稹杜詩序朝氏讀書志皆以白為山東人新唐書傳范傳正碑劉全白墓碣魏顆李陽氷曾鞏太白集序唐詩紀事彰明逸事綿州圖經皆以白為蜀人楊升菴欲私為鄉産陳晦伯胡元瑞刺刺不休蓋洪容齋據刋集以攻其附會王弇州又斷以為蜀産豈容齋所見之本祕不傳世不克盡見耶今所行皆弇州之言也然觀鄭谷送人入蜀詩雪下文君沽酒市雲藏李白讀書山在當時以同補遺中語矣似為可據要當以蜀産為正按唐十道有河北無山東唐都長安自太行以東皆山東也故老杜兵車行云君不見漢家山東二百州千村萬落生荆杞又洗兵馬云中興諸將收山東舊注山東河北也姑嫜新婚別云妾身未分明何以拜姑嫜吳旦生曰前漢書廣川王去疾幸姬陶望卿歌曰背尊章嫖以忽蓋舅姑謂之尊章趙德麟謂玉篇云凡夫之父母曰嫜老杜拜姑嫜何耶正俗云古謂舅姑今姑嫜亦俗呼為姑鍾蓋自章音轉為鍾也余觀春秋傳云秦晉二國繼世通婚所娶之女非舅即姑故曰舅姑則知姑者尊之之辭也又字學集要云夫之兄曰兄嫜杜詩堂上拜姑嫜或作偉單作章釋名云俗間曰兄章章灼也章灼敬奉之也則知嫜者亦尊之之辭也野客叢書云吳人稱翁為官稱姑為家錢氏納土蓋嘗奏過謂其土俗方言也觀范曄臨刑其妻罵曰君不為百歲阿家其母云云妻曰阿家莫憶袁君正父疾不眠專侍左右家人勸令暫卧答曰官既未差卧亦不安二事正在南史知吳人之語為不誣也合昏詠佳人詩合昏尚知時鴛鴦不獨宿吳旦生曰本草合歡或曰合昏陳藏器云葉至暮即合故曰合昏今夜合花是也古雋考略作合棔音昏庾信詩建始移交讓徽音種合昏陸公佐新刻漏銘云合昏暮卷蓂莢晨生注合昏槿也其葉夜合而明舒周處風土記亦以合昏為槿黃山谷箋杜云合昏朩名朝舒夕斂東南雲遣興云每望東南雲令人幾悲吒吳旦生曰梁瑄不歸弟兄每見東南白雲立望慘然久之老杜用此意也狄仁傑登太行山見白雲孤飛謂左右曰吾親舍其下瞻悵久之北史元樹奔南每見嵩山雲未嘗不引領歔欷袁豹作檄云延首東雲謝靈運上書云注心南雲陸機思親賦指南雲以寄欽陸雲贈鄭曼季詩響溢南雲江總九日詩心逐南雲逝魚龍鳥鼠埤雅曰水落魚龍夜山空鳥鼠秋魚龍水名鳥鼠山名亦鳥鼠秋而魚龍夜是詩兩句而含三事也吳旦生曰水經注一水發源天水縣其水出五色魚俗以為龍而莫敢捕因謂之魚龍水又隴西地名魚龍出石魚掘地得石鼓其中有魚痕鱗甲纎悉畢具燒之有魚氣蓋魚蟄泥而變為石又龍秋分而降則蟄寢於囦音淵古􅘢字所謂魚龍以秋日為夜也爾雅鳥鼠同穴其鳥為鵌其鼠為鼵山海經注鼵如人家鼠而短尾鵌似燕而小黃色穿地入數尺鼠在內鳥在外而共處河圖云鳥鼠同穴地之幹也上為掩畢星又禹貢導渭自鳥鼠同穴孔氏大傳云鳥鼠共為雌雄同穴而處蔡仲默以為怪誕不足信而謂同穴自為山名鳥鼠為同穴之枝山墅談駁之云今鳥鼠同穴山在渭源縣西七十六里俗呼為青雀山實有鳥與鼠同處於穴又甘肅志涼州之地有兀兒鼠者形狀似鼠尾若贅疣有鳥曰本周兒者形似雀色灰白常與兀兒鼠同穴而處按涼州唐屬隴右道岑參詩龍魚川北盤溪雨鳥鼠山西洮水雲白題秦州雜詩羌舞白題斜吳旦生曰正文作白蹄非是蔡興宗正異云白題字義與雕題同按南史宋武帝時西北遠方有白題遣使入貢莫知所出裴子野曰漢潁隂侯斬白題將一人服虔注云題者額也其俗以白塗堊其額也後見墨莊漫録云蓋白題其人下馬捨之始悟白題乃氊笠也其人多為旋舞笠之斜似乎謂此也楊亷夫詩大姬白題作羌舞恐氊笠非大姬所用之物亦是悮認白題也不夜城秦州雜詩無風雲出塞不夜月臨關吳旦生曰王子韶謂無風谷名不夜城名地理志不夜縣古有日夜出於東萊故萊子立此城以不夜為名齊地記不夜城在陽城東南按班史云有如日夜出此城是時城方成耳杜詩用此東坡雪後詩明月長來不夜城亦用此郡國志登州文登縣有不夜城有石橋即始皇造欲過海觀日所出處三齊略記云鄭玄常居不夜城南山中教授黃巾亂而散鳳林秦州雜詩鳳林戈未息魚海路常難吳旦生曰氷經河水又東歷鳳林北注鳳林山名五巒俱峙耆諺云昔有鳳鳥飛遊五峰故山有斯目矣秦州記枹罕原北名鳳林川一統志鳳林關在臨洮府蘭縣黃河側唐書地理志河州安昌郡有鳳林縣縣北有鳳林關唐時陷於吐蕃大厯二年吐蕃入奏云贊普請以鳳林關為界張籍涼州詞鳳林關裏水東流白草黃榆六十秋魚海縣名天寶元年河西節度使王郵奏破吐蕃魚海及遊奕等軍又郭子儀取魚海五縣是也岑參詩洗兵魚海雲迎陳秣馬龍堆月照營瘧疾西清詩話曰有病瘧者子美曰吾詩可以療之病者曰云何曰夜闌更秉燭相對如夢寐其人誦之瘧猶故也子美曰更誦吾詩云子璋髑髏血糢糊手持擲還崔大夫其人誦之果愈漁隱叢話曰世傳杜子美詩可以愈瘧此未必然蓋其辭意典雅讀之者脫然不覺沉疴之去體也好事者乃為此論殊可笑借使瘧誠有鬼若知杜詩之佳是賢鬼也豈復屑屑求食於嘔泄之間哉觀子美有詩云三年猶瘧疾一鬼不銷亡隔日搜脂髓增寒抱雪霜則是疾也杜陵正自不免耳吳旦生曰杜詩截瘧亦如檄草陳琳頭風可愈文成孟召狂發能差之意而來病君子正自不免此兩截事亦兩不相妨也胡苕溪往往認真煞講耳葛常之亦舉此案謂靈於人而不靈於已皆高頭巾認真之過也觀賔退録云世人瘧疾將作謂可避之他所閭巷不經之説也然自唐已然高力士流巫州李輔國授謫制力士方逃暑功臣閣下杜子美詩三年猶瘧疾一鬼不銷亡隔日搜脂髓增寒抱雪霜徒然潛隙地有靦屢鮮粧則不特避之而復塗抹其靣矣余笑趙與時又來認真也左傳齊侯疥遂痁唐姚崇病痁移告按瘧疾為病痎小瘧也痁大瘧也疥當為痎漢舊儀云顓頊氏有三子死而為疫鬼一居江水為瘧鬼故退之遣瘧詩云屑屑水帝魂謝謝無餘輝如何不肖子尚奮瘧鬼威又云咨汝之胄出門尸何巍巍祖軒而父頊未昧於前徽又有湛湛江水清歸居安汝妃之語蓋本於漢舊儀也筆寄賈司馬嚴使君詩賈筆論孤憤嚴詩賦幾篇吳旦生曰南朝詞人謂文為筆朝氏概以詩為詩筆非也按劉孝綽嘗云三筆六詩三即第三弟孝儀六即第六弟孝威沈約傳謝玄暉善為詩任彥升工於筆約兼而有之庾肩吾傳梁簡文與湘東王書論文章之弊曰詩既若此筆又如之又曰謝朓沈約之詩任昉陸倕之筆任昉傳時人謂任筆沈詩昉聞甚以為病因話録云韓愈能古文孟郊長於五言時號孟詩韓筆杜牧之詩杜詩韓筆愁來讀似倩麻姑癢處抓王荆公詩間時用意歸詩筆靜外安生比泰山蘇東坡詩水洗禪心都眼靜山供詩筆總眉愁嫖姚漁隱叢話曰後出塞詩借問大將誰恐是霍嫖姚陪柏中丞觀宴將士詩漢朝頻遣將應拜霍嫖姚按漢書霍去病為嫖姚校尉服虔云音飄搖師古云嫖頻妙反姚羊召反並去聲呼而子美作平聲用蓋取服虔音耳王荆公詩莫教空説霍嫖姚亦以平聲蓋承襲子美而用也吳旦生曰古音略謂漢書霍去病傳票姚荀悅漢紀作票鷂票音􅝎􅝎鷂皆鳥名言如􅝎之疾鷂之擊也惟服虔音作飄搖野客叢書云嫖姚作平聲用如梁蕭子顯詩夫壻仕嫖姚庾信詩將寄霍嫖姚王褒詩樓蘭校尉稱嫖姚唐人前詩已多如此而唐人如李嘉祐詩身逐嫖姚幾日歸高適詩每逐嫖姚破骨都李白詩將軍兼領霍嫖姚張祐詩二十逐嫖姚羅隱詩尊罍合伴霍嫖姚李益詩君逐嫖姚將韋應物詩嫖姚恩顧下中有霍嫖姚張籍詩曾將順䇿佐嫖姚為佐嫖姚未得還杜牧之詩鏖兵不羡霍嫖姚李商隱詩五年從事霍嫖姚郎士元詩壯心竟未嫖姚知宋人如王元之詩繡服霍嫖姚劉貢父詩嫖姚不復顧家為陳后山詩故家文物尚嫖姚如此甚多未見有作去聲呼蓋承襲而然荀子美麗姚冶漢武傷李夫人賦縹飄姚乎愈莊漢郊祀歌雅聲遠姚皆用姚字海運後出塞云雲帆轉遼海粳稻來東吳吳旦生曰公又有昔遊詩幽燕盛用武供給亦勞哉吳門持粟帛泛海凌蓬萊則唐時已海運糧儲矣草朩子云元海運自朱清張瑄始歲運江淮米三百餘萬石以給元京四五月南風至起運得便風十數日即抵直沽交卸似謂二人之功創所未有而不知已前此也輟耕録云宋季亡賴子鈔掠海上朱清張瑄為雄長若捕急輒引舟東行三日夜至沙門島往來若風迹不可得稍怠則復來後請招懷奏可清瑄授金符千戶建言海漕事試之良便至元十九年也歷代詩話卷三十六
