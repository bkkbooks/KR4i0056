body:
  text: 歷代詩話卷四十二歸安吳景旭撰已集下之下録箋黃山谷曰新鬼煩寃舊鬼哭夏父勿忌云吾見新鬼大故鬼小禾頭生耳黍穗黑齊民要術秋雨甲子禾頭生耳春光淡沱度千門富嘉謨明氷為春氷淡沱度千門明氷時出御至尊始出枝撑幽慈恩塔下數級皆枝撑洞黑出上級乃明業白出石壁寶積經若純黑業得純黑報純白業得純白報山鬼獨一腳山魈出江州獨足鬼射人先射馬樂伯左射馬而右射人無不能進是身如浮雲維摩經是身如浮雲須臾變滅向子識損益向子平讀易至損益嘆曰吾巳知富不如貧貴不如賤也徒旅慘不悅一本云徒懷松柏悅嵗拾橡栗隨狙公後漢李恂居新安關下拾橡栗以自資我生托子以為命嵩記半山多杏自中國喪亂百姓資此為命不唾青城地古樂府去婦情更重千里不唾井眼中之人吾老矣魏文帝詩回頭四向望眼中無故人陸雲詩感念桑梓城髣佛眼中人牛馬毛寒縮如蝟西漢元封中雪大寒牛馬皆踡縮如蝟仙李盤根大唐太宗探得李詩云盤根植瀛渚交幹倚天舒封題鳥獸形宋王徽茯苓贊中狀雞鳬具容龜蔡舉家聞若駭當作咳禺屬惟猿喜怒飲食常作咳籠竹和煙露滴梢籠音夢籠竹蜀人名大竹云漰口紅如練蒲懵反在彭州蠶崖雪似銀蠶崖在茂州帶雪山更厯少城闉少城今成都府治張儀所築軍吏回官燭巴祗為揚州刺史與客坐暗中不然官燭久遊巴子國左氏桓九年巴子請與鄧為好巴姬姓國在巴郡江州縣南逰北戶開林邑日南諸國皆開北戶向日刈葵莫放手放手傷葵根此引前漢永平詔權門請托殘吏放手之放手復齊云古詩采葵莫傷根傷根葵不生杜取此昨夜邀歡樂更無多才依舊能潦倒注引嵇康傳淺陋乃魏天保以後重吏事謂容止藴藉者潦倒出此也南朝何子季居若耶溪雲門寺與二兄求㸃並棲遁世號三髙敕給白衣尚書祿不受故山水障圖末云若耶溪雲門寺吾獨何為在泥滓青鞋布襪從此始蓋有隱遁之興也菱葉荷花淨如拭拭訓淨雜記饔人拭羊拭淨也峽束蒼江起巖排石樹圓石樹石楠也時時乞酒錢乞與也丘既切看題减藥囊一作撿撿字乃合詩意臣子憂四番當作憂思番九鑽巴噀火三蟄楚祠雷則往來兩川九年在䕫府三年可知矣胡苕溪云又有十暑岷山葛三霜楚戶砧之句詩譜謂公以乾元已亥冬至蜀不以暑計起明年庚子至是為十暑時已在湖南獨言岷山永泰乙巳秋至雲安雲安荆湖皆楚地至是合為五霜而云三者獨以峽中言之鬬雞詩觀風樓南起鬬雞殿人間有賜金漢書髙后紀遺詔賜諸侯王各千金織女機絲虛夜月池中有戈船各四百艘四角各垂幡旄旌葆又作二石東西相對以象牽牛織女畫省香爐違伏枕尚書郎入直女侍史執香爐燒熏護衣服漢官儀賜被隔南宫給青縑白綾被或錦被已上同蔡興宗曰海右此亭古濟南名士多濟南實海右諸郡舊集一作海右今從之正文作海內非也拂天萬乘動觀水百丈湫拂字從一作兼畫馬詩有云翠華拂天來向東正文作沸非也君臣留歡娛樂動殷嶱嵑殷從上聲嶱嵑出文選音渴曷集韻山貌舊集作殷湯嶱音字皆誤蓋緣湯字之訛二字從而倒之他詩二字悮倒之者非一豈知秋禾登貧寠有倉卒别本禾字一作未今從之按此詩十一月作禾字明矣昌黎謂年登而妻啼飢實此意也隂風西北來慘淡隨回紇紇字從一作鶻唐史德宗朝始改名回鶻正文非也中興諸將收三東捷書夜報清晝同夜字從王介甫謂捷書晝夜至也舊作日今不取渡河不用船千騎常撇捩撇捩疾貌大食刀歌云鬼物撇捩辭坑壕字意皆同舊集作撇烈非也嬋娟碧蘚靜蕭摵寒籜聚蘚字從别本舊集作鮮蓋字畫小缺而釋者云嬋娟碧鮮皆謂竹也尤謬長夜苦寒誰獨悲杜陵野老骨欲折此成都詩舊集作長安非也其夜字之訛故誤作安耳况卒章之意明甚南京亂初定所向色枯槁色字從别本他詩亦云朝野色枯槁正文作邑今不取樹枝有鳥亂棲時暝色無人獨歸客棲字從一作正文作鳴今不取言亂棲則鳴可知矣髙皇亦明王魂魄猶正直皇字舊集諸本皆作堂近見别本作皇今從之乃與上下數聮詩意相貫也詢之閬人其漢髙祠廟今尚存焉别離重相逢偶然豈足期足字舊本作定蓋由字畫小訛况上句巳云泄雲無定姿主守問家臣分朋見溪畔耘者必分朋曹而進故東坡逺景樓記謂耘者畢出數百人為曹者是也舊作明乃字小訛耳風吹巨熖作河漢騰烟柱諸本下句作何棹騰烟柱蜀本何作河近見别本今從之蓋於詞意通也大火運金氣荆揚不知秋火字從一作謂大火西流七月詩也正文作暑今不取終然契真如得匪金仙術二句並從一作正文作終契如往還得匪合仙術今不取幾度寄書白鹽北故人贈我青絲裘絲字從一作縑别本正文止作絲字此詩寄裴施州者或謂裴冕非也按唐史冕以寶應元年貶施州刺史不數月移澧州距此巳六年矣配極𤣥都閟憑髙禁籞長籞字舊集諸本皆作蘌按西漢宣帝紀云池籞者其字從竹今從之茂樹行相引連山望忽開茂字連山字皆從一作時歸鳯翔行在正文連山作連峯非也霧樹亦然掖垣竹埤梧十尋洞門對霤常隂隂霤字從别本文選云二堂作霤此春深詩也諸本作雪誤江上小堂巢翡翠苑邊髙塜卧麒麟苑字從一作正文作花蓋字畫小訛而說者云一詩連用三花字不害為工悮矣雲斷嶽蓮臨大路天晴宫柳暗長春大路陕華間地名也晉書檀道濟從劉裕伐姚泓至潼關姚鸞屯大路以絶道濟糧道而蜀本正作大道誤矣力疾坐清曉來詩悲早春詩字從别本考詩題與上下句意當從之舊作時非也合觀却笑千年事驅石何時到海東題云觀造竹橋即日成句中合觀字謂聚觀橋成之速而笑驅石之誕舊集諸本皆訛作歡非也已上同胡苕溪曰冬狩行自從獻寶朝河宗穆天子傳天子西征至陽紆山河伯馮夷之所居是為河宗天子沉璧禮焉河伯與天子披圖示典以觀天下寶器秋日夔府詠懷詩穰多栗過拳西京雜記上林苑嶧陽栗大如拳又云門求七祖禪傳燈録北宗神秀門人普寂立其師為第六祖而自稱七祖題鄭監湖上亭詩髙唐寒浪减髣佛識昭丘荆州圖記當陽東南七十里有楚昭王墓登樓即見所謂昭丘也八哀張九齡詩仙鶴下人間獨立霜毛整張九齡家傳九齡初生母夢九鶴從天而下秋興昆吾御宿自逶迤事見揚雄傳武帝開廣上林南至宜春鼎湖御宿昆吾三輔黃圖御宿苑在長安城南御宿川中武帝離宫禁籞人不得入逰觀止宿其中故曰御宿舊唐書郭子儀上言吐蕃黨項不可忽宜早為備廣德元年遣李之芳等使吐蕃為所留二年乃得歸故哭李之芳詩奉使失張騫蓋此事也代宗自楚王徙封成王洗兵馬云成王功大心轉小代宗時為元帥故也梅雨詩南京犀浦道四月熟黃梅今本犀作西非是犀浦在成都府二十五里太守李氷作五石犀沉江以壓水怪因以名縣出成都記北征詩不聞夏商衰中自誅褒妲褒姒周幽王后也疑夏字為誤當云商周可也老翁須地坐細細酌流霞今本地坐改作地主可謂狗尾續也棕拂子詩不堪代白羽有足除蒼蠅山谷言事見新唐書適從何處來者是也注引營營青蠅其義安在豫謂此說誤矣此乃元稹事在子美後子美以對白羽皆係前代事王勉夫謂此雖不足以代白羽亦可以驅蒼蠅非謂代白羽以除蒼蠅也杜詩二意而山谷以一意認之故有此誤憶昔行落日初霞閃餘映倐忽東西無不可王屋山中日西落而人影或在西日東出而人影或在東不可致詰贈李八祕書詩往時中補右扈蹕上元初然少陵罷拾遺時是至德初上元乃至德後以年譜考之信然蓋其為扈蹕上之初元耳前出塞五首為戍兵作後出塞五首為赴募者作解悶詩孟子論文更不疑李陵蘇武是吾師舊本李陵句在上子美自注云校書郎孟雲卿即所謂孟子也此但論詩俗謂孟軻乃移孟子句在上非也六月擴摶扶按莊子摶扶搖而上者九萬里疏云摶鬬扶搖旋風也今云摶扶是歇後語山鳥山花吾友于陶彭澤詩一欣侍溫顔再喜見友于然則子美承之也唐史張垍尚寧親公主明皇即禁中置內宅故贈詩云天上張公子宫中漢客星又長安志拾翠殿在大明宫翰林門外望雲亭在太極宫景福殿西故次聮云賦詩拾翠殿佐酒望雲亭皆禁中事也巳上同蔡寬夫曰同谷縣七歌嗚呼四歌兮歌四奏竹林為我啼清晝有人自同州來籠一禽大如雀色正青善鳴問其名曰此竹林鳥也今本作林猿非也與奴白飯馬青芻雖不言主人而待奴馬如此則主人可知詩所謂言刈其楚言秣其馬言刈其蔞言秣其駒同意蓋少陵逺繼周詩法度山谷云為君酟酒滿眼酤與奴白飯馬青芻傅𤣥盤中詩羊肉千斤酒百斛令君馬肥麥與粟小城萬丈餘大城鐵不如則小城難為髙大城難為堅故也先生有才過屈宋注云先生所談或屈宋王荆公百家詩選則捨正本而從注且如今年冬未休關西卒注云如今從得歸休為關西卒荆公則刋而從正本已上同復齊曰送李功曹之荆州詩孤城一柱觀落日九江流博物志江陵有臺甚大而惟有一柱衆梁皆共此柱後人呼為木履觀或呼為一柱觀曲江對酒詩水精宫殿轉霏微述異記吳王闔閭造水精宫又魏略大秦國以水精為屋柱題𤣥武禪師屋壁詩何年顧虎頭滿壁畫瀛洲瀛字乃滄字故王介甫云畫史雖非顧虎頭還能滿壁畫滄洲嚴有翼云何年顧虎頭注虎頭僧相也虎頭金粟影注虎頭維摩相也考南史師子國晉義熙初遣使獻玉像髙四尺二寸此像厯晉宋瓦棺寺先有戴安道手製佛像五軀及顧長康維摩畫圖世號三絶所謂虎頭即顧長康耳注家或云僧相或云維摩相可笑山水障歌聞君掃却赤縣圖史記鄒衍中國赤縣神州內有九州晉書紀贊赤縣成蛇豕之區紫宸遊龜鼉之穴唐亦有赤縣謂畿縣尉也漁陽突騎猶精鋭後漢吳漢說太守彭寵曰漁陽突騎天下所聞也君何不合二郡精鋭附劉公擊邯鄲此一時之功也早時金碗出人間鄧忠臣引茂陵玉碗為證嚴有翼亦引南史沈炯所奏云甲帳珠簾一朝零落茂陵玉碗遂出人間胡苕溪謂以盧充為是少陵豈以玉碗為金碗哉蓋指盧充幽婚之事而言巳上同漫叟曰草有害於人曽何生阻修芒刺在我眼焉能待時秋其憤邪嫉惡欲芟夷藴崇之以肅清王室者中懷可見桃花細逐楊花落黃鳥時兼白鳥飛徐師川說一士大夫家有老杜墨蹟其初云桃花欲共楊花語自以淡墨改三字呌怒索飯啼門東說者謂庖厨之門在東已上同嚴有翼曰留花門詩花門既須留原野轉蕭瑟唐地理志甘州删丹縣北渡張掖河西北行出合黎山峽口傍河東壖屈曲東北行千里有寧寇軍軍東北有居延海又東北三百里有花門山堡又東北千里至回鶻牙帳故謂回鶻為花門也䕫府詠懷詩卜羡君平杖漢史嚴君平卜於成都市日得百錢則閉肆下簾未嘗言杖注引阮宣子百錢拄杖頭與君平無涉豈少陵之誤與同上潘子真曰逰子久出門外戶無人持古樂府健婦持門戶勝一大丈夫山谷云縱有健婦持鋤犁亦出此樂府語竊效貢公喜劉孝標廣絶交論王陽登則貢公喜罕生逝而國子悲人來坐馬韉蘇秦激張儀相秦以馬韉席坐之門闌多喜氣女壻近乘龍楚國先賢傳孫雋與李元禮俱娶太尉桓叔元女時謂桓兩女乘龍言得壻如龍也宋景文詩承家男得鳯擇壻女乘龍巳上同蘇子瞻曰嘗夢子美謂八陳詩遺恨失吞吳世人誤謂先主武侯皆欲與關某復仇故恨不能滅吳非也我意本謂吳蜀唇齒之國不當相圖晉之所以能取蜀有吞吳之意此為恨耳陳后山曰懷薛璩詩獨當省署開文苑兼泛滄浪學釣翁蓋省署開文苑滄浪學釣翁璩之詩也洪駒父曰佛經稱善巧方便僧璨惠可二祖師名故詩云何偕子方便又云吾亦師璨可注乃謂子方田子方璨可詩僧甚踈略學林新編曰中秋月詩滿目飛明鏡歸心折大刀注引古詩藁砧今何在山上復有山何當大刀頭破鏡飛上天謂殘月也按樂府所載藁砧者鈇也藁砧今何在問夫何在也山上復有山言夫出也大刀頭者環也何當大刀頭者何日當還也破鏡者月半也破鏡飛上天者言半月當還也子美詩言雖有歸心而大刀折則未能還也注乃訓為殘月誤矣黃伯思曰得子美詩集與今行槧本小異如忍對江山麗印本對乃作待雅量涵髙逺印本涵乃作極同上王伯厚曰杜審言詩綰霧青條弱牽風紫蔓長若子美云林花著雨胭脂濕水荇牽風翠帶長審言詩寄語洛城風日道明年春色倍還人子美又云傳語風光共流轉暫時相賞莫相違語脈蓋有家法同上張邦基曰鄭南伏毒守瀟灑到天心守當作寺華州圖經有伏毒寺劉禹錫集有舅氏牧華州前後諸陪登伏毒嵓劉禹錫詩曽作關中客頻經伏毒嵓羅大經曰色難臭腐食風香色難臭腐用仙家王方平事食風香三字佛書云凡諸所嗅風與香等王仲言曰蛟龍得雲雨鵰鶚在秋天一聮巳見晉書載記矣邵博曰杖藜妨躍馬不是故離羣離字如律當讀平聲檀弓離羣索居釋文離字讀去聲音利姚令威曰送孔巢父詩幾嵗寄我空中書用史宗引小兒騰空覺腳下有波濤寄書事乃蓬萊仙人也洪慶善云空中書乃鴈足書非也弩影落杯中風俗通應彬飲杜宣酒壁上懸赤弩照杯中形如蛇宣惡之謂蛇入腹遂病後至其故處知弩影遂解塵匣元開鏡風簾自上鈎乃用沈佺期臺前疑掛鏡簾外自懸鈎皆月詩王防元規嘗云杜詩古本辭人解撰河清頌詩成珠玉在揮毫蓋為和舍人故云青青竹笋迎船出白白江魚入饌來蓋為送扶侍故云邵博云日日江魚入饌來後得古本日日作白白不但於句甚偶其思致亦不同贈韋十六評事詩子雖軀幹小晉書載劉曜時壯士陳安戰死隴上歌之曰隴上健兒有陳安軀幹雖小腹常寬秋興聞道長安似奕棋用寧子視君如奕棋事蔣防作霍小玉傳書大厯中李益事有一豪士衣輕黃衫挾朱筋彈李至霍遂死乃三月牡丹時也少年行云巢燕引雛渾去盡江花結子已無多黃衫年少宜來數不見堂前東逝波考作詩時大厯間杜政在蜀想有好事者傳去作此詩爾越王樓詩綿州州府何磊落顯慶年中越王作孤城西北起髙樓碧瓦朱甍照城郭綿州圖經越王臺在綿州城外西北有臺髙百尺上有樓下瞰州城唐顯慶中太宗子越王真任綿州刺史日作已上同王勉夫曰上韋左丞詩丈人試靜聽賤子請具陳甫昔少年日早充觀國賓此用鮑昭東武吟云主人且勿喧賤子歌一言僕本寒鄉士出身䝉漢恩前此應休璉詩避席跪自陳賤子實空虛古詩四坐且莫喧願聽歌一言速令相就飲一斗人多引鮑昭且願得志數相就以證相就二字有所自不知相就飲三字見庾信詩野人相就飲往昔十四五出遊翰墨場阮籍詩昔年十四五志尚好詩書昔如水上鱗今如罝中兔鮑昭詩昔如韝上鷹今如檻中猿山青花欲燃沈約詩山櫻花欲燃巳上同宋子京手書杜詩新炊問黃粱乃是聞黃粱葛常之曰香飯兼苞蘆苞蘆蜀鮓也放船詩直愁騎馬滑故作泛舟回於對聮中十字作一意詩家謂之十字格客夜詩客睡何曽著秋天不肯明陪王使君泛江詩山豁何時斷江平不肯流不肯二字含蓄甚佳與淵明日月不肯遲四時相催迫同意天寶十三載獻太清宫饗廟及郊三賦帝竒之使待制集賢院命宰相試文章故有贈集賢崔于二學士詩舊注陳希烈韋見素為宰相而崔國輔于休烈集賢院學士也故末句云謬稱三賦在難述二公恩按唐史是嵗陳希烈為相至八月見素代之而甫有上見素詩持衡留藻鑑聽履上星辰則甫之文為見素所賞非希烈也柏中允除官制詩舊注以為柏耆又以為正節按詩云紛然喪亂際見此忠孝門蜀中寇亦甚柏氏功彌存三止錦江沸獨清玉壘昏當是有功於蜀者時假子璋反于上元徐知道反于寶應而正節為卭州刺史數有功則是正節無疑矣萬古仇池穴潛通小有天東坡在潁川夢至一堂榜曰仇池按唐書同谷縣有仇池與秦州接壤故老杜秦州雜詩藏書聞禹穴讀記憶仇池送韋十六赴同谷詩受詞太白腳走馬仇池頭王仲至奉使過仇池有九十九泉萬山環之可以避世如桃源而仇池詩乃謂近接西南境長懷十九泉何邪銅瓶詩亂後碧井廢時清瑶殿深其末云蛟龍雖缺落猶得折黃金則以古物要厚資自古而然已上同洪容齊曰折檻行千載少似朱雲人至今折檻空嶙峋婁公不語宋公語尚憶先皇容直臣婁師德乃是武后朝人宋璟為相時其亡久矣詩言先皇意為明皇帝也婁氏别無顯人有聲開元間秦州雨晴詩天永秋雲薄從西萬里風謂秋天遼永風從萬里而來可謂廣大而集中作天水此乃秦州郡名若用之入此篇其致思淺矣野望因過常少仙一篇所謂落盡髙天日幽人未遣回者蜀士注曰少仙應是言縣尉也縣尉謂之少府而梅福為尉有神仙之稱少仙二字尤為清雅與今俗呼為仙尉不侔矣能畫毛延夀投壺郭舍人每蒙天一笑復似物皆春政化平如水皇恩斷若神時時用抵戲亦未雜風塵第三聮與前語不相聨貫或以為疑按杜之㫖本謂技藝倡優不應䝉人主顧盼然使政化如水皇恩若神為治大要既無所損時時用此輩赤無害巳上同楊升菴曰數回細寫愁仍破寫洗野切禮記器之溉者不寫其餘皆寫注謂傳之器中史記始皇三十五年寫蜀荆地材皆至關中三十六年每破諸侯寫放其宫室作之咸陽左傳注寫器令空東觀漢記封車載貨寫之權門晉㕁夫人語二弟云傾筐倒寫湖月林風相與清湖上林中地巳清矣湖有月林有風景益清矣故著相與清字俗本作湖上或作湖水皆淺既有湖不須著水字若云湖上林風不得著相與清字白首重聞止觀經佛經云止能捨樂觀能離苦又云止能修心能斷貪愛觀能修慧能斷無明止如定而后能靜觀則慮而后能得也西京雜記云太液池中有雕苽紫籜緑節鳬雛鴈子唼喋其間三輔黃圖云宫人泛舟采蓮為巴人櫂歌便見人物遊嬉宫沼富貴今一變云波漂苽米沉雲黑露冷蓮房墜粉紅讀之則苽米不收而任其沉蓮房不採而任其墜兵戈亂離之象具見矣杜詩之妙在翻古語滕王亭詩春日鶯啼修竹裏仙家犬吠白雲間修竹用梁孝王事犬吠雲中用淮南王事人皆知之矣豫嘗怪修竹本無鶯啼字也後見孫綽蘭亭詩啼鶯吟修竹遊鱗戲瀾濤乃知老杜用此更取楸花媚逺天今本作椒花非椒花色緑與葉無辨不可言媚巳上同祝廉夫曰髙秋登寒山南望馬邑州唐書寶應元年徙馬邑州于鹽井城鮑欽止謂馬邑州在城州界為有據矣舊注馬邑屬鴈門與杜作詩處全無涉焦弱侯曰諸將詩天下軍儲不自供唐制府兵有事則徴為兵無事則散為農是軍儲皆自供也今兵不得休故軍儲但取别孔而不自供惟王縉由侍中拜河南副元帥力興屯田不失唐之舊制故結云稍喜臨邊王相國肯銷金甲事春農特歸美之王弇州曰善本勝者把君詩過目作把君詩過日皇甫百泉曰杳杳東山携漢妓謝安所携豈漢妓陳無功曰知章騎馬似乘船阮咸醉騎馬欹傾時人指而笑曰個老子騎馬如乘船行波浪中輕輕柳絮㸃人衣後主與張麗華逰園有柳絮㸃衣張謂後主曰何能㸃人衣曰輕薄物試卿意也江風借夕凉假瑄泛舟江風清冷瑄欣然曰馮夷借我一夕之凉已上同劉子威曰天吳及紫鳯紫鳯無出必九鳯也大荒經有神九首人面鳥身名曰九鳯顧朗仲曰親朋盡一哭鞍馬去孤城送逺之事盡矣歸而思之草朩之嵗月如彼關河之霜雪如此别離之况倐巳昨日因以見古人之情莫深于送别良有以也盧德水曰遷擢潤朝廷潤字入微見朝廷擢一大雅之士如膏雨油雲潛滋密沐裨益不小自古江湖客冥心若死灰蓋讒柄禍胎俱萃於朝市一至江湖而宇宙寬矣然心不冥即江湖儘有風波故必冥心若死灰而後洗手濯足脫然無礙此嘉遁而肥者也覺結舌探腸猶是第二義同上晴天飬片雲吳季海本作養他本皆作卷晴天無雲而飬片雲於谷中則崖谷之深峻可知矣山澤多藏育山川出雲皆叶飬字之義曲江值雨詩龍武新軍深駐輦芙蓉别殿謾焚香何時詔此金錢㑹暫醉佳人錦瑟旁此懷𤣥宗南內之詩也𤣥宗用萬騎軍以平韋氏改為龍武軍親近宿衛今深居南內不復如昔日逰幸矣興慶宫南樓下臨通衢時置酒眺望然欲由夾城以達曲江芙蓉苑不可得矣曰深駐輦曰謾焚香則其深宫寂寞可想見矣金錢之㑹無復開元之盛雖對酒感歎意亦在上皇也諸將詩豈謂盡煩回紇馬翻然逺救朔方兵此責諸將之反借助於人也自回紇助順收復兩京之後雍王之討朝義子儀之敗吐蕃皆用回紇之力故曰盡煩回紇僕固懷恩曰朔方將士為先帝中興主人是陛下蒙塵故吏故曰逺救朔方龍起猶聞晉水清追歎晉陽起義之時所謂神堯以一旅取天下也諸將詩越裳翡翠無消息南海明珠久寂寥殊錫曽為大司馬總戎皆插侍中貂此言朝廷不當使中官為將也楊思朂討安南五溪殘酷好殺而越裳不貢矣吕太一收珠廣南阻兵作亂而南海不靖矣以中官拜兵部尚書者李輔國也所謂殊錫也以中官為觀軍容使者魚朝恩也所謂總戎也炎風朔雪皆天王之地不精求忠厚以翊聖朝偏用一二中人専將帥之重任潰僨國事豈不謬哉巳上同張綖曰一雙白魚不受釣峽有嘉魚長身細鱗肉白如玉春社前出穴秋社即歸時巳九月故不受釣徐興公曰三寸黃柑猶自青凡柑皆圓獨成都産者形如鴨卵故云三寸言其長也田子藝曰㑹須上番看成竹竹之有上番下番即今言大番小番也番去聲謂大年生笋多小年生笋少也顧修逺曰青袍白馬有何意庾子慎亂後經吳郵亭云青袍異春草白馬即吳門庾信哀江南賦云桀黠搆扇馮陵畿甸青袍如草白馬如練正用此語金聖歎曰劉九法曹鄭瑕丘石門宴集題中無枉字又無陪字然則先生不與宴集矣如何又有此詩及讀緣曹乘逸興鞍馬到荒林能吏逢聮璧華筵直一金而後知劉乃枉駕鄭則夤緣一假幽事敗於俗物故不書枉書陪葉有大云末二句逰山動用鼓吹自是俗吏惡習歷代詩話卷四十二
