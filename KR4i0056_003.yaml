body:
  text: 歷代詩話卷三歸安吳景旭撰甲集中之上三百篇鹿鳴鄭漁仲曰當漢之初去三代未逺雖經生學者不識詩而太樂氏以聲歌肄業往往仲尼三百篇瞽史之徒例能歌也東漢之末禮樂蕭條雖東觀石渠議論紛紜無補於事曹孟德平劉表得漢雅樂郎杜夔夔老矣久不肄習所得惟鹿鳴騶虞伐檀文王四篇而已太和末又失其三左延年所得惟鹿鳴一笙每正旦大會太尉奉璧羣臣行禮東廂雅樂常作者是也古者歌鹿鳴必歌四牡皇皇者華三詩同節故曰工歌鹿鳴之三而用南陔白華華黍三笙以贊之然後首尾相承節奏有屬今得一詩而如此用可乎至晉室鹿鳴一篇又無傳矣自鹿鳴一篇絶後世不復聞詩矣吳旦生曰漢書王遵為益州刺史命王褒作中和樂職選好事者依鹿鳴習而歌之時汜鄉侯何武為童子選在歌中觀此則漢世聲歌之道尚能傳肄使齊魯韓毛四家不尚訓義而相習以聲則三百篇當至今可歌也盬王事靡盬吳旦生曰盬亦鹽也出於河東之解池引池水灌畦自結成者不經久而易壞故訓不堅固按周禮鹽人共其苦鹽讀為盬謂鹽不鍊治也鴇羽注鹽不攻緻曰盬蓋海鹽鍊治後成其鹽難壞池鹽出水即成而易壞即所謂不攻緻不堅固也漢書食貨志云猗頓用盬鹽注盬鹽池也於盬造鹽故盬音古水經注云本司鹽都尉治領兵一千餘人守之周穆王漢章帝並幸安邑而觀鹽池後罷尉司分猗氏安邑置縣以守之鄂不棠棣之華鄂不韡韡楊升菴曰不風無切鄭玄云承華者鄂不當作柎鄂是也不古與柎同又作跗曹憲曰鄂花苞也今作萼詩疏云花下有萼萼下有跗華萼相承覆故得韡韡而光明也由花以覆萼萼以承華華萼相覆而光明猶兄弟相順而榮顯唐明皇宴會兄弟之處曰花萼樓取此也注云鄂然而外見豈不韡韡乎非惟背詩義亦且背字義矣按束晳詩白華朱萼被於幽薄白華絳趺在陵之陬白華玄足在陵之曲其曰萼趺足皆可證詩疏意其字作柎跗趺又作足者花之足猶人之足也吳旦生曰周易震為敷敷之為言布也震於東方為春草木之萌始布也古文作敷今文作華蓋花之蒂也陸機文賦彼瓊敷與玉藻瓊敷即瓊華鄒潤甫遊仙詩紫芝列紅敷敷字書作跗古詩紅萼青跗定滿枝字又作荂莊子折揚皇荂通作華易枯楊生華老婦得其士夫夫與華為韻也左傳華不注山讀作入聲甚誤古不字讀作缶音或俯音并無作逋骨切者今讀如卜乃俗音耳惟伏琛言此山孤秀如花跗之注於水矣李太白詩昔我遊齊都登華不注峯兹山何峻秀彩翠如芙蓉即我郡有餘英餘不二溪蓋因梅溪苕溪其流相通故曰餘英餘不義可見矣若作方鳩切則本注説文不鳥飛上翔不下來也與溪水全不相涉嚶嚶伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木吳旦生曰古今注謂禽經稱鶯鳴嚶嚶要是後人附會非詩本意東臯雜録云鄭箋嚶嚶兩鳥聲正文與注皆未嘗及黃鳥自白樂天作六帖始類入鶯門中又作詩如谷幽鶯暫遷之類後人多祖述用之也野客叢書云觀張平子東京賦雎鳩麗黃關關嚶嚶然則以嚶嚶為黃麗用自漢已然不可謂自樂天始也嘉話録云今謂進士登第為遷鶯者久矣蓋毛詩伐朩篇並無鶯字頃嵗省試早鶯求友詩又鶯出谷詩别書固無證據斯大誤也緗素雜記云宋景文詩晚執谷鶯朋友動杏園初日待鶯遷王荆公詩鶯猶尋舊友又曲名喜遷鶯者皆循習唐人之誤也惟漢梁鴻思友人詩鳥嚶嚶友之期念髙子僕懷思南史劉孝標廣絶交論嚶嚶相召星流電激是真得毛詩之意余觀袁海叟答江漸詩谷鳥嚶其鳴求友聲亦屢況生蒸民間豈不念明助此真是毛詩疏語笙詩江鄰幾雜志曰南陔白華六篇有聲無詩故云笙不云歌也有其義亡其辭非失亡之亡乃無也吳旦生曰古文無字類作亡鄭康成以為及秦之世而亡之束廣微為作補亡皆是誤讀亡字耳儀禮疏云堂上歌者不亡堂下笙者即亡蓋所謂歌者有其辭所以可歌如魚麗嘉魚關雎以下是也無其辭者不可歌故以笙吹之南陔至於由儀是也按儀禮鄉飲酒及燕禮笙入於縣中奏南陔白華華黍又曰間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀此六詩皆主於笙奏之雖有其聲舉無辭句不若魚麗南有嘉魚南山有臺於歌奏之歌人聲也故有辭爾此則笙與歌之異也字書云漢律厯志亡射列子亡所不為相如賦亡是公並音無秦時始以蕃橆之橆為有無之無説文橆文甫切今借為有無字古經書皆篆文秦變篆為隸者改之字形詩書周禮春秋禮記論語本皆用無字乃變篆為隸者改之惟周易首尾盡用無字蓋變隸時不曽改易不在焚之數亦不得而改至於亡字亦有存而不改者論語有若亡亡而為有人皆有兄弟我獨亡不如諸夏之亡也以上數亡字獨不改者蓋變隸時誤讀為存亡之亡故存而不改也如晉侯享叔孫豹金奏三夏工歌六詩三夏者樂曲名擊鐘而奏亦以無辭故金奏之若文王六詩則工歌之矣故南陔以下亦謂之奏然則皮襲美之補肆夏與束廣微之補六亡詩同一詿誤不知肆夏乃金奏六亡乃笙奏有何辭之可補哉南陔序曰南陔孝子相戒以養也釋曰陔隴也言南者南方養萬物也吳旦生曰束廣微補亡云循彼南陔言采其蘭又云循彼南陔厥草油油其語意皆從隴字而生也按困學紀聞云陔當訓戒鄉飲酒燕禮賓醉而出奏陔夏鄭氏注陔之言戒也以陔為節明無失禮又泊宅編云陔何以有戒意據周官械夏儀禮作陔字則陔通於械且辰窮於亥是戒之時也漢制考云鐘師械夏注杜子春云械讀為陔鼓之陔疏漢有陔鼓之法據此則陔字別自有義廣微不契勘耳栲杻南山有栲北山有杻吳旦生曰栲去九切説文作􅀈從尻為聲草木疏云許慎讀栲為糗今人言考失其聲也爾雅栲山樗疏亦云許讀為糗徐鉉注説文作若浩切不考之罪也況栲與杻合韻乃正讀非叶也舊叶音口杻檍也字書云檍梓屬此木枝葉可愛二月花白子似杏今官園種之取萬億之義改名萬嵗樹謝朓詩風動萬年枝正指此也何晏景福殿賦綴以萬年注云晉武帝華林園有萬年樹二十四株江左謂之冬青樹唐詩青松忽似萬年枝三體詩注以為冬青韓子蒼冬青詩無人識是萬年枝凡此皆謬元老方叔元老克壯其猷吳旦生曰鹽鐵論引此詩而云商師若烏周師若荼蓋謂商用少而周用老也甫草東有甫草吳旦生曰吕氏春秋九藪梁之圃田爾雅十藪鄭有圃田穆天子傳天子里甫田之路東至於房水經注云渠水自河與沛亂流東滎澤北東南分沛歷中牟縣之圃田澤北與陽武分水澤多麻黃草故述征記曰踐縣境便覩斯卉窮則知踰界詩所謂東有甫草也皇武子曰鄭之有原圃猶秦之有具囿也按澤在中牟縣西西限長城東極官渡北佩渠水東西四十許里南北二十許里中有沙岡上下二十四浦津流徑通淵潭相接各有名焉水盛則北注渠溢則南播故竹書紀年梁惠成王十年入河水於甫田又為大溝而引甫水者也鄭氏箋云鄭有甫田謂圃田鄭藪也止齋周禮説云詩不以圃田繫鄭王伯厚謂宣王封弟友於鄭在畿內咸林今華州鄭縣圃田澤左氏謂之原圃在今開封之中牟宣王時非鄭地小雅安得繫於鄭乎爾雅鄭有圃田蓋指東遷後鄭言之動靜隨意漫録曰蕭蕭馬鳴靜中有動也悠悠旆旌動中有靜也吳旦生曰舒王以風定花猶落對鳥鳴山更幽謂上句靜中有動下句動中有靜猶不失三百篇意至於杜子美詩風含翠篠娟娟淨雨裛紅蕖冉冉香上句風中有雨下句雨中有風楊誠齋詩緑光風動麥白碎日翻池上句風中有日下句日中有風方斯蔑矣梁書王籍入若耶溪詩蟬噪林逾靜鳥鳴山更幽顔之推云蕭蕭馬鳴悠悠旆旌毛傳言不喧譁也每歎此解有情致籍詩生於此意耳何氏語林謝貞八嵗為春日間居詩從舅王筠云如風定花猶落乃追步惠連矣則荆公取二梁時句以作對諧聲夢溪筆談曰古人諧聲有不可解者如玖字有字多與李字協用慶字正字多與章字平字協用如詩或羣或友以燕天子彼留之子貽我佩玖投我以木李報之以瓊玖終三十里十千維耦自今以始嵗其有君子有穀詒孫子陟降左右令聞不已膳夫左右無不能止魚麗于罶鰋鯉君子有酒旨且有如此極多又如孝孫有慶萬夀無疆黍稷稻粱農夫之慶惟其有章矣是以有慶矣則篤其慶載錫之光我田既臧農夫之慶萬舞洋洋孝孫有慶易曰西南得朋乃與類行東北喪朋乃終有慶積善之家必有餘慶積不善之家必有餘殃班固東都賦彰皇德兮侔周成永延長兮膺天慶如此亦多今廣韻中慶一音卿然如詩之未見君子憂心怲怲既見君子庶幾式臧誰秉國成率勞百姓我王不寧覆怨其正亦是怲正與寧平協用不止慶而已野客叢書曰古人諧聲似此甚多如野字音多與羽字音協家字音多與居字音協如詩曰吉日庚午既差我馬獸之所同麀鹿麌麌曰鶴鳴于九臯聲聞于野魚潛在淵或在于渚曰鴻雁于飛肅肅其羽之子于征劬勞于野曰燕燕于飛差池其羽之子于歸逺送于野是野字與羽字音協之例也曰山有扶蘇隰有荷華不見子都乃見狂且曰祈父豫王之爪牙胡轉豫于恤靡所止居曰昏姻之故言就爾居爾不我育復我邦家是家字與居字音叶之例也蔡寬夫詩話曰秦漢以來字書未備既多假借而音無反切平側皆通用如慶雲卿雲臯陶咎繇之類大率如此詩瞻彼日月悠悠我思道之云逺曷云能來燕燕于飛下上其音之子于歸逺送于南皆以為協聲野客叢書曰來字協思字者非來字是釐字耳如匡衡詩曰莫學詩匡鼎來匡説詩解人頤是亦以來字協詩字今吳人呼來為釐猶有此音南字協音字者非南字是吟字耳如文選賈謐詩曰昔與二三子遊息承華南拊翼同枝條翻然各異尋是也因考毛詩以下字協故字者是户字耳家字協蒲字者是孤字耳慶字協陽字者是羌字與卿字耳如詩爰有寒泉在浚之下有子七人母氏勞苦曰豫所蓄租豫口卒瘏曰豫未有室家曰先祖是皇神保是饗孝孫有慶萬夀無疆之類是也洪景伯隸釋曰周官注莪儀二字皆音俄詩以實維我儀協在彼中河樂且有儀協在彼中阿太玄亦以各遵其儀協不偏不頗左傳音蛾作蟻徐廣音檥船作俄漢碑凡蓼莪皆作蓼儀而司隸魯岐碑又作蓼莪野客叢書曰此猶商之阿衡或為倚衡猗衡之例也蓋古者率多以阿猗莪義等字同為一音賈誼鵩賦請問於服豫去何之吉乎告我凶言其災淹速之度兮語豫其期岑彭傳輿人歌我有枳棘岑君伐之我有蟊賊岑君遏之狗吠不驚足下生氂含哺鼓腹焉知凶災是以災字協時字音則災字合讀為緇漢人書災為災正此音也觀災災字協時字則知古人不獨以來字協釐字其二音亦本通用如此吳旦生曰觀沈存中蔡寬夫洪景伯三人之言而王勉夫諄諄皆有以推衍之可見古人協字當時必有其音自别有理況三百篇為詩祖即為韻祖乎詩家直説云古之詩韻如三百篇協用者西兆有高樓上與浮雲齊是也如洪武韻互用者灼灼園中葵朝露待日晞是也如沈韻拘用者有鳥西南飛熠熠似蒼鷹是也漢人用韻參差沈韻始為嚴整早發定山尚用山先二韻及唐取士遂為定式楊誠齋云今之禮部韻乃是限制士子成文不許出韻因難以見工爾至於吟咏性情當以國風離騷為法又奚禮部韻拘之哉未渠央古音略曰夜未央注未渠央也渠本作詎説文詎猶豈也字林未知詞也言未便至夜分也張儀傳云且蘇君在儀寧渠能乎注音詎古字少假借用之也又作巨漢書公巨能入乎吳旦生曰升菴引渠作詎則未詎二字連用何義余按左思魏都賦其夜未遽庭燎晰晰南史高爽題鼓詩面皮如許大受打未遽央野客叢書云今渠字多作平聲用然庭燎詩注渠其據切當呼遽謂夜未遽盡也古樂府王融三婦艷詩曰丈人且安坐調絃未遽央長安狹斜行曰丈夫且徐徐調絃詎未央淵明詩夀考豈渠央魯直詩木穿石槃未渠透並合呼遽史記尉陀曰使我居中國何渠不若漢班史作何遽不若漢益可驗也聰祈父亶不聰吳旦生曰宋時黃安中為神宗講詩至祈父之卒章上問曰獨言聰而不言明何也黃曰臣未之思上曰豈非軍事尚謀聰作謀故耶一日講詩至噫嘻振鷺豐年又問曰有祈則有報間之以振鷺何也黃對曰得四海之歡心以奉先王是以獲豐年之應此則從來説家所未及歷代詩話卷三
