body:
  text: 歴代詩話巻二十九歸安呉景旭撰戊集上之下漢魏六朝西北有浮雲皎然曰魏文帝有吞東南之意軍至揚子江口見洪濤洶湧歎曰此天地之所以限南北也遂賦詩而還檢魏文集且無此詩不知史臣憑何編録呉旦生曰鍾仲偉言西北有浮雲十餘首美瞻可翫始見其工不然何以銓衡羣彦對揚厥弟王弇州亦稱子桓西北有浮雲非鄴中諸子可及仲宣公幹逺在下風余考當時伐呉實至廣陵未至呉㑹安知詩中行行呉㑹之語非别有為而作耶然則詩非魏文不能作而遽引為軍至江口賦詩而還者史氏之妄也困學紀聞云呉㑹謂呉㑹稽二郡也莊子釋文云浙江為呉會分界三良曹植三良詩秦穆先下世三臣空自殘生時等榮樂既没同憂患誰言捐軀易殺身誠獨難攬涕豋君墓臨穴仰天歎呉旦生曰子車氏之三子曰奄息仲行鍼虎皆秦之良也穆公與羣臣飲酒酒酣公曰生共此樂死共此哀奄息等許諾及公薨皆從死國人哀之賦黄鳥焉選注植被文帝責黜悔不隨武帝死而託是詩皎然云秦穆先下世三臣空自殘盖以陳王徙國任城被責以後常有憂生之慮故其詞婉婉存幾諌也王仲宣詩結髮事明主受㤙良不貲臨没要之死安得不相隨陶淵明詩厚㤙顧難忘君命安可違此即子建所謂生時等榮樂既没同憂患也東坡過穆公墓詩昔公生不誅孟明豈有死之日而忍用其良乃知三子殉公意亦如齊之二子從田横子田和詩當年不幸見廹脅詩人尚記臨穴惴豈如田横海中客中原皆漢無報所坡謂三子自欲從死似非惴惴臨穴之㫖故子由為此以矯正之耳坡後和陶詩顧命有治亂臣子得從違魏顆真孝愛三良安足希盖責康公不能如魏顆不用亂命以䧟父不義也此晩年識定之語槩曹植贈丁儀王粲詩員闕出浮雲承露槩㤗清呉旦生曰劉坦之補注槩平斗斛噐言露盤髙擎其状似之選詩句圖云槩與扢同古字通廣雅云扢摩也李善注槩音屹葢古音有此讀不可不知也都蔗曹子建都蔗詩云都蔗雖甘杖之必折巧言雖美用之必滅呉旦生曰馮衍杖銘云都蔗雖甘猶不可杖佞人悦已猶不可相與子建同義張景陽都蔗賦云挫斯蔗而療渇若潄醴而含蜜宋玉招魂有柘漿些王逸注取諸蔗之汁為漿飲也相如賦諸柘巴苴注言甘柘也則甘蔗謂之都蔗又謂之諸蔗一作藷集韻南方有􅦠􅀈林本草甘蔗有三種赤色者曰崑崙蔗白色者竹蔗亦名蠟蔗小而燥者曰荻蔗宋神宗問吕惠卿曰蔗字从庻何也曰凡草木種之俱正生蔗獨横生盖庻出也故从庻如雨王仲宣贈蔡子篤詩風流雲㪚一别如雨呉旦生曰一居濟岱一客江行而此一别如雨既下不復還雲中也顔延之和謝監詩朋好雨雲乖正用此意謂雨離雲不復合耳劉孝標廣絶交論云烟霏雨㪚蔡邕表志云灰㓕雨絶子建文帝誄云雲徃雨絶張載詩雲乖雨㪚江文通雜體詩雨絶無還雲傅𤣥辭忽如雨絶雲郭璞詩一乖雨絶天老杜詩别離同雨㪚㶚陵皎然曰仲宣詩出門無所見白骨蔽平原路有飢婦人抱子棄草間顧聞號泣聲揮涕獨不還未知身死䖏何能両相完驅馬棄之去不忍聽此言此事在耳目故傷見乎詞及至南登㶚陵岸回首望長安思慕則已極覧詞則不傷一篇之功併在於此使古今作者味之無厭末句因悟彼泉下人盖以逝者不返吾将何親故有傷心肝之歎沈約云不傍經史直率胸臆吾許其知詩也呉旦生曰㶚陵文帝所葬䖏故接以泉下人其云悟彼泉下人喟然傷心肝陶淵明詩感彼柏下人安得不爲歡正同意也今本作下泉人遂謂下泉曹風詩篇其詩有念彼周京之句正是望長安而有感其説反覺支離楊升菴云劉文房詩已是洞庭人猶㸔㶚陵月孟東野詩長安日下影又落江湖中語意相似皆寓戀闕之意總不若仲宣㶚陵二句涵蓄藴藉自然不可及也余觀宋武帝将北伐登城屬咏謝晦誦㶚陵四句流涕因之輟駕茍非感諷良深又安能移人至此哉百一詩石林詩話曰鍾嶸論淵明乃出於應璩璩詩不多見惟文選載其百一詩一篇所謂下流不可䖏君子慎厥初者與陶詩了不相類五臣注引文章録云曹爽多違法度應璩作詩以刺在位若百分有補於一者淵明正以脱畧世故超然物外為適顧區區在位者何足累其心哉呉旦生曰郭茂倩雜體詩載百一詩凢五篇韻語陽秋云郭所載五篇首篇言馬子候觧音律而以陌上桑為鳳将雛二篇傷翳桑二老無以葬妻子而已無宣孟之德可以賙其急三篇言老人自知桑榆之景斗酒自勞不肯為子孫積財末篇即文選所載是也第四篇似有風諌所謂茍欲娯耳目快心樂腹腸我躬不悦懽安能慮死亡此豈非所謂應焚棄之詩乎唐藝文志璩有百一詩八巻李充翰林論璩作五言詩百数十篇孫盛晉陽秋璩作詩百三十篇葢鍾常侍在梁時或見其全詩而格調㫖趣陶若近之故有此語而石林去古愈逺僅據文選之一篇遂可輕議古人耶按樂府廣題云百者数之終一者数之始士有百行終始如一者以士行而言也七志云以百言為一篇者以字数而言也何遜有擬百一體其詩一百十字今郭所載五篇刋在古詩紀中不過四十字何曽論字数乎歴代詩話巻二十九
