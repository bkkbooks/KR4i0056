  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0056_WYG_028-1a, image: WYG1483/WYG1483-0191a.png}
body:
  text: 歷代詩話卷二十八歸安吳景旭撰戊集上之上漢魏六朝豕韋容齋四筆曰韋孟諷諌云肅肅我祖國自豕韋總齊羣邦以翼大商至於有周歷世會同王赧聽譛實絶我邦我邦既絶厥政斯逸賞罰之行非繇王室庶尹羣后靡扶靡衛五服崩離宗周以墜觀孟之自敘乃祖而乖踈如是周至赧王僅存七邑救亡不暇豈能絶侯邦乎周之積微久矣非因豕韋一國然後五服崩離也左傳范宣子之言曰丐之祖在商為豕韋氏在周為唐杜氏杜預曰豕韋國於東郡白馬縣殷末國於唐周成王滅之此最可證吳旦生曰按陶唐氏既衰其後有劉纍學擾龍以事孔甲賜氏曰御龍以更豕韋之後纍尋遷魯縣豕韋復國至商而滅纍之後世復承其國為豕韋氏此丐所謂在商為豕韋氏也周成王滅唐遷封杜伯為宣王所滅杜泄奔魯因以為氏此丐所謂在周為唐杜氏而預所謂周成王滅之也則非王赧所絶明矣蔡墨云國有豢龍氏有御龍氏後漢有侍御史擾龍宗豈其苖裔歟江漢蘇武詩俯觀江漢流仰視浮雲翔宋人謂在長安而言江漢疑非本作楊升菴曰不然班固藝文志有蘇武集李陵集之目摯虞晉初人也其文章流别志云李陵衆作總雜不類殆是假托非盡陵志至其善篇有足悲者以此考之其來古矣即使假托亦是東漢及魏人張衡曹植之流始能之吳旦生曰蔡寬夫言注者直指為使絶域時作故人多疑之安知武未嘗至江漢耶余據五臣注江漢流浮雲翔皆喻客逰不止李善注江漢流不息浮雲去靡依以喻良友各在一方播遷而無所託此注甚妙按蘇李在武帝時同為侍中金蘭素洽到此各方遂托風人比興之旨故用俯仰二字隨所及而託意原非實境語何煩訾議之紛紛為即寬夫亦未核也諱盈容齋隨筆曰李陵詩獨有盈尊酒盈字正惠帝諱漢法觸諱者有罪不應敢用此語其三筆又曰髙祖諱邦荀悅云之字曰國惠帝諱盈之字曰滿謂臣下所避以相代也蓋之字之義訓變左傳周史以周易見陳侯陳侯使筮之遇觀之否謂觀六四變而為否也吳旦生曰癸辛雜識惠帝諱盈史記以萬盈數改作滿數故容齋亦因盈字致疑而東坡遂謂蘇李詩齊梁間文士擬作余按漢髙祖諱邦而韋孟詩總齊羣邦文帝諱恆而仲長統詩恆星艷珠景帝諱啓而傅毅詩啓我童昧蓋臨文不諱其義如是而又何疑於犯惠諱也野客叢書云枚乘柳賦盈玉縹之清酒枚乘詩盈盈一水間知惠帝之諱在當時蓋有不諱者觀勉夫之引枚生如此因思常侍言行行重行行十四首并去者日以踈五首為十九首為枚乘作其説不誣何必因上東宛洛辭兼東都謂雜有張衡蔡雍作也衣帶古詩相去日已逺衣帶日已緩吳旦生曰樂府離家日趨逺衣帶日趨緩王弇州謂已字雅趨字峭按焦氏易林云憂思約帶即此意而以四字盡之又云簪短帶長蓋簪短即詩經首如飛蓬也帶長即衣帶日已緩也以四字盡兩意意尤妙阿閣古詩阿閣三重階吳旦生曰周書云明堂咸有四阿注四阿若今四注屋故五臣之注阿閣亦謂閣有四阿也劉坦之補注云阿隅也閣説文云以杙承板所以止扉者以其四隅皆有欄楯可以通行謂之阿閣孟冬古詩明月皎夜光促織鳴東壁玉衡指孟冬衆星何歷歷白露霑野草時節忽復易秋蟬鳴樹間玄鳥逝安適吳旦生曰銑注謂既云孟冬又云秋蟬九月巳入十月節氣也余按漢至孝武始改秦朔用夏正此詩上云促織下云秋蟬蓋漢之孟冬非夏之孟冬矣髙祖十月至灞上故以十月為嵗首是漢猶襲秦制也則漢之孟冬夏之七月耳李善注為是脈脈古詩盈盈一水間脈脈不得語吳旦生曰劉坦之補注脈脈當作盼相視貌謂分明盼視而不得通其語此真膚解觀海録碎事引陸韓卿詩誰云相去逺脈脈阻光儀音陌不見貌余以二語正從古詩脫出蓋河漢幾許而相隔不相見無從告語也脈脈兩字含情無限又觀劉夢得視刀環歌云常恨言語淺不如人意深今朝兩相見脈脈百種心直為古詩傳神札察古詩客從逺方來遺我一書札上言長相思下言久離别置書懷袖中三嵗字不滅一心抱區區懼君不識察吳旦生曰札音截漢書谷子雲筆札樓君卿唇舌陸雲卿詩書記既翩翩賦歌能妙絶相如恧溫麗子雲慚筆札察敕列切老子其政察察其民缺缺漢志樂歌景星顯見信星彪列象載昭庭日親以察被緣古詩文彩雙鴛鴦裁為合歡被著以長相思緣以結不解注云著昌慮切充之以絮也緣以絹飾邉也長相思謂以絲縷絡綿交互網之使不斷長相思之義也結不解謂以針縷交鎖連結混合其縫取結不解之義也既取其義以著愛而結好又美其名曰相思曰不解云吳旦生曰四邉緣飾而被之心有象水池海録碎事所謂因其形如池沼四周以名之也故左太沖詩衣被皆重池即今被頭别施帛為緣呼為被池而宋子京云春寒到被池也按禮記魚躍拂池注以銅為魚縣於池下疏參漢之制度而知也正俗云以卧氈著裏施緣者呼為池氈李太白詩緑池障泥錦裝潢家以卷縫罅處為玊池輟耕録云孟蜀主一錦被其濶猶今之三幅帛而一梭織成被頭作二穴若雲板樣蓋以扣於項下如盤領狀兩側餘錦則擁覆於肩此之謂鴛衾也余謂此即所云文彩雙鴛鴦裁為合歡被也唐莊宗命蜀匠旋織十幅無縫錦為被材被成賜名六合被長跪玉壺清話曰宋太祖問趙普拜禮何以男子跪而婦人不跪普不能對王貽孫曰古詩長跪問故夫即婦人亦跪也唐武后時婦人始拜而不跪普問所出對曰唐張建章勃海國記備言之吳旦生曰吳越春秋女子知伍胥非常人長跪以餐與之戰國䇿蘇秦過洛其嫂蛇行匍匐四拜自跪而謝漢書周昌諌髙帝吕后見昌為跪隋志皇帝册后后先拜後起亦可證唐以前婦人皆跪矣蓋古者男跪尚左手女跪尚右手以此為别然所謂尚右手者言斂手向右如孔子拱而尚右之尚非若今用手按膝作跪也男子之尚左亦然古之婦人以肅拜為正鄭司農注肅拜但俯下手今時撎是也撎於至反即今之揖儀禮鄉飲酒賔客有撎入門之法推手曰揖引手曰撎字林云撎舉首下手也項氏云古之拜如今之揖折腰而已介胄之士不拜故以肅為禮以其不可折腰也其儀特斂手向身微作曲勢此正今時婦人揖禮也婦人首飾盛多如副笄六珈之類自難以俯伏地上則婦人之拜不過如此乃謂自唐武后始尊婦人不令拜伏亦誤矣南北史有樂府説婦人云伸腰再拜跪問客今安否伸腰亦是頭不下也北史周宣帝始詔內外命婦拜宗廟及天臺皆俯伏相見皆跪如男子之儀則知前此婦人本不作男子拜矣王建宫詞云射生宫女宿紅粧請得新弓各自張臨上馬時齊賜酒男兒跪拜謝君王蓋宫掖中女子作男兒之跪拜所以志異也野客叢書云古者拜禮非特首至地然後為拜也凡頭俯膝屈手動皆謂之拜按周禮辨九拜之儀一稽首二頓首三空首四振動五吉拜六凶拜七竒拜八褒拜九肅拜注云稽首拜頭至地也頓首拜頭叩地也空首拜頭至手也振動以兩手相擊也竒拜一拜也褒拜再拜也肅拜但俯下手即今之揖也何嘗專以首至地為拜耶方言東齊海岱之間長跪謂之䠆􅭣音務金錯刀藝苑雌黃云張平子四愁詩美人贈我金錯刀何以報之英瓊瑤金錯刀王莽所鑄錢名莽變漢制更造大錢徑寸二分重十二銖文曰大泉直五十又造契刀其環如大錢身形如刀長二寸文曰契刀直五百又造錯刀以黃金錯其文曰一刀直五千與五銖錢凡四品並行吳旦生曰繼古藂編金錯刀名一而義二錢一也刀一也漢食貨志王莽造錯刀以金錯其文此錢也續漢書輿服志佩刀乘輿黃金通身雕錯諸侯黃金錯環東觀漢記賜鄧通金錯刀此刀也韓退之詩聞道松醪賤何須吝錯刀梅聖俞詩爾持金錯刀不入鵝眼貫則指為錢矣孟浩然詩美人聘金錯纎手膾紅鱗錢昭度詩荷揮萬朵玉如意蟬弄一聲金錯刀則指為刀矣余按古人之於器物以黃金錯之皆謂之金錯詞人引用不可以名同而不究其實即杜詩觀之棕拂子詩熒熒金錯刀乃刀也對雪詩金錯囊徒罄乃錢也虎牙行金錯旌竿滿雲直則又以黃金而錯鏤於旌竿上矣席上腐談云古之錯即今之磋也磋千箇反北人讀錯作去聲南人讀錯作入聲其實一也青玊案張衡四愁詩何以報之青玉案吳旦生曰劉坦之補注謂玉案器之貴重者楚漢春秋淮隂侯曰漢王賜臣玉案之食觀此則案指器而言蓋案字即古碗字説文碗小盂也烏管切徐鉉曰今俗别作碗非是然則平子亦謂青玉碗耳俗謂傳碗曰案酒亦此義如漢髙帝至趙趙王張敖自持案進食甚恭又許后五日一朝太后親奉案上食又孟光為鴻具食舉案齊眉凡此皆碗也不則何能持舉耶困學紀聞云陸務觀誰其云者兩黃鵠何以報之雙玉盤本於朱新仲何以報之青玉案我姑酌彼黃金罍歷代詩話卷二十八
