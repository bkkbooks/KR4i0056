body:
  text: 歴代詩話巻十三歸安吴景旭撰丙集上之上賦神女西溪叢語曰昔楚襄王與宋王遊髙唐之上見雲氣之異問宋玉玉曰昔先王夢遊髙唐與神女遇玉為髙唐之賦先王謂懐王也宋玉是夜夢見神女寤而白王王令玉言其狀使為神女賦後人遂云襄王夢神女非也古樂府有之本自巫山来無人覩容色惟有楚懐王曽言夢相識李義山亦云襄王枕上元無夢莫枉陽臺一片雲今文選本玉王字差悮吴旦生曰姚令威以玉王兩字悮在一㸃余取神女賦本再四讀過深服其言後又得沈存中而暢明之喜躍欲狂筆談云神女賦序曰楚襄王與宋玉逰于雲夢之浦使玉賦髙唐之事其夜王寢夢與神女遇王異之明日以白玉玉曰其夢若何對曰晡夕之後精神恍惚若有所熹見一婦人狀甚竒異玉曰狀何如也王曰茂矣美矣諸好備矣盛矣麗矣難測究矣瓌姿瑋態不可勝讚王曰若此盛矣試為寡人賦之以文考之所云茂矣至不可勝讚云云皆王之言也宋玉稱嘆之可也不當却云王曰若此盛矣試為寡人賦之又曰明日以白玉人君與其臣語不當稱白又其賦曰他人莫覩玉覽其狀望余帷而延視兮若流波之將瀾若宋玉代王賦之若玉之自言者則不當自云他人莫覩玉覽其狀既稱玉覽其狀即是宋玉之言也又不知稱余者誰也以此考之則其夜王寢夢與神女遇者王字乃玉字耳明日以白玉者以白王也王與玉字悮書之耳前日夢神女者懐王也其夜夢神女者宋玉也襄王無預焉從來枉受其名耳據姚與沈之言則唐人詩傾國傾城漢武帝為雲為雨楚襄王雲雨無情難管領任他别嫁楚襄王料得也應憐宋玉只因無奈楚襄王今来雲雨知何處重上襄王玳瑁筵皆是囈語矣詞家能正其訛盡如古樂府作楚懐王而以為不成佳話我不信也漫叟詩話云濠州西有高唐舘俗以為楚之髙唐也閻欽愛題詩曰借問襄王安在哉山川此地勝陽臺李和風亦題曰若向此中求薦枕參差笑殺楚襄王蓋并其地而悮稱之流俗真可笑露葵宋玉諷賦烹露葵之羮吴旦生曰爾雅翼云古者葵稱露葵又終葵一名繁露今摘葵必待露解語曰觸露不搯葵日中不剪韭各有宜也曹植七啟霜蓄露葵潘岳閑居賦緑葵含露皆指此顔氏家訓云梁世有葵朗父諱蒓遂呼蓴菜為露葵此真不渉學之故也如王維詩松下清齋折露葵亦謂是帯露之葵若指蓴菜則豈輞川所有哉按魯頌薄采其茆注云茆鳬葵也葉大如手赤圓而滑江南人謂之蓴菜者也馬融傳云鳬葵葉圓似蓴生水中一名水葵此别一種不可引以證露葵唐詩幾日相離别門前生穭葵注云穭葵草名余按穭字有義漢武帝紀野谷旅生曰穭米唐書開元十九年揚州奏穭生稻二百一十五頃唐代宗盩厔生穭麥楊升菴云野稻不種而生曰穭刈稻明年復生曰􅷁空穴宋玉風賦臣聞於師枳句來巢空穴來風其所託者然則風氣殊焉吴旦生曰莊子空閲來風桐乳致巢司馬彪注云門户孔空風善從之桐子似乳著其葉而生其葉似箕鳥喜巢其中也一作空門又作空閣謂風自空生今之危閣類然也余以此皆由於穴通為閲而閣又閲之譌書當從空穴謂門户之穴也枳木句曲不若桐乳為工土囊宋玉風賦夫風生於地起於青蘋之末侵滛谿谷盛怒於土囊之口吴旦生曰博物志風山之首方髙三百里風穴如電突深三十里春風從此而出荆州記云宜都佷山縣山有風穴口大數尺名風井夏則風出冬則風入暑月經之凛然有衣裘想則是土囊大穴也當類此杜子美詩曽宫憑風迥岌嶪土囊口湛方生風賦風母殞而復生按劉欣期交州記云風母出九徳縣似猿見人若慙屈頸打殺得風還活又十洲記云炎洲在南海中上有風生獸似豹青色大如狸以鐵椎鍜其頭數十下乃死張其口向風須㬰而起豈亦其類耶胥靡賈誼鵩鳥賦傅說胥靡兮乃相武丁吴旦生曰張晏注傅說被刑築於傅巖武丁以為相余攷楚元王傳申公白生諫不聽胥靡之師古注云胥相也靡隨也聨繫使相隨而服役之也猶今之役囚徒以鎻聮綴耳然則如傳云傅說胥靡又如禰衡罪同胥靡不能發明王之夢自昔相沿皆以為刑人矣西齋詩話云孫僅詩刑人一旦起幽深功業煌煌照古今此乃謬用蓋當時有胥靡修築巖道而說在困約中代之以假其貲是為胥靡傭資也楚辭說操築於傅巖朱晦翁云傅氏之巖在虞虢之界通道所經澗水壊道常使胥靡刑人築護此道説賢而隠代胥靡築以供食也孔安國亦同此說合三家之言謂賢者必不至罹罪耳吴氏禆傳蔡氏集傳又謂說築傅巖之野乃是以築為居猶今言卜築之意按傅巖在陜州平陸縣北宋元豐間於陜建四公堂謂傅公召公姚公温公也按傅說事綜稽古語傳譌非一如觀象賦傅說登天而乗尾注云傅說一星在尾後乗尾在龍駟之間莊子云乗東維騎箕尾而比於列星則是精之上托天文因有此星謬一司馬彪莊子音義云傅說生無父母洪氏注楚辭云說一旦忽然從天而下便為成人無少長之漸則是精之下降無端而有此人謬二古賦有云傅說奉中闈之祠注云傅說一星在尾北後河中蓋後宫女巫也則是以說之賢乃為後宫祈子而禱祠之謬三鄭樵通志云謂之傅說者古有傅母有保母傅而說者謂傅母喜之也偶商之傅說與此同音諸家不審其義則曰傅騎箕尾殊不知箕尾専主後宫之事故有傅說之稱焉則是辨說之非騎箕反添出傅母支離之語謬四拾遺記云傅説賃為赭衣㫪於深巖以自給夢乗雲繞日而行湯以玉帛聘為阿衡則是以聘伊尹事而混二十世後之髙宗指以為湯謬五九淵賈誼弔屈原賦襲九淵之神龍兮沕淵潜以自珍吴旦生曰師古注九淵九族之川言至深也按淮南子有九璇之淵許叔重云至深也列子黄帝篇云鯢旋之潘為淵止水之潘為淵流水之潘為淵濫水之潘為淵沃水之潘為淵汍水之潘為淵雍水之潘為淵汧水之潘為淵肥水之潘為淵是為九淵淹遲野客樷書曰孫仲益謂司馬相如上林賦蓋令尚書給筆札一日而就非二京三都覃十年之思其誇苑囿之大固無荒怪不經之説後世學者往往讀之不通㝷繹師古音義從老先生叩問累數日而後曉焉僕謂相如此賦决非一日所能辦者其運思緝工亦巳久矣及是召見因以發揮不然何以不俟上命遽曰請為天子游獵之賦是知此賦已平時製下而非一日倉猝所能為者吴旦生曰漢書枚臯為文疾受詔輙成故所賦者多相如善為文而遲故所作少而善於臯漢武故事云上自作賦初不留思相如造文遲彌時而後成嘗謂相如曰以吾之速易子之遲可乎觀此則制作淹遲首尾温麗固有愈於疾行無善迹矣聞其作賦時把筆齧之似魚含毫故曰相如含筆而腐毫未聞有一日而就之説也西京雜記云相如為上林子虛賦意思蕭散不復與外事相闗控引天地錯綜古今忽然如睡躍然而興㡬百日而後成即考之本傳但云武帝令尚書給筆札乃成賦奏之又豈云一日而就哉焦弱侯云相如遊梁時嘗著子虚賦為武帝所善尋著天子遊獵賦復借子虚三人之詞以明天子之意故亦名子虚賦賦中叙上林故一名上林賦其實一也文選截為二篇以前叙齊楚者為子虚賦亡是公听然而笑以下為上林賦謬哉程泰之論上林賦三條其上篇曰亡是公者明無是人也既無此人則凡所賦之語何往不為烏有也知其烏有而以實録之故所向駮礙上林本始皇陿隘先王之宫而大加創治開宫館二百七十複甬相連而又表南山以為闕立石朐山以為東門其意若曰闕不足為也南山吾闕也門不足立也胊山吾門也此固武帝之所師也所師在是諫無自而入故相如始而置辭包四海而入之苑内夸張飛動意若從諛故揚雄指之為勸也夫既勸之以中帝欲帝將欣欣樂聽而後徐徐諷諭以為苑囿之樂有極而宇宙之大無窮則諷或可入也夫諷既不為正諫凡其所勸不容不出於寓言此子虚烏有亡是所以立也其中篇曰左蒼梧右西極日出東沼入乎西陂此賦上林所抵也數百里間其能出沒日月於東西乎又曰其南則隆冬躍波其北則盛夏含凍信斯言也必縮地南北而始有此讀者不思故主文譎諫之義晦於不傳耳其曰八水分流則長安實有此水不為寓言然而上林東境極乎宜春下苑即曲江也曲江僅得分滻為派而滻灞合㑹之地已在宜春之北則其地出上林之外矣然則雖實有之水亦不能確况紫淵丹水欲傅㑹而强求乎其下篇曰古惟揚雄能知此意故校獵之賦曰禦自汧渭經營豐鎬此則命其實矣至於出入日月天與地㳫則闗中豈能辦此也又曰虎路三嵕圍經百里此則可得而有也至謂正南極海邪界虞淵此又豈闗境所能包絡哉雄之意正倣相如諷勸相叅不當執實兩賦一意也説者不知出此乃從地望土毛枚舉細較是癡人説夢也楊升菴云觀莊子魏罃將伐齊華子曰有國於蝸之左角者曰觸氏有國於右角曰蠻氏相與爭地而戰伏尸數萬逐北旬有五日而後反君曰噫其虚言與東坡云淳于髠一斗亦醉一石亦醉至於州閭之㑹男女雜坐幾於勸矣而何諷之有以吾觀之蓋自托於放蕩之言而可止荒主長夜之飲世未有識其趣者長卿上林之賦意實若此能通莊氏之寓言兼戰國之游説而後可得其㫖也長卿去戰國未逺其談鋒與策士相似孔子論五諌曰吾從其諷是或一道也故戰國諷諫之妙惟司馬相如得之司馬上林之㫖惟揚子校獵得之雲夢司馬相如子虚賦臣聞楚有七澤嘗見其一未覩其餘也臣之所見蓋特其小小者耳名曰雲夢吴旦生曰洪容齋謂雲也夢也各為一處禹貢雲土夢作又注云在江南左傳䢵夫人棄子文于夢中注云夢澤名在江夏安陸縣城東南楚子田江南之夢注云楚之雲夢跨江南北楚子濟江入于雲中注入雲澤中所謂江南之夢然則雲在江之北夢在其南也楊升菴謂有南夢有北夢五代孫光憲號北夢本此余觀書䟽正義云昭三年左傳楚子與鄭伯田於江南之夢定四年左傳稱楚昭王寢於雲中則此澤亦得單稱雲單稱夢也郭璞杜預錢希言以岳陽巴丘湖為楚之雲夢悮矣容齋引據為確雖光憲所著有北夢𤨏言未足証葴菥薛薠相如子虛賦其髙燥則生葴菥苞荔薛莎青薠吴旦生曰爾雅葴音針馬藍染草也即今大葉冬藍為澱者是月令仲夏令民無艾藍以染鄭氏云為傷長氣夏小正五月蓄蘭灌沐藍蓼灌澆灌也沐剶沐也張揖注菥音斯似燕麥即今所用作蓆者太平御覽載古歌云田中兎絲何嘗可絡道邊燕麥何嘗可穫古樂府又作道傍兎絲田中燕麥北史邢卲傳云國子雖有學官之名而無教授之實何異兎絲燕麥唐劉夢得再遊𤣥都觀詩序云唯兎葵燕麥動搖春風耳爾雅莃兎葵籥雀麥郭璞注云頗似葵而葉小狀如藜雀麥即燕麥有毛海録碎事云兎葵苖如龍芮花白莖紫燕麥草似麥亦曰雀麥説文薛草也私列切六韜莎薛簦笠謂以莎草為雨衣也荀子王制篇栖遲薛越之中野薠音煩九歌登白薠兮騁望注云薠草秋生今南方湖澤皆有之似莎而大鴈所食也説文青薠似莎者菴司馬相如子虚賦菴䕡軒于吴旦生曰注菴䕡蒿也余觀廣韻云菴菴䕡果又菴羅果也楞嚴經阿那律見閻浮提如觀掌中菴摩羅果維摩經菴羅園闡義云菴羅是果樹之名其果似桃或云似柰沈炯詩鷲䫈三層塔菴園一講堂統志云真臘國出菴羅樹花葉似棗實似李交趾出菴羅果俗名香蓋乃果中極品實似北梨四五月熟食物本草云菴羅果即餘甘子也則是菴䕡即菴羅當是果類非蒿也菴或作庵一从艸一从广據黄山谷云今俗書庵字既於篆文無有又菴非屋不當从广三國志焦光傳居蝸牛廬中意是今菴也後漢皇甫規為中郎将持節監闗中兵㑹大疫親入菴廬廵視即用此菴字然按廣雅庵廐舍也集韻圜屋曰庵釋名草圓屋謂之庵庵奄也所以自覆奄也則菴之作庵當無二義漁隠樷話云漢史從省文借用為字故作菴字楊升菴云古篆有作葊者又止借弇者石皷文作庵有元人止菴印章作盫萃蔡司馬相如子虚賦翕呷萃蔡吴旦生曰注萃蔡衣聲也漢書亦作萃蔡萃音翠嵇康琴賦新衣翠粲李周翰注翠粲鮮色李善注引子虛賦作翕呷翠粲則知古以鮮明為翠蘓東坡牡丹詩一朶妖紅翠欲流陸放翁不曉翠欲流為何語及過成都有大署市肆曰郭家鮮翠紅紫舖問土人乃知蜀語鮮翠猶言鮮明也一作綷䌨潘岳籍田賦綃紈綷䌨一作綷縩班媫妤自悼賦紛綷縩兮紈素聲陸士衡百年歌羅衣綷縩金翠華李長吉神絃曲花裙綷䌨歩秋塵蘓子瞻嶺下詩牛馬汗淋漓綺紈聲綷縩倪雲林詩貪看飛裙舞綷縩遥憐風馭散繽紛劉伯温詩瓊佩綷縩雲帡幪又作􅀈縩太湖司馬相如上林賦獨不聞天子之上林乎左蒼梧右西極丹水更其南紫淵徑其北終始㶚滻出入涇渭酆鎬潦潏紆餘逶迤經營乎其内蕩蕩乎八川分流相背而異態又云然後灝溔潢漾安翔徐回翯乎滈滈東注太湖衍溢陂池吴旦生曰李善注太湖所謂震澤郭璞江賦云注五湖以漫漭灌三江而漰沛墨子云禹治天下南為江漢淮汝東流注之五湖孔安國云自彭蠡江分為三入于震澤後為北江而入于海沈存中謂此皆未詳考地理也八川自入大河大河去太湖數千里中間隔泰山及淮濟大江何縁與太湖相渉江漢至五湖自隔山其末乃遶出五湖之下流徑入于海何縁入于五湖淮汝徑自徐州入海全無交渉禹貢云彭蠡既瀦陽鳥攸居三江既入震澤底定以對言則彭蠡水之所瀦三江水之所入于震澤也震澤上源皆山環之了無大川震澤之委乃多大川亦莫知孰為三江者蓋三江之水無所入則震澤壅而為害三江之水有所入然後震澤底定此水之理也張勃吴録五湖者太湖之别名以其周行五百里三萬六千頃故以五湖名義興記太湖射湖貴湖陽湖洮湖為五湖酈道元水經注長塘湖射貴湖上湖滆湖太湖為五湖韋昭謂胥湖蠡湖洮湖陽湖太湖為五湖史記正義菱湖游湖莫湖貢湖胥湖皆太湖東岸五灣為五湖虞翻云太湖東通長洲松江南通烏程霅溪西通宜興荆溪北通晉陵滆湖西南連嘉興匪溪凡五道故謂之五湖當以虞説為正䱎䲛司馬相如上林賦䱎䲛漸離吴旦生曰䱎䲛一作䱴􅀈李竒云周洛曰鱣蜀曰魱䲛音互孟出鞏山穴中三月遡河上能度龍門之限則得為龍矣爾雅鮪鱣属大者名王鮪小者名䱙鮪詩義䟽云鱣江東呼為黄魚亦曰王魚按此一類皆得度龍門漸離注未詳楊升菴云説文有螹胡螹字同但此叙水族彼言陸産不同耳或者水獸形似螹胡名為漸離也余以此説未安攷漸離亦魚名禺禺司馬相如上林賦禺禺魼鰨吴旦生曰禺音隅又音顒郭璞云禺禺魚皮有毛黄地黑文説文鰅魚名皮有文出樂浪東神爵四年初捕収輸考工記周成王時揚州獻鰅注鰨鯢魚也按周書王㑹云前兒若獼猴立行聲似小兒爾雅注云鯢魚似鮎四脚前似獼猴後似狗聲如小兒啼大者長八九尺水經注云鯢魚聲如小兒有四足形如鱧出伊水史記謂之人魚秦始皇葬驪山以其膏為燭别隝司馬相如上林賦阜陵别隝吴旦生曰隝與島同漢書横雖雄才伏於海隝張衡西京賦長風激於别隝古本作隝文選俗本改作島字耳釋名海中可居者曰島島到也人所奔到也亦言鳥也物所赴如鳥之下也角􅗧司馬相如上林賦其獸則麒麟角􅗧吴旦生曰説文角􅗧狀似豕善為弓出胡休多國郭璞云角􅗧音端似豬角在鼻上詩䟽云角端有肉漢書音義云角端似牛可為弓李陵遺蘓武角端弓晉書角端掩月宋書角端鹿形馬尾緑色獨角明君聖主在位明逹方外幽逺之事則奉書而至元史太祖提兵回回國追至印度國鉄門闗侍衞見一獸髙數百丈鹿形馬尾緑毛而角能為人言謂之曰此非帝世界宜早還耶律楚材曰此名角端乃旄星之精日行萬八千里是惡殺之象上天遣以告陛下且此獸靈異如鬼神不可犯也即日班師至正庚寅江浙鄉試出角端為賦題盧橘唐子西李氏山園記曰枇杷盧橘一物也而上林賦盧橘夏熟黄甘橙榛枇杷橪柿亭奈厚朴則以一物為二物矣吴旦生曰東坡同劉景文賞枇杷詩魏花非老伴盧橘是鄉人又客来茶罷空無有盧橘㣲黄尚帯酸二詩與子西同失故張嘉甫問盧橘是何種果類坡曰枇杷是矣事見上林賦嘉甫曰若盧橘果是枇杷則賦中不應四句重用輟耕録亦言盧橘與枇杷並列則盧橘非枇杷明矣花朩志云給客橙出蜀土似橘而非若柚而香冬夏花實相繼或如彈圓或如拳通嵗食之名盧橘意橙橘惟熟於冬而盧橘夏亦熟故舉以為重唐三體詩裴庾注云廣州記盧橘皮厚大如柑酢多至夏熟土人呼為壺橘又曰盧橘説文引伊尹書云箕山之東青鳬之所有盧橘常夏熟然則稱之盧者其義何居按藝苑雌黄引山谷云䕫湘間有一種色黑而夏熟者疑其為盧橘復齋漫録引張勃吴録云建安郡中有橘冬月於樹上覆裹之至明年春夏色變青黑味尤絶美據此則所謂盧者黑色也余因攷説文齊謂黑為黸字學云盧龍都切黑也則凡盧為黑之别名又不止一端矣如土黑曰盧謂盧然解散也又水黑曰廬不流曰奴蓋北方水多黑色故有盧龍郡北人謂水為龍盧龍即黑水也又古劒有沈音湛盧謂湛湛然黑色也又韓國有良犬純黑色名曰韓盧蕐司馬相如上林賦蕐楓枰櫨吴旦生曰漢書師古注蕐即今之皮貼弓者也大業拾遺記汾州起汾陽宫宫南多平林率是大樺朩髙百餘尺從行文武皆剥取皮覆菴舍隋書用樺皮蓋屋本草言堪為燭蓋以樺朩皮巻之為燭也國史補云宋朝京師毎正旦曉漏以前宰相三司使大金吾皆以樺燭百炬擁馬方布象城謂之火城白樂天詩風燭樺煙香元㣲之詩樺燭熖髙黄耳吠蘇東坡詩送客林間樺燭香陸放翁詩江月亭前樺燭香芔司馬相如上林賦紛溶箾篸猗狔從風瀏蒞芔􅀈吴旦生曰石皷文作􅀢今省冩作芔方言芔莾草也東越揚州之間曰芔南楚曰莾郭璞解云芔凶位反上林賦後又云芔然興道而遷義注芔許屈切猶勃然也文選五臣本改芔歙作卉􅀈則相如數語皆言草朩從風之狀若云卉􅀈復成何義因見詩話云相如長門賦列丰茸之游樹謝靈運詩升長皆丰茸則紛溶丰茸一也杜子美詩巫山巫峡氣蕭森則箾篸蕭森一也毛詩猗儺其枝楚辭紛旖旎乎都房阮籍詩猗靡情歡愛則猗狔也猗儺也旖旎也猗靡也一也陶𢎞景詩悽切嘹唳傷夜情趙彦昭詩流麗鳴春鳥則瀏蒞與嘹唳及流麗一也杜子美詩秋風歘吸吹南國則芔􅀈與歘吸一也飛蠝司馬相如上林賦蜼玃飛蠝吴旦生曰注雖與玃似猴蠝鼯䑕也西溪樷語云史記作蠝漢書作鸓郭璞音誄神農本草作鼺䑕音羸飛䑕也其狀如兎而䑕首以其髯飛爾雅鼯䑕一名夷由郭璞云狀如小狐似蝙蝠肉翅尾項脇毛紫赤色背上蒼艾色腹下黄喙頷雜白脚短爪長尾三尺許飛且乳亦謂之飛生聲如人呼食火煙能從髙赴下不能從下上髙陶隠居鼺是鼯鼠一名飛生産婦持之易生埤雅云鼯鼠或謂之飛生一名飛蠝音雷荀子鼯鼠五技而窮即此是也野客樷書云此螻蛄非鼠也按本草謂荀之鼯䑕為螻蛄一名碩䑕易晉如碩䑕孔頴逹正義引蔡邕勸學篇云碩䑕五能不成一技注云能飛不能上屋能縁不能窮朩能游不能度谷能穴不能蔵身能走不能免人荀子鼯䑕五技而窮並為螻蛄也而魏詩碩䑕刺重歛傳注皆謂大䑕則爾雅所謂碩䑕闗中呼為鼩䑕陸機云今河東有大䑕能人立交前兩脚於頸上跳舞善鳴食人禾苖人逐則走朩空中亦有五技或謂之雀鼠然則螻蛄與此䑕同名碩䑕皆有五技但螻蛄技窮而此䑕技不窮故耳倦􅓈司馬相如上林賦與其窮極倦􅓈吴旦生曰釋云倦􅓈疲憊也方言云瓶倦也丁度謂字或作􅓈集韻二十陌有􅓈字與劇同音子虚賦徼􅓈受詘謂以力相踦角徼其極而受屈也按説文从谷从作字已逆切持也象手也集韻云𨽻變為丸執孰等丸恐筑之几皆从俗書與丸無别􅓈渴極切極虐切聲相近司馬相如傳病稱疲􅒵注􅒵音極晉人帖中有新沐甚極又體中小極極一作䜪倦也楊升菴云爾雅􅤕音劇説文作春秋外傳作􅡅又作㑰音義並同余按方言􅡅􅀈􅀈也郭璞解云今江東呼極為􅡅音劇又􅦤極也璞解云户畏反江東呼極為􅦤倦聲之轉也䘏削司馬相如上林賦曵獨繭之褕􅢁𦕈閻易以䘏削吴旦生曰注𦕈閻行貌易廻轉貌䘏削言伎人如刻畫作也此指人而言余謂即上所云靚糚刻飾也當指衣而言蓋一繭之絲製為襜褕而閻易者衣長大貌漢書文選作䘏削史記作戌削言其衣如刻畫作之也觀揚雄云裼衣戍削注言衣之美也其義益明歴代詩話巻十三
