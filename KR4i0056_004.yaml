body:
  text: 歴代詩話巻四歸安呉景旭撰甲集中之下三百篇蜾蠃楊升菴曰說者謂蜾蠃取桑蟲負之七日化為其子雖揚雄亦有類我類我久則肖之之說近人取蜾蠃之巢毁而視之乃自有卵細如粟寄螟蛉之身以養之其螟蛉不生不死蠢然在穴中久則螟蛉盡枯其卵日益長乃為蜾蠃之形穴竅而出又曰古人名物多取其形色之似瓠之細腰者曰蒲蘆故蜂之細腰者亦名蒲蘆正如綬草綬鳥皆名以鷊青黑之菼青黑之鳩皆名以鵻也中庸曰政也者蒲盧也即蜾蠃也謂當以善養而成之如蒲盧然乃與詩義合呉旦生曰蜾蠃說文作􅝻蠃一曰虒蝓陶隠居謂蜾蠃自生子如粟粒捕取螟蛉以飼其子非以螟蛉為子也彭乘亦謂其類有三銜泥營巢於室壁間者名蜾蠃穴地為巢者名蠮螉窠於書巻或筆管中者名蒲盧名既不同其質狀小大亦異蜾蠃蒲盧即捕桑蠖及小蜘蛛之類蠮螉惟捕蠨蛸與蟋蟀耳捕得皆螫殺去其足置穴中生子其上以泥隔之旬日子大能飛而諸蟲盡矣此升菴之說所自出而車若水亦有蜾蠃大螟蛉枯非變化之語然而子非已出呼為螟蛉其來尚矣董仲舒斷甲無子養非所生即引螟蛉有子蜾蠃負之之義南史宋明帝負螟之慶言廢帝非所生也北史胡叟養子字螟蛉按中庸蒲蘆即蒲葦耳若以為蜾蠃如何說地道敏樹升菴以為即蜾蠃誤矣然余觀埤雅云中庸蒲盧亦或謂之蜾蠃今蒲其根著在上而浮蔓常縁於朩故亦或謂之蜾蠃也據此特借其名稱之而非即蜾蠃之謂唐敬括蒲盧賦云究政化之所歸於蒲盧而可見全篇以為蟲屬恐非大戴禮雉入淮為蜃曰蜃蒲盧也謂蚌也亦借稱耳鸒斯弁彼鸒斯呉旦生曰鸒說文楚烏秦謂之鴉食物本草云慈鵶又名孝鳥詩謂鸒也野客叢書云鸒鳥名也斯者衍辭如曰螽斯鷺斯之類而劉孝標乃謂鳥名鸒斯失矣古雋考畧云猶蕭斯栁斯之類後不察而又作鸒􅠿則以斯从鳥矣若然則螽斯之斯當从虫鹿斯之斯當从鹿有是理乎余因觀釋鳥云鸒斯鵯鶋法言云頻頻之黨甚於鸒斯埤雅云鸒斯鳥之不能反哺者阮嗣宗詩云鸒斯蒿下飛此皆沿襲之譌耳而董氏以為禽經有鸒斯非為語辭則又何也桑梓漫叟詩話曰詩三百篇各有其㫖傳註之學每失其本意而流俗狃習不知變通尚多若維桑與梓必恭敬止則以桑梓人賴其用故養而成之莫肯陵踐有恭敬之道父子相與豈特如人之視桑梓今乃言父母之邦者必稱桑梓非也呉旦生曰李贊皇平泉記維桑與梓必恭敬止言其父所植也此本毛氏言桑梓父母所植尚且必加恭敬自添出父母所植便不止為蠺食器用之物後人因以桑梓為鄉里耳王勉夫亦證其非然自東漢以來乃以桑梓為鄉里用矣維夏四月維夏六月徂暑呉旦生曰先儒謂周正建子以十一月斗指於子故周正取此也今觀四月而稱夏六月而稱暑往則是周之建寅也如以建子論之則二月方春中四月暑便退乎故六月棲棲謂當夏興師非司馬法亦足証也如采薇諸什乃遣役勞還之詩今年春暮行而曰昔我往矣楊栁依依又曰采薇采薇薇亦剛止此合建寅之春暮也明年夏代者至復留備秋故曰有杕之杜有皖其實日月陽止至過十一月而歸又明年中春至故曰今我來歸雨雪霏霏今我來思雨雪載塗又曰卉朩萋止女心悲止征夫歸止此合建寅之秋春與十一月也他如七月而流火十月而震電種種皆與建寅相合則知周正非建子而諸儒多承譌矣禮經之月令書經之洪範春秋之春王正月論語之曽㸃暮春孟子之春耕秋斂無一不與建寅相合也魏了翁正朔考云商正建丑周正建子者改正朔不改月次也正朔之改示一代之興各有所尚也月次之不可改四時之序不可紊也紊之則時命乖張民聽疑惑雖耕耘斂藏亦失其候堯典所謂敬授人時萬世不可易也夫正朔迭尚不過新民視聽如大朝會大典禮尊用此日名曰嵗首太史公所謂朝以十月者是其例也世儒謂商周既改正朔併其月次亦應遞改此臆度之過也易臨卦所謂八月者指觀而言也觀之為卦其畫四隂其辰在酉曉然夏之八月也書伊訓元祀十有二月奉嗣王祗見厥祖太甲三祀十有二月伊尹以冕服奉嗣王歸于亳夫初見厥祖重事也故以改元之嵗首歸亳亦重事也故以三祀之嵗首然而仍稱十有二月則殷人未嘗改十二月為正月也詩正月繁霜四月維夏六月棲棲此為夏正無疑至十月之交則十一月矣是周人朔月也故曰朔日辛夘正朔日食古人所忌故曰亦孔之醜則周人以十一月為朔月未嘗改為正月也又七月之五章自五月數至十月而繼之曰為改嵗是以十一月為嵗首未嘗改為正月也周官凌人十有二月斬冰與月令季冬之月命取冰相合不惟時皆夏正而月亦夏正矣正月之吉始和縣法觀象夫以夏正言之建寅之月也三陽既交斯謂之和又黨正四時之孟月吉日則屬民而讀法夫言孟月則夏正建寅之月非周正建子之月明矣左傳夏四月鄭祭足帥師取周之麥秋又取周之禾其為夏正明白如此六經之外先秦他古書及秦漢以後正史凡所書月皆夏正也吕氏月令所言時令則夏時也岐伯素問所言月候則夏月也竹書紀年言三代之正月則皆建寅也秦正建亥漢仍秦舊太史公作史記書十月於每年之首班固作漢紀書秋九月於每年之終所謂春正月者自在年中不改稱謂至武帝太初元年正厯法以正月為嵗首明年所書始以春正月起之而冬十二月終之魏明帝以建丑為正并改三月為孟夏餘皆遞改而郊祀蒐狩頒宣時命則以寅為正二者交互徒惑民聽行之未幾復用夏正唐武氏以十一月為正月以十二月為臘月以正月為春一月自二月以後不能易其次也鼓鐘淮上鼓鐘將將淮水湯湯呉旦生曰朱子謂此詩之義未詳而引王氏以釋之按小序刺幽王也幽王鼓鐘淮上失禮之甚賢者為之憂傷鄭箋引孔子云嘉樂不野合犧象不出門鼓鐘淮上正是嘉樂野合見其失禮處故末章盛言瑟琴笙磬可見金和玉節調音協舞此何等嘉樂而陳之淮上耶朱子言詩有意變易序箋故耳田祖以御田祖呉旦生曰毛傳謂田祖即神農按山海經蚩尤作兵伐黄帝黄帝乃令應龍攻之冀州之野應龍畜水蚩尤請風伯雨師縱大風雨黄帝乃下天女曰魃雨止遂殺蚩尤魃不得復上所居不雨叔均言之帝後置之赤水之北叔均乃為田祖注云主田之官即引詩曰田祖有神據此則叔均亦得稱田祖也山海經又云后稷之孫曰叔均是始作牛耕注用牛犂也則耕之用牛亦自叔均始矣賈勰齊民要術云趙過始為牛耕實勝耒耜之利崔實政論云漢武帝以趙過為搜粟都尉敎民耕植其法三犂共一牛一人將之下種挽樓皆取備焉王伯厚漢制攷云周時未有牛耦耕至漢時搜粟都尉趙過始敎民牛耕周益公云竊疑耕犂起於春秋之間故孔子有犂牛之言而弟子冉耕亦字伯牛月令季冬出土牛示農耕早晚賈誼新書劉向新序俱載鄒穆公曰百姓飽牛而耕暴背而耘大率在秦漢之際何待趙過過特敎人耦犂費省而功倍爾余初見此言竊意伯厚亦未攷及叔均耶及觀困學紀聞亦伯厚所著則且首引之矣興雨野客叢書曰顔氏家訓引班固靈臺詩祈祈甘雨之句以為有渰萋萋興雲祈祈當是興雨俗寫誤耳趙明誠又據漢無極山碑興雲祈祈之語謂毛詩本作雲字後來作雨因顔而改洪氏又引左雄傳興雨祈祈以證此語非起於顔氏僕觀雄之先鹽鐵論亦有是語然前漢食貨志作興雲祈祈要之雨雲無定論孔穎達正義謂定本作興雨或作興雲誤也呉旦生曰吕氏春秋作有晻淒淒興雲祈祈則其來更在數書前矣王荆公詩雲之祈祈或雨于淵雲之祈祈或雨于野亦本前人語耳按毛傳云渰隂雲貌張協雜詩有渰興南岑故文通擬黄門苦雨詩有渰興春節皆言雲興之意五臣注以有渰為雨師大謬余最愛埤雅云渰水氣之雲也為得雲族而雨景象雙聲疊韻升菴外集載皮日休云毛詩鴛鴦在梁又螮蝀在東即後人疊韻之始予謂此乃偶合之妙詩人初無意也若文選宋玉風賦炫煥燦爛張衡西京賦之睚眦蠆芥上林賦之玢豳文鱗左思吴都賦之檀欒嬋娟則詞人好竒之始耳南史有積日失適亦疊韻呉旦生曰皮日休雜體詩序詩云螮蝀在東又曰鴛鴦在梁雙聲起於此也潘子真詩話亦載皮日休云蝃蝀在東鴛鴦在梁雙聲興焉而升菴引為疊韻之始何也雙聲與疊韻葢自有别古人辨之詳矣蔡寛夫詩話云聲韻之興自謝莊沈約以來其變日多四聲中又别其清濁以為雙聲一韻者以為疊韻葢以輕重為清濁耳所謂前有浮聲則後須切響是也珊瑚鉤詩話云皮日休謂疎杉低通灘冷鷺立亂浪此雙聲也陸龜䝉謂膚愉呉都姝眷戀便殿宴此疊韻也韻語陽秋云如王融所謂園蘅炫紅蘤湖荇燡黄華溫庭筠所謂棲息銷心象簷楹溢艷陽皆效雙聲而為之也陸龜䝉所謂瓊英輕明生竹石滴瀝碧皮日休所謂康莊傷荒凉坐虜部伍苦皆效疊韻而為之也學林新編云南史謝莊傳王元謨問莊何者為雙聲何者為疊韻答曰互䕶為雙聲磝碻為疊韻某按古人以四聲為切韻紐以雙聲疊韻必以五音為定葢謂東方喉聲為木音西方舌聲為金音南方齒聲為火音北方脣聲為水音中央牙聲為土音也雙聲者同音而不同韻也疊韻者同音而又同韻也互䕶同為脣音而二字不同韻故謂之雙聲磝碻同為牙音而二字又同韻故謂之疊韻若彷彿熠燿騏驥慷慨咿喔霡霂皆雙聲也若侏儒童䝉崆峒巃嵸螳螂滴􅅹皆疊韻也廣韻曰章灼良畧是雙聲灼畧章良是疊韻又曰斤剔靈歴是雙聲剔歴斤靈是疊韻舉此例則諸音皆依此而紐之可以定矣沈存中論詩之用字曰幾家村草裏吹笛隔江聞幾家村草吹笛隔江皆雙聲也某按村字是脣音草字是齒音吹字是脣音笛字是齒音此非同音字不可謂之雙聲也存中又曰月影侵簪冷江光逼履清侵簪逼履皆疊韻也某按侵字是脣音簪字是齒音逼字是脣音履字是舌音既非同音字而逼履二字又不同韻不可謂之疊韻也某按李羣玉詩曰方穿詰曲崎嶇路又聽鉤輈格磔聲詰曲崎嶇乃雙聲也鉤輈格磔乃疊韻也景行西溪叢語曰髙山仰止景行行止言人有景行當效而行之如山之髙當仰之今人書簡有使景仰者疎矣魏文帝書云髙山景行深所慕仰為是任彦昇太宰碑云瞻彼景山肅然望慕雖引詩陟彼景山然不出景行高山之意也呉旦生曰黄山谷謂俞清老作景陶軒名為未當景明也高山則仰之明行則行之自魏晉間所謂景荘景儉等從一人差悞遂相承謬王勉夫云此謬自漢已然非始於魏晉也東漢劉愷傳曰今愷景仰前修注景慕也則知此謬其來尚矣近東坡亦承此謬孫巨源作景疏樓坡有詩曰不獨二疏為可慕他時當有景孫樓青蠅埤雅曰青蠅善亂色蒼蠅善亂聲故詩以青蠅刺讒而雞鳴曰匪雞則鳴蒼蠅之聲也蒼蠅其大者今俗謂之麻蠅呉旦生曰說文營營青蠅蟲之大腹者趙凡夫箋云奚即鼃類訓大腹同類也从黽从虫近於黽鼃黽也鼃之類謂之田雞亦曰水雞猶秋蛩曰莎雞酸蟲曰醯雞俗因但以呼蛸蟯蛆蠅之蠅或曰青蠅或曰蒼蠅於是說詩者悞解匪雞則鳴蒼蠅之聲與小雅管營青蠅為一物謬甚不然不惟其鳴不類亦非其時是故鳥獸草朩之名未可以細而忽之也蒼蠅之蠅乃黽字加虫轉注無疑墅談云圖經蠅似蝦蟆背青綠色俗謂之青蛙亦有背作黄文者謂之金線蠅陶隠居云大腹而脊青者俗名土鴨其鳴甚壯即爾雅所謂在水曰黽是也又一種黑色者南人呼為蛤子食至美即所謂水雞是也漢書武帝欲除上林苑東方朔諫曰土宜薑芋水多蠅魚貧者得以家給人足無飢寒之憂師古注蠅即蛙人取食之霍山曰丞相擅減宗廟羔菟蠅師古注羔菟蠅所以供祭也古時祭宗廟給食貨皆用蠅矣本草蠅無毒蝦蟆有毒即今所謂賴黑麻陳晦伯云蛙與蝦蟆二物本草分條載之是矣御覽孔帖爾雅翼通志畧混而一之俱誤臺笠臺笠緇撮呉旦生曰毛傳臺所以禦暑笠所以禦雨鄭箋臺夫須也以臺皮為笠王勉夫引謝𤣥暉詩臺笠聚東菑注臺禦日笠禦雨是為二事本毛說麴信陵詩臺笠冒山雨渚田耕荇花以臺笠對渚田是為一事本鄭說考孔穎達正義臺可為笠則一也余按草木考云臺莎草也一名夫須葢匹夫所須可為衣以禦雨今人謂之蓑衣是也嚴粲云以莎草為衣則謂之蓑莎為草名蓑為衣名山海經云三危之山有獸其豪如被蓑郭氏亦謂蓑被雨草衣則蓑但可為衣不可為笠所稱臺笠自謂臺與笠爾不必合為一物滮池滮池北流浸彼稻田呉旦生曰毛注滮流貌選詩滮池溉稻粳全用其意左思魏都賦時梗概於滮池注又訓滮池渟水處言大概落於滮池也水經注云鄗水又北流西北注與滮池合水出鄗池西而北流入於鄗世傳以為水名寰宇記云渭水西自京兆鄠縣流入長安漢建元三年造便橋跨渭斯滮池之别名西北合渭水按說文作淲池音呼沱漢書作虖沱史記作嘑池周禮作虖池禮記作呼池注作惡池音烏沱秦詛楚文作亞駝亞與惡通漢章有周惡夫印乃周亞夫也駝徒何切山海經作瀖池說文今之蹉跎字作差池徐鍇云江别流為沱沱沼同此别作池非歴代詩話巻四
