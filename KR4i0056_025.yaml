body:
  text: 歷代詩話卷二十五歸安吳景旭撰丁集中之下古樂府匹子夜歌理絲入殘機何悟不成匹吳旦生曰字書匹僻吉切偶也配也合也歌中隱匹配之義此借字寓意也周禮媒氏入幣純帛無過五兩注云必言兩者欲得其配合之名左傳幣錦二兩杜預注云二丈為一端二端為一兩所謂匹也是每匹長四丈中分之向裏卷其末為二端二端兩也其實只一匹湘山野録載胡旦致仕遇恩賜束帛當十端夏竦鎮襄陽選縑十匹贈之旦笑曰奉還五匹請撿韓詩外傳及韓康伯等所解束帛戔戔之義自可見證據此則今之贈遺者稱縑帛一匹為一端誤矣棊圍棋燒敗襖著子故依然蓋子夜四時歌之類每以前句比興引喻而後句實言以證之若此甚多吳旦生曰西京雜記漢元帝好蹴踘以為勞求相類而不勞者遂為彈棊之戲蹴踘應作擊掬棊局方二尺中心髙如覆盂其巔為小壺四角微隆起李商隱詩莫近彈棊局中心最不平謂其中髙也白樂天詩彈棊局上事最妙是長斜長斜謂抹角斜彈一發過半局今譜中具有此法栁子厚叙棊用二十四棊者即此戲也藝經云彈棊二人對局白黑棊各八枚先列棊相當下呼上擊之與子厚所記小異如奕棊古局用十七道合二百八十九道黑白棊各百五十六亦與後世法不同矣世說彈棊魏宫中裝器戲也魏文帝自負此技以手巾角拂之無不中有客著葛巾低頭拂碁妙踰於帝前溪漁隱叢話曰于競大唐傳湖州德清縣南前溪村則南朝集樂之處今尚有數百家習音樂江南聲伎多自此出所謂舞出前溪者也復齊謾録言陳劉刪詩山邊歌落日池上舞前溪唐崔皓詩舞愛前溪妙歌憐子夜長按智匠古今樂録晉車騎將軍沈充作前溪歌而非舞也蓋復齊不曽見于競大唐傳故不知舞出前溪耳吳旦生曰郗昻樂府解題亦言前溪舞曲也寰宇記云前溪烏程縣南東流入太湖謂之風渚後漢在市北餘不亭晉沈充家於前溪余嘗考前溪一名餘英溪水出銅峴山東過武康縣前千秋橋又東過縣學前又自縣學前東過下渚湖南與餘不溪水合是則前溪屬武康縣非屬德清縣也况德清在唐時名武源臨溪德清而武康自晉時巳名之漢則名餘不鄉故于競遂誤認之耶破瓜徐興公曰古辭碧玉破瓜時郎為情顛倒芙蓉凌霜榮秋容故尚好夫破瓜時春也芙蓉凌霜秋也春時色美故使郎顛倒矣而秋時亦不見其不美也吳旦生曰碧玉晉汝南王妾名孫綽為作碧玉歌一名千金意按楊文公談苑云呂仙翁有詩與張洎言將作鼎鼐之句其句云功成當在破瓜年俗以為破瓜為二八字洎六十四而卒乃悟余因觀李羣玉贈馮姬詩瓜字初分碧玉年亦謂以瓜字分之則為二八字也則是古辭破瓜者乃指碧玉十六妙年耶石濶讀曲歌云石濶生口中銜悲不得語吳旦生曰石濶古漢時碑名故取悲字之義子夜歌作石闕又水經注石的石碑也古名石桓石闕屈戍留青日札曰梁簡文詩織成屏風金屈戍李商隱詩鎖香金屈戍一作屈膝盧照鄰詩娼婦盤龍金屈膝李賀詩屈膝銅鋪鎖阿甄說者以為即鋪首非也蓋既言屈膝又言銅鋪則非一物明矣豫謂即今之蝴蝶扇鉸也可以屈伸摺疊故可用之屏風也吳旦生曰鄴中記石虎作金鈕屈膝屏風衣以白縑畫義士仙人禽獸之象髙施則八尺下施則四或施六尺隨意所欲也故段成式詩屏開屈膝見吳娃正與簡文同用此田子藝據長吉之句遂以鋪首為非余觀輟耕録云今人家窗戶設鉸具或鐵或銅名曰環紐即古金鋪之遺意北方謂之屈戍又戲瑕云曽見古金屈戍長可尺餘廣象楣棱小殺鏤獸形若叨餮狀絶細巧衛雙環意即古之金鋪耶據此則鋪首未為非也正德中薛蕙詩雙環金屈膝中州集劉迎詩寶箱拂塵金􅘫銊莫愁莫愁樂云莫愁在何處莫愁石城西吳旦生曰唐書樂志石城有女子名莫愁善歌謠蓋盧家女一云為妓嘗召入楚宮今郢州有莫愁村是也顧太初莫愁考云莫愁村今在承天府漢江西石城在州西北晉羊祜所建鄭谷詩石城昔為莫愁鄉莫愁魂散石城荒王橫詩村近莫愁連竹塢人歌楚些下蘋洲即此也梁武帝樂府云河中之水向東流洛陽女兒名莫愁莫愁十三能織綺十四採桑南陌頭十五嫁為盧家婦十六生兒字阿侯盧家蘭室桂為梁中有鬱金蘇合香此蓋洛陽人沈佺期詩盧家少婦鬱金堂李商隱詩如何四紀為天子不及盧家有莫愁即此也則莫愁有兩人矣李本寧莫愁湖記云還將盧女曲夜夜奉君王則魏時宫人故將軍隂升之姊明帝崩出嫁為尹更生妻者也由此言之古今有三莫愁而盧氏多好女今湖山爭借以為重乎宋曽三異云曽見莫愁像石本衣冠甚古乃古神仙者流非女子郢中倡女竊其名估客樂楊升庵曰估客樂齊武帝所作令釋寶月被之管絃帝數乘龍舟遊江中以紅越布為帆緑絲為帆縴鍮石為篙足篙榜者悉著鬱林布作淡黃袴舞此曲用十六人按史稱武帝節儉常自言朕治天下十年當使黃金與土同價然其從流忘反之奢如此貽厥孫謀何怪乎金蓮步地也吳旦生曰古今樂録帝布衣時嘗遊樊鄧登阼以後追憶往事而作歌敕歌者常重為感憶之聲故其辭曰昔經樊鄧役阻潮梅根渚感憶追往事意滿辭不叙考其情事亦是漢太上新豐之意也區區布帆絲縴便足云奢其視隋煬之龍舟鳳舸殿腳女千人更為何如胡元瑞云當使黃金與土同價髙帝語也武帝繼髙亦有節儉之稱南史齊書並可考見釋寶月所上曲云有信數寄書無信心相憶古謂使者曰信按越告糴于吳使素忠為信晉武帝帖云故遣信還南史晨起出陌頭屬與信㑹虞永興帖云事以信人口具雙行纒墨莊漫録曰婦人之纒足前世無傳齊東昏侯為潘妃鑿金蓮貼地曰此步步生蓮花然不言其弓小也六朝詞人無一言稱纒足者唐詩亦無及之惟韓偓咏屧子詩六寸膚圍光緻緻唐尺短校之亦小也而不言其弓楊升庵曰弓足始於五代李後主非也六朝樂府有雙行纒其辭云新羅繡行纒足趺如春妍他人不言好獨我知可憐唐杜牧詩鈿尺裁量減四分碧琉璃滑裹春雲五陵年少欺他醉笑把花前出畫裙段成式詩醉袂幾侵魚子纈彯纓長戛鳳凰叉知君欲作閒情賦應願將身作錦鞋花間集詞云慢移弓底繡羅鞋則此飾不始於五代也吳旦生曰焦弱侯謂樂府有雙行纒乃是行縢即足衣也胡元瑞謂雙行纒婦人以襯襪中者即今俗談裏腳也唐以前婦人未知扎足勢必用此與男子同男子以帛婦人則羅為之加文繡為美觀以蔽於襪中故他人不言好獨所歡知之語意明甚楊妃馬嵬所遺足徴唐世婦人皆著襪今婦人纒足其上亦有半襪罩之謂之膝褲恐古羅襪或此類又御覽云昔製履婦人圓頭男子方頭欲别男女也太康婦人皆方頭履男子無異則六朝前婦人之履斷可識矣車若水謂後漢戴良嫁女練裳布裙竹笥朩屐據三氏之言則扎腳斷非古時之事如古今事物考云起于妲已留青日札云起于西施皆非也自李後主宫嬪窅娘以帛繞腳屈上如新月狀由是人皆效之可謂弓足非始於後主乎婐􅛭梁武帝遊女曲云珠佩婐􅛭戲金闕吳旦生曰婐􅛭音果火按說文女侍曰婐讀若騧或若委孟子曰舜為天子二女婐烏果切􅛭弱也五果切字學集要云婐單作果又身弱好貌韻略云􅛭身弱貌韓退之元和聖德詩日君月妃煥赫婐㛂歷代詩話卷二十五
