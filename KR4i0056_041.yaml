body:
  text: 歷代詩話卷四十一歸安吳景旭撰已集下之中録品范元實曰山谷言文章必謹布置每見後學多告以原道命意曲折豫槩考古人法度如贈韋見素詩紈袴不餓死儒冠多誤身此一篇立意也故使人靜聽而具陳之耳自甫昔少年曰至再使風俗淳皆儒冠事業也自此意竟蕭條至蹭蹬無縱鱗言誤身如此也則意舉而文備故已有是詩矣然必言其所以見韋者於是有厚愧真知之句所以真知者謂傳誦其詩也然宰相職在薦賢不當徒愛人而巳士固不能無望故曰竊效貢公喜難甘原憲貧果不能薦賢則去之可也故曰焉能心怏怏祗是走踆踆又將入海而去秦也然其去也必有遲遲不忍之意故曰尚憐終南山回首清渭濱則所知不可以不别故曰常擬報一飯况懷辭大臣夫如是可以相忘於江湖之外雖見素亦不得而見矣故曰白鷗沒浩蕩萬里誰能馴終焉此詩前賢録為壓卷蓋布置最得正體如宫府甲第㕔堂房室各有定處不可亂也韓文公原道與書之堯典蓋如此其他皆謂之變體可也蓋變體如行雲流水初無定質出於精微奪乎天造不可以形器求矣然要之以正體為本自然法度行乎其中譬如用兵竒正相生初若不知正而徑出於竒則紛然無復出於綱紀終於敗亂而巳矣原道以仁義立意而道德從之故老子捨仁義則非所謂道德繼叙異端之汩正繼叙古之聖人不得不用仁義也如此繼叙佛老之捨仁義則不足以治天下也如彼反覆皆數疊而復結之以先王之教終之以人其人火其書必以是禁止而後可以行仁義於是乎成篇若堯典自若稽古帝堯至格于上下則堯之大略也自克明峻德至於變時雍言堯修身以及天下也於是乃命羲和言天事若豫采若時登庸言人事洪水方割言地事三才之道既備既之以遜位終焉然則自古有文章便有布置講學之士不可不知也詩有一篇命意有句中命意如上韋見素詩布置如此是一篇命意也至其道遲遲不忍去之意則曰尚憐終南山回首清渭濱其道欲與見素别則曰常擬報一飯况懷辭大臣此句中命意也蓋如此然後頓挫髙雅古人律詩亦是一片文章語或似無倫次而意若貫珠十二月一日詩今朝臘月春意動雲安縣前江可憐此詩立意念嵗月之遷易感異鄉之飄泊其曰一聲何處送書鴈百丈誰家上水船則羈愁旅思皆在目前未將梅蕊驚愁眼要取楸花媚逺天梅望春而花楸將夏而繁言滯留之勢當自冬過春始終見梅楸則百花之開落皆在其中矣以此益念故國思朝廷故曰明光起草人所羡肺病幾時朝日邊聞官軍收河北詩劔外忽傳收薊北初聞涕淚滿衣裳夫人感極則悲悲定而後喜忽聞大盜之平喜唐室復見太平顧視妻子知免流離故曰却看妻子愁何在其喜之至也不知手之舞之足之蹈之故曰漫展詩書喜欲狂從此有樂生之心故曰白日放歌須縱酒於是率中原流寓之人同歸以青春和暖之時即路故曰青春作伴好還鄉言其道途則曰欲從巴峽穿巫峽言其所歸則曰便下襄陽到洛陽此蓋曲盡一時之意愜當衆人之情通暢而有條理如辨士之語言也遊子詩巴蜀愁誰語吳門興杳然巴蜀既無可與語故欲逺之吳㑹九江春色外則想像將來吳門之景物三峽暮帆前則去路先涉三峽之風波厭就成都卜休為吏部眠君平之卜所以飬生畢卓之酒所以忘憂今皆不能如意則犯三峽之險適九江之逺豈得已也哉夫奔走萬里無所稅駕傷人世險隘不能容巳故曰蓬萊如可到衰白問羣仙終焉題桃詩小徑升堂舊不斜五株桃樹亦從遮此詩意在第一句舊堂小徑從來不斜又五桃遮掩之意若圖畫矣中間四句皆舊日事方天下太平家給人足有桃實則餽貧人故曰髙秋總饋貧人實和氣應期而至人意閒而樂之故曰來嵗還舒滿樹花家家有忠厚之風處處有魯恭之化故曰窗戶每宜通乳燕兒童莫信打慈鴉及題此詩時所向皆寡妻羣盜何暇如此故曰寡妻羣盜非今日天下車書正一家時也今人不求意趣關紐但以相似語言為貫串豈不失之淺近也哉老杜詩凡一篇皆工拙相半古人文章類如此皆拙固無取使其皆工則峭急無古氣如李賀之流是也然後世學者當先學其工精神氣骨皆在於此如望嶽詩齊魯青未了洞庭詩吳楚東南坼乾坤日夜浮語既髙妙有力而言東嶽與洞庭之大無過於此後來文士極力道之終有限量益知其不可及望嶽第二句如此故先云岱宗夫何如洞庭詩先如此故後云親朋無一字老病有孤舟使洞庭詩無前兩句而皆如後兩句語雖健終不工望嶽詩無第二句而云岱宗夫何如雖曰亂道可也今人學詩多得老杜平慢處乃鄰女效顰者世俗喜綺麗知文者能輕之後生好風花老大即厭之然文章論當理與不當耳茍當於理則綺麗風花同入於妙茍不當理則一切皆為長語上自齊梁諸公下至劉夢得溫飛卿輩往往以綺麗風花纍其正氣其過在理不勝而詞有餘也老杜緑垂風折筍紅綻雨肥梅岸花飛送客檣燕語留人亦極綺麗其模寫景物意自親切所以妙絶古今言春容閒適則有穿花蛺蝶深深見㸃水蜻蜓欵欵飛落花遊絲白日靜鳴鳩乳燕青春深言秋景悲壯則有藍水逺從千澗落玉山髙並兩峯寒無邊落木蕭蕭下不盡長江滚滚來其富貴之詞則有香飄合殿春風轉花覆千官淑景移麒麟不動爐烟轉孔雀徐開扇影還其弔古則有映階碧草自春色隔葉黃鸝空好音竹送青溪月苔移玉座春皆出於風花然窮理盡性移奪造化又云絶壁過雲開錦繡踈松夾水奏笙簧自古詩人壯即不巧巧即不壯巧而能壯有如是乎有一士人擕詩相示首篇第一句云十月寒者豫曰君亦讀老杜詩觀其用月字乎其曰二月巳風濤則記風濤之早也曰因驚四月雨聲寒五月江深草閣寒蓋不當寒而寒也五月風寒冷佛骨六月風日冷蓋不當冷而冷也今朝臘月春意動蓋未當有春意也雖不盡如此如三月桃花浪八月秋髙風怒號閏八月初吉十月江平穩之類皆不係月則不足以實一時之事若十月之寒既無所發明又不足紀録當以為戒也已上同葉石林曰詩語固忌用巧太過然緣情體物自有天然工妙雖巧而不見刻削之㾗老杜細雨魚兒出微風燕子斜此十字殆無一字虛設雨細著水靣為漚魚常上浮而淰若大雨則伏而不出矣燕體輕弱風猛則不能勝惟微風乃受以為勢故又有輕燕受風斜之語至穿花蛺蝶深深見㸃水蜻蜓欵欵飛深深字若無穿字欵欵字若無㸃字皆無以見其精微如此然讀之渾然全似未嘗用力此所以不礙其氣格超勝使晚唐諸子為之便當入魚躍練波拋玉尺鶯穿絲柳織金梭體矣禪宗論雲門有三種語其一為隨波逐浪句謂隨物應機不主故常其二為截斷衆流句謂超出言外非情識所到其三為函蓋乾坤句謂泯然皆契無間可伺其淺深以是為序杜詩亦有此三種語但先後不同以波漂菰米沉雲黑露冷蓮房墜粉紅為函蓋乾坤句以落花遊絲白日靜鳴鳩乳燕青春深為隨波逐浪句以百年地僻柴門迥五月江深草閣寒為截斷衆流句若有解此當與渠同參郭彥深云波漂一聮雖蒼凉悲壯次語纎細何以函蓋乾坤當易以三年笛裏關山月萬國兵前草木風學人細參始得詩人以一字為工世固知之惟老杜變化開闔出竒無窮殆不可以形迹捕詰如江山有巴蜀棟宇自齊梁則其逺數千里上下數百年只在有與自兩字而吞吐山川之氣俯仰古今之懷皆見於言外滕王亭子粉墻猶竹色虛閣自松聲若不用猶與自兩字則餘八字凡亭子皆可用不必滕王也此工妙至到人力不可及而雍容閒肆出於自然略不見其用力處今人多取其已用字模效用之偃蹇狹陋盡成死法不知意與境㑹出言中節凡字皆可用也已上同蘇子由曰大雅綿九章誦太王遷豳建都邑營宫室而巳至其八章乃曰肆不殄厥愠亦不隕厥問尚可也至其九章乃曰虞芮質厥成文王蹶厥生豫曰有疏附豫曰有先後豫曰有奔走豫曰有禦侮事不接文不屬如連山斷嶺雖相去絶逺而氣象聫絡觀者知其脈理之為一也蓋附離不以鑿枘此最為文之髙致耳老杜哀江頭詩少陵野老吞聲哭春日潛行曲江曲江頭宫殿鎖千門細柳新蒲為誰緑憶昔霓旌下南苑苑中萬物生顔色昭陽殿裏第一人同輦隨君侍君側輦前才人帶弓箭白馬嚼齧黃金勒翻身向天仰射雲一箭正墮雙飛翼明眸皓齒今何在血汚逰魂歸不得清渭東流劔閣深去住彼此無消息人生有情淚沾臆江水江花豈終極黃昏馳騎塵滿城欲往城南忘城北豫愛其詞氣如百金戰馬注坡驀澗如履平地得詩人之遺法如白樂天詩辭甚工然拙於紀事寸步不遺猶恐失之所所以望老杜之藩垣而不及也李耆卿云清渭二句明皇在蜀肅宗在秦一去一住兩無消息父子之際人所難言子美獨能言之非但細柳新蒲之感而已黃山谷曰由子美以來四百餘年斯文委地文章之士隨世所能傑出時輩未有升子美之堂者况家室之好耶嘗欲隨欣然㑹意處箋以數語終以汩沒世俗初不暇給雖然子美詩妙處乃在無意於文夫無意而意巳至非廣之以國風雅頌深之以離騷九歌安能咀嚼其意味闖然入其門耶故使後生輩自求之則得之深矣使後之登大雅堂者能以豫說而求之則思過半矣彼喜穿鑿者棄其大㫖取其發興於所遇林泉人物草木魚蟲以為物物皆有所托如世間商度隱語者則子美之詩委地矣學林新編曰田舍詩櫸柳枝枝弱枇杷樹樹香或說櫸柳者柳之一種其名為櫸柳非雙聲字也枇杷乃雙聲字櫸柳不可以對枇杷按此詩題曰田舍則當在田舍時偶見二物蓋所謂景物如此乃以為對耳覔松苗子詩落落出羣非櫸柳青青不朽豈楊梅以櫸柳對楊梅乃正對也然則以櫸柳對枇杷非誤也寄髙詹事詩天上多鴻鴈池中足鯉魚鴻鴈二物也鯉者魚之一種其名為鯉疑不可以對鴻鴈然懷李白詩鴻鴈幾時到江湖秋水多則以鴻鴈對江湖為正對矣得舍弟消息詩浪傳烏鵲喜深負脊令詩烏鵲二物疑不可以對脊令然偶題詩音書恨鳥鵲怒號怪熊羆則以鳥鵲對熊羆為正對矣寄李白詩幾年遭鵩鳥獨泣向麒麟鵩鳥乃鳥之名鵩者疑不可以對麒麟然寄賈嶽州嚴巴州兩閣老詩貔虎開金甲麒麟受玉鞭則以貔虎對麒麟為正對矣哭韋晉之詩鵩鳥長沙賦犀牛蜀郡憐以鵩鳥對犀牛為正對矣子美豈不知對屬之偏正耶蓋其縱橫出入無不合也魏泰曰劉攽載子美詩蕭條六合內人少虎狼多少人慎勿投虎多信所過飢有易子食獸猶畏虞羅言亂世人惡甚於虎狼也豫觀潭州詩岸花飛送客檣燕語留人與前篇同意喪亂之際人無樂善喜士之心至於一將一迎曽不若岸花檣燕也詩在優柔感諷不在逞豪放而致詬怒也許彥周曰詩有力量如弓之鬬力其未挽時不知其難也及其挽之力不及處分寸不可强若出塞曲落日照大旗馬鳴風蕭蕭悲笳數聲動壯士慘不驕又八哀詩汝陽讓帝子眉宇真天人虬髯似太宗色映塞外春此等力量不容他人到楊誠齊曰九日詩老去悲秋强自寬興來今日盡君歡不特八句便字字屬對又第一句頃刻變化才說悲秋忽又自寬以自對君自者我也羞將短髮還吹帽笑倩旁人為整冠將一事翻騰作一聫又孟嘉以落帽為風流少陵以不落為風流翻盡古人公案最為妙法藍水逺從千澗落玉山髙並兩峰寒詩人至此筆力多衰今方且雄傑挺拔喚起一篇精神自非筆力拔山不至於此明年此㑹知誰健醉把茱萸仔細看末聫意味尤為深長羅大經曰萬里悲秋常作客百年多病獨登臺蓋萬里地之逺也秋時之慘悽也作客羈旅也常作客久旅也百年齒暮也多病衰疾也臺髙迥處也獨登臺無親朋也十四字之間含八意而對偶又精確日月籠中鳥乾坤水上萍此自歎之詞蓋拘束以度日月若鳥在籠中漂泛於乾坤間若萍浮水上本是形容凄凉之意乃翻作壯麗之語同上張表臣曰陳無巳語豫曰今人愛杜詩一句之內竊取數字以髣像之非善學者學詩之要在乎立格命意用字而已豫曰如何等是曰冬日謁𤣥元皇帝廟詩叙述功德反覆本意事核而理長閬中歌辭致峭麗語脈新竒句清而體好兹非立格之妙乎江漢詩言乾坤之大腐儒無所寄其身縳雞行言雞蟲得失不如兩忘而寓於道兹非命意之深乎贈蔡希魯詩身輕一鳥過力在一過字徐步詩花蕊上蜂鬚力在一上字兹非用字之精乎學者體其格髙其意鍊其字則自然有合矣何必規規然髣像之乎馬永卿曰古人命題各有深意獨醉詩步屧深林晚開樽獨酌遲仰蜂沾落絮行蟻上枯梨范公稱云見别本乃作倒蟻上枯梨倒之意與行迥異徐步詩整履步青蕪荒庭日欲晡芹泥隨燕嘴花蕊上蜂鬚王仲言有澄心堂紙書作蕊粉上蜂鬚按埤雅蜂蝶皆以鬚嗅鬚蓋其鼻也今絡緯蟷蠰之類亦以其鬚當鼻爾且獨酌則無獻酬也徐步則非奔走也故蜂蟻微細皆能見之若對客與急趨則何暇視詳哉王震澤曰杜詩諸體悉備言其大則有若吳楚東南坼乾坤日夜浮日月籠中鳥乾坤水上萍地平江動蜀天逺樹浮秦五更鼓角聲悲壯三峽星河影動搖之類言其小則有若暗飛螢自照水宿鳥相呼仰蜂粘落絮倒蟻上枯梨修竹不受暑輕燕受風斜之類而尤可喜者如水流心不競雲在意俱遲人與物皆有吾與㸃也之趣片雲天共逺永夜月同孤又若與物偕化謂此翁不知道殆未可也胡元瑞曰山隨平野濶江入大荒流太白壯語也杜星隨平野濶月湧大江流骨力過之九衢寒霧斂萬井曙鐘多右丞壯語也杜星臨萬戶動月傍九霄多精彩過之氣蒸雲夢澤波撼嶽陽城浩然壯語也杜吳楚東南坼乾坤日夜浮氣象過之弓抱關西月旗翻渭北風嘉州壯語也杜北風隨􅐩氣南斗避文星風神過之讀唐諸家至杜輒令人自失屠赤水曰詩有虛有實有虛虛有實實有虛而實有實而虛並行錯出何可端倪乃右實而左虛而謂李杜優劣在虛實之辨何與且杜若秋興諸篇托意深逺畫馬行諸作神情橫逸直將播弄三才鼓鑄羣品安在其萬景皆實而李如古風數十首感時托物慷慨沈著安在其萬景皆虛夫品格既髙風韻自逺凌空駕語何害大雅屈大夫傷時眷主見諸篇什誠然實景至其逺遊等篇凌虛徑度豈不髙哉大人凌雲疇非佳境遊仙招隱亦是美談今夫登閬風坐天姥傍日月挾飛仙即不能至言以快心思之神王豈必據寸壤處蓬茨盤跚䠥躃食飲而巳然後為實景可貴哉老杜語多質朴不知老杜之所以髙妙特立正不在此矣如落日照大旗馬鳴風蕭蕭如隂房鬼火青壞道哀湍㵼如青眼髙歌望吾子眼中之人吾老矣如萬里悲秋常作客百年多病獨登臺如江間波浪兼天湧塞上風雲接地隂如三年笛裏關山月萬國兵前草木風如五更鼓角聲悲壯三峽星河影動搖如永夜角聲悲自語中天月色好誰看如金粟堆前松柏裏龍媒去盡鳥呼風如斯須九重真龍出一洗萬古凡馬空不大悲壯乎如岱宗夫如何齊魯青未了如公主歌黃鵠君王指白日如中宵驅車去飲馬寒塘流如俯視但一氣焉能辨皇州如雲氣生虛壁江聲走白沙如吳楚東南坼乾坤日夜浮如星隨平野濶月湧大江流如詔從三殿去碑到百蠻開如山河扶繡戶日月近雕梁如樓雪融城濕宫雲去殿低如浮雲連海岱平野入青徐如錦江春色來天地玉壘浮雲變古今如織女機絲虛夜月石鯨鱗甲動秋風如江光隱見黿鼉窟石勢參差烏鵲橋不大瑰麗乎如落月照屋梁猶疑照顔色如天寒翠袖薄日暮倚修竹如勿為新㛰念努力事戎行如妾身未分明何以拜姑嫜如信美無與適側身望川梁如孰知是死别且復傷其寒如少壯幾時奈老何向來哀樂何其多如古人白骨生青苔如何不飲令心哀如青絲絡頭為君老何由却出橫門道如君王舊跡令人賞轉見千秋萬古情如野館濃花發春帆細雨來如野水流花徑春星帶草堂如露從今夜白月是故鄉明如親朋盡一哭鞍馬去孤城如江青歌扇底野曠舞衣前如龍武新軍深駐輦芙蓉别殿謾焚香如踈燈自照孤幃宿新月猶懸雙杵鳴如畫圖省識春風面環佩空歸月下魂不大宛轉流利乎老杜之美其大者灼灼若是乃一切置不論而獨取其粗朴以為擅場老杜有靈不胡盧地下乎同上黃維章曰早朝詩合賈至王維岑參互看方知老杜作法之髙開口同拈早意賈則銀燭朝天紫陌長王則絳幘雞人報曉籌岑則雞鳴紫陌曙光寒俱實說早字杜曰五夜漏聲催曉箭從夜言早先一步說催字尤寫出臣子夜坐待旦心事次句同拈春色賈則禁城春色曉蒼蒼岑則鶯囀皇州春色闌俱板填色字杜曰九重春色醉仙桃謂日將升而東方紅氣現也描寫色中之况深一層說聮內同拈大明宫意王則九天閶闔開宫殿岑則金闕曉鐘開萬戶俱實說宫中杜曰宫殿風微燕雀髙以宫外之景物擴一步說賈之百囀流鶯繞建章亦屬宫外景物然語直而味有盡不如微髙二字之曲折聮內同拈朝意賈則劔珮聲隨玉墀步王則萬國衣冠拜冕旒岑則玉階仙仗擁千官俱實寫朝字杜但以朝罷二字㸃綴人詳我略至於同用爐烟香氣賈則衣冠身惹御爐香王則香烟欲傍衮龍浮俱正說殿內烟况杜曰朝罷香烟擕滿袖從出殿退一步說衣冠衮龍不如滿袖之竒為惹為浮不如擕歸之竒也同用鳯池故事賈則共沐恩波鳯池裏王則珮聲歸到鳯池頭岑則獨有鳯凰池上客俱繫實用全用杜曰池上于今有鳯毛以鳯池入超宗之鳯毛析用翻用無復用事之跡同用日動同用旌旗而王之日色才臨仙掌動岑之柳拂旌旗露未乾視杜旌旗日暖龍蛇動句竒平淺深判然相隔矣顧修逺曰聞道河陽近乘勝司徒急為破幽燕按破幽燕之䇿當時見及者不過數人清河李蕚告顔真卿請分兵開崞口出千里之師因討鄴汲以北至于幽陵郡縣之未下者平原清河帥諸同盟㑹兵十萬南臨孟津分兵循河據守要害制其北走之路公但表朝廷堅壁勿戰不過月餘賊必內潰哥舒翰守潼關郭子儀李光弼上言請引兵直取范陽覆其巢穴質賊黨妻子以招之賊必大潰潼關大兵惟應固守不應輕出此潼關未破前事也李泌請令光弼自太原出井陘子儀自馮翊入河東上以所徴之兵軍於扶風與子儀光弼互出擊之來春建寧為范陽節度大使並塞北出與光弼南北犄角以取范陽覆其巢穴賊退無所歸留不獲安然後大軍四面攻之必成擒矣此祿山未死時事也及祿山死河東平泌言直取兩京雖可必得然賊必再强我必再困上問其故對曰今所恃者皆西北守塞及諸蕃之兵性耐寒而畏暑若乘其新至之鋭攻祿山巳老之師必克兩京春氣已深賊收其餘衆遁歸巢穴關東地熱官軍必困而思歸不可留也賊收兵秣馬伺官軍之去必復南來不如先用之寒鄉除其巢穴則賊無所歸此長安未復時事也蕚與李郭之䇿不行是以有靈武之奔泌之䇿不行是以有九節度之潰至上元元年光弼乘河陽之勝遂平懷州此時長安巳復慶緒巳死直搗幽燕萬萬不容更緩故下一急字蓋深惜前三䇿之不早用耳惟公䇿又不行故河陽方捷邙山繼敗直至思明天殛朝義勢窮幽燕之地始歸版籍然究竟以僕固懷恩恐賊平寵衰因田承嗣薛嵩之來降而受之於是河朔三鎮叛服不常其禍與唐祚相終始公詩不徒曰乘勝取幽燕而必曰破幽燕若謂須滅此而後朝食者蓋深見盧陽范陽染暴逆已深非廓清掃蕩與之更始不可招降納叛雖暫弭目前之兵必至養虎貽患元末之於國珍士誠劉誠意不惜以死爭之亦猶公意也然則破之一字尤萬世之金鑑哉歷代詩話卷四十一
