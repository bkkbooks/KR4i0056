body:
  text: 歷代詩話卷三十四歸安吳景旭撰已集上之上杜詩天闕遊龍門奉先寺詩天闕象緯逼雲卧衣裳冷王荆公曰天閲蔡興宗曰天窺楊升菴曰古字窺作窺王弇州曰當如舊字作閲窺咸失之穿鑿吳旦生曰詩題下魯訔注云龍門在東都河南縣地志云闕塞山一名伊闕而俗名龍門東都記云龍門號雙闕與大內對峙若天闕然水經注云昔大禹疏以通水兩山相對望之若闕伊水歷其間北流故謂之伊闕矣春秋之闕塞焉昭公二十六年趙鞅使女寬守闕塞是也陸機云洛有四闕斯其一焉傅毅賦因龍門以暢化開伊闕以達聰故山谷校本所謂此遊龍門詩用闕字何疑多識録云妄改為關又改為閲皆非後見文太青云天宫鉞北北河南南河兩河天闕間為關梁蓋北河南河皆星名各三星而正義又曰闕丘二星在河南天子之雙闕諸侯之兩觀亦象魏縣書之府愚謂黃河應天漢而京洛之南為伊闕伊闕古所謂闕塞蓋雙闕也老杜謂伊闕應天闕云爾雲卧者伊陽之北山即鳴臯之𣲖長殆百里如雲卧然龍門南直卧雲或云然余觀本注亦謂卧字可虛可實公殆據天官地紀以命辭得太青抉出更勝懷贈容齊四筆曰杜集懷贈太白凡十四五篇太白與子美詩略不見一句或謂堯祠別杜補闕者是已然杜為左拾遺不曾任補闕兼自諌省出為華州司功迤邐入蜀未嘗復至東州所謂飯顆山之嘲亦好事者撰耳吳旦生曰飯顆山句胡苕溪亦言李集中無此疑後人所作余觀元遺山詩山頭杜甫長年瘦樓上元龍先日豪張伯雨詩直想瘦生如飯顆竟從癢處得麻姑元人往往用此亦何不細考也最可笑者鶴林玉露謂李贈杜云只為從前作詩苦苦之一辭譏其困雕鐫也杜寄李云重與細論文細之一辭譏其缺縝密也遁齊閒覽謂二人名既相逼不能無相忌荆公亦指隂鏗之比為彼此相軋容齊獨闢之良有識但據藝苑雌黃引李集有沙丘城下寄杜甫詩魯郡東石門送杜甫詩鑿鑿載名則何云不見一句也學林新編云或言甫贈白詩往往似隂鏗乃所以鄙白也按子美寄鄭監李賓客詩鄭李先時論文章並我先隂何尚清省沈宋歘連翩蓋謂隂鏗何遜沈約宋玉也以隂居四人之首則贈太白詩非鄙之也乃深美之也西溪叢語云李侯有佳句往往似隂鏗如柳色黃金嫩梨花白雪香乃隂鏗詩也蕩胸决眥望嶽詩蕩胸生層雲决眥入歸鳥吳旦生曰廣韻藻注謂蕩胸蓋本山之胸也借言雲之潤氣蕩滌人之胸也三山老人語録云張平子南都賦清水蕩其胸相如子虛賦弓不虛發中必决眥老杜借用二賦中字也胸與眥當於山言之或以人言之非也幕燕對雨書懷云震雷翻幕燕驟雨落河魚吳旦生曰王原叔注引左傳季子曰夫子之在此猶燕之巢於幕上按季子宿於戚聞孫林父擊鐘故曰燕巢幕上言甚危也潘嶽西征賦云危素卵之纍殼甚𤣥燕之巢幕丘希範與陳伯之書云將軍魚遊沸鼎之中燕巢飛幕之上不亦惑乎皆用甚危之意金劉鵬南詩燕巢幕上終非計乃合本意如言燕概及巢幕謝宣遠九日從宋公戲馬臺詩巢幕無留燕遵渚有來鴻則失實矣姚合詩驚飈墜鄰果暴雨落江魚皮日休詩髙風翔砌鳥暴雨失池魚皆似杜句天棘已上人茅齊詩江蓮搖白羽天棘蔓青絲吳旦生曰鄭樵云天棘柳也按茶瓜留客已是深夏柳老葉濃不可言絲一誤羅大經云佛書終南長老夢天帝賜青棘之香言蓮香如棘香爾按兩句開說未是串釋因此改蔓作夢二誤齊生云凱風棘心夭夭天棘當是天棘之訛按凱風注棘心稚弱未成夭夭言其少難以言蔓三誤不若依舊注作天門冬為是本草經云天門冬一名顛勒本草索隱云天門冬在東嶽名淫洋霍在南嶽名百部在西嶽名管松在北嶽名顛棘內篇云天門冬或名地門冬或名延門冬或名顛棘顛與天聲相近而互名也山海經小徑之山有草名􅞒赤莖白華如顛冬也顛冬天門冬也爾雅髦顛棘注細葉有刺蔓生學林新編云天棘其苖蔓生好纒竹朩上葉細如青絲據此則蔓字亦非浪下裋褐冬日懷李白詩裋褐風霜入吳旦生曰俗本誤作短褐升菴云裋音豎二字出列子按裋俗讀若短詞人有即用短服者升菴已證其非說文裋豎使布長襦趙凡夫箋云詳𥜗訓裋當從短乃豎使衣服之所宜也襦訓短衣而豎訓長襦則說文長字疑為短悮耳余按始皇紀贊寒者利裋褐貢禹傳裋褐不完注云裋者謂僮豎所著布長襦也則說文當亦據此耶荀子作豎褐方言自關以西謂之裋褕亦曰裋褐寧戚飯牛歌裋袴襌衣直至骭杜又有寄韋尹詩江湖漂裋褐霜雪滿飛蓬橋陵詩諸生舊裋褐旅泛一浮萍咏懷詩賜浴皆長纓與宴非裋褐遣興詩吾憐孟浩然裋褐即長夜北征詩天吳及紫鳳顛倒在裋褐賈島送胡道士詩裋褐身披漬野苔韓退之詩牛被文繡兮士無裋褐陸放翁詩裋褐竒溫等狐腋寒蔬脆美敵熊蹯清新俊逸西清詩話曰嘗於汴中逆旅與同行論杜詩旁有一押糧運使臣或顧之曰爾亦觀杜詩乎曰生平好觀然多不解因舉白也詩無敵相問曰既言無敵安得却似鮑昭庾信座中不能遽對漁隱叢話曰庾清新而不能俊逸鮑俊逸而不能清新白能兼之此其所以無敵也武辨何足以知之吳旦生曰芥隱筆記王仲言有南唐澄心紙書此詩白也詩無數飄然意不羣清新庾開府豪邁鮑參軍渭北春天樹江東日暮雲何時一樽酒重與話斯文洪容齊謂無敵別本作無數殆好事者更之蓋指此也如寒山子詩吾心似秋月碧潭清皎潔無物堪比倫教我如何說人亦言既似秋月碧潭乃以為無物堪比何也蓋其意謂若無二物比倫當如何說耳觀此可與杜詩相發蜀中詩話云庾信詩奉和趙王泛江喜雨送軍賚酒等篇不一而足想趙王自是作者惜不傳耳杜少陵寓蜀久每以自况見諸篇什者曰清新庾開府曰庾信衷雖好曰庾信平生最蕭瑟暮年詞賦動江關按庾信哀雖好子美在潼川作是時同漢中王遊泛故以趙王喻漢中也江關係䕫府庾信奉和泛江云春江上白帝畫舸向黃牛即此地船飲中八仙歌云天子呼來不上船吳旦生曰山谷謂蜀人以衫領為船而定功引范傳正作白墓碑云𤣥宗泛白蓮池召李白作序時已被酒命髙將軍扶以登舟或以衣領為船妄也余按代醉編云襟紐為衣船此語為長雖見天子而披襟自若有以見太白之醉甚矣冷齊夜話云句法欲老健有英氣當間用方俗言為妙如竒男子行人羣中自然有穎脫不可干之韻老杜八仙詩序李白曰天子呼來不上船方俗言也所謂襟紐是也尸鄉寄河南韋尹詩尸鄉餘土室誰話祝雞翁吳旦生曰行本作難說蔡興宗較作誰話二字按韋濟為河南尹老杜有故廬在偃師濟屢訪問之故老杜寄此詩蓋偃師有尸鄉也搜神記云祝雞翁者洛陽人也居尸鄉北山下養雞百年餘雞至千餘頭皆有名字欲取呼之名則種別而至後之吳山莫知所去矣風俗通謂俗傳雞本朱氏翁化為之故呼雞皆曰朱朱說文解喌喌二口為歡州其聲也讀若祝祝者誘致禽畜和順之意喌與朱相似耳野客叢書引施肩吾詩遺却白雞呼喌喌喌音祝天寶中濟授尚書左丞嘗見放懷集云杜每朋友至引見妻子韋侍御見而退使其婦送夜飛蟬以助籹飾豈即其人耶沒東坡志林曰子美詩白鷗沒浩蕩萬里誰能馴蓋滅沒於烟波間耳而宋敏求謂豫云鷗不解沒改作波字改此字覺一篇神氣索然冷齊夜話曰沒悮作波非惟無氣味亦分外閒置波字吳旦生曰漫録謂鮑昭詩翻浪揚白鷗李頎詩滄波雙白鷗二公言白鷗而繼以波浪此又何耶野客叢書云善為詩者但形容渾涵氣象初不露圭角玩味白鷗波浩蕩之語有以見滄浪不盡之意且滄浪之中見一白鷗其浩蕩之意可想又何待言其出沒耶改此一字反覺意局余按詩鳬鷖在涇鷖鳬屬蒼黑色鳬好沒鷖好浮故鷖一名漚今字以鳥後人加之也漁隱叢話云禽經鳬善浮鷗善沒以沒字易波字東坡言益有理冷齊以沒字易浩字其理全不通浩蕩謂烟波也今云波沒蕩亦不成語余竊以苕溪一引而二悮矣禽經既倒易而冷齊謂沒悮作波非悮作浩也蓋鷗品最閒沒非其性公又詩鷗行炯自如鶴林玉露謂召南大夫節儉正直而退食委蛇彼都人士行歸於周而從容有常皆炯自如者也觀此則公必不以沒字輕待鷗矣赤羽故武衛將軍挽詞云赤羽千夫膳黃河十月氷吳旦生曰修可注引家語赤羽若日白羽若月千夫膳言所膳者千兵也雲麓漫抄云此章言將軍善舞劍及鳴弓則赤羽謂箭言弦不虛發發必得獸可以供千軍之膳茍如所注則不與下句對而意殊遠矣阿戎藝苑雌黃曰杜位宅守嵗詩破題云守歲阿戎家又有盍簮喧櫪馬列炬散林鴉之句潘惇詩話謂舊本作守歲阿咸家杜位子美姪也當以阿咸為是故東坡除夜詩欲喚阿咸來守歲林鴉櫪馬鬬喧譁正用杜語則知今本作阿戎者誤吳旦生曰杜位公弟也公有送柏二別駕因示從弟行軍司馬位詩云與報惠連詩不惜知吾斑鬢總如銀注引宋書謝惠連善屬文族兄靈運曰每有篇章對惠連輒得佳句蓋以惠連况位也阿戎即如云惠連耳按齊主將廢鬱林王時王晏從弟思遠謂兄荷世祖厚恩及此引决可保身家晏不聽及拜驃騎謂子弟曰阿戎勸吾自裁若從其語豈有今日注云晉宋間人多謂從弟為阿戎此出通鑑正史注而陸魯望小名録謂阿戎為思遠小字非是觀此則位宅宜作阿戎家矣王原叔注引王戎事此阮籍對王渾而呼阿戎則是父子間事引之未當蓋簮杜位宅守歲詩盍簮喧櫪馬列炬散林鴉吳旦生曰大易豫之九四朋盍簮王弼云盍合也簮集也謂朋來之速王應麟云簮疾也至侯果始有冠簮之訓朝景迂曰古者禮冠未有簮名詳杜詩意似以為冠簮之簮失大易本訓困學紀聞云按李林甫傳杜位林甫諸壻也時林甫在相位盍簮列炬之盛其炙手之徒與又寄杜位詩近聞寬法離新州想見懷歸尚百憂逐客雖皆萬里去悲君已是十年流其流貶蓋以林甫故子規王母𤣥都壇詩子規夜啼山竹裂王母晝下雲旗翻吳旦生曰上句張邦基言其聲清越如竹裂也下句張表臣引秋興西望瑶池降王母為證余竊以二者皆失按峩山記云漢竇誼放浪不羈月夜聞子規啼曰竹裂吾可歸峩眉是夕竹裂天明遁去武帝三徴之不起酉陽雜爼云齊郡函山有鳥名王母使者昔漢武帝上山得玉函長五寸帝下山函化為鳥飛去世傳山上有王母藥函常令鳥守之墨莊漫録云中官陳彥和言頃在宣和間掌禽苑蜀中貢一種鳥狀如燕色紺翠尾甚多而長飛則尾開裊裊如兩旗名曰王母則子美所言乃此禽也據此則子規王母應並屬鳥而竹裂旗翻亦工對矣若以王母為降瑶池者則風俗通呼虎為李耳亦將以李耳為來函關者耶一笑方言虎陳衛宋楚之間謂之李父江淮南楚之間謂之李耳注云虎食物值耳而止以觸其諱故鸊鵜贈張垍詩健筆凌鸚鵡銛鋒瑩鸊鵜吳旦生曰鵜一作鷉爾雅鷉字注云鷉鸊鷉似鳬而小膏中瑩刀埤雅云金得伯勞之血則昏鐵得鸊鵜之膏則瑩謂其膏可以塗刀劍令不鏽戴嵩度關山云馬銜苜蓿葉劍瑩鸊鵜膏李長吉劍子歌云鸊鵜淬花白鷴尾衛象詩鸊鵜新淬劍光寒公又有大食刀歌云鐫錯碧罌鸊鵜膏鋩鍔已瑩虛秋濤軒贈哥舒翰二十韻云軒墀曾寵鶴吳旦生曰左傳衛懿公好鶴鶴有乘軒者注云軒大夫車也說文軒曲輈藩車賈子云衛侯喜鶴有飾以文繡而乘軒鮑明遠鶴賦入衛國而乘軒浮溪詩人間何事非戲劇鶴有乘軒蛙給廪水經注引晉中州記惠帝為太子令曰若官蝦蟇可給廩今公以為軒墀之軒誠誤矣然余思淹博如公何誤至此因計墀字或是犀字之訛蓋犀軒卿車也公意以卿大夫之車而寵鶴乃於傳意無失也天啓中徐于贈鶴詩未許軒墀分氣色代鶴答云軒墀曾是誤恩來此皆用杜而惜其未審也簿尉墨客揮犀曰杜甫贈髙適詩脫身簿尉中始與捶楚辭韓愈贈張工曹詩判司卑官不堪說未免捶楚塵埃間杜牧寄小姪阿宜詩參軍與簿尉塵土驚劻勷一語不中治鞭捶身滿瘡以此明唐之參軍簿尉有過則受笞杖之刑猶今之胥吏也吳旦生曰杜詩鮑注云非謂簿尉受杖杖有罪者耳退之謂栖栖法曹掾敲搒發姦偷此豈受杖者耶余以屬吏受杖蓋不獨唐時有也野客叢書所引前漢王嘉為宰相裸躬受笞司馬遷謂陵夷至於捶楚之間此猶臣下受人君之杖耳若後漢戴宏為郡督郵曾以職事見詰府君欲撻之三國志黃蓋為守長署兩掾教曰若見姦欺終不加以鞭杖宜各盡心世說載太守劉淮杖主簿向雄後同在政府不交言武帝敕雄復修君臣之好北史厙狄連為鄭州刺史開府參軍皆加捶撻魏收為中外府主簿頻被箠楚唐書雍州經略使陳曇怒判官劉緩杖之二十五而卒浙西觀察使韓臯封杖决安吉令孫解臀杖十下而死劉晏考所部官六品以上杖訖而奏杜牧之謂尹坐堂上階下拜兩赤縣令屬官將百人悉可笞辱此正明驗古人屬吏受杖之說也金魚金龜漁隱叢話曰太白有句云金龜換酒處子美有句云金魚換酒來世言換酒必曰脫金貂殊不知二公又有金龜金魚之異名也吳旦生曰讀二詩而唐制之因革存焉佩魚始於唐永徽二年以李為鯉也武后天授元年改佩龜以𤣥武為龜也李云龜蓋白弱冠遇賀監尚在中宗朝未改武后制也杜云魚蓋開元中復佩魚也按孔毅父談苑云三代以韋為算袋盛算子及小刀磨石等魏易為龜袋唐書車服志云唐初文武職官並給隨身魚天授二年改佩魚為龜三品以上龜袋飾以金四品以銀五品以銅中宗初罷龜袋復以魚郡王嗣王亦佩金魚袋景龍中令特進佩魚散官佩龜衣紫者魚袋以金飾之衣緋者以銀飾之簷花楊升菴曰燈前細雨簷花落注謂簷下之花恐非蓋謂簷前雨映燈花為花爾後人不知或改作簷前細雨燈花落則直致無味矣吳旦生曰趙次公注引劉邈簷花初照日之語漁隱叢話引周美成詞浮萍破處簷花簾影顛倒以為簷花二字用杜少陵全與出處意不相合野客叢書云丘遲詩共取落簷花何遜詩簷花落枕前不知劉邈之先已有簷花落三字矣李白詩簷花落酒中李暇亦有簷花照月鶯對棲之語不但老杜也詳味周用簷花二字於理無礙漁隱謂與少陵出處不合殆膠於所見乎余想漁隱看杜與升菴同意故謂周詞不合總之興會所至隨意落筆何必泥於出處也逸句陸三汀語升菴曰麗人行古本珠壓腰衱穩稱身下有足下何所著紅蕖羅襪穿鐙銀二句今本無之蔡衡仲擊節曰非惟樂府鼓吹兼是周昉美人畫譜也海録碎事云衱居業反裙也吳旦生曰余觀麗人行本非老杜極筆頭上何所有背後何所見亦是繁欽定情之遺添入足下何關有無况所添句亦拙實少致王弇州以為泓渟有妙趣吾不信也緑沈重過何氏詩雨拋金鎖甲苔卧緑沈鎗吳旦生曰周少隱言甲拋於雨為金所鎖鎗卧於苔為緑所沈有將軍不好武之意薛蒼舒以緑沈為精鐵趙德麟以緑沈為竹楊升菴以緑沈色為漆飾鎗柄王勉夫謂緑沈不可專指一物如梁武帝食緑沉瓜王逸少緑沉漆管筆唐太宗詩羽騎緑沈弓韋朗作緑沉屏風石季龍用緑沉扇蓋有物色之深者為緑沈也胡元瑞又謂物色深不若言緑色深者為緑沈也余觀武庫賦云緑沉之鎗殷文圭贈戰將詩緑沈鎗利雪峰尖犀甲軍裝稱紫髯則鎗自屬鐵其色乃緑沉耳若杜牧之䏶壓緑檀槍檀與沈相近而壓字不逮卧字多總之二句神情全在拋字卧字言外見武備全弛而漁陽一鼓倉卒陸沈有所以召之也長雨東臯雜録曰闌風伏雨秋紛紛伏乃仗之誤闌珊之風冗仗之雨也漁隱叢話曰世說王忱求簟於王恭恭曰文人不悉恭恭作人無長物則冗仗用此長字為是集韻去聲與仗字同音杜詩舊本作長雨東臯謂伏乃仗之誤非也吳旦生曰荆公謂伏當作仗山谷謂當作長漁隱證之極確劉會孟謂伏疑仗仗又疑長愈失本真此未曾深考耳蔡雍霖賦懸長雨之森森此則老杜所自出也按字學集要云長餘也多也冗也剩也論語長一身有半同作去聲白樂天詩司馬人間冗長官陸機文賦文固無取乎冗長亦去聲公故有冗長吾敢取之句又哀王孫云不敢長語臨交衢舊注長音仗乃剩言也不喜劉貢父詩話曰歐公不甚喜杜詩然於李白甚賞愛將由李白超趠飛揚為感動也吳旦生曰邵伯溫聞見録歐公於詩主退之不主子美劉原父每不然之後山詩話歐公不好杜詩豫每與魯直怪為異事庚溪詩話云世謂公不好杜詩觀六一詩話載陳從易舍人初得杜集舊本多脫誤其送蔡都尉詩身輕一鳥其下脫一字陳與數客各用一字補之或云疾或云落或云起或云下其後得善本乃身輕一鳥過陳歎服以為雖一字諸君不能到也又曰唐之晚年信復李杜豪放之格但務以精意相髙而已又集古目録曰秦嶧山碑非真杜甫直謂棗朩傳刻爾杜有李潮八分小篆歌云嶧山之碑野火焚棗朩傳刻肥失真故也六一於杜詩既稱其雖一字人不能到又稱其格之豪放又取以證碑刻之真僞詎可謂六一不好之乎花鬚陪李金吾花下飲云隨意數花鬚吳旦生曰王逸少居山隂或㸃數花鬚摘撚咀嗅怡然自若公蓋用此金人周德卿詩曾數花鬚傍藥闌元范德機詩日長獨坐數花鬚亦此事也按劉淵林三都賦注云蘂香或謂之華或謂之實一曰花鬚頭㸃也潘嶽石榴賦緗的㸃乎紅鬚夏侯孝若石榴賦冒紅芽於丹鬚儲光羲薔薇詩髙處紅鬚欲就手王荆公梅詩鬚撚黃金危欲墮張文潜梅詩誰知檀蕚香鬚裏張吉甫詩碎粘粉紫鬚齊吐嵽嵲咏懷詩御榻在嵽嵲吳旦生曰集韻作􅒈岧按嵲一作霓文選直墆霓以髙居墆徒結切霓五結切逸雅霓齧也其體斷絶見於非時此災氣也傷害於物如有所食齧也一作霓音臬屈虹也天文志抱珥􅛆霓韻會凡虹雙出色鮮盛者為雄曰虹差暗者為雌曰霓亦作蛪天官書其蛪者類闕旗一作􅛆音臬山海經君子國􅛆􅛆在其北又朝陽之谷神曰天吳是謂水伯在􅛆􅛆北注􅛆螮蝀也逸雅云蝃蝀其見每於日在西而見於東掇飲東方之水氣也見於西方曰升朝日始升而出見也天子馬艇齊詩話曰老杜詩吾聞天子之馬走千里當是天馬之子吳旦生曰穆天子傳天子之馬走千里天子之狗走百里黃山谷引以為證蔡傅卿亦引之蓋公作天育驃騎歌用此成語為起句渾然天成當從諸本作天子之馬題下注云天育廄名故歌云遂令大奴守天育漁隱叢話云東坡題此歌於天育驃騎圖後寫作大奴字天育則天育為大奴字也矯矯龍性合變化合字亦寫作含字定武有此石刻歷代詩話卷三十四
