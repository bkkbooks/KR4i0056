  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0056_WYG_063-1a, image: WYG1483/WYG1483-0637c.png}
body:
  text: 歷代詩話卷六十三歸安吳景旭撰壬前集中金詩駃党世英喜雨詩山雲駃如驅山雨沛如傾吳旦生曰元遺山詩駃雨東南來自注云駃與快同江淹蓮花賦秋風駃兮舟容與趙松雪有駃雪帖則是駃雲駃雨駃風駃雪皆可稱也他如慎子云河下龍門其流駃如竹箭崔子虛論醫脉云遲而少駃為緩鍾繇調周泰云乞兒乘小車一何駃乎曹真有名駃號驚帆臧道顔有駃牛賦飲党世傑弔石曼卿詩城頭山色翠玲瓏尚憶清狂四飲翁鐵馬氷車斷遺響桃花石室自春風吳旦生曰畫墁録蘇舜欽石延年輩有名曰鬼飲了飲囚飲鱉飲鶴飲鬼飲者夜不以燒燭了飲者飲次挽歌哭泣而飲囚飲者露頭圍坐鱉飲者以毛席自裹其身伸頭出飲畢復縮之鶴飲者一杯後登樹下再飲耳則曼卿之飲其名有五又類苑云曼卿每與客痛飲露髮跣足著械而坐謂之囚飲坐朩杪謂之巢飲以藁束之引首出飲復就束謂之鱉飲此所載又不同而世傑詩稱四飲豈别有據耶曼卿守昫山遣人以泥封桃李核彈之巖石中其後花開滿山又嘗携妓飲山之石室間鳴絃為氷車鐵馬聲故世傑過昫山為詩弔之三絶趙周臣寄王子端云李白一杯人影月鄭䖍三絶畫詩書吳旦生曰唐明皇愛鄭䖍之才以為博士善圗山水好書嘗自寫其詩并畫以獻帝大署其尾曰鄭䖍三絶杜子美哀之云昔獻書畫圗新詩亦俱往三絶自御題四方尤所仰按元遺山稱子端詩有師法髙出時輩之右字畫學米元章其得意處頗能似之墨竹殆天機所到文湖州已下不論也則周臣贈以三絶當不誣云讀詩周德卿讀陳後山詩云子美神功接混茫人間無路可升堂一斑管內時時見賺得陳郎兩鬢蒼吳旦生曰嘗讀杜集戲為六絶此便是老杜詩話其一絶云才力應難跨數公凡今誰是出羣雄或看翡翠蘭苕上未掣鯨魚碧海中蓋言前輩之不易貶又言其不易效也德卿特借後山以為言而非但貶後山已也亦猶老杜之非貶四傑耳竹坡老人詩話云䕫峽道中昔有杜少陵題詩一首以天字為韻榜之梁間自唐至今無敢作詩者有一監司過而見之輒和少陵韻大書其側後有人嘲之云想君吟咏揮毫日四顧無人膽似天過者無不笑之録此可為詞家炯鍳逺山劉之昻詩逺山句好畫難成栁眼才多總是情今日衰顔人不識倚爐空聽煮茶聲吳旦生曰張秦娥者能小詩其賦逺山云秋水一抹碧殘霞幾縷紅水窮霞盡處隱隱兩三峰其後流落故劉贈以此詩秦娥為之泣下劉嘗有詩云嵩髙山下逢秋雨破傘遮頭水沒腰此景此時誰㑹得清如忩下聽芭焦祝枝山誦之笑其上下淋漓清在何處觀其他詩有云折盡官橋楊栁枝春風依舊緑絲絲啼鶯為向行人道離别何時是盡時又云雨洗明河畫扇收匡牀露冷藥闌秋墻隂未得中庭月一㸃螢光草際流能於清折之中自成淒斷日觀蕭真卿日觀峰詩洪波萬里兼天湧一㸃金烏出水心吳旦生曰應劭漢官儀云泰山東南名曰日觀日觀者雞鳴時見日淮南子云日中有踆烏注踆趾也謂三足烏也甘氏星經云日者陽宗之精也為雞三足為烏二足雞在日中而烏之精為星以司太陽之行度月者隂宗之精也為兔四足為蟾蜍三足兔在月中而蟾蜍之精為星以司太隂之行度水島志云琉球國有大﨑山極髙峻夜半登之望暘谷日出紅光燭天山頂為之俱朗宋學士集云補怛洛迦山在東大洋中雞初曉遙見東方日出輪亦如火流光燭波閃爍不定燕子圗田器之贈燕子詩幾年塞外歷﨑危誰謂烏衣亦此飛朝向蘆陂知有為暮投茅舍重相依君憐我處頻迎語我憶君時不掩扉明日西風悲鼓角君應先去我何歸吳旦生曰器之名琢雲朔人明昌五年進士慷慨有志節趙周臣所謂田侯落落竒男子也其燕子圗自叙云從軍塞外野舍荒凉有雙燕亦巢此屋土人屢欲捕之曲為全護此燕畫出夜歸必開户待之忽一日飛止坐隅巧語移時豫始悟明日秋社當歸殆留别語也作此詩贈之寫以細字為蠟丸繫燕足上又八年任潞州觀察判官坐廨舍之含翠堂忽雙燕至豫諦視之繫足蠟丸故在蓋往年贈詩者也龎才卿畫為圗作詩云解足分明得帛書真是當年留别句楊之美詩海國傳心千驛隔塞垣回首十年非張巨濟詩小詩繫足初無意巧語迎人獨有情李之純詩心知話盡春愁處相對依依如故人王大用詩莫償恩義三生債分付平安七字篇李欽叔詩客舍花門新信息雲兜香冷舊昏黃青奴黃妳龎才卿喜夏詩青奴初薦枕黃妳亦升堂吳旦生曰黃山谷謂竹夫人乃涼寢竹器憩臂休膝非夫人之職而冬夏青青竹之所長故名曰青奴嘗作詩云我無紅袖堪娛夜正要青奴一味凉則才卿所謂青奴薦枕其意工矣海録碎事云黃妳言書卷怡神如妳媪有人讀書把卷即睡梁人因呼書卷為黃妳嵗時風土記云唐人呼晝睡為黃妳據此則黃妳升堂其義安在才卿特未詳考耳正統中周伯器詩不信紅塵深沒馬可堪黃妳亂堆床余有山居詩樂土歸黃妳通侯等緑君此用風土記說也洪駒父六言詩引睡直須黃妳曲肱正要青奴昔人以為佳才卿殆本此作對耶按博物志孫樵為史書曰墨兵瀆又海録碎事謂史才操賢與愚以筆為獄陳眉公云墨兵筆獄可謂佳對然竟以墨兵對黃妳亦自工而協自題密公自題寫真云枯朩寒灰亦自神應緣來現胙公身只因苦愛東坡老人道前身趙德麟吳旦生曰名璹字子瑜興陵之孫越王長子初封胙國公正大間進封密稱完顔宗室之良者必推曰密公其字畫得蘇黃之間家藏法書名畫幾與中祕等南渡倉卒子瑜寶護之與身存亡故他貨不得一錢著身以此貧甚客至不能具酒肴設蔬飰與之共食焚香煮茗盡出藏書商略之使人樂之而不去也子瑜有詩云冷官領取閒中趣逺勝區區夢蟻忙亦自道其髙致矣能趙宜之寄元遺山詩老懶愚軒百不能飽諳人意冷於氷清狂舊日耽詩客灰朽而今有髮僧吳旦生曰丙集郭賦中余既辨能字矣然才能之能當於下平十蒸韻用而不當上平十灰韻用也漁隱叢話云能奴登切獸名絶有力故有絶人之才者謂之能又能奴來切三足鱉也徐季海詩於來字韻中用法士多瓌能乃是僧似鱉耳借對馮叔獻詩老伏固非千里驥冥飛似是五噫鴻吳旦生曰梁鴻有五噫歌以鴻對驥詩家自有此借對法余有詩云有客潔如鷺因人熱豈鴻亦此意也鼓吹劉雲卿詩身後功名半張紙夜來鼓吹一池蛙吳旦生曰孔稚圭以鳴蛙當兩部鼓吹詞人往往入咏蘇東坡詩云水底笙歌蛙兩部山中奴𨽻橘千頭是以笙歌易鼓吹矣又云己遣亂蛙成兩部更邀明月作三人此乃歇後語不知兩部為何物也不若雲卿用本色出處為顯而穩修月斧劉景純咏酴醿詩玉斧無人解修月珠裙有意欲留仙吳旦生曰酉陽雜爼太和中鄭仁本與王秀才逰嵩山遂迷歸路見一人布衣甚潔白枕一幞物方眠熟即呼之其人笑曰君知有月七寶合成乎月勢如丸其影日爍其凸處也常有八萬三千户修之豫即一數因開幞有斤鑿數事楊亷夫作修月匠歌云天公弄丸七寶鈿脆如琉璃拆如線月中斤人八萬户敕賜仙厨璚屑飯什什伍伍入杳冥妙手持天輕欲旋千斤寶斧運化鈞混沌皮開精魄見戴敏小園詩惜樹不磨修月斧愛花須築避風臺蔡伯堅雪晴詩喚取廣寒修月斧月波千丈捲秋還雷希顔詩文字喜逢修月斧津梁愧乏濟川材薩天錫贈别詩桂殿且留修月斧銀河未許度星軺解大紳中秋詩吾聞廣寒八萬三千修月斧晴處生明缺處補馬浩瀾逰仙詩八萬三千修月斧多將玉屑當乾糧楊升菴云中州集金羽士王豫可咏西瓜云一片冷沈潭底月半彎斜捲隴頭雲孫鐸咏玊簮花云披拂西風如有待徘徊涼月更多情鄭子𥅆咏酴醿云玉斧無人解修月珠裙有意欲留仙皆極體物之工兀劉次霄早行詩馬上兀殘夢沈沈天向晨吳旦生曰劉駕早行詩馬上續殘夢馬嘶時復驚最為警䇿故張為取作主客圗楊升菴謂此句千古絶唱東坡改之作瘦馬兀殘夢便覺無味余觀東坡太白山早行有起句云馬上續殘夢不知朝日升又中途雪作有云東風吹宿酒瘦馬兀殘夢情味各妙無可軒輊亦是偶愛駕語而兩用之耳今次霄復愛坡語而合用之歷代詩話卷六十三
