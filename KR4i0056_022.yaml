body:
  text: 歴代詩話巻二十二歸安吳景旭撰丁集上之上古樂府富媪郊祀歌云后土富媪昭明三光吳旦生曰張晏注坤為母故稱媪郊祀歌别章又云惟泰元尊媪神蕃釐注泰元天也媪神地也楊升庵謂氣曰煦體曰嫗天以氣煦之地以形嫗之后土富媪亦此義凡此皆地作媪矣余觀吳斗南謂媪當作煴按賈誼新書云德渥澤洽調和大暢則天清徹地富煴物時熟是知漢時之語意籋天馬歌云精權奇籋浮雲吳旦生曰籋古躡字言天馬上躡浮雲也隴上歌云隴上壯士有陳安䯀驄文馬銖鍛鞍按䯀亦古躡字蘇東坡次韻趙伯充畫馬云十駕均一至何事籋雲風元厚之詩仙驥籋雲穿仗下象載漢郊祀歌象載瑜白集西吳旦生曰容齋三筆謂象載瑜章曰象載瑜白集西顔師古云象載象輿也山出象輿瑞應車也赤蛟章曰象輿轙即此也而景星章曰象載昭庭師古云象謂懸象也懸象祕事昭顯於庭也二字同出一處而自為兩說按樂章詞意正指瑞應車言昭列於庭下耳三劉漢釋之說亦得之而謂白集西為西雍之麟此則不然盖歌詩凡十九章皆書其名於後象載瑜前一行云行幸雍獲白麟作自為前篇朝隴首覽西垠之章不應又於下篇贅出之也余觀樂府原題云漢武帝郊祀之歌十九章朝隴首十七注元狩元年行幸雍獲白麟作象載瑜十八注太始元年行幸東海獲赤馬作據此則容齋之言益信房中劉元成語録曰西漢樂章可齊三代舊見漢禮樂志房中樂十七章格韻髙嚴規模簡古駸駸乎商周之頌噫異哉此髙帝一時佐命功臣下至叔孫通輩皆不能為此歌尋推其原乃唐山夫人所作服䖍曰髙帝姬也韋昭云唐山姓也漢初乃有此人縦使竹竿載馳方之陋矣吳旦生曰王弇州謂唐山夫人雅歌之流調短弱未舒耳余以短弱未舒非所以論樂章樂章類多質奥但房中樂亦自成漢初絶調耳至謂賢於竹竿載馳不又擬之失倫乎按樂府原題云房中樂者婦人禱祠於房中也故宫中用之髙祖好楚聲故房中樂楚聲也孝惠二年使樂府令夏侯寛備其簫管更名曰安世樂困學紀聞云周有房中之樂燕禮注謂弦歌周南召南之詩漢安世房中樂唐山夫人所作魏繆襲謂安世歌神來燕享永受厥福無有二南后妃風化天下之言謂房中為后妃之歌恐失其意通典平調清調瑟調皆周房中之遺聲秋安世房中歌云飛龍秋遊上天吳旦生曰漢書蘇林注云秋飛貌顔師古注云莊子有秋駕之法者亦言駕馬騰驤秋秋然也歴代詩話巻二十二
