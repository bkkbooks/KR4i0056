body:
  text: 厯代詩話詩文評類提要臣等謹案厯代詩話八十卷國朝吳景旭撰景旭字旦生歸安人是書前後無序跋而中有塗乙之處蓋猶初定之藁分為十集以十千為目甲集六卷皆論三百篇乙集六卷皆論楚詞丙集九卷皆論賦丁集六卷皆論古樂府戊集六卷皆論漢魏六朝詩已集十二卷前九卷論杜詩後三卷為杜陵譜系庚集九卷皆論唐詩辛集七卷皆論宋詩壬集十卷前三卷論金詩後七卷論元詩癸集九卷皆論明詩其體例仿陳耀文學林就正每條各立標題先引舊説于前後雜采諸書以相考證或辨其是非或參其異同或引伸其未竟或補綴其所遺皆下一格書之有舊説所無而景旭自立論者則惟列本詩于前而以已意發揮之雖皆採自詩話説部不盡根柢于原書又嗜博貪多往往借題曼衍失于芟剃然取材繁富能以衆説互相鈎貫以參考其得失于雜家之言亦可謂淹貫者矣較以古人固不失苕溪漁隱叢話之亞也乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:838bed3a37595247f27ba8f839768e8b4d164c4b380bd947375cf347dc255920
