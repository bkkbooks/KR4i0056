body:
  text: 歷代詩話卷五十五歸安吳景旭撰辛集上之上宋詩苦熱古今詩話曰宋太祖采聽至明逺邊事纎悉必知有間者自蜀還上問劍外有何事間者曰但聞成都滿城誦朱山長苦熱詩曰煩暑鬱蒸無處避凉風清冷幾時來上曰此蜀人思吾來取也吳旦生曰能改齊漫録云梓潼山人李堯夫吟咏尚譏刺謁蜀相李昊昊戲曰何名之背時耶堯夫厲色對曰甘作堯時夫不樂蜀中相因是為昊所擯自吟苦熱詩云炎暑鬱蒸無處避凉風消息幾時來以此知兩句乃李堯夫詩非朱山長也清冷兩字不逮消息逺甚談苑云孟蜀嵗餘題桃符上云新年納餘慶嘉節號長春明年蜀亡吕餘慶以參知政事知益州長春乃太祖聖節名也故人吕䝉正罷相歸洛作詩贈友云鄰叟盡垂新白髮故人猶著舊麻衣吳旦生曰文穆公嘗與溫仲舒及一友人讀書洛陽龍門山誓不作狀元不仕及唱第文穆為狀頭溫亦中甲科其友人隨拂衣歸隱後文穆大用太宗問昔與誰友文穆即以歸隱者對遂以著作郎召不起故文穆歸贈之以詩所謂故人蓋指歸隱者也梁灝孔毅父談苑曰梁灝八十二嵗雍熙二年狀元及第謝啓云白首窮經少伏生之八嵗青雲得路多太公之二年後終祕書監遁齊閒覽亦云八十二嵗及第卒年九十餘詩話類編又載其謝恩詩云天福三年來應舉雍熙二載始成名饒他白髮巾中滿且喜青雲足下生觀榜更無朋輩在到家惟有子孫迎也知年少登科好爭奈龍頭屬老成吳旦生曰洪景盧言梁公字太素雍熙二年廷試甲科景德元年以翰林學士知開封府暴疾卒年四十二其子固卒年三十三史臣謂梁方當委遇中途夭謝又云梁之秀穎中道而摧余因觀國史及朝野雜記俱云灝中狀元年二十三按梁公試庭燎賦進士第一人御殿唱名自梁榜始因宴於瓊林苑遂為定制蓋所紀載章章若此晚遇之說不知何人創澠水燕談録云祥符二年真宗東封岱山梁固及第灝之子四年祀后土於汾隂張師德及第去華之子兩家父子狀元魏野賀以詩云封禪汾隂連嵗榜狀元俱是狀元兒重戴王元之贈崔遵度云且留重戴士風多吳旦生曰堯山堂外紀云宋初猶襲唐制士子皆曵袍重戴出則席帽自隨李巽纍舉不第鄉人曰李秀才不知甚時席帽離身及第後乃遺鄉人詩為報鄉閭親戚道如今席帽已離身余按遵度及第未脫白時元之贈此句故猶言重戴也石林燕語云唐至五代宋初京師皆不禁打繖五代始命御史服裁帽宋淳化初又命公卿皆服之既有繖又服帽故謂之重戴自祥符後始禁惟親王宗室得打繖其後通及宰相樞密參政則重戴之名有别矣詩宰相王禹稱詩杜甫且為詩宰相吳旦生曰王昌齡集云王維詩天子杜甫詩宰相元之本此丁晉公云子美集開詩世界張伯雨跋語云元耨埓太監請於朝諡杜甫為文貞詩話類編云甫十餘嵗夢人令採文於康水覺而問人此水在二十里外乃往求之見峩冠童子告曰汝本文星典吏天使汝下謫為唐世文章雲誥已降可於豆壠下取甫依其言果得一石金字曰詩王本在陳芳國九夜捫之麟篆熟聲振扶桑享天福後因佩入葱市歸而飛火入室有聲曰邂逅穢我令汝文而不貴僧名劉子儀詩惠和官尚小師達祿須干吳旦生曰劉貢父詩話載此二句謂取下惠聖之和師也達而學干祿之事或有除去官字示人曰此必番僧也其名達祿須干聞者大笑乃所謂語病也古今詩話謂劉子儀嘗贈人云云蔡君謨詩史不言劉子儀而謂劉貢父以為番僧名論語只有師也過達恐是過字此皆大誤古今詩話云楊大年錢文僖晏元獻劉子儀為詩宗李義山號西崑體後進效之多竊取義山語御嘗賜百官宴優人有裝為義山者衣冠敗裂告人曰為諸館職撏扯至此聞者大噱孤雁復齊漫録曰張漢皋詩話謂鮑當吟孤雁云更無聲接續空有影相隨時號鮑孤雁司馬文正詩話謂當為河南法曹忤知府薛映因賦孤雁所謂天寒稻粱少萬里孤難進不惜充君庖為帶邊城信薛大嗟賞因號鮑孤雁詞意非前句可及宜以張記為失也吳旦生曰前句純是描寫後句是自家寓意其指各出無俟優劣觀老杜補遺云鮑當更無聲接續空有影相隨孤則孤矣豈若子美孤雁不飲啄飛鳴猶念羣誰憐一片影相失萬重雲含不盡之意乎雁曰孤而不曰雙燕曰雙而不曰孤以雁屬乎陽燕屬乎隂陽數竒隂數耦故也然言雁序雁行蓋亦不孤按衛敬瑜妻王氏題孤燕云昔年有偶去今春猶獨歸故人恩義重不忍更雙飛雖寓意亦見燕不盡屬雙飛黃昏楊升菴曰林和靖梅詩疏影橫斜水清淺暗香浮動月黃昏葦航紀談云黃昏以對清淺乃兩字非一字也月黃昏謂夜深香動月為之黃而昏非謂人定時也蓋晝午後隂氣用事花房斂藏夜半後陽氣用事而花敷蕊散香凡花皆然不獨梅也坡詩只恐夜深花睡去髙燒銀燭照紅粧宋人梔子花詞惱人惟是夜深時是此理吳旦生曰黃昏字如此看乃善看詩亦善看月善看花客有舉東坡倅杭州命思聰和參寥子昏字詩有千㸃亂山橫紫翠一鈎新月掛黃昏之句以黃昏對紫翠恰當兩字和靖莫本是否余謂拘拘配偶詩不若是膠也黃昏作兩字以對清淺者是本句對黃昏不必作兩字以對紫翠者是借對讀者亦㑹其神韻而已蓋言新月即非夜深昏黃之景而掛字不作黃昏時候亦說不去鷓鴣林和靖詩草泥行郭索雲朩呌鈎輈吳旦生曰郭索蟹行貌鈎輈鷓鴣聲歸田録謂二句為士大夫所稱蓋取其屬對親切耳余按太𤣥經云蟹之郭索陸魯望詩自是揚雄知郭索困學紀聞云隨陽越雉鷓鴣也飛必南翥晉安曰懷南江左曰逐隱北户録云衡州南靈鷓鴣解嶺南野葛諸菌毒及辟溫瘴又一名􅀈音述多對啼廣志言鷓鴣鳴云但南不北古今注云其鳴自呼南越志鈎輈格磔竹客反據此則對誠工矣然鷓鴣未嘗棲朩而鳴惟低飛草中昔人以此為病如孫莘老荔枝詩格磔山禽滿院飛蓋鷓鴣非庭院之禽夏月非鷓鴣之時性又不嗜荔枝總是失照管耳韻語陽秋云許渾韶州夜宴詩鸜鵒未知狂客醉鷓鴣先聽美人歌聽歌鷓鴣詞云南國多情多艷詞鷓鴣清怨繞梁飛又有聽吹鷓鴣一絶知其為當時新聲而未知其所以及觀李白詩云客有桂陽至能吟山鷓鴣清風動忩竹越鳥起相呼鄭谷亦有佳人才唱翠眉低之句而繼之以相呼相應湘江濶則知鷓鴣曲效鷓鴣之聲故能使鳥相呼矣山谷詩照灘行郭索焚野得伊尼按佛書謂鹿為伊尼倪雲林詩觳觫卧雲芳草細鈎輈啼樹野烟和亦佳句也葑田林和靖詩隂沈畫軸林間寺零落棋枰葑上田吳旦生曰吳中有一種葑田蓋陂湖間茭蒲所積嵗久為水所衝根不與土相著輒浮水面人據其上如筏可撑以往來厚數尺裒至數十丈遂得耕種其間亦有夜竊去數畝投牒訴宰者元末王原吉題垂虹橋亭云葑田連沮洳鮫室亂魚鳬蓋指此也楊升菴云葑田江淮以南有之淮南子大旱苽封熯苽即菰封即葑也旱燥故苽封亦乾也菰葑根相結而生嵗久浮於水上根最繁而善紏結以土泥著上刈去其蔓枯時以火燎便可耕種吳闞駰十三州志云百粵嶺南有駱田駱音架王氏農書架田即葑田以朩縳架為曲田浮水面以葑泥附朩上而成田其田隨水上下蓬忩續録云雕胡即茭草中生菌如瓜形可食故謂之苽霜雕時采故謂之雕因訛為雕管子書謂之雁膳周禮三農鄭氏注云三農山農澤農平地農澤農即種下隰及葑田者也郭璞江賦云標之以翠蘙泛之以遊菰播匪藝之芒種挺自然之嘉蔬鱗被菱荷攢布水蓏翹莖瀵蕊濯頴散裹隨風猗委與波潭沱流光潛映景炎霞火此十二句皆指葑田言也鱸魚鄉陳了翁詩秋風斜日鱸魚鄉别本鄉作香張文潛曰魚未為羮雖嘉魚直腥耳安得香當作鄉字松江詩話曰魚雖不香作羮芼以薑橙而馨香逺聞故東坡詩小船燒薤搗香虀李伯巽詩香虀何處覔鱸魚香字未為非也野客叢書曰此鱸魚香云者謂當八九月鱸魚肥美之時節氣味耳非必指魚之馨香也張右史既失而周知和謂薑橙馨香謬甚香字比鄉甚覺氣味長與識者參之楊升菴亦謂鱸香何不可之有吳旦生曰還以鄉字為正按屯田郎林肇為吳江日作亭江上因以鱸鄉名之蓋慕愛了翁之句以命亭詩話所謂後人於其地立鱸鄉亭和者百餘人皆不及公詩也中吳紀聞云范蠡張翰陸龜䝉有畫像在鱸鄉亭旁東坡有吳江三賢畫像詩則其地鑿鑿可證了翁初至吳江簿詩云中郎亭榭據江鄉雅稱詩翁賦卒章蓴菜鱸魚好時節秋風斜日舊烟光語意相類當筮仕初志巳超然故其後留題亦及此也陸放翁詩欲與衆生共安隱秋來夢不到鱸鄉正用了翁語也蔣堂詩一水蓴鱸國羣山橘柚鄉亦用鄉國字盂蘭盆晏元獻詩家人愁溽暑計日望盂蘭吳旦生曰陸放翁謂故都以七月望日具素饌享先織竹作盆盎狀貯紙錢承以一竹焚之視盆倒所向以占氣候謂向北則冬寒向南則冬溫向東西則寒溫得中謂之盂蘭盆蓋俚俗老媪輩之言也又每云盂蘭盆倒則寒來矣荆楚嵗時記七月十五日僧尼道俗悉營盆供諸佛按盂蘭盆經云有七葉功德並幡花歌鼓果食送之蓋由此也經有目連脫母之苦白佛言未來世行孝順者亦應奉盂蘭盆供養故後人因此廣為華飾乃至刻朩割竹飴蠟翦綵模花葉之形極工妙之巧天竺為盂蘭此云倒懸救器謂目連救母饑厄如解倒懸之具也楊盈川盂蘭盆賦青蓮吐而非夏頳果搖而不寒繭館晏元獻詩繭館蠶初起瑶箱燕未歸吳旦生曰繭館上林蠶所也元帝后厭居深宫王莽欲市其歡令四時巡四郊春幸繭館虞伯生題耕織圖詩玉成繭館閒琴瑟宜薦房中備樂歌堯年晏元獻詩二龍驂夏服雙鶴記堯年吳旦生曰異苑太康二年冬大寒南州人見二白鶴語於橋下曰今兹寒不减堯崩年也遂飛去故山陵挽章用之宋元憲亦云軒野龍催馭堯宫鶴厭寒庾信小園賦龜言此地之寒鶴訝今年之雪落花詩漁隱叢話曰夏文莊守安州莒公兄弟尚在布衣文莊異待之命作落花詩莒公一聨云漢臯佩冷臨江失金谷樓危到地香子京一聨云將飛更作回風舞已落猶成半面粧豫觀南史梁元帝妃徐氏無容質不見禮以帝眇一目知帝將至必為半面粧以俟此半面粧所從出也若回風舞無出處則對偶偏枯不為佳句殊不知乃出李賀詩云花臺欲暮春辭去落花起作回風舞前輩用事必有來處又精確如此吳旦生曰青緗雜記夏文莊見大小宋二聨嘆曰咏落花而不言落大宋君須狀元及第又風骨秀重異日作宰相小宋君非所及然亦須登嚴近後皆如其言故文莊聞莒公登庸賀曰昔年安陸已識台光蓋謂是也及觀槁簡贅筆云景文平生數賦落花晚又賦云香隨蜂蜜盡紅入燕泥乾人謂景文與落花俱盡未幾果卒蓋同一賦落花而徵驗若此詩洵足為妖祥耶紫荷囊宋景文詩榮觀聳麟族賦筆助荷囊吳旦生曰人多以荷字作平聲讀故景文又云猥挈荷槖預從豹乘劉偉明詩西清寓直荷為槖在蜀宣風繡作衣皆沿其訛而用之也葛常之引晉書輿服志云文武百官皆有囊綬八座尚書則荷紫以生紫為夾囊綴之服外加於左肩則所謂荷紫者非菱荷之荷乃負荷之荷也南史周捨問劉杳曰著紫荷囊相傳云挈囊竟何所出杳曰張安世傳曰陳晦伯云趙充國傳車騎將軍張安世上欲誅之充國以為安世持槖簪筆數十年按此安世非張湯子安世也云安世傳誤而梁書南史俱不為之改正持槖簪筆事孝武帝數十年注槖囊也蓋人徒見南史著紫荷囊四字遂作一句讀之殊未知晉書荷紫之義也余喜此證最為明確王勉夫謂紫荷囊事其說已久唐類表有云佩蒼玉負紫荷宋語豈無自耶因考沈約宋志蕭子顯齊志皆謂紫夾囊俗呼曰紫荷隋志曰朝服綴紫荷令左僕射左荷右僕射尚書右荷是則紫荷之說自晉宋以來有之蓋本詩已沿其訛而又引以附之是助訛也而安取此曲證為桐薪云或謂漢代以盛奏事負荷而行也據此則今俗男女雜佩流蘇尚有荷包之稱其沿古朝服製乎六六鱗宋景文詩尺素愁憑六六鱗吳旦生曰宋元憲亦有私書一紙離懷苦望斷波中六六鱗之句謂六六三十六也唐段成式詩三十六鱗充使時數番猶得裹相思此皆謂憑鯉以寄書也續博物志云鯉魚大小並三十六鱗夢溪筆談云鯉魚當脅一行三十六鱗鱗有黑文如十字故謂之鯉衍義云鯉魚至隂之物也其鱗故三十六述異記云鯉魚滿三百六十鱗蛟龍輒率而飛去一年置一神守之則不能去矣神則龜也抑鮓宋景文詩蟹美持螯日魴甘抑鮓天吳旦生曰楊淵五湖賦連瓶抑鮓景文用此崇禎中沈景倩田舍詩土潤移橙地巵香抑鮓天則又用景文語麥秋緗素雜記曰宋子京有皇帝幸南園觀刈麥詩農扈方還夏官田首告秋注云臣謹按物熟謂之秋取秋斂之義故謂四月為麥秋吳旦生曰月令孟夏之月是月也蘼草死麥秋至注云秋者百榖成就之期此月於時雖夏於麥則秋故曰麥秋蔡雍月令章句云百榖各以初生為春熟為秋麥以初夏熟故以四月為麥秋亦猶贊寧竹譜以八月為春二三月為秋也漫叟詩話云吳民載詩條風著野方蠶月髙樹移隂又麥秋嘗記前輩詩曰麥秋晨氣潤槐夏午隂清此二聨未易優劣丙丁宋子京詩何但魚知丙非徒事識丁吳旦生曰左太冲蜀都賦嘉魚出於丙穴注丙穴在漢中沔陽曰北有魚穴二所常以二八月取之丙地名也侯鯖録引魚以丙日出穴故陳藏器謂丙者向陽穴多生魚魚何能擇丙日出穴耶酈善長謂穴口向丙又引柏枝山中有丙穴魚以春末逰渚冬入穴不獨漢有也皆非正論舊云魚尾象篆文丙字故曰丙穴蓋爾雅魚枕謂之丁魚腸謂之乙魚尾謂之丙此豈専指嘉魚耶唐張𢎞靖云挽兩石弓不如識一丁字野客叢書辨為個字非丁字引續世說書此個字張翠微考異亦謂個字蓋個與丁相似傳寫之悮又觀蜀志南史有所識不過十字之語史通謂王平所識僅通十字蓋十與丁益相似也覺丁字無謂調馬養花迂叟詩話曰大名進士耿仙芝以詩著其一聨云短水淺蕪調馬地淡雲微雨養花天為人所稱吳旦生曰餘冬序録云北人養馬凡駒未破鞍時先剗騎於水中教習行步所以必於水中者欲其舉足髙也花朩譜云越中牡丹開時賞者不問親疏謂之看花局澤國此月多有輕烟微雨謂之養花天逋峭詞林海錯曰魏收有逋峭難為之語蘇子容詩自知伯起難逋峭不及淳于善滑稽魏齊間指人有風措者謂之庸峭一曰波峭吳旦生曰晞籛䜪聿乃作庸峭文潞公不曉二字何義以問子容子容曰宋元憲謂事見朩經蓋梁上小柱名取其有曲折之勢耳即用此事作詩為謝故有此二句集韻云庯庩屋不平也庯奔模切庩同都切庩即屠蘇義同營舍之法謂之朩經喻皓所造需頭蔡君謨詩禁林京兆荷恩光三上需頭乞郡章吳旦生曰蔡雍獨斷凡羣臣上書天子者四一曰章二曰奏三曰表四曰博議凡章奏皆需頭稱稽首表者不需頭又曰所謂需頭者蓋空其首一幅以俟詔㫖批答陳請之奏用之不需頭者申謝之奏用之晉人簡帖後空一幅仍書空著以俟朋友之批答故謝安批子敬之帖尾咏草徐興公曰白樂天咏草云野火燒不盡春風吹又生已傳播今昔矣又唐僧云時平生戰地農惰入春田又元楊基云六朝舊恨斜陽外南浦新愁細雨中風調情景俱不在樂天之下唐僧句見山谷集或云是蔡襄詩非也吳旦生曰八閩通志載王禹玉云蔡君謨草詩有時平生戰地農惰入春田之句其言干教化非野火燒不盡春風吹又生之比興公編纂蔡端明别紀亦採入此條而又云非蔡詩何耶茶品學林新編曰茶之佳品造在社前其次則火前其下則雨前謂穀雨前也佳品其色白若碧緑者乃常品也茶之佳品芽蘖細微不可多得若取數多者皆常品也茶之佳品皆㸃啜之其煎啜之者皆常品也齊已茶詩曰甘傳天下口貴占火前名又曰髙人愛惜藏嵓裏白瓿封題寄火前丁謂茶詩曰開緘試新火須汲逺山泉凡此皆言火前蓋未知社前之品為佳也鄭谷茶詩曰入坐半甌輕泛緑開緘數片淺含香鄭雲叟茶詩曰惟憂碧粉散嘗見緑花生沈存中論茶謂黃金碾畔緑塵飛碧玉甌中翠濤起宜改緑為玉翠為素此論可也而舉一夜風吹一寸長之句以為茶之精美不必以雀舌鳥觜為貴今按茶至於一寸長則其芽葉大矣非佳品也存中此論曲矣盧同茶詩曰開緘宛見諫議面手閲月團三百片薛能謝劉相公寄茶詩曰兩串春團敵夜光名題天柱印維揚茶之佳品珍踰金玉未易多得而以三百片惠盧同以兩串寄薛能者皆下品可知也齊已詩曰角開香滿室爐動緑凝鐺丁謂詩曰末細烹還好鐺新味更全此皆煎啜之也煎啜之者非佳品矣唐人於茶雖有陸羽為之說而持論未精至今朝蔡君謨茶録既行則持論精矣以茶録而合前賢之詩皆未知佳味者也吳旦生曰唐以前貴蜀茶孫楚歌云茶出巴蜀張孟陽登成都樓詩芳茶冠雲情溢味播九區然蜀中數處産茶雅州䝉山上有五頂各有茶園其中頂曰上清峯最佳生最晚在春夏之交其地即書所謂蔡䝉旅平也唐時湖州紫筍入貢每嵗以清明日貢到先薦宗廟後分賜近臣義興初無貢自李棲筠進萬兩遂為貢玉川子所謂天子未嘗陽羡茶百草不敢先開花也陸羽茶經云浙品以湖州為上常州次之湖州生長城縣顧渚山中常州義興縣生君山懸腳嶺北峰下蓋湖常二境相接采茶時兩郡守畢至最為盛㑹杜牧詩溪盡停蠻棹旗張卓翠苔柳村穿窈窕松澗渡喧豗劉禹錫詩何處人間似仙境春山携妓采茶時蓋草茶盛於兩浙以浙東有日注也至江南李氏漸貴建茶始有團圈之製而大小龍團始於丁謂而成於蔡襄東坡詩武夷溪邊粟粒芽前丁後蔡相寵加然北苑官焙也漕司嵗以入貢茶為上壑源私焙也土人亦入貢茶為次二焙相去三四里間若沙溪外焙也與二焙相去隔一溪茶為下山谷詩莫遣沙溪來亂真官焙造茶在驚蟄後三日興工採摘是時芽已一槍閩中地暖如此唐子西鬬茶記云唐相李衛公好飲惠山泉置驛傳送不逺數千里而近世歐陽少師作龍茶録序稱嘉祐七年親享明堂致齊之夕始以小團分賜二府人給一餅不敢碾試至今藏之時熙寧元年也吾聞茶不問團銙要之貴新水不問江井要之貴活千里致水真僞固不可知就令識真已非活水自嘉祐七年壬寅至熙寧元年戊申首尾七年更閲三朝而賜茶猶在豈復有茶味哉鶴林玉露云李南金謂茶經以魚目湧泉連珠為煮水之節然近世淪茶鮮以鼎鑊用瓶煮水難以候視則當以聲辨一沸二沸三沸之節又陸氏之法以未就茶鑊故以第二沸為合量而下未若以今湯就茶甌瀹之則當用背二涉三之際為合量乃為聲辨之詩云砌蟲唧唧萬蟬催忽有千車捆載來聽得松風并澗水急呼縹色緑瓷杯其論固已精矣然瀹茶之法湯欲嫩而不欲老蓋湯嫩則茶味甘老則過苦矣若聲如松風澗水而遽瀹之豈不過於老而苦哉惟移瓶去火少待其沸止而瀹之然後湯適中而茶味甘此南金之所未講者也因補以詩云松風檜雨到來初急引銅瓶離竹爐待得聲聞俱寂後一甌春雪勝醍醐因話録云李約性嗜茶能自煎謂人曰茶須緩火炙活火煎活火謂炭火之㷔者也蔡君謨茶録云藏茶宜篛葉而畏香藥喜溫燥而忌濕冷故收藏之家以篛葉封裹入焙中兩三日一次用火常如人體溫溫則禦濕潤若火多則茶焦不可食歸田録云洪州雙井白芽漸盛近嵗製作尤精囊以紅紗不過一二兩以常茶十數斤養之用辟暑濕之氣歷代詩話卷五十五
