body:
  text: 歷代詩話卷七十八歸安吳景旭撰癸集下之上出京文徵仲致仕出京馬上口占云白髮蕭蕭老祕書倦遊零落病相如三年虛索長安米一日歸乘下澤車坐對西山朝氣爽夢回東壁夜窗虛玉蘭堂內秋風早幽竹黃花不負豫吳旦生曰徵仲到京林見素遍稱於臺省諸公時喬白巖為太宰夙重見素乃力主張授翰林待詔見素曰吾此行為徵仲了此一事庶不徒行矣然在翰林大為姚明山楊方城所窘嘗昌言於衆曰我衙門中不是畫院乃容畫匠處此耶蓋人之雅俗相懸如此徵仲有咏蛙詩年來水旱真難卜我已公私付兩忘寄謝繁聲休强聒吳城明日是端陽殆為姚楊言也遣懷彛白齊詩話曰文徵仲有病起遣懷二律蓋不就寧藩之徵而作也詩云潦倒儒官二十年業緣仍在利名間敢言冀北無良馬深愧淮南賦小山病起秋風吹白髮雨中黃葉暗松關不嫌窮巷頻回轍消受爐香一味閒經時卧病斷經過自撥閒愁對酒歌意外紛紜知命在古來賢達患名多千金逸驥空求骨萬里冥鴻肯受羅心事悠悠那復識白頭辛苦服儒科吳旦生曰徵明初名璧以字行更字徵仲以諸生嵗貢入京授翰林院待詔三載謝病歸按唐王以黃金數笏遣一承奉求畫徵仲堅拒不見其使逡巡而去寧庶人以厚幣招致海內名士徵仲謝弗往唐子畏往佯狂而返識者兩髙之日本貢使踵門求見具冠服南面受拜而却其贄曰此國體也晚年衣紅絨衣戴捲檐帽坐白紙窗下擁爐曝背劇談亹亹坐客皆移日忘去卒之時方為人書志石未竟缺伸閣筆端坐而逝二子彭字夀承國子監博士嘉字休承和州學正張伯起云文太史詩未必上超開元佳者亦不失大厯後生小子信口詆訾逮國博郡博之作謂之文家詩今觀夀承妾家住近江淹宅曽讀銷魂别賦來休承五百年來幾摹本翠禽猶在最髙枝等句及張公善權二作亦各有致可盡訾乎太史女嫁王子美者更好學號為博洽亦能詩所作明妃曲尤傳刻竹文徵仲刻竹詩蕭蕭落朩帶江干翦翦幽花過雨斑豈意旅遊逢九日共來把酒看三山吳旦生曰徵仲與許彥明同遊金陵嘉善寺因題詩竹上後書丁亥九月九日徵明同子嘉彥明同子穀來休承即刻詩大竹上好事者取詩竹製筆筒今尚在王丹丘家按富川有東坡竹蓋公嘗以題壁餘墨灑竹上而不滅新篁枝葉皆有墨痕後百十八年謝疊山謫居是地其竹尚然景泰中杜用嘉詩云重華南去不南還二女啼痕在竹間亦有富川蘇子墨至今枝葉尚斑斑獨退清暑筆談曰髙子業詩衆女競閨中獨退反成怒夫爭妍取忌有之也而獨退成怒者豈不以衆邪醜正世忌太潔耶故楊誠齊有云聲利之場輕就者固不為世所恕蔡定夫是也不輕就者亦不為世所恕朱元晦是也吳旦生曰少室山房詩評云子業視李何後出而其五言古律之工不欲作今人一字在唐不減張曲江韋蘇州矣陳約之序其集云洪武初沿襲元體頗存纎詞時則髙楊為之冠成化以來海內和豫縉紳之聲喜為流易時則李謝為之宗及乎𢎞治文教大起學士輩出力振古風盡削凡調一變而為杜時則有何李為之倡嘉靖改元後生英秀稍稍厭棄更為初唐之體家相凌競斌斌盛矣夫意製各殊好賞互異亦其勢也然而作非神解傳同耳食得失之致亦略可言何則子美有振古之才故雜陳漢晉之詞而出入正變初唐襲隋梁之後是以風神初振而縟靡未刋今無其才而襲其變則其聲粗厲而畔規不得其神而舉其詞則其聲嘽緩而無當彼我異觀豈不更相笑也論國初及𢎞正而下格調之變無如此序之精當者唐元薦云明詩莫盛於𢎞治藝苑則李懷麓張滄洲為赤幟而和者多失於流易山林則陳白沙莊定山為眉目而議者或以為旁門李何一出變而學杜正變雲擾剽竊雷同比興漸微風騷日逺針其偏者唐應德也嘉靖初更為六朝初唐而纎艷不遑嘽緩無當作非神解傳同耳食議其後者陳約之也録此二序其時之風㑹可槩見矣子安藝苑巵言曰皇甫子安之博覽古選頗勝子循之禪棲近體為佳子安卒蔡子朩以詩哭之云五字沈吟詩品絶一官憔悴世塗難可謂實録吳旦生曰皇甫涍字子安與其弟汸字子循濓字子約皆登嘉靖間進士其兄沖字子浚亦登鄉薦王元美所云太原兄弟並擅菁華也子循寄懷子朩云日日江頭聞送客每於詩卷恨錢郎蓋子循與子朩同官陪都亦如唐時送行詩非錢起郎士元不足取重也堯山堂外紀云王元美為比部郎嘗與蔡子朩徐子與吳明卿謝茂秦飲謝時再遊京師詩漸落子朩數侵之已被酒髙歌其䕫州諸咏亦平平耳甫發歌明卿輒鼾寢鼾聲與歌相低昂歌竟鼾亦止為若初醒者子朩面色如土子與復與子朩論文不合而罷後五嵗所而子朩以中丞撫河南子與守汝寧明卿謫歸德司理張肖甫謫裕州同知皆屬吏也子朩張宴備賔主身行酒炙曰吾烏得有其一以慢三君子尋具疏薦之受卷張涇川贈嚴維中詩登科豈必傳三唱受卷曾知讓一籌吳旦生曰𢎞治乙丑張涇川為受卷官見維中制䇿擊節稱賞既而不預一甲之選為之太息後維中使粵過之涇川贈此詩維中酬云往事殷勤勞晤語非才流落負心知按維中通籍後屏居鈐山之東堂折節讀書與名流往來人望翕然歸之何至得君專政屠戮忠良後世唾詈為權奸首也玉堂叢語云髙中𤣥為嚴維中門生嚴自內直回往候之適其鄉人如牆而立嚴一至衆張拱以前髙曰有一雅謔敢為老師道否韓昌黎二語與目前事相類嚴曰何語曰大雞昂然來小雞聳而待也嚴亦大笑人素嘲江西人為雞故云余觀詩說雋永李伯紀為行營使王仲時張仲宗俱為屬王頎長張短小白事相隨一館職戲曰大雞昂然來小雞聳而待劉宋時已有此謔贈盧張王屋贈盧次楩詩左驂猶有胥靡贖鼓吏終成處士名吳旦生曰陳卧子稱此聨用事切當蓋指濬獄也按次楩雄於資使酒罵坐嘗為具召邑令令乃日昃至次楩醉卧不能具賔主令心銜之㑹醉榜其役夫旬日役夫夜壓於牆隕遂禽治次楩坐繫獄獄中感奮著幽鞫放招賦以自廣謝茂秦挾其賦走長安見諸貴人絮而泣平湖陸與繩為濬令平反得脫故次楩寄茂秦云魯連自是紫烟客倜儻長揖二千石一朝談笑解聊城東入滄溟眇無跡而茂秦有感次楩云燕霜終古憤梁獄昔年書世事疏狂裏交情患難餘茂秦藝苑巵言曰謝茂秦曳裾趙藩嘗謁崔子鍾崔有詩贈之後以救盧次楩北遊燕刻意吟咏遂成一家句如風生萬馬間又馬渡黃河春草生皆佳境也其排比聲偶為一時之最第興寄小薄變化差少嘗謂其七言不如五言絶句不如律古體不如絶句又謂如程不識兵部伍肅然刁斗時擊而寡樂用之氣吳旦生曰茂秦居鄴邸為趙康王客康王薨其曽孫穆王復禮之潘景升亘史云趙王雅愛茂秦詩從王客鄭若庸得竹枝詞十章命所幸琵琶妓賈扣度而歌之萬厯癸酉冬茂秦從關中還過鄴偕若庸見王王宴之便殿酒行樂作王曰止命縆瑟以琵琶佐之聲繁屏後王復止衆妓獨奏琵琶方一闋茂秦傾聽未敢發言王曰此先生所製竹枝詞也譜其聲不識其人可乎命諸妓擁賈姬出拜光華射人藉地而竟竹枝十章茂秦謝曰此山人鄙俚之辭安足汚王宫玉齒請更製竹枝詞以備房中之奏王曰幸甚茂秦老不勝酒醉卧山亭下王命姬以衽代薦承之以肱明日上新竹枝詞十四闋姬按而譜之不失毫髮元夕便殿奏技酒闌送客即盛禮而歸賈於邸舍茂秦載以逰燕趙間逾二年而逝姬奉柩停大寺之旁每夜操琵琶一曲歌茂秦竹枝詞必慟絶而罷萬峰堯山堂外紀曰謝茂秦逰天壇賦七言一律天畔飛霞照萬山尋易山字為峰遂成絶句云度嶺攀崖自一笻黃冠竹下偶相逢振衣直上升仙石天畔飛霞照萬峰吳旦生曰詩家易字最為緊要余於庚集髙詩中論之至有兩字一義而用此則安用彼則否尤關微妙如栁文暢詩亭臯朩葉下謝𤣥暉詩雲中辨烟樹不可作亭臯樹葉下雲中辨烟朩蓋朩之與樹山之與峰其義一也試取數語細哦之覺舌本間有斷斷不可混下者此無他響與啞之别也外紀又云有客問作詩之法於謝茂秦請出一字為韻以試心思乃得天字遂成三十六句云林開鳥雀天鴟號月黑天春隂欲雨天斜陽禾黍天明河半在天一棹劃江天荷影亂湖天江清魚在天蜮影瘴江天千江各貯天海氣混茫天霜冷菊花天雲慘戰場天野燒氣蒸天鷹揚朔漠天馬見渥窪天神龍穴海天湖抱嶽陽天飢鼯叫雪天鐘磬徹諸天心空靜裏天鶴夢不離天濁水混青天東南百越天江波不定天雲蘿隱洞天丹氣夜薰天登嶽上捫天隴樹插秦天霜清瘴癘天氣靉漢家天氷開鴈沼天海簸大鵬天嶺斷五羊天微茫畫裏天人老醉鄉天又用天字起得十二句云天馬行無迹天覆空青色天髙籠鳥心天隂鬼火亂天寒鷹力健天聚峨眉雪天勢海相吞天風助鬬虎天山雄漢塞天長接鄧林天晴百鳥散天垂四野青又第二用天字得十二句云井天開地鏡鈞天奏太和蜀天低劍閣雲天渾一色朩天通夜鼠羅天昭象緯楚天三峽斷海天騰蜃氣諸天空色界江天月兩分霜天紅葉老通天鳥道寒又第三用天字得十二句云夜爽天街露孤峰天外出風暖天絲度靜中天籟起隱見天河影峽開天一線漢北天常雪日髙天更青霞明天姥峰禪林天雨花雲疏天色淡井平天影出又第四用天字得十二句云風響參天樹鑿嶺蜀天開混沌是天胚萬物各天機出塞胡天盡龍鬭海天翻鴈得楚天春虹截江天碧王氣浮天闕蹄涔縮天影秋氣澄天宇到海得天多客謝而去顧茂秦笑曰子何太泄天機耶簡倨堯山堂外紀曰李于鱗為陜西按察使鄉人殷者來巡撫嘗下檄于鱗代撰奠章及送行序于鱗不樂移病乞歸殷留之入謝乃請曰臺下但以一介來命不則尺蹄見屬無不應者似不必檄也殷謝過有所屬撰以名刺往久之復移檄于鱗上疏乞休不待報竟歸吏部惜之用何仲默例許養疾疾愈起用蓋異數也于鱗歸杜門自兩臺監司以下請見不得去亦無所報謝以是得簡倨聲又嘗為詩云意氣還從我輩生功名且付兒曹立諸公聞之有欲甘心者吳旦生曰于鱗守順德時訪胡提學乃蜀人也問之曰楊升菴健飯否胡云升菴錦心繡腸不若陳白沙鳶飛魚躍也于鱗拂衣去後按察關中過許中丞問今能詩何人于鱗云惟王元美其次宗子相許請子相詩觀之于鱗勃然曰夜來火燒却蓋其性行簡倨如此然觀陳眉公語陳卧子云少時見元美言往者燕邸之㑹于鱗詩必晚出見他人有工者即廢已作不復示人此則于鱗下懷處也新河堯山堂外紀曰舊河通瓠子新浪漲桃花元人張仲舉詩也嘉靖中河決徐沛大司空萬安朱公衡排衆議改築新渠百年河患一旦屏息海內名士咸有頌章李于鱗詩云河堤使者大司空兼領中丞節制同轉餉千年軍國壯朝宗萬里帝圖雄春流無恙桃花水秋色依然瓠子宫太史但裁溝洫志丈人何減漢臣風春流一聨王元美亟稱之以為不可及然實用張語而意稍不同後元美過新河亦有詩呈朱公云日出烟空匹練飛大荒中劃萬流依連山盡壓支祁鎖逼漢疑穿織女機九道徵輸寬氣象六軍容物迥光輝甘棠欲讓金隄栁曾護司空却蓋歸論者以支祁織女一聨又在桃花水瓠子宫之上吳旦生曰元美謂春流無恙桃花水秋色依然瓠子宫不知者以為上單下重按三月水謂之桃花水為害極大此聨不惟對偶精切而使事用意之妙有不可言者余觀杜詩三月桃花浪趙注引韓詩溱與洧方渙渙兮注謂三月桃花水下時也希注引漢溝洫志來春桃花水盛顔師古注謂月令仲春之月始雨水桃始華蓋桃方華時既有雨水川谷氷泮衆流猥集波瀾盛長故謂之桃花水余喜此兩注最得源委若東坡詩桃花春浪孤舟起程注但引杜欽傳不知有韓詩月令事矣續停驂録云黃河水異凡立春後凍解候水初至凡一寸則夏秋當至一尺謂之水信水衡記正月名凍解水二月三月曰桃花水春末曰菜花水四月末曰麥黃水五月曰瓜蔓水水衡記瓜延蔓故名瓜蔓水六月中旬後曰樊水衡作礬山水七月曰豆花水八月曰荻苗水水衡記荻花故名荻苗水九月曰登髙水十月曰復槽水水衡記水落復故道謂之復槽水十一月十二月曰蹙凌水水衡記水斷復結謂之蹙凌水非時泛漲曰客水其勢移谼橫注岸如刺毁曰劄岸漲溢踰防曰抹岸掃岸故朽潜流刺其下曰搨岸浪勢旋激岸土上隤曰淪捲逆漲曰上展順漲曰下展直流中屈曲橫射曰徑䆗水猛驟移其將澄處望之明白曰拽白又曰明灘其汩起處輒能溺舟者曰蔫浪水水退淤澱夏則膠土肥腴初秋則黃滅土頗為壤深秋則白滅土霜降後皆沙也于鱗首云河隄使者大司空蓋空字與同雄宫風相叶余按司空之空不當作平聲韻叶也詩話類編云空字有四音平聲音枯公切說文竅也天曰太空沙名方空從平聲上聲音孔考工記函人視其鑽空舜紀穿為匿空旁出莊子礨空之在天澤注小穴也張騫傳樓蘭姑師小國當空道栁子厚祭張舟文空道北出式遏蠻陬大宛傳張騫鑿空皆音作上聲去聲音控詩不宜空我師論語其庶乎屢空揚子酒誥之篇俄空焉唐詩潭影空人心又天空霜無影又十八人名空一人皆音去聲入聲音窟古者穴地穿崖而居謂之土空司空官名居四民時地利也故曰司空周禮注司空主國空地以居民空地即窟地也天上星有土司空亦映地之土穴詩曰陶復陶穴又曰為改嵗入此室處室即土空也冬時萬物閉藏故司空之官屬冬據此則于鱗直作平聲叶者未深考耳白雪樓李于鱗酬李東昌詩江湖盤薄有能事畫我山中白雪樓吳旦生曰于鱗自秦中挂冠搆白雪樓所著名白雪樓詩集東昌李使君子朱讀其集繪為圖以寄之于鱗酬贈此詩按于鱗自謂樓在濟南郡東三十里許鮑城前望太麓西北眺華不注渚山大小清河交絡其下左瞰長白平陵之野海氣所際每一登臨鬱為勝觀自題白雪樓云大清河抱孤城轉長白山邀返照回謝魏使君云白雪新題照畫闌鮑山堪此對盤桓王元美乃謂樓上于鱗讀書而其下甚穢可笑則又何耶陳眉公云于鱗死其子駒後亡家貧白雪樓已鬻他人矣大陸李于鱗登真定大悲閣詩坐來大陸當窗盡不斷滹沱入檻流吳旦生曰大陸在真定府寧晉縣即禹貢陸澤之地大河所經受滏音輔洨音肴沙漈音際諸水夏潦之時漳水滹沱南北交注其澤東西徑三十里直接隆平任縣俱百餘里漳滹二水逺陟可以耕種後漢書巨鹿郡有大陸澤吕氏春秋九藪趙之巨鹿髙誘注云廣阿澤是也按廣阿大麓同澤異名舊志因尚書納于大麓之文遂有堯臺象城二迹隋圖經云大麓有堯臺髙與縣城等世謂堯禪舜處也地里志云大麓有象城縣舜弟象所封之邑也故于鱗同元美登郡樓詩銜杯大麓來秋色倚檻邢臺過白雲元美有于鱗邀登郡樓詩不盡天風吹大陸何來嶽色滿邢州時于鱗守順德古名邢州也偶見後之倣七子聲口者動言大陸竟作平原廣野之通稱特詳釋之五子七子王元美贈吳明卿詩無妨中散來千里更喜延之詠五君又贈姚匡叔詩見數八公君第幾空傳七子世無多匡叔以道術為王客惓惓七子之盛吳旦生曰嘉靖間元美初成進士𨽻事大理山東李伯承伯承為通之于鱗遂結社都下作五子詩東郡謝茂秦榛濟南李于鱗攀龍吳郡王元美世貞長興徐子與中行廣陵宗子相臣南海梁公實有譽於時稱五子實六子也已而茂秦與于鱗隙遂去茂秦而進武昌吳明卿國倫又益以南昌余德甫曰德銅梁張肖甫佳𦙍則所謂七子者也又有新蔡張助甫九一與德甫肖甫相繼而入七子社者此元美所云吾黨有三甫也先是𢎞正中北地李獻吉夢陽信陽何仲默景明武功康德涵海鄠杜王敬夫九思吳郡徐昌穀禎卿王子衡廷相濟南邊廷實貢亦稱七子詞林於是有先七子後七子之目矣逮于鱗沒元美引進益多如蒲圻魏順甫裳歙郡汪伯玉道昆從化黎帷敬民表之屬稱為後五子崑山俞仲蔚允文濮州李伯承先芳孝豐吳峻伯維嶽順德歐楨伯大任之屬稱為廣五子至於常熟趙汝師用賢雲杜李本寧維禎南樂魏懋權允中四明屠長卿隆金華胡元瑞應麟遂稱末五子矣牛腰王元美詩囊裏牛腰詩卷粗他年鶴背重還無何如負局先生好只負真形五嶽圖吳旦生曰時有樓道人以詩卷遍索名公題贈故元美題此誚之李太白詩書秃千兔筆詩載兩牛腰陸放翁詩題詩又滿牛腰束采藥常攜鴉觜鋤萬厯中程孟陽詩未煩馬汗曾充棟不及牛腰免借車青雲王元美詩我自青雲甘薄宦誰當白雪問相思吳旦生曰王李類以青雲白雪作對如于鱗詩即今病借青雲起何用詩傳白雪音元美詩青雲坐向論心失白雪歌容攘臂驕余觀京房易占云青雲所覆其下有賢人隱續逸民傳云嵇康蚤有青雲之志衡陽王云身處朱門而情在江湖形入紫闥而意在青雲梁袁彖贈隱士庾易詩白日清明青雲遼亮阮籍詩抗身青雲中網羅孰能施李白詩所以青雲人髙歌在岩戶皆作隱逸用如顔延年五君咏云仲容青雲器注言器識髙逺也即史記閭巷之人欲砥行立名非附青雲之士惡能施於後世此亦非為仕路言也今之指功名為青雲何哉然在唐時白樂天聞元八改官詩交親盡在青雲上鄉國遙拋白日邊方干送侯郎中赴闕詩青雲舊路歸仙掖白鳳新詞入聖聰要其始由於揚雄解嘲云當塗者升青雲失路者委溝渠後遂以為故實耶二王少室山房詩評曰豫與友人拈二王律詩長公有花裏鳴絃千嶂色月明飛舄萬家春次公則飛舄夜懸天姥夢栽花春映赤城標長公有悲歌碣石虹髙下擊筑咸陽日動搖次公則星近長安多聚散雲深碣石易浮沈真勍敵也吳旦生曰敬美弱冠稱詩李于鱗呼為小美嘗致書元美云小美思火攻伯仁奈何不善備之余德甫寄元美兄弟詩吳中二美得王郎余觀他人之尸祝元美卑者未窮其藴髙者或溢其量總不若敬美之遺兄書為定論也書云詩道拓基於北地極深於濟南然而採蓄之途尚狹游矯之神未充兼此二家登乎彼岸古惟陳思子美今則吾兄庶幾吾兄境雖神詣然亦學以年卲白雲之什雖經刪改未離矜莊逮乎讞獄三輔建節青土字字快心言言破的性靈效矣變化見矣擊節賞勝每恨古人無此快句然謂稍遜古十九首意者亦坐斯媺居憂以後縱心觸象取材愈博演教彌神或鬼篆蛇文冥搜六合之外或牛溲馬勃近取咫尺之間離觀則邈若無關凑泊則天然一色大都字險者韻必妥韻奇者聲必調天壤之間若為預設此真藝林之絶技律家之𤣥造也甚或直指故陳纎詞間作雖淮隂用兵多多益善瞿曇拈指頭頭是道然弟臆陳則謂周行所示末流宜慎何者恐比丘無飯針之能效羅什而有室也所以鄖襄諸篇特寡游戲簡善謔以示娛𢎞大雅而垂訓意在兹乎秦聲王百榖曲中詩云一半秦聲半楚聲秦娥調瑟楚娥筝吳旦生曰李龜年至岐王宅聞琴聲曰此秦聲良久又曰此楚聲主人入問之則前彈者隴西沈妍後彈者揚州薛滿也百榖用此懷妾王伯榖答袁懋中問病詩云書生薄命元同妾丞相憐才不論官吳旦生曰王元美有和伯穀懷出妾詩妾與書生俱薄命花隨春帝不長情蓋指此也嘉靖間懋中執政伯穀遊北雍閣試瓶中牡丹詩其牡丹名相紫袍伯榖乃作一聨云色借相君袍上紫香分太極殿中煙懋中賞歎呼詞館諸公數之曰公等能道得王秀才十四字邪引為記室懋中卒無子伯榖渡江哭其墓有詩云伯道遺孤安得有中郎少女亦曾無又云山上杜鵑花是鳥墓前翁仲石為人其聲凄婉不堪竟讀文苑瀟湘云詩不嫌巧只要巧得入妙如伯榖夀張伯起令母詩共道麻姑如好女笑看萊子似嬰兒蓋張母九十而健伯起亦七十故云題梅衡湘平朔方卷詩美人學舞魚腸劍厮養能開兕角弓都是實事描寫得佳曽寓陳令君所陳觴之樓上遂作詩二句云多君下榻能留稚有客登樓亦姓王用陳蕃王粲事化腐為新枇杷詩話類編曰莫廷韓過袁履善先生適村人獻枇杷果誤書琵琶字青浦令屠長卿續至長卿曰琵琶不是這枇杷袁曰只為當年識字差莫即云若使琵琶能結果滿城簫管盡開花長卿賞譽再三遂定交吳旦生曰琵琶二字按說文作枇杷又釋名枇杷本出於馬上所鼓也推手前曰枇引手却曰杷及觀胡曽贈薛濤詩萬里樓臺女校書琵琶花下閉門居金人馬定國雪霽詩獨往南塘探春色琵琶花下竹雞鳴則枇杷二字又作琵琶豈古字可互通邪書之以為博雅者談助云琵琶字本作批把搜神記作鼙婆生日徐文長上胡宗憲生日詩幾年載筆承英盼四海為家只浪投授簡真慙稱記室逢人交慶識荆州吳旦生曰胡宗憲督師平倭文長管書記嘗戴敝烏巾衣白布浣衣長揖入坐縱談時務督府勢嚴重勿顧也嘉靖已未秋九月宗憲生辰故上詩述其幕下之情後宗憲下請室文長發狂尋病卒袁中郎遊越得其殘帙示陶周望相與激賞且謂其胸中有一段不可磨滅之氣英雄失路托足無門之悲故其詩如嗔如笑如水鳴峽如種出土如寡婦之夜哭羇人之寒起其集自是盛傳於世余按宗憲嘗宴將士爛柯山文長作詩云萬里封侯金印大千場博戲綵毬新時沈嘉則同在幕亦宴山上請為鐃歌十章援筆立就釃酒髙吟至狹巷短兵相接處殺人如草不聞聲宗憲起捋其鬚曰何物沈生雄快乃爾知其時辟置幕府者率皆國士歷代詩話卷七十八
