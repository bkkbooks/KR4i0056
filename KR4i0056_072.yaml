body:
  text: 厯代詩話巻七十二歸安呉景旭撰癸集上之上明詩實字劉伯温雪鶴篇云鸞鵷鳬鴻鶉鵠翬鷺鶚鸛鵲鷢與鵗吴旦生曰沙中金集載唐宋人有疊用七實字為句者岷峨之山中巴江桂椒柟櫨楓柞樟又異人間出駭四方嚴王陳李司馬楊又騅駓駰駱驪騮騵白魚赤兎騂皇驕又鴉鴟鷹雕雉鵠鵾燖炰煨熝熟飛奔王直方詩話載潘邠老詩封胡羯末謝龜駒玉鴻洪余謂此法早見之漢栢梁臺詩柤李橘栗李桃梅矣今伯温直将實字連疉兩句尤異若伯温送姚伯淵赴清溪任云鰷鱨鯩鰱魴與鱮則是一句疊實者矣餘冬序錄云七物為句亦偶用耳或謂詩多用實字為羙悮矣三竿五兩張志道長蘆渡江徃金陵詩云春日三竿上翠屏曉風五兩下蘆汀吴旦生曰南齊天文志永明五年十一月丁亥日出三竿朱色黄色赤暈也一云日出三竿曉日候景也蘇東坡詩酒醒門外三竿日陶南村詩紅日三竿睡正安張文濳詩斜日兩竿眠犢晩吕信臣詩一竿斜日酒旗閒則知視日有三竿兩竿一竿之説又陸放翁詩殘日半竿斜谷路金人史舜元詩日上南忩已數竿萬厯中陳仲醇詩髙枕忩西日㡬竿總是曉日晚日皆可以竿言也郭璞江賦覘五兩之動静注云以雞羽為扇重八兩繫於檣尾以候風兩音量淮南子若綄之候風也許慎云綄候風扇也楚人謂之五兩李頎詩北風吹五兩誰是潯陽客蘇東坡詩柂轉三山沒風回五兩偏洪武初張適詩樵唱千村雨漁歌五兩風兵書云五兩候風法以雞羽重八兩建五丈旗取羽繫其巔立軍營中鯉魚風宋景濓詩秋林崖茘雨春浦鯉魚風呉旦生曰提要錄言鯉魚風乃九月風也李賀詩門前流水江陵道鯉魚風起芙蓉老余觀李曄八月辭云鯉魚吹長風曲池芙蓉老袁宗曉寒曲云秋江夜雨芙蓉老翡翠雙飛下紅蓼鯉魚風起鴻鴈悲徹骨清寒夢魂杳盖用長吉語也郭奎詩鯉魚風熟香粳早羅鄂州詞云九月江南秋色黄雀雨鯉魚風據此則於秋時用之為宜景濓作春浦悮矣唐庚晩春詩水國春深梅子雨江天日暮鯉魚風亦是悮用而漁隠叢話稱為佳句何耶他如唐人有農家榆莢雨江國鯉魚風之句月令廣義引之為三月事李商隠詩後溪初起鯉魚風石溪漫志云鯉魚風春夏之交孫蕡湖州樂云鯉魚風起燕飛斜劉原博詩沙氣半蒸梅子雨浪花初過鯉魚風則是悮認已乆而景濓亦承之也王逢秋感云鯪魚風息静江波白燕堯山堂外紀曰袁海叟嘗謁楊亷夫見几上有琴川時大本詠白燕詩春社年年帯雪歸海棠庭院月争輝珠簾十二中間捲玉剪一雙髙下飛天下公侯誇紫頷國中儔侣尚烏衣江湖多少閒鷗鷺宜與同盟伴釣磯謂亷夫曰此詩殆未盡體物之妙亷夫不以為然海叟歸作詩翌日呈廉夫云故國飄零事已非舊時王謝見應稀月明漢水初無影雪滿梁園尚未歸栁絮池塘春入夢梨花庭院冷侵衣趙家姊妹多相忌莫向昭陽殿裏飛亷夫得詩歎賞連書數紙盡散坐客一時呼為袁白燕呉旦生曰李獻吉謂海叟集中白燕最下最傳非篤論也㣲嫌末句稍套蓉塘詩話載顧文昱題白雁云萬里西風吹羽儀獨傳霜翰向南飛蘆花映月迷清影江水涵秋㸃素輝錦瑟夜調氷作柱玉闗曉度雪沾衣天涯兄弟離羣乆皓首江湖猶未歸結語覺更有餘情至朱鳳山選在野集改故國飄零事己非作老去悲来不自知則妄矣疊字袁海叟建華亭學詩云其大維何有門言言有堂軒軒有廡騫騫有階平平髙墉連連鑿池濺濺樹木芊芊呉旦生曰海叟此等句従大雅皇矣篇臨衝閑閑崇墉言言執訊連連攸馘安安得來掲曼碩詩我㳺于袁于龍之干有闢閑閑有環言言有構桓桓維集之安亦此法也按古詩十九首青青河畔草鬰鬰園中栁盈盈樓上女皎皎當牎牖娥娥紅粉粧纎纎出素手昔人謂連下疊字以成句出自創裁後見韓退之南山詩延延離又屬夬夬叛復遘喁喁魚闖萍落落月經宿誾誾樹墻垣巘巘架庫廐參參削劔㦸􅀈􅀈銜瑩琇敷敷花披萼闟闟屋摧霤悠悠舒而安兀兀狂以狃超超出猶奔蠢蠢駭不懋則十四句連下疊字金人蕭真卿採蓮曲一篇十四句全用疊字為句盖又出於韓也詠蚊四友齋樷説曰楊鐵崖選大雅集獨取海叟詠蚊一首末云東方日出苦未明老夫閉門不敢行盖言其時小人貪殘如蚊蚋嘬人脂血至明初人若可以稍安矣然明而未融蚊蚋尚未盡去故閉門而不敢行似有譏切明初之意呉旦生曰海叟集四巻不載此咏於集外見一首云羣蛇戢戢方鬭爭蝦蟆螻蛄相和鳴百足之蟲行無聲毒氣著人昬不醒蚊蚋雖㣲亦縦横隠然如雷吁可驚東方日色尚未明老夫閉門不敢行觀其質力蒼奡絶似初漢人筆鐵崖亦取其氣崛耳托興要在全篇若以末語明字為含譏切便是下士庾詞殆未然海叟之父可濳為府掾作檢田吏一篇云有一老翁如病起破衲􅧑毶瘦如鬼曉来扶向官道旁哀告行人乞錢米時子奉檄離江城邂逅一見憐其貧倒囊贈與五升米試問何故為窮民老翁答言聼我語我是東鄉李福五我家無本為經商只種官田三十畆延祐七年三月初賣衣買得犁與鋤朝耕暮耘受辛苦要還私債輸官租誰知六月至七月雨水絶無潮又竭欲求一㸃半㸃水却比農夫眼中血滔滔黄浦如溝渠農家争水如争珠數車相接接不到稻田一旦成沙塗官司八月受災状我恐徵糧喫官棒相随隣里去告災十石官糧望全放當年隔岸分吉凶髙田盡荒低田豐縣官不見髙田旱将謂亦與低田同文字下鄉如火速逼我将田都首伏只因嗔我不肯首却把我田批作熟太平九月開早倉主首貧乏無可償男名阿孫女阿惜逼我嫁賣賠官糧阿孫賣與運糧戸即日不知在何處可憐阿惜猶未笄嫁向湖州山裏去我今年已七十奇飢無口食寒無衣東求西乞度殘喘無因早向黄泉歸旋言旋拭腮邉淚我忽驚慚汗沾背老翁老翁勿復言我是今年檢田吏盖可潛筆法矯矯至此海叟世其學他作遜廼公而咏蚊差近之宜鐵崖獨取此首屭贔罘罳劉子髙燕城懐古云花外斷橋支屭贔草間壊壁綴罘罳呉旦生曰韻㑹贔屓鼇也一曰雌鼇為贔左思吴都賦巨鼇贔屓首冠靈山上音備下許器反謂海中蓬萊山大鼇以首戴而承之也張衡西京賦巨靈贔屓薛註云作力之貎謂借贔屓以形容巨靈開山之力也白樂天海圖屏風詩屭贔牽不動綸絶沈其鈎凡此皆指其力而言今子髙以為支橋殆未審矣按升菴言龍生九子不成龍各有所好一曰屭贔形似龜好負重今石碑下龜趺是也二曰螭吻形似獸性好望今屋上獸頭是也三曰蒲牢形似龍而小性好呌吼今鐘上鈕是也四曰狴犴形似虎有威力故立於獄門五曰饕餮好飲食故立於鼎盖六曰􅪆􅫔性好水故立於橋柱七曰睚眦性好殺故立於刀環八曰金猊形似獅性好煙火故立於香爐九曰椒圖形似螺蚌性好閉故立於門舖首此見山海經博物志然則支橋之物應用􅪆􅫔而於屭贔無涉也徐興公又言龍生九子所載不同蒲牢好鳴鐘鈕之獸囚牛好音樂器之獸蚩咮好呑殿脊之獸嘲風好險殿角之獸睚眦好殺刀頭之獸屓屭好文碑旁之獸狴犴好訟獄門之獸狻猊好坐佛座之獸霸下好重碑座之獸又云瓦猫好險簷前獸饕餮好水橋下獸灣􅀈好慵門前獸憲章好囚獄門獸蜥蝪好腥刀頭獸蒲牢霸下屓贔蚩吻與前同演繁露云前世載罘罳之制凡五鄭康成引漢闕以明古屏而謂其上刻為雲氣蟲獸者是禮䟽屏天子之廟飾也鄭之釋曰屏謂之樹今浮思也刻木為雲氣蟲獸如今闕上之為矣此其一也顔師古正本鄭説兼屏闕言之而於闕閣加詳漢書文帝七年未央宫東闕罘罳災顔釋曰罘罳謂連屏曲閣也以覆重刻垣墉之處其形罘罳一曰屏也罘音浮此其二也漢人釋罘為復釋罳為思雖無其制而特附之或曰臣朝君至罘罳下而復思王莽斸去漢陵之罘罳曰使人無復思漢此其三也崔豹古今注依鄭義而不能審知其詳遂拆以為二闕自闕罘罳自罘罳其言曰漢西京罘罳合板為之亦築土為之詳豹之意以築土者為闕以合板者為屏也至其釋闕又曰其上皆丹堊其下皆畫雲氣仙靈奇禽異獸以昭示四方此其四也唐蘇鶚謂為網户其演義之言曰罘罳字象形罘浮也罳絲也謂織絲之文輕踈浮虚之貎盖宫殿忩戸之間網也此其五也凡此五者雖叅差不齊而其制其義互相發明皆不可廢罘罳云者刻鏤物象著之板上取其䟽通連綴之状而罘罳然故曰浮思也以此刻鏤施於廟屏則其屏為䟽屏施諸宫禁之門則為某門罘罳而其在屏則為某屏罘罳覆諸宫寢闕閣之上則為某闕之罘罳非其别有一物元無附著而獨名罘罳也至其不用合板刻鏤而結網代之以蒙冒戸牖使蟲雀不得穿入則别立絲網凡此數者雖施置之地不同而罘罳之所以罘罳則未始或異也釋名云罘罳在門外臣将入請事於此復重思也今之照墻也李長吉詩寒入罘罳殿影昬呉正子箋云以木為門扉而刻為方目如羅網之状今人謂之隔亮也楊升菴云罘罳花蒂囱也象天上櫺星選詩層牖御櫺軒營造法式名柿蒂􅐼籀文作罘又作周禮作浮思釋名作罘罳蕭子雲雪賦作罦罳宋玉大言賦作覆思訪駙馬詩話類編曰孫仲衍平生詩甚多已傳刻於世尚有詩二絶失刋今錄于此訪駙馬不遇云青春駙馬未還家公主傳宣坐賜茶十二闌干春似海隔忩閒殺碧桃花咏石榴云纍垂纍垂復纍垂纍垂壓倒珊瑚枝秋風擘破玳瑁皮露出數顆珍珠兒呉旦生曰周益公入直詩綠槐夾道集昬鴉敕使傳宣坐賜茶歸到玉堂清不寐月鈎初上紫薇花薩天錫蘂珠宫末句云步虚聲斷闌干外春去秋来顔色改東風吹老碧桃枝深院無人夜如海二詩直為仲衍先鞭詩話類編又載解大紳訪某駙馬不值詩語意相似今不錄臨刑口占明初襍記曰髙皇誅藍玉籍其家凡有隻字徃来皆得罪蕡因與玉題一畫故殺之臨刑口占云鼉鼓三聲急西山日又斜黄泉無客舍今夜宿誰家上問監殺指揮孫蕡死時何語指揮以此詩對上怒云彼有此好詩汝乃不覆奏而殺之何也竟殺指揮呉旦生曰曹石倉十二代詩選云郡邑傳皆言蕡死以梅思祖非藍玉也豈襍記别有考與余觀小説家皆云蕡坐為藍玉題畫誅惟黄佐廣州人物傳云洪武二十二年蕡謫戍遼東梅思祖鎮三韓迎置家塾以黨祻見殺則石倉據此也楊升菴列朝詩集云按藍玉傳殺詩人孫蕡而梅思道守雲南未嘗鎮遼東况思祖以十五年十月卒安得以二十二年延蕡家塾余以升菴此語不惟証黄佐之悮而并証石倉可也藕居士詩話云詩歸評夜臺無李白沽酒與何人是為自家死後占地步夜䑓猶寂寞疑是子雲居是為他人死後占地步然太白語謔浪達夫語凄感予亦謂張説夜臺無戲伴魂影向誰嬌是為妓人死後賣俏麗孫蕡黄泉無客舍今夜宿誰家是為自家死後尋寓所然平居語易蕡臨刑語難唐伯虎易簀詩亦有黄泉若遇好朋友只當飄零在異鄉銅斗髙季迪詩醉拍銅斗歌嗚嗚此樂除却江南無吴旦生曰孟東野詩銅斗飲紅酒拍手銅斗歌儂是拍浪兒飲則拜浪婆余觀東坡詩齊聲争唱浪婆詞張來儀詩舟師拍浪呪浪婆盖與季迪同本孟詩也又東野送淡公詩儂是清浪兒每踏清浪逰笑伊鄉貢郎踏土稱風流東坡詩碧山影裏小紅旗儂是江南踏浪兒王質夫詩萬頃波間踏浪兒妥季迪贈鄭滎陽詩刀鳴鬭夫勇花妥笑女倩吴旦生曰杜子羙詩花妥鶯梢蝶潘邠老云妥音堕乃韻不知秦音以落為妥上聲少陵秦人也李長吉詩花娘篸綏妥注云闗中呼落為妥可証晁無咎詩上林花妥逐鶯飛虞伯益詩日停花妥艷風過竹生香掲孟同詩玉沼萍開魚上躍繡簾花妥燕低飛湯子重詩罥絮㳺絲時趂蝶妥花深葉暗啼鶯金人馮子駿長短句云花觸飛丸紅雨妥兎目髙季迪詩塘水龍鱗細城槐兎目新吴旦生曰漢人尹都尉著書名種植法中有棗䑕耳槐兎目之語宗懍春望詩都尉新移棗司空始種楊而升菴謂用僻事須引種植語以釋之今季迪以之入咏亦用種植書也又觀淮南子云槐之生也入季春五日而兎目十日而䑕耳更旬而始規二旬而葉成則是一槐而兼此稱邪季迪屬對工細如送胡鉉㳺㑹稽詩黄絹尋碑讀紅裙賭墅携送烏程馮明府詩竹欄春䕶鴨葦箔夏分蠶用事用景何等穏貼又不若寄錢唐故人詩明月潮千里殘陽雨半湖尤覺渾然眉公筆記云髙楊張徐稱呉中四傑比唐之四傑故老言不惟文才之似而其終亦不相逺孟載盈川令終如一季迪存心無疵而斃則同乎賔王㓜文雖不溺海僅全要領而非首丘來儀竄嶺表尋召還以對内政不協恐祻及已遽投龍江以死又與照隣無異吴中故語云季迪宿龍灣夢其父書掌作一魏字曰此人慎勿與相見後蘇守魏觀徙郡衙正當偽周之宫基乃飛言太守復宫有異圖上使御史張度覘焉御史偽為役人執搬運之勞工畢季迪為上梁文御史還奏守與季迪並死都市無題南濠詩話曰楊孟載詩律精切其追次李義山無題五首詞意俱到真義山之勍敵也吴旦生曰按孟載題下序云嘗讀義山無題詩愛其音調清婉雖極其穠麗然皆托於臣不忘君之意而深惜乎才之不遇也余以孟載此語是未解其義體爾詩話舊謂無題詩自唐李商隠而後作者代有其人然不傷於誕則傷於滛且詞晦㫖幽使人讀之茫不知其意味所在余以傷滛者乃其本質使然解其義體斯得其意味矣觀香奩集有無題詩序云辛酉嵗戲作無題詩十四韻奉常王公内翰吴融舍人令狐渙相次屬和夢溪筆談謂香奩乃和凝所作凝後貴悔其少作故嫁名於韓偓此亦自傷其滛艷故也老學庵筆記云唐人詩中有曰無題者率盃酒狎邪之語以其不可指言故謂之無題非真無題也近吕居仁陳去非亦有曰無題者乃與唐人不類或真亡其題或有所避其實失於不深考耳雨風楊孟載𤓰洲逢丘克荘一聨云白苧青衫雨烏紗短帽風呉旦生曰讀此聨者看出景中人則克荘呼欲出矣妙在雨風二字若斷若連綴而有力此句眼在第五字也他如雜興云薄暝山腰雨踈紋水面風忩鳴風减睡炊斷雨添貧皆是冩雨風處入神耳然江村雜興郊居雜興諸作皆可誦如晚簾花掠燕春水絮吹魚藕深荷盖宻竹瘦筍鞭遲綠蕪三尺雨朱槿一籬花賣薪沙店逺占榖瓦龜靈草香千品藥松老一身苔猿聲黄葉寺牛背夕陽山何渠不若王孟乃其自號眉菴所著為眉菴集謂眉無用於人之身又何謙也南濠詩話云孟載詩律尤精如云花無桃李非春色人有笙歌是太平一官不博三竿日萬事無過兩鬢星予愛其閒曠及云亂世身如危處立異鄉人是夢中来千金已廢床頭劍一字無存架上書則又歎其困窮細雨落花來滚滚綠波芳草去迢迢六朝舊恨斜陽外南浦新愁細雨中予愛其含蓄及云栁色嫩於鵞破殻蘚痕斑似鹿辭胎小雨送花青見萼輕雷催筍碧抽尖則又驚其新巧至翠袖錦筝邀上客畫船銀燭照歸人髙樓錦瑟花連屋深巷珠簾栁映橋則又見其情致之綺麗矣宣王石鼓青苔澁武帝金盤玉露多八陣雲開屯虎豹三江潮落見黿鼉則又見其氣象之突兀矣他如半醉半醒花冉冉間愁閒悶雨沉沉恨不髪如春草綠笑曽花似面顔紅萬里歸心鷗送客片時殘夢鳥驚人則又優愁痛快而無牽合排比其亦詩人之豪者哉麓堂詩話云楊孟載詩六朝舊恨斜陽外南浦新愁細雨中誠佳然綠迷歌扇紅襯舞裙已不脱元詩氣習至簾為看山盡捲西更過纎巧春來簾幙怕朝東乃艷詞耳上已張來儀三月三日詩姬旦城洛邑多士方來并羽觴随流波逸語存遺聲秦王臨河曲髙㑹列簮纓金人貢長劔諸夏俱來盟呉旦生曰續齊諧記晉武帝問摯虞三日曲水其義何指答曰漢章帝時平原徐肇以三月初生三女至三日俱亡一村以為恠乃相携之水濵盥洗因流以汎觴曲水之義始此帝曰若如所談便非佳事束晳進曰昔周公城洛邑因流水以泛酒故逸詩云羽觴随波又秦昭王三月上已置酒河曲見金人出捧水心劍曰令君制有西夏及秦霸諸侯乃因此處立為曲水祠二漢相沿皆為盛集帝曰善賜金五十斤左遷虞為陽城令来儀數語則純用束晳語也又見拾遺記周昭王溺于漢水二女延娟延娱夾擁王身同沒焉江漢人至上已日褉集祠間以為風俗故楊廉夫漢水操云湘水離離徒以斑我衣漢水漪漪可以褉我衣然此亦非佳事而亷夫且歌之矣按風俗通云周禮女巫掌嵗時以祅除疾病禊者潔也故於水上盥潔之也已者祉也邪疾已去祈介祉也月令廣義云祅禊音廢系月令通考云今言五月五日曰重五九月有重九日則三月三日亦宜曰重三張説詩暮春三月日重三魏元忠詩三月重三日此可據也癸辛雜識云上已當作十干之已古人用日例如上辛上戊之類無用支者然余攷神隠云三月三日為上已清明前三日為上已上已修禊除不祥上已禁烟寒食也則是義各有在佛燈院張來儀舟中望佛燈院懐南澗詩云蕩舟西陂上望山懐逺公遥知覆衲卧雪屋一燈紅事殊迹暫曠神交理自通維當待嵗杪期子白雲中吴旦生曰來儀於題下自注云院在烏程六都施家橋東北乆廢今為歸安前丘吴氏墳墓按此乃余之七代祖西疇耕隠六代祖安素公之塋在焉先世本居新安因正肅公扈蹕南渡遷吴興之寳溪俗名射村即葛常之韻語陽秋所謂先文康公守湖因家寳溪之上建觀褉堂于水濵又胡苕溪漁隠叢話所謂先君丐祠居射村盖其地也一時之盛並開五府今嶽廟南廟等刹猶其故址距此里許為前丘復改築焉今族里冠裳綿綿於斯其在洪武初己為名流鉅公所記載如此而佛燈院至今存也盖來儀潯陽人湖州舊志因其為潯陽人遂譌以為南潯人非也喜呉興山水卜居菁山距前丘而西十數里故詳余之先世云爾詞林人物考云來儀逰山寺句有松老知僧臘禪空悟佛心或譏其剽竊韓翃僧臘禪心語也昔子卿有明月照髙樓想見餘光輝子羙有落月照屋梁猶疑見顔色不以為病今來儀用老知空悟虚字轉妙蜀山徐㓜文詩溪山固可娱風雨亦足庇吴旦生曰吾鄉弁山之南為蜀山呉興掌故云元授張來儀以安定書院山長因欲卜居吴興以詩約㓜文云呉興好山水爾我盍遷居繞郭羣峯列廻波一鏡如蠶餘即宜稼樵罷亦堪漁結屋雲林下殘年共讀書於是来儀居崝山㓜文居蜀山遂建蜀山精舍此詩殆其卜築時作厯代詩話巻七十二
