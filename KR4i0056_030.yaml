body:
  text: 歷代詩話卷三十歸安吳景旭撰戊集中之上漢魏六朝褦襶程曉嘲熱客詩今世褦襶子觸熱到人家吳旦生曰玉篇廣韻不載二字藝文類聚作􅼡襶集韻褦音奈襶音戴炙轂子云褦襶笠子也馮元成云凉笠也以竹為胎蒙以帛暑時戴之以遮日今暑中謁客稱褦襶其不曉事者亦稱褦襶名義考云二字從衣何以云不曉事蓋炎暑戴笠見人必不曉事者也黃山谷次韻松扇詩可憐逺度幘溝漊適堪今時褦襶子陸放翁夏日詩孤舟正作笭箵夢九陌難隨褦襶忙金人王子端夏日詩且喜過門無褦襶却憐浣壁有寧馨史舜元詩壯嵗羞為褦襶子即今却羡囁嚅翁幽憤嵇康幽憤詩昔慙栁下今愧孫登吳旦生曰石林詩話以此二句蓋志鍾㑹之事野客叢書云鍾㑹所以害康者因吕安兄訟弟之故觀其集有與吕長悌絶交一書其間曰阿都開悟每喜足下有此弟足下許吾不擊都以子父六人為誓吾乃感足下重言慰解都都遂釋然何意足下包藏禍心密表擊都今都獲罪吾為負之吾之負都由足下之負吾也蓋康嘗為安致解於其兄兄紿其和密致其罪康悔因為是書與其兄絶交遂牽連入獄幽憤之詩正志其事所以繼有內負宿心外恧良朋之語魏氏春秋謂吕巽誣其弟安不孝安引康為證康義不負心保明其事鍾㑹勸大將軍因此除之而晉史亦曰康與吕安友善安為兄所枉訴以事繫獄詞相引證遂復收康康謹言行一旦縲絏乃作幽憤詩蓋孫登嘗謂康曰子才多識寡難免於今之世此所以有愧孫之語樂天雜感詩云吕安兄不道都市殺嵇康石林詩話又言嘗讀世說知康乃魏宗室壻審如此雖不忤鍾㑹亦安能免死耶秀才入軍韻語陽秋曰文選載嵇叔夜贈秀才入軍詩李善注謂兄秀才公穆入軍而張銑謂康之從弟不知其名考五詩或曰携我好仇或曰思我良朋或曰佳人不在皆非兄弟之稱善銑所注恐未必然爾吳旦生曰劉義慶集林嵇熹字公穆舉秀才晉百官名云嵇熹字公穆歷揚州刺史康兄也蓋名氏鑿鑿非不知名之謂至於詩中稱謂古人多不可拘如五詩中思我所欽則以所欽為弟陸機贈從兄詩願言思所欽則以所欽為兄又贈馮友詩願言懷所欣則以所欣為友此亦何常之有况楚辭樂府往往以佳人比君王何獨不見入兄弟用耶又如康幽憤詩母兄鞠育有慈無威恃愛肆姐不訓不師按姐音租嬳姐女態也字本作㜘省作姐說文㜘嬌也選注姐嬌也設使不通其義將以肆姐為姊妹之姊非對母兄而言耶趙李阮嗣宗詠懷詩西遊咸陽中趙李相經過楊升菴曰顔延年以為趙飛燕李夫人劉㑹孟謂安知非實有此人不必求其誰何也按漢書谷永傳小臣趙李從微賤尊寵成帝嘗與微行者籍用趙李字正出此若如顔延年說趙飛燕李夫人豈可言經過如劉㑹孟言當時實有此人唐王維詩亦有日夜經過趙李家豈唐時亦實有此人乎吳旦生曰據陳云谷永傳成帝久無繼嗣數為微行多近幸小臣趙李從微賤專寵皆皇太后諸舅夙夜所常憂至親難數言故風永等因天變切諌胡元瑞云按永傳謂許班之貴傾動前朝今之後起天所不享十倍於前蓋絶無小臣二語則小臣從上為句而趙李以下正指趙飛燕李平矣王弇州云趙飛燕李平皆成帝所幸婕妤然不應與婕妤遊從余意趙李亦如太冲詠史所引金張許史之謂觀相字自是兩人氏姓駱賔王詩趙李經過密蕭朱交結親則兩人明矣咸陽遊俠或有其人安知非朱家郭解者流有以動嗣宗興歎耶吹臺阮嗣宗詠懷詩駕言發魏都南向望吹臺簫管有餘音梁王安在哉吳旦生曰楊升菴謂本師曠吹臺梁孝王增築班史稱平臺唐稱吹臺又因謝惠連嘗為雪賦又名雪臺余按水經注陳留縣有師曠城上有列仙之吹臺梁王增築即嗣宗所謂吹臺文昌雜録云東京天清寺繁臺梁孝王按歌吹之臺後有繁氏居其側里人呼為繁臺青箱雜記云梁髙祖常閲武於此改為講武臺此則吹臺之始末也至於平臺者按漢書晉灼注云兔園在平臺側如淳注云睢陽城東二十里有臺寬廣而不甚髙俗謂之平臺宋書謝靈運傳所云綴平臺之遺響也今觀統志云惠連於此賦雪又名雪臺蓋謝居江左安得云於此賦雪升菴以平臺即吹臺未必然也漢梁孝王傳云王以功親為大國大治宫室園苑則所築亦非一處耳妖女阮嗣宗詩昔余逰大梁登於黃華顛應龍沈冀州妖女不得眠吳旦生曰魏明帝寵毛氏而黜虞妃其後郭夫人有寵毛后賜死元人傳竒有跳槽之語為此也故嗣宗以妖女刺之按趙武靈王西至河登黃華之上夢處女鼓琴歌詩因納吳廣女娃嬴孟姚其先七世兆於簡子之夢及入宫而奪嫡亂國豈非妖女乎張衡應問曰女魃北而應龍翔懸輿張茂先答何敬祖詩衰疾近辱殆庶幾並懸輿吳旦生曰戊先為太子少傅敬祖為太子太師本自同寮故有並歸之想按薛廣德傳乞骸骨賜安車駟馬廣德懸其車以傳子孫師古注云懸其所賜安車示榮幸也致政懸車此亦古法漢王符自叙贊云章和二年罷州家居年漸七十時可懸輿蔡伯喈碑云遂隱丘山懸車告老李文饒一品集云所冀中衢擊壤獲比於堯翁舊里懸車不慙於漢相𤣥景升菴均薻曰文選傅𤣥詩𤣥景隨形運庾闡詩𤣥景如映璧繁星如散錦又清響呼不至𤣥景招不來皆以月為𤣥景吳旦生曰傅𤣥詩不可泛指為月也文選傅詩李善注𤣥鴈故云𤣥影五臣注景鴈影也映於月光而色𤣥也余考之古影字用景字如周禮以土圭之法測土深淺正日景以求地中日南則景短多暑日北則景長多寒項羽贊贏糧景從董仲舒傳景嚮之應形聲屈原九章入景響之無應自葛洪撰字苑始加彡為影字說文按影者光景之類也合通用景非毛髮藻飾之事不當從彡二離傅長虞贈何劭王濟詩雙鸞遊蘭渚二離揚清輝吳旦生曰或以二離指日月而言余按孔演圖云鳳火精也漢書長離前掞光曜張衡賦前長離使拂羽司馬相如賦前長離而後矞皇文心雕龍光若長離之振翼諸注皆云長離鳳也潘嶽贈陸機詩婉婉長離凌江而翔此指鳳以比陸也何劭王濟皆侍中故稱二人為二離况以二離對雙鸞則指鳥族為是夢溪筆談云四方取象蒼龍白虎朱雀龜蛇惟朱雀莫知何物但謂鳥而朱者羽族赤而翔上集必附木皆火之象也或謂之長離蓋云離方之長耳或云鳥即鳳也故謂之鳳鳥少昊以鳳鳥至乃以鳥紀官則所謂丹鳥氏即鳳也天文取象於鶉故南方朱鳥七宿曰鶉首鶉火鶉尾是也鶉有兩種有丹鶉有白鶉此丹鶉也色赤黃而文鋭上秃下夏出秋藏飛必附草皆火類也王奕云朱鳥以其羽蟲之長稱乎而曰鶉首鶉尾何也師曠禽經青鳳謂之鶡赤鳳謂之鶉白鳳謂之鷫紫鳳謂之鷟蓋鳳生於丹穴鶉又鳳之赤者故南方取象焉據此則鶉直是鳳而四方取象四獸皆蟲之長也丹鶉微族何足比象而愈知離之為鳳稱矣金虎陸士衡詩火辰匿暉金虎曜質焦氏筆乘曰火辰心星也明則天下和平暗則天下喪亂金太白也虎西方白虎昴也太白入昴是金虎相薄則有兵亂吳旦生曰弱侯箋金虎本於甘石星經故自鑿鑿老君所謂太白入昴兵其亂也何敬祖詩望舒離金虎五臣注西方金也西方七宿畢昴之屬俱白虎也其說正同若張平子東京賦始於宫鄰卒於金虎五臣注云幽厲用小人與君子為鄰堅若金惡若虎卒以此亡宜升菴譏其不知引此而謬自為說也按河圖云亡金虎喻秦居也褰陸士衡擬古詩驚飈褰反信歸雲難寄音吳旦生曰注褰引也欲隨風寄音信乃為褰引而反與雲俱歸故難寄也一云褰絶也謂驚風之來絶其反信歸雲之去難以寄音也余意臨風􅑴想便有褰裳濡足之意若欲慿之以通往來而不意歸雲飄忽難以寄音也下句攬衣有餘帶循形不盈襟義理俱從褰字㑹出舒翮遵渚陸士衡别士龍詩感别慘舒翮思歸樂遵渚吳旦生曰選注舒翮謂鵠也遵渚謂鴻也蘇武詩黃鵠一逺别毛詩鴻飛遵渚一自謂一謂士龍也余以上文南歸北邁永安承明俱已分指而此復分到底便少味二句皆應士衡自謂其意以感斯别處比鵠之舒翮而更慘思到歸時比鴻之遵渚而更樂也從别豫想其歸忽慘忽樂益見情深石龜陸機詩石龜尚懷海我寧忘故鄉吳旦生曰述異記東北巖海畔有大石龜俗云魯般所作夏則入海冬復止於山上末垂潘嶽懷縣詩南陸迎修景朱明送末垂吳旦生曰五臣注末垂謂六月將盡時也按崔駰臨洛觀賦云迎夏之首末春之垂言末垂是謂春盡也詠史左太冲詠史詩鬱鬱澗底松離離山上苗以彼徑寸莖䕃此百尺條世胄躡髙位英俊沈下僚地勢使之然由來非一朝吳旦生曰注謂澗松喻英俊山苗喻世胄松本髙以在澗而卑苗本卑以在山而髙此徑寸之莖反䕃百尺之條地勢使然也白樂天續古篇云雨露長纎草山苗髙入雲風雪折徑朩澗松摧為薪風摧此何意雨長彼何因百尺澗底死寸莖山上春語意全用左詩去之逺矣王弇州云以彼徑寸莖蔭此百尺條是涉世語貴者雖自貴棄之若埃塵是輕世語振衣千仞岡濯足萬里流是出世語每諷太中詩便飄飄欲仙繞指柔劉司空贈盧中郎詩何意百錬剛化為繞指柔野客叢書曰文選載贈答詩二首重贈盧一首而劉文集中載往返四首有盧答詩百錬或致屈繞指所以伸皆答其意也吳旦生曰五臣注但言百鍊之鐵堅剛而今可繞指自喻經破敗而至柔弱然未知其為何物余觀古今注吳大帝有三寶刀一曰百鍊二曰青犢三曰漏影又按平望湖屬興化嘗於湖中得一劍屈之首尾相就識者曰即繞指柔也韻語陽秋云晉盧諶先為劉琨從事中郎將假匹磾領幽州求諶為别駕故琨答諶詩情滿伊何蘭桂移植茂彼春林瘁此秋棘言諶棄已而就匹磾也厥後琨命箕淡攻石勒一軍皆沒由是窮蹙不能自守乃率衆赴匹磾繼為匹磾所拘知其必死再贈諶云朱實隕徑風繁英落素秋何意百鍊剛化為繞指柔欲以激諶而救其急而諶殊不領也琨既被害諶始上表以雪其寃亦何補耶三孽劉越石答盧諶詩二族偕覆三孽並根長慙舊孤永負寃魂吳旦生曰琨父母並為令狐泥所害諶父母悉為劉粲所害故云偕覆三孽謂劉聰劉曜劉粲也一云漢書孺子為孽是指琨之兄子余按琨遣兄子演領兖州不守兄少子及演妻皆為所執所云長慙舊孤乃指此也三孽自謂三劉名字互用西清詩話曰有一人名而分用之者如劉越石宣尼悲獲麟西狩泣孔丘謝惠連雖好相如逹不同長卿慢等語若非前後相應映帶殆不可讀然要非全美也吳旦生曰文心雕龍宣尼二語即對句之駢枝也韻語陽秋選詩駢句甚多如宣尼二語恐不足為後人法也余以此非通人之見惟升菴為善論其謂史記相如傳文君已失身於司馬句長卿故倦逰以人姓與字分為二句其文法自可傳人之姓氏名字多互文焉劉越石詩宣尼悲獲麟西狩涕孔丘沈休文宋書恩幸傳論胡廣纍世農夫伯始致位公卿黃憲牛醫之子叔度名動京師田子藝云庾信詩荷香薰水殿閣影入池蓮荷即蓮也殿即閣也此上下互句法牝牡殷仲文詩爽籟警幽律哀壑扣虛牝吳旦生曰家語子夏引山書云地東西為緯南北為經山為積德川為積刑髙者為生下者為死丘陵為牡溪谷為牝宛委餘編云虛牝壑中之窟穴也仲文用此韓愈贈崔立之詩可憐無補費精神有似黃金擲虛牝洪慶善云牝溪谷也又本仲文用之按說文長箋云牝畜母也易曰畜牝牛吉書牝雞毋晨之類是也牡畜父也當從牛從士與壯壻同義此本訓也然古人借二字稱謂􅉨􅉨中雋如老子𤣥牝𤣥天也牝地也𤣥在人為鼻牝在人為口天食人以五氣從鼻入地食人以五味從口入故谷神不死是謂𤣥牝谷飬也海録碎事云太白在南嵗在北名曰牝牡注嵗陽也太白隂也故曰牝牡酉陽雜爼云錬銅時有凸起者牡銅也凹陷者牝銅也說文牡曰棠牝曰杜杜棠牝牡與楊柳同義猶言隂陽也一品集云平泉莊有東陽之牡桂刑法志注云牡荆荆之無子者齊民要術云牡麻有花無實字學集要云蔚牡蒿周禮蟈氏掌去蛙黽焚牡蘜以殺之說文箱大車牝服也此牝字韻譜作牡通借篋之稱夢溪筆談云牙璋以起軍旅如今之合契牙璋牡契也以起軍旅則其牝宜在軍中即虎符之法也大駕鹵簿中有勘箭其牡謂之雄牡箭牝謂之闢仗箭熙寧中罷之西方梵篆一用牝書一用牡書詢芻録云結屋枋凑合處必有牝牡筍穴俗呼為公牡筍漢書成帝時長安章城門門牡自亡京房曰闕動牡飛臣下為非師古曰牡所以下閘者字學集要云楗即戶牡兩端入牝孔所以止門者牝只是朩孔承􅀢能受底物事如今門􅗚門􅗚開門閉門機也謂之牡鐶則謂之牝鎖管便是牝鎖鬚鎖鑰也便是牡唐武后之世為牝朝流黃素張載擬四愁詩云美人遺我筒中布何以報之流黃素吳旦生曰楊雄蜀都賦筒中黃潤一端數金左思蜀都賦黃潤比筒籯金所過注云黃潤細布也盛於筒中其價過一籯之金潜夫論筒中女布韓翃詩客衣筒布潤梁書蕭恢為郢州刺史有進筒中布者以竒貨命焚之東觀記云亷范至蜀太守張穆持筒中布𢾗篋與范不受留青日札云筒布即今細布飛花布之類環濟要略云間色有五紺紅紫縹流黃也楊升菴云青赤黃白黑五方正色也碧紫紅緑流黃五方之間色也余觀相逢行云中婦織流黃流黃謂絹也蓋機中所織黃黑之間色也顧野王陽春歌云蒯門寒未歇為斷流黃機沈佺期古意云總為含愁獨不見忍教明月照流黃洪武初張來儀寄衣曲云家機織得流黃素首尾量來寬尺度回文東觀餘論曰蘇氏蕙織錦回文詩所傳舊矣故少常沈公復傳其畫由是若蘭之才益著然其詩回旋書之讀者惟曉外繞七言至其中方則漫弗可考矣若沈公之博古亦謂辭句脫略讀不成文殊不知此詩織成本五色相宣因以别三四五七言之異後人流傳不復施采故迷其句讀非辭句之脫略也政和初豫在洛陽於王晉玉家得唐釋士南效此詩并申諴所釋而後曉然是詩初不舛脫蓋沈公未嘗見此本耳然申諴所釋但依士南之設色其七言數火其色反黃四言𢾗金其色反緑於五行為弗類意蘇氏詩圖之色為不爾今因冠詩於畫遂别而正之三四五七言之詩各隨其行而為之色觀者見其色則詩之言𢾗可知已至於士南之文既有釋者則賦采自從其舊而并録於卷首云吳旦生曰文心雕龍謂回文所興則道原為始又傅咸有回文反覆詩溫嶠有回文詩故皮襲美云傅咸反覆興焉溫嶠回文興焉則知蘇氏之前回文已出矣按蘇氏織錦縱廣八寸許計八百餘言形如璇璣唐有璇璣圖記起宗道人分為七圖得三四五六七言者總計三千七百三十四首黃山谷詩云於詩織就回文錦如此陽臺暮雨何亦有英靈蘇蕙子只無悔過竇連波竇滔字連波武后記云因述若蘭之多才恆美連波之悔過歷代詩話卷三十
