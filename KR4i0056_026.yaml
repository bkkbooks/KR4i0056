body:
  text: 歴代詩話巻二十六歸安吳景旭撰丁集下之上古樂府巴渝樂府原題曰巴渝本舞名即鞞舞也漢髙自蜀漢將定三秦閬中范因率賨人以従為前鋒號板楯蠻勇而善鬬及定三秦封因為閬中侯復賨人七姓其俗善舞髙帝使樂人習之閬中有渝水因以為名故曰巴渝舞吳旦生曰華陽國志謂巴師勇銳歌舞以凌殷人倒戈故世稱之曰武王伐紂前歌後舞也又謂閬中有渝水賨民多居水左右天性勁勇初為漢前鋒陷陣銳氣喜舞帝善之曰此武王伐紂之歌也乃令樂人習學之今所謂巴渝舞也按舞曲四篇一曰矛渝二曰安弩渝三曰安臺四曰行辭其辭既古莫能曉其句讀英雄記云曹公破袁譚馬上舞三巴曹植鞞舞詩序云故西園歌吹李堅者能鞞舞先帝下書召堅堅年踰七十中間廢而不為因攷魏使王粲制其辭粲問巴渝帥而得歌之本意改為矛渝新福弩渝新福曲臺新福行辭新福四曲以述魏德李賛皇云巴渝末曲猥䝉漢祖之知西域傳作俞蜀都賦云奮之則賨旅翫之則渝舞梁簡文蜀道難云若奏巴渝曲時當君思中濁獨漉獨漉水深泥濁吳旦生曰濁音獨漉濁為韻自叶按古音略引史記律書濁者觸也白虎通瀆者濁也孺子之歌滄浪之水濁兮可以濯我足漢書潁川歌潁水濁灌氏族陳張君祖詩風來詠愈清鱗萃淵不濁斯乃𤣥中子所以矯逸足又俗謂不明曰􅴐濁以酒為喻也或作鶻突又作糊塗並非白紵韻語陽秋曰樂府解題譽白紵曰質如輕雲色如銀製以為袍餘作巾袍以光軀巾拂塵王建云新縫白紵舞衣成來遲邀得吳王迎元稹云西施自舞王自管白紵飜飜鶴翎散則白紵舞衣也王建云新換霓裳月色裙豈霓裳羽衣舞亦用白耶吳旦生曰宋書樂志曰白紵舞按舞辭有巾袍之言紵本吳地所出宜是吳舞也晉俳歌云皎皎白緒節節為雙吳音呼緒為紵疑白緒即白紵也南齊書樂志曰白紵歌周處風土記吳黄龍中童謠云行白者君追汝句驪馬後孫權征公孫淵浮海乗舶舶白也今歌和聲猶云行白紵焉後見樂府原題云白紵歌有白紵舞白鳬歌有白鳬舞並吳人之歌舞也吳地出紵又江鄉水國自多鳬鶩故興其所見以寓意焉始則田野之作後乃大樂氏用焉此解最確歴代詩話巻二十六
