body:
  text: 歷代詩話卷六十一歸安吳景旭撰辛集下之下宋詩小盡竹坡老人詩話曰頃嵗朝廷多事郡縣不頒厯所至晦朔不同朱希真避地廣中作小盡行云藤州三月作小盡梧州三月作大盡哀哉官厯今不頒憶昔升平淚成陳我今何異桃源人落葉為秋花作春但恨未能與世隔時聞喪亂空傷神按月有三十日為大盡止二十九日為小盡吳旦生曰月令廣義謂盡終也大月曰大盡小月曰小盡又云灰月釋名晦月盡之名也死為灰月光盡似之公羊傳提月六鷁退飛過宋都提月者何僅逮是月晦日也何休注提月邊也在是月之嵗盡唐西域記云印度國俗月生至滿謂之白分月虧至晦謂之黑分法苑作白月黑月黑前白後合為一月黑月或十四日或十五日月有大小故也故中土節氣與印度遞爭半月中土以二十九日為小盡印度以十四日為小盡中土之十六日乃印度之初一日也搜采異聞録云十五夜為半月兩半月為一月三月為一時兩時為一行兩行為一年二年半為一雙此由閏故以閏月兼本月此謂月雙非閏雙也以五年再閏為閏雙三瑞洪適題寧海縣詩久以馳魂夢今登三瑞堂故山有喬朩近事話甘棠吳旦生曰洪皓政和中第進士為寧海簿攝令事蠲貧弱四千八百户稅縣境荷花桃實竹幹有連理之瑞建三瑞堂巳而生子適遵邁即容齊果應其瑞此詩乃適行縣時作也三子並中詞科繼入西掖時有賀啓云有是父有是子相傳忠義之風難為弟難為兄俱擅詞章之譽社首洪容齊作光堯挽詩鼎湖龍去逺社首鳯來遲吳旦生曰拾遺記成王四年旃塗國獻鳯雛育於靈禽之苑及封泰山禪社首之後文彩炳耀飛走之類不復喧鳴咸服神禽之逺至也及成王崩冲飛而去容齊用此三三徑周益公贈楊誠齊詩回環自闢三三徑頃刻能開七七花吳旦生曰慶元間誠齊以祕書監退休年未七十有終焉之意築園南溪上開九徑江梅海棠桃李橘杏紅梅碧桃芙蓉九種花朩各植一徑命曰三三徑因賦詩曰三徑初開是蔣卿再開三徑是淵明誠齊奄有三三徑一徑花開一徑行時益公罷相訪誠齊於南溪留此詩故誠齊和云相國來尋處士家山間草朩也光華續仙傳云潤州鶴林寺有杜鵑花高丈餘或見三女子遊花下俗傳花神也周寶鎮浙西謂道人殷七七曰聞君能非時開花今重九將近君能開此花乎曰可乃宿鶴林中夜女子來曰妾為上𤣥命司此花今為道者開之九日花大開如春時集事淵海云殷名天祥又名道筌常自稱七七東坡詩安得道人殷七七不論時節遣花開諺雨鶴林玉露曰范石湖詩朝霞不出門暮霞行千里今晨日未出曉氛散如綺心疑雨再作眼轉雲四起我豈知天道吳儂諺云爾古來占滂沱說者類恢詭飛雲走羣羊停雲浴三豨月當天畢宿風自少女起爛石燒成香汗礎潤如洗逐婦鳩能拙穴居狸有智蜉蝣强知時蜥蜴與聞計垤鳴東山鸛堂審南柯蟻或加隂石鞭或議陽門閉或云逢庚變或自換甲始刑鵝與象龍聚訟非一理不如老農諺影響捷於鬼哦詩敢誇博聊用醒午睡此詩援引占雨事甚詳可喜諺有云日出早雨淋腦日出晏曬殺鴈又云月如懸弓少雨多風月如仰瓦不求自下二說尚遺何也余欲增補二句云日占出海時月驗仰瓦體吳旦生曰張協詩金風扇素節丹霞啓隂期又云朝霞迎白日丹氣臨陽谷傅𤣥詩徂暑未一旬重陽翳朝霞則朝霞之諺當時已入咏不待石湖也又如杜詩禾頭生耳禾穗黑按四民月令云秋甲子雨禾頭生耳王建詩照泥星出依然黑淹爛庭花不肯休按西溪叢話引諺云乾星照濕土來日依舊雨瑣碎録引吳語云星宿照爛土明日依舊雨又引諺云雲行西星照泥皆言雨候也蓋唐時又用之楊升菴云他如雨灑上元燈雲掩中秋月又黃梅寒井底乾又云河射角好夜作犁星沒水生骨又云春寒四十五貧兒市上舞貧兒且莫誇且過桐子花又云黃梅雨未過冬青花未破冬青花巳開黃梅再又來又云舶䑲風雲起旱魃深歡喜又云商陸子熟杜鵑不哭皆為唐宋詩人引用若陸璣詩疏引諺云黃栗留看我麥黃甚黑不又引蜻蛚鳴衣裘成蟋蟀鳴懶婦驚夏小正注引天河東西漿洗寒衣國語注引古語上長冒橛陳根可拔耕者急發四民月令引農謠三月昏參星夕杏葉盛桑葉白又云杏子開花可耕白沙又貸我東蘠償我白粱先儒皆以解經不但詩詞之資而已疑塜范石湖詩一棺何用塜如林誰復如君負此心吳旦生曰范石湖奉使過漳河入曹操講武城城外有疑塜七十二散在數里間傳云操塜正在古寺中輟耕録載俞應符題詩云生前欺天絶漢統死後欺人設疑塜人生用智死即休何有餘機到丘壟人言疑塜我不疑我有一法君未知直須發盡疑塜七十二必有一塜藏君尸緑雪亭言老瞞毛骨豈真葬七十二塜間哉奸雄欺人詩家又墮其計恐老瞞之鬼揶揄矣余近觀魯爾章咏銅雀臺云只今片瓦人爭識七十二塜空自疑因笑謂曰老瞞遺令汝等時時登銅雀臺望吾西陵墓田已明明道破處所矣大難為椎埋子屬垣也顛當范石湖六言詩恐妨胡蝶同夢笑倩顛當守門吳旦生曰酉陽雜爼顛當窠深如蚓穴網絲其中土蓋與地平大如榆莢常仰桿其蓋伺蠅蠖過輒翻蓋捕之才入復閉與地一色並無絲隙可尋也其形似蜘蛛爾雅謂之王蚨蟷鬼谷子謂之蚨鬼金華子謂之釣駱槖兒童諺云顛當顛當牢守門蠮螉冦汝無處奔耐官吕東萊寄向縣丞詩云耐官丞相風流在坐守簞瓢不訴窮吳旦生曰夢溪筆談真宗時向敏中拜右僕射麻下日李昌武當對上謂之曰朕即位以來未嘗除僕射今日以命敏中此殊命也敏中門下賀客必多卿往視之明日却對來昌武乃往見丞相謝客門闌峭然無一人昌武與向親徑入見之徐賀曰今日聞降麻士大夫莫不歡慰朝野相慶公但唯唯又曰自上即位未嘗除端揆此非常之命自非勳德隆重眷倚殊越何以至此公復唯唯又歷陳前世為僕射者勳勞德業之盛禮命之重公亦唯唯卒無一言既退復使人至庖厨中問今日有無親戚賔客飲食宴㑹亦寂無一人明日以其所見對上笑曰向敏中大耐官職杜陽雜編云朱泚亂長安源休乃收圖書貯倉廩作蕭何事業謂僞黃門蔣諌曰若度其才即吾為蕭姚為曹耳識者謂休不奈官職喬琳戲曰源公直所謂火迫酇侯耳則耐官職之說其來已久不斟吕居仁答曹吉父詩記我今年病不斟吳旦生曰方言斟益也南楚凡相益而又少謂之不斟凡病少愈而加劇亦謂之不斟或謂之何斟郭璞解云言雖少損無所益也吕公詩用此今行本改不禁則失之矣放翁王弇州曰昔人所稱廣大教化主者於長慶得一人曰白樂天於元豐得一人曰蘇子瞻於南波後得一人曰陸放翁為其情事景物之悉備也然蘇之與白塵矣陸之與蘇亦劫也吳旦生曰弇州又言放翁頗近蘇氏而粗楊萬里劉改之俱弗如也然放翁又與子瞻殊科自余觀之南渡以後范石湖陸放翁兩家為冠楊誠齊謂范之清新陸之敷腴姜白石謂溫潤如范俊逸如陸當時已推服之然范詩易看而難入當由其溫潤進其清新陸詩難擇而易耽當汰其敷腴寶其俊逸蓮花博士趙章泉曰嘉泰壬戌九月陸放翁夢一故人相語曰我為蓮花博士鏡湖新置官也我且去矣君能暫為之乎月得酒千壺亦不惡也遂以詩記之云白首歸修汗簡書每因囊粟歎侏儒不知月給千壺酒得似蓮花博士無吳旦生曰困學紀聞言列子務本游不如務內觀陸游字務觀本此余按陸母夢秦少游而生子故名秦之字曰游即字秦之名曰務觀後臺臣劾其恃酒頽放因自號放翁故作詞有飄然煙雨中天教作放翁之句蓋文人多異往往而有臺臣且恃酒彈之何物鏡湖中偏月給千壺以相招致雖寓言亦足自放矣雲子天吳陸放翁詩雲子翻匙新稻飯天吳坼繡舊衣𥜗吳旦生曰二語皆自杜詩脫出杜子美詩飯抄雲子白許彥周云雲之子雨也言如雨㸃爾出荀子雲篇又葛洪丹經用雲子碎雲母也今蜀中有碎礫狀如米粒圓白雲子石也後見佛經以稻為雲子即所謂汶陽之稼如雲耶子美北征詩海圖坼波濤舊繡移曲折天吳及紫鳯顛倒在裋褐言以海圖舊繡為小兒裋衣故波濤為之坼繡紋為之移天吳紫鳯之類或顛或倒也天吳海圖所畫之物按山海經朝陽之谷神曰天吳是為水伯其為獸也人面八首八足八尾背青黃大荒東經云蓋余之國有神人八首人面虎身十尾名曰天吳何承天云魚之大口者名談藪云李大異為廣西帥顧坐客曰杜詩天吳當音華見山海經未知後見何書王仲行曰後漢書戴就被收獄吏燒鋘斧使就挾之注引何承天纂文鋘音華又詩不吳不敖不吳不楊皆音華李公稱善不借陸放翁巢山詩穿林雙不借取水一軍持吳旦生曰史游急就章云裳韋不借為牧人顔師古注不借小屨也以麻為之其賤易得人人各自有不須假借因為名也揚雄方言云麻屨謂之不借王伯厚漢制考云繩菲今時不借也疏云夏時謂之菲漢時謂之不借劉熙釋名云齊人謂韋屨曰屝屝皮也以皮作之崔豹古今注云不借草履也漢文帝履不借以視朝楊公筆録云卜式為郎中蹻而牧羊中蹻即草鞋也古謂之不借致虛閣雜爼云仙人鳯子隱於農夫之中一日大雨鄰人借草履鳯子曰他人則可借我之草履乃不借者也其人怒詈之鳯子以草履擲與化為鶴飛去故後世名草履為不借周禮玉璂注璂讀如薄借綦之之綦賈公彥疏云薄借之語未聞疑即不借詞林海錯云梵語瓶曰軍持賈島送僧詩我有軍持憑弟子嶽陽江裏汲寒流放翁入蜀記云九日至慧逺法師祠堂逺公之側又有一人執軍持侍立謂之辟蛇童子余有詩云汲泉未覺軍持小設具何妨僕憎空已卯冬西湖上示陸驤武謬許為工三餘贅筆云吳人呼暖飲食具為僕憎以銅為之言僕者不得竊食故憎之也墅談云雜投食物於一小釡中爐而烹之亦名邊爐亦名暖鍋團坐共食不復别置几案甚便於冬日小集而甚不便於僕者之竊食宜僕者之憎之也故名糖蟹陸放翁詩磊落金盤薦糖蟹吳旦生曰放翁筆記謂唐以前無沙糖凡言糖者皆糟耳如糖蟹糖薑皆是余按清異録煬帝幸江都吳中貢糖蟹則潔拭殼面以鏤金龍鳯花貼上夢溪筆談大業中吳郡貢蜜蟹二千頭又何𦙍嗜糖蟹大抵南人嗜鹹北人嗜甘蟹加糖蜜蓋便於北俗也據此則隋時大業已然安得云唐以前無沙糖耶及觀學齊占畢云宋玉大招已有柘漿是取蔗汁始於先秦也前漢郊杞歌柘漿析朝酲注謂取甘蔗汁以為飴也又孫亮取交州所獻甘蔗餳則是煎蔗為糖已見於漢時而說文集韻並以糖為蔗飴曰飴曰餳皆是堅凝可含之物非糟之謂何可言煎蔗始於太宗時而前止是糟耶酉陽雜爼云平原郡貢糖蟹每年生貢斫氷火照懸老犬肉蟹即浮因取之一枚直百金馳至京退紅陸放翁詩退紅衣焙薰香冷古錦詩囊覔句忙吳旦生曰放翁自注唐樂府云床上小薰籠韶州新退紅余按此唐世染色名也退與褪同卸衣曰退檀弓退然如不勝衣元微之離憶詩憶得雙文衫子裏鈿頭是鈕扣之屬也雲映褪紅酥又花謝曰退陸放翁詩褪花梅子已微酸嘉靖中王元美枯蓮詩褪盡紅衣態不禁浮蛆陸放翁詩澆書滿挹浮蛆瓮攤飯橫眠夢蝶床吳旦生曰蘇學士以晨飯為澆書李黃門以午睡為攤飯人皆知之余按詞林海錯云酒杯上跳沫為浮蛆毛澤民詩氷紗卧甕青蓮羃浮蛆欲上真珠泣韻語陽秋載蘇養直後清江曲云社瓮欲熟浮蛆香漁隱叢話載自效山谷格云浮蛆琰琰拋青春又東坡詩浮蛆灧金碗金人朱師美詩玉碗浮蛆彼何有元薩天錫詩開甕酒熟浮新蛆清異録云李太白好飲浮玉梁不知其何物得吳婢釀酒促其功答曰尚未熟但浮梁耳試取一盞至則浮蛆酒脂也太白所飲蓋此古雋考略云浮蟻杯靣浮花也緑蟻酒之美者泛泛有浮花其色緑南園楊誠齊寄陸放翁詩云不應李杜翻鯨海更羡䕫龍集鳯池道是樊川輕薄殺酒將萬户比千詩吳旦生曰放翁本傳晚年再出為韓托胄撰南園閲古泉記見譏清議朱晦翁嘗言其能太高迹太近恐為有力者所牽挽不得全其晚節蓋有先見之明焉誠齊寄詩蓋亦指此耳然余觀記中曰許閒曰歸耕其名皆出於忠獻之詩含㫖寓託絶非貢諛之辭未可深文誅之致乖其情實也白石趙威伯詩話曰姜堯章䕫居苕溪與白石洞天為鄰潘轉翁字之曰白石道人且畀以詩云人間官爵似樗蒲采到枯松亦大夫白石道人新拜號斷無繳駁任稱呼堯章報以長句云南山仙人何所食夜夜山中煮白石世人喚作白石仙一生費齒不費錢仙人食罷腹便便七十二峰生肺肝真祖只在南山南我欲從之不憚逺無方煮石何由軟佳名賜我何敢辭但愁自此長苦飢囊中只有轉菴詩便當掬水三咽之吳旦生曰晉書鮑靚為南陽太守嘗行部入海遇風饑甚取白石煮之以自濟韋應物詩澗底束荆薪歸來煮白石故堯章謂煮石苦饑耳時堯章與黃岩老同學詩於蕭千岩而黃亦號白石因稱雙白石蔡中郎閒中今古録曰元末永嘉高明字則誠登至正四年進士任慶元路推官見方國珍來據慶元避於鄞之櫟社以詞曲自娛因劉後村有死後是非誰管得滿村聽唱蔡中郎之句因編琵琶記用雪中郎之恥洪武初徴辟不就既卒有以其記進上覽曰五經四書如五穀家家不可缺琵琶記如珍羞百味富貴家其可缺耶吳旦生曰東國宗敬中郎不言名咸稱蔡君兖州陳留並圖畫形像為之目曰文同三閭孝齊參騫則中郎固孝子也後村因書所見而作故云黃童白叟往來忙負鼓盲翁正作場蓋惡其唱說之非而咏也則誠思雪其恥宜有以改正之奈何欲止沸而揚其湯耶堯山堂外紀云東嘉此記為其友王四而作王四登第棄其妻周氏而贅於布哈太師家東嘉欲挽之不可得故作此以切諷之名琵琶者取其二字上各有二王字并得四王字為王四也牛太師者元人呼牛為布哈故謂之牛而托名中郎者嘗從董卓之辟而卓亦稱太師故也索隱云托名蔡雍者以王四少賤嘗為人傭菜也趙五娘者以姓傳自趙至周而數適五也牛丞相者以布哈家居牛渚也明祖見此記詢得其實遂捕王四置之法弇州引誠齊所載牛相國僧孺之子繁與同人蔡生邂逅文字交尋同舉進士才蔡生欲以女弟適之蔡巳妻趙力辭不得後牛氏與趙處能卑順則又姓氏悉合晉蔡充别傳云充祖睦蔡雍孫也羊祜傳云祜雍外孫景獻皇后同産弟祜討吳有功將進爵乞以賜舅子蔡襲詔封襲關內侯是襲又雍孫也晉后妃傳云景獻羊皇后母蔡氏雍女也野客叢書云羊祜父道先娶孔融女後娶蔡雍女孔氏生發蔡氏生承祜時發與承俱病度不能兩存乃專心養發故得濟承竟病死據此則雍未嘗無子也且枯母誠雍之賢女也烈女傳何不載耶湧幢小品云雍父名稜母袁氏袁公妹曜卿姑也陌上花謝臯羽咏吳越王妃歸朝云先王蒸嘗澤有差上恩許歌陌上花吳旦生曰按吳越王妃每嵗歸臨安王以書遺妃云陌上花開可緩緩歸矣吳人用其語為歌含思凄宛東坡為之易其詞云陌上花開蝴蝶飛江山猶是昔人非遺民幾度垂垂老遊女長歌緩緩歸陌上山花無數開路人爭看翠軿來若為留得堂堂去且更從教緩緩回生前富貴草頭露身後風流陌上花已作遲遲君去魯猶歌緩緩妾回家蓋清平調也陳直方之妾嵇本錢塘妓丐詞於東坡坡因錢塘人好唱陌上花緩緩曲乃引其事戲之云陌上花開看盡也聞舊曲破朱顔破錢古今說海曰毗陵李家有女方十六嵗能詩有拾得破錢詩半輪殘月掩塵埃依稀猶有開元字想見清光未破時買盡人間不平事吳旦生曰唐食貨志武德四年鑄開元通寶錢徑八方重二銖四絫積十錢重一兩得輕重大小之中其文以八分篆𨽻三體按開元錢高祖時鑄高宗又鑄之𤣥宗又鑄之肅宗又鑄之馬永卿所謂唐二百八十九年獨鑄此錢洛并幽益桂等州皆置監故開元錢如此之多也文獻通考武德四年鑄開通元寶其文歐陽詢制自上及右回環讀六典及杜氏亦作開通吕東萊云開通之法不可易東坡云唐開通錢最善此俱可證後人以錯綜讀曰開元而不知者謂明皇所鑄蓋有開元年號也李審言乃云唐之錢文如乾元開元曰重寶通寶俗有云乾重開通為可笑然不知乾重為誤讀而開通非誤顧回瀾云稱元寶自唐高祖始稱重寶自唐肅宗始稱通寶自宋人誤讀開通錢文始改元更鑄自宋太宗始最為確論歷代詩話卷六十一
