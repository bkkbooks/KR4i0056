body:
  text: 歴代詩話巻十六歸安吳景旭撰丙集中之上賦金馬碧雞左思蜀都賦金馬騁光而絶景碧雞倐忽而曜儀吳旦生曰金馬山在雲南府城東碧雞山在雲南府城西漢宣帝時方士言益州有金馬碧雞可祭禱而致乃遣王褒入蜀求之滇畧記云古阿育王有龍馬三子皆欲之王意在季子以轡私授之縦馬逸乃下令三子捕得者以馬與之長子意馬渴必飲滇池仲子意馬必過甸中伺而邀之俱不獲季子往東松林以轡引馬遂獲之二子恥之長没於碧雞山下為神仲没於巖頭曰上甸景帝季亦没於松林即金馬景帝也鈲摫左思蜀都賦藏鏹巨萬鈲摫兼呈吳旦生曰方言梁益之間裁木為器曰鈲劈歴反裂帛為衣曰摫音規皆折破之名也盖言卓鄭之隆富也謝靈運山居賦銅陵之奥卓氏充鈲摫之端肸蠁左思蜀都賦景福肸蠁而興作吳旦生曰肸蠁蚊類濕生蟲也羣望之如氣之布寫言景福之興有如此蟲羣飛而多也說文蠁知聲蟲也爾雅圓格蟲蠁郭璞云蛹蟲廣雅土蛹也金壺字考云肸黒乙切蠁音向毛晃云古響字作向晉大夫羊舌肸字叔向左傳釋文音香兩切取肸向響布之義漢書天文志作鄉莊子作嚮揚雄甘泉賦作薌漢𨽻作㗽又作􅀢又作􅞗吳都賦芬馥肸蠁上林賦郁郁霏霏衆香發越肸蠁布寫䁆薆咇茀司馬彪云肸過也芬芳之過若蠁之布寫也杜篤祓禊賦蘭蘇肸蠁感動情魂揚雄羽獵賦蠁曶如神東風左思吳都賦東風扶留吳旦生曰注東風草名何燕泉云郴之桂陽産風葉充茗飲能愈頭風亦可浸酒性微熱楊升庵云玉篇作菄風即此也郴桂在三國屬吳則吳都賦東風為此物無疑盖既以為草也後觀詞林海錯云菄風菜名通作東字天中記云東風菜陸生置肥肉作羮味如酪香氣如馬蘭統志云肇慶府出斷續藤一名東風菜食物本草云東風菜味甘寒無毒此菜生平澤莖髙二三尺葉似杏葉而長先春而生故有東風之號則又列於菜矣元遺山詩流年又見東風菜樂土空懐北斗城注扶留藤也余按異物志云古賁灰即牡蠣灰與扶留檳榔三物合食乃善也俗曰檳榔扶留可以忘憂楊升庵云檳榔蔞子名扶留藤本草注以蒟醬為檳榔蔞子非也一統志作浮留藤出雷州海康長洲左思吳都賦佩長洲之茂苑吳旦生曰元和郡縣志謂苑在長洲縣西南七十里此悞認吳都賦之長洲以為蘇州之長洲縣矣殊不知長洲以縣名自唐武后時始豈晉左思之所云耶按漢郡國志廣陵郡東陽縣有長洲澤吳王濞都廣陵其太倉在此東陽今盱眙縣故漢書枚乗說吳王云圈守禽獸不如長洲之苑服䖍注謂吳苑韋昭注謂長洲在吳東盖指廣陵之吳也隋虞綽撰長洲玉鏡乃煬帝在江都所作梁元帝𤣥覽賦巳築長洲之苑復實海陵之倉唐虞世南詩髙臺臨茂苑飛閣跨澄江亦可證升越左思吳都賦焦葛升越弱於羅紈吳旦生曰越草名蒲屬可緝為布越絶書白越細布也後漢馬后傳白越三千端潛夫論葛子升越筒中女布盛𢎞之荆州記秭歸縣室多幽閒其女盡織布至數十升謂之升越荀子貨財粟米者彼將日月栖遲薛越之中野我今將蓄積并聚之於倉廩賈閏甫謂李密云民以食為天而有司曽無愛惜屑越如此通鑑注屑越猶言狼籍而棄之也薛越注不解今知皆草也謂其棄於草間吳鈎左思吳都賦吳鈎越棘吳旦生曰吳越春秋闔閭作金鈎有人殺其二子以血釁金遂成二鈎獻於王王舉衆鈎示之何者是也鈎師呼二子之名曰吳鴻扈稽我在於此二鈎飛著父之胸王大驚此所謂吳鈎也玉堂閒話云吳鈎者刀彎故名今南蠻名之曰葛黨刀此則以吳鈎為刀矣杜子美詩含笑看吳鈎注云吳王劍名鮑昭詩錦帶佩吳鈎注云劍類此又以吳鈎為劍矣然觀李益詩腰懸錦帶佩吳鈎全用鮑昭句李涉詩腰佩吳鈎位飛將韓翃詩結東佩吳鈎李白詩吳鈎雙雪明按此皆言佩環之類非刀劍也吳越春秋薛燭善相劍越王取純鈎示之燭曰觀其文如列星之行此純鈎也然則作劍用者宜舉純鈎不宜舉吳鈎爾猩猩􅍛􅍛左思吳都賦猩猩啼而就擒􅍛􅍛笑而被格吳旦生曰周禮王㑹狌狌若黄狗人面能言一作生生山海經狌狌知人名其為獸如豕而人面禮記猩猩能言不離走獸爾雅猩猩小而好啼廣志云猩猩似狟聲如小兒啼不聞其言出交阯封溪縣水經注云武平封溪縣有獸曰猩猩猿形人面容顔端正善與人言音聲妙麗如婦人對語聞之無不酸楚孫卿子云猩猩能言笑亦二足無尾呂氏春秋云肉之美者猩猩之脣淮南子云歸終知來猩猩知往郭璞讃云能言之獸是謂猩猩厥狀似猴號音若嚶周禮王㑹費費其形人身反踵自笑笑則上脣翕其目食人注費費曰梟羊張衡𤣥圖云梟羊喜獲先笑後悲漢書注云嘄陽費費也揚雄羽獵賦蹈飛豹羂嘄陽山海經梟陽國在北胊之西其為人人面長脣黒身有毛反踵見人笑亦笑左手操管注云海内經謂之贑音感巨人今交州南康郡深山中皆有此物也南康有贑水以有此人因以名水郭璞讃云狒狒怪獸被髮操竹獲人則笑脣蔽其目終亦號跳反為我戮物類相感志云狒狒出西南蠻本草云宋建武中安昌縣主簿韋文禮進􅍛􅍛雌雄二頭帝曰聞􅍛􅍛能負千鈞何能致之彼土人丁鑾進曰􅍛􅍛見人喜笑則上脣掩其目人以釘釘著額上任其奔馳候死而取之按廣韻作說文作􅀢周成王時州靡國獻􅩀爾雅作狒玉篇音扶沸反李賀詩作􅛝許渾詩又作􅩀巴蛇左思吳都賦屠巴蛇出象骼吳旦生曰楚辭一蛇吞象厥大何如山海經巴蛇吞象三嵗而出其骨君子服之無心腹之疾潯江記羿屠巴蛇於洞庭其骨若陵故曰巴陵則知古人下筆即一屠字亦必有出也宿左思吳都賦思假道於豐隆披重霄而髙狩籠烏兔於日月窮飛走之棲宿吳旦生曰此宿字音秀與狩叶乃是借韻耳搜採異聞録云二十八宿宿音秀若考其義則止當讀如本義釋名云宿宿也言星各止住其所也說苑辨物篇云天之五星運氣於五行所謂宿者日月五星之所宿也避暑録話云二十八宿謂之舍或謂之宿宿者止其所居也論衡云二十八宿為日月舍猶地有郵亭為長吏廨矣晉天文志云四布於方各七為二十八舍據此則宿當音肅按史記律書注亦作秀肅二音隂符天發殺機移星易宿地發殺機龍蛇起陸又古語知星宿衣不覆觀宿與陸覆叶則其音肅明矣三江左思吳都賦觀魚乎三江吳旦生曰韋昭云吳松江錢塘江浦陽江郭璞云岷江浙江松江王安石云一江自義興一江自毘陵一江自吳縣顔師古云北江中江南江蘇東坡云岷山之江為中江嶓冡之江為北江豫章之江為南江曽氏云北江中江皆禹所導南江乃其故道故經不之志吳地記云松江東北行七十里得三江口東北入海為婁江東南入海為東江并松江為三史記正義云三江者在蘇州東南三十里名三江口一江西南上七十里至太湖名曰松江古笠澤江一江東南上七十里白蜆湖名曰上江亦曰東江一江東北下三百餘里入海名曰下江亦曰婁江於其分處號曰三江口盖衆說紛紛要當以此為正緑醽左思吳都賦飛輕軒而酌緑醽吳旦生曰緑醽當作渌酃湘中記云衡陽縣東有酃湖周二十里深八尺湛然緑色土人取以釀酒其味醇美晉武平吳始薦酃酒於太廟荆州記杜佑云衡州衡陽縣漢酃地孟康云酃音零又云渌水出豫章郡康樂縣其間有井官取水為酒與湘東酃湖年常獻之世稱酃渌酒鄒陽酒賦云其品類則沙洛渌酃程鄉若下龍城録云魏徴能治酒有名曰醽渌翠濤常以大金甖内貯盛十年飲不敗其味即世所未有太宗有詩賜公云醽渌勝蘭生翠濤過玉薤公釀此酒得大宛之法司馬遷所謂富人藏萬石蒲萄酒數十嵗不敗者乎洗兵左思魏都賦洗兵海島刷馬江洲吳旦生曰說苑武王伐紂風霽而乗以大雨散宜生諌曰此非妖與王曰非也此天洗兵也六韜武王問太公雨輜車至軫何也對云洗甲兵也魏武兵要云大將將行雨濡衣冠是謂洗兵梁簡文詩洗兵逢驟雨送陣出黄雲杜子美洗兵馬行安得壯士挽天河凈洗甲兵長不用皆本周武語也裴行儉碑云洗兵諾真之水刷馬草心之山直是脫胎左賦矣二嬴左思魏都賦億若大帝之所興作二嬴之所曽聆吳旦生曰虞喜志林秦穆公夢之天帝所奏鈞天廣樂賜以金策祚世之業當時有諺曰天帝醉秦暴金誤隕石墜張衡西京賦昔者大帝恱秦繆公而覲之饗以鈞天廣樂帝有醉焉乃為金策錫用此土而翦諸鶉首自井至栁謂之鶉首之次秦之分野庾信哀江南賦以鶉首而賜秦天何為而此醉李商隠詩自是當時天帝醉不闗秦地有山河此則秦事也趙簡子亦曽夢天帝奏鈞天廣樂而趙與秦同祖故云二嬴餘糧野客叢書曰晉左思賦餘糧棲畆而弗收後晉干寶宋劉裕皆有是語近時塲屋中用南史劉裕所言出處出餘糧棲畆省題詩而不及左思是失所先後矣又考此語非始於思在思之前盖嘗有是言矣觀蔡邕集中胡公碑云餘糧棲於畎畆知左思此語祖邕也吳旦生曰觀子思子云東戸季子之時道上雁行而不拾遺餘糧宿諸畆首則知此語在漢以前有之何止左思魏都賦也歐陽詹頌云賸音盛蔬雲矗音搠以委圃餘糧岳峙而棲畆注言如鳥之棲宿也房子左思魏都賦緜纊房子吳旦生曰曹操夫人與楊彪夫人書送房子官綿百斤古文苑作官錦悞晉陽秋有司奏調房子睢陽綿武帝不許隋圖經云常山髙邑縣房子城出白土細滑膏潤可以塗飾兼用之濯綿可致鮮潔一名赤石岡水經注云房子城西出白土細滑如膏可用濯綿色奪霜雪光彩鮮㓗異於常綿俗以為美談言房子之纊也抑亦蜀之濯錦江矣嵗貢其緜以充御府梁元帝𤣥覽賦飛新梅於倡粉拂輕絮於房綿夥够左思魏都賦繁富夥够非可單究吳旦生曰方言齊宋之郊楚魏之際曰夥音楇陳涉世家云涉故人嘗與庸耕者入宫見宫殿帷帳客曰夥頤涉之為王沈沈者注楚謂多曰夥頤廣雅够多也今人謂多曰够少曰不够是也移音遘與究叶五臣注作平聲讀誤雲䍐潘岳籍田賦雲䍐晻藹吳旦生曰注雲䍐幡也司馬相如上林賦載雲䍐注云䍐罼也前有九流雲罼之車按齊陳梁書儀衛有旄頭雲䍐宋志魏命晉王建天子旌旗置旄頭雲䍐徐廣注雲䍐疑是罼䍐詩序云齊侯田獵罼弋徐爰云天文畢昴之中謂之天街故車駕以罼䍐前引畢方昴員因其象星經昴一名旄頭故使執之者冠皮毛之冠也沈約謂罼網旄頭周禮不載此非古制然則所謂罼網即雲䍐唐李乂詩麗日祥烟承䍐罼輕荑弱草藉衣簮脫臏潘岳西征賦筑聲厲而髙奮狙潛鈆以脫臏吳旦生曰史稱荆軻之客髙漸離變姓名以擊筑事始皇乃置鉛筑中擊之王充論衡云漸離擊筑擊秦王中臏秦王病瘡死此秦史所諱故史記不及載潘賦乃用論衡故實也狙伺候也脫臏言脫去王之膝盖也野蒲潘岳西征賦野蒲變而成脯苑鹿化以為馬吳旦生曰銑注謂趙髙欲為亂恐羣臣不聽乃先設驗以蒲為脯以鹿為馬獻於二世羣臣言蒲言鹿者皆隂誅之困學紀聞云指鹿束蒲髙欲愚其君而不能愚子嬰古今注風俗通皆載蒲鹿二事自史記但載指鹿為馬故今人知指鹿而不復知變蒲也鄭𤣥禮器注云趙髙欲作亂或以青為黒黒為黄民言従之至今語猶存也後漢崔琦對梁冀曰將使𤣥黄改色馬鹿異形乎此語亦世罕知野客叢書云征有二義有征行有征伐文字中有以東征西征為名者不可不審如曹植東征賦崔駰徐幹西征賦班固傅毅北征頌此皆述征伐之征非征行之謂也如袁宏班昭東征賦潘岳西征賦張纉南征賦班彪北征賦此正述征行之征非征伐之謂也彪潘岳秋興賦班鬢彪以承弁兮素髮颯以垂領吳旦生曰五臣注彪髮下垂貌李善注彪作髟音方料切庾信竹杖賦髮種種而愈短眉髟髟而競長說文彪白黒髮雜也此即岳序春秋三十有二始見二毛邪按蔡邕書邕早喪二親年踰三十巳見二毛王獻之攬鏡曰村野之人二毛俱催左思白髮賦雖有二毛河清難俟按周易巽為寡髮釋文云本作宣髮黒白雜為宣考工記車人之事半矩謂之宣注頭髮皓落曰宣孔氏云風落樹之華葉如人之少髮輟耕録云人之年壯而髮斑白者俗曰算髮以為心多思慮所致盖髮乃血之餘心主血血為心役不能上䕃乎髮也本草云蕪菁子壓油塗頭能變蒜髮亦作蒜棗李潘岳閒居賦周文弱枝之棗房陵朱仲之李吳旦生曰李善注周文房陵未詳五臣注房陵縣有李甚美仙人朱仲來竊食之其說皆不經按西京雜記云初修上林苑羣臣逺方各獻名果異樹有弱枝棗拾遺記云穆王東巡大騎之谷西王母與王共玉帳髙㑹進隂岐黒棗北極有岐峰之隂多棗樹百尋枝莖皆空實長二尺核細而柔百年一實夫岐乃周文所居當指此也荆州記云房陵有好李廣志云有房陵李述異志云房陵定山有朱仲李園三十六所李尤果賦三十六園朱李是也山中有縹李大如拳者呼仙李李尤果賦如拳之李陸機果賦中山之縹李又云仙李縹而神李紅傅𤣥李賦房陵縹青沈約咏李詩色潤房陵縹味奪寒水朱按房陵即今湖廣鄖陽府房縣萬夀潘岳閒居賦昆弟斑白兒童稚齒稱萬夀以獻觴咸一懼而一喜吳旦生曰岳言家居之時奉其母以行樂而得稱萬夀者古人懽慶之際上下通稱萬嵗初無避諱不知何時始専為君之祝也馮驩燒債券民稱萬嵗藺相如奉璧入秦左右皆呼萬嵗韓非子巫覡之祝人曰使君千秋萬嵗之聲聒耳陸賈奏新語左右皆稱善呼萬嵗趙臣將兵助馮異軍中皆稱萬嵗馬援曰䝉被大恩紆被青紫吏士皆稱萬嵗耿恭於戰圍中拜井得泉衆皆稱萬嵗馮魴降羣盜赦其罪皆稱萬嵗吳良嵗旦王望請上雅夀掾吏皆稱萬嵗甘寧斬魏將還作鼓吹稱萬嵗急就章有名鄧萬嵗顔注云猶千秋耳浪孟詞林海錯曰潘岳賦㒺浪孟以惆悵若欲絶而復歸注浪孟失志貌又大聲也吳旦生曰字學集要云孟莫更切勉也始也班固幽通賦盍孟晉以迨羣兮辰儵忽其不再注云孟勉也盖勉其進而及時為用則與失志之義反矣集韻引向秀云孟浪無取舍之謂則是浪孟即孟浪意耶然孟浪之孟又音母朗切因記容齋三筆云孟字數義如孟侯孟孫孟春孟夏是最長最先之稱呂后本紀注引國語主孟㗖我索隠云孟者且也蜀王衍幸徐延瓊第於壁上戲書孟字盖蜀中以孟為不住也余將以此條補容齋所未備矣禮緯云嫡長曰伯庶長曰孟方言娋孟姉也郭璞注亦引外傳曰孟啖我是也論衡孟年少年也防露陸機文賦寤防露與桑間又雖悲而不雅吳旦生曰楊升庵謂注引東方朔七諫楚客放而防露作此說謬矣楚客即屈原忠諫放逐何得云不雅余觀文選注云防露桑間皆淫曲又謝莊月賦徘徊房露注云房露古曲也房與防古字通則是二注未嘗謬也防露者即畏行多露之義歴代詩話巻十六
