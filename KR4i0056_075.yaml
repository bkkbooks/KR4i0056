body:
  text: 厯代詩話巻七十五歸安呉景旭撰癸集中之上行邉詩西湖麈談錄曰王世昌越雖尚權譎而文事武備皆有可觀世間惟有征夫苦天下無如邉地寒髪為胡笳吹作雪心因烽火煉成丹其行邉詩也西涯李公謂其姿表奇邁議論英發其於邉徼險易敵情真偽将士强弱勞逸皆在胸臆出奇取捷謀定後發莫測所向顛倒才智自為操縦而人人欣勸樂為之用可謂得其實矣呉旦生曰蓬軒類紀世昌廷試日稿甫就忽旋風起腋下騰公巻於雲霄中廷臣與同試者咸仰視彌乆彌髙至不能見乃已詔許别楮謄進踰年髙麗貢使持其巻上聞後公由中執法大司馬至封威寧伯盖飛騰之兆已見扵廷試之日矣詩話載公一日思退賦詩云歸去來兮歸去来千金難買釣魚臺也知世事只如此試問古人安在哉綠醑有情憐我老黄花無主為誰開平生事業心如火一夜西風化作灰未㡬以事敗編管安陸遂符一夜化灰黄花無主之䜟或以偕汪直出塞致開邉釁士論少之鄭淡泉謂汪直自敬憚威寧威寜不峻拒之亦未為過也可稱知心之論余每誦其次韻馬大理云閒来愛飲三杯酒老去羞談兩石弓則以文臣而三佩将印乃向所羞稱也豈欲開邉釁哉鍾馗寓圃雜記曰嘗嵗除劉原博邀劉廷羙守嵗廷羙挾所蔵鍾馗畫像求題原博為賦終南進士行大書於上曰長空糊雲夜風起不忿成羣跳狂鬼倒提三尺黄河氷血灑蓮花舞秋水飛螢負火明月羞櫟窠影黑啼鵂鶹綠袍烏㡌逞行事磔腦刳腸天亦愁中有巨妖誅未得盍駕飊輪驅霹靂如何袖手便忘機回首東方又生白明旦廷羙持歸懸之中堂京師風俗每正旦主人皆出惟置白紙簿并筆硯於几上賀客至書其名無迎送也劉定之黄廷臣首至見此詩各摘簿一葉錄之以去繼至者皆摘錄之頃間簿已盡矣明旦復置簿亦如之金本清戲謂廷羙曰此鍾馗乃耗紙鬼也呉旦生曰唐人題吴道子畫鍾馗巻首云明皇因痁作夢二鬼一大一小其小者衣絳犢鼻屨一足跣一足懸一屨搢一大筠紙扇遶殿而奔其大者戴㡌衣藍裳袒一臂鞹雙足乃捉其小者刳其目劈而啖之上問大者曰爾何人也奏云臣鍾􅠤氏即武舉不捷之士也誓與陛下除天下之妖孽夢覺痁苦頓瘳詔吴道子如夢寫之咸通中進士周繇以明皇夢鍾繇賦知名續博物志云俗傳鍾馗起於明皇之夢非也北史堯暄本名鍾葵于勁字鍾葵宋宗慤妺名鍾葵非特明皇時但葵馗二字異耳又終葵菜名楊升菴謂考工記大圭首終葵注終葵椎也齊人名椎曰終葵盖言大圭之首如椎爾俗畫神像貼於門首執椎以擊鬼便附㑹説鍾馗能啖鬼陳心叔謂升菴無據若以字音相同則左傳殷人七族有終葵字爾雅釋草篇有終葵中馗二草名豈可曲引為證或云鍾馗當作終䕫謂六書本義終有窮極畢死之義古文䕫一作馗集韻馗䕫逵􅀈通用䕫孔叢于所謂土石之恠䕫罔兩是也窮治邪鬼故稱終䕫耳此亦意撰也若然則作鍾馗亦可鍾有收聚之義何必改鍾為終胡元瑞謂升菴心叔據孫逖張説文集有謝賜鍾馗畫表俱以鍾馗不始開元時然考北史及魏書堯暄傳暄字辟邪本名鍾葵後賜名暄又夢溪筆談載皇祐中金陵發一塜有石誌乃宋宗慤母鄭夫人宗慤有妺名鍾馗則鍾馗之名在六朝前已有之流傳執鬼非一日矣堯暄之本名鍾葵宗氏之妺名鍾馗皆即以鬼神為名故暄名鍾葵而字辟邪者即取鍾馗能驅邪辟耗之意後人既不得鍾馗出處見暄名鍾葵又有辟邪之字反以世傳鍾馗為出於此豈不甚乖舛哉又隋煬初即位嵐州刺史喬鍾馗従漢王諒起兵為大将軍白鵲劉原博題雙喜圖送馬勝宗従昌平侯出鎮宣府云逺隨金印出邉州早報平安入鳳樓剪取白羅飛繡影旗竿十丈掛人頭呉旦生曰湯公譲作此詩未出見原博作乃歎服曰此真題邉将白鵲詩吾詩乃學課語耳遂焚其藁余因記劉欽謨懸笥𤨏探云聞鄒克明作三夸詩其一言蘇秉衡其二言湯公譲其三言劉原博有錢端學問公譲名屢質所為詩公譲始曰可中而厭終則勃然怒曰何絮絮如此端學跼蹐去予戲之曰向有人言公謂杜陵無好句今觀之果然公譲曰吾詩正學杜何嘗云杜無好句若云學杜者無好句則有之耳原博嘗為繭窩詩有今古茫茫白雲老之句有謂雲者聚散無常之物豈得謂老原博曰不聞天有情天亦老乎其人辨不已原博怒曰不讀二萬巻書看溥詩不得予以為白雲老者盖指繭窩如白雲常在則謂之老亦無害况晉人題李老谷固有駱駝夜吼青雲老之句乎予在京嘗與公譲同過原博公譲擕八詩就評原博以手掩之問曰此何詩也公譲曰北京八景詩原博曰比在當時胡文穆公楊文敏公曾状元王侍講詩皆未易及公所作能勝之則出不然不如已也公譲曰第讀之原博為讀一首即還曰不如多矣又言昨與楊帥作白鵲詩殊不佳我亦嘗作乃真邉将白鵲詩如公之作直學課詩耳原博詩曰早随金印出邉州晩送懽聲入御樓剪取白羅飛繡幙旗竿十丈挂人頭公譲大稱服此頗近夸而夸者亦復自屈於夸者亦遇其敵而然也豪放懸笥瑣探曰予在史館日請良醖一斗然飲少多有蔵者湯公譲索之詩曰兼旬無酒飲詩腹半焦枯聞有黄封在何勞市上沽嘗至其第見其㕔事春聨曰東坡居士休題杖南郭先生且濫竽其東偏曰暫拄西山笏閒開北海尊其西偏曰長身惟食粟老眼漸生花豪俠之氣可見呉旦生曰公譲東甌㐮武王之曽孫也有文武才成化初守禦延綏孤山堡戰歿月餘口外某驛忽一兵官至騶従甚盛坐中堂索筆硯燈燭閉戸而寝明發開户寂然無人但見壁間有詩云手持長劔斬渠魁一箭那知中兩腮塞馬踐來頭似粉烏鴉啄處骨如柴交㳺有義空揮淚弟姪無情不舉哀血汚逰魂歸不得當年空築望鄉臺人始知為湯公也盖其歌詩豪放性志使然彼髯之自期待當何等若以六體香奩不减義山則又文弱士目之矣繡鞋寓圃雜記曰沈愚字通理乃宣徳間金陵十才子中一人也有續香奩四巻倣韓致堯之作繡鞋一首云㡬日深閨繡得成著來便覺可人情一彎暖玉凌波小兩瓣秋蓮落地輕南陌踏青春有跡西廂立月夜無聲看花又濕蒼苔露晒向忩前趂晩晴呉旦生曰通理博覽羣籍不樂仕進以業醫終其身或勸之仕曰吾非籠絡中物也詩餘樂府尤為人所傳一云蘇秉衡少時作繡鞋詩人呼為蘇繡鞋觀通理次義山無題五首則知繡鞋是通理擅塲按吴下劉原博溥中都湯公譲𦙍績崑山沈通理愚海昌蘇秉衡平蘇秉貞正西蜀晏振之鐸四明王栢原淮吴下鄒克明亮淮南蒋主忠忠戚里王善甫貞慶時稱景泰十才子或云洞庭徐徳重霆亦在十子之列懐古詩話類編曰姑蘇懐古詩多用宋以前事鮮有能用近時事且言詳盡而意微婉者惟丘仲深詩云西風黄菜葉乾時城郭人民半是非九四不成龍或躍萬三無復燕于飛玉虹百尺形空壮金虎千年氣已微何事章縫袂相接等閒廟筭出神機按張士誠據吴時用黄蔡葉三叅軍呉人謡曰黄菜葉用齒頰一夜西風来乾壓九四士誠乳名萬三呉中富人姓沈氏名富字仲榮行三人以萬三秀呼之九四萬三人名數目對偶甚切玉虹金虎皆呉中故事末句盖謂榮國公姚廣孝也㓜嘗為僧名道衍呉旦生曰西樵野記云偽周嘗用黄敬夫蔡彦文葉徳新三叅軍皆迂濶書生不識大計洪武丁未下江南三人伏誅其屍風乾於旗竿之首初呉中童謡曰丞相做事業専用黄菜葉一夜西風来乾别於是始驗翦勝野聞又載謡云張王做事業只慿黄菜葉一朝西風起乾鱉文徴仲弔偽周故址詩欲談天祐誰堪問自唱西風菜葉歌續停驂錄云張士誠泰州白駒塲人兄弟三人士徳士貴以行稱九四九五九六楊君謙蘇談云元時富人陸道原貨甲天下為甫里書院山長一時名流咸與之㳺處暮年對其治財者二人以貲厯付之曰吾産皆與汝惜為汝禍耳道原遂為黄冠師居陳湖之上開瑞雲觀居之改名宗静又納貲為道判時稱陸道判其故宅今為竹堂寺所謂二者其一即沈萬三秀也其一姓葛亦富傳信錄云萬三甚富今㑹同館是其故宅後湖中地是其花園京城自洪武門至水西門是其所築也蘇談又云萬三家在周荘破屋猶存亦不甚宏壮殆中人家制耳惟大松猶存焉被沒者非萬三家蓋萬四之在黄墩者耳留青日札云萬三名富字仲榮弟萬四名貴字仲華本湖州南潯人父沈祐始徙蘇之長洲東蔡村貴之子漢傑又徙於化周荘漢傑之子玠為戸部倉曹員外郎富之子達卿據此則周荘屋當是萬四之裔非屬萬三矣餘冬序錄云萬三有聚寳盆貯少物經宿輒滿詔取入試不騐還其家後籍沒復歸禁中長安客話云工部有銅籄四一在節慎庫髙可過人是萬三沒入之物光祿寺有鐵力木酒榨每榨用米二十石得汁百甕亦其沒入者白髪春風詩話類編曰丘仲深嘗作因事有感詩其序曰唐人有詩云公道世間惟白髪又曰惟有東風不世情又曰花開蝶滿枝花謝蝶還稀惟有舊巢燕主人貧亦歸是皆憫世悼俗之言味其詞可以知其時矣由今日以觀尤有甚於此者故反其詞為一絶云白髪年來也不公春風亦與世情同於今燕子如蝴蝶不入尋常矮屋中誦之者足以見世態炎凉之變呉旦生曰漁隠樷話杜牧詩公道世間惟白髪貴人頭上不曾饒羅鄴詩年年檢㸃人間事惟有東風不世情此窮人不偶遣興之作也今仲深反其詞為之感慨良深然詩家又病其太露如錢起歸故山詩谷口春殘黄鳥稀辛夷花盡杏花飛始憐幽竹山忩下不改清隂待我歸何等藴藉王直方詩話云元祐初多用老成故東坡詩此生自斷天休問白髪年來漸不公陳無已詩今代貴人頭白髪掛冠髙處不宜彈秦少㳺復有白髪偏於我輩公之句則是白髪亦有随時之義下第風雅鼓吹曰吴中奚昌元啟與粤東丘仲深冣厚嘗出其下第詩有沙鶻欺人故傍船之句仲深哂之因覔舊稿得三律云一笑出都門薫風正晏温逍遥閒嵗月俯仰舊乾坤戀闕心徒切談天石謾存滿懐今古事誰可細評論其二曰萬里一逰人自憐還自嗔無錢堪使鬼下筆或通神孰識琴中趣空懐席上珍欲慿詹尹卜如我豈長貧其三云壮志冷於灰歸心疾似飛白雲長在望清淚欲沾衣五月收新植三春采嫩薇故鄉雖遥逺生計未為㣲盖先生正統甲子發解此戊辰辛未下第所作也辭意和平而無迫切之態元啟大愧服吴旦生曰自洪武三年庚戌命天下鄉試四年辛亥㑹試至十七年甲子復命各省鄉試定三嵗一舉行焉刻程文自二十年丁夘始試錄定式自二十三年庚午始京畿與布政司鄉試在子午夘酉年秋八月禮部㑹試在辰戌丑未年春二月盖定規也洪武癸未太宗渡江天順癸未貢院火皆以其年八月㑹試明年三月殿試於是二次有甲申貢院火時舉人死者九十餘人奚元啟作詩云回祿如何也忌才春風散作禮闈災碧桃難向天邉種丹桂翻従火裏開豪氣滿塲争吐燄壮心一夜盡成灰曲江勝事今何在白骨稜稜漫作堆則元啟一輕儇好事人也然其辭亦足悲夫識小編云舊制殿試在三月朔日成化八年以悼恭太子發引改於十五日至今因之蒹葭堂襍抄云陸楠上南宫不售歸過揚州司闗欲税其舟楠投一詩云獻䇿金門苦未收歸心日夜水東流扁舟載得愁千斛幸有君王不税愁其官見詩迎而禮之烏鬚詩話類編曰陸叅政文量寓京時客有授烏鬚方者口占一詩答之云染将粉白媚嬌紅祗畏癡心笑老翁五色今生當順受二毛何况世人同聞者以為明達呉旦生曰成化間賈番進獅子奏乞大臣徃迎文量時為兵部郎諫止之家蔵萬巻手自讎校所著菽園雜記式齋集其子安甫撰式齋蔵書目錄桑民懌祝希哲徐昌穀為之序觀其寄鼎儀云歸来無計買青山身在従渠兩鬢斑又詶若庸云聞君近日縁詩瘦華髪星星革帶鬆其意與答烏鬚同然劉禹錫有云近来後輩輕前輩好染髭鬚作後生豈唐時已有此方耶觀何長瑜嘲臨川僚佐云陸展染白髪欲以媚側室青青不解乆星星行復出則又在晉宋時矣按烏鬚聲價一騰於熱宦再騰於宿儒詩話載嘉靖間吴小江督學楚中所㧞入庠者多垂髫士士之已冠者計窘乃去頭上巾亦為垂髫應試吴公見其額上綱痕口占嘲之曰昔日峩冠已偉然今朝丱角且従權時人不識予心苦将謂偷閒學少年一時傳誦無不絶倒厯代詩話巻七十五
