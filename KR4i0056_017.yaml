body:
  text: 歷代詩話卷十七歸安吳景旭撰丙集中之中賦鷦螟大鵬張華鷦鷯賦鷦螟巢於蚊睫大鵬彌乎天隅吳旦生曰列子江浦之間生麼蟲其名曰焦螟羣飛而集於蚊睫弗相觸也棲宿去來蚊弗覺也離朱子羽方晝拭眥揚眉而望之弗見其形䚦俞師曠方夜垂耳俯首而聽之弗聞其聲惟黃帝與容成子居崆洞之上同齋三月心死形廢徐以神視塊然見之若嵩山之阿徐以氣聽砰然聞之若雷霆之聲觀此則知詩所謂噦噦其冥賦所謂蟭螟飛而風生蚇蠖􅏒而成響也按宋玉曰鳥有鳳而魚有鵾莊子北冥有魚其名為鯤化而為鳥其名為鵬崔撰云鵬音鳳又按説文云古文鳳象形鳳飛羣鳥從以萬數故以為朋黨字宋莒公云朋字象鳳羽之形非兩月也余觀古字朋作鳳作朋及鵬皆古文鳳字張舜民不知此義漫謂白氏六帖録禽遺大鵬蓋白既録鳳不復録鵬爾西楊升庵曰嵇康琴賦春蘭被其東沙棠植其西音先叶涓子宅其陽玉醴涌其前趙一窮鳥賦幸賴大賢我矜我憐昔濟我東今振我西魏明帝涼風夕起悲彼秋蟬變形易色隨風東西曹子建飛蓬篇驚飈接我出故歸彼中田當南而更北謂東而反西又尚書大傳西方者遷方也萬物遷落也前漢志少隂者遷方漢樂府象載瑜白集西食甘露飲榮泉文選注西施作先施史記先俞山即西隃也吳旦生曰賦中此四其字指椅梧而言也椅梧桐也下又云玄雲蔭其上翔鸞集其巔清露潤其膚惠風流其間凡八其字皆指桐蓋經營其左右者皆神麗之物則桐之為琴材必善矣按西字與前巔間叶則西音先蓋古音也升庵箋釋此等處固自不可泯滅禮記日出於東月出於西隂陽長短終始相巡以致天下之和西音先巡音沿和音桓孫枝嵇康琴賦云乃斫孫枝準量所任至人攄思制為雅琴吳旦生曰銑注孫枝側生枝也按周禮注云孫枝之根末生者也蓋桐孫亦然風俗通云梧桐生於嶧山之陽巖石之上採東南孫枝為琴聲極清麗庾信咏樹詩楓子留為式桐孫待作琴陸龜蒙詩桂父舊歌飛絳雪桐孫新韻倚玄雲東坡云凡朩本實而末虛惟桐反之試取其小枝削之皆堅實如蠟而其本皆虛世所以貴孫枝者貴其實也然則李長吉聽琴歌云嶧陽老桐非桐孫此非知琴者矣水物郭璞江賦玉珧海月土肉石華吳旦生曰海物異記云江瑤柱厥甲美如瑤玉玉音裕三字一句三句一韻肉柱膚寸名江瑤柱侯鯖録引此語謂瑤當作珧世人不用此珧字是未知耳今按此珧字乃自江賦中來也張樞言云四明海物江瑤柱第一王荆公曰瑤字當作珧如蛤蜊之類即韓文公所謂馬甲柱也蘇東坡謂魯直詩文如蝤蛑江珧柱又言荔枝可比江珧柱皆作此珧字陸放翁云明州有二種大者江瑤小者沙瑤然沙瑤可種逾年則成江瑤矣王弇州云奉化四月間南風乍起江瑤每一再上可得三四百枚或連嵗不上如蚌而稍大中肉腥而䏰不中口僅四肉牙佳耳長可寸許圓半之白如珂雪以嫩雞汁熱過之一沸即起稍久則味盡矣甘鮮脆美不可名狀此所謂柱也謝康樂詩揚帆采石華挂席拾海月議者以二句終是合盤而不知其用賦語也異魚圖贊云海物正圓名曰海月指如搔頭有緣無骨臨海志云海月大如鏡白色石華附石生肉可啖土肉一作土納非是臨海志云純黑如小兒臂大長五寸重五六斤有腹無口目有三寸足大如叉脯堪炙食按此即江鄰幾所稱廬州河次得一小兒手無指懼而埋之後以問人人曰白澤圖所謂封食之多力者也石􅎕郭璞江賦石􅎕應節而揚葩吳旦生曰荀子東海有紫紶魚鹽紫紶即石􅎕也江淹石􅎕賦又名紫􅡖或作虈非謝朓詩紫􅡖煜春流此蚌蛤類也形如龜腳得春雨則生花故云應節揚葩王維送元中丞江淮轉運詩去問官珠俗來經石􅎕春錢起集亦載此詩改石􅎕作右却誤一角九頭三足六眸郭璞江賦若乃龍鯉一角奇鶬九頭有鱉三足有龜六眸吳旦生曰山海經龍鯉陵居其狀如鯉異魚圖贊云龍魚一角似鯉居陵候時而出神聖攸乘飛騖九域騎龍上升嘉靖中屠隆溟海波恬賦龍鯉一角而馴擾天吳九首而婆娑海録碎事云鶬音倉九頭鳥也白澤圖謂之蒼鸆帝鵠書謂之逆鶬韓詩外傳云孔子見之曰鶬也嘗聞河上人歌云鶬兮鴰兮逆毛衰兮一身九尾長兮則不言九頭而言九尾何也嶺表異録云梟名鵂鶹夜飛晝伏又名夜遊女又名鬼車又名魚鳥其頭有九為犬所噬一首常下血滴人家則凶故聞其聲則擊犬使吠以厭之荆楚嵗時記云姑獲夜鳴聞則捩狗陸長源辨疑志云名渠逸鳥每脰各生兩翅當飛時十八翼霍霍競進不相為用至有爭拗折傷者山海經陽狂水西南流注於伊水中有三足鱉爾雅鱉三足曰能張衡東京賦能鱉三趾按左傳堯殛鯀於羽山其神化為黃熊以入羽淵國語作黃能屈氏天問注云獸非入水之物故是鱉也東海人祭禹廟不用熊白及鱉為膳豈鯀化為二物乎束晢發蒙記鱉三足熊史記正義鯀之羽山化為黃熊熊乃來切下三點為三足也楊升庵云熊即左傳黃能入寢之能字不知何據有三點之説余考能有六音蓋十灰韻中有能字解云鱉三足也音囊來切其下不必有點也黃能音奴登切説文熊屬足似鹿能獸堅中故稱賢能而強壯稱能傑也則其下亦不必點也若熊羆之熊在一東韻據紹興中永嘉有熊至城下倅謂熊於字為能火宜慎火燭則下乃火字當從四點非三點矣易曰離為鱉其亦昭象於火耶爾雅注云君山上有池池中有六眼龜詞林海錯云嶺南欽州出六眼龜潛確類書云潮州府程鄉縣城西南有六目龜池按南宋明帝泰始間六眼龜見於東陽太守劉協得之以獻唐睿宗先天間江州獻靈龜六眼足下有玄文宋太宗時萬州獻六眸龜東坡謔呂微仲久睡云唐莊宗同光中林邑國進六眼龜庾闡揚都賦其中則有靈蛟白黿之族種繁六眸類豐三足劉禹錫楚望賦雖三趾與六眸時或加乎一目洞庭郭璞江賦爰有包山洞庭巴陵地道潛達旁通幽岫窈窕吳旦生曰注言洞庭地穴也在長沙巴陵今吳縣南太湖中有包山下有洞庭穴潛行水底無所不通號為地脈又觀博物志云君山有道與吳包山潛通上有美酒數斗得飲者不死周洪道云洞庭山在吳而洞庭湖乃在荆襄之間地形雖分而未嘗斷也蘇東坡亦嘗有此説張説洞庭詩地穴穿東武江流下西蜀然余謂地脈之潛通有如此而兩洞庭自是異地也蓋在吳者道書所謂林屋洞天是也在楚者山海經注所謂江湘沅三水共會於巴陵之洞庭故稱三湘是也雲麓漫抄云洞庭有山水之分吳中太湖內乃洞庭山楚之洞庭乃大湖連亘數州洞庭名同其判如此麈史云松江有洞庭山韋蘇州皮陸唱和所言洞庭及蘇子美詩云笠澤鱸肥人膾玉洞庭橘熟客分金皆在吳矣今嶽州之南所謂洞庭者即水經注云洞庭之陂乃湘水非江水蓋斥此湖耳比見嶽州集古今題咏刻石龕於嶽陽樓如韋蘇皮陸之屬皆在焉乃知地志不可不考也梢雲郭璞江賦梢雲冠其㟽吳旦生曰孫氏瑞應圖云梢雲瑞雲也人君德至則出若樹朩梢梢然也宋史祥符元年封泰山十月壬辰天文院言紫雲如蓋黃雲如龍鳳青雲如竹朩名梢雲左思吳都賦梢雲無以踰注引漢書天文志曰梢雲見梢如樹也栫郭璞江賦栫澱為涔夾潨羅筌吳旦生曰皆取魚之具説文栫以柴朩壅也徂悶切蜀中有魚栫之名詩經潛有多魚潛音涔小爾雅魚之所息謂之潛潛槮也水中魚舍也爾雅槮謂之涔李巡云今以朩投水中養魚曰涔孫炎云積柴養魚曰槮則栫即涔也潛槮皆是物也奇相郭璞江賦奇相得道而宅神吳旦生曰廣雅江神謂之奇相江記云帝女也卒為江神蜀檮杌云古史震蒙氏之女竊黃帝玄珠泛江而死化為此神即今江瀆廟是也山海經云江瀆神生於汶川㶀㵧朩華海賦㶀㵧浩汗吳旦生曰注㶀㵧廣大貌揚雄羽獵賦虓虎之陳從橫膠轕司馬相如上林賦張樂乎膠葛之宇按㶀㵧膠轕膠葛其義同而若作樛嶱則誤矣杜子美自京赴奉化縣詠懷詩君臣留歡娛樂動殷樛嶱王荆公改刋為膠葛字亦意其用上林賦中語乎八朝偶雋云晉木玄虛孫興公齊張思光並作海賦吸波則洪連踧踖吹潦則百川倒流此玄虛之雄也舉翰則宇宙生風抗鱗則四瀆起濤此興公之雄也湍轉則日月似驚浪動則星河如覆此思光之雄也三賦措語無大懸絶融後以其賦示徐凱之凱之曰卿此賦實超玄虛但恨不道鹽耳思光即求筆增曰漉沙搆白熬波出素積雪中春飛霜暑路隂火朩華海賦隂火潛然吳旦生曰易澤中有火素問云澤中有陽焰注陽焰如火煙騰騰而起於水面蓋澤有陽焰乃山氣通澤山有隂靄乃澤氣通山也拾遺記云西海之西有浮玉山山下有穴穴中有水其色如火雖波濤灌蕩其光不滅是謂隂火顧况詩隂火暝潛燒戴叔倫詩古戍隂傳火蘇東坡遊金山詩是時江月初生魄二更月落天深黑江心自有炬火明飛焰照山栖鳥驚悵然歸卧心莫識非鬼非仙竟何物注引物類相感志云山林藪澤晦明之夜則野火生焉散布如人秉燭其色青異乎人火車渠朩華海賦云車渠瑪瑙金積如山吳旦生曰南海有車渠蛤屬也大者如箕背有渠壟如蚶殼故以為器緻如白玉尚書大傳曰文王囚羑里散宜生輩之江淮之浦取大貝如車渠陳於紂庭鄭康成解之為渠車罔也程大昌引此謂不知車渠何物車者車也渠者轍迹也孟子城門之軌是也則二公不識海物耳余觀郭璞江賦紫蚢如渠乃謂大貝如車渠正此物也鮑昭白紵歌象床瑤席鎮犀渠徐陵詩雕鞍名鏤渠蕭統將進酒云宜城溢渠碗中山浮羽巵皆言車渠也一作硨磲疏寮潘尼桑樹賦倚層城之飛觀拂綺窗之疏寮吳旦生曰寮小窗也古詩交疏結綺窗劉履補注云即漢書所謂綺疏蓋今之亮格窗刻鏤疏通而於交綴之處以丹青飾為綺文也蒼頡云寮小室也説文云寮穿也天中記云僧寺茗所曰茶寮寮亦作僚同官為僚則同僚即同窗之義兩壻相謂曰僚壻釋名又曰友壻言相親友也則亦朋僚之義琪樹孫綽遊天台山賦琪樹璀璨而垂珠吳旦生曰山海經崑崙之墟北有珠樹文玉樹玗琪樹故詞人往往以此入咏蕭防詩琪樹風清鸞去遲武伯奮詩琪樹年年玉蘂新蔡隱丘咏琪樹云山上天將近人間路漸遙誰當雲裏見知欲度仙橋則皆以為仙樹非人世所有然觀梅摰詩影借金田潤香隨璧月流逺疑元帝植近想志公遊乃寶林寺法堂前有琪樹而摯咏之則是世亦有此樹矣勸農束晳勸農賦惟百里之冥吏各區别而異曹考治民之賤職美莫當乎勸農吳旦生曰楊升庵謂農音峱與曹叶韻余按韓詩內傳東西耕曰從南北耕曰由管子堯使后稷為大由錢譜神農幣文農作由蓋説文無由字由與農古通用也因考揚雄著畔牢愁愁音曹憂也與楚辭同則知勸農字或古作勸由而愁轉為曹亦可由轉為峱耳㲉束晳近遊賦貫雞㲉於嵗首吳旦生曰㲉音確卵孚也又毈音段説文卵不孚也廣韻注卵壞也揚子云雌之不才其卵毈矣南北朝栁楷謂蕭寶寅云謠言鸞生十子九子毈一子不毈關中亂亂治也大王當治關中何所疑寶寅鸞之子遂舉兵韓退之詩鵠㲉攢瓌橙牢丸束晳餅賦其可以通冬達夏終嵗常施四時從用無所不宜惟牢丸乎吳旦生曰注曼頭之類藝文類聚謂餅賦有牢丸之目蓋食具名也余觀盧諶祭法云春祠用曼頭餳餅牢丸夏秋冬亦如之則牢丸洵四時皆宜矣酉陽雜俎引伊尹書有籠上牢丸湯中牢丸則是牢丸類曼頭又類湯餅耶東坡詩以牢九具對真一酒誤以丸字作九字陸放翁詩蟹供牢九美亦誤賦中又云春則曼頭宜設夏則莫若薄夜秋則起溲可施冬則湯餅為最余按荀氏四時列饌傳云春祠有曼頭餅夏祠以薄夜代曼頭徐暢祭記云五月麥熟薦新起潄白餅世説云何平叔噉熱湯餅汗出自拭色轉皎潔據此則晉時自有此食具也日及成公綏日及賦譬日及之在條恆雖盡而弗悟吳旦生曰説文舜朩槿也朝華暮落一名蕣華蓋取一瞬之義一名日及見廣記一名赤槿見羅浮記一名玉蒸見顔延之頌江總南越朩槿賦日及多名㽔賓筆生東方記乎夕死郭璞贊以朝榮潘文體其夏盛嵇賦憫其秋零潘尼朝菌賦序朝菌者蓋朝華而暮落世謂之朩槿或謂之日及劉禹錫傷往賦飄零日及之萼倐忽蜉蝣之衣施肩吾詩但看日及花唯是朝可憐爾雅椵木槿櫬朩槿注云别二名也華朝生夕隕或呼曰芨唐著作局有雙槿樹盧照鄰作賦一時競寫因名著作為雙槿署歷代詩話卷十七
