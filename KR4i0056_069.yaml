body:
  text: 歴代詩話巻六十九歸安吳景旭撰壬後集中之下元詩三瓦輟耕録曰陳衆仲嘗題樂全堂有能守不成三瓦戒之句人多不知所出按史記龜筴傳云天尚不全故世為屋不成三瓦而陳之注陳猶居也吳旦生曰東園客談云予家有堂名樂全虞奎章為予記之翰林陳衆仲有能守不成三瓦戒樂全長得保天鈞之句衆未解三瓦詢之云出史記龜筴傳褚先生曰天尚不全故世為屋不成三瓦而陳之徐廣注一云為屋成欠三瓦而棟之余按陳訓居南村引之似無義後觀東園乃其家所自記則陳字徐注作棟其義益顯故喜而詳録之成化中吳克温次吳匏菴板屋韻云何必大厦成而後虚三瓦躑躅達白野春日次韻云躑躅花深啼杜宇鸕鷀灘暖聚王餘吳旦生曰韓退之詩躑躅閒開艶艶花王荆公詩亦見舊時紅躑躅陸放翁詩宻葉深深躑躅紅蓋杜䳌花又名紅躑躅王建宫詞云勅賜一窠紅躑躅謝恩未了報花開蓋為宫禁所重如此花小而紅此為川䳌故可貴洪景盧謂是今映山紅恐未必然今江南山谷中紅紫二色花大單瓣鄉人但稱映山紅采作樵蘓奚足貴也古今注云羊躑躅花黄羊食之則死羊見之則躑躅分散故名羊躑躅花史云羊嚙草朩其處不生獨悮食此花則躑躅以死朩犀貢仲章秋日即事詩官冷乆無金馬夢院深惟有朩犀香吳旦生曰按桂曰朩犀以朩紋理如犀也字從犀牛之犀俗作樨字非是張思亷詩朩樨花開秋可憐則失攷矣江東曰巖桂楊升菴云尸子春華秋英曰桂王維詩人間桂花落夜静春山空秋花者乃朩犀巖桂耳湖南曰九里香宋王以寧道中聞九里香花詩云何許緑裙紅帔客御風來獻返魂香三伏八分貢性之詩葛巾白苧消三伏繭紙烏絲窵八分吳旦生曰性之辭氣渾成如桃花流水春三月楊柳東風雨一蓑飛瀑曉翻千嶂雪驚濤秋湧萬松聲風作鳴潮吹雨散山如走馬渡江來皆爽朗可誦厯忌釋云伏者何金氣伏藏之日也四時代謝皆以相生立春朩代水水生朩立夏火代朩朩生火立冬水代金金生水至於立秋以金代火金畏於火故至庚日必伏庚者金也通書云夏至後第三庚為初伏第四庚為中伏立秋後第一庚為末伏故曰三伏十體書斷云八分者秦羽人上谷王次仲所作也字文簡略可赴急用惟蔡伯喈乃造其極蔡文姬云臣父言割𨽻字八分取二分割李篆字二分取八分故名八分書法苑云本楷字漸若八字分散故名八分學古編云八分者漢𨽻之未有挑法者也比秦𨽻則易識比漢𨽻則微似篆若用篆筆作漢𨽻字即得之矣學古編云一曰科斗書科斗書者蒼頡觀三才之文及意度為之乃字之祖即今之偏旁是也畫文像蝦蟆子形如水蟲故曰科斗二曰籀文籀文者史籀取蒼頡形意配合為之損益古文或同或異加之銛利鈎殺大篆是也史籀所作故曰篆文三曰小篆小篆者李斯省籀文之法同天下書者比籀文體十存其八故小篆為之八分小篆也既有小篆故謂籀文為大篆文云四曰秦𨽻秦𨽻者程邈以文牘繁多難於用篆因减小篆為便用之法便於佐𨽻故曰𨽻書五曰八分詳上六曰漢𨽻漢𨽻者蔡邕石經及漢人諸碑上字是也此體最為後出皆有挑法與秦𨽻同名其實異七曰欵識欵識文者諸侯本國之文也古者諸侯書不同文故形體各異秦有小篆始一其法近世學者取欵識字為用一紙之上齊楚不分人亦莫曉其謬今分作外法故末置之十體書斷云章草者漢黄門令史游所作也存𨽻之梗概損𨽻之規矩速赴急就謂之草書行書者後漢潁川劉徳昇所造也即正書之小偽務從簡易相間流行謂之行書飛白者後漢左中郎將蔡邕所作也邕待詔門下見役人以堊帚成字心恱而為飛白之書創法於八分窮微於小篆草書者後漢徵士張伯英所造也昉於章草變以成今世稱一筆書吳趨成原常秋夜雜咏云世事有今日生年猶故吾抽書逢越絶引曲感吳趨吳旦生曰趨字不當作平聲叶樂府有吳趨行五臣於題下注云趨步也余按樂府原題云齊謳者齊人之歌吳趨者吳人之舞欲為齊謳者必本齊音欲為吳趨者必本吳調樂府觧題云吳人以歌其地則五臣注步字甚無謂楊升菴云詩巧趨蹌兮史記士争趨燕莊子有不任其聲而趨舉其詩焉崔注云不任其聲􅉵也趨舉其詩無音曲也劉㑹孟云趨者情愜而詞迫也與吳趨之趨當音七注切則趨字非平聲明矣戴叔能詩祇訝當年嘗越膽那堪此日聽吳趨元人類多悞叶原常五律若寄慈谿詩曉塔天童寺春㠶日本船逰虎丘詩短簿荒祠酒生公舊塔燈宿聖夀寺詩鳥驚棲後樹僧掩讀殘經七律若夜思詩青燈細雨三更夢白首殘編萬古心追念故友詩世間我豈長貧者地下君為不死人環碧齋詩月涵虚白浮秋去水泛空青入座來宿寒橋詩乾坤萬事雙蓬鬢風雨孤舟半夜潮杰然蒼秀方駕李唐危太樸嘗以杜工部柳刺史期之假對麓堂詩話曰元詩山中烏喙方嘗膽臺上蛾眉正捧心人憐狗監知司馬我喜龍門識李膺生藏魚腹不見水死挽龍髯直上天皆得李義山遺意吳旦生曰司馬李膺一聨乃成原常詩此雖屬兩人名而膺借作鷹又假對也漫叟詩話所載荆公黃耉日對白雞年之類又原常逰上方寺詩老去任添新白髪平生能著幾青鞋以鞋换屐頗自然不為遷就蕨拳丁仲容寄謝子朩詩湖海客身皆暮齒家山兒蕨等春拳吳旦生曰李太白詩不知行徑下初拳幾枝蕨黃山谷詩竹筍纔生黃犢角蕨芽初長小兒拳王直方詩話曰張閣見山谷蕨芽之句曰此忍人也時閣斷葷而有此語崇禎中沈景倩詩剥苔千石髪剖蕨一拳牙按格物論蕨生山間根如紫草莖青紫色末如小兒拳亦如大雀拳足又如其足之蹷也故謂之蕨周秦曰蕨齊魯曰􅣀初生時似鼈脚故名客星周衡之題子陵釣圖落句云人間萬古仰孤風天上有星猶是客吳旦生曰古今詞人多悞用客星事如楊升菴以博洽稱亦有詩云半天髙柳驛門青我是客星非使星而不知其非吉星也按太公隂謀云六庚為白獸在上為客星在下為害氣桑民懌客星亭記云客星有曰周伯曰老子曰王蓬絮曰國皇曰温星凡有所犯無不菑凶後漢天文志客星居周野光武崩應之於此不書似因子陵而諱占也且犯帝之變劉聰遂亡光武無應者豈目前下賢一事亦可弭其菑患與秘笈云周伯大而色黃煌煌然見其國兵起若有喪天下饑衆庶流亡去其鄉老子明大色白淳淳然所出之國為饑為凶為善為惡為喜為怒出見則兵火起人主有憂王蓬絮状如粉絮拂拂然見則其國兵起若有喪白衣之㑹其邦饑亡國皇星出而大其色黃白望之有芒角見則兵起國多變若有水饑人主惡之衆庶多疾温星色白而大状如風動揺常出四隅出東南天下有兵將軍出於野出東北當有千里暴兵出西北亦如之出西南其國兵喪並起大水人饑宋天文志云客星有三一曰老子二曰國星三曰温星老子稱李耳古之有德行而不仕老而有夀之人國星者國皇也不知何國人温星者温其姓古之有操行而不仕者也三人者其精皆為星命之為客星通志云瑞星十二中有周伯王蓬芮皆古者髙世不仕之人其精為星帝命之為瑞星然考之晉志瑞星止四星其周伯又於客星見之無王蓬芮而客星則有王蓬絮芮所至之國非福也而所言妖星則别有蓬星焉曰蓬芮曰蓬絮芮曰蓬星其言禍福不同豈各有據乎廣異記云漢武帝微行造主人家有婢國色仍留宿與主婢卧有一書生亦寄宿善天文忽見客星掩帝座甚急書生驚呼咄咄不覺聲髙又見一男子操刀入户聞書生聲急遂縮走客星應時而退如此者數過帝乃悟曰必此人壻也遂召羽林擒奴誅之據此則武帝在光武前其占驗已如此余故歴引客星故實而斷之為非吉星也虎丘張仲舉逰虎丘寺詩虎來古塜金精白龍卧秋池劍影寒吳旦生曰虎丘舊名海湧山吳越春秋言闔閭葬於國西北名虎丘扁諸之劍魚腸三千在焉葬之已三日金精上揚為白虎踞墳故曰虎丘杜子美蕃劍詩虎氣必騰上龍身寧乆藏蓋用此事與龍躍延津事耳今仲舉正用虎以為上句借用龍以為下句恰合劍池故佳太平清話云顔真卿虎丘詩劍池穿萬仞盤石坐千人故名千人坐劉致姑蘇臺詩江閱水犀歐冶劍氣騰金虎闔閭墳嘉靖中梁有譽姑蘇懐古詩金虎跡荒靈氣滅水犀軍散霸圖空似相本而較勝朩上座何太虚夜立詩結句云只有殷勤朩上座共聽枯葉響蕭騷吳旦生曰江西饒德操後為僧名如璧嘗作詩勸吕東萊學道云向來相許濟時功大似􅀈伽餉逺空我已定交朩上座君猶求舊管城公文章不療百年老世事能排雙頰紅好貸夜忩三十刻胡床趺坐究幡風今觀太虚此詩頷聨云萬里明河流恨去三更獨雁倚風髙亦是得道語也張來儀逰虎丘詩相携朩上座來禮石觀音梧竹存齋詩話曰丁鶴年題鳳浦方氏梧竹軒詩鳴鳥曽聞此地過至今梧竹滿丘阿政懐剪葉書周史却恨翻枝入楚歌金井月明秋影薄石壇風細晚凉多中郎去後知音少共負竒才奈老何時作者已滿巻此詩一出皆為歛袵吳旦生曰中二聨分貼梧竹極其穏細蓋鶴年以西裔致稱髙士其詩以淹雅為宗如兵後還武昌云歸期實悮王孫草逺信虚憑驛使梅又樊口隠居云春深門巷先生柳雪後園林處士梅皆極使事之良圭齋堯山堂外紀曰歐陽原功官國子監丁卯八月崇天門傳臚賜進士右榜第一人阿恰齊左榜第一人李黼皆原功西㕔授業生也是日京尹備鼓樂旌旗麾蓋甚都導二狀元入學謝師拜原功明倫堂榜眼劉思誠探花郎徐容嘗從原功逰亦拜其側其餘進士拜者雜㳫不能記原功成絶句以紀盛事云昔被仁皇雨露恩三朝五度䇿臨軒小臣報國無他技館下新添兩狀元禁苑層層桃李開天街繡轂轉晴雷銀袍飛蓋人爭看兩兩龍頭入學來淡墨題名二十年一官獨自擁寒氊居然國子先生館三五魁躔拜座前吳旦生曰原功號圭齋所著詩有圭齋集其造就後進一時推為領袖故有詩云謁客及門容履滿贄文盈篋借燈看乃其門庭則寂如也東谷贅言云長沙有朝士還鄉賔至則鼓吹喧闐有執友謁之朝士曰翁好誦詩近何誦友曰誦得孫鳯洲贈歐陽圭齋詩云圭齋還是舊圭齋不帶些兒官樣回若使他人居二品門前簫鼓閙如雷觀此知原功故自超矣人日陶南邨人日詩元日至人日未有不隂時甫也昔所云屢驗信弗疑今嵗異常嵗萬口稱稀竒一晴連七朝春氣即盎而輕烟散微暄麗日流祥暉谿山逞德色草朩帶光輝羊猪狗雞利馬牛被郊畿民物鮮疵癘禾稼其蕃滋吳旦生曰劉克云此東方朔占書也凡嵗後八日一日雞二日犬三日豕四日羊五日牛六日馬七日人八日榖其日晴則所主之物育隂則災太平御覽載晉議郎董勛答問禮俗云正月一日為雞二日為狗三日為羊四日為猪五日為牛六日為馬七日為人正旦畫雞於門七日帖人於帳今一日不殺雞二日不殺狗三日不殺羊四日不殺猪五日不殺牛六日不殺馬七日不行刑於此日向晨至門呼牛羊雜畜令來乃置粟豆于灰撒之宅内云以招牛羊按一說云天地初開以一日作雞七日作人也北史載魏帝宴百僚問何故名人日魏收舉董勛之言為對時邢邵輩甚恧焉詞林海錯云古人人日亦登髙晉李充人日登剡山詩命駕升西山寓目眺原野桓温㕘軍張望亦有人日登髙詩唐中宗景龍三年正月七日御清暉閣登髙遇雪因賜金綵人勝令學士賦詩宗楚客有九重中禁起七夕早春還太液波為水蓬萊雪作山之句隋文帝正月十五日與近臣登髙召元胄曰與外人登髙不如就朕也韓退之有寒食登髙詩硬黃陶南邨詩搆室延虚白臨書𢷬硬黃吳旦生曰陸放翁詩道室生虛白仙經寫硬黃南邨似本此南邨輟耕録今人謂臨摹為一體不知臨摹硬黃響搨四者逈然不同臨謂置紙在旁觀其大小濃澹形勢而學之若臨淵之臨摹謂以薄紙覆上隨其曲折婉轉用筆曰摹硬黃謂置紙熱熨斗上以黃蠟塗勻儼如枕角毫釐必見響搨謂以紙覆其上就明忩牖間映光摹之楊升菴云六朝人尚字學摹臨特盛其曰廓填者即今之雙鈎曰影書者如今之響搨榕陶南邨題張景辰福建歸云榕隂處處浮嵐外杜宇聲聲落照邊吳旦生曰閩廣有朩名榕音容其朩大而多隂可蔽百牛故字有寛芘廣容之說集韻榕初生如葛藟縁朩後乃成樹枝下著地又復生根異於他朩柳子厚詩榕葉滿庭鶯亂啼蘇東坡詩卧聞榕葉响長廊薩天錫詩竹溪泥滑滑榕樹雨瀟瀟納延詩萬里秋風榕葉暗一林新雨茘枝肥陳孚謁柳侯廟詩欲奠茘蕉不知處滿池榕葉擁朱門許有壬詩溪寒青見底榕老亂垂根髙啟詩祠羞茘子傳巫語縣蔽榕隂放吏歸燭剪升菴詩話曰武伯英咏燭剪詩啼殘痩玉蘭心吐蹴落春紅燕尾香為一時所賞吳旦生曰李君實謂細思上句無味因戲改之云吞殘月魄蟆頥動蹴落花鬚燕尾香又改云朱櫻顆坼金蟲墮綘樹花殘玉燕斜自以為體物較勝余以伯英本句神韻自然君實刻意描寫讀者鑒其苦心但未免露鑱按伯英崞縣人為觀州倅家故饒財第宅園亭為河東之冠貯書有萬巻樓為人多伎巧山水雜畫斵琴和墨皆極其工興定未歿於闗中升菴於此詩後又載永樂中李古亷咏剪刀詩吴綾剪處魚吞浪蜀錦裁時燕掠霞深院響傳春晝静小樓工罷夕陽斜公之直莭清聲而嫵媚如此信乎賦梅花者不獨宋廣平也歴代詩話巻六十九
