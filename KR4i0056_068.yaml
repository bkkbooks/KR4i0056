body:
  text: 歷代詩話卷六十八歸安吳景旭撰壬後集中之上元詩焚香柯敬仲贈倪元鎮云夜雨推篷寫松石焚香何處獨題詩吳旦生曰元鎮自號滄浪漫士又號淨名菴主悉散其家産與人蓋田既散而稅未及推入催科者坌集遂逃去潛於蘆葦中爇龍涎香竟蹤跡得之又張士誠弟士信使人持絹求其畫元鎮怒曰我生不能為王門畫師即裂其絹一日士信逰太湖聞漁舟中有異香急傍舟近之乃元鎮也敬仲所謂推篷焚香殆屬比耶何元朗云元鎮詩法韋蘇州昔人言蘇州鮮食寡欲愛掃地焚香而坐元鎮實類之不但詩之酷似而已雲林遺事云嘗有逺國人道經無錫欲見之以沈香百斤為贄詒云適往惠山翌日載至又云出探梅花其人以傾慕不得一見徘徊其家密令人開雲林堂使登焉堂前植碧梧四周列竒石東設古玉器西設古尊彛法書名畫其人方驚顧間謂其家人曰聞有清閟閣能一觀否家人曰此閣非人所易入其人望閣載拜而去怯薛輟耕録曰杜清碧應召次錢塘諸儒者爭趨其門燕孟初作詩嘲之有紫藤帽子髙麗靴處士門前當怯薛之句聞者傳以為笑用紫色棕藤縳帽而製靴作髙麗國樣皆一時所尚怯薛則內府執役者之譯語也吳旦生曰清碧名本江右人所編五聲韻自大小篆分𨽻真草以至各方新字題曰同音嘗一再遊京師王公貴人樂與之交至正中奏修三史各舉一處士清碧以處士徵授翰林待制至錢唐辭疾不行則此正其怯薛時耶張思亷有怯薛行永樂中周藩誠齊作元宫詞云幾畨怯薛上班慵生怕鑾輿又别宫李昌祺作至正麗人行云後先雉扇怯薛執左右麟符火赤佩按元朝有四怯薛太官怯薛者分宿衛供奉之士為四畨畨三晝夜凡上之起居飲食諸服御之政令怯薛之長皆總焉獻書圖張伯雨詩侍書愛題博士畫日日退朝書滿床奎章閣上觀政要無人知有授經郎吳旦生曰文宗御奎章閣學士虞伯生博士柯敬仲常侍從以討論法書名畫為事時授經郎揭曼碩比二人寵眷稍疏因潛著一書曰奎章政要以進二人不知也有畫授經郎獻書圗行於世伯雨題此詩蓋柯作畫虞必題故云然此詩不載句曲外史集中余從輟耕録見之詩話類編云伯雨錢唐黃冠也有詩字名嘗於一士夫家見袖軸一卷伯雨首有山居雪霽詩一律後多名筆次韻今止記憶數首是皆無集可觀者録之於左并書姓氏爵里伯雨詩曰日光玉潔千峰立映雪時晴一氣凝當晝壚亭催掃巷犯寒漁艇借收氷松皮石裂號饑鼠忩隙塵消撲凍蠅青茁菜芽渾可愛倩誰春餤捲紅綾張翥自京來杭和曰窈窕澗阿人跡斷隱居學道自神凝巖頭鶴下松無雪石底龍蟠水不氷釀酒春瓶濃勝乳抄書雲笈細如蠅多君肯念還京客為織春袍柿蒂綾黃溍和曰雪中乘興真竒事無奈舟膠水始凝朝士白頭慚獨步仙人赤腳傲層氷招來盡是雞羣鶴趨附空慚馬尾蠅夜久松龕同擁毳絶勝儤直有青綾俞友仁追和曰湖上千峰盡失青湖光十里未消凝吟詩細嚼梅花蕊煮茗潛敲澗壑氷東郭忍寒行似鶴南屏癡醉坐如蠅相過內相知乘興盛服猶披舊賜綾翥字仲舉先晉寧人父官於杭因家錢塘官至學士晉卿義烏人官至學士俞字文輔仁和人明初㑹元也余按張仲舉所著有蛻菴集黃晉卿所著有日損齊集何得槩云無集可觀也水東日記謂元人文集如馬祖常元好問之卓卓今皆無傳餘冬序録云元好問有遺山集四十卷今刻於河南馬祖常有石田集十卷今刻於陜西蓋說家不詳考而漫然為言類若此東坊藁張伯雨題范德機東坊藁後云一編上有東坊字吳旦生曰劉伯溫作句曲外史墓志云時范德機以能詩名外史造范范適出有詩集在几上外史取筆書其後為詩四韻守者見則大怒趨白范范驚曰吾聞若人不得見今來天畀我友也即自詣外史結交而去今觀其題東坊藁即所書四韻者此耶堯山堂外紀云伯雨晚居茅山罕接賔客一日有僧來訪童子拒之僧云語而主吾詩僧也乃入報伯雨書老杜花徑不曽緣客掃之句使持以示僧僧略不運思足成詩云久聞方外有神仙只住華陽古洞天花徑不曽緣客掃石牀今許借僧眠穿雲去汲燒丹井帶雨來耕種玉田一自茅君成道後幾人騎鶴下蒼烟伯雨得詩大驚延留數日畫葡萄張伯雨題溫日觀葡萄詩日觀一飲西凉酒解寫葡萄絶代無請師截斷葛藤路還我黑月摩尼珠吳旦生曰宋子虛詩墨花酣春馬乳漲醉夢渴想西凉姿馬虛中詩寒藤掛鬼眼纍纍冷花碧僧夢觀詩鑌刀剪斷紫瓔珞纍纍馬乳垂金風三詩竒澀可與伯雨相匹圖繪寶鑑云僧子溫字仲言號日觀又號知歸子遂昌雜録云日觀居葛嶺碼瑙寺人但知其畫葡萄不知其善書也今世傳葡萄多假其真者枝葉鬚梗皆草書法也農田餘話云古人無畫葡萄者日觀於月下視葡萄影有悟出新意似飛白書體為之酒酣興發以手潑墨然後揮墨迅於行草收拾散落頃刻而就如神甚竒特也余得陳眉公畫葡萄扇乃倣溫僧寫破袈裟法即書其懷淨土詩云往往來來舊破瓢此心未了漫徒勞從今不作輪回夢只走人間這一遭余甚珍之按我鄉沈仲華為日觀弟子傳其法亦佳地肺張伯雨贈危太朴詩秋水渚涯浮地肺茅君局任守天台吳旦生曰圖經云金陵者洞墟之膏腴勾曲之地肺其土肥良故曰膏腴水至則浮故曰地肺伯雨謂此又逰城南記云終南一名太乙亦名地肺髙傳所謂秦時四皓共入商雒隱地肺山是也河圖云大懷山為地喉岐山為地乳昆侖山為地首楊升菴以地首對天台以地喉對天首許渾題孫處士居詩髙歌懷地肺逺賦憶天台陸放翁詩隱士寄雲從地肺逰僧問路上天台又云躡屩未成逰地肺掩扉聊欲隱天台皮襲美詩天台畫得千回看湖目芳來百度逰成原常詩雲外送僧歸日本月中携客過天台宋子虛詩地肺潛通嶽峩眉秀拂雲鄒彥吉詩僧居地肺長銜日佛立天心但附風即以之分屬亦佳挽管君張伯雨挽趙夫人管君詩曽謁西池閟殿春賜加大國寵疏頻擇壻當年郗太傅能書今日衛夫人玉鏡離臺空掩月寶衣堆桁暗凝塵千秋鄉中名不沒墓有通兒書老銀吳旦生曰松雪以翰墨著其夫人管氏諱道升字仲姬亦工詩畫奉中宫命題所畫梅詩云雪後瓊枝嫩霜中玉蕊寒前村留不得移入月宫看至今吳興天聖寺壁有夫人所畫朱竹太平清話云朱竹古無所本宋仲溫在試院卷尾以朱筆掃之故張伯雨有偶見一枝紅石竹之句加封魏國夫人卒時其子雍為書壙志故落句云爾按歐陽率更子通書毋夫人墓銘毋諱老銀松雪弟孟籲三子長亮次雍字仲穆季奕字仲光二孫鳯麟甥王䝉皆以畫名松雪作夫人墓志云其先管仲之子孫自齊避難於吳興人皆賢之故其地至今名棲賢今烏程棲賢山是也妮古録云夫人出泖西小蒸今其路尚名管道恐亦誤管公諱伸字直夫無子夫人即故居作管公樓孝思道院奉其祀西溪叢語云衛夫人名鑠字茂漪即廷尉展之弟恆之從妹汝隂太守李矩之妻中書郎李充之母王逸少師善鍾法能正書入妙能品王子敬年五嵗已有書意夫人書大雅吟賜之華陽真逸張伯雨寄李季和詩杜陵醉歌不易得豈惜華陽真逸書其下細書自注云顧况號華陽真逸吳旦生曰瘞鶴銘華陽真逸撰歐陽永叔謂是顧况道號劉有定亦謂或曰顧况號自黃長孺董彥逺辨其悮余於辛集蘇詩詳識之今伯雨方外人乃於隱居猶未諳其稱號而漫注顧况耶元末張思廉棲鶴峰詩華陽真逸上清來鐡笛一聲山月曉正指陶隱居也槎頭張伯雨詩槎頭釣魚秋雨足吳旦生曰襄陽耆舊傳峴山下漢水中出鯿魚味極肥美常禁人採捕以槎斷水因謂之槎頭鯿宋張敬兒為刺史作六櫓船置獻齊髙帝曰奉槎頭縮項鯿一千八百頭唐孟浩然詩試垂竹竿釣果得槎頭鯿又云鳥泊隨陽雁魚藏縮項鯿故杜子美詩復憶襄陽孟浩然清詩句句盡堪傳即今耆舊無新語謾釣槎頭縮項鯿黃山谷題浩然畫像詩先生一往今幾秋後來誰復釣槎頭鶴林玉露云周禮庖人共祭祀之好羞鄭康成注云好羞謂四時所謂膳食若荆州之䱹魚揚州之蟹胥陸德明音釋云蟹醬也則是䱹魚或即槎頭魚字作䱹耶青飢飯張伯雨詩白石資方青飢飯洪崖借乘雪精騾吳旦生曰陶隱居登真訣有乾石青精飢飯飢音迅謂餐也其法即南燭草朩浸米蒸飯暴乾其色青如􅀢珠食之可以延年却老神農本草朩部有南燭枝葉人服輕身長年令人不饑益顔色取汁炊飯名為烏飯又名黑飯草在道書謂之南燭草朩在本草謂之南燭枝葉蓋一物也神仙傳鄧伯元王𤣥甫俱在霍山服青精飯又唐髙宗命葉法善往江東造青飢飯瑣碎録云蜀人遇寒食日採楊桐葉染飯色青而有光食之資陽氣謂之楊桐飯道家謂之青飢飯石泉張伯雨詩石泉新處鑽槐火山雨多時拾菌釘吳旦生曰東坡夢看參寥飲茶詩寒食清明多過了石泉槐火一時新問火固新矣泉何故新答曰俗以清明淘井故伯雨又有上已詩槐火新泉還有夢謂此事也金人劉無黨寒食詩楊柳杏花相對晚石泉槐火一時新蓋直寫坡語矣續禮儀志冬至日鑽燧改火夏至日浚井改水然則古人水火皆改所謂隂鑒陽鑒是也栗張伯雨寄新栗詩朅來常熟嘗新栗黃玉穰分紫殼開吳旦生曰耿緯詩霜凝栗罅開蓋詞人狀物曲盡形容言栗必及其殼而杜子美則亦及栗蓬矣其詩云嘗果栗皺開集韻皺側尤切革紋蹙也周繇詩開栗弋之紫皺貫休詩新蟬避栗皺陸放翁詩開皺得紫栗又云蝟刺坼蓬新栗熟屬對馬虛中詩吟靜驚山鬼心空守谷神吳旦生曰楊仲𢎞雪中詩寒侵免窟愁山鬼凍合龍宫逼水仙向服其工又見虛中一聨可悟屬對之法虛中江邊餞别詩古巷聚人祠櫟社暮潮催客散樟亭浙江晚眺詩雲分雨腳回沙溆帆趂潮頭出海門幽居遣懷詩卜築每嫌山有姓避時長羡草無名皆佳致也踏裏彩滇南志載梁王郡主阿􅗩詩曰吾家住在雁門深一片閒雲到滇海心懸明月照青天青天不語今三載蘋花歷亂蒼山秋誤我一生踏裏彩雲片波璘不見人押不蘆花顔色改肉屏獨坐細思量西山鐵立霜瀟灑吳旦生曰至正間明玉珍將紅巾三萬攻雲南梁王字羅皆奔總管段功進兵燒紅巾追至七星關勝之梁王深嘉段功以郡主阿􅗩妻之奏授雲南平章後為梁人所譖梁王密召阿􅗩付以孔雀膽一具命毒殪之澘然不受命私語段功不聽明日邀功至通濟橋馬逸因格殺之阿􅗩愁憤作此詩按踏裏彩錦被名也杜子美詩布衾多年冷如鐵嬌兒惡卧踏裏裂當亦指此謝世修注以為嬌兒踏破其裏全不暖也恐非東坡紙帳詩但恐嬌兒還惡睡夜深踏裏不成眠洪武中髙季迪兜羅被歌云今朝得此何竒絶展覆不憂兒踏裂亦皆承此訛耳押不蘆北方起死回生之草肉屏駱駝背也鐵立松林也歷代詩話卷六十八
