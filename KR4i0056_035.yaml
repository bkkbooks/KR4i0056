body:
  text: 歷代詩話卷三十五歸安吳景旭撰巳集上之中杜詩頭白烏漁隱叢話曰哀王孫云長安城頭頭白烏夜飛延秋門上呼頭字當作頸字蓋烏無頭白者吳旦生曰楊升菴引三國典略云侯景篡位令飾朱雀門其日有白頭烏萬許集於門樓童謡曰白頭烏拂朱雀還與吳杜工部詩蓋用其事以侯景比祿山也余喜其言得老杜嗟異之意漁隱以故常律之失其旨矣續博物志云白頭羣飛為燕烏大而白頭為倉烏安得謂烏無頭白也曲江春明退朝録曰唐曲江開元天寶中嘗有殿宇安史之亂遂盡圯廢文宗覽子美詩江頭宫殿鎖千門細柳新蒲為誰緑因建紫雲樓落霞亭歲時賜宴及兩岸建亭館焉吳旦生曰蔡傅卿注曲江為京都勝賞之地遭祿山焚劫之後荒凉公故有感也余按江以水流屈曲謂之曲江水經瀧水南經曲江縣昔𨽻曲紅曲紅山名漢周府君碑亦作曲紅古字紅江通司馬相如賦臨曲江之隑洲顔師古云曲岸之洲曲江也漢武帝穿以為宜春苑程大昌云漢為宣帝樂游廟廟至唐世基跡尚存亦名樂游苑亦名樂游原基地最髙公有樂游園詩公子華筵地勢髙秦川對酒平如掌秦川即樊川也坐中得見秦川可知其髙隋以其地髙不便為居人坊巷而鑿之為池以厭勝之為芙蓉池且為芙蓉園韓退之詩曲江千頃荷花淨平鋪紅蕖蓋明鏡劇談録云唐開元中疏鑿為勝境南有紫雲樓芙蓉苑西有杏園慈恩寺都人遊玩盛於中和上已之節長安志云文宗太和九年發左右神策軍各一千五百人淘曲江修紫雲樓綵霞亭仍敕諸司如有力欲創置亭館宜給與閒地任其營造蓬窗續録云曲江宴唐初設以慰下第舉人其後弛廢有司不復飭而進士會同年於此開元時立為令典造紫雲樓於江邊至期上率宮嬪垂簾觀焉命公卿士庶大酺各攜妾伎以往倡優緇黃無不畢集先期設幕江邊居民髙其地值每丈地至數十金或園亭有樓房者直至百金先期往宿是日商賈皆以竒貨麗物陳列豪客園尸爭以名花布道進士乘馬盛服鮮製子弟僕從隨後率務華侈都雅推同年俊少者為探花使有匿花於家者罰之公卿勳戚皆以是日揀選東牀故唐人重進士謂衣骨並香蓋其始不過為眊矂解悶之舉而其後以優賢俊其末則以恣豪舉崇游觀矣白馬之禍至使清流為濁流盛極而衰侈極而變曲江為之濫觴也忘哀江頭云欲往城南忘城北注謂公朝哀江頭暮又聞史思明連結吐蕃入寇欲往城南省家倉皇之際心曲錯亂忘南而走北也漁隱叢話云楚辭中心瞀亂兮迷惑王逸注云思念煩惑忘南北也子美蓋用此語吳旦生曰諸本皆作忘字然觀王荆公送吳顯道云欲往城南望城北此心炯炯君應識又作十八拍云欲往城南望城北三步回頭五步坐此皆集杜句也却皆作望字或以為舛誤或以為改定陸放翁云北人謂向為望謂欲往城南乃向城北亦皇惑避死不能記南北之意余按忘字可作仄聲讀元馬虛中詩一歲春光一半空鶯聲強在雨聲中老來言語渾都忘病起篇章漸不工孔巢父韻語陽秋曰安祿山反永王璘有窺江左之意李白嘗受璘辟為府僚璘敗白流夜郎孔巢父亦為永王辟巢父察其必敗潔身潜遁由是知名使白如巢父之計則安得有夜郎之謫哉老杜送巢父歸江東云巢父掉頭不肯住東將入海隨烟霧其序云兼呈李白恐不能無微意也吳旦生曰巢父字弱翁孔子三十七世孫與李白隱徂徠山號竹溪六逸按唐書廣德中李季卿宣撫江淮薦巢父為參軍皇甫冉送以詩云共許陳琳工奏記知君名宦未蹉跎然其以宣慰田悅而奏功復以宣慰李懷光而被害故楊亷夫樂府云孔巢父竹溪流竹溪之水可飲牛胡為去干肉食謀又云孔巢父不歸去十年東海迷烟霧釣竿空負珊瑚樹蓋惜其不終為竹溪之逸也且不悟老杜掉頭入海之意故即用杜送時語以惜之也然則杜送歸一詩不但於太白有微意更於巢父有微意也盧德水云孔巢父振竒人也送行作復出子美手詩卷長留天地間贈人自贈俱在其中洋洋樂哉又置酒者蔡侯也兼呈者李白也尋禹穴而訊謫仙臨前除而對靜者遠致清光彈琴月照此與冬末以事之東都湖城遇孟雲卿復歸劉皓宅宿晏飲同一妙境夫子美已起身出城矣於疾風暗塵中開眼忽見雲卿豈不喜出意外於是拉雲卿復往劉宅會宿雲卿亦不以生客自嫌攜手徑造當是時劉侯歡甚張燈促饌從殘局翻出新局賔主友朋相視而笑此一段光景至今令人回環則詩雖欲不佳得乎秃節竹坡詩話曰朝以道家有宋子京手書杜詩一卷如握節漢臣歸乃是秃節以道跋云前輩見書自多不如晚生少年但以印本為正也不知宋氏家藏為何本使得盡見之其所補亦多矣吳旦生曰升菴言後漢張衡傳蘇武以秃節效貞杜用此語焦弱侯言秃節今本作握節王右丞詩節旄秃盡海西頭今本作空盡俗士無知妄肆改竄每如此中去聲東臯雜録曰詩蒸民任賢使能周室中興焉陸德明釋文張仲反故老杜詩云今朝漢社稷新數中興年又萬里傷心嚴譴日百年垂死中興時吳旦生曰中字或去聲用或平聲用如老杜此詩又漢運初中興李義山詩言皆在中興蘇子瞻詩威聲又數中興年吕居仁詩早為吾君了中興袁海叟詩最愛羣公交薦日正逢天子中興年此則去聲用中字也如杜詩神靈漢代中興主功業汾陽異姓王側聽中興主長吟不世賢李義山詩身閒不覩中興盛此則平聲用中字也敖東谷云中興之中字漕運之漕字韻書皆讀作去聲近見學䆒多讀作平聲訛矣黃羊蘆酒送從弟亞赴河西詩黃羊飫不羶蘆酒多還醉吳旦生曰宋人解謂黃羊出關右塞上無角類麞鹿塞外所造酒荻管吸瓶中故曰蘆酒也餘冬序録云按今陜西有黃羊大如數歲羝而角甚長西地羊角皆拳曲黃羊獨與江南同其肉肥美膏黃厚而不羶川中人造酒荻管吸瓶中信然陜以西人則髙盆貯糟飲時量多少注水盆中竅盆吸之水盡酒乾謂之瑣力麻酒又曰雜麻酒即蘆酒之遺制墅談云秦蜀之人醖酒於缶飲以筒名咂麻酒亦曰瑣里麻石林燕語云隴右人造㗜酒以荻管吸於瓶中以是知秦蜀去西徼為近故其法盛傳假對石林詩話曰杜工部詩對偶至嚴而送楊六判官云子雲清自守今日起為官獨不相對切意今日字當是令尹字傳寫之訛耳吳旦生曰假雲以對日謂之假對兩句一意乃詩家活法杜牧之詩當時物議朱雲小後代聲名白日懸亦用此意也如老杜枸杞因吾有雞栖奈汝何次第尋書札呼兒檢贈篇又唐人詩牀頭兩甕地黃酒架上一封天子書又三人鐺腳坐一夜掉頭吟又鬚欲霑青女官猶佐子男皆此例黃閣贈嚴八閣老詩扈聖登黃閣明公獨妙年吳旦生曰舊唐書嚴武傳遷給事中時年三十二給事中屬門下省開元元年改門下省為黃門省故稱黃閣時公為左拾遺亦東省之屬故詩中云官曹可接聨也錢起送張員外出牧嶽州詩自憐黃閣知音在不厭彤襜出守頻亦此意也國史補云宰相相呼為堂老兩省相呼為閣老觀通鑑王涯謂給事中鄭肅韓佽曰二閣老不用封敕此亦一證緗素雜記天子曰黃闥三公曰黃閣給事舍人曰黃扉太守曰黃堂余考野客叢書謂朱門洞啓當陽之正色三公之與天子禮秩相亞故黃其閣以示謙漢舊儀謂丞相聽事閣曰黃閣然名為黃閣初非用黃蓋是漢制而非唐時稱謂也黃扉者即黃門之義黃堂者春申君在郡塗雌黃以厭火災遂為郡治之故事白首黑頭復齊漫録曰江總自京南還尋故宅詩紅顔辭鞏洛白首入轘轅杜子美晚行口號云逺愧梁江總還家尚黑頭總詩白首則非黑頭矣劉辰翁云著一梁字見其自梁入陳又自陳入隋歸尚黑頭也不知總入隋年七十餘矣劉之不學如此吳旦生曰其遇亂時尚少正於梁字見黑頭乃老杜筆妙焦弱侯謂梁字春秋之筆反隔一塵而南還尋故宅又別是後來事故白首黑頭各不相礙如元張思廉詩君不見黑頭江令承恩早王中立詩歸來江令頭空白一說承恩一說歸來則兩無害也不然老杜有復愁詩莫看江總老猶被賞時魚豈杜公自相剌謬耶楊升菴謂總歷梁陳隋至唐貞觀中九十餘矣長安九日詩在唐時作觀此則後人之駁辰翁為益可信永樂中瞿宗吉詩孰能耐久如江令垂老還家尚黑頭亦悮取辰翁語耳更冷齊夜話云夜闌更秉燭相對如夢寐言更相秉燭照之恐尚是夢也更字當作平聲讀若作仄聲則失其意矣吳旦生曰冷齊說支離宜訂作仄聲為妥老學庵筆記言夜巳深矣宜睡而復秉燭以見久客喜歸之意妄云當平聲讀烏有是哉唐詩紀事云盛文肅嘗夢朝上帝見殿上題扇云夜闌更秉燭相對如夢寐初謂天上之作巳而知子美詩也北征冷齊夜話曰老杜北征詩唯昔艱難劉會孟本作憶昨狼狽初事與前世劉會孟本作古先別不聞夏商劉會孟本作殷衰終劉會孟本作中自誅褒妲意者明皇鑒夏商之敗畏天悔過賜妃子死也而劉禹錫馬嵬詩官軍誅佞幸天子舍如姬羣吏伏門屛貴人牽帝衣白樂天長恨詞六軍不發爭奈何宛轉蛾眉馬前死乃是官軍迫使殺妃子歌咏祿山叛逆耳孰謂劉白能詩哉其去老杜何啻九牛毛耶北征詩識君臣之大體忠義之氣與秋色爭高可貴也吳旦生曰車若水亦言子美北征讀之感泣有功名教如樂天長恨全是姗笑君父以敗亡為戲更無惻怛憂愛之意墨莊漫録亦以為元微之連昌宫詞過於樂天長恨歌白止於荒淫之語終篇無所規正元詞乃微而顯其荒縱之意皆可考卒章乃不忘針諷為優也乃何元朗稱長恨為古今長歌第一而懶真子謂明皇太真之事本有新臺之惡而歌云楊家有女初長成養在深閨人不識故世人罕知其為壽王瑁之妃得春秋為尊者諱義此皆未審立言之要歸也夢溪筆談云長恨歌峩眉山下少人行旌旗無光日色薄峩眉在嘉州與幸蜀路全無交涉活國許彥周詩話曰北征詩微爾人盡非於今國猶活獨以活國許陳元禮何也蓋禍既作惟賞罰當則再振否則不支持矣元禮首議誅太真國忠輩近乎一言興邦儻無此舉雖有李郭不能展用吳旦生曰公所以稱桓桓陳將軍仗鉞奮忠烈也又有鹿頭山詩冀公柱石姿論道邦國活謂冀國公裴冕亦與此活字同看山谷賦苦筍云苦而有味如忠諫之可活國蓋用此歷代詩話卷三十五
