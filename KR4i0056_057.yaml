body:
  text: 歷代詩話卷五十七歸安吳景旭撰辛集上之下宋詩落英西清詩話曰歐公嘉祐中見王荆公詩黃昏風雨暝園林殘菊飄零滿地金笑曰百花盡落獨菊枝上枯耳因戲曰秋英不比春花落為報詩人子細看荆公聞之曰是豈不知楚辭夕餐秋菊之落英歐九不學之過也髙齊詩話以秋英二句為子瞻跋漁隱叢話云於六一居士全集及東坡前後集並無此二句不知西清髙齊何從得此吳旦生曰埤雅言鞠如聚金鞠而不落故名鞠蓋鞠不落華蕉不落葉此正理也楚辭乃云朝飲朩蘭之墜露兮夕餐秋菊之落英野客叢書云原借此自喻蓋反物理以為言也謂朩蘭仰上而生本無墜露而而有墜露秋菊就枝而殞本無落英而有落英物理之變則然吾憔悴放浪於楚澤之間固其宜也歐公意謂荆公得時行道落英反理之喻似不應用故曰秋英云云欲荆公自觀物理而反之於正耳余以歐公稔知其學術豈片言能反於正哉特喚醒子細二字見他生平誤處儘多不可過執已見莽莽行事耳洪興祖楚辭補注云秋花無自落者讀如我落其實而取其材之落魏梅墅續評云落之為義始也初也如禮記所謂落成之落蓋菊已花雖枯不落惟初英乃可餐也二解落義各異王逸離騷注云英華也類篇云英草榮而無實者後漢馮衍賦云食玉芝之茂英言英華之英也宋書沈約云英葉也言食秋菊之葉神農本草三月採菊葉服之輕身耐老王子喬變白增年方甘菊三月上寅採名曰玉英是葉謂之英也二解英義亦異黃金臺西清詩話曰荆公詩功謝蕭規慙漢第恩從隗始詫燕臺以示陸農師農師曰蕭規曹隨髙帝論功蕭何第一皆托故實而請從隗始初無恩字公曰退之鬬雞聨句感恩慚隗始若無據豈當對功字也乃知前人以用事一字偏枯為倒置眉目反易巾裳蓋謹之如此吳旦生曰史記昭王為郭隗改築宫而師事之新序通鑑亦云築宫不言臺也孔文舉與曹公書云昭王築臺以尊郭隗任昉述異記燕王為隗築臺今在幽州呼賢士臺亦謂招賢臺則有所謂臺矣不載黃金之名按上谷郡圖經云黃金臺在易水東南十八里燕昭王置千金於臺上以延天下之士水經注云固安縣有黃金臺遺址太平御覽乃引史記以為昭王置千金臺上以延天下士謂之黃金臺不知所據鮑昭放歌行云將起黃金臺李善注引圖經晉書俱不云史記也皇甫松登黃金臺詩燕相謀在兹積金黃巍巍李白詩燕昭延郭隗遂築黃金臺杜甫詩揚眉結義黃金臺李賀詩報君黃金臺上意柳宗元詩燕有黃金臺逺致望諸君劉因詩黃金亦何物能令賢重輕貢師泰詩燕王鋭志移青社築土懸金奉賢者納延詩千金何足惜一士固難求其於黃金臺題下注云大悲閣東南隗臺坊內楊維楨詩金臺百尺媒燕隗髙啓詩歸時應過黃金臺祝允明詩昭王禮郭生崇臺懸黃金橫陳懶真子曰荆公詩嵗晚蒼官聊自保日髙青女尚橫陳蒼官松也青女霜也言日髙而松上霜不消也橫陳出楞嚴經六欲界中云我無欲應女行事當橫陳時味如嚼蠟以言道人處世間雖有欲而無味也蓋荆公自謂如蒼官自保但青女橫陳不能已耳吳旦生曰汪彥章詩從此空花掃除盡定須嚼蠟向橫陳金人李之純詩橫陳己覺如嚼蠟皆醉何妨獨啜醨是用楞嚴語也然觀梁元帝詩王孫及公子熊席復橫陳夏英公詩橫陳皆錦繡器皿盡金玉所謂橫陳乃鋪陳之義海録碎事云橫陳言同被也則李義山所云小憐玉體橫陳夜已報周師入晉陽其謂此耶他如洪駒父雪詩偏隨江月橫陳夜未放宫梅獨自香任君謨詩野寺荒凉人不到水光山影正橫陳王君玉詩物色橫陳詩卷裏雲濤飛動酒杯中皆借用也荆公又詩木落岡巒因自獻水歸洲渚得橫陳山谷謂自獻橫陳俱見相如賦不應用惠洪答以橫陳出楞嚴經了翁雜鈔云樊宗師所作綘守園亭記陳后山柏詩皆以柏為蒼官則作松誤復齊漫録云青女主霜雪之神也故淮南子至秋三月青女乃出降霜雪髙誘注云青女乃天神青腰玉女主天霜雪荆公以青女為霜於理未當杜子美秋野詩飛霜任青女乃為盡理梁昭明博山香爐賦云青女司寒紅光繁景亦皆為霜雪神矣余觀李義山詩青女素娥俱耐冷月中霜裏鬬嬋娟黃山谷詩嫦娥携青女一笑粲萬瓦用意隱約為佳通印容齊四筆曰魚通印之語本出於王荆公送張兵部知福州詩長魚俎上通三印之句蓋以福州瀕海多魚其大如此初不指言為子魚也東坡始以通印子魚對披綿黃雀乃借子字與黃字為假對耳山谷所云子魚通印蠔破山蓋承而用之遁齊閒覽云其地有通應廟廟前港中子魚最佳王初寮詩通應子魚鹽透白正采其說郡人黃處權云興化子魚去城五十里地名迎仙者為上所産之處土名謂之子魚潭而已初無通應港之名有大神祠賜額曰顯應乃遁齊所指之廟者亦非通應也潭傍又有小祠一間庳陋之甚農家以祀田神好事欲實遁齊之說遂粉刷一扁妄標曰通應廟側題五小字曰元祐某年立此尤可笑且用神廟封額以名土物他處未嘗有也吳旦生曰觀遁齊之意以為今人求其大可容印者謂之通印子魚此亦傳聞之悮而容齊反以通應廟之說為是妄增余按泊宅篇云興化軍子魚惟通應大師廟前者最矣世稱通應子魚而東坡乃作通印子魚恐悮又麈史云子魚長七八寸濶三二寸許剖之子滿腹冬月正其佳時莆田迎仙鎮乃其出處豫按部過之驛左有祠謂之通應祠下有水曰通應溪潮汐上下土人以鹹淡水不相入處魚最美比見士人詩誤曰通印據此則按部時實履之言遁齊亦未可非漁隱叢話云韓子蒼謝寄子魚詩驛騎馳書自海傍開籃剩喜子魚香紅螺紫蛤俱羞避獨許渠儂近酒觴子魚味鹹止可噉水飯若作酒品之物殊無風味漢人語石林詩話曰荆公詩用法甚嚴尤精於對偶嘗云用漢人語止可以漢人語對若參以異代語便不相類如一水護田將緑繞兩山排闥送青來之類皆漢人語也吳旦生曰野客叢書亦謂護田排闥皆西漢語也余按此兩語公嘗題金陵壁上指示山谷蓋得意之句他如草深留翠碧花逺沒黃鸝人只知翠碧黃鸝為精切不知是四色也自喜田園歸五柳最嫌尸祝擾庚桑人亦知栁對桑為的不知以十千數之庚亦是數也皆足見其銖兩搏黍舂鋤荆公題王昻霄水亭云蕭蕭搏黍聲中日漠漠舂鋤影外天吳旦生曰按搏黍黃鸝也王伯厚謂演蕃露以搏黍為鶯不知何出蓋未考國風葛覃注耳詩疏云黍方熟時鳴於桑間方言云齊人謂之博黍楊升菴云今之布榖也布博聲相近此烏當名博榖余據此則搏音博音無疑乃升菴經說部謂摶黍音團黃鳥也何無畫一之見與韻府􅨰􅱝鳥名布榖也揚雄傳注布穀一名買䤥蓋聞其聲則思買䤥鍤以布穀也其聲曰家家撒榖又云脫却破袴東坡詩南山昨夜雨西溪不可渡渡邉布榖啼勸我脫布袴不辭脫袴溪水寒水中照見催租瘢按舂鋤鷺也爾雅鷺舂鋤亦取其鷺之行步方言齊魯之間謂之舂鋤海録碎事云步於淺水好自低昻故曰舂鋤格物論云鷺鷥一名舂鋤林棲朝出捕魚夜宿其處正指此也乃月令廣義引此入春令中誤作春鋤可笑果下騮王荆公詩呼僮羈我果下騮欲尋南岡一散愁吳旦生曰漢書昌邑王賀召皇太后果下馬乘之魏志濊國果下馬漢桓時獻之注曰髙三尺乘之可於果樹下行顔氏家訓云周𢎞正為宣城王所愛給一果下馬蓋濊國所出也北史尉景有果下馬文襄求之不與神武責文襄而杖之述異記云漢樂浪郡出果下馬髙三尺虞衡志云德興産果下小駟以瀧水者為最髙不踰三尺駿者有兩脊骨一統志云果下馬出今羅定州李長吉詩吾聞果下馬羈䇿任蠻兒元微之詩果下翩翩紫騮好歐永叔詩猶得追閒果下騮陳后山詩惜子翩翩果下駒海録碎事云果下牛出廣州以其庫小可行果樹下今之㹄牛是也述異記云日南郡出果下牛髙三尺子耶王荆公詩洲逈藏迷子溪深礙若耶吳旦生曰建康西南十里有迷子洲按字書謂父曰耶于遮切古樂府不聞耶娘喚女聲杜詩耶娘妻子走相送又見耶背面啼何尚之戲王絢彧之子曰耶耶乎文哉絢對曰尊者之名安得為戲亦可道草翁之風必舅翁指尚之舅指何偃又費旭詩不知是耶非殷藝詩飄揚雲母舟簡文帝笑曰費既不識其父殷又飄揚其母據此則耶乃古爺字也荆公以若耶溪對迷子洲取其耶字子字作對工切筆談所載自朱耶之狼狽致赤子之流離其對意同弓荆公詩卧占寬閒五百弓吳旦生曰佛家以四肘為弓肘一尺八寸四肘蓋七尺二寸容齊四筆云毗曇論四肘為一弓五百弓為一拘盧舍八拘盧舍為一由旬一弓長八尺五百弓長四百丈一拘盧舍有二里十六里為一由旬焦氏筆乘謂盧舍四里也誤陸放翁詩小嶺西南烟水間頗聞有地百弓寬倪雲林詩結茅擬候芝三秀眠鹿應遺地一弓宋子虛詩五色何年補泬寥百弓無地駕瓊瑶桃源手聽云薩波多論曰西天度也以開肘為一弓去村店五百弓不逺不近以閒散處為蘭若今若以唐尺計之度二里許也挾荆公詩荒埭暗雞催月曉空場老雉挾春驕吳旦生曰翁行可論荆公善下字下得挾字最好如孟子挾長挾貴之挾嚴有翼云荆公又有紫莧臨風怯蒼苔挾雨驕陳無已有寒氣挾霜侵敗絮賔鴻將子度微眀其用挾字亦同青藜漁隱叢話曰王荆公上元戲劉貢父詩不知太乙逰何處定把青藜獨照公此詩用事亦精切拾遺記劉向校書天祿閣夜有老人植青藜杖言是太乙之精天帝聞卯金之子有博學者下而觀焉出懷中竹牒授之此既與貢父同姓又貢父時正在館閣吳旦生曰史記漢家以望日祀太乙從昏時祀到明今人於正月十五夜逰觀燈是其遺事漁隱但知劉姓與館閣用於貢父為切而不知太乙之用於上元為更佳也蓬忩雜録云古稱藜杖藜即苜蓿養之歷霜雪經一二嵗其本修直生鬼面可杖取其輕而堅非黎朩也用藜為燃光最明可傳火徹夜古讀書者燃藜以此王弇州云藜牀牀之為杖也余觀權德輿詩閒卧藜牀對落暉似非杖義留青日札云苜蓿漢志作目宿爾雅作􅀢蓿或作􅀢蓿草名或曰菜出大宛國漢使得之種離宫一名光風草今之鶴頂草似灰藋秋後結實黑房纍纍如穄俗謂之朩粟其米可為飯亦可釀酒故曰盤中何所有苜蓿長闌干穄即稷也紫桃軒雜綴云西京雜記樂逰苑中自生玫瑰樹樹下多苜蓿一名懷風或謂之光風風在其間常蕭蕭然照其花故名茂陵人謂之連枝草陶隱居以為長安中有苜蓿園北人極重此味既老則以飼馬披香殿西清詩話曰仁宗嘉祐中後苑賞花釣魚介甫以知制誥預末坐帝出詩示羣臣次第屬和傳至介甫日將夕矣亟欲奏御得披香殿字未有對時鄭毅夫接席顧介甫曰宜對太液池故詩云披香殿上留朱輦太液池邊送玉杯翌日都下盛傳王舍人竊柳耆卿詞太液波翻披香簾捲之語介甫銜之吳旦生曰復齊謾録謂唐上官儀初春詩步輦出披香清歌臨太液乃知荆公取儀詩豈柳詞耶庾信春日詩宜春苑中春已歸披香殿上作春衣長安有宜春宫此又以宜春對披香矣蘇魏公語録云仁宗賞花釣魚宴賜詩執政諸公洎禁從館閣皆屬和而詩中徘徊二字别無他義諸公進和篇皆叶徘徊字及詩罷再就座而教坊進戲為尋訪稅第者至前堂觀玩不去曰徘徊也至後堂復環顧而不去問之則皆曰徘徊也一人笑曰可則可矣但未免徘徊太多楊升菴云徘徊無别押豫思漢書相如傳有安翔徐徊昭帝廟號從徊揚雄賦徊徊徨徨松陵詩有遲徊庾信文有徠徊歸田録云真宗朝嵗嵗賞花釣魚羣臣應制嘗一嵗臨池久之而御釣不食丁謂應制詩鶯驚鳳輦穿花去魚畏龍顔上釣遲真宗稱賞而詞林海錯曰周禮考工記瓬人深其爪出其目作其鱗之而注云之而頰頷也王荆公與蘇長公分韻得而字詩采鯨抗波濤風作鱗之而借用亦妙吳旦生曰按荆公在歐公坐分韻送裴如晦知吳江以黯然消魂惟别而巳分韻時送者八人歐陽永叔王荆公蘇子美梅聖俞王平甫蘇老泉姚子張焦伯強不聞有蘇長公也夏茂卿載荆公與長公分韻則誤矣老泉得而字叶談詩究乎而荆公乃又作而字二詩其一叶風作鱗之而其又一云春風垂虹亭一杯湖上持傲兀何賔客兩忘我與而蓋露長也茂卿載荆公得而字又誤矣鳴午復齊謾録曰荆公詩靜憩鳩鳴午荒尋犬吠昏學者謂公取唐詩一鳩鳴午寂雙燕語春愁之句豫嘗見東坡手寫此詩乃是靜憩雞鳴午讀者疑之蓋不知取唐詩楓林社日鼓茅屋午時雞吳旦生曰西清詩話陳傳道嘗於彭門壁間見一聨云一鳩鳴午寂雙燕語春愁後以語東坡世謂公作然否坡笑曰此唐人得意句僕安能道此胡苕溪乃用此語作春日一聨云話盡春愁雙紫燕喚回午夢一黃鸝不自知其語意淺薄遜其自然矣後見焦氏筆乘謂荆公鄰雞生午寂芳草弄秋妍此語出於韋蘇州緑隂生晝寂孤花表春餘余以此聨上句實一鳩鳴午寂換骨句也金山遁齊閒覽曰唐人題西山寺詩終古礙新月半江無夕陽人謂冠絶古今以其盡得西山之景趣也金山寺留題者亦多而絶少佳句惟寺影中流見鐘聲兩岸聞又天多剩得月地少不生塵最為人傳誦要亦未為至工若用之於落星寺有何不可乎熙寧中荆公有句云天末海門橫北固烟中沙岸似西興尤為中的吳旦生曰后山詩話載楊蟠金山詩天末樓臺橫北固夜深燈火見揚州王平甫以此詩為莊宅牙人語解量四至復齊謾録云荆公金山詩天末海門橫北固烟中沙岸似西興已無船舫猶聞笛逺有樓臺祗見燈四句亦類楊蟠漁隱叢話云平甫逰金山詩北固山連三楚近中􅍽水入九江深平甫譏楊蟠之詩乃反自作此等語則何也薩天錫登金山雄跨亭云疏鐘水國前朝寺落日海門何處舟更擬黃昏盡餘興却從燈火望揚州即用楊蟠語亦不減其髙雅也母淇澳王荆公詩千枝孫嶧陽萬本母淇澳吳旦生曰荆公過於鑱鑿輒失天然之致只此二語魏華父謂孫枝取杜子美賦桐花未吐孫枝之鸞鳳相鮮此猶未害如母淇澳牽強李注云世俗謂慈竹為子母竹洪荆公詩東江朩落水分洪吳旦生曰漫叟詩話灘石湍激其中深僅容舟司舟者謂之洪若大水則不復問洪矣余按方言石阻河流為洪銅陵縣有水洪口江湖間謂分流處為洪又石梁絶水曰洪射洪吕梁洪是也蘇東坡百步洪詩長洪斗落生跳波輕舟南下如投梭周衡之詩十人度索上一洪寸寸強弓挽難起馬虛中詩萬里長風送短篷亂流初下吕梁洪漫叟又云江漢有滸以捍制泛濫大漲則溢於平陸水退滸見舟人謂之水落槽臨川詩萬里寒江正復槽潛確類書云莊子吕梁懸水三千仞故今言吕梁為聚水村即百步洪也東坡詩亂山合㳫圍彭門官居獨在聚水村謝公墩歸田詩話曰王荆公咏謝公墩云我名公字偶相同我屋公墩在眼中公去我來墩屬我不應墩姓尚隨公或謂荆公好與人爭在廟堂則與諸公爭新法在野則與謝公爭墩亦善謔也然公詠史云穰侯老擅關中事長恐諸侯客子來我亦暮年専一壑每逢車馬便驚猜則公不獨欲専朝廷雖丘壑亦欲専而有之蓋生性然也吳旦生曰金陵舊事載謝公墩在冶城之尾冶城本吳王夫差冶鑄處世說王右軍與謝太傅共登冶城謝悠然逺想有髙世之志故名謝公墩謝靈運撰征賦視冶城而北屬懷文獻之悠揚指此也李太白將營園其上故作詩云冶城訪古迹猶有謝公墩六朝事跡云荆公宅地名白塘元豐七年公病愈請以宅為寺賜額報寧禪寺由城東門至蔣山此半道也亦名半山寺漁隱叢話云山谷稱荆公為半山老人故跋胡笳集句云湓城王寅擬半山老人集句胡笳十八拍是也林下偶談云王介甫初字介卿王深甫集有臨河寄介卿詩曾南豐集亦有寄王介卿詩能改齊漫録載南豐懷友篇蓋集中所遺者其篇末云作懷友書兩通一自藏一納介卿家嬲王荆公詩細浪嬲雪千娉婷吳旦生曰委巷叢談云戲擾不已曰嬲音如裊嵇康絶交書云足下嬲之不置不過欲為官得人以益時用耳晉書諺云和嶠牛傅咸鞦王戎踢嬲不得休梁吳孜春閨怨云柳枝皆嬲燕桑葉復催蠶近顧大武飛將軍賦云聞東兵之入薊者為白鳥所嬲傾家王平甫詩傾家何計效韓公吳旦生曰此平甫謝陸農師贈簟之句因退之有簟詩云有賣直欲傾家資也按世說劉恢云見何次道飲令人欲傾家釀猶云欲傾竭家資以釀酒飲之也故魯直云欲傾家以繼酌退之不過借其意入簟用耳朱行中詩相逢盡欲傾家釀久客誰能散槖金以家釀對槖金便失本意霧淞曽子固冬夜詩云香消一榻氍毹暖月淡千門霧淞寒吳旦生曰墨莊漫録東北冬月寒甚夜氣寒空如霧著於林朩疑結如珠玉旦起視之真薄雪也見晛乃消釋因風飄落齊魯人謂之霧淞諺云霧淞重霧淞窮漢置飯甕蓋嵗穰之兆也子固有霧淞詩園林初日靜無風霧淞開花處處同東坡送曹仲錫詩斷逢飛葉落黃沙祇有千林䰒鬆花按霧淞音夢送與䰒鬆同音黃氏日抄云音夢送顧回瀾古雋云音孟送液雨如霧也字林云凍􅏖也楊升菴詩序云􅏖音索氷著樹如索也一作􅟶曽公衮戲作冷語云萬山雲雪隂霾空千林霧􅟶水搖風寒淺則為霧淞寒極則為朩稼然霧淞召豐而朩稼召凶不可不辨也按左傳魯成公十六年雨朩氷劉向以為氷者隂之盛而水之滯也朩者少陽貴臣卿大夫之象也此人將有害則隂氣脅朩朩先寒故得雨而氷也是時叔孫僑如出奔公子偃誅死漢書五行志朩氷亦曰樹介又曰朩稼稼即介之訛寒甚而朩氷如樹著介胄海録碎事云名朩氷為朩介甲兵之象也唐書寧王憲疾時京師寒甚凝霜封樹憲見而歎曰此樹稼也諺云朩若稼達官怕必有大臣當之吾其死矣十一月薨熙寧中華山圯氷成朩稼已而韓魏公薨故荆公挽之云朩稼嘗聞達官怕山頽果見哲人萎鳳凰臺存餘堂詩話曰李太白鳳凰臺詩昔賢評為千古絶唱郭功父和韻云髙臺不見鳳凰逰浩浩長江入海流舞罷青娥同去國戰殘白骨尚盈丘風搖落日催行棹潮擁新沙換故洲結綺臨春無處覔年年芳草向人愁真得太白逸氣是豈其後身耶吳旦生曰功父母夢李太白而生少有詩名袁世弼薦於梅聖俞聖俞曰天才如此真太白後身也故贈詩有采石月下訪謫仙之句人咸以為太白矣後同荆公登金陵鳳凰臺追次太白韻援筆立成一座盡傾然其泚筆飄逸絶無宋氣此詩亦能事也遁齊閒覽云功父曽題人山居云謝家莊上無多景只有黃鸝三兩聲荆公命工繪為圖自題其上云此是功父題山居處即遣人以金酒鐘并圖遺之羅漢王禹玉喜雨詩云良弼為霖辜夙望神僧作霧應精求吳旦生曰元豐間久旱不雨裕陵齊禱甚力夢一僧躍馬空中口吐雲霧既而雨作遣中貴人物色之得相國寺五百羅漢中第十三尊者輿入視之正所夢也禹玉詩記此又元厚之詩仙驥籋雲穿仗下佛花吹雨匝天流按相國寺羅漢本江南李氏時物在廬山東林寺曹翰下江南盡取其城中金帛寶貨連百餘舟私盜以歸無以為名乃取羅漢每舟載十許尊獻之詔因賜於相國寺當時謂之押綱羅漢云當句對王禹玉詩舞急錦腰迎十八酒酣玉􅊦照東西吳旦生曰樂府六么曲有花十八古有玉東西杯而十與八東與西乃當句對蓋昔人作詩有當句對而兩句更不須對者如陸魯望詩但說潄流同枕石不辭蟬腹與龜腸是也如李義山詩池光不定風光亂日氣初涵露氣乾但覺逰蜂饒舞蝶豈知孤鳳憶離鸞則中二聨俱用此體故其命題曰當句有對蘇子容席上詩舞奏未終花十八酒行先困玉東西俗語王君玉謂嘗有雪詩待伴不禁鴛瓦冷羞明當怯玉鈎斜吳旦生曰雪止未消者俗謂之待伴雪夜落者又謂之羞明兩以俗語採入句中此㸃石為金法也黃白石雪詩說道羞明却不羞日光玉潔共飛浮天人胸次明如洗肯似人間只暗投此又反其語而用之歷代詩話卷五十七
