body:
  text: 歷代詩話卷六十四歸安吳景旭撰壬前集下金詩桃源元德明遺山之父桃源行云憶昔携家竄岩谷秦人半向長城哭回頭塵土失咸陽繒弋徒勞羡鴻鵠吳旦生曰秦人半向長城哭下得渾然王荆公桃源行云望夷宫中鹿為馬秦人半死長城下髙齊詩話以指鹿乃二世事而長城之役乃始皇也又指鹿不在望夷宫中荆公用事失照管耳德明似本荆公句東坡謂世傳桃源事多過其實考淵明所記止言先世避秦亂來此則漁人所見似是其子孫非秦人不死者也漁隱叢話云東坡此論蓋辨證唐人以桃源為神仙如王摩詰劉禹錫韓退之作桃源行是也惟荆公作桃源行與東坡之論吻合林下偶談云淵明桃花源記初無仙語蓋緣詩中有竒蹤隱五百一朝敞神界之句後人不審遂以為仙如韓退之詩神仙有無何渺茫桃源之說尤荒唐劉禹錫詩仙家一出尋無踪至今流水山重重王摩詰詩初因避地去人間及至成仙遂不還王逢原詩云惟天地之茫茫兮故神仙之或容惟昔王之制治兮惡魅魑之人逢逮後世之陵夷兮固神鬼之爭雄此皆求之過也惟荆公與東坡和桃源詩所言最為得實可破千載之惑中州集藝苑巵言曰元遺山有中州集皆金人詩也金人如宇文虛中蔡松年蔡圭党懷英周昻趙秉文王庭筠其大㫖不外蘇黃要之直於宋而傷淺質於元而少情吳旦生曰金自北渡後詩教乃行遺山記録見聞歷二十寒暑載為野史而中州集其一也意故不止於詩而一經其手上下百餘年間金源氏之風烺烺可誦爾遺山自題中州集後云鄴下曹劉氣儘豪江東諸謝韻尤髙若從華實評詩品未便吳儂得錦袍陶謝風流到百家半山老眼淨無花北人不拾江西唾未要曽郎借齒牙萬古騷人嘔肺肝乾坤清氣得來難詩家亦有長沙帖莫作宣和閣本看文章得失寸心知千古朱絃屬子期愛殺溪南辛老子相從何止十年遲平世何曾有稗官亂來史筆亦摧殘百年遺稿天留在抱向空山掩淚看蓋遺山當哀宗之季及其亡也築亭於家不復出讀五詩者可以見其梗概矣金行元遺山咏菊詩黃素金行正芳甘藥品竒吳旦生曰范石湖菊譜黃者中之色土王季月而菊以九月花金土之應相生而相得者也其次白色西方金氣之應此遺山所謂黃素金行正也又月令注菊色言黃者秋令在金金有五色而黃為貴故菊色以黃為正埤雅云月令季秋菊有黃華曰有者非其有之時也春秋傳曰有者不宜有也余以此語非是按懸笥瑣探云石湖作菊譜言月令以動植志氣候如桃桐輩直云始華而菊獨云菊有黃華豈以其正色獨立不伍衆草變詞而言之與豫來河南行熊耳諸山時正秋黃菊藂生乃悟中州得風氣之正黃為正色而秋時著花此月令紀候所以獨言之也楊升菴云蝴蝶或白或黑或五采皆具惟黃色一種至秋乃多蓋感金氣也李白詩八月蝴蝶黃深中物理今改黃為來何其淺也烏白頭元遺山詩行役魚赬尾歸期烏白頭吳旦生曰史記但言天雨粟馬生角博物志云燕太子丹質秦欲歸秦王謬言曰烏頭白馬生角乃可丹仰而嘆烏即頭白俯而嗟馬生角秦王不得已而遣之曹子建詩子丹西質秦烏白馬角生鮑明逺詩潔誠洗志朝暮年烏白馬角寧足言白樂天詩我歸應待烏頭白髙季迪詩妾今能使烏頭白通俗文云白頭烏謂之鶷􅗾􅗾治八反雯華元遺山詩剝裂雯華漬月秋吳旦生曰雯文也雯成文章也又石文似雲亦曰雯華古三墳書日雲赤曇月雲素雯劉因登寺閣詩雯華寶樹忽當眼又遺山寶宫寺詩七重寶樹圍金界十色雯華擁畫梁妒女元遺山詩風雨不憂驚妒女吳旦生曰焚骸禁火之說余於庚集韓詩詳辨之今觀此詩序言俗傳介子推被焚其妹介山氏耻兄要君積薪自焚號曰妒女鄉社至今以百五日積薪而焚之謂之祭妒女唐大厯中制官李諲為撰祠碑有百日積薪一日燒之之語故遺山詩中有云稗官小說出閭巷社鼓村簫走翁媪當時大厯十才子爭遣李諲鑱陋語蓋亦譏其誣而詩人不深考為之撰辭爾然觀太平廣記云妒女者子推妹與兄兢去泉百里寒食不許斷火至今尚然則與百五日積薪而焚之語又何殊耶述異記云妒女泉在并州婦女不得靚籹彩服至其地必興雲雨一名介推妹楊升菴云廟在并州壽陽縣典刑元遺山贈劉仲修詩共知祭酒傳家學獨愛中郎餘典刑吳旦生曰遺山自序云仲修詩律深密得於尊公鳯山老人過庭之訓且其顔狀絶類吾友李從事長源故篇中有及按劉向為劉氏祭酒釋名云凡㑹同饗宴必尊長先用酒以祭先故曰祭酒漢時吳王年長以為劉氏祭酒是也女郎詩歸田詩話曰元遺山論詩三十首內一首云有情芍藥含春淚無力薔薇卧晚枝拈出退之山石句始知渠是女郎詩初不曉所謂後見詩文自警一編亦遺山所著謂有情芍藥含春淚無力薔薇卧晚枝此秦少遊春雨詩也非不工巧然以退之山石句觀之渠乃女郎詩也破却工夫何至作女郎詩按昌黎詩云山石斚確行徑微黃昏到寺蝙蝠飛升堂坐階新雨足芭蕉葉大梔子肥遺山固為此論然詩亦相題而作又不可拘以一律如老杜詩香霧雲鬟濕清輝玉臂寒俱飛蛺蝶元相逐並蒂芙蓉本自雙亦可謂女郎詩耶吳旦生曰遺山論詩直以詩作論也抑揚諷嘆往往破的少游乃填詞當家其於詩場未免踏入軟紅塵去故遺山所咏切中其病如鍾嶸評張華詩恨其兒女情多風雲氣少而遺山乃云風雲若恨張華少溫李新聲奈爾何則知遺山自出真裁非一切以女郎抹人也東野窮愁死不休髙天厚地一詩囚謂其出門有礙脫口便嗟也蘇門果有忠臣在肯放坡詩百態新惜其肆筆成章不受爐冶也萬古文章有坦途縱橫誰似玉川盧真書不入今人眼兒輩從教鬼畫符則直以外道詬之凡所彈駁皆足為談詩助又不獨一少游矣裙元遺山詩此去行廬千萬里畫羅休鏤麝香金吳旦生曰宋徽宗時宫人以麝香色為鏤金羅為衣裙故遺山及此按古制衣裳連下有裙隨衣色而為緣堯舜以降有六破及直縫皆去緣商周以其太質加花繡上綴五色自文王始令女人服裙秦始皇令宫人服五色花羅裙至今有短裙焉漢文帝後宫衣不曵地其貼地者以不纒足欲裙蓋之也漢明德太后秃裙不緣獻帝時女子好為長裙而上甚短梁武帝造五色繡裙加朱繩真珠為飾隋煬帝作長裙十二破名仙裙又制五色夾纈花羅裙又制單絲羅以為花籠裙唐杜牧之詩五陵年少欺他醉笑把花前出畫裙是唐裙亦可隱足也梁簡文詩羅裙宜細襇則裙之用襇此時已尚細矣留青日札云廣西婦女衣長裙後曵地四五尺行則以兩婢前携之襇多而細名馬牙襇海録碎事云後漢燉煌俗婦人作裙攣縮如羊腸用布一匹皇甫隆禁改之殷文圭詩空對䄡䄖一斷腸說文云直裙謂之䄡䄖範家餘冬序録曰元遺山集喬千户挽詩素旗無誄記連姻用潘嶽楊使君誄表之素旗語喬先皆毛氏壻故也集有聽姨女喬夫人鼓風入松一律白雪朱顔一冉行春風纎指十三星雲窗霧閣有今夕寶靨羅裙無此聲蕭灑寒松度虛籟悠揚飛絮攪青冥胎仙不比湘靈瑟五字錢郎莫漫驚所謂姨女喬夫人蓋千户之女也集又有喬夫人彩繡仙人圗一絶彩服仙童畫不如直疑萊子戲庭除青紅未是春風巧一頌椒花更有餘又有題喬夫人墨竹二絶萬葉千梢下筆難一枝新緑儘髙寒不知露閣雲窗晚幾就扶疏月影看只待驚雷起蟄龍忽從女手散春風渭川雲水三千頃悟在香嚴一擊中元自注夫人參曹洞下禪有省夫喬女明慧多藝如此而隂教內範則未有聞豈不可惜元之詩如此豈復知名教者哉考郝經遺山墓銘載其女有為女冠者今集貽女詩云珠圍碧繞三花樹李白桃紅一捻春看取元家第三女他年真作魏夫人又足知遺山之範家矣吳旦山曰閨秀詩評載元氏補天花版詩云補天手假暫鋪張不許纎塵落畫堂寄語新來雙燕子移巢别處覔雕梁按誠齊雜記遺山妹為女冠文而艷張平章欲娶之自往覘其所向至則方自手補天花版輟而迎之張詢近日所作應聲答以此詩張悚然而出余謂此真見遺山之範家也然墓銘為女雜記為妹俱屬女冠豈其有二人與歷代詩話卷六十四
