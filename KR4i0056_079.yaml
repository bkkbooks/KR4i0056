body:
  text: 歷代詩話卷七十九歸安吳景旭撰癸集下之中襲前藕居士詩話曰袁中郎力糾明詩藝林咸允十集出幾於紙貴其謂不襲前人一字一意恐未盡然略舉一二如庖人供薄餅稚子獻香梨襄陽有厨人具雞黍稚子摘楊梅落絮粘行牘老杜有落絮粘行蟻倦來看洗馬老杜有晚涼看洗馬感郎千金顧古詩有感郎千金意去日翟公猶有客到來潘嶽已無花鐵女有舊曲聽來猶有恨故園歸去已無家珠簾欲度聞仙語佺期有經聲欲度聞天語古屋繫龍兒老杜有古屋畫龍蛇東風吹綻紅亭草東風吹暖婁江樹唐人有東風吹緑瀛洲草文雅王元美清新孫太初即老杜之清新庾開府俊逸鮑參軍也六朝舊事殘鐘外即楊載之六朝舊恨斜陽外也大約此等偶襲古亦不避三百篇亦有之不足為病吳旦生曰中郎詩一變李何之習灑灑蕩蕩眼膜頓洗至其自謂不襲與必欲指其襲皆是習氣未除要之詩人工拙全不在此余最愛其别王百穀一律云河上清霜鴈字斜西風匹馬又天涯錦帆涇繞郎官舍冠子橋通處士家好事每供梅月水清齋長試榖前茶東鄰不是無姝子眼底何人解浣紗清疏絶俗中郎與百穀身分俱出謫歸湯義仍送臧晉叔謫歸湖上詩却笑唐生同日貶一時臧穀竟何云吳旦生曰晉叔先生為余之外舅從父行有晉風縱情任誕官南國子博士時余族祖湧瀾公亦為南駕部郎兩人每出必以棋局蹴毬懸之輿後此義仍所謂深燈夜雨宜殘局淺草春風恣蹴毬也晉叔又與小史衣紅衣並馬出鳳臺門中白簡罷官時唐仁卿以議文廟從祀偕貶同日出關故義仍有唐生臧穀之句然義仍所著詞曲四夢晉叔謂是架上書非場上調遂加芟潤義仍憤然作絶句擬之摩詰雪蕉矣秋草甲乙剩言曰頃入都詞人益寥落無幾而所見篇什惟吳允兆秋草十詩及汪明生秋閨雜咏翼翼可誦其他惟栁陳父元夕一結云看他何處不娛人及楊不棄溪上偶成沙頭小鴨自呼名而已至如朗哉公翰諸君都不復進吳旦生曰族祖允兆公秋草十章皆堪傳誦而八月幽并百草黃一章尤為選家所重兼善臨池好事者取公手揮秋草諸篇鐫之石肖公像於幀首野衣幅巾儼然癯叟也公集名射堂詩抄余之外祖母為公姪女詩得家法盛年孀節所著憂餘草哀餘草行世今選集所載吳淑貞是也惜二刻與射堂刻俱銓擇失當遺逸猶多以俟訂定養紙薰衣李本寧詩銀光紙養芙蓉粉金縷衣薰豈蔲香吳旦生曰嘗閲升菴集有云養紙芙蓉粉薛濤事薰衣豆蔲香霍小玉事而本寧為此聨亦比偶中佳語也崇禎中單蓴僧詩豆蔻篆雙參佛罷芙蓉箋界學書成又全用其語若沈景倩詩養紙芙蓉粉似脂瓠犀濡墨寫新詩沈令則詩芙蓉膩粉養成堆待取綾紋十樣來劉伯宗詩他年覔得芙蓉粉尚欲相期九萬枚則近時習用之矣弄虞長孺滿覺弄看花詩玉岑西望逼瑤城月路青青桂影橫吳旦生曰杭州南屏山之深處有名滿覺弄迤延數里皆植桂花崇禎癸酉秋八月嵇年祖凝宇公同先子往逰旭率諸弟操壺觴以從得窮其勝先子問名弄何義旭前曰髙下桂枝有石徑可通如人家之屋下小巷呼之為弄也離騷云五子用失乎家弄揚子云一閧之市皆訓巷即當作弄集韻弄厦也屏也又作蓋即今稱耳字書有一字而倍為兩字者如因弄字呼弄唐是也俗語有兩字而呼為一字者如合胡同為􅀈字是也南齊書蕭諶接鬱林王出西弄弒之此亦宫中别道如永巷之類隋書南寧有小勃弄大勃弄元經世大典有火弄注音弄王元美逰洞庭山記有風弄又弇山園記有鐵貓弄一云嚴陵瀨有風七里無風七十里土人謂之瀧或訛為籠皆當從此弄字楊升菴云弄者蓋弄字之轉音耳敬述前聞以對先子顧諸弟而笑曰汝兄之言辨懶婦曹能始桂州風謡二首末云懶婦田間過忙將織作陳吳旦生曰自注懶婦山豬也食人田禾以機杼之物陳設則止按述異記淮南有懶婦魚俗云昔陽氏家婦為姑所怒溺死化為魚象州異物志作死為獸脂可燃燭以之照鳴琴博奕則爛然有光及照紡績則不復明説文䱡魚酉陽雜俎奔䱐一名􅀈草朩子云即江豚也丹鉛續録魧魚即懶婦魚也多膏以為燈佛經謂之饞燈開元天寶遺事號為饞魚燈則能始所稱山豬即此類物理固有然者三雅五經李君實作飲酒詩登樓客在傳三雅問字人來揖五經吳旦生曰魏文帝典論云靈帝末斗酒直萬金劉表一子好飲乃製三爵大曰伯雅注云一斗一云受七勝即升字次曰中雅注云五升一云受六勝小曰季雅注云三升一云受五勝蓋君實用此而王粲依劉表作登樓賦故并及之耳潘逺紀聞談云閬中有人修池得三銅器狀如杯盞上各有二篆字一云伯雅二云仲雅三云季雅乃名此池為三雅池趙德麟云恐是盛酒器非飲器也曽存之云古人軀幹大升合小王仲弓傷寒證治論湯劑注云古方三兩當今一兩三升當今一升東觀漢記今日嵗首請上雅夀于志寧詩俱裁七步咏共傾三雅杯劉孝綽詩共摛雲氣藻同舉雅文杯廣韻㿿字注云酒器㿿即雅字也方言㿿閜􅦝􅡸皆杯也秦晉之郊謂之㿿所謂伯㿿也其大者謂之閜吳越之間曰􅦝齊右平原以東或謂之􅡸杯其通語也㿿音雅閜呼雅反􅦝音章􅡸音摩侯鯖録云陶人之為器有酒經焉晉安人盛酒似瓦壺之製小頭環口修腹受一斗可以盛酒凡饋人則書云酒一經或二經至五經焉他境人有逰於是邦不達其義聞五經至束帶迎於門知是酒五瓶為五經焉虎落龍鍾鍾伯敬編籬詩縳柴成虎落澆竹汰龍鍾吳旦生曰按鼂錯論邊塞事云為中周虎落注謂若今用竹虎以竹篾相連遮落于塞要下以沙布其表旦視其迹知冦來也揚雄羽獵賦虎落三嵕以為司馬一作虎路古音略云路音落疊也謂以繩周繞之世芳詩不須防虎落聊復策龍韜戲瑕云竹名龍鍾而唐詩雙袖龍鍾淚不乾則直以貌老人衰相矣然竹實有名龍鍾者羅浮山第三十一嶺半是巨竹皆七八圍長一二丈謂之龍鍾竹余按杜子美寄髙適岑參詩何太龍鍾極於今出處妨薛蒼舒注云龍鍾竹名謂其年老如竹之枝葉搖曳不自禁持取此義也殊不知南越志與羅浮山記所載龍鍾竹乃是希世之異物馬融長笛賦惟籠籦之竒生于終南之隂崕是也安得以年老取義注杜耶後人反援為故實而伯敬不考亦漫作此句緗素雜記云古語有二聲合為一字者如不可為叵何不為盍從西域二合之音切字之元也龍鍾潦倒正二合之音龍鍾切癃字潦倒切老字欲言癃欲言老即以龍鍾潦倒言之伯敬詩清迥自異全用歐九飛蓋橋玩月筆法與談友夏選古唐詩歸一時翕然稱之其後訾者日起吳逸一云讀詩歸知鍾談善索隱每取奇於句字之間至於全章主意却不理會宜不能服大匠心也此論切中其弊利瑪竇談友夏過利西泰墓云私將禮樂攻人短别有聰明用物殘吳旦生曰萬厯辛已大西洋奉耶蘇教者利瑪竇自歐羅巴國航海九萬里入中土始到肇慶劉司憲持其貢表上聞所貢耶蘇像萬國圖自鳴鐘鐵絲琴等上啓視嘉歎命給廪賜第宣武門內建天主堂供耶蘇像其上按耶蘇釋略云耶蘇譯言救世者尊主陡斯降生後之名也陡斯造天地萬物無始終形際因人始亞當以阿襪言不奉陡斯陡斯降世拔諸罪過人漢哀帝二年庚申誕於如德亞國童女瑪利亞身而以耶蘇稱居世三十三年般雀比刺多以國法死之死三日生生三日升去死者明人也復生而升者明天也越庚戌瑪竇卒詔以陪臣禮葬阜成門外二里嘉興觀之右白小談友夏詩夕煙河上黃茅屋秋雨橋邊白小魚吳旦生曰老杜白小詩白小羣分命天然二寸魚細微霑水族風俗當園蔬友夏評云形容細魚賤而多妙絶蓋老杜咏物之工髙出千古友夏深所矜賞因以入咏韻語陽秋言白小與菜無異豈復有厚味哉故白樂天亦有下飯腥鹹白小魚之句魚始二寸已就烹魚之窮也寒士又從而食之其窮抑甚又陸放翁詩羮釡帶鱗烹白小蓬門和蔓繫黃團山史陳伸醇詩花枝送客蛙催鼓竹籟喧林鳥報更吳旦生曰仲醇自言山鳥每至五更喧起五次謂之報更蓋山中真率漏聲也嘗居小崑山下適聞庭蛙請以節飲因題此聨可為山史實録余按小崑山二陸讀書處仲醇築臺其隂以棲隱焉少與董玄宰齊名侍御某督學至華亭兩人各自許第一已而揭名玄宰首仲醇在次遂裂儒衣冠焚之決計肥遁時年二十有九自是名傾海內有山中宰相之目薦剡上聞纍辟不起四方造請其廬乞片札以引重者幾於在陸滿車在水滿舟矣即下肆之一芒屩一粉餈無不曰此眉公鞋眉公餅云陳朩叔贈眉公詩金馬有星仍字隱玉璜雖夢不能臣潘朩公極賞此二語余弱冠晤眉翁於南屏山寺盤桓竟日因以詩投贈云仙家十賚陶𢎞景戰國一人魯仲連翁謝不敢當宣廟器張士昌觀宣爐歌云吁嗟乎此爐不可狀南鑄北鑄徒多樣曰除獸面象鼻與分襠戟耳魚耳斯為上又倪天樞宣磁謡云燦然者磁識宣皇當年盛時陶器良饒土凝雪骨薄剛如水泑光火則降又金聲觀宣廟漆器歌云人工化工二俱有百年收藏長在手奴驅倭漆兄剔紅請為宣皇記考工吳旦生曰器首宣廟之銅宣銅爐其首爐之製有辨焉色有辨焉欵有辨焉製所取宜書室登几案入賞鑒則莫若彛乳爐之口徑三寸者其製百摺彛爐乳爐戟耳魚耳蜒蚰耳薰冠象鼻獸面石榴足橘囊香奩花素方圓鼎等上也角端象頭鬲判官耳雞腿腳扁爐翻環六稜四方直腳爐漏空桶爐竹節分襠索耳等下也釘耳補欵者偽也色種種面色二蠟茶色汞浸擦薰洗為之有栗色有藏經紙有褐色有棠梨有茄皮鏒金色金泥塗炙成之有赤金霞片覆手色二雞皮紋色火氣久而成者迹如雞皮拂之實無迹也青緑硃斑色未經火氣久而成也欵亦製辨色辨之隂印陽文真書大明宣德年製字完整地光澤與爐色等非經雕錯者近有北鑄以施家名有蘇鑄以甘家名有南鑄以甘家名每以偽得真售然製即可偽也欵即可偽也色終不可為偽宣爐色黯然奇光在裏審視如膚肉內色藴火爇之彩爛善變偽者外光奪目內質理疏稿然矣傳宣廟時內佛殿災金銀銅像渾而液因用鑄器非也宣廟欲鑄爐問工銅何法煉而佳工奏煉至六則現殊光寶色異恆銅矣上曰煉十二乃鑄也先是永樂間鑄燒斑彛耳多寬索腹多分襠後是景泰成化間鑄獅頭彛厚赤金作雲鳥片帖鑄之欵用藥燒景泰年製等字質色製欵無如宣爐者其他宣器質色如爐也而入賞鑒則亞之次窰器古曰柴汝官哥均定在今則永宣成正嘉萬官窰其時饒土入地未惡其土骨紫白料法泑藥水法底足火法花青畫彩法雅既入古緻又盡今故懸日無多而購市重直傳世永寶焉永窰之壓手杯傳用可久價直甚髙坦口折腰沙足滑底外深青花內雙獅毬毬內篆書永樂年製細如粒米鴛鴦心次之花心次之近者倣之以蠢厚約略形似耳宣窰之紅魚􅧥杯末西紅寶石塗魚形泑內燒出泑上寶紅凸起紫黑者火候失也青花茶􅧥杯畫龍松梅酒􅧥杯畫人物海獸硃砂小壺大碗色紅鮮白鎖口竹節滷壺小壺匾罐皆罩蓋者爐瓶盤碟敞口花尊蜜漬桶罐多五采者白壇盞心有壇字暗花白茶盞甕肚釡底綿足裏有龍鳯暗花底有大明宣德年製暗欵坐墩等有漏花填彩有實花填彩皆深青地有藍地填彩有白地青花有氷裂紋器式繢事皆發古未有而橘皮紋起隱隱然他則水注五采桃注石榴注彩色雙瓜注雙鴛注鵝注筆洗魚藻洗葵瓣洗磬口洗螭洗兩臺燈檠雀食罐蟋蟀盆等成窰之葡萄􅧥杯五彩敞口匾肚草蟲可口子母雞勸杯人物蓮子酒盞草蟲小盞青花酒盞薄才如紙齊筯小碟香盒小罐皆五采者嘉窰之青花五彩二窰製器悉備有小白甌亦曰壇盞醮壇用器內書茶酒棗湯薑湯等字三色魚匾盞磬口饅心圓足紅鉛小花合子等大如錢有青花有紅花蓋永尚厚成尚薄宣青尚淡嘉青尚濃成青未若宣青蘇浡泥青也宣彩未若成彩淺深入畫也嘉萬之回青特為幽菁隆窰之春宫不入鑒藏是其别已其同者汁水瑩厚如堆脂汁中棕眼有若蟹爪也質料膩實不易茅蔑也磨弄嵗深火色退淨也今市所爭購多當年不中御用者其有龍紋五爪不落民間或碾去一爪而亦市之次漆器古犀毗剔紅創金攢犀螺鈿市時時有而今則剔紅填漆倭漆三者剔紅宋多金銀為素今錫朩為胎永樂中則果園厰製合盤匣不一合有蔗段蒸餅河西三撞兩撞等式盤有圓方長八角縧環四角牡丹瓣等式匣有長方四方二撞三撞四式其法朱漆三十六次鏤以細錦底漆黑光針刻大明永樂年製字以比元作者張成楊茂劍環香草之式似為過之宣德中製同永樂而特紅鮮底用刀刻大明宣德年製填以金屑偽造者用礬朱或灰團起外硃漆二層曰罩紅也填漆刻成花鳥彩填稠漆磨平如畫久逾新也倭漆胎輕漆滑鉛鈐口金銀片漆中金屑燦燦如飛金無少渾暗有圓三五七九子合有方四六九子匣其小合匣重止三分有三撞合有粉扇筆等匣有木銚有角盥中土盡其技者稱蔣製倭漆與潘製倭銅焉正統中楊塤之描漆汪家之彩漆設色如畫用粉入漆久乃如雪或曰真珠粉也隆慶中方信川之堆漆螺蜔黃平沙之剔紅人物精采刀法圓滑雲南雕法雖細用漆不堅刀不藏鋒稜不磨熟矣次紙墨紙不如舊墨不如新宣紙至薄能堅至厚能膩箋色古光文藻精細有貢箋有綿料式如榜紙大小方幅可揭至三四張邊有宣德五年造素馨紙印後則有白箋堅厚如板兩面砑光如玉有灑金箋有灑金五色粉箋有金花五色箋有五色大簾紙有磁青紙堅韌如段素可用書泥金字有藍紙薄不能佳外則有薛濤蜀箋鏡面髙麗箋松江談箋新安倣宋藏經箋等墨欲黑古墨色光如漆濃不湮沁淡不脫神今其法不可得時御用內墨則宣廟之龍鳯大定青填金填大明宣德年製字别有朱藍紫緑等定外則國初之查文通龍忠迪碧天龍氣水晶宫二種方正牛舌墨蘇眉陽卧蠶小墨嘉萬之羅小華小道士等汪中山太極十種玄香太守四種客卿四種松滋侯四種邵格之方于魯青麟髓等其子子封曰羲蒼篆程君房玄元靈氣等方程墨各有譜今之潘嘉客紫極龍光潘方凱開天容吳名望紫金霜吳去塵不可磨未曾有等而市品價尤重者始方羅中方程今兩吳也其為質輕煙細易松以桐易桐以脂煙百兩油三石今五石矣茜染獨草今用剖矣若遂能取巨勝油煙徐鉉李廷圭何足殊異哉見帝京景物略雌甲申維烈贈曾弗人同庚詩雌甲幸同豫共汝吳旦生曰諧噱録裴晉公在相位有人寄槐癭一枚欲削為枕郎中庾威捧玩良久曰此是雌樹生者恐不堪用裴曰郎中甲子多少庾曰某與令公同是甲辰生公笑曰郎中便是雌甲辰范石湖云夏月值甲子日雨以妨農為憂老農云喜遇雙日是雌甲子雖雨無妨因考嵗時雜占注云甲子值隻日多驗雙日少驗古詩云老尚誇雌甲狂寧作散仙蓋古人原有雌雄之説草年申維烈詩草年風雨隔胡牀吳旦生曰入聲十四緝韻中載草字詩家往往用二十作草蓋古文省便字也按説文草人汁切二十并也卉蘇沓切三十并也卌先立反四十并也玉篇草如拾切卉先闔切廣韻二十七合中音趿二十八盍又收卌先入切容齋隨筆云秦始皇凡刻石頌德之辭皆四字一句泰山辭曰皇帝臨位二十有六年琅琊臺頌曰維二十六年皇帝作始之罘頌曰維二十九年時在中春東觀頌曰維二十九年皇帝春逰會稽頌曰德惠修長三十有七年此史記所載每稱年者輒五字一句嘗得泰山辭石本乃書為草有六年想其餘皆如是而太史公悮易之或後人傳寫之訛耳其實四字句也余觀國語云行玉草榖正作此字顔之推稽聖賦中山何夥有子百草犢鼻尹子求登華山詩脫却深衣宜犢鼻攀來絶壁是猿身吳旦生曰司馬相如傳身自著犢鼻褌滌器市中師古注即今之衳之容反也形似犢鼻故名余按明堂圖人身兩膝以下有穴名犢鼻西溪叢語云膝上二寸為犢鼻穴蓋言褌之短僅至于此也寧戚南山歌短布單衣適至骭老杜同谷歌短衣數挽不掩脛亦同此意則顔師古韋昭之注皆悮留青日札云以三尺布為之形如牛鼻蓋前後各一幅中裁兩尖襠交輳即今之牛頭孑褌一名梢子乃為農夫田衣而士人無復服之者此説俚甚顔俠客茅止生咏顔俠客詩俠香不得狂飈揚猶是吳趨一酒人吳旦生曰天啓間楊副院漣首暴璫罪一時清流之禍緹騎四出周銓部順昌被逮民大譁顔佩韋創義洶變手殺一校尉已而談笑入西市目當事曰我死而生諸公生而死矣同坐死者五人吳因之率衆葬之虎丘勒石曰五人之墓今巋然存也止生作二十八忠詩以表諸君子又作三奇詩顔其一也顔沈湛里中鬬走技擊為雄卒之慷慨赴義賢於衣冠逺矣止生為鹿門先生之孫年十嵗吳興大祲太守陳幼學議輸賑人囁嚅莫敢應止生垂髫奮袖請傾家廩以濟荒太守嘆曰此異童子也長而好談兵進武備志待詔翰林改授副總兵以罪遣戍因呼憤縱酒而死于昭逺感述云氣滿揮戈遑駐日心傾指囷遡駒年又云北闕籌兵真武庫西曹謗篋似文淵歷代詩話卷七十九
