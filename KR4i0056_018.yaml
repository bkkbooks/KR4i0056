body:
  text: 歷代詩話卷十八歸安吳景旭撰丙集中之下賦旦刷晝秣顔延之赭白馬賦旦刷幽燕晝秣荆越吳旦生曰旦北而晝南形容馬之疾也謝莊舞馬賦朝送日於西阪夕歸風於北都尋瓊宮於倐瞬望銀臺於須臾亦同此意杜甫驄馬行云晝洗須騰涇渭深夕趨可刷幽并夜李白天馬歌云雞鳴刷燕晡秣越則直用延年語矣出豕顔延之赭白馬賦戒出豕之敗御惕飛鳥之跱衡吳旦生曰王子期為趙簡子御彘突出溝中馬驚敗駕詩話以出字不如突字一經道破便覺出豕二字眼乖口剌蓋改本有勝於原本者此等是也盈尺謝惠連雪賦盈尺則呈瑞於豐年袤文則表沴於隂德吳旦生曰呂向注隱公之時大雪平地一尺是嵗大熟為豐年桓公之時平地廣一丈以為陽傷隂盛之徵按左傳於隱公云平地尺為大雪不言是嵗大熟桓公八年冬十月雨雪未聞其廣一丈也唐朱灣雪詩平地巳霑盈尺潤年豐須荷富人侯亦用謝賦意耳瓊樹詩話類編曰瓊赤玉也謝惠連雪賦林挺瓊樹世豈有赤雪耶李義山詩巳隨江令誇瓊樹李長吉詩白天碎碎墮瓊芳相承誤用皆不考之過吳旦生曰麈史亦言説文以瓊為赤玉比見人咏白物多用之韓愈雪詩若非燖鵠鷺定是屑瓊瑰又馬蹄踏作瓊瑤迹為有詩從鳳沼來將别有所稽耶豈用之不審也余觀楊升庵引詩尚之以瓊華尚之以瓊英尚之以瓊黃則瓊為玉之光彩非赤玉也又觀天中記云詩報之以瓊琚傳瓊玉之美者琚佩玉名疏言琚是玉名則瓊非玉名故云瓊玉之美者言瓊是玉之美名非玉之名也陳張正見詩睢陽生玉樹雲夢起瓊田隋王衡詩璧臺如始搆瓊樹似新栽據此則瓊訓赤者非是而謝賦與諸詩自有所出也碭突梁簡文帝箏賦奔雷碭突而彌固吳旦生曰碭徒郎切以唐為碭馬融長笛賦奔遁碭突簡文蓋本此按無鹽唐突西子此晉人語也孔融傳唐突宫掖魏志豈宜唐突列侯劉禹錫鏡詩瓦礫來唐突李白赤壁歌鯨鯢唐突留餘迹太平廣記載曹植牛鬬詩行彼土山頭歘起相搪突王勉夫謂碭唐搪三字不同皆一意爾燭銀江總貞女峽賦含照曜之燭銀吳旦生曰穆天子傳天子之寶璿珠燭銀拾遺記漢武帝元封元年浮欣國貢蘭金之泥此金百鑄其色變白有光如銀即燭銀是也郭璞江賦雲精爥銀注云銀有精光如爥也爥即燭字梁簡文詩燭銀踰漢女盧思道詩瑞銀光似燭蓋指此至如陳子昂春夜詩銀燭吐清煙金尊對綺筵賈至早朝詩銀燭朝天紫陌長禁城春色曉蒼蒼則以燭銀作銀燭用耳雌霓沈約郊居賦駕雌霓之連蜷泛大江之悠永吳旦生曰郭璞謂虹為雩俗呼為美人霓注雌虹也劉敬叔謂古有夫妻荒年菜食而死俱化成青絳故呼美人虹唐樓穎詩枝交帝女樹橋映美人虹本此楊升庵為水虹屈霓也滇人呼為水樁虹霓之短者沈約所云雌霓漢書所謂屈虹也按初學記云凡虹雙出色鮮盛者為雄雄曰虹暗者為雌雌曰霓東方朔七諫載雌霓而為旌張衡七辨建雌霓以為旗約語本此然天文率多以雌雄言者宋玉風賦此所謂大王之雄風也此所謂庶人之雌風也師曠占云春雷初起其音格格霹靂者所謂雄雷旱氣也其鳴依依不大霹靂者所謂雌雷水氣也虞喜論漢太初厯云嵗雄在閼逢雌在攝提格月雄在畢雌在觜日雄在子又云甲嵗雄也畢月雄也㖩月雌也大抵以十干為嵗陽故謂之雄十二支為嵗隂故謂之雌霓讀作入聲南史沈約作郊居賦以草示王筠筠讀雌霓為雌鶂約撫掌曰霓字嘗恐人呼為平聲范蜀公召試學士院用彩霓作平聲考試者判郊居賦霓五結切范為失韻司馬溫公曰約賦但取聲律便美非霓不可讀為平聲也然余考霓字有不讀平聲者如張衡西京賦直墆霓以髙居注霓五結切南都賦或峮嶙而纚聨或豁爾而中絶鞠巍巍其隱天俯而觀乎雲霓則霓與絶叶皆入聲又屈原九章云處雌霓之標顛注霓五訖反逺遊云雌霓便娟以增撓兮注霓五結反則約之不作平聲亦有本也翠茿江淹去故鄉賦云北風析兮絳花落流水散兮翠茿疏吳旦生曰翠茿一作􅟏草名蓂莢實也田俅子云堯為天子蓂莢生於庭為帝成厯故曰蓂厯亦謂之歷草帝王世紀云堯有草夾階而生每月朔生一莢月半則生十五莢自十六日一莢落至月晦而盡月小則餘一莢厭而不落以為瑞草名為蓂莢大戴明堂篇又謂朱草日生一葉至十五日生十五葉十六日一葉落唐律賦云朱草合朔螢雪叢説云今人祝夀之詞多用律呂體狀其月又用蓂莢形容其日然而誕辰若在月半以前一日生長一葉乃是增數誠為美事儘好使也若在月半以後一日雕零一葉乃是減數實為語忌烏可使也孺人稚子江淹恨賦左對孺人右顧稚子吳旦生曰儲光羲詩孺人善逢迎稚子解趨走韓愈詩已呼孺人戛鳴瑟更遣稚子傳清杯以此作對皆自江賦中來而杜甫詩云老妻畫紙為棊局稚子敲針作釣鈎便成韻事綸組蕭子雲玄圃賦漂青綸之衰折蕩碧組之鬖髿吳旦生曰爾雅綸似綸組似組東海有之郭璞注云綸今有秩嗇夫所帶紏青絲繩組綬也海中草生彩理有象之者因以名云左思吳都賦綸組紫絳注云四者皆海中草揚子所謂五兩之綸仲長統所謂半通之綬者也子雲賦長卿晚翠簡子秋紅楊升庵謂長卿則草中徐長卿藥名是也簡子取本草編檢之無有近觀齊民要術云簡子藤生緣樹朩實如梨赤如雞冠核如魚鱗取生食之淡泊甘苦乃知子雲引用必此物也余按南方草朩狀云簡子藤正月二月華四月五月熟出交趾合浦廣志云侯騷蔓生子如雞卵既甘且冷輕身消酒又名簡子藤所謂簡子秋紅也蔓支庾信哀江南賦章蔓支以轂走宫之奇以族行吳旦生曰呂氏春秋中山之國有夙繇者智伯欲攻之鑄大鐘方車二軌以遺之夙繇之君將迎鐘赤章蔓支諫不用斷轂而行至衛七日而夙繇亡其事與滅虞同故與宫之奇並稱襲句困學記聞曰庾信馬射賦落霞與芝蓋齊飛楊栁共春旗一色王勃效其語江左卑弱之風也吳旦生曰庾信所云直是雲霞之霞矣按吳獬事始云王勃滕王閣序落霞與孤鶩齊飛秋水共長天一色落霞者飛蛾也土人呼為霞蛾至若鶩者野鴨也野鴨飛逐蛾蟲而欲食之所以齊飛若雲霞之霞則不能飛也蓋其時閻公髙會聓有宿搆見此二語愧匿而不復出古今因以為工野客叢書云觀駱賓王集亦曰斷雲將野鶴俱飛竹響共雨聲相亂曰金飈將玉露俱清栁黛與荷緗漸歇曰緇衣將素履同歸廊廟與江湖齊致則知當時文人皆為此等語且勃此語不獨見於滕王閣序如山亭記亦曰長江與斜漢爭流白雲將紅塵並落歐公集古録載長夀寺碑與西清詩話如此等語不一因觀文選及晉宋間集如劉孝標王仲寶陸士衡任彥升沈休文江文通之流往往多有此語信知唐人句格皆有自也李商隱曰青天與白水環流紅日共長安俱逺陳子昻曰殘霞將落日交暉逺樹與孤煙共色曰新交與舊識俱歡林壑共煙霞對賞按隋長夀寺舍利碑浮雲共嶺松張蓋明月與巖桂分叢又禇淵碑風儀與秋月齊明音徽共春雲等潤玉臺集序金星將婺女爭華麝月與常娥競爽薛逢云原花將晚照爭紅怪石與寒流共碧古度平仲君遷庾信枯樹賦若夫松子古度平仲君遷吳旦生曰左思吳都賦平仲君遷松梓古度劉成注云平仲之朩實白如銀君遷之樹子如瓠形古度不花而實子皆從皮中出余按交州記云古度樹不花而實實從皮中出大如安石榴色赤可食其實中如有蒲䔧者取之為粽數日不煮皆化成蟲如蟻有翼穿皮飛出著屋正黑廣州記云熙安縣有古度樹俗人無子於祠炙其乳則生男以金帛報之庾信詩含風搖古度防露動林於平本作枰司馬相如上林賦華楓枰櫨注云枰平仲朩蓋其朩理平可為棊局故棊局曰枰沈佺期詩芳春平仲緑清夜子規啼君遷本作桾櫏出交趾交州記云有君遷樹有朝臺尉陀望漢所築也陸龜蒙寄南海同年詩庭中必有君遷樹莫向空臺望漢朝魏王花朩志云君遷樹細如甘蕉子如馬乳司馬溫公名苑云君遷子如馬妳俗云牛妳柿是也今之造扇用此柿油曲洧舊聞云蘇東坡至儋耳見野花如芍藥而小鮮紅可愛土人曰倒黏子花也結子如馬乳海南無柿人取其皮剝浸爛杵之得膠以代柿漆蓋愈於柿也此即溫公所云耶然觀焦弱侯云今本草有君遷又言即柿漆非也别有椑柿間居賦梁侯烏椑之柿是也歷代詩話卷十八
