body:
  text: 歷代詩話卷五十八歸安吳景旭撰辛集中之上宋詩明允石林詩話曰蘇明允至和間來京師既為歐陽文忠公所知其名翕然韓忠獻諸公皆待以上客嘗遇重陽忠獻置酒私第惟文忠與一二執政而明允乃以布衣參其間都人以為異禮席間賦詩明允有佳節屢從愁裏過壯心時傍醉中來之句其意氣尤不少衰明允詩不多見然精深有味語不徒發正類其文如讀易詩云誰為善相應嫌瘦後有知音可廢彈婉而不迫哀而不傷所作自不必多也吳旦生曰何燕泉謂佳節屢從愁裏過何無養也壯心時傍醉中來是不能以德將也道山清話老蘇以兵書遍見諸公貴人皆不甚領略有人言於富韓公公曰此君専勸人殺戮以立威豈得直如此要官職做然則蘇當時愁態壯心亦可嘆耳余不然其説如后山議明允不能詩苕溪已斥其誣矣觀雅安守劉太簡以書薦於韓魏公歐陽文忠公張文定公辭甚愷切文亦高雅而張安道守成都時乃為作書辦裝使人送之京師謁文忠文忠得明允父子所著書大喜曰後來文章當在此即極力推譽蓋文忠能重布衣而劉張二守亦交相薦引之亦其才足動人也瑞桂堂暇録云老泉攜東坡潁濵謁文定公時方習制科業將應詔文定公忽出題令人持與坡潁云請學士擬試文定密於壁間窺之兩公得題各就坐致思潁於一題有疑指一示坡坡不言但舉筆倒敲几上云管子注潁濵疑而未決也又指其次東坡以筆勾去即擬撰出以納文定閲其文益喜勾去一題乃無出處文定欲試之也次日文定見老泉云二子皆天才長者明敏尤可愛然少者謹重成就或過之所以二公受知文定而潁濵感之尤深按子瞻一字和仲謫黃州時築室於山之東坡遂號東坡居士子由一字同叔子瞻詩還須略報老同叔又元日立春云已卯嘉辰夀阿同元日己卯為子由本命也又遺觀音像云持是夀卯君蘇小妹好學能文適其母兄程濬之子之才老蘇詩云汝母之兄汝伯舅求以厥子來結姻鄉人嫁娶重母族雖我不肯將安云老人泉蜀中詩話曰東坡老翁泉詩井中老翁娛年華白沙翠石公之家公來無蹤去無迹井面團露水生花翁今與世兩無與何事紛紛驚牧豎改顔易服與世同無使世人知有翁説家又載東坡圖書刻有老泉二家如此則老泉之號未應屬明允也吳旦生曰石林燕語載子瞻晚年號老泉山人以眉山先塋有老人泉故云又於卷册間見有東坡居士老泉山人八字共一印其所畫竹或用老泉居士朱文印章則老泉是子瞻號矣歐陽公作明允墓志但言人號老蘇而不言其所自號亦可疑者余按明允嘉祐集云十數年前月夜見一老翁蒼顔白髮偃息泉上就之則隱而入於泉洵甃以石建亭覆之而為之銘又東坡謂與子由弟少時為梅二丈所知家有老人泉梅公為作詩又東坡送賈訥倅眉詩老翁山下玉淵回手植青松三萬栽自注云先君葬於蟇頥山之東二十餘里地名老翁泉崖蜜野客叢書曰東坡橄欖詩待得微甘回齒頰巳輸崖蜜十分甜冷齋夜話謂事見鬼谷子崖蜜櫻桃也漫叟漁隱諸公引本草石崖間蜂蜜為證僕謂坡詩為橄欖而作宜以櫻桃對言世謂棗與橄欖爭曰待你回味我已甜了正用此意蜂蜜則非其類也嘗考石蜜有數種本草謂崖石間蜂蜜為石蜜又有所謂乳餳為石蜜者廣志謂蔗汁為石蜜其不一如此安知古人不以櫻桃為石蜜乎觀魏文帝詔曰南方有龍眼荔枝不比西園蒲萄石蜜以龍眼荔枝相對而言此正櫻桃耳豈餳蜜之謂耶坡詩當以此證吳旦生曰景龍文館記云上幸兩儀殿命侍臣升殿食櫻桃其櫻桃並盛以琉璃和以杏酪飲酴醿酒托言云唐新進士尤重櫻桃宴乾符中劉潭及第時櫻桃初出和以糖酪人享蠻畫一小盎不啻數升杜牧之櫻桃詩忍用烹酥酪從將玩玉盤流年如可駐何必九華丹則知唐時已用櫻桃薦酪也既入糖酪便似石蜜則坡詩所言崖蜜其為櫻桃無疑鼠璞云南海志崖蜜子小而黃殼薄味甘增城惠陽山間有之不知與櫻桃為一物與否要其類也李義山蜂詩紅壁寂寥崖蜜盡此但作蜜用非是此詩首句云紛紛青子落紅鹽范景仁言橄欖本高大難採以鹽擦木身則其實自落所以有落紅鹽之語圖經感攬俗作橄欖太平廣記南威橄欖也金樓子云有樹名獨根分為二枝其東向一枝是朩威樹南向一枝是橄欖樹一云名為青子者凡果始青漸黃而橄欖則長青也稱青子不言橄欖可知亦猶稱黃花不言菊可知也北臺詩話類編曰東坡雪後書北臺壁二首詩城頭初日始翻鴉陌上晴泥已沒車凍合玉樓寒起粟光搖銀海眩生花遺蝗入地應千尺宿麥連雲有幾家老病自嗟詩力退空吟氷柱憶劉乂方萬里云雪宜麥而辟蝗蝗生子入地雪深一尺蝗子入地一丈玉樓為肩銀海為眼道家語蓋黃庭一種書相傳有此説又詩云黃昏猶作雨纎纎夜靜無風勢轉嚴但覺衾禱如潑水不知庭院巳堆鹽五更曉色侵書幌半夜寒聲落畫簷試掃北臺看馬耳未隨埋沒有雙尖方云馬耳山名與臺相對坡知密州時作年三十九嵗偶然用韻甚險而再和尤佳東坡再用韻二首云九陌凄風戰齒牙銀杯逐馬帶隨車也知不是堅牢玉無奈能開頃刻花對酒強歌愁底事閉門高卧定誰家臺前日暖君須愛氷下寒魚漸可乂又巳分酒杯欺淺懦敢將詩律鬬深嚴漁蓑句好真堪畫桞絮才高不道鹽敗履尚存東郭指飛花又舞謫仙簷書生事業真堪笑忍凍孤吟筆退尖方云鄭谷漁蓑道韞栁絮賴此增光而世無異論退之詩兔尖齊莫並若苦寒則退尖矣李白詩好鳥迎春歌後院飛花送酒舞前簷乂尖二字和得全不喫力此詩冠絶古今非天才萬卷書胸未易至此王荆公胡淡菴心服屢和俱壓不倒始知詩有絶作不當復和吳旦生曰唐詩紀事劉乂聞韓愈接天下士步謁之作氷柱雪車二詩出盧孟右樊宗師見為獨拜蓋此二章押韻險澀而乂尖二字尤難黃常明謂眉山雪詩能用韻如云氷下寒魚漸可乂和羔袖龍鍾手獨乂蓋子厚嘗云江魚或共乂又云入郡腰常折逢人手盡乂據此則前人落筆各自有本耳水經注馬耳山高百丈上有石並舉雙聳如馬耳示兒編云王晉之與霍辨對談雪盈尺王曰雪太深乎霍曰看北臺馬耳果何如左右曰有兩尖在坡蓋用此胡元瑞云玉樓銀海句格自佳而據道書玉樓為肩銀海為眼以起粟生花襯之遂墮千古惡道學詩者不可不知茉莉檳榔冷齋夜話曰東坡在儋耳見黎女插茉莉嚼檳榔戲書薑秀才几間云暗麝著人簪茉莉紅潮登頰醉檳榔其放如此吳旦生曰佛書翻譯名義云末利曰鬘華堪以飾鬘此土云奈晉書都人簪奈花云為織女帶孝月令通考云茉莉花自西國移植南海古詩曰五月炎州路千叢撲地開後宣和中名著艮嶽列芳草八此居一焉洛陽名園記作抹厲陳止齋作沒利王梅溪作抹利洪容齋作末麗朱元晦作末利墨莊漫録云一名抹麗謂能掩衆花也顔持約謫官嶺表愛而賦詩云譬如追風騎一抹萬馬羣陸賈南行紀云南越五穀無味百花不香獨有二花不隨水土而變謂素馨與茉莉也按素馨香特酷烈彼中女子以綵絲穿花心繞髻為飾楊誠齋詩穿花貫縷盤香雪曽把風流惱陸郎廣志云劉玉女名素馨死葬于此其墓上生那悉茗花因名素馨西溪叢語曰閩廣人食檳榔每切作片蘸蠣灰以荖荖音老又蒲口切葉裹嚼之初食微覺似醉面赤故坡云紅潮登頰庾肩吾所謂無勞朱實兼荔枝之五滋能發紅顔類芙蓉之十酒也然余觀韓翃詩檳榔滿把能消酒豈醉人赤面而又言消酒亦甚疑之後見鶴林玉露云檳榔之功有四醒能使之醉醉能使之醒飢能使之飽飽能使之飢乃知蘇韓二詩不為矛盾也李當之藥録檳榔一名檳門上林賦仁頻師古注即檳榔也尖長而有紫紋者名檳圓而矮者名榔俞益期與韓康伯箋云檳郎朩大者三圍高者九丈葉聚樹端房棲葉下華秀房中子結房外其擢穗似黍其綴實似槲其皮似桐而厚其節似竹而概其中空其外徑其屈如覆虹其伸如縋繩步其林則寥朗庇其隂則蕭條顧屠漁隱叢話曰東坡送顧子敦詩有會當勒燕然廊廟登劒履之句山谷和云西連魏三河東盡齊四履或云東坡見山谷此句頗忌之以其用事精當能押險韻故也然東坡復自和云我以病杜門商頌空振履蓋諸公餞子敦以病不往押韻用事豈復不佳山谷亦再和有發政恐傷民天步薄氷履之句押韻又似牽強也吳旦生曰王直方詩話顧子敦有顧屠之號以其肥偉也故東坡送子敦奉使河朔詩云我友顧子敦軀贍多雄偉便便十圍腹不但貯書史又云磨刀向豬羊釃酒會鄰里至於云平生批敕手亦皆用屠家語也子敦讀之頗不樂東坡遂和前篇末句云善保千金軀前言戲之耳東臯雜録云尹京時與從官同集慈孝寺子敦憑几假寐東坡大書案上曰顧屠肉案同會皆大笑又以三十金擲於案上子敦驚覺東坡曰且片批四兩來復齋漫録云子敦與山谷同在館中夏多晝寢山谷俟其熟睡時即於子敦胸腹間寫字子敦苦之一日據案上而卧既覺曰爾亦無如我何及還舍夫人詰其背字脫衣示之乃山谷所題詩云緑暗紅稀出鳯城暮雲樓閣古今情行人莫聽宫前水流盡年光是此聲乃市井輩多用此詩以文背故山谷亦因以戲之銀床蘇東坡詩露帳銀床初破睡吳旦生曰唐人謂井上朩闌曰金井欄如太白詩絡緯秋啼金井欄是也又曰銀床如子美詩露井凍銀床是也名義考云銀床非欄蓋轆轤架也廣韻轆井轤圓轉朩也用以汲水喪大記以紼繞碑間之鹿盧南人謂之油葫蘆北人謂之滑車余觀古舞曲之言淮南王云後園鑿井銀作床金瓶素綆汲寒漿則此説良是要皆指井而為言也東坡用作卧息之床恐誤然觀令狐詩玉箸千行落銀床一半空則自唐時已誤作空床用矣許彥周詩話載嘉祐時河濵人網得一石刻詩曰雨滴空階曉無心換夕香井梧花落盡一半在銀床按禇記室謂金井飄梧以葉上有金井字非井也觀小詩得此義如臯緗素雜記曰左傳昭公二十八年賈大夫娶妻美御以如臯射雉獲之杜預注云為妻御之臯澤如訓之則非地名明矣而東坡和人會獵詩云不向如臯間射雉歸來何以得卿卿真誤也吳旦生曰復齋漫録引古樂府張正見雉子班云惟當渡弱水不怯如臯箭毛處約雉子班云能使如臯路相迎巧笑開皆用賈大夫事而東坡蓋承古樂府之誤耳若潘安仁射雉賦云昔賈氏之如臯試解顔之一笑山谷南園記云可盡記子之言我將鑱之南園之石他日御以如臯雖不獲雉尚期一笑哉二公真得傳意玉奴東坡詩玉奴絃索花奴手吳旦生曰玉奴謂楊貴妃花奴謂汝陽王璡也按南史東昏侯妃潘玉奴又長恨歌傳楊太真生而有玉環在其左臂環上有墳起太真二小字故小名玉環西粵志云玉環容州人長史楊玄琰以千金得之楊康家則坡詩似誤然觀鄭嵎津陽門詩玉奴琵琶龍香撥注云玉奴乃太真小字也復齋漫録云東坡梅花詩月地雲階慢一樽玉奴終不負東昏南史東昏妃潘玉兒有國色牛僧孺周秦行記潘妃辭曰東昏以玉兒身死國除不忍負他注云玉兒妃小字也坡以兒為奴誤也據此則玉奴之誤余竊謂在潘不在楊矣余觀詩中稱謂有不可泥者樂天長恨歌云中有一人字玉真荆公梅花詩云膚雪參差是玉真則又呼楊妃為玉真余觀楊鐵崕題並笛圖云玉奴絃索花奴鼓閹奴節腔渾奴舞阿環自品玉玲瓏御手移遊親按譜則似玉奴别是一人而阿環正指妃也又見張思亷並笛圖云黑奴絃索花奴鼓譂奴撫掌閹奴舞阿環自品玉玲瓏御手夷猶親按譜句同而名小異未審何據詩人多以阿環稱楊妃矣按漢武內傳西王母降於庭遣侍女與上元夫人答云阿環再拜上問啓居則上元夫人亦名阿環荆公詩瑤池渺漫阿環家又云且當呼阿環乘興弄溟渤方萬里謂阿環王母名王方二子俱誤麗華古今詩話曰東坡用事多有誤虢國夫人夜遊圖詩當時亦笑潘麗華不知門外韓擒虎陳後主張貴妃名麗華俱見收而東昏侯有潘淑妃初不名麗華吳旦生曰南史張麗華年十嵗為龔良娣給使後主見而恱之因得幸大業拾遺記云麗華方倚臨春閣試東郭㕙毫筆書小砑紅綃作答江令璧月句未終見韓擒虎躍青驄車擁萬甲直來衝人都不存去就至今日據此則隋遣擒虎平陳而張麗華見收也詩話俱議東坡誤用事余以傳寫之訛在一潘字坡不應悮至此蓋古有四人漢光武后隂麗華後漢劉聰妻劉娥字麗華後周宣帝后楊麗華與後主妃張麗華耳更無潘麗華者豈坡公而不諳此也龜趺王直方詩話曰東坡為程筠作歸真亭詩云會看千字誄木杪見龜趺龜趺是碑座不應見朩杪也吳旦生曰按碑乃墓碑而亭乃碑亭也葬於山上多樹碑半山間自下望之則龜趺恰出於朩杪非真在朩上也春渚紀聞云杜子美北征詩我行巳水濵我僕猶朩末豈亦子美之僕留挂朩末如猿猱耶緑衣東坡送黃師是詩白首沈下吏緑衣有公言吳旦生曰緑衣乃詩篇名注云緑間色妾之服也時師是赴浙憲坡置酒餞其行使朝雲侍飲語師是曰他人皆進用而君數補外何也是謂之公言則知緑衣指朝雲耳後人乃謂緑衣小官猶惜其不留是有公言悮矣陸放翁序施司諫東坡詩注云某頃與范公至能會於蜀因相與論東坡詩慨然謂豫曰足下當作一書發明東坡之意以遺學者某謝不能他日又言之因舉二三事以質之曰五畝漸成終老計九重新掃舊巢痕及遙知叔孫子已致魯諸生此語當何為解至能曰東坡竄黃州自度不復收用故曰新掃舊巢痕建中初復召元祐諸人故曰已致魯諸生恐不過如此耳某曰此某之所以不敢承命也昔祖宗以三館養士儲將相才及官制行罷三館而東坡蓋嘗直史館然自謫為散官削去史館之職久矣至是史館亦廢故云新掃舊巢痕其用字之嚴如此而鳯巢西隔九重門則又李建中詩也建中初韓曽二相得政盡收用元祐人其不召者亦補大藩惟東坡兄弟猶領宫祠此句蓋寓所不能致者二人意深語緩尤未易窺測至如車中有布乎指當時用事者猶近而易見白首沈下吏緑衣有公言乃以其侍妾朝雲嘗歎黃師是仕不進故此句之意戲言其上僣則非得其故者殆不可知必皆能如此然後無憾至能亦太息曰如此誠難矣身東坡詩公是主人身是客舉觴登望得無愁吳旦生曰白樂天謂心是主人身是客坡用其語蓋身猶言我也如張飛據水斷橋瞋目橫矛曰身是張翼德也可來共決死黃承彥謂孔明曰身有醜女才堪相配西海侯蒙遜曰秃髮傉檀為公而身為侯何也宋彭城王義真自關中逃歸謂宏曰身在此魏人拔東陽問沈文秀何在文秀厲聲曰身是魏人執之謝淪云身家太傅後梁宗如周云身自來不謗經凡此皆以身為我也韓子蒼詩身今老病投炎瘴最憶氷崖昨嵗秋豹腳蝸牛東坡作吳興守日有詩云風定軒窗飛豹腳雨餘欄楯上蝸牛吳旦生曰潛確類書蚊足有文彩吳興號豹腳所以字從文以有文也亦或從昏志其出時也或從民昏之省也胡苕溪謂吳興澤國春夏之交地尤卑濕乃多蚊蚋子瞻真紀其實余因觀子瞻有遊諸寺詩微雨止還作小忩幽更妍盆山不見日草朩自蒼然二詩曲盡吳興景物非身親其境者或未知也東坡又詩云壁經梅雨畫虒蝓説文虒蝓蝸牛也然觀古今注蝸牛陵螺也形如虒蝓殼如小螺熱則自懸於葉下野人結圓舍如蝸牛之殼故曰蝸舍亦曰蝸牛之舍也閲耕餘録云魏略焦先楊沛並作瓜牛廬裴松之以為瓜當作蝸按本草蛞蝓一名陵蠡一名土蝸一名附蝸一名蠡牛亦曰瓜牛松之未及考耳廷圭墨漁隱叢話載陳履常云往於秦少遊家見李墨裕陵所賜王平甫所藏者潘谷見之再拜云真廷圭所作也世惟王四學士有之與此為二矣東坡詩潘翁跪拜摩老眼一生再見三歎息了知至鑒無遁形王家舊物秦家得吳旦生曰遁齋間覽李超與其子庭圭自易水渡江遷居歙州本姓奚江南賜姓李氏庭圭始名廷邽其後改之故世有奚庭邽墨又有李庭圭墨或有作李庭邽字者非也余考輟耕録云世有奚廷圭墨又有李廷圭墨或有作庭圭字者偽也是則字皆從廷以有廣頭者為偽而遁齋漁隱皆從庭何也真偽自此别烏可無辨又輟耕云奚鼐之子超超之子廷圭廷寬朝氏墨經云廷圭之子承浩廷寬之子承宴承宴之子文用文用之子惟慶惟一惟益仲宣皆其世家也王氏談録云其邽字作下邽之邽者為上作圭潔之圭者次之作圭璧之圭者又次之其云奚庭圭者最下李廷圭藏墨訣云贈爾為玉玦泉清硯須潔避暑懸葛囊臨風度梅月辛西清詩話曰東坡在北扉自以獨步當世與一時侍從更唱迭和莫不稱首曽子開賦扈蹕詩押辛字韻韻窘束而往返絡繹不已坡厭之復和云讀罷君詩何所似搗殘薑桂有餘辛顧問客曰解此否耶蓋謂唱首有辣氣故耳吳旦生曰庚溪詩話云元祐間東坡與子開同居兩省扈從車駕赴宣光殿子開有詩東坡兩和其斷章辛字韻皆工云輦路歸來聞好語共驚堯顙類高辛又云最後數篇君莫厭搗殘椒桂有餘辛按楚辭以申椒菌桂皆草朩之香者喻賢人也詩人押險韻冥搜至此可謂工矣而西清詩話遂改其句云讀罷君詩何所似搗殘薑桂有餘辛謂坡譏唱首多辣氣何也遨頭東坡寒食遊西湖詩藍尾忽驚新火後遨頭要及浣花前吳旦生曰公自注成都太守自正月十日出遊至四月十九日浣花乃止劉須溪謂注欠詳余按老學菴筆記云四月十九日成都謂之浣花遨頭宴於杜子美草堂滄浪亭傾城皆出錦繡夾道自開嵗宴遊至是而止故最盛於他時我客蜀數年屢赴此集未嘗不晴蜀人云雖戴白之老未嘗見浣花日雨也成都記云太守出遊士女則於朩床觀之謂之遨床而謂太守為遨頭故陸放翁寄綿州楊齊伯詩我老一官書紙尾君行千騎試遨頭蓋亦親涉過來耳蒼茫東坡詩愁度奔河蒼茫間吳旦生曰趙注謂蒼茫兩字古人用之皆是平聲而先生所用乃是仄聲蒼字廣韻音粗朗反而茫字上聲皆不收不知先生所用出處以俟博聞王勉夫云揚雄校獵賦鴻濛沆茫字音莽白樂天雪詩寒銷春蒼茫又曰野道何茫蒼並音上聲蘇子美詩淮天蒼茫背殘臘江上委蛇逢舊春自注蒼茫仄聲茫作仄用似此甚多何燕泉云蒼茫嵬峩並上聲如嵬峩連宵睡句即韓退之元和聖德詩嶽祇嶪峩字含黃宜紫東坡詩半殼含黃須點酒兩螯宜紫勸加飱吳旦生曰陸魯望蟹志云稻之登也率執一穗以朝其魁吳人謂之輸芒段成式亦謂蟹八月腹中有芒芒真稻芒也長寸許向東輸與海神未輸不可食余按吳興掌故録云此大誕妄蟹子未成時曰黃黃中有細骨黃依以生非稻芒也入海則黃化為子而芒亦漸長至春深散子則芒亦輸出蟹腐矣據此則坡詩半殼含黃為有領會姑蘇志云出太湖大而色黃殼軟曰湖蟹冬月益肥美謂之十月雄出吳江汾湖者曰紫鬚蟹出崑山蔚州者曰蔚遲蟹海味索隱云紫蟹江南為勝謂殼上斑點者據此則又坡詩所謂宜紫矣蟹譜云蟹隨潮解甲更生新故字從解廣雅雄曰蜋蟻雌曰博帶荀子六跪而二螯注跪足也蟹志云漁者緯蕭承其流而障之曰蟹籪余觀陶南村謂緯蕭二字尤竒不知其出莊子河上翁家貧緯蕭而食也又觀陸放翁詩水落枯萍黏蟹椵雲間寒日上魚梁自注鄉人植竹以取蟹謂之蟹椵又范德機詩年荒民命椵魚蝦則椵字較籪為雅酥煎老學庵筆記曰王建牡丹詩可憐零落蘂收取作香燒雖工而格卑東坡用其意云未忍汙泥沙牛酥煎落蘂超然不同矣吳旦生曰放翁謂坡用王建意非也按客退紀談云孟蜀時兵部尚書李昊每春時將牡丹花數枝分遺朋友以興平酥同贈且曰俟花凋卸即以酥煎食之無棄穠艷也坡蓋用此故實耳坡又有雨中賞牡丹詩明日春隂花未老故應未忍著酥煎主孟東坡與歐陽叔弼詩主孟當啖我玉鱗金尾魚吳旦生曰國語優施謂里克妻曰主孟啖我注云大夫之妻稱主從夫稱也史記吕后本紀注引此句索隱云孟者且也言且啖我物則國語本注謂孟為里克妻字謬矣黑暗東坡詩雞號黑暗通蠻貨蜂閙黃連採蜜花吳旦生曰杜詩黑暗通蠻貨酉陽雜爼云波斯國謂象牙為白暗犀角為黑暗埤雅言難别也西溪叢語云犀以黑為本其色黑而黃曰正透黃而有黑邊曰倒透埤雅云角理有正插倒插正插者角腰以上通倒插者角腰以下通亦曰尖花小而根花大謂之倒插破天荒東坡贈薑唐佐一聨云滄海何曽斷地脈白袍端合破天荒吳旦生曰子由述兄子瞻謫居儋耳瓊州進士薑唐佐從之遊贈此一聨且語曰子異日登科當為子成此篇崇寧二年隨計過汝陽示以此句時子瞻之喪再踰嵗矣涕泣為足成之北夢瑣言云唐荆州衣冠藪澤每嵗解送舉人多不成名號曰天荒至劉蛻以荆州解及第號為破天荒托言云時崔魏公作鎮以破天荒錢七十萬資蛻蛻謝書略曰數十年來自是人廢一千里外豈曰天荒陸放翁詩屑玉定煩修月斧堆金難買破天荒中秋東坡中秋月詩嘗聞此宵月萬里同隂晴吳旦生曰注云故人史生為豫言嘗見海賈云中秋有月則是嵗珠多而圓嘗以此候之雖相去萬里他日會合相問隂晴無不同者又使燕録云惟中秋天色隂晴與各國同羅帶劍鋩東坡詩繫悶豈無羅帶水割愁還有劍鋩山吳旦生曰韓退之詩水作青羅帶山為碧玉簪栁子厚詩海上羣山似劒鋩秋來處處割愁腸東坡合二公之句作一屬對或謂可言割愁腸不可但言割愁陸仲高引晉張望詩云愁來不可割此割愁二字出處也鬭草東坡次劉景文聽琵琶詩猶勝江左謝靈運共鬬東昏百草鬚吳旦生曰國史纂異云謝靈運鬚甚美臨刑施為南海祇洹寺維摩詰鬚中宗朝安樂公主五日鬭百草欲廣其物色令馳驛取之恐為他人所得剪棄其餘東坡以為東昏侯事則悮考東昏雖昏暴未嘗剪鬚鬭草也萬厯中陳眉公詩休將靈運鬚三尺鬬入兒童百草中泛指兒童乃無礙荆楚嵗時記云正月五日有鬬百草之戲王岐公夫人閣端午帖子云後苑尋春趂午前歸來競鬬玉欄邊袖中獨有藝香草留與君王辟蠧編魚豢典略云藝香辟紙魚蠧故藏書臺稱藝臺陸魯望詩無多藥草在南榮合有新苗次第生稚子不知名品上恐隨春草鬬輸贏故元遺山論詩三十首有云萬古幽人在澗阿百年孤憤竟如何無人説與天隨子春草輸贏較幾多中吳紀聞云吳王與西施嘗鬭百草故劉禹錫詩若共吳王鬭百草不如應是欠西施清異録云劉鋹在國春深令宫人鬬花凌晨開後苑各任採擇少頃敕還宫鎖花門膳訖普集角勝負於殿中宦士抱關宫人出入皆搜懷袖置樓羅歷以驗姓名法制甚嚴時號花禁俚語東坡詩面臉照人元自赤眉毛覆眼見來烏吳旦生曰王直方詩話今市語答人真實事則稱見來坡詩用俚語也墨莊漫録引杜詩鎖石藤梢元自落倚天松骨見來枯坡句法此而謂之俚語直方未思耳余以用俚語無妨却看句法何如坡此等則十四字全俚何關四字試以杜句形之則益俚諌苑東坡詩諌苑君方續承業醉鄉我欲訪無功吳旦生曰注引南史李承業作諌苑不知隋樂運字承業嘗録夏殷以來諌爭事名諌苑文帝覽而嘉焉鮆魚東坡詩知有江南風物否桃花流水鮆魚肥吳旦生曰東坡涉筆遊戲往往以前人成句點竄一二字足成已意如此句之襲玄真子是也鮆音紫注云形狹薄而長鬚一名刀魚太湖中饒有之因按山海經云浮玉山北望巨區苕水出於其隂其中多鮆魚爾雅注鮆呼為劍魚異魚圖贊云胡蝶所化列薎長須梅聖俞詩絮暖鮆魚繁陸放翁詩蓴菜鮆魚初滿市莫將羊酪敵南烹楊亷夫詩柱宿雞籠山頂鶴斗量鮆網壩頭魚蜜唧鵂鶹東坡嶺南詩朝盤見蜜唧夜枕聞鵂鶹吳旦生曰朝野僉載嶺南獠民好為蜜唧即鼠胎未瞬通身赤蠕者飼之以蜜釘之筵上躡躡而行以筯夾取啖之唧唧作聲故曰蜜唧倦遊録云廣南人食鼠謂之家鹿嶺表録異云鵂鶹即梟也詳見丙集郭賦中爾雅江東呼鵂鶹為鵋鶀山海經􅀈久即鵂鶹唐五行志鵂鶹一名訓狐博物志一名鵄鵂竹醉東坡詩竹是當年醉日栽吳旦生曰嶽州風土記五月十三日謂之龍生日齊民要術謂之竹醉日又謂之竹迷日筍譜云民間説竹有生日即五月十三日也移竹宜用此日蒼筠傳云筠每嵗惟五月十三日獨醉或為人迎置他處不知也當時諺云此君經年嘗清齋一日不齋醉如泥有時倒載過晉地芒然垂墜俱不知宋子京種竹詩賴逢醉日終無損正似得全於酒人晏元獻詩竹醉人還醉蠶眠我亦眠黃元明詩夏栽醉竹餘千箇春糞辰瓜滿百區一云宜用辰日黃山谷詩根須辰日斸筍看上番成一云宜用臘月杜少陵詩東陵竹影薄臘月更須栽生子東坡賀陳章生子詩剩欲去為湯餅客却愁錯寫弄麞書吳旦生曰劉禹錫送進士張盥詩爾生始懸弧我作座上賔引筯舉湯餅祝詞天麒麟注云三朝會曰湯餅會懶真子云東坡正用此詩故謂之湯餅客也必食湯餅者世所謂長命麵也青箱雜記云湯餅濕麵也凡以麵為食煮之皆謂之湯餅珊瑚鈎詩話云或問湯餅謂之不托何也曰未有刀機時以手托之既用刀機則不托矣資暇集云今俗字有餺飥乖之且甚然余觀五代史昭宗云朕與宫人一日食粥一日食不托注謂不托俗語當以方言為正作餺飥字按方言餅謂之飥齊民要術青麵麥麵堪作飯及餅飥甚美則飥之名已見於漢魏矣舊唐書太常少卿薑度妻誕子李林甫手書慶之曰聞有弄麞之慶客視之掩口一畝宫蘇東坡和林子中詩卭頭莫喚無家客歸掃峩眉一畝宫吳旦生曰子中在京口寄東坡詩欲喚無家一房客五雲樓殿鎖鼇宫故坡作此和之禮記儒有一畝之宫環堵之室坡蓋用此按釋名宫穹也言屋見於垣上穹崇然也郭璞云宫謂圍繞之記曰君為廬宫之是也爾雅宫謂之室室謂之宫風俗通云宫室一也秦漢以來尊者以為帝號下乃避之也禮記命士以上父子異宫吕氏春秋季武子入宫不敢哭則是士庶皆稱宫矣名義考云宫非寢室也牆也記君為廬宫之儒行注宫牆垣也蝘蜓依牆而生故名守宫不得其門而入者曰宫牆外望宫之為牆可知已朱顔冷齋夜話曰山谷言詩意無窮而人才有限以有限之才追無窮之意雖淵明杜陵不得工也不易其意而造其語謂之換骨法規摹其意而形容之謂之奪胎法樂天詩醉貌如霜葉雖紅不是春東坡詩兒童誤喜朱顔在一笑那知是酒紅此奪胎法也吳旦生曰此種語意不止白蘇觀王直方詩話知又有鄭谷詩衰鬢霜供白愁顔酒借紅老杜詩髮少何勞白顔衰肯更紅陳無已詩髮短愁催白顔衰酒借紅皆相類也略彴楊升菴曰爾雅石矼亦曰略彴説文水上橫朩所以渡者徐鉉云即今所謂水彴橋也東坡詩略彴橫秋水浮屠插暮煙吳旦生曰廣志謂獨木之橋曰𣙜音角亦曰彴音灼𣙜水上橫一木為渡彴謂之略彴漢武天漢三年初𣙜酒酤韋昭云禁民酤釀獨官開置如道路設朩為𣙜獨取利也今稱關稅為𣙜貨乃專利而不許他往之義亦取此也陸魯望詩頭經略彴冠微亞腰插笭箵帶矗頻陸放翁詩獨木架成新略彴一峰買得小嶙峋楊仲𢎞詩略彴未通溪上路轒輼方陷漠南天沈景倩詩廢彴殫猿技危檣見鳥飛對床王直方詩話曰東坡喜韋蘇州詩寧知風雨夜復此對床眠之句故在鄭别子由云寒燈相對記疇昔夜雨何時聽蕭瑟又初秋子由與坡相從彭城賦詩云誤喜對床尋舊約不知飄泊在彭城子由在神水館賦詩云夜雨從來對榻眠兹行萬里隔遙天坡在御史獄有云他年夜雨獨傷神在東府有云對床定悠悠夜雨今蕭瑟其同轉對有云對床貪聽連宵雨又曰對床欲作連夜雨又云對床老兄弟夜雨鳴竹屋此其兄弟所賦也相約退休可謂無日忘之然竟未能成其約其意見於逍遙堂詩敘云吳旦生曰韋蘇州示元真元常詩二蘇祖之以入咏遂以夜雨對床為兄弟事用矣然觀野客叢書云韋又有詩贈令狐士曹曰秋簷滴滴對床寢山路迢迢聨騎行則是當時對床夜雨不特兄弟為然於朋友亦然白樂天招張司業詩能令同宿者聽雨對床眼此善用韋意不膠於兄弟也又觀鄭谷訪元秀上人詩且共高僧對榻眠思圓昉上人詩每思聞淨話夜雨對繩床施於僧亦未為不可然則聽雨對床不止一事今人但知為兄弟事而莫知其他蓋韋詩固佳重以東坡引用所以顯然著在耳目為兄弟故事正德中陳芝麓思其兄百可遂以風雨古句各取韻之相叶者集成二十首題曰風雨連懷云後庭花蘇子由咏雞冠花詩後庭花正盛憐汝繫興亡吳旦生曰注言矮雞冠即玉樹後庭花余按濳確類書云一種名夀星雞冠即矮腳雞冠有紅白二色即後庭花也楊誠齋詩陳倉金碧夜雙斜一隻今棲紀涓家别有飛來矮人國化成玉樹後庭花田子藝云溫庭筠詩宜男謾作後庭草不似櫻桃結子紅是萱草為後庭草也百合花一名中庭花見本草歷代詩話卷五十八
