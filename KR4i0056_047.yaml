body:
  text: 歷代詩話卷四十七歸安吳景旭撰庚集上之中唐詩罷相李適之罷相詩避賢初罷相樂聖且銜杯試問門前客今朝幾箇來吳旦生曰適之退朝每邀賔戚談諧曾賦詩云朱門長不閉親友恣相過年今將半百不樂復如何後為林甫所譛罷故有門前客來之句未免激而露矣于濆對花詩花開蝶滿枝花謝蝶還稀惟有舊巢燕主人貧亦歸雖當罷官同一感慨要有怨而不怒之意老杜八仙歌銜杯樂聖稱避賢乃用適之語按史記石慶上書曰願歸丞相侯印乞骸骨歸避賢者路蓋避賢二字出此今杜本誤作世賢則世字犯太宗諱絳河王維秋宵寓直詩雲消出絳河楊升菴曰道書天有九霄赤霄碧霄青霄玄霄絳霄黅霄紫霄練霄縉霄也絳河即絳霄吳旦生曰如魏張淵觀象賦望靈象於九霄注云九霄九天也因引道書以釋之又漢武帝內傳王母遣問武帝云逺隔絳霄此亦道書之説也今升菴誤以雲消為雲霄遂引道書則非按初學記天河亦名絳河蠡海集云銀河曰絳河蓋觀天者以北極為標凖所仰視而見者皆在北極之南故稱之曰絳借南之色以為喻也余甚愛此語唐彥謙七夕詩絳河浪淺休相隔滄海波深尚作塵王初銀河詩閶闔疏雲隔絳津橋頭秋夜鵲飛頻驅鴈王維出塞作頷聯云暮雲空磧時驅馬秋日平原好射雕又結云玉靶角弓珠勒馬漢家將賜霍嫖姚吳旦生曰王弇州謂此律甚佳非兩馬字犯當足壓卷然兩字俱貴難易或稍可改者暮雲句馬字耳余因弇州之語戲欲改之屢思未屬一日觀謝廷讃云右丞出塞重一馬字按鮑照詩秋霜曉驅鴈又北風驅鴈天雨霜又洛陽伽藍記北風驅鴈千里飛雲然則右丞句為驅鴈無疑矣余思沙磧自應驅鴈而馬字倣佛鴈字以致傳訛耳積疑之案一旦氷釋為之狂叫欲絶天幸數竒王摩詰詩衛青不敗由天幸李廣無功緣數竒吳旦生曰西清詩話不敗由天幸乃霍去病非衛青也去病傳其軍嘗先大將軍軍亦有天幸未嘗困絶意有大將軍字誤指去病作衛青耳齊東野語云李廣傳廣數竒毋令當單于注云竒不耦也言廣命隻不耦也數所角切竒居宜切宋景文以為江南本漢書數乃所具切角字乃具字之誤耳因考藝文類聚馮敬通集吾數竒命薄徐敬業詩數竒良可歎杜詩數竒謫關塞道廣存箕潁羅隱詩數竒當自愧時薄欲何干東坡詩數竒逢惡嵗計拙集枯梧觀其耦對則數為命數非疏數之數音所具切明矣漠漠隂隂郭彥深曰王維漠漠水田飛白鷺隂隂夏木囀黃鸝此用疊字之法不獨摹景入神而音調抑揚氣格整暇悉在四字中杜詩野日荒荒白江流泯泯清亦是上二字揚下二字抑情景氣格悉備李嘉祐剪去漠漠隂隂便索然少味矣宋人詩話乃謂摩詰用嘉祐句不知王在盛唐李在中唐王安得預竊其句吳旦生曰嘉祐字從一上元中刺台州大厯間刺袁州則知與摩詰相懸矣唐詩紀事云李肇謂漠漠水田飛白鷺隂隂夏木囀黃鸝之句本嘉祐詩而集中不見據此豈出好事者造言耶故王勉夫謂以前人詩語而以已意損益之在當時自有此體葛常之謂嘉祐詩摩詰衍之為七言而興益逺葉石林謂好處在添漠漠隂隂四字此乃摩詰為嘉祐點化以自見其妙不然嘉祐本句但是咏景耳三子之言余猶鄙其失考乃李肇以為好取人章句王直方以為是剽竊之雄不幾為摩詰詬厲哉胡苕溪云古之詩人如摩詰竊嘉祐水田飛白鷺夏木囀黃鸝僧惠崇為其徒所嘲云河分岡勢司空曙春入燒痕劉長卿不是師兄多犯古古人詩句犯師兄皆可軒渠一笑蓋摩詰與惠崇並稱而又厚誣之不其慁與詩下雙字極難須是七言五言之間除去五字三字外精神興致全見於兩字方為工妙石林詩話謂如老杜無端落朩蕭蕭下不盡長江滚滚來江天漠漠鳥飛去風雨時時龍一吟荆公新霜浦溆綿綿白薄晚林巒往往青東坡浥浥爐香初泛夜離離花影欲搖春雪浪齋謂如老杜野日荒荒白江流泯泯清退之月吐窗冏冏此皆字不虛發也藥欄資暇集曰今園亭中藥欄藥音義與籞同欄即藥藥即欄猶言圍援非花藥之欄也有以藤架蔬圃作對是不知其由乖之矣按漢宣帝詔池藥未御幸者假與貧民蘇林注云以竹繩連綿為禁藥使人不得往來爾漢書闌入宫禁字多作草下闌則藥欄作藥蘭尤分明也吳旦生曰漢顧成廟設投光鈎欄王逸注縱曰欄橫曰楯楯間子曰櫺欄楯殿上臨邊之飾亦以防人墜墮今言鈎欄是也段國沙州記吐谷渾於河上作橋謂之河厲長一百五十步勾欄甚嚴整勾欄之名始見此王建宫詞風簾水殿壓芙蓉四面勾欄在水中李義山詩簾輕幕重金勾欄李長吉詩蟪蛄弔月勾欄下宋世以來始名教坊曰勾欄蓋從上而下為墜墮從外而內為闌入其義則一引此證欄字愈明而藥之為籞終未安耳胡苕溪亦謂引池籞為誤乃楊升菴引之謂杜甫乘興還來看藥欄王維藥欄花徑衡門裏皆不通何也按唐人詩亦不止是如庾肩吾詩向嶺分花徑隨階轉藥欄李商隱詩藥欄日髙紅髲􅫭許渾詩竹院晝看筍藥欄春賣花張籍詩得錢秪擬還書鋪借宅常時事藥欄多作花藥之欄返景王維鹿柴詩返景入深林復照青苔上吳旦生曰山海經長留之山其神白帝少昊居之實惟員神磈氏之宫是神也主司返景按日西入則返景東照故曰返景尚書宅西曰昧谷寅餞納日周禮注引書云度西曰栁谷虞翻云鄭玄所著尚書古篆栁字反以為昧字訓云日出之色橮日入之色字見説文音殼橮音栁注栁之為言聚也日將沒兼有餘色故云栁鄭玄云五色聚為栁總之倒景返照在秋為多故西山返景司之白帝堯典餞日屬之仲秋説文在上曰返景在下曰倒景漢郊祀志谷永云仙人逢興輕舉登遐倒景注謂在日月上日月反從下照故其景倒沈休文詩一舉凌倒景無事適華嵩魏瓘賦凌倒景而將越相如賦貫列缺之倒景夕陽楊升菴曰王維和韋五郎溫泉寓目詩漢主離宫接露臺秦川一半夕陽開青山盡是朱旗繞碧澗翻從玉殿來新豐樹裏行人度小苑城邊獵騎回聞道甘泉能獻賦懸知獨有子雲才唐至天寶宫室盛矣秦川八百里而夕陽一半開則四百里之內皆離宫矣此言可謂肆而隱奢麗若此而猶以漢文惜露臺之費比之可謂反而諷末句欲韋郎效子雲之賦則其諷諫可知吳旦生曰元郝天挺注驪山上有夕陽樓在焉金聖歎謂一路依渭水迤邐而去其半道有矗起者知此為驪山夕陽樓也余喜此説最確正形容離宫之盛且髙而扈從之臣皆得寓目焉如升菴所云乃以夕陽為殘陽所照謂彼秦川之迥而夕陽半開其半為宫室所掩故知四百里內皆離宫是據世本之陋解而言之也巴字王維詩天際澄江巴字回吳旦生曰王聓子超與一友舟行閲詩友以水寒巴字急之句為無解同舟者互持之子超歸為道此余謂此李羣玉雲安詩也詩中八句皆使雲安實事按三巴記云閬水東南流三折如巴字故曰三巴則羣玉詩用此也如盧綸詩浪依巴字息風入蜀關清李逺詩杜魄呼名叫巴江學字流白居易詩江從巴峽初成字猿過巫陽始斷腸劉敬之詩山近衡陽雖少鴈水連巴字豈無魚劉暌詩山簇劍鋒朝闕逺水如巴字繞城流唐人多用此偶因摩詰詩載之水田衣王摩詰詩乞飯從香積裁衣學水田吳旦生曰楊升菴謂袈裟內典作毠㲚蓋西域以毛為之又名逍遙服又名無塵衣又名水田衣又名稻畦帔陳眉公云田衣即山谷所謂稻田衲王少伯詩手巾花㲲淨香帔稻畦成是也雪霏録謂袈裟者恐非余按范燈有狀江南十二咏云江南季夏天身熱汗如泉蚊蚋成雷澤袈裟作水田蓋天寶大厯間固有此語陳養吾云迦羅沙曳僧衣也省羅曳字止稱迦沙葛洪撰字苑添衣作袈裟一名忍辱鎧一名銷瘦衣一名蓮花服一名福田衣一名去穢衣一名離染服酌陳無功曰王摩詰酌酒與君君自寬人情翻覆似波瀾上句用鮑明逺酌酒以自寬下句全用陸士衡君子行語吳旦生曰此摩詰酌酒與裴迪詩也其義與明逺異按説文酌盛酒行觴也從酉勺挹取也則摩詰所咏酌酒與君正得行觴之義謂飲為酌非也徐鉉言杓溷酌按杓枓之庾切枘也今俗讀作市若切以為杯酌之酌非是枓枘當作斗柄斗柄為杓斗首為魁遂加朩轉注作杓並訛楚辭圜鑿方枘亦柄訛也楊升菴云枘字從朩從內考工記調其鑿枘而合之宋玉九辨圜鑿而方枘兮吾固知其鉏鋙而難入夫枘鑿本相入之物惟方枘圓鑿則不相入今去方圓字而曰枘鑿不相入謬矣甚者寫枘字作柄字尤可笑也余按升菴此語始於周易坤為柄俞氏云柄當作枘枘性圓轉而曲坤性直大而方故乾圓坤枘相反也閣天厨禁臠曰王維書事詩輕隂閣小雨深院晝慵開坐看蒼苔色欲上人衣來舒王詩若耶溪上踏莓苔興盡張帆載酒回汀草岸花渾不見青山無數逐人來兩詩皆含不盡之意子由謂之不帶聲色吳旦生曰摩詰此絶集中不載見於覺範禁臠中舒王有一絶云山中十日雨雨晴門始開坐看蒼苔文莫上人衣來極意規模之作摩詰又有人家在仙掌雲氣欲生衣亦集中所不載見於董逌畫跋中蘇東坡作病鶴詩常寫三尺長脛瘦軀而缺其一字使任德翁輩下之凡數字東坡徐出其稿蓋閣字也此字既出儼然如見病鶴然東坡此字正善用摩詰輕雲閣小雨也虞伯生鶴詩鐵石閣身修足脛雪霜依骨淺翎毛則又用東坡字耳三秋王摩詰詩四海方無事三秋大有年吳旦生曰國風一日不見如三秋兮其語始此按隂陽五行厯云一時為三月一月為三秋三月為三秋又一月為三秋故三月有九秋之名也梁元帝篡要又有三冬九冬之語劉孝標答劉之遴書云九冬有隟三餘暇時苑咸酬王摩詰詩三點成伊猶有想一觀如幻自忘筌吳旦生曰西域以為伊字最尊之稱此謂三點成伊也佛經云天華香莫若伊蒲伊蘭蓋尊稱之加以伊字故蒲曰伊蒲伊蒲色即優婆塞中土譯為近住蘭曰伊蘭伊蘭即中土賽蘭香也以其香無比故曰伊蘭陸放翁詩伊蒲塞饌分香積優鉢羅花散道場蓋謂此也按苑舍人能書梵字兼達梵音故摩詰贈云蓮花法藏心懸悟貝葉經文手自書舍人以摩詰精禪理故酬以此詩即觀三點成伊之語果精通於梵字矣棄隱居詩話曰孟浩然入翰苑訪王維適明皇駕至倉皇伏匿維不敢隱而奏知明皇召使進所業浩然誦北闕休上書南山歸敝廬不才明主棄多病故人疏明皇曰卿自棄朕朕未嘗棄卿也因放歸襄陽且浩然布衣攔入宫禁又犯行在所而止於放歸明皇寬假之亦至矣烏在以一棄字而議罪乎吳旦生曰北夢瑣言孟浩然與李太白交遊玄宗徴李入翰林孟以故人之分與有彈冠之望久無消息乃入京謁之一日玄宗召李入對因從容説及孟浩然李奏曰臣故人也見在臣私第上令急召賜對俾口進佳句孟浩然誦詩曰北闕休上書南山歸敝廬不才明主棄多病故人疏上意不悅乃曰未曽見浩然進書朝廷退黜何不云氣蒸雲夢澤波撼嶽陽城緣是不降恩澤終於布衣而巳唐詩注又云明皇以張説之薦召浩然令誦所作云云詩話總龜又云浩然謁華山李相不遇有詩卷却拋書袋內譬如間看華山來之句明皇召李對説及浩然云云新唐書又云採訪使韓朝宗約浩然偕至京師欲薦諸朝會友人至劇飲甚歡或曰君與韓公有期浩然叱曰業巳飲遑恤他卒不赴朝宗辭行浩然不悔也余觀所載不一竊以闌入宫禁或屬未然而急召私第為可據信似北夢之言為長乃唐詩及書話俱載王維事拜家慶孟浩然詩明朝拜家慶須著老萊衣吳旦生曰唐人與親别而復歸謂之拜家慶盧緯卿詩上堂家慶畢顧與親恩邇韓君平詩青絲纜引木蘭船名遂身歸拜慶年然觀顔延年秋胡詩上堂拜家慶入室問何之劉履補注云嘉慶謂母也則其語不始於唐而晉宋人作嘉較雅易字詩話類編曰髙適官兩浙觀察使過杭之清風嶺即詩家東山景也題詩云絶嶺秋風已自涼鶴翻松露濕衣裳前村月落一江水僧在翠微間竹房厥後髙適閲稿以月落時江水隨潮退止半江矣思改一字為半字巡至台州事竣復登僧房索筆改之僧云月前有一官過稱此詩佳矣但一字不如半字已改易而去髙適驚問何人僧曰義烏駱賔王也古人一字斟酌不茍其識見之遲速不同耳吳旦生曰詩之貴有話者如此等類皆苦心𨗳引以教人安字之法今後生率爾走頴略不經營自謂一夕瀟湘而安否奚辨只是未曽參究耳略舉一二以伸其説如乖崕詩獨恨太平無一事江南間殺老尚書蕭楚才改恨作幸曰天下一統獨恨太平何也李熲四皓詩龍樓曽作客鶴氅不為臣方千改為作稱曰率土王臣何言不為也齊已早梅詩前村深雪裏昨夜數枝開鄭谷改數作一曰數枝非早也香界髙適詩香界泯羣有吳旦生曰佛寺為香界亦謂香阜江文通詩息舟候香阜悵别在寒林嘗謂寺曰仙陀金山也又曰仁祠後漢楚元王英傳逺黃老之微言尚浮陀之仁祠權載之詩逸氣凌皓清仁祠訪金碧又曰寶坊又曰奈園洛陽伽藍記云白馬寺有奈林王勃詩奈園欣入正風俗通云寺司也官府所止故曰寺石林燕語云東漢以來九卿官府皆名曰寺與臺省並稱鴻臚其一也本以待四方賔客故摩騰竺法蘭自西域以白馬負經至舍於鴻臚既死尸不壞因留寺中遂即鴻臚舊地以為浮屠之居名白馬寺今僧居概稱寺蓋本此也盡善河嶽英靈集曰髙才無貴仕誠哉是言曩劉楨死於文學左思終於記室鮑昭卒於參軍今常建亦淪於一尉悲夫建詩似初發通莊却尋野徑百里之外方歸大道所以其旨逺其興僻佳句輒來唯論意表至如松際露微月清光猶為君又山光恱鳥性潭影空人心此例十數句並稱警䇿然一篇盡善者戰餘落日黃軍敗鼓聲死今與山鬼鄰殘兵哭遼水屬思既苦辭亦警絶潘嶽雖云能敘悲怨未如此章吳旦生曰常建清晨入古寺一章王維中歲頗好道一章每不過四十字爾一塵不到萬慮消歸直與無始者往來若看做章句文字便非聞道之器此真正一篇盡善者也豈僅稱警䇿而已哉歐陽永叔極愛竹徑通幽處禪房花朩深一聯按又玄集唐詩類選唐文粹皆作通字熙寧元年永叔守青州題廨宇後山齋云竹徑遇幽處黃山谷極愛山光悅鳥性潭影空人心一聯余以摘句尋聲終是後人影響不意殷進士璠身躋有唐巳有此褊論也如弔王將軍墓一詩將一死字屬鼓聲上便妙小雅鼓聲淵淵左傳三鼓氣竭合兩處觀來則鼓聲死三字模寫欲絶此真所謂警䇿句若云一篇盡善則未也劈頭劈腦喝出清晨兩字次句云初日照髙林接得有力竹與花木皆從髙林帶出而映之以初日雖欲不幽且深不可得矣此際聲聞色象種種銷滅惟有一寺與入寺者同攝入光影中佛性人性鳥性無動不靜無二不一故結言萬籟此俱寂昔人所以美旦氣快朝來也自首至尾總是清晨兩字安得不為一篇盡善西來岑參登慈恩寺浮屠詩秋色從西來蒼然滿關中吳旦生曰談友夏評從西來詩人慣將此等無指實處説得確然唐仲言評西為秋非無指實岑又有出關見青草春色正東來亦是一證余觀三百篇於花草雲物變換隻字便易春秋要其所指確有理説又不止於遲遲狀春日之舒淒淒見秋日之慘而已也古詩塞馬依北風越鳥巢南枝亦有斯旨唐評故自勝髙廷禮云唐人唱和多是感激各臻其妙如登慈恩塔詩杜甫云髙標跨蒼穹烈風無時休俯視但一氣焉能辨皇州髙適云秋風昨夜至秦塞多清曠千里何蒼蒼五陵鬱相望岑參云秋色從西來蒼然滿關中五陵北原上萬古青濛濛是皆雄渾悲壯可以凌跨百代三車岑參赴嘉州尋超禪師詩門外不須催五馬林中且聽演三車吳旦生曰對意工穩一聯而刺史與禪師之義俱攝盡矣杜詩雙樹容聽法三車肯載書宋之問廣界寺詩莫愁歸路逺門外有三車僧廣宣隨駕幸唐興觀詩萬乘遊仙宗有道三車引路本無塵按法華經初長者以羊車牛車鹿車立門外引誘諸子出離火宅之難然後但賜諸子太白牛車注云羊車喻聲聞乘鹿車喻緣覺乘牛車喻菩薩乘大白牛車即一佛乘也玄門亦有三車謂穴也對起胡元瑞曰七律對起如杜之風急天髙實為妙絶而岑參雞鳴紫陌栁嚲鶯嬌二起工麗婉約亦可諷咏右丞多仄韻對起無風味不足多效蓋仄起宜五言不宜七言也吳旦生曰此論可為七律長城但嘉州雞鳴紫陌其音閎壯栁嚲鶯嬌其音急直槩評婉約未為允論而嬌歌急管一起是嘉州婉約處也若老杜清秋幕府一律八句皆對極髙潔又極流利真是僅事耳室中語云老杜作八句近體詩卒章有時而對然語意皆卒章之詞今人效之臨了却作一景聯一篇之意無所歸大可笑也開士王麟洲曰李頎七言律最響亮整肅忽於逺公遁迹詩第二句下一拗體餘七句皆平正一不合也開山二字最不古二不合也開山幽居文理不接三不合也重上一山字四不合也謂必有誤苦思得之曰必開士也易一字而對仗流轉盡祛四失矣後觀郎士元詩髙僧本姓竺開士舊名林乃知襲用頎詩吳旦生曰元遺山選唐詩鼓吹載頎此詩其時中書左丞郝天挺受業於遺山遂注鼓吹十卷而頎詩首云逺公遁迹廬山岑開山幽居祗樹林郝於此下注云開山疑作開士則在元初已早有具眼矣麟洲苦思乃與吻合耶楊升菴謂太白詩衡嶽有闡士五峯具真骨按闡士即開士也海録碎事直作衡嶽有開士因引楞嚴經云十六開士悟圓通余按白樂天作金字經碑云開士悟入諸佛知見以了義度無邉以圓教垂無窮莫尊於妙法蓮華經陳子良辨正論序云釋法琳實開士之棟梁法城之墻塹者也葉和尚讃海英嶽靈誕彼開士注謂開衆生信心淺深愁容齋一筆曰李頎詩逺客坐長夜雨聲孤寺秋請量東海水看取淺深愁且作客涉逺適當窮秋暮投孤村古寺中夜不能寐起坐淒惻而聞簷外雨聲其為一時襟抱不言可知而此兩句十字中盡其意態海水喻愁非過語也吳旦生曰前十字意態既盡無復贅言祗以取喻掉合此蓋賦而比也其淺深不從海水量出而在前十字中看出其意自婉皇甫百泉嘗言劉禹錫欲問江深淺應知逺别情李太白請君試問東流水别意與之誰短長江淹擬休上人怨别桂水日千里因之平生懷何必長短淺深耶蓋禹鍚太白未免直致而頎正以婉勝也如退之宿龍宫灘詩浩浩復湯湯灘聲抑更揚魯直云退之裁聽水句尤見工所謂浩浩湯湯抑更揚者非客裏夜卧飽聞此聲安能周旋妙處如此耶出韓詩補注庶幾與頎相上下鳳池賈至早朝大明宫呈兩省僚友詩共沐恩波鳳池裏岑參和云獨有鳳凰池上客王維和云佩聲歸到鳳池頭杜甫和云池上於今有鳳毛吳旦生曰賈至詩晉荀朂為中書監除尚書令人賀之荀曰奪我鳯凰池何賀耶中書凝邃以比天上鳳凰池余按賈為中書舍人故得稱鳳池而岑為右補闕杜為左拾遺王則降授中允所謂兩省僚友也故落句皆及鳳池者唐中書省有鳳池時稱中書舍人為小鳳翰林學士為大鳳丞相為老鳳宋人猶襲其稱張天覺自小鳳拜右揆又曽公亮為中書李復圭譏云老鳳池邉蹲不去詞林海錯云唐謂禮部之長曰大儀員外曰中儀主事曰小儀鄭谷寄同年趙禮部詩仙步徐徐整羽衣小儀澄淡轉中儀泊宅編云宋制直龍圖閣謂之假龍龍圖閣待制謂之小龍龍圖閣直學士謂之大龍龍圖閣學士謂之老龍麈史云或有得直閣久之不遷而卒因曰死龍歷代詩話卷四十七
