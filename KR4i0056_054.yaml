body:
  text: 歷代詩話卷五十四歸安吳景旭撰庚集下之下唐詩治聾石林詩話曰世言社日飲酒治聾不知何所據五代李濤有春社從李昉求酒詩云社公今日沒心情為乞治聾酒一瓶惱亂玉堂將欲遍依稀巡到第三㕔昉時為翰林學士有月給內庫酒故濤從乞之則其傳已久矣社公濤小字也唐人在慶侍下雖官髙年大皆稱小字濤性不羈與朝士言多以社翁自名聞者以為笑吳旦生曰禮記及國語云共工氏之子曰勾龍為后土官能平九土故祀以為社鮒窺廥攟云社飲糍酒非謂止聾社勾龍以勞農也春為農之始戊者土德也立春後第五戊日為春社致酒灌勾龍乎此解為正然俗尚相沿按雲笈七籖云飲社酒治聾詩話載宋制大社二祭多差近臣王禹玉為翰林典內外制十八年屢被差乃題齊宮云鄰雞未唱曉驂催又向靈壇飲福杯自笑治聾知不足明年强健更重來帝憐之拜參知政事陸放翁詩兀兀治聾酒未醒馬虛中詩無酒治聾燕又歸提要録云社公社母不社舊水故社日必雨謂之社翁雨陸魯望詩幾㸃社翁雨一番花信風陸放翁詩催花初過社公雨對酒喜烹溪友魚墨莊漫録云今人家閨房遇春秋社日不作組紃謂之忌作張籍吳越歌云今朝社日停針線起向朱櫻樹下行盛名漁隱叢話載南唐書云夏寶松與詩人劉洞俱於時有盛名陳德誠嘗有詩以美之曰建水舊傳劉夜坐螺川新有夏江城蓋劉洞常有夜坐之詩最為警䇿膾炙人口而寶松有宿江城詩曰鴈飛南浦砧初斷月滿西樓酒半醒亦當時之人所稱咏者故德誠以此紀之吳旦生曰洞長於五言自號五言金城後主詣金陵獻詩百篇首覽石城懷古云石城古岸頭一望思悠悠幾許亡朝事不禁江水流後主為之改容遂還廬陵及金陵受圍洞以詩署路傍云千里長江皆渡馬十年養士為何人又云翻憶潘郎章奏內隂隂日暮好沾巾先是潘佑表有國家隂隂如日將暮句故洞以此諷之余據此則洞之感槩義激不僅以夜坐著聲亦豈僅以五言期負哉婪尾春清異録曰胡嵪詩瓶裏數枝婪尾春人不喻其意桑維翰曰唐末文人有謂芍藥為婪尾春者婪尾酒乃最後之杯芍藥殿春亦得是名耳吳旦生曰蘇東坡詩殷勤朩芍藥獨自殿餘春嘉靖中謝茂秦牡丹詩花神默默殿春殘皆用此也陸放翁詩酴醿獨殿羣芳後又飛絮鍾情獨殿春元周衡之詩四月三山山下路野田猶殿菜花春則又取此而變用之耳鄭䖍本草云芍藥一名沒骨花王晉卿收徐崇嗣徐熙之子畫芍藥名沒骨圖郭若虛云惟用五采布成以無筆墨骨氣而名按芍藥以酒名而酒本有以春名者杜子美詩聞道雲安麴米春李太白詩甕中百斛金陵春韓退之詩且可勤買拋青春劉禹錫詩鸚鵡杯中若下春鄭谷詩千缸石凍春蘇東坡詩一杯付與羅浮春章子厚詩殷勤分送洞庭春王原吉詩滿載九峰春又如郢之富春杭之梨花春烏程之竹葉春滎陽之土窟春劍南之燒春皆是也末厥兵詩話總龜曰李白戲杜甫云借問别來太瘦生只為從前作詩苦太瘦生唐人語也至今猶以生為語助所謂可憐生作麼生何似生之類是也陶穀有詩云尖簷帽子卑凡厮短靿靴兒末厥兵亦當時語也余天章景祐間已聞此語時陶公卒未久人莫曉其義王元叔博學多識亦不知為何語也吳旦生曰太瘦生之詩洪容齊胡元任辨其僞作余於已集杜詩詳載矣末厥生按陶詩作末厥兵劉貢父詩話云今人呼秃尾狗為厥尾衣之短後者亦曰厥然則此兵正謂其末賤耳故以末厥相連言之歐陽永叔王原叔皆莫曉其義得貢父而始明也貢父又云今人不用厮字唐人作斯音五代已作入聲穀詩卑凡厮是也得得僧貫休詩一瓶一鉢垂垂老千水千山得得來吳旦生曰貫休姓姜氏字德隱錢鏐自稱吳越國王休以詩投之曰滿堂花醉三千客一劍霜寒十四州鏐諭改為四十州乃可相見曰州亦難添詩亦難改遂入蜀以此詩投王建建遇之甚厚呼為得得和尚有西嶽集吳融為序休避地渚宮荆帥髙氏館於龍興寺有叟話時政乃作酷吏詞云霰雨灂灂風吼如劚有叟有叟暮投我宿吁嘆自語云太苛酷如何如何掠脂斡肉吳姬唱一曲等閒破紅束韓娥唱一曲錦段鮮照屋寧知一曲兩曲歌曽使千人萬人哭不惟哭亦白其頭飢其族所以祥風不來和風不復蝗兮蠈兮東西南北花蘂後山詩話曰費氏蜀之青城人以才色入蜀宮後主嬖之號花蘂夫人國亡入後宮宋祖召使陳詩誦其國亡詩云君王城上豎降旗妾在深宮那得知十四萬人齊解甲更無一箇是男兒吳旦生曰花蘂夫人者以花不足擬其色似花蘂翾輕也費氏多才思因王建宮詞百絶傳播人口效其體亦成百首按王平甫所叙三十二首刻成都文類中楊升菴尋得其逸詩六十六首又補入三首共計一百一首其末首鴛鴦瓦上自然聲者李珣以為宮人李玉夀作實只一百首余觀詩話或稱費或稱徐舛錯無據余考其時有三花蘂夫人一為成都徐耕二女皆國色王建納之生衍衍嗣位尊為太后太妃同衍禱青城山遊丈人觀𤣥都觀金華宮丹景山至德寺各有倡和詩刻石所號順聖淑妃者初號花蘂及莊宗平蜀隨衍歸中土中途遇害一為青城費氏乃後蜀孟昶宮人昶降入宋宮設昶像祀之僞稱張仙以欺宋祖今畫修髯寬袖奉為張仙送子者昶像也對宋祖陳詩此其人也一為閩人之女南唐李煜選入宮降宋祖嬖之一日遊苑中使奉晉王酒晉王言得夫人手摘一花來乃飲甫至樹下王從後彎弓射殺之太祖歡飲如故上頭花蘂夫人宮詞云新賜雲鬟使上頭吳旦生曰女子之笄曰上頭而倡家處女初薦寢於人亦曰上頭今之委巷叢談皆載此語然則俗謂梳籠亦言上頭須梳籠也歷代詩話卷五十四
