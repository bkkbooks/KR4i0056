body:
  text: 歴代詩話巻四十八歸安吳景旭撰庚集上之下唐詩飛燕碧溪詩話曰唐宗渠渠於白豈真樂道下賢其意急得艷詞媟語以恱婦人耳白之論撰亦不過玉樓金殿鴛鴦翡翠等語社稷蒼生何頼吴旦生曰觀太白雪讒詩雜引褒妲以及漢雉秦毒似欲發禄山之奸故一則曰飛燕昭陽冄則曰飛燕新妝借花牋檀板以冀君之一悟未必非風人諷刺之義若概以艶詞抹煞此朱元晦所謂何曾夢見太白脚板耶換鵞紫桃軒雜綴曰黄伯思東觀餘論辨黄庭經一節實欠詳審伯思曰黄庭經帖為逸少書僕考之非也按陶隐居真誥翼真檢云晉哀帝興寕二年南嶽魏夫人所授惟有黄庭經一萹得存盖此經也逸少以穆帝升平五年卒後二年為興寕二年此經始降逸少安得預書之又按梁虞和論書表云山隂壜釀村飬鵞道士謂羲之曰乆欲冩河上公老子縑素已具無人能書府君能自屈書兩章便合羣以奉羲之為停半曰冩畢擕鵞去晉書本傳亦著是說然隠居與梁武啓又云逸少有名之蹟不過數首黄庭勸進樂毅等不審猶有存否盖此啓在著真誥前故未之考耳而李白乃有黄庭換白鵞之句相習之謬也伯思自以為至當矣不知右軍冩道德經換鵞又冩黄庭經換鵞自是兩番事而太白詩亦兩見一云右軍本清真瀟灑在風塵山隂遇羽客要此好鵞賔掃素冩道德筆精妙入神書罷籠鵞去何曾别主人一云鏡湖清水漾晴波狂客歸舟逸興多山隂道士如相見應冩黄庭換白鵞實互用之也考道藏黄庭有數種有内景黄庭有外景黄庭又有黄庭遁甲縁身經黄庭玉軸經魏夫人所出乃内景一種係楊真人羲之寫其外景經老君所作先出行世右軍所書兩不相溷也吴旦生曰獻之帖有云劉道士鵞羣亦復歸也陶糓因據此以䟦黄庭經云山隂劉道士以鵞羣獻右軍乞書黄庭經此是也又仙傳拾遺云山隂道士管霄霞求羲之冩道德經舉紅鵞一䨇相贈而去觀此則乞書有兩經換鵞有兩事且道士姓氏鑿鑿兩人又何疑哉一云右軍嘗冩黄庭經與王修則黄庭又不止一冩矣羊欣筆陣圖云右軍年三十七書黄庭書訖空中有語卿書感我而况人乎吾是天台丈人虞世南筆髄云羲之山隂冩黄庭經感天台神降伯思何意而辨黄庭非逸少書乎新豐酒李太白詩南國新豐酒東山小妓歌吴旦生曰陸放翁入蜀記十六日早發雲陽過新豐小憇故太白此詩又唐人詩冄入新豐市猶聞舊酒香皆謂此非長安之新豐也長安之新豐亦有名酒見王摩詰詩按雲陽即丹陽古所謂曲阿謝康樂詩朝旦發雲陽落日到朱方盖謂此接䍦李太白詩頭上白接䍦吴旦生曰竇萃酒譜云接䍦巾也韻釋云白㡌也盖用白紗作巾耳晉人著白接䍦歌山簡者所謂倒著白接䍦世説作籬山簡傳作離也南朝雖帝王亦服白紗㡌沈攸之所謂大事若克白紗㡌共著也秕言云爾雅鷺舂鋤注云頭翅背上皆有長翰毛今江東人取以為睫攡名之曰白鷺纕睫與接攡與䍦通而世説獨云接䍦今之襕衫也觀太白詩則亦以接䍦為白㡌而不以為襕衫矣秇林伐山云羽衣􅂒􅀈之類羣碎録云晉宋用羃籬按又有白疊巾南史髙昌國有草實如繭其中絲如細纑名為白疊子國人織以為布甚軟白漢書公孫述為馬援置都布單衣東觀曰都作答漢書音義曰荅布白疊布也以為巾杜子美詩光明白㲲巾詳見皮詩皮襲美詩白綸巾下髪如絲又白帢音恰韻書弁缺四隅謂之帢魏志注魏武帝以天下凶荒資財乏匱擬皮弁裁縑帛為帢陳子昂詩郄家子弟謝家郎烏巾白帢紫香囊耐可李太白詩耐可乘流直上天吳旦生曰禮記聖人耐以天下為一家注耐古能字䟽云説文耐者鬚也鬚謂厮下之毛象形字也古者犯罪以髠其鬚謂之耐罪故字从寸寸為法也不虧形體猶堪其事故謂之耐古之能字為此耐字取堪能之義此義最明又觀漢書揚越之人耐暑注與能同漢書漢馬不能冬又能作耐音蓋古者耐能二字通用田汝成謂杭人言寧可曰耐可音如能可因載入委巷樷談中是不知其出經史也何燕泉云漢碑柔逺而邇而即耐字耐古通能是也雕梅李太白詩珍盤薦雕梅吳旦生曰北户録嶺南之梅小於江左有選大梅刻鏤瓶罐結帶之類取棹汁漬之棹朩葉汁亦甚甘脆琅琊漫抄云永嘉閨婦以青梅雕剜脱核鏤以花鳥纎細可愛以手擘之玲瓏如小盒闔之復為梅謂之梅籃田子藝云以銅青蜂蜜養之愈久愈實而青色如生亦珍品之最巧者八十一萬歳李白詩天子九九八十一萬歳歳歳長傾萬壽杯吳旦生曰雲笈七籖云混元一始萬刼至於百成百成亦八十一萬年而有太初太初之時老君從虚空而下為太初之師又自太上生後復八十一萬億八十一萬歳乃生一炁太白詩出此黄鶴樓後村詩話曰古人服善太白過黄鶴樓有眼前有景道不得崔顥題詩在上頭之句至金陵遂為鳳凰臺詩以擬之今觀二詩真敵手棋也若他人必次顥韻或於詩板之傍别着語矣吳旦生曰徐栢山謂李白之擬黄鶴樓正在鸚鵡洲一詩而非止於鳳凰之作蔡䝉齋因謂鸚鵡洲詩聨聨與崔顥詩格調同而語意亦相類栢山善於讀詩者余以黄鶴樓氣格蒼渾莫可端倪然起聨對而頷聨不對此是偷春體王弇州議其大乖近體而不知其本入體也嚴滄浪取以壓巻乃所謂絶唱不可和而鸚鵡洲風力猶遜鳳凰臺全弱何云敵手棋耶舊傳費禕飛升於此忽乘黄鶴來歸蜀志禕為郭循所害不得其死安有駕鶴述異記荀瓌字叔偉憇黄鶴樓上跨鶴騰空其説亦誣才調集黄鶴人名也益非按鄂州城東十里為黄鶴山方輿記云有仙人王子安乘黄鶴過此因得名西有石如磯為黄鶴磯後人建樓俯磯上故名黄鶴樓金聖歎云沈佺期詩龍池躍龍龍已飛龍德先天天不違池開天漢分黄道龍向天門入紫微看他四句中凢下五龍字又下四天字豈不竒絶後來祗説鳳凰臺乃出黄鶴樓我烏知黄鶴樓之不先出此耶其落筆先冩龍池二字三四承之便冩一句池一句龍巳是出色精嚴矣乃因一二詳冩𤣥宗起兵定難入纉大統前是躍龍後是飛龍躍龍是先天飛龍是天不違龍外又連用二天字者於是索性亦於三四中冄加天漢天門二天字以多添氣色如此縱横跳躍彼鳳凰臺不足道正恐黄鶴樓殊未抵其一半氣力也李商隱詩杜牧司勲字牧之清秋一首杜秋詩前身應是梁江總名總還曽字總持二牧字二杜字三總字二字字此亦龍池黄鶴所濫觴而今愈益出竒無窮也又見韓冬郎詩岸上花根總倒埀水中花影幾千枝一枝一影寒山裏野水野花清露時便是一對好手也鄭谷詩石城昔為莫愁鄉莫愁魂散石城荒江人依舊棹舴艋江岸還是飛鴛鴦人只知李欲學黄鶴樓何曾知鄭曽學黄鶴樓耶看其一二照様脱胎出來分明鬼偷神卸吾更賞其三四江人江岸之句自翻機杼另出新裁不甚規模黄鶴而凡黄鶴所有未盡之極筆反似與他補冩極盡此真採神妙手水碧金膏李太白過彭蠡湖詩水碧或可採金膏秘莫言呉旦生曰江淹擬王徴君詩水碧驗未黷金膏靈詎緇注云水碧水玉也金膏仙藥也謝靈運入彭蠡湖口作金膏滅明光水碧輟流温注云水碧水玉也此江中有之然皆滅其明光止其温潤穆天子傳河伯示汝黄金之膏束晳云金膏可以續骨山海經堂庭山出水玉水精也墨子大藥有水脂碧李賀詩暗佩清臣敲水玉圯李白經下邳圯橋懐子房云我來圯橋上懐古欽英風呉旦生曰圯音怡説文東楚謂橋為圯故史記留侯世家但云嘗於圯上遇一老人則言圯不必復言橋矣太白題與詩皆以圯橋二字連用非是統志云圯橋在邳州城東南隅崔塗讀留侯傳云偶成漢室千年業只讀圯橋一巻書楊維禎覧古云諸葛拜牀下可是圯橋師此皆未之考耳惟虞集詩長跪獻圯下會期後三早乃得本解鏡湖李太白送友人尋越中山水詩云湖清霜鏡曉濤白雪山來吳旦生曰小説家謂軒轅鑄鏡於此因名鏡湖非是按此湖㑹稽太守馬臻所開輿地志云山隂南湖縈帶郊郭白水翠岩互相映發若鏡若圖王右軍云山隂路上行如在鏡中遊則鏡湖之名亦取此義天寶三載正月五日詔賜賀知章鏡湖一曲歸老其後避廟諱改稱鑑湖黄山谷所謂清鑑風流歸賀八也陸放翁詩一竿風月老南湖自注云鏡湖一名南湖識度王性之嘗為王彥輔言曰王荆公集四家詩蔡天啟嘗問何為下太白荆公曰才髙而識卑其中言酒色蓋什八九吳旦生曰陸放翁以為此非荆公之言白樂府外及婦人者實少言酒過多比之陶淵明輩亦未為過四家詩不喜白當自有故蓋白識度甚淺觀其詩中如中宵出飲三百杯明朝歸揖二千石揄揚九重萬乘主謔浪赤墀金𤨏賢王公大人借顔色金章紫綬来相趍一別蹉跎朝市間青雲之交不可攀歸来入咸陽談笑皆王公髙冠佩雄劍長謁韓荆州之類淺陋語至多又如以布衣得一翰林供奉此何足道遂云當時笑我微賤者却来請謁為交親宜其終身坎壈也放翁拈出識度二字不獨太白心折且為後来作詩文之鑒凡人下筆先立自家身分始不為識者所嗤鍊字鶴林玉露曰作詩要徤字撑拄要活字斡旋如紅入桃花嫩青歸栁葉新弟子貧原憲諸生老伏䖍入與歸字貧與老字乃撑拄也生理何顔面憂端且歳時名豈文章著官應老病休何與且字豈與應字乃斡旋也撑拄如屋之有柱斡旋如車之有輪吳旦生曰得撑拄之説而通之即實字可作虛用如璇階電綺閣碧題霜羅幙之類是也得斡旋之説而通之即虛字可作實用如古墻猶竹色虛閣自松聲之類是也潘邠老云七言第五字要響如返照入江翻石壁歸雲擁樹失山村翻字失字是響字也五言第三為眼乃一句所着力在此一字字不響則句不徤吕氏䝉訓以為字字當活活則字字自響也曽致堯語李公受子詩雖工而音韻猶啞公受初未悟後得休文所謂前有浮聲後有切響遂精於格律杜師顔嘗言少陵麗人行坐中八姨真貴人數目中八字最響覓句下字當以此類求之賡和劉貢父詩話曰唐詩賡和有次韻先後無易有依韻同在一韻有用韻用彼韻不必次今人多不曉呉旦生曰昔人言和之義有三蓋依韻和之謂之次韻或用其題而韻字同出一韻謂之和韻如張文潜離黄州詩而和杜老玉華宫詩是也用彼之韻不拘先後謂之用韻如退之和皇甫湜陸渾山火是也然晉宋間何劭張華二陸三謝答其来意而巳非若後人為次韻所局也唐不勝載姑論老杜如髙適寄杜云草𤣥今巳畢此外更何求杜則云草𤣥吾豈敢賦或似相如杜寄嚴武云何路出巴山重巖細菊斑嚴則云卧向巴山落月時籬外黄花菊對誰杜送韋迢云洞庭無過鴈書䟽莫相忘迢則云相憶無南鴈何時有報章杜又云雖無南去鴈看取北来魚其往来反覆不過如是也惟元白矜尚次韻至皮陸而盛若宋蘇黄輩唱一賡十工拙見矣洛陽伽藍記王肅入魏舍江南故妻謝氏而娶元魏帝女其故妻贈之詩云本為箔上蠶今為機上絲得路遂騰去莫憶纒綿時繼室代答亦用絲時兩韻則次韻謂始於元白悞也陳後主集有宣猷堂燕集五言曰披鈎賦韻逐韻多少次第而用座有江總陸瑜孔範等後主韻得迮格白赫易夕擲斥折唶字其詩用韻與所得韻次前後正同是先書韻為鈎坐客均探各據所得循序賦之正後世次韻類也但韻以釣探非詶和先唱者耳薺菜侯鯖録曰髙力士謫在驩州咏薺菜詩為魯直所稱云兩京作斤賣五溪無人采貴賤雖不同氣味故常在吳旦生曰李輔國矯制遷明皇西宫力士竄嶺表見山多薺人不解食故賦詩謂可拾作羮耳魯直作食筍詩尚想髙將軍五溪無人采是悮以筍為薺矣但言詩為魯直所稱亦未詳攷張文潜作薺羮詩論斤上國無曽飽旅食江城日至前常慕藜羮最清酒固應加糝媿吾縁乃得力士本意說文薺草可食也春秋繁露云薺以美冬水氣也薺甘味也乘於水氣故美者甘勝寒也薺之言濟所以濟大水也魚米田澄蜀城詩地富魚為米山芳桂是樵吳旦生曰澄天寶上元間人杜子美贈田舍人云楊雄更有河東賦惟待吹嘘送上天蓋澄以舍人奉使入蜀也俗名沃土為魚米之地皮襲美詩一斗霜鱗換濁醪吳中魚市以㪷計一斗為二斤半蓋一以米喻一以㪷計其義可互通也北戸録載劉孝威謝官賜交州米䴵四百屈詳其言屈豈今之數乎且前朝短書雜記有呼食為頭晉元帝謝賜功德浄饌一頭又謝齎功德食一頭又劉孝威謝賜果食一頭以魚為㪷梁科律生魚若干斗茗為薄為夾温貢茗二百尺薄又梁科律薄茗千夾云云筆為雙為牀為枝搜神記益州西神祠祈禱者持一雙筆南朝呼筆四管為一牀梁簡文帝答詩云乍置筆牀又云冩書筆一枝一萬字墨為螺為丸為枚陸云以兄送墨為螺量科律御墨一量十二丸蔡質漢官儀曰尚書令僕丞郎月賜隃麋大墨一枚小墨一枚紙為番錦為兩王佐云錦二兩衣為裁陸倕謝安城王楚越衣二裁沈約有謝葛衫裁也袈裟為縁簡文帝䝉惠袈裟一縁奴為頭簡文帝書言安城王餉奴子一頭麝為子蠟為䴵麝香如干子蠟如干䴵齊建武四年事㯽榔為口胡桃為子陸倕謝安城王賜㯽榔一千口并胡桃一千子余因魚為㪷喜段公路之言録之然於紙為番獨無引據因按魏張楫云古之素白依書長短隨事截繙枚數重㳫即名番紙故从糸蓋取繒帛之義則謂紙為畨以此也北戸録云張載紙銘並稱紙為畨拾遺記云張華著博物志四百巻奏於武帝詔芟為十巻乃賜側理紙萬番是南越所獻海苔為之又武帝賜杜預蜜香紙萬番冩春秋釋例紙微褐色紋如魚子極香而堅韌乃蜜䝉花所成也藝苑巵言云王右軍㑹稽庫中有紙九萬番悉以乞謝安孔氏六帖云杜暹補婺州參軍秩滿歸吏以紙萬番贐之暹為受百番文筆襟喉云蕭穎士夢有人授紙百番開之皆是綉花文思乃大進珍珠船云簡文帝奉紙箋二千番大唐龍髓記云𤣥宗創集賢院月給蜀郡麻紙五千番遂昌雜録云宋制内夫人每日輪流六人侍帝左右以紙一番書帝起居封付史館牋紙補云蜀牋體重一夫之力僅能荷五百番唐詩紀事云段成式與温庭筠雲藍紙詩三十六鱗充使時數番猶得裹相思東坡澄心堂紙詩云詩老囊空一不留百番曽作百金収又誠齋所引警句云人情似紙番番薄世事如棊局局新景泰中陳用端寄剡牋詩九萬未充王内史百番聊贈杜參軍漁父詞張志和漁父詞云西塞山前白鳥飛桃花流水鱖魚肥吳旦生曰按有兩西塞一在武昌一在霅川故讀此詩者往往誤認之經鉏堂志云西塞郡城南一帶逺山是也謂之西塞者下菰城為屯兵之處坐西向東故也唐書志和謁顔真卿於湖州真卿以舟敝漏請更之志和曰願浮家泛宅往來苕霅間其時顔公與門客會飲乃唱和為漁父詞志和首唱得五首其第四首有霅溪灣裏釣魚翁之句此屬霅川之西塞無疑皮日休詩西塞山前終日客建文初韓公望湖州道中詩南潯賈客舟中市西塞人家水上耕復齋漫録以志和所咏西塞在武昌陸放翁入蜀記亦言道士磯一名西塞山即志和所謂西塞山前者不知其皆悮也如太白詩西塞當中路南風欲進船其在荆楚作故曰中路薛能詩西塞長雲盡南湖片月斜昔臧賢敗走南湖以荷自蔽即此地張文潜詩巳逢娬媚散花峡不泊艱危道士磯蓋西塞最湍險難上故泊散花洲洲與西塞相直按此乃武昌之西塞耳説文長牋云鱖居衞切海中小白魚長三四寸許若蟲類者曰鱖殘其形潔白方言謂之麫魚土人傳言呉王食鱖吐水中所化因改作鱠又一種湖中出者夏小寸許秋長盈尺亦曰殘魚小者加之美名曰銀魚皆鱖屬楊升菴引唐韻巨口細鱗有斑文爾雅翼云凢牛羊之屬有肚故能嚼魚無肚不嚼鱖獨有肚能嚼音譙字一作鱥又引水經注云巴鄉村有魚其頭似羊豐肉少骨今名水底羊亦不知其皆悞也歴代詩話巻四十八
