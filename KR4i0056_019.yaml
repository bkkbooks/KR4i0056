body:
  text: 謹按卷十八第八頁後三行庾信馬射賦落花與芝蓋齊飛楊栁共春旗一色並不云落霞文苑英華反本集皆同即各本困學紀聞所評亦皆作落花蓋落花楊栁皆㸃綴三月時令且與華林園景物映合故佳若云落霞則全無意味矣乃景旭因王勃落霞孤鶩一聫誤記信賦亦作落霞其謬巳不待言至謂落霞為飛蛾無論其說全無根據且以登髙賦詩臨秋水眺長天而沾沾於野鶩之逐蛾蟲亦復成何景會又謂雲霞之霞則不能飛尤為紕謬果爾則下文所引駱賔王斷雲將野鶴俱飛句又將以斷雲為何物乎不揣是非妄生異論文人陋習之尤也謹按卷二十第九頁前五行蘇軾後赤壁賦今諸刻本皆作夢一道士與前適有孤鶴云云文義貫注無疑舊刻集本作二道士不過工匠寫刻之訛讀者何難校改即欲從闕疑之義亦不過云二係一之訛一語足以概之乃胡仔輒自以為得間筆諸漁隱叢話妄加議論其謬不值一噱景旭是書全引其文且以讀古細心譽之益以見重儓之陋矣欽定四庫全書歷代詩話卷十九歸安吳景旭撰丙集下之上賦歌扇舞衣王勃春思賦斂態調歌扇回一作端身正舞衣吳旦生曰洪武間楊孟載早春詩近水欲迷歌扇緑隔花偏襯舞衣紅詩話以為舞衣歌扇不脫元詩氣習然見李義甫詩鏤月為歌扇裁雲作舞衣劉希夷詩池月憐歌扇山雲愛舞衣儲光羲詩竹吹留歌扇蓮香入舞衣老杜亦云江清歌扇底野曠舞衣前則唐人已用之余觀子安賦則唐初巳作此語且考子安之前陳隂鏗詩鶯啼歌扇後花落舞衫前李元操詩紅樹搖歌扇緑珠飄舞衣徐陵雜曲云舞衫回袖勝春風歌扇當窗似秋月北齊蕭放詩歌還團扇後舞出妓行前周庾信詩緑珠歌扇薄飛燕舞衫長則此語之起已久矣若張懷慶竊義甫句增二字云生情鏤月為歌扇出意裁雲作舞衣乃不免活剝生吞之誚鷁首王勃採蓮賦鱗羽喧兮鷁首移吳旦生曰鷁水鳥能厭水神故畫於舟首方言或謂之艗艏郭璞解云今江東貴人船前作青雀是其像也韻集云鷁首天子船也淮南子云龍舟鷁首浮吹以虞此遊於水也陸機詩龍舟浮鷁首蓋用此語司馬相如賦浮文鷁謝朓賦弭蘭鷁兮江潯又張協乘鷁舟為水嬉青琴絳樹王勃七夕賦掩青琴而獨進凌絳樹而輕回吳旦生曰楊升庵以青琴對絳樹謂皆美人不知漢人早入賦中矣司馬相如上林賦若夫青琴宓妃之徒絶殊離俗注云青琴古神女也抱朴子南威青琴姣冶之極而必俟盛飾以增麗志奇云絳樹一聲能歌兩曲二人細聽各聞一曲一字不亂人疑其一聲在鼻竟不測其何術魏文帝答繁欽書云今之妙舞莫巧於絳樹清歌莫激於宋臘徐陵雜曲云碧玉宫妓自翩妍絳樹新聲自可憐花笑駱賓王蕩子從軍賦云花有情而獨笑鳥無事而恆啼吳旦生曰韓子蒼謂丁晉公海外詩草解忘憂憂底事花名含笑笑何人世以為工及讀東坡詩花非識面常含笑鳥不知名時自呼便覺才力相去如天淵余謂識面不識面猶有人之見者存也還不如獨笑為幽庾信小園賦草無忘憂之意花無長樂之心鳥何事而逐酒魚何情而聽琴說到花鳥忘機處更深施宜生含笑花詩百步清香透玉肌滿堂皓齒轉明眉褰帷被客相迎處射雉春風得意時皇甫百泉云賓王蕩子從軍賦賦中之詩淵明歸去來辭辭中之賦浮漚楊炯浮漚賦細而察之若美人臨鏡開寶靨大而望也若馮夷剖蚌列明珠吳旦生曰馮夷剖蚌唐賦多用之而於浮漚較切金陵志云陳後主泛舟於河忽遇雨浮漚生宫人指浮漚曰滿河珍珠因名其河為珍珠河唐闕史載任處士云漚珠槿艷不必多懷亦用此也賦中又云其生兮若浮其居兮若旅雲銷雨霽寂無處所此金剛經所謂泡影也左九嬪涪漚賦亡不長消存不久寄其成不欲難其敗亦以易也蘇子瞻作太白像贊云天人幾何同一漚金人趙周臣詩况復秦宫與漢闕飄然聚散風中漚彳亍宋璟梅花賦步前除以彳亍倚藜杖於牆隂吳旦生曰說文彳小步也象人脛三屬相連也元包云趾彳亍上音赤下音畜潘安仁射雉賦彳亍中輟馥焉中鏑鋭注云彳亍行貌爰注云止貌張平子舞賦蹇兮欲往彳亍中輟楊廉夫懷延陵賦遵閶門以彳亍王元章詩老鶴彳亍如人行皮襲美謂宋廣平鐵腸石心而梅花賦得徐庾體殊不類其為人然無刻本世亦罕傳宋史慶長以不得見為惜元鮮于伯機得國子監寫本書之以贈莊恭甫隆慶間田子藝得此書特為刋出瓦松崔融瓦松賦序云謂之木也訪山客而未詳謂之草也驗農皇而罕記段成式難之曰崔公博學無不該悉豈不知瓦松在屋上曰昔耶在牆曰垣衣在石上曰陟釐梁簡文咏薔薇詩依簷映昔耶吳旦生曰古詩金鋪照昔耶王僧孺詩朝光照昔耶皆指苔也沈存中謂昔耶乃是垣衣瓦松自名昨葉則成式以昔耶為瓦松誤矣蓋瓦衣之與垣衣自是二種按本草瓦衣謂之屋遊本草注垣衣古牆青苔衣也其生石上者名昔耶一名烏韭余觀融賦中有云慚魏宫之烏韭恧漢殿之紅蓮是既借烏韭為映照語遂不復及昔耶本自不謬而成式强欲難之爾酉陽雜俎云生於久屋之瓦魏明帝好之命長安西載其瓦於洛陽以覆屋或言構朩上多松栽土朩氣泄則瓦生松大厯中修含元殿有一人投狀請瓦且言瓦工唯我所能祖父時嘗瓦此殿矣衆工不能服因曰若有能瓦畢不生瓦松乎衆方服焉又有李阿黑者亦能治屋布屋如齒間不通綖亦無瓦松􅛦閜戢孴杜甫朝獻太清宫賦云仡神光而􅛦閜羅詭異以戢孴吳旦生曰閜許下切大開也大裂也司馬相如上林賦谽呀豁閜即此義今五臣本改閜作閕則失之矣孴音擬盛貌王延夀魯靈光殿賦芝栭攢羅以戢孴注云戢孴聚貌或作孨集韻羊入切木華海賦㴿濘潗㵫注云潗㵫沸聲金雞李華含元殿賦揭金雞於太清炫晨光一作陽於正色慶欣之聲不踰辰而靁四域吳旦生曰海中星占云天雞星動為有赦蓋王者以天雞為度隋書刑法志云北齊赦日令武庫設金雞及鼓於闕門右撾鼓千聲宣赦建金雞唐百官志云赦日立金雞於仗汝南有雞黃金飾首銜絳幡承以綵盤維以絳繩五坊小兒得雞者官以錢贖之或取絳幡而已按李庾西都賦建金雞於仗內聳修竿而揭起王建宫詞云樓前立仗看宣赦萬嵗聲長再拜齊日照綵盤髙百尺飛仙爭上取金雞蓋道有唐之典制也楊公談苑云起於西京蓋西主兊兊為澤雞者巽之神巽為號令合是二物製其形揭為長竿使衆人觀之麗譙坌入劉禹錫楚望賦序曰城之麗譙實鄰所舍四垂無蔽萬景坌入吳旦生曰莊子魏武侯欲偃兵徐無鬼曰君亦必無盛鶴列於麗譙之間注麗譙戰樓名一云魏城門名譙亦作嶕謂華麗而嶕嶢也前漢書陳勝傳戰譙門中師古注門上為髙樓以望故曰譙樓劉貢甫云譙陳之旁邑此適譙之門耳猶宋門鄭門之類楊升庵云城門名麗譙者麗如魚麗之麗力支切譙即譙呵之譙謂守門人成列而呼喝之也余觀劉賦中有云我卜我居於城之隅宛在藩落麗譙渠渠是時謫武陵謂以身居其中也而全文皆居髙望逺之詞李喬亦作楚望賦傷劉也序云思必深而深必怨望必逺而逺必傷賦云生逺情於地表起遙恨於天末則麗譙於譙望之義居多司馬相如哀二世賦坌入曽宫之嵯峨注云坌並也普頓步頓二反劉賦坌入字出此蘇子瞻書臨臯亭云重門洞開林巒坌入亦用此也按左思吳都賦儇佻坌並注云疾走貌李為日賦夏日之烘彤坌勃唐儒學傳坌集京師孔融表溢氣坌涌陸龜䝉怪松圖讃坌憤激訐韓退之詩坌藪畢原陋金人邊德舉詩窪尊塵坌寂無歡雷希顔詩塵坌恐驚黃鵠舉濾水白行簡濾水羅賦焦螟之生必全有以小為貴者江漢之流雖大蓋可一以貫之吳旦生曰欲全水蟲之命凡取水必濾而後飲蓋僧家戒律有此規也僧靈一詩濾泉侵月起掃徑避蟲行白樂天送僧文暢詩山宿馴溪虎江行濾水蟲王建詩藕綃紋縷裁來滑鏡水波濤濾得清楊廉夫樂府云水晶簾空濾明月三十六宫白於水桐華鳳李德裕畫桐華鳳賦序云成都夾岷江磯岸多植紫桐每至春暮有靈禽五色小於𤣥鳥來集桐華以飲朝露及華落則煙飛雨散不知所往有名工繢於素扇豫因作小賦於上者也歌曰東風晚兮芳節闌敷紫華兮䕃碧湍美斯鳥兮類鵷鸞具體微兮容色丹彼飛翔於霄漢此藻繪於氷紈雖清秋之已至常愛玩而忘飱吳旦生曰寰宇記桐花色白至春有小鳥色焦紅翠碧相間生花中惟飲其汁不食他物花落遂死人以蜜水飲之或得三四日性多跳擲抵觸便死土人畫桐花鳳扇即此也性馴好集美人叉上喬子曠寄女子黃觀詩那能飛作桐花鳳一集佳人白玉叉唐僧隱巒詩五色毛衣比鳳雛深叢花裏只如無美人買得偏憐惜移向金叉重幾銖統志云廣西南寧出倒掛毛緑常倒掛於樹林故名日詢手鏡云倒掛小巧可愛形色如緑鸚鵡而小略大於瓦雀好香故名收香倒掛鮮于伯機退宫人引云金蓮斜抱捧珠龍玉叉倒掛收香鳥蘇東坡異鵲詩家有五畝園么鳳集桐花又梅花詩故山亦何有桐花集么鳳劉言史詩腸斷錦城風日好可憐桐鳥出花飛王原吉詩梨雲散盡千官影獨見桐花小鳳栖王元章詩五更窗前博山冷么鳳飛鳴酒初醒袁海叟詩緑毛么鳳無棲處來往蘭房不厭頻髙季迪咏倒掛詩緑衣小鳳啼愁罷瘦影翻懸桂枝下天順間樊時登詩梧桐音冷么鳳鳴屏山暗結愁雲紫華山楊敬之華山賦見若咫尺田千畝矣見若還即環字堵城千雉矣見若杯水池百里矣見若蟻蛭臺九層矣醯雞往來周東西矣蠛蠓紛紜一作紛紛秦速亡矣蜂巢一作窠聨聨起阿房矣俄而復然立建章矣小星奕奕焚咸陽矣纍纍繭果祖龍藏矣吳旦生曰王勉夫謂杜牧阿房宫賦明星熒熒開妝鏡也緑雲擾擾梳曉鬟也渭流漲膩棄脂水也煙斜霧橫焚俶蘭也雷霆乍驚宫車過也轆轆逺聽杳不知其所之也杜楊二文同一機杼洪容齊謂敬之賦內數語杜佑李德裕常所誦念牧之乃佑孫則阿房賦實模倣楊作也江行雜録云牧之阿房宫賦六王畢四海一蜀山兀阿房出陸傪長城賦千城絶長城列秦民竭秦君滅輩行在牧之前則阿房又祖長城句法矣余觀賦家不嫌相襲如唐說齊中興賦序云雖詞有工拙學有博陋氣有强弱思有淺深要皆變化馳騖不失古人之法度乃用班孟堅兩都賦序道有夷隆學有粗密之語司馬相如大人賦亦用屈原逺遊中語自李尤有德陽殿賦而王延夀之靈光殿何晏韋誕夏侯𤣥之景福殿宋武帝劉義恭何尚之之華林清暑殿諸賦出矣自揚雄有蜀都賦而傅毅之洛都班固之西都東都張衡之南都東京西京左思之蜀都吳都魏都徐幹之齊都劉楨之魯都劉邵之趙都庾闡之揚都周美成之汴都諸賦出矣自馮衍有顯志賦而劉楨之遂志丁儀之厲志韋誕之叙志棗據之表志曹攄之述志陸機之遂志梁元帝之言志諸賦出矣自宋玉有好色賦而司馬相如之美人張衡之定情蔡雍之協初曹植之靜思陳琳阮瑀之止欲王粲之間邪應瑒之正情張華之永懷江淹之麗色沈約之麗人諸賦出矣雲龍杜牧阿房宫賦長橋卧波未雩何龍吳旦生曰隱居詩話牧謂龍見而雩故用龍以比橋殊不知龍者龍星也余以隱居此辨甚確齊源師謂髙阿那肱龍見當雩阿那肱曰何處龍見其色如何師曰龍星初見禮雩祭非真龍也豈牧之文人而亦有此失耶後見洪駒父詩話載古本是未雲何龍其義始安乃知㸃畫之訛相去懸絶至此百川學海云蓋長橋之卧波上如龍之未得雲而飛去若加以雩字則龍乃星名何有於長橋之勢哉潘子真詩話云曽南豐言阿房宫賦鼎璫玉石珠瑰金礫棄擲邐迤秦人視之亦不甚惜瑰當作塊蓋言秦人視珠玉如土塊瓦礫也觀此益知雩雲之訛有自來矣書帶草陸龜䝉書帶草賦彼碧者草云書帶名先儒既沒後代還生吳旦生曰三齊記略不夜城東有文登山鄭𤣥刪注詩書栖於北山上有古井石碣旁生細草葉如薤之葉其長尺餘堅韌異常土人謂之康成書帶草梁元帝𤣥覽賦書帶新抽屏風芽發劉夢得詩墨池半在頽垣下書帶猶生蔓草中蘇子瞻詩庭下已生書帶草使君疑是鄭康成金人劉無黨詩慙無書帶草采采為盈手汪彥章詩門外遍生書帶草林間知是德星堂吳文可詩春暉早與萱花殞書種誰傳帶草香黃人康僚日中烏賦俯黃人而更助金光吳旦生曰符瑞圖日二黃人守者異國人來降翟公巽詩青女霜如失黃人日故遲宋景文詩青女回風還習習黃人捧日故遲遲滕邁二黃人守日賦離立環乎兩耳聫影繞於重輪遂使慕有道之風歸我一德奉無私之照惟豫二人升扶桑孰云孑立厠羲和乍若朋來紙鳶楊譽紙鳶賦望有塵埃謂翻形而載斾聽無音響疑避影以銜蘆吳旦生曰紙鳶童子戲郭恕先畫小童放風鳶引線數丈以滿匹素者此也今人誤以風箏名紙鳶殊不知風箏風琴乃施之屋角觸風而鳴自諧宫商故名在梵宫塔院為多老杜謁𤣥元廟詩風箏吹玉桂是也髙駢風箏賦依稀似曲才堪聽又被風吹别調中此豈咏紙鳶語耶王荆公風琴詩風鐵相敲固可鳴朔方行夜響行營此乃簷前鐵馬也歷代詩話卷十九
