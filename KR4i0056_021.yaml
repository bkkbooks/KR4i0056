body:
  text: 歷代詩話卷二十一歸安吳景旭撰丙集下之下賦金粉唐寅六朝金粉賦一顧傾城兮再傾國胡然而帝也胡然天吳旦生曰子畏僑居南都嘗宴一通侯家時文士雲集即席同賦子畏先成讀至此二語侯大稱賞餘士俱閣筆蓋子畏善作情語如自咏云四更中酒半床病三月傷春滿鏡愁又觀燈云沈香連理三珠樹結綵分行四照花皆極雅麗金魚王世貞金魚賦何水族之微渺承金儀之熠艴形表瑞乎帝符色徴緣於灼日冠蹙浪之瓊丙抱含書之丹乙鱗奕奕而垂錦沫霏霏而布瑟吳旦生曰屠緯真金魚品云嘗怪金魚之色相變幻遍考魚部即山海經異物志亦不載讀子虛賦有曰網玳瑁鈎紫貝及魚藻同置五色文魚因知其色相自來本異而金魚特總名也余按述異記關中有金魚神云周平二年十旬不雨祭天神金魚躍出而雨降又屈原九歌乘白黿兮逐文魚王逸注鯉魚也或即此種則前此已有之當不始於漢賦抱朴子云丹水有丹魚夏至十夜伺魚浮出水有赤光如火博物志云金魚出功婆塞江腦中有金述異志云晉桓沖遊廬山見湖中有赤鱗魚洛神賦騰文魚以警乘戴叔倫詩池塘養錦鱗于念東詩躍水朱光溜嘉靖中王元美詩猩紅數點媚清泠吳明卿詩水面文魚作隊行帝京景物略云魚之種深赤曰金瑩白曰銀其魚金貴乎其銀周之其魚銀貴乎其金周之而别以管若篐管者鬛下而尾上周其身者也篐者不及鬛周其尾者也魚病二曰蝨曰瘟瘦而白點生蝨也治以糞浸新磚投之鱗張如脫者瘟也法以新藍布擦之魚死三吞肥皂水得一死橄欖柤得二死核桃皮水得三死天將雨魚拍拍出水面水底蒸如熱湯也韻語陽秋云潮州精舍寺池有金鯽魚數年一現故白樂天詩唯有上強精舍寺最堪遊處未曽遊蓋為此也臨安六和寺亦有金鯽池蘇子美詩沿橋待金鯽竟日為遲留亦以其出有時故竟日待之爾自子美之後四十年東坡始遊兹寺嘗投餅餌待之乃略出不食坡謂此魚難進易退而不妄食宜其夀若此作詩云我識南屏金鯽魚今亦貴鯽不售鯉余按元馬虛中訪西湖玉公詩池中金鯽疑龍在歸路殘雲帶雨回正指此至崇禎初談服膺詩士女相呼看金鯽歡盡趣竭餅餌擲乃用東坡六和故實以咏燕都之金魚池也桯史云今中都有豢魚者能變魚以金色鯽為上鯉次之貴遊多鑿石為池置之簷牖間以供玩或云以闤市汙渠之小紅蟲飼凡魚百日皆然初白如銀次漸黃久則金矣姓州王世貞登釣臺賦夫一介之賤微靈誠感而燭天遂姓其州而貌其山者千五百年吳旦生曰吕太史釣臺記云姓是州曰嚴丘瓊臺詩云祚終四百已無漢州歷千年尚姓嚴王季重嚴灘詩云誰何一男子舉州冒其姓自古及今沿習之訛不禁囅然欲笑螢雪叢説有一絶云誰知避諱更嚴氏灘與州名總誤稱余喜此絶為有學識因為晰言之按袁嵩後漢書云皇帝諱陽一名莊字子麗於是顯宗諱莊悉改莊為嚴故莊子陵為嚴子陵卞莊為卞嚴莊君平為嚴君平觀華陽國志莊遵字君平成都人也然而稱君平者每云博覽亡不通依老子嚴周之旨著書十萬餘言又敘傳云貴老嚴之術老老子也嚴莊周也其他又以辦裝為辦嚴治嚴或以為稱人當曰辦嚴自稱曰辦裝不知辦嚴即辦裝而避莊字并同音之裝字亦避耳據此則嚴州合名莊州嚴陵灘合名莊陵灘今漫然曰姓其州而不考之可乎况宣和間方臘冦江浙始改睦州為嚴州則計其嵗月幾何而謂之千五百年乎李西涯寄莊孔暘詩清時例有逃名客見説嚴陵本姓莊最可證楊升庵云古人避諱改字自有意義明帝諱莊改莊助為嚴助莊子陵為嚴子陵以莊與嚴古同音殷武詩叶音是其證也子陵碣略云光本姓莊字子陵本新野人避亂會稽范史以為會稽人誤矣其妻梅福季女也胡元瑞云按徐道暉詩梅福神仙者新知是婦翁最明可證老學庵筆記云今人謂具州為甘陵吉州為廬陵常州為毗陵峽州為夷陵皆自其地名也惟嚴州有名嚴陵灘嚴陵乃其姓字灘是釣處若謂之嚴灘尚可今俗謂之陵殊可笑也熠耀王世貞二鳥賦師名之曰丹鳥而字以熠耀吳旦生曰大戴傳螢謂之鳥者重其養也凡有翼者為鳥困學紀聞云豳風熠耀宵行傳云熠耀磷也朱子謂熠耀明不定貌宵行蟲名如蠶夜行有光如螢其説本董氏而説文引詩熠耀宵行熠盛光也末章云倉庚于飛熠耀其羽其義一也楊升庵云熠耀之訓為螢火久矣今疑末章有倉庚于飛熠耀其羽遂以熠耀為明貌而以宵行為螢火固哉其為詩也古人用字有虛有實熠耀之為螢火實也熠耀為倉庚之羽虛也謂倉庚之羽如熠耀之明非謂熠耀即倉庚也今元美賦云字以熠耀其意與升庵同古今注螢火一名耀夜一名景天一名熠耀一名丹良一名磷一名丹鳥一名夜光一名宵燭水母屋瓦屠隆溟海波恬賦水母目蝦屋瓦江珧吳旦生曰郭璞江賦注水母俗名海舌食物本草云水母即海靼靼音涉今人以蜇字當之訛也類編云水母名曰虴形如覆笠以蝦為目蝦動虴沈蓋常有蝦依之以衆為目蝦見人則驚此物亦隨之而沒故云目蝦越絶書云海鏡蟹為腹水母蝦為目蘇子由詩去住由人真水母簞瓢粗足似山雌嶺表録異云南中舊呼為蚶子頃因盧鈞尚書作鎮遂改為瓦屋子以其殼上有稜如瓦壠故名焉海物異名記云天臠瓦壠蚶子也南州志贊云海蛤魁陸瓦壠礦殼外眉內渠形質渾朴注云眉髙為眉渠疏為渠歷代詩話卷二十一
