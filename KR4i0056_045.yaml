  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0056_WYG_045-1a, image: WYG1483/WYG1483-0393a.png}
body:
  text: 厯代詩話巻四十五歸安呉景旭撰已集杜陵譜系下杜少陵先生正傳甫字子美本出杜陵徙為襄陽人曽祖依藝令鞏又徙河南鞏縣祖膳部員外郎審言以詩著神龍間生奉天令閑其適為甫七嵗綴詩少不羈遊吳越客梁宋與李白髙適登吹臺入酒家盧嘯咏人皆異之歸長安應詔退下表稱先君恕預以降逮亡祖審言髙視藏府假臣執先祖故事述作跂揚雄枚臯流㑹天寶十載朝獻太清宮饗太廟有事南郊奏三大禮賦竒其才命宰相試文章授河西尉不拜改右衛率府胄曺參軍潼闗之變車駕幸蜀避亂鄜州聞靈武傳位羸服趨赴陷賊中尋脫賊達行在所上謁拜左拾遺時房琯敗績于陳陶斜罷相甫上疏言琯罪細不宜免大臣帝怒詔三司推問得宰相張鎬救帝乃解甫進謝狀復稱琯故相子少自樹立晚為醇儒時論許以公輔才臣不自度歎其氣志挫䘐望陛下棄細錄大以允衆望天下幸甚跡其抗聲忤旨引稱不少貶要才為國惜非止以布衣驩也冬收京扈從而還明年出為華州司功參軍屬闗輔饑棄官客秦州遂入蜀卜居成都浣花里嚴武鎮成都往依之武還朝往來左蜀諸郡召補京兆功曺不至武復出鎮亦歸成都表為節度叅謀檢校工部貟外郎居幕府性褊敖倚醉上武牀目懾曰挺之乃有此兒武以世舊不之忤過草堂不巾見亦不銜時謂甫狂生且多武之能屈意以成甫髙也武卒崔旰亂蜀乃下忠渝次雲安大厯初居䕫州往來轉徙者三閱嵗自此出峽赴荆門泛處于潭又值臧玠之亂泝郴水而上至耒陽時江水暴漲阻飢方田驛聶令通刺以酒肉餉一夕而卒享年五十有九贊曰以此之才奮興當世職任清塗日條上封事為天子近臣詎不盛哉乃遭譴黜所在亂饑自荷薪拾橡梠不給三年營一草堂曽不得寜止鬱邑無可依而去悲夫要其憤發有作念不㤀君世稱詩史盖賢於遇矣按新舊史本傳各無倫次謹為攷訂而作正傳畧舉二史于左新唐書天寳十三載朝獻太清宮饗廟及郊甫奏賦三篇帝竒之使待制集賢院按進三大禮賦表云臣生長陛下淳樸之俗行四十載矣天寳十載公齒四十則進三賦乃十載事而十三載所進者為請封西嶽賦也即請封西嶽賦序云上旣封泰山之後三十年間自開元十三年乙丑封泰山至天寶十三載甲午計有三十年則西嶽賦在十三載矣舊唐書獻三大禮賦𤣥宗奇之召試文章授京兆府兵曺參軍按十三載進西嶽賦表尚稱臣本杜陵諸生盖長安一匹夫耳則獻三賦時何嘗授官公自贈詩不作河西尉凄凉為折腰老夫怕趨走率府且逍遙原注云時免河西尉為右衛率府兵曺此天寳十四載事也是年祿山反故述懐詩昔罷河西尉初興薊北師可證新唐書上疏言琯事帝怒張鎬救解然自是不甚省錄時所在㓂奪甫家寓鄜彌年艱寠孺弱至餓死因許甫自往省視據公自京赴奉先縣詠懐詩云老妻寄異縣十口隔風雪入門聞號咷幼子飢已卒則孺弱餓死當在天寳十四載赴奉先時而非至德二載省視鄜州時也新唐書祿山亂天子入蜀甫避走三川肅宗立自鄜州羸服欲趨行在為賊所得至德二載亡走鳯翔謁上拜左拾遺此最可信也舊唐書以為甫自京師宵遁赴河西謁肅宗于彭原集注因之亦謂自京竄至鳯翔皆悞舊唐書甫甞憑醉登武之牀瞪眎武曰嚴挺之乃有此兒武雖㥯暴不以為忤初無欲殺之說新唐書以為武外若不為忤中銜之一日欲殺甫集吏于門武将出冠鈎于簾者三左右白其母奔救得止觀公先寄詩云得歸茅屋赴成都直為文翁再剖符又八哀詩云空餘老賓客身土愧簪纓其生死交情亦可槪見新史失之誣矣舊唐書武卒甫無所依乃遊東蜀依髙適既至而適卒按適于廣德元年十二月入朝及拜左散騎常侍永泰元年正月乃卒公聞髙常侍亡詩云歸朝不相見蜀使忽傳亡是適卒于歸朝後而非在蜀也何言欲東依適旣至而適卒耶其年正月適卒至四月武卒是適卒于武之前也何言武卒公無所依而依適耶舊唐書甫以其家避亂荆楚扁舟下峽未維舟而江陵亂乃溯㳂湘流遊衡山據公在江陵有暮春雨後夏日執熱秋日述懐等詩是三月至江陵秋移居公安又數月至嵗暮方抵岳何言未維舟而亂即去之也况其時江陵無警也舊唐書永泰二年卒于耒陽按公生于先天元年壬子卒于大厯五年庚戌為年五十有九則非永泰年間矣其言卒于耒陽最為可信吕大防詩譜以為是年夏還襄陽卒于岳陽魯訔黄鶴譜謂卒于潭岳之交又牽引囘棹歸秦等詩以為證皆不足憑也舊唐書宗武子嗣業自耒陽遷甫之柩歸塟于偃師元微之墓誌云旅殯岳陽其孫嗣業去子美殁餘四十年為元和之癸已合窆于首陽之山前因觀耒陽縣志載工部墓在縣治北郭外二里胡苕溪謂耒陽有子羙墓前賢多留題司馬温公謂豈微之但為誌而不克遷或已遷而故塜尚存耒陽耶此皆不明旅殯之義遂致衆說紛紛按説文殯者死在棺将遷塟柩賓遇之此云旅殯當是卒于耒陽遷柩岳陽後乃歸塟偃師也公自稱當陽君後故世塟偃師首陽山山在官路而當陽墓載圖經可攷晉書預先為遺令曰吾去春入朝自表營洛陽城東首陽之南為将來兆域開隧道南向天寶三載公以祖母盧歸塟偃師嗣業歸塟公于偃師皆承當陽君之志也厯代詩話巻四十五
