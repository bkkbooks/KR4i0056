body:
  text: 歷代詩話卷四十六歸安吳景旭撰庚集上之上唐詩烏鰂墨宋遷寄試鶯詩誓成烏鰂墨人似楚山雲吳旦生曰江東人取烏鰂之墨書契以紿人物踰年墨消則一空紙遷意以盟誓成虛亦猶此也南越記云烏賊魚腹中血正黑可以書也世謂烏賊懷墨而知禮古今注云一名河伯度事小史本草作白事小史炙轂子云此魚每遇漁舟即吐墨染水令黑以混其身食物本草云其墨用以書偽劵踰年即脫此魚自浮水靣烏見以為死往啄之乃捲入水故曰烏賊吕氏春秋注引古月令云九月寒烏入水化為烏則異魚圖贊云烏則之魚􅖂又作鵈鵯鵊也鳥所變海物異名記云烏鰂八足集足在口縮喙在腹形類鞋囊其名烏鰂吸波潠墨迷射水慝海録碎事云烏􅀢有矴遇風則蚪前一須下矴一名纜魚風波稍急即以其須粘石為纜按賊字作則鰂􅀢一也説文又作鰞鰂元散詩話云試鶯以朝鮮厚繭紙作鯉魚函兩面俱畫鱗甲腹下令可以藏書此古人尺素緘魚之遺制也詳於丁集雙鯉魚試鶯每以此遺遷嘗有詩云花箋製葉寄郎邉江上尋魚為妾傳郎處斜陽三五樹路中莫近釣翁船此貞觀中事也為僧劉氏雜志曰徐敬業與駱賔王兵敗賔王亡命為僧往來靈隱寺宋之問至寺夜吟鷲嶺鬱岧嶤龍宫鎖寂寥久無下韻賔王隔壁朗吟以終萹之問大駭質明求見則遁矣敬業亦脫去為僧於衡山黃巢既敗依張全義為僧於洛陽嘗繪巳像題詩云記得當年草上飛鐵衣脫盡著僧衣天津橋上無人識獨倚闌干看落暉人見像識其為巢蓋古今若此脫身者多矣史豈盡得其實哉吳旦生曰劉安上仙而班馬言以叛伏誅姚泓緑毛覆體而寄奴斬一貌類者以立威史失其實若此等事何可具論按敬業逃入山天寶初有九十餘老僧名住括正其人也賔王亦落髮遍逰名山因至靈隱耳葛常之云駱集中有江南送之問詩兖州餞之問詩其相習如此不應相遇靈隱以為不相識也王弇州云年事不甚逺而駱為老僧稱宋少年決無是理則是唐詩紀事本事詩等亦如史家多失實耶陸放翁詩他年不死君須記會在天津看落暉自注云元微之贈老人詩天津橋上無人識獨倚闌干看落暉如雜志新話之言則放翁不應援巢以自喻矣地角天涯駱賔王詩地角天涯渺難測吳旦生曰俗言天涯海角不知成都實有此二石也賔王以使事入蜀故及之按遊宦紀聞云天涯石在中興寺耆老傳言人坐其上則腳腫不能行至今人不敢踐履及坐其上又有天牙石在大東門對昭覺寺髙六七尺有廟今石市入湯家園地角石舊有廟在羅城內西北角髙三尺餘王均之亂為守城者所壞今不復存矣欽州有天涯亭廉州有海角亭二郡蓋南轅窮途也寶祙楊升菴曰祙女人脅衣也盧照鄰詩倡家寶祙蛟龍被是也崔豹古今注謂之腰綵注引左傳衵服謂日日近身衣也是春秋之世巳有之豈始於唐乎吳旦生曰制自文王以繒為之曰腰巾漢武帝增以四帶名曰襪肚靈帝賜宫人蹙金絲合勝襪肚亦名齊襠則周初巳有之矣但引衵服以證寶襪恐未必然留青日札云今之襪胸一名襴裙隋煬帝詩寶襪楚宫腰謝偃詩細風吹寶襪蓋寶襪在外以束裙腰者視圖畫古美人粧可見故曰楚宫腰曰細風吹者此也若貼身之衵則風不能吹矣自後而圍向前故又名合歡襴裙沈約詩領上蒲桃繡腰中合歡綺是也其繡帶亦名襪帶今襴裙在內有袖者曰主腰領襟之上繡蒲桃花言其花朵朵如蒲桃也又觀胡侍墅談云建炎以來臨安府浙漕司所進成恭后御衣之目有粉紅紗抹胸真紅羅裹肚乃知抹胸裹肚之製其來不近世紀楊太真為祿山爪傷胸乳為訶子束胸者或妄傳矣零雨盧照鄰送孟學士南逰詩零雨悲王粲清尊别孔融吳旦生曰蔣仲舒箋釋謂本傳及鄴中詩集並無零雨之句豈偶悮用耶余按王仲宣從軍詩有云哀彼東山人喟然感鸛鳴又云昔人從公旦一徂輒三齡蓋一詩中再言及此皆用豳風零雨其濛事也鸛鳴之為雨徴此豳風本意也箋者失考招魂沈佺期三月三日獨坐歡州詩云誰念招魂節翻為禦魅囚吳旦生曰詩話總龜引荆楚記云屈原以五月五日投汨羅而死人傷之以舟楫拯焉故武陵競渡用五月五日蓋本諸此劉夢得云今舉楫相和之音皆曰何在蓋所以招屈原也詩曰湘江五月平堤流邑人相將浮采舟靈均何在歌巳矣哀蹤振楫從此起今江浙間競渡多用春月疑非招屈之義及考沈佺期三月三日詩王績三月三日賦亦云新開避忌之席更作招魂之節則以上巳為招屈之時其必有所據也豫觀琴操云介子推五月五日焚林而死故是日不得發火而異苑又謂寒食始禁煙蓋當時五月五日以周正言之爾今用夏正乃三月也屈原以五月五日死而佺期王績以上巳為招魂之節者亦豈謬耶朱子楚辭辨證云後世招魂之禮有不專為死人者如杜子美彭衙行云暖湯濯我足剪紙招我魂蓋當時關陕間風俗道路勞苦之餘則皆為此禮以袚除而慰安之也近世髙抑崇作送終禮云越俗有暴死者則亟使人遍於衢路以其姓名呼之往往而蘇以此言之又見古人於此誠有望於復生非徒為是文具而巳也北枝宋之問度大庾嶺詩淚盡北枝花吳旦生曰許渾詩只應頻看北枝梅與延清同意按漢梅鋗定百粵因名梅嶺後鋗將庾勝兄弟守之又名大庾嶺非專以嶺上有梅也而梅亦有異白孔六帖云大庾嶺上梅南枝落北枝開寒暖之候異也天中記兩婦東壁詩南枝向暖北枝寒一樣春風有兩般李嶠咏梅詩大庾斂寒光南枝獨早芳扈宋之問詩吾君不事瑶池樂時雨來看農扈春吳旦生曰延清不侈般樂而諄及農事王摩詰雨中春望之作云為乘陽氣行時令不是宸逰玩物華皆得古詩規針之義按金天氏勤於民事命春扈以耕稼召夏扈以藝鋤秋扈所以收斂冬扈於焉蓋藏左傳郯子曰少皥氏以九扈為九農杜預注扈有春扈鳻鶞夏扈竊玄秋扈竊藍冬扈竊黃棘扈竊丹行扈唶唶宵扈嘖嘖桑扈竊脂老扈鷃鷃以九扈為九農之號各隨其宜以教人事也張衡東京賦勤致賚於九扈薛綜注九扈農正知田事扈正也按郭璞注桑扈竊脂謂好盜脂膏食之因以為名陸璣詩疏好竊人脯肉脂及膏故稱竊脂後觀丘光庭辨爾雅云上文夏扈竊玄秋扈竊藍冬扈竊黃棘扈竊丹豈諸扈皆善為盜而偷竊玄黃丹藍乎蓋竊之為言淺也竊玄者淺黑色也竊藍者淺青色也竊黃者淺黃色也竊丹者淺赤色竊脂者淺白色也今三四月間採桑之時見有小鳥灰色眼下正白俗呼白鵊鳥是也以其採桑時來故謂桑扈東山王邱東山詩智哉謝安石携妓入東山吳旦生曰王丘初唐人扈從明皇南出鼠雀谷張説作詩和者甚衆皆遜丘作葛常之謂唐推燕許而丘不以詩名觀燕許之作慙於丘多矣楊升菴謂東山詩太白之先鞭也按太白有憶東山二絶云不向東山久薔薇幾度花白雲他日散明月落誰家我今携謝妓長嘯絶人羣欲報山東客開關掃白雲韻語陽秋云會稽臨安金陵三郡皆有東山俱為謝安携妓之所按本傳初安石寓居會稽與王羲之許詢支遁逰處被召不至遂棲遲東山唐裴冕等鑑湖聯句有興發還尋戴東山更問東此會稽之東山也本傳又云安石常往臨安山中坐石室臨濬谷悠然歎曰此與伯夷何逺今餘杭縣有東山東坡有逰餘杭東西巖詩注云即謝安東山所謂獨擕縹眇人來上東西山者是也此臨安之東山也本傳又謂及登台輔於土山營墅樓館林竹甚盛每擕中外子姪遊集今土山在建康上元縣崇禮鄉建康事迹云安石於此擬會稽之東山亦號東山此金陵之東山也雙頭牡丹許彥周詩話曰唐髙宗宴羣臣賞雙頭牡丹賦詩上官昭容一聯云勢如連璧友心似臭蘭人計之必一英竒女子也吳旦生曰湘湖故事載徐仲雅合歡牡丹詩平分造化雙包去拆破春風兩面開汴都平康記載朝無咎雙頭牡丹詩二喬新獲吳宫怯雙隗初臨晉帳羞中州集載黨世傑雙頭牡丹詩並肩翠袖初酣酒對鏡紅妝欲鬭竒較之昭容遜其髙雅歷代詩話卷四十六
