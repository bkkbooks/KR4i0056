body:
  text: 歷代詩話卷五十歸安吳景旭撰庚集中之中唐詩登第唐宋遺史曰孟東野有下第詩棄置復棄置情如刀劒傷又再下第詩兩度長安陌空將淚見花其後登第則志氣充溢一日之間花皆看盡進取得失蓋亦常事而東野器宇不宏至於如此何其鄙耶吳旦生曰東野調溧陽尉地有投金瀨林間水際徘徊賦咏曹務多廢至遣假尉代之而分其半俸嘗作詩云借車載家具家具少於車借者莫彈指貧窮何足嗟此其蕭條高寄類有道者之所為退之薦士詩云有窮者孟郊受材實桀驁冥觀洞古今象外逐幽好蓋許之深矣何一登第即云春風得意馬蹄疾一日看盡長安花致小蘇輩譏其工於為詩陋於聞道也林下偶談載東野墓志云年幾五十始以尊夫人之命來集京師從進士試既得即去史云年五十得進士第樊汝霖云時郊年五十四三説不同按唐登科記郊登第在貞元十二年李程榜又按墓志郊死於元和九年年六十四自元和元年逆數而上至貞元十二年凡十九年矣郊登第當是四十六又退之薦士詩酸寒溧陽尉五十幾何耄蓋郊登第四年方調溧陽尉也志謂之幾五十是矣史與樊説失之然郊集中有落第詩再下第詩又有下第東南行及下第東歸留別長安知己等詩則郊前此嘗纍舉京師矣今志謂之年幾五十始以尊夫人之命來集京師又何也白打陶南村曰豫在蜀見東坡手書一幅曰黃幡綽告明皇求作白打此亦快人意哉味東坡語似以白打為搏擊之意然王建宫詞云寒食內人長白打庫中先散與金錢則白打似博戲耳不知公意果何如吳旦生曰此以白打為戲因戲分錢即觀韋莊詩內官初賜清明火上相間分白打錢其義自明按齊雲論云白打蹴鞠戲也兩人對踢為白打三人角踢為官場劉向別録云蹴鞠黃帝所造本兵勢也或云起於戰國徐堅云鞠即毬字霍去病傳穿域踏鞠顔師古注云以皮為之實以毛蹙踏為戲也初學記作蹙􅨲焦弱侯云以鞠從足作踘皆一時趂筆之誤唐書音訓云古者以毛實皮蹙而不擊後世以杖擊丸或於驢馬之上當言毬不當言鞠也劉貢父詩話歸氏子弟嘲皮日休曰八片尖皮砌作毬火中燂了水中揉一包間氣如常在惹踢招拳卒未休今栁三復能之述曰背裝花屈口勿反膝白打大􅰟斯進前行兩步蹺後立多時栁欲見晉公無由會公蹴毬後園偶迸出栁挾取之因懷所業戴毬以見公出再拜者三每拜毬起復於背膂幞頭間公笑而竒之遂延門下池錦王建宫詞如今池底休鋪錦菱角雞頭積漸多吳旦生曰西清詩話引文宗論德宗奢靡云聞得禁中老宫人每引流泉先於池底鋪錦王氏談録言此即文宗對李石云云問之舊宫人無此事余按鄭嵎詩世不傳自曾子固言之方知其津陽門詩皆以韻語紀時事也其敘賜浴云暖山度獵東風微宫娃賜浴長湯池刻成玉蓮噴香液潄回煙浪深逶迤犀屏象薦雜羅列錦鳬繡鴈相追隨自注云與王建池底鋪錦事相合蓋子固稱嵎詩與樂天長恨微之連昌並列其紀事自確則李石承詔録與王建宫詞皆托實也輕容王建宫詞云嫌羅不著愛輕容吳旦生曰齊東野語紗之至輕者曰輕容唐類苑云輕容無花薄紗也元豐九域志云越州歲貢輕容紗五匹元微之寄樂天白輕褣樂天製以為衣有咏輕褣詩云袴花白似秋雲薄衫色青於春草濃而褣字俗本改為􅀈又作庸榕皆誤又方物考云綿州巴西縣紗子一匹重二兩婦人以為暑服李長吉詩蜀煙飛重錦峽雨濺輕容玉蘂花高齋詩話曰王建唐昌觀玉蘂花詩一樹瓏鬆玉刻成飄廊點地色輕輕女冠夜覓香來處惟見階前碎月明今瑒花即玉蘂花也王介甫以之比瑒蓋瑒玉名取其白耳黃魯直又更其名為山礬謂可以染也廬陵段謙叔多聞士也其家所藏異書古刻至多有楊汝士與白二十二帖云唐昌玉蘂以少故貴自來江南山山有之土人取以供染事不甚惜也則知瑒花之為玉蘂無疑矣傅子容見此帖乃作絶句云比瑒更礬總未佳要須博物似張華因觀異代前賢帖知是唐昌玉蘂花吳旦生曰韻語陽秋云江南野中有小白花木高數尺春開極香土人呼為瑒花瑒玉名取其白也魯直云荆公欲作詩而陋其名豫請名曰山礬野人取其葉以染黃不借礬而成色故以名爾常有絶句云高節亭邉竹已空山礬獨自倚春風是也近見高齋詩話云此花即玉蘂花豫恐未必然爾玉蘂佳名也此花自唐流傳至今當以玉蘂得名不應捨玉蘂而呼瑒魯直亦不應捨玉蘂而名山礬也瓊花惟揚州后土祠中有之其他皆聚入仙近似而非也鮮于子俊詩云百花天下多瓊花天上希結根托靈祠地著不可移八蓓冠羣芳一株攢萬枝而春明退朝録乃云瓊花一名玉蘂按唐昌觀有玉蘂王建所謂女冠夜覓香來處惟有階前碎月明是也長安觀亦有玉蘂劉禹錫所謂玉女來看玉樹花異香先引七香車是也唐內苑亦有玉蘂李德裕與沈傅師草詔之夕屢同賞玩故德裕詩云玉蘂天中木金閨昔共窺而傅師和云曾對金鑾直同依玉樹陰是也招隱山亦有玉蘂李德裕所謂吳人初不識因豫賞玩乃得此名是也由是論之則玉蘂花豈一處有哉其非瓊花明矣東坡瑞香詞有后土祠中玉蘂之句非謂玉蘂花止謂瓊花如玉蘂之白爾楊升菴據宋傅子容之詩謂瓊花玉蘂魯直名以山礬即今之梔子花佛經名薝蔔花胡元瑞謂四種迥異升菴合而一之大為孟浪因考合璧事類所辨四花形色並録於此論瓊花云瓊花天下無雙惟揚州后土祠一株耳世傳此花乃唐人所植樹大而花繁清馥異常潔白可愛獨殿春芳冠絶羣品唐賢多題咏之昨因紹興辛巳之變或謂今所存者非其舊使非老道士唐大寧者力言其不然鮮不以八仙名之矣蓋此花雖遭狼籍然其盤根非他所比似有神物為之遮護不然靈苗不絶生意復回既剪而終盛孰使之然哉論玉蘂云玉蘂花所傳不一以為瑒花瓊花山礬有以為米囊者其説皆非也蓋此花條蔓而生狀如荼䕷柘葉紫莖冬凋春茂花鬚出殆如氷絲上綴金粟花心復有碧筒倣佛膽瓶其中別抽一英出衆鬚上散為十餘蘂猶刻玉然名為玉蘂乃在於此羣芳所未有也論山礬云山礬花俗名碇花木高數尺枝肥葉密凌冬不凋花白未開時木犀相似及開差大香絶濃號七里香尋常山林間多有之又有千葉者按碇即瑒音相近也論薝蔔云薝蔔花一名梔子花樹高二三尺葉厚深緑如兔耳或似栁而短凡草木花皆五出惟此花六出色白中心黃春末抽蕤夏初結花又一種樹高五六尺許花葉皆差大謝靈運目為林蘭并筆之薝音膽鏡聽韻語陽秋曰凡物皆可占非特蓍龜也市中亦有聽聲而知禍福者莫知其所自觀王建有鏡聽詞云重重摩挲嫁時鏡夫壻遠行慿鏡聽豈今聽聲之類耶大涅槃經云不以瓜鏡芝草楊枝鉢盂髑髏而作卜筮則鏡能占卜信矣吳旦生曰鏡聽之法即月令廣義所言響卜也顧元慶謂懷鏡於通衢間聽往來之言以占休咎近世人懷杓以聽亦猶是也又有無所懷直以耳聽之者謂之響卜蓋以有心聽無心耳余觀李廓亦有鏡聽詞云匣中取鏡祠竈王蓋聽者必先竈前跪拜按鬼谷子卜竈法云元旦之夕汛掃爨室置香燈於竈門注水滿鐺置杓於水虔禮拜祝撥杓使旋隨柄所指之方抱鏡出門密聽人言第一句即是卜者之兆如有同卜者以鏡遞執即是彼兆三人五人皆傳鏡為主宜夜靜卜之吕氏春秋云正月元旦聽都邑人民之聲聲宫則歲善吉商則有兵徵旱羽水角歲惡管子云凡聽徵如負豬豕覺而駭凡聽羽如鳴馬在野凡聽宫如牛鳴窖中凡聽商如離羣羊凡聽角如雉登木以鳴音凄以淸注云此言呼以聽土地之音非謂他音皆然也人之聲合乎五音聽其首聲協而詳之也紅絲硯西溪叢語曰王建宫詞延英引對緑衣郎紅硯宣毫各別牀天子下簾親自問宫人手裏過茶湯恐是用紅絲硯江南李氏時猶重之歐公硯譜以青州紅絲石為第一此硯多滑不受墨若受墨妙不可加王建集中有作工硯又作洪硯皆非也吳旦生曰説文硯石滑也長箋云訓滑何滑訓利利猶厲也與研摩同義故曰石滑也世但解堅澤為滑則不可通矣通謂研為硯墨盂也高者曰臺穹者曰瓦青州紅絲石一洮河石二端溪石三歙州石四􅩯村石五皆石也有玉有金有磁有漆其類不一石其常也故從石古但作研又蘇易簡作文房四譜硯為首以青州紅絲石為一斧柯山第二龍尾石第三餘皆在中下雖銅雀臺古瓦硯列於下品特存古物耳東觀録云紅絲石出於青州黑山其理紅黃相參二色皆不甚深理黃者其絲紅理紅者其絲黃其紋上下通徹勻布漬之以水則有滋液出於其間以手磨拭之久而粘著如膏若覆之以匣至開時數日黑色不乾經夜即其氣上下蒸濡著於匣中有如雨露自得兹石而端歙之石皆置之中行不復視矣硯譜云紅絲石硯者須飲以水使足乃可用不然渴燥甚唐彥猷云此硯發墨不減於端石也東坡云彥猷以青州紅絲石為甲或謂惟堪作骰盆蓋亦不見佳者今觀雲庵所藏乃知前人不妄許爾一百六元微之連昌宫詞云初過寒食一百六店舍無煙宫樹緑自注云唐時京城寒食火禁極嚴以雞羽入灰有焦者皆罪之念奴覓得又連催特敕宫中許然燭吳旦生曰容齋四筆謂寒食為一百五者自冬至之後至清明歷節氣六凡為一百七日而先兩日為寒食故云他節不然也杜老有鄜州一百五日夜對月一篇江西宗派詩云一百五日足風雨一百五日寒食雨之類是也文獻通考云京師以冬至後一百五日為大寒食鄴中記云冬至一百五日為介子推冷食作乾粥食之即今菱糕也趙嘏寒食詩一百五日家未歸崔魯春日即事詩一百五日又欲來據此則詩人例以百五日為寒食矣今微之詞意謂在清明前寒食後店舍已無煙而宫中然燭乃一時之權宜耳然獨云一百六者何按荆楚歲時記云去冬至一百五日即有疾風甚雨王君玉詩疾風甚雨青春老又云據厯合在清明前二日亦有去冬至一百六者余因考之自後漢周舉定為三日之禁至唐時盛興之遂於寒食斷火三日謂去冬至一百四日五日六日也故或云一百五或云一百六其義一也丹陽記謂自冬至至清明凡七氣至寒食止一百三日蓋厯家以餘分演之爾雲騅叱撥元微之詩登山縱似望雲騅平地須饒紅叱撥吳旦生曰長慶集此歌自序云德宗皇帝以八馬幸蜀七馬道斃惟望雲騅來往不頓貞元中老死天廄臣稹作歌以記之余按八馬幸蜀玄宗事也其七斃於棧道雲騅獨存而德宗幸梁亦充御焉國史補云德宗幸梁馬號望雲騅駕還飼以一品料暇日牽而視之至必長鳴四顧若感恩狀後老死飛龍廄中貴戚畫為圖則謂德宗以八馬幸蜀過矣李方舟博物志云天寶中大宛進汗血馬六匹一曰紅叱撥二曰紫叱撥三曰青叱撥四曰黃叱撥五曰丁香叱撥六曰桃花叱撥上乃製名曰紅玉輦曰紫玉輦曰平山輦曰凌雲輦曰飛香輦曰百花輦後幸蜀遂以平山凌雲為讖宋羣牧判官王明上羣牧故事云叱撥之別有八曰紅耳叱撥曰鴛鴦叱撥曰桃花叱撥曰丁香叱撥曰青叱撥曰驑叱撥曰紫驑叱撥曰榆叱撥又云北方馬以叱撥為上白朴元微之詩白朴流傳用轉新吳旦生曰注言樂天於翰林中專取書詔批答詞撰為矜式禁中號為白朴每新入學求訪寶重過於六典王勉夫嘗檢唐藝文志及崇文總目無聞訪此書不獲適有以一編求售號曰制朴開帙覽之即微之所謂白朴者是也為卷上中下三上卷文武階勳等中卷制頭制肩制腹制腰制尾下卷將相刺史節度之類此蓋樂天取當時制文編類以規後學者菖蒲花元微之寄贈薛濤詩別後相思隔煙水菖蒲花發五雲高吳旦生曰微之出使西蜀知營妓薛濤有辭辨嚴綬遣濤往侍後登翰林濤獻松花紙百幅微之就於所獻紙寄贈一篇濤嘗好種菖蒲故有是句按本草菖蒲無花實有為瑞故古詩菖蒲花可憐聞名未相識張籍詩深恩已去若再返菖蒲花開月長滿南史張后方孕見庭中菖蒲花開光彩非常后曰嘗聞見蒲花者必貴因取吞之遂生梁武帝故李長吉詩風采出蕭家本是菖蒲花繼古叢編云周益公校正文苑英華序以堯韭對舜華非本草注安知其為菖蒲按梁元帝玄覽云金鹽玉䜴堯韭舜華梁太子賚河南菜啓堯韭未儔姬歜非喻典術曰堯之仁天星降精於庭感百陰為菖蒲焉紫薇白樂天入直西省詩絲綸閣下文章靜鐘鼓樓中刻漏長坐到黃昏誰是伴紫薇花對紫薇郎吳旦生曰天文志紫微大帝之座天子之常居也與花何涉唐中書省植紫薇花後世舍人院紫微閣前輒植此花雖循唐故事要亦何義後余見海録碎事云開元元年改中書省為紫微省改中書令為紫微令則樂天入直西省所稱紫薇郎指此耳薇當作微蓋樂天性愛此花有紫薇花詩云除却微之見應愛世間少有別花人又宋時府治虛白堂前有紫薇花兩株相傳樂天所植子瞻守郡時神宗書樂天紫薇花詩以賜之或植或咏其性然也舍人院亦重其人植其花謂即此是故實可也堯山堂外紀云范屏麓為國子時赴京鄉試卧舟中夢入廣寒宫嫦娥千百輩齊聲歌樂天此詩是科果成殿元續娶吳夫人小字紫薇蓋屏麓居􅀢山距余前溪十里餘特搆紫薇樓規制宏麗亦取此兆耳余猶及見之韻語陽秋云樂天又詩紫薇花對紫薇翁則此花之珍艷可知矣爪其本則枝葉俱動俗謂之不耐癢花自五月開至九月尚爛熳俗又謂之百日紅梅聖俞贈韓子華詩薄膚癢不勝輕爪嫩幹生宜近禁廬又贈王景彛詩薄薄嫩膚搔鳥爪離離碎葉剪城霞皆著不耐癢事胡文恭詩雅當翻藥地繁近曝衣天注云花至七夕猶繁似有百日紅之意瑟瑟白樂天琵琶行楓葉荻花秋瑟瑟楊升菴曰楓葉紅荻花白映秋色碧也瑟瑟珍寶名其色碧故以瑟瑟影指碧字讀者作蕭瑟解非是樂天又有暮江曲云一道殘陽照水中半江瑟瑟半江紅此瑟瑟豈蕭瑟哉正言殘陽照江半紅半碧耳吳旦生曰博雅瑟瑟碧珠也杜陽雜編有瑟瑟幕其色輕明虛薄無與為比唐語林盧昻有瑟瑟枕憲宗估其值曰至寶無價水經注水木明瑟韋莊詩留得溪頭瑟瑟波潑成紙上猩猩色丁謂詩翠影踈踈渡波光瑟瑟凝王周詩嘉陵江水色一帶柔藍碧天女瑟瑟衣風梭晚來織林逋咏茶詩石碾輕飛瑟瑟塵魯交野果詩碧如瑟瑟紅靺鞨靺鞨國名古肅愼地也産寶石大如巨栗中國謂之靺鞨據此則升菴之説益信乃陳晦伯以劉楨瑟瑟谷中風正之蓋樂天詩言色公幹詩言聲用意各別安得強證為蕭瑟之瑟也若盧照鄰秋霖賦風橫天而瑟瑟雲覆海而沉沉乃與公幹同意夭邪楊升菴曰唐詩錢唐蘇小小人道最夭邪又長安女兒雙髻鴉隨風趂蝶學夭邪夭音歪田子藝曰夭作歪非也夭少好貌即妖也邪即歪也葛魯卿詞人間花月見新妖不數江南蘇小正謂此也吳旦生曰錢唐二句乃白樂天詩夭音歪樂天自注也升菴詞品引張仲宗詞薄劣東風夭邪栁絮又升菴詩桃根桃葉最夭邪皆據樂天所注以為言也余見芥隱筆記云樂天詩揚州蘇小小人道是夭斜音伊邪反豈子藝有取於芥隱耶然芥隱作揚州恐誤按樂天杭州春望詩濤聲夜入伍胥廟栁色春藏蘇小家又餘杭形勝詩夢兒亭古傳名謝教妓樓新道姓蘇則樂天稔知其為錢唐妓也應從錢唐為是郭茂倩樂府解題云小小錢唐名娼蓋南齊時人西陵在錢唐江之西故曰西陵松柏下按小小墓一云江干一云湖曲張祜詩不知誰共穴徒願結同心然不言何地也吳地記云嘉興縣前有晉妓錢唐蘇小小墓徐凝詩嘉興郭裏逢寒食落日家家拜掃回只有縣前蘇小小無人送與紙錢灰元張光弼詩香骨沈埋縣治前藍尾䂬溪詩話曰樂天詩三杯藍尾酒一楪膠牙餳觀長慶集此詩題云七年元日對酒非鑽火時事也東坡詩藍尾忽驚新火後遨頭要及浣花前注引及白詩非是宋景文守歲云且盡燈前藍尾杯吳旦生曰荆楚歲時記膠牙者蓋使其牢固不動此為正旦故事而藍尾詳考之可不拘時用也按藍一作啉蘇鶚衍義云今人以酒巡匝為啉尾即再命其爵也南朝有異國進貢藍牛其尾三丈或云藍潁水其深三丈時人取之以為酒今兩盞從其簡也此皆非正行酒巡匝即重其盞蓋慰勞其得酒在後也又啉云者貪也謂處於坐末得酒最晚腹癢於酒既得酒巡匝更貪婪之故曰啉尾啉字從口此即侯白酒律所謂酒巡匝末坐者連飲三杯以慰之之説也按藍又作婪説文婪貪也杜林説下者黨相詐驗為婪盧含切箋云又婪音訓皆同河東記云申屠澄與路傍茅舍老父嫗及處女環火而坐翁自外挈酒至曰以君冒寒且進一杯澄因揖遜曰始自主人翁即巡澄當婪尾蓋謂最後之杯也宋景文詩稍倦持螯手猶殘婪尾杯古雋考略云廣韻飲酒半去半在曰闌當作闌尾石林燕語云或謂啉為燣如鐡入火貴出其色此尤無稽矣侍姬本事詩曰白尚書姬人樊素善歌妓人小蠻善舞嘗為詩云櫻桃樊素口楊栁小蠻腰年既高邁而小蠻豐艷因為楊栁之詞以托意云一樹春風萬萬枝嫩於金色軟於絲永豐坊裏東南角盡日無人屬阿誰吳旦生曰樂天嘗稱妓有樊素者年二十餘善唱楊栁枝人多以曲名名之一日將放去因作詩自題曰不能忘情吟且謂楊栁枝再拜長跪而致辭辭曰素事主十年凡三千有六百日巾櫛之間無違無失此東坡所謂不似楊枝別樂天也洪景盧言白集中有詩云菱角執笙簧谷兒抹琵琶紅綃信手舞紫綃隨意歌自注曰菱谷紫紅皆小臧獲名王勉夫又言妓不止此觀劉夢得贈小樊詩云花面丫頭十三四春來綽約向人時終須買取名春草處處將行步步隨又同州與樂天詩注云春草白君之舞妓也白詩云小奴捶我足小婢捶我背又不知小奴小婢者是何名也白別有詩云小花蠻榼二三升曰還携小蠻去試覓老劉看此小蠻乃酒榼名耳三花白樂天詩舞衣裁四葉馬鬛剪三花吳旦生曰唐六典外牧歲進良馬印以三花飛鳯之字東坡筆記言李將軍思訓作明皇摘瓜圖嘉陵山川帝乘赤驃起三騣與諸王嬪御十數騎出飛仙嶺下初見平陸馬皆驚而帝馬見小橋不進不知三騣謂何今見岑參有赤驃馬歌云赤髯胡雛金剪刀平時剪出三騣高乃知唐御馬多剪治而三騣其飾也復齋漫録乃引楊巨源觀打毬詩玉勒回時露赤汗花騣分處拂紅纓嚴維作敕賜寧王馬詩鏡點黃金眼花開白雪騣又見名畫録言開元天寶世尚輕肥多愛三花飾馬郭若虛藏韓幹畫貴戚閲馬圖中有三花馬蘇大參家有韓幹畫三花御馬晏元獻家有虢國出行圖亦畫三花馬蓋三花者剪騣為三辮耳楊升菴云唐詩朝騎五花馬又五花馬千金裘杜詩蕭蕭十里馬箇箇五花文隋丹元子步天歌五箇花文以馬鬛剪為五花或三花皆象天文也格是白樂天詩如今格是頭成雪彈到天明亦任君吳旦生曰格隔二字同義委巷叢談云言已是如此曰隔是元微之詩隔是身如夢頻來不為名鑿落琵琶白樂天詩銀含鑿落盞金屑琵琶槽吳旦生曰韓退之詩酡顔傾鑿落按海録碎事云蒼梧令金佐堯從賊被黥面嘗自稱金鑿絡湘楚人以盞斚中鐫鏤金渡者為金鑿絡又樂天送春詞銀不洛從君勸不洛酒器也意落絡洛古字通用張祜琵琶詩金屑檀槽玉腕明按説文長箋琵琶本作擘博厄切撝也􅀈博下切􅔊擊也唐人多以琵作必音讀如云四絃不似琵琶聲斷腸猶繫琵琶絃忽聞水上琵琶聲之類是也楊亷夫詩東山宴上琵琶骨自注琵音弼樂天句當如此讀古今樂録云琵琶出於絃鞉杜摯以為秦末苦長城之役百姓絃鞉而鼓之又貞觀中裴洛兒彈琵琶始廢撥用手今所謂搊琵琶是也席上腐談云王昭君琵琶壞重造而其形小昭君笑曰渾不似今訛為胡撥四即元史以為火不思亦訛天地韻語陽秋曰孟郊詩食薺腸亦苦強歌聲無歡出門即有礙誰謂天地寬許渾詩萬里碧波魚戀釣九重青漢鶴愁籠皆是窮蹙之詩白樂天詩無事日月長不羈天地濶與二子殆霄壤矣吳旦生曰同一天地也樂天以不羈便道濶東野以有礙便不道寬可見詩人胸次隨其所發即有天地陳無已詩天地豈不寬妾身自不容更得風旨泊宅編云韓退之多悲詩三百六十首哭泣者三十首白樂天多樂詩二千八百首飲酒者九百首檠白樂天詩鐡檠移燈背吳旦生曰樂天自注檠去聲唐彥謙雨詩燈檠昏魚目薰爐咽麝臍李義山詩九枝燈檠夜珠圓韓退之詩墻角君看短檠棄皆去聲按集韻檠渠映切注云有足似几物也諸詩作去聲用本此黃氏筆記云檠者定弓體之器周禮弓人注音景漢書蘇武注又音巨京反東坡詩大弨一弛何緣彀已覺翻翻不受檠陸放翁云檠作平聲押用漢注也暖溫暾白樂天詩池水暖溫暾吳旦生曰輟耕録南人方言曰溫暾者乃懷暖也致虛雜爼云今人以人性不爽利者曰溫暾湯言不冷不熱也樂天慣以俗語入詩王建亦云新晴草色暖溫暾下馬陵楊升菴曰白樂天詩自言本是京城女家在蝦蟇陵下住蝦蟇陵在長安謝良輔詩取酒蝦蟇陵下家家守歲傳巵齊已詩翠樓春酒蝦蟇陵長安少年皆共矜吳旦生曰國史補謂董仲舒墓門人過必下馬以故號下馬陵而語訛為蝦蟇陵白公詩亦徇俗之過奈何升菴又舉他詩以證之耶東坡詩隻雞敢忘喬公語下馬聊尋董相墳又謝徐朝奉啓云過而下馬空瞻董相之陵元遺山詩千年荆棘龜趺在會有人尋下馬陵黃晉卿詩時有北人來下馬不知秦樹幾啼鵑服章容齋隨筆曰唐人重服章故子美有銀章付老翁朱紱負生平扶病垂朱紱之句樂天詩言銀緋處最多七言如大抵著緋宜老大一片緋衫何足道暗淡緋衫稱我身酒典緋花舊賜袍假著緋袍君莫笑腰間紅綬繫未穩朱紱仙郎白雪歌腰佩銀龜朱兩輪便留朱紱還鈴閣映我緋衫渾不見白頭猶未著緋衫緋袍著了好歸田銀魚金帶繞腰光銀章暫假為專城新授銅符未著緋徒使花袍紅似火似挂緋袍衣架上五言如未换銀青綬惟添雪白鬢笑我青袍故饒君茜綬新老逼教垂白官科遣著緋那知垂白日始是著緋年晚遇何足言白髮映朱紱至於形容衣魚之句如魚綴白金隨步躍鵠銜紅綬繞身飛吳旦生曰二儀實録隋煬帝詔牛洪等造章服差等三四品紫五品朱六品以下緑官吏青庶人白商皂服色之分疑自此始唐馬周傳云三品紫四五品朱六七品緑八九品青余按秦時光祿勳有中大夫漢武帝命光祿大夫皆銀章青綬魏晉以來有左右光祿大夫光祿三大夫皆銀章青綬謂之銀青光祿大夫詔加金章紫綬謂之金紫光祿大夫則章服之別漢晉已然非始於隋唐而唐人特重之往往形於詩篇耳西清詩話云唐制百官服色不視職事官而視其階官之品與今制特異樂天為中書舍人知制誥玄宗簡為京兆少尹官皆六品故猶著緋其詩所謂鳯閣舍人京兆尹白頭猶未著緋衫南宫啓請無消息朝散何時復入銜是也後與元微之同制加朝散大夫始登五品其詩曰命服雖同黃紙上官班不共紫微前青衫脫早差三日白髮生遲校九年中書舍人雖正五品必待加朝散而後易緋此知其不繫於職事官也前輩記張嘉貞為中書令著緋傅遊藝為相著緣蓋以此也唐借服色皆併魚假之樂天自江州司馬除忠州刺史有謝裴常侍贈袍魚袋詩魚綴白金隨步躍鶻銜瑞草繞腰飛其後除尚書郎後有脫刺史緋詩便留朱紱還鈴閣却著青袍待玉除無奈嬌癡三歲女繞腰啼哭覓銀魚此與今制特異也其特賜者疑亦不相越唐書載牛叢為睦州刺史賜金紫辭曰臣今衣刺史所假緋即賜紫為越等乃賜銀緋野客叢書又云唐制服色不視職事官而視階官之品至朝散大夫方换五品服色衣銀緋封贈蔭子未至朝散雖職事官高未許易服色封贈之制雖宰相只許封一代其封二代非特恩不可光祿大夫許門設棨戟吏三十考轉銀青此其大略也觀白樂天為中書舍人知制誥簡為京兆尹官皆六品尚猶著緑其詩所謂鳯閣舍人京兆尹白頭猶未脫青衫南宫啓請無多日朝散何時復入銜劉夢得賀給事加五品詩曰入舍郎官换緑衣元微之作武儒衡升朝散大夫制曰今由是級則服色驟加誠足貴矣樂天授朝散大夫制曰蔭子封妻豈惟腰白金而已權德輿罷相為檢校尚書興元節度使改葬其父因表納檢校尚書請回贈祖官不許納官特贈祖倕禮部郎中吕溫代鄭相公謝戟十二枝表曰吏考三十始秩銀青戰勳十二乃號柱國板輿白樂天詩朱幡四從板輿行吳旦生曰潘安仁間居賦太夫人初御板輿升輕軒注云板輿一名步輿方四尺素木為之自樂天引用世遂以板輿為奉母故事然按當時三公告老許以板輿上殿如傳祇者又梁韋睿以板輿自載督厲衆軍則非專以奉母池魚清波雜志曰張無盡作一表云魯酒薄而邯鄲圍城門火而池魚禍上句出莊子下句不知所出以意推之當是城門失火以池水救之池竭而魚死也廣韻池字韻注云池水沼也古有姓池名仲魚者城門失火燒死白樂天詩火發城頭魚水裏救火竭池魚失水初不主姓名之説然廣韻當有所據吳旦生曰古語有云楚國亡猿禍延林木城門失火殃及池魚通鑑正史具載之非委巷媟語也如池魚為姓名豈又有姓林名木者耶樂天詩正得語意而張表下句謂即出古語可牡丹酉陽雜爼曰牡丹前史中無説處惟謝康樂集中言竹間水際多牡丹成式檢隋朝種植法七十卷中初不記説牡丹則知隋朝花藥中所無也開元末裴士淹為郎官奉使幽冀回至汾州衆香寺得白牡丹一窠植於長興私第天寶中為都下所賞至德中馬僕射鎮太原又得紅紫二色者移於城中元和初猶少今與戎葵角多少矣吳旦生曰歐陽永叔陸農師李石皆言牡丹初不載文字自則天後始盛自余觀之康樂既言永嘉多牡丹嘉話録謂北齊楊子華有畫牡丹處極分明又神農本草云一名鹿韭一名鼠姑廣雅云白􅙥牡丹也則何云不載文字自唐始聞哉按海記云煬帝闢西苑易州進二十相牡丹有頳紅鞓紅飛來紅袁家紅醉妃紅雲紅天外紅一拂黃軟條黃延安黃先春紅顫風嬌等名則何云隋朝花藥中所無哉然一牡丹也據白樂天詩共道牡丹時相隨買花去一叢深色花十户中人賦白廷翰唐蒙求韓令牡丹注云元和中京師貴遊尚牡丹一本直數萬而栁渾詩近來無奈牡丹何數十千錢買一窠今朝始得分明見也共戎葵不校多以貞元中牡丹多耳是何貴賤之不同也據蜀徐延瓊聞秦州董成村僧院紅牡丹一株使人取掘自秦州至成都三千餘里歷九折七盤望雲九井大小漫天懸險之路方至焉而韓滉私第有白牡丹遽命斸去曰豈效兒女耶是何栽覆之不同也據徐凝題杭州開元寺牡丹詩虛生芍藥徒勞妬羞殺玫瑰不敢開而炙轂子詩牡丹妖艷亂人心一國如狂不惜金曷若東園桃與李果成無語自成陰是何毁譽之不同也據李正封詩天香夜染衣國色朝酣酒時楊妃侍上曰籹臺前宜飲以一紫金盞酒則正封之詩見矣而劉夢得看牡丹詩今日花前飲甘心醉幾杯但愁花有語不為老人開蘇子由云此詩感慨是何樂悲之不同也通志云牡丹初無名依芍藥得名故其初曰木芍藥亦如木芙蓉之依芙蓉以為名也而後此種類既繁稱名各異馬虛中詩牙牌分榜牡丹名是何質文之不同也開八帙白樂天詩行開第八帙可謂盡天年吳旦生曰注七十以上為開第八帙蓋以十年為一帙故樂天又云已開第七帙屈指幾多人此年六十三元日詩也芥隱筆記云禮年八十曰有秩故以八十為八帙又道家流用此語樂天屢用之余按禮記八十月告存鄭注云每月致膳九十日有秩鄭注云秩常也日有常膳則知筆記為未審矣如陸放翁詩年開九秩尚不死坐對一編殊未饜此年八十三以後所作其用古始確自敘白樂天詩自憐郡姓為儒少豈料詞場中第頻桂折一枝先許我楊穿三箭盡驚人吳旦生曰樂天自作墓志以白起為祖故言郡姓儒少也與弟敏中行簡三人相繼皆中第故言三箭驚人也避暑録話云世以登科為折桂此謂卻詵對䇿東堂自云桂林一枝也自唐以來用之溫庭筠詩猶喜故人新折桂其後以月中有桂故又謂之月桂而月中又言有蟾故又改桂為蟾以登科為登蟾宫用卻詵事固可笑而展轉相訛復爾芰白樂天詩荷芰緑參差新秋水滿池吳旦生曰芰菱也言荷與菱兩物也杜牧之晚晴賦忽引舟於深灣覩八九之紅芰是誤以芰為荷東坡詩緑芰紅蓮畫舸浮乃分別言之按酉陽雜爼云四角三角為芰兩角為菱應劭作菱司馬相如作􅀢老學菴筆記云今人謂卷荷為伎荷伎立也卷荷出水面亭亭植立故謂之伎荷或作芰非是楊升菴云菱乃今之菱角芰乃今之雞頭楚辭緝芰荷以為衣若是菱葉何可以為衣乎又屈到嗜芰蓋決明之菜非水中之芰也審矣緣楚人名菱為芰所以致後世之紛紛也余按雞頭曰芡古雋考略云雞頭鵠頭鴈頭鴻頭雞壅音雍皆芡也詞林海錯云芡為鴻頭韓退之聯句鴻頭排刺芡山谷詩剖􅑕煮鴻頭則升菴以芰為雞頭誤矣管子芡名卵菱乃借以名之豈升菴誤據此耶檇李李君實云吾地小青菱被水而生味甘美熟之可代飱飯其花鮮白幽香與蘋蓼同時正所謂芰也春秋時吾地入楚屈到所嗜其即此耶則升菴以為決明之菜又非篤論田子藝云周禮籩人蓤芰也疏云即菱角亦誤籩實菜也名薢茩一名蕨攗余觀學齋占畢云爾雅薢茩芵茪注芵明也即今決明也或曰菱也字從阜非從冰及至蓤蕨攟然後從凌注水中芰也則是陸生之菱與水中之蓤其為二物不同酒令白樂天詩云鞍馬呼教住骰盤喝遣輸長驅波卷白連擲采成盧注云骰盤卷白波莫走鞍馬皆當時酒令吳旦生曰又樂天詩醉翻襴衫拋小令劉貢父謂今人以絲管歌謳為令者是也大都欲以酒勸故始言送而繼承者辭之搖首挼舞之屬皆郤之也至八遍而窮斯可受矣其或舉故事物色則樂天所云間徵雅令窮經史退之所云令徵前事為也又元微之題黃明府詩序云昔年飲酒嘗為觥録事謂為酒紏也又東臯雜録云孔常父言唐人詩城頭催鼓傳花枝席上摶拳握松子此藏􅍐為戲也又皇甫松手勢酒令五指皆有名大指名蹲鴟中指名玉柱食指名鈎戟無名指名潛虬小指名虎膺指節名私根通呼五指名五峰此今俗所謂豁拳也可見酒席諸戲其來已久資暇集云飲酒之卷白波義當何起按東漢既擒白波賊戮之如卷席然故酒席倣之以快人情也薛瑩後漢書云黃巾郭太等起於西河白波谷時謂之白波賊青箱雜記以為杯名非也陸放翁詩快似麾兵卷白波楊亷夫詩觴令嚴行捲白波王元美詩相看只解呼紅友半醉猶能捲白波十白樂天詩緑浪東西南北路紅欄三百九十橋吳旦生曰唐宋詩人多以十字作諶音讀往往作平聲入詩劉禹錫詩春城三百九十橋夾岸朱樓隔栁條宋文安公宫詞三十六所春宫館二月春風送管絃朝以道詩煩君一日殷勤意示我十年感遇詩金蕭真卿詩兩崕逼側無十步萬頃逡巡酒一杯説家謂里巷間人言利之小者曰八文十二謂十為諶蓋語急故以平聲呼之田子藝云非也十當音旬古人以十日為旬故如此讀又以司字作入聲讀如樂天詩四十著緋軍司馬男兒官職未蹉跎一為軍司馬三見歲重陽宋太素詩鄜州軍司馬也好畫為屏官為軍司馬身是謫仙人又樂天詩為問長安月誰教不相離相字上聲杜詩恰似春風相欺得相字入聲浪濺白樂天與盧侍御宴黃鶴樓詩云白花浪濺頭陀寺紅葉林籠鸚鵡洲吳旦生曰麈史云頭陀寺在郡城之東絶頂處西去大江最遠風濤雖惡何由及之如孫魴金山寺詩驚濤濺佛身漁隱叢話云金山寺何其低而小哉蓋詩人形似太過率多此疵張仲達咏鷺鷥詩滄海最深處鱸魚銜得歸張文寶云佳則佳矣爭奈鷺鷥嘴腳太長也亦同坐此十二行白樂天詩鍾乳三千兩金叉十二行吳旦生曰十二行或謂六鬟也齊肩並立為叉十二然此乃答牛思黯詩自注云思黯自誇前後服鍾乳三千兩而歌舞之妓甚多乃謔豫衰老故答則所謂六鬟良是也又觀梁武帝所歌莫愁云頭上金叉十二行演繁露謂排插十二叉也南齊周盤龍父子俱有神勇高帝嘉之送盤龍妾杜氏金叉十二枚唐制命婦以花樹多為高下曰花叉若干也留青日札謂古婦人髻高故能插金叉十二行乃六雙也據此則又是一人用十二叉矣富貴後山詩話曰白樂天云笙歌歸院落燈火下樓臺又云歸來未放笙歌散畫戟門前蠟燭紅非富貴語看人富貴者也吳旦生曰唐人之言富貴者晏元獻謂萊公詩老覺腰金重慵便玉枕涼未是富貴語不如樂天詩笙歌歸院落燈火下樓臺此善言富貴者黃魯直又謂樂天二句不如子美落花遊絲白日靜鳴鳩乳燕青春深也唐人之言窮者東野詩種稻耕白水負薪斫青山不如閬仙詩市中有樵山我舍朝無煙井底有甘泉釡中乃空然蓋孟氏薪水自足而賈家柴水俱無也人知樂天善言富貴而不知其又善言窮也有詩曰塵埃常滿甑錢帛少盈囊侍衣甚藍縷妻愁不出房抑何其窘迫無聊耶野客叢書引東坡曰淵明歸去來辭瓶無儲粟使瓶有儲粟亦無幾此翁只於瓶中見粟歐公曰孟郊詩鬢邉雖有絲不堪織寒衣就令織得能幾何二公戲言之耳非真譏之也才人志士筆端造化抑揚高下不可以一律觀譬之水泉揚之可以滔天抑之不過涓涓於溝洫間爾文章亦猶是晏元獻常言富貴不及金玉錦繡惟説其氣象若樓臺側畔楊花過簾幕中間燕子飛梨花院落溶溶月栁絮池塘淡淡風窮人家有此景否傳席輟耕録曰今人家娶婦輿轎迎至大門則傳席以入弗令履地然唐人已爾樂天娶婦詩青衣轉去聲氊褥錦繡一條斜吳旦生曰按李夫人初至武帝迎入帳中共坐宫人遙撒五色同心花果帝與夫人以衣裾盛之云得多得子多也又京房之女適翼奉子房以其日不吉三煞在門青羊烏雞青牛之神犯之損尊長及無子奉謂不然但以穀豆與草禳之今人花燭之夕撒果子及下車則撒穀豆是始於漢者尚沿也更觀獨異志云昔宇宙初開之時只有女媧兄妹二人在崑崙山而天下未有人民議以為夫妻又自羞恥乃結草為扇以障其面今取婦執扇象其事也審爾則其從來益遠矣依白樂天詩坐依桃葉妓吳旦生曰樂天自注依馬皆切又詩醉依香枕坐亦此音也蘇子卿詩黃鵠一遠別千里顧徘徊胡馬失其羣思心常依依曹子建詩願為西南風長逝入君懷君懷良不開賤妾當何依古韻相叶如此依字當作挨音也然觀漢律厯敘傳云官失學微六家分乖一彼一此庶研其幾崔駰達旨云淳朴散離人物錯乖高辛攸降厥趣各違猛虎行云自矜無當對氣性縱以乖朝怒殺其子暮還食其妃則二韻本通故耶小雅采薇詩云昔我往矣楊栁依依今我來思雨雪霏霏行道遲遲載渴載飢我心傷悲莫知我哀蓋其音韻最古史記天官書五帝座後聚十五星蔚然曰郎位漢書蔚然作哀烏甘氏星經作依烏依亦音哀也交情本事詩曰元相公稹為御史鞠獄梓潼時白尚書在京與名輩逰慈恩小酌花下為詩寄元曰花時同醉破春愁醉折花枝當酒籌忽憶故人天際去計程今日到梁州時元果及褒城亦寄夢逰詩曰夢君兄弟曲江頭也向慈恩院裏逰驛吏唤人排馬去忽驚身在古梁州千里神交合若符契吳旦生曰白傅元相交既深又善詩時號元白江淮間新進小生目為元和詩體北夢瑣言乃謂白集內哭元詩云相看掩淚俱無語別後傷心事豈知想得咸陽原上樹已抽三丈白楊枝洎自撰墓志云與彭城劉夢得為詩友殊不言元者人疑其隙終也余謂不然按元寫白詩於閬州西寺白寫元詩百篇合為屏風又元守浙東白守蘇臺置驛遞詩往來謂之詩筒其詩有云有月多同賞無杯不共持又元上令狐楚書云某與同門生白居易友善居易雅能詩或為千言或為五百言律詩以相投寄小生往往戲排舊韻別創新詞名為次韻蓋欲以難相挑耳又白序劉禹錫詩云豫與元微之唱和頗多嘗戲言僕與足下二十年來為文友詩敵幸也亦不幸也吟咏性情播揚名聲幸也然江南士女語才子者多云元白以子之故僕不得獨步於吳越間此亦不幸也今垂老復遇夢得非重不幸耶又白在洛元過之以二詩別去白頭徒侣漸稀少明日恐君無此歡又云自識君來三度别這回白盡老髭鬚未幾死於鄂白哭之曰始以詩交終以詩訣絃筆相絶其今日乎據此則兩人交情白頭如故即白之序劉猶言與元為文友詩敵且云垂老遇劉未嘗獨厚於劉也其自志亦偶及耳何言隙終以誣前哲賈氏談録云樂天葬龍門山河南尹盧貞刻醉吟先生傳立於墓側四方過者必奠酒方丈之前常成泥濘柘枝楊升菴曰白樂天詩柘枝隨畫鼓調笑從香毬不知香毬何用如今人詞中用金縷字亦不知金縷於歌何關吳旦生曰羯鼓録柘枝本拓枝舞也其後字訛為柘枝余觀瑣碎録云柘枝舞本後魏拓拔之名易拓為柘易拔為枝其説為有理樂府雜録云健舞曲有柘枝軟舞曲有屈柘樂苑云柘枝曲羽調也屈柘枝商調也屈一作掘音抯韻語陽秋云柘枝舞起於南蠻諸國而盛於李唐章孝標云柘枝初出鼓聲招花鈿羅裙聳細腰言當招之以鼓張承福云白雪慢回拋舊態黃鶯嬌轉唱新詞言當雜之以歌而鄭在德詩云三敲畫鼓聲催急一朵紅蓮出水遲則所用者一人而已法振詩云畫鼓催來錦臂攘小娥雙起整霓裳則所用者又二人按樂苑用二女童帽施金鈴抃轉有聲其來也於二蓮花中藏花折而後見則當以二人為正夢溪筆談云柘枝舊曲遍數極多如羯鼓録所謂渾脫解之類今無復此遍冦萊公好柘枝舞會客必舞柘枝每舞必盡日時謂之柘枝顚今鳯翔有一老尼猶是萊公時柘枝妓云當時柘枝尚有數十遍今日所謂柘枝比當時十不得二三老尼尚能歌其曲好事者往往傳之歷代詩話卷五十
