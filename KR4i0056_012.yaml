body:
  text: 歴代詩話巻十二歸安吳景旭撰乙集下之下楚辭靃靡淮南招隠士篇青莎雜樹兮薠草靃靡吳旦生曰靃音髓注華敷貌楊升庵謂草弱隨風貌陸倕思田賦雜青莎之靃靡江總詩銜花弄靃靡李嶠詩靃靡寒潭側皇甫曽詩靃靡汀草碧胡文公賞花釣魚詩春暖仙蓂初靃靡日斜芝蓋尚徘徊朱少章詩藏蔬飽三冬媚盤無靃靡天問咸播秬黍莆藿是營舊本作靃音髓今本皆作藿音霍一本雚朱注同萑音完眄眄嚴忌哀時命云魂眐眐以寄獨兮汩徂往而不歸吳旦生曰朱子集注眐音征従目眐獨視也一作聇従耳獨行也余按眐眐當作眄眄左太冲詩有左眄右盼之語說文眄目偏合也一曰衺視也莫甸切盼美目貌匹莧切趙凡夫謂俗溷眄盼為一字何以讀左詩吾子行云宋儒不識顧眄字眄音湎讀為美目盼兮之盼又不識盼字而寫使民盻盻然之盻音異又不識此盻字而讀為盼今詳之耳従丐者音湎从分者音攀去聲从兮者音異何燕泉云按朱子語録張以道曰盼庭柯以怡顔盼讀如俛讀作眄者非阡眠楊升庵曰九懐逺望兮阡眠陸機詩林薄杳阡眠吕延濟注阡眠原野之色按說文谸山谷青谸谸也則阡眠字當作谸眠又列子云鬱鬱芊芊注芊芊茂盛之貌李白賦彩翠兮芊眠谸眠作芊眠亦通文選别作䀒眠字皆従目吳旦生曰按說文谸望山谷谸谸青也趙凡夫箋云陸機賦青麗谸瞑改作芊草盛眠非是溷茜茅蒐也又溷靚召也並非是本借千加谷加草並轉注也則說文望字正得王褒所云逺望之義升庵引之而遺此一字便無意態况升庵喜泛引而少斷據之識又不若箋之確見也駭雞犀劉向九歎云淹芳芷于腐井兮棄雞駭于筐簏吳旦生曰抱朴子通天犀有白理如線者以盛米置羣雞中雞欲往啄米至輒驚却故南人名為駭雞也得其角一尺以上刻為魚而銜以入水水常為開傅咸犀鈎序云犀之美者有光雞見影而驚故曰駭雞韓詩外傳南宫适至義渠得駭雞犀以獻紂戰國策張儀破従連衡楚王獻駭雞之犀為上瑞黄香九宫賦剥駭雞以為釵左思吳都賦駭雞之珍淮南子犀角駭狐盖云犀角置狐穴中狐不歸九鬿劉向九歎云訊九鬿與六神吳旦生曰今本作九魁當従困學紀聞作九鬿音折為是王逸注謂北斗九星也按黄帝素問有九星之言王氷注云上古世質人淳九星垂明中古道德稍衰標星藏曜故星之見者七焉所謂九星者天蓬天芮天衝天輔天禽天心天任天柱天英此盖従標而為始也楚辭補注謂北斗七星輔一星在第六星旁又招搖一星在北斗杓端北斗經疏云不止於七而全於九加輔弼二星故也與素問注不同曲禮招搖在上注招搖在北斗杓端主指者正義引春秋運斗樞云北斗七星第一天樞第二旋第三機第四權第五衡第六開陽第七搖光搖光則招搖也淮南時則訓注招搖斗建也補注以招搖在七星之外恐悞徐整長厯云北斗七星間相去九千里皆在日月下其二隂星不見者相去八千里𤣥門寶海經云北斗九星七見二隠其第八第九是帝皇太尊精神也漢霍光家有典衣奴子名還車忽見二星在斗中光明非常乃拜而還遂得増年六百淟涊劉向九歎云切淟涊之流俗吳旦生曰淟吐典反涊乃典反博雅淟涊垢濁也揚雄反離騷紛纍以其淟涊張衡思𤣥賦澄淟涊而為清陸機文賦故淟涊而不鮮唐書賛淟汩於隋光明於唐枚乗七發涊然汗出蛓王逸九思云蛓縁兮我裳吳旦生曰王叔師作此以悲屈子言獨處山野與衆蟲為伍所謂蛓者喻讒人也稗談云蛓螫人蟲也常在林間花葉背不知者輙為所刺故名林蛓老則吐汁自裹就其中作蛹謂之呫嘶說文蛓毛蟲也千志切鼻祖揚雄反離騷云有周氏之蟬嫣兮或鼻祖於汾隅吳旦生曰汾隅揚邑也雄自言系出於周而食采於揚故揚雄之揚字偏旁从才不从木圖畫寶鑑云宋髙宗朝揚補之字無咎祖漢子雲其書从才不从木資暇集云揚州者以風俗輕揚故號其州今作楊栁之楊謬也復齋謾録云注鼻始也未盡其義揚雄方言獸之初生謂之鼻人之初生謂之首梁益之間謂鼻為初或謂之祖故鼻祖之義如此野客叢書云攷方言則鼻與祖皆始之别名以鼻祖為始祖未是余按人受形於胎必自鼻始故寫照先畫鼻此其義也說文今俗以始生子為鼻子即始祖為鼻祖亦可蘇東坡詩千年鼻祖守關門黄山谷詩鼻祖以來傳父兄金人劉無黨詩晚喜宗盟同鼻祖閻子秀詩衣冠鼻祖傳嘉靖中王元美錦雞賦有鳥於此鼻祖鸑鷟天啟中尹子求詩鬼實蠻鼻祖說文皇从自自始也始皇者三皇大君也自讀若鼻又云辠从辛从自言辠人蹙鼻若辛秦以辠似皇字改為罪昔人以鼻祖對耳孫按惠帝紀應劭注云耳孫𤣥孫之子也言去髙曽益逺但耳聞之爾然觀晉灼云耳孫𤣥孫之曽孫也諸侯王表在八世師古云耳音仍爾雅曽孫之子為𤣥孫𤣥孫之子為來孫來孫之子為晜孫晜孫之子為仍孫従已而數是為八葉則與晉說相同仍耳聲相近盖一號也又攷之釋名云子孳也相生蕃孳也孫遜也遜遁在後生也曽孫義如曽祖也前云曽祖従下推上祖位轉増益也𤣥孫𤣥懸也上懸於髙祖最在下也𤣥孫之子曰來孫此在無服之外其意疎逺呼之乃來也來孫之子曰昆孫昆貫也恩情轉逺以禮貫連之耳昆孫之子曰仍孫以禮仍有之耳恩意實逺也仍孫之子曰雲孫言去巳逺如浮雲也歴代詩話巻十二
