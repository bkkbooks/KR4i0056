body:
  text: 歷代詩話卷六十二歸安吳景旭撰壬前集上金詩仰山堯山堂外紀曰燕京西七十里有仰山峰巒拱秀中有平頂如蓮花心旁有五峰曰獨秀翠微紫蓋妙髙紫微下多禪剎章宗遊幸有詩刻石金色界中兜率景碧蓮花裏梵王宫鶴驚清露三更月虎嘯踈林萬壑風吳旦生曰章宗工書畫所作詩詞皆饒思致嘗賦雲龍川五月牡丹云洛陽榖雨紅千葉嶺外朱明玉一枝地力發生雖有異天公造物本無私泰和丙寅春試貢士於萬寧宫楊煥然席屋偶居前列聞異香出殿櫺間一紫衣人顧之起問題難易及名氏里貫年齒去少頃衆相賀曰適駕至矣薄暮出宫傳為希遇煥然紀以詩云誰言半夜曽前席白日君王問賈生又詔録馬嵬詩得五百餘首付詞臣第之杜真卿詩楊栁依依水拍堤春晴茅屋燕爭泥海棠正好東風惡狼籍殘紅襯馬蹄髙德卿詩事去君王不奈何荒墳三尺馬嵬坡歸來枉為香囊泣不道生靈淚更多皆在髙等章宗之愛士右文有如此日精宇文叔通白菊詩仙家藝菊名日精我今號爾為月英吳旦生曰本草菊花一名日精周禮后服鞠衣又作菊注云日精也蓋菊有兩種花大氣香莖紫者為甘菊花此日精也風土記云日精治蘠皆菊之花莖之别名也拾遺記云背明國有紫菊謂之日精本草菊一名傅延年朱仲新詩三徑誰從陶靖節重陽惟有傅延年仙書云茱萸為辟邪翁菊花為延壽客上官昭容九日詩却邪茰入佩獻壽菊傳杯扶老養和宇文叔通和髙子文秋興云散步雙扶老棲身一養和吳旦生曰元遺山録其詩注於下云養和几名事見江湖散人集扶老見歸去來辭然余見遺山詩養和懲往失扶老念時須蓋養和謂几也扶老謂杖也豈遺山亦用叔通語耶按漢禮儀志云民年八十九十賜玉杖長九尺端以鳩為飾鳩者不噎之鳥欲老人不噎也風俗通云周禮羅氏獻鳩養老漢無羅氏故作鳩杖以扶老困學紀聞云䇿扶老以流憩謂扶老藤也見後漢蔡順傳注據此則扶老之義不始見之歸去來辭矣山家清事云耴松樛枝作曲几以靠背古名養和詞人以此類入咏者不可枚舉如駱賓王詩桃花嘶别路竹葉㵼離樽蓋桃花謂馬也竹葉謂酒也劉禹錫詩添爐搗雞舌灑水淨龍鬚蓋雞舌謂香也龍鬚謂拂也白樂天詩樹暗小巢藏巧婦草荒新葉長慈姑蓋巧婦謂鷦鷯也慈姑謂鴉也黃常明詩江干食息呼扶老朩末板緣訝宛童蓋扶老謂秃鶖也宛童謂女蘿也王原吉詩看雲暮影齊巾角滴露春聲落枕凹蓋看雲謂杖也滴露謂酒也亦見扶老不止名杖而杖又有别名勸農官宇文叔通詩劍戟漸銷農器出人家只識勸農官吳旦生曰向見虞伯生題耕織圗謂元時置十道勸農使總於大司農慎擇老成重厚之君子而命之皆親歷原野安輯而教訓之其後功成省專使之任以歸憲司憲司置四僉事其二則勸農之所分也至今耕桑之事憲猶上之大農天下守令皆以農事繫銜矣郡縣大門東西壁皆畫耕織圗使民得而觀之今又見叔通詩意金時已有此官而元踵是以加詳耶此制大得古王重農之意後之汰其員而不復講為可惜也洞庭春宇文叔通詩已掃明忩供點筆為君擬賦洞庭春吳旦生曰宋時安定郡王以黃柑釀酒謂之洞庭春色色香味三絶以餉趙德麟因飲東坡醉後信筆為詩頗有沓拖風氣其詩云去年洞庭秋香霧嘗噀手今年洞庭春玉色疑非酒叔通蓋用坡事也野鷹來蔡正甫野鷹來云鷹莫來腹肉一飽精神開招呼不上劉表臺吳旦生曰水經注沔水南有層臺號曰景升臺蓋劉表治襄陽之所築也表性好鷹嘗登此臺歌野鷹來曲其聲韻似孟達上堵吟矣故東坡詩莫上呼鷹臺平生笑劉表又作上堵吟云臺上有客吟秋風悲聲蕭散飄入空正甫下筆奔峭殆不減坡公田子藝云劉景升呼鷹臺經史呼皆作去聲蓋北音重濁故也元遺山所纂中州集足備金源氏文獻然如宇文叔通宋黃門侍郎以奉使入金留為翰林學士承旨吳彥髙宋宰臣拭之子米元章壻也將命帥府留為翰林待制出知深州蔡伯堅父靖宋季守燕山仕金為翰林學士伯堅官至尚書右丞相則三人皆宋儒也故斷自正甫為正傳之宗按金源樂府推彥髙與伯堅號吳蔡體而伯堅二子正甫特甫俱第進士正甫於天德三年擢第後不赴選求未見書讀之其辨博為天下第一有無中蔡正甫詩城上春隂暗晚空城頭山色有無中吳旦生曰王摩詰詩江流天地外山色有無中權德輿渡揚子江詩逺岫有無中片帆煙水上雖用摩詰語猶自渾然歐陽永叔送劉貢父守維揚作長短句云平山欄檻倚晴空山色有無中按平山堂望江左諸山甚近或以歐公為短視故有此句東坡笑之因賦快哉亭云長記平山堂上欹枕江南煙雨杳杳沒孤鴻認得醉翁語山色有無中今正甫用作春隂詩可免短視之誚傳柑髙子文詩佳辰近燒燭盛事憶傳柑吳旦生曰此子文次韻東坡定州立春日詩也東坡又有扈從端門觀燈詩云老病行穿萬馬羣九衢人散月紛紛歸來一盞殘燈在猶有傳柑遺細君按傳柑事始於唐開元間上元夜以黃柑賜近臣貴戚謂之傳柑宴宋時亦襲其事元夜登樓貴戚例有黃柑相遺也洪武初張行中元宵詩歸來更有傳柑宴坐列宫叉十二金竹孫任君謨詩竹孫仍帶籜鳩婦已呼晴吳旦生曰爾雅筍竹萌也一曰龍孫僧贊寧謂龍未聞化竹化竹為龍豈宜以筍為龍孫然觀陳子昻詩清川髙竹長龍孫陸放翁詩過母龍孫已放梢張伯雨詩龍孫乍脫繃兒錦其於義未礙也又竹譜云竹祖最初所種之竹陸魯望詩藥名却笑桐君少年紀翻嫌竹祖低吳融詩祖竹定欹簷雪折稚告應拂棟雲齊又唐詩祖竹叢新筍又祖竹護龍孫陸放翁詩子母瓜新間尊爼公孫竹長映簾櫳梅堯臣詩蛇祖龍孫生産後語曰天將雨鳩逐婦爾雅翼云鳩拙不能為巢才架數枝往往破卵無巢不能居天將雨則逐其雌霽則呼而反之今人辨其聲以為無屋住參橫劉致君墨梅詩趙郎愛香人不知羅浮山下有佳期春寒徹骨角聲起才記參橫月墮時吳旦生曰龍城録載趙師雄遷羅浮見美人共飲少頃醉寢乃在大梅樹下月落參橫但悵恨而已秦少遊詩月落參橫畫角哀暗香消盡令人老蓋致君所謂趙郎正指師雄而語意又奪胎少遊然相沿之誤亦不自知其失考也杜詩天橫醉後參洪容齋謂以老杜全篇考之蓋初秋所作也今人梅花詩多用參橫字若以冬半視之黃昏時參已見至丁夜則西沒矣安得將旦而橫乎惟東坡詩紛紛初疑月挂樹耿耿獨與參橫昏乃為精當余觀師無忌秋夜吟云拊劍一太息月暗天橫參此與老杜同為合作困學紀聞云古樂府善哉行月沒參橫北斗闌干親友在門忘寢與餐龍城録語本此而未嘗考參星見之時也雞鳴埭劉致君墨梅詩又云荀妃早發雞鳴埭殘月微分燭下粧吳旦生曰南齊書武帝數幸琅琊城宫人常從早發至湖北埭雞始鳴故呼為雞鳴埭溫飛卿有雞鳴埭曲李義山南朝詩雞鳴埭口繡𥜗回按檢江蓄水曰堰壅水為堰曰埭江南謂之埭巴蜀謂之堰楊大年詩繁星曉埭聞雞度細雨春場射雉歸秦少遊詩古埭天連鴈荒祠朩蔽牛寒具劉無黨題梁忠信山水云明忩短幅來何處亂點依稀涴寒具吳旦生曰桓玄喜陳書畫客有食寒具不濯手而執畫帙者偶涴之後遂不設寒具蘇東坡跋二王書云怪君何處得此本上有桓玄寒具油無黨句與坡同意陸放翁詩看畫客無寒具手按齊民要術云寒具一名􅠑餅酉陽雜爼伊尹干湯之言有寒具吳綱五總志謂是今之饊子也劉禹錫寒具詩纎手搓來玉數尋碧油煎出嫩黃深夜來春睡無輕重壓匾佳人纒臂金亦以為饊子也若林和靖寒食詩有客初嘗寒具罷蓋又以寒具為寒食之具矣宋玉招魂云粔籹蜜餌有餦餭些五臣注粔籹􅠑餅也吳謂之寒具餌方言謂糕餦餭餳也亦謂之飴此則其乾者也王逸注以蜜和米麵熬煎作粔籹搗黍作餌又有美餳衆味甘美也朱晦翁注以米麵煎熬作之寒具也宋林洪謂招魂此句自是三品粔籹乃蜜麵之乾者十月間爐餅也蜜餌乃蜜麵少潤者七夕蜜食也餦餭乃寒食寒具也又觀漢制考云以二竹簋方玄被纁裏有蓋注竹簋方者器名也以竹為之狀如簋而方如今寒具筥疏寒具若籩人朝事之籩注謂清廟未食先進寒具口實之籩實以冬食故謂之寒具蓋又以寒具為寒冬之具矣干寶司徒儀日祭用􅢑􅞻晉制呼為撮餅又曰寒具十眉劉無黨題十眉圗云春風曽憶賦妖嬈人共畫圗成十一吳旦生曰唐明皇令畫工畫十眉圗一曰鴛鴦眉又名八字眉二曰小山眉又名逺山眉三曰五嶽眉四曰三峰眉五曰垂珠眉六曰月稜眉又名郤月眉七曰分稍眉八曰涵煙眉九曰拂雲眉又名橫煙眉十曰倒暈眉蘇東坡眉子研詩君不見成都畫手開十眉橫雲郤月爭新竒蔡正甫畫眉詩畫手新翻十樣圗西巡故事出成都按粧臺記五代宫中畫眉有十與明皇圖同但一曰開元御愛眉為小異錦字書眉粧有十似從明皇圗摘出但末云籠春眉又圗所未備附及寧馨阿堵劉無黨題劉德文戲綵堂云傳家所愛作寧馨入室不愁無阿堵吳旦生曰世説山濤見王衍曰何物老媪生寧馨兒又王衍指錢云舉阿堵物却後之詞人直以阿堵為錢寧馨為兒如劉禹錫詩為問中華學道者幾人雄猛得寧馨黃山谷詩語言少味無阿堵氷雪相看有此君是也未有以二語合用者合之自家無阿堵物門有寧馨兒一詩始而無黨其踵是以合用耶然習訛已久珠不知寧馨阿堵乃晉人語助耳按禹錫詩寧字作平聲呼金人馮叔獻習池醉歸圗詩云紛紛悮晉皆渠輩何獨王家一寧馨則又作仄聲矣懶真子云寧作去聲馨音亨今南人尚言之猶言恁地也桑榆雜録云寧猶言如此馨語助也容齋隨筆云至今吳中人語言尚多用寧馨字為問猶言若何也宋廢帝之母王太后疾篤帝不往視后怒謂侍者取刀來剖我腹那得生寧馨兒觀此豈得為佳兒用劉真長譏殷淵源曰田舍兒強學人作爾馨語又謂桓溫曰使君如馨地寧可鬬戰求勝王充與何充語曰正自爾馨王恬撥王胡之手曰冷如鬼手馨強來捉人臂東齋記事云阿堵乃今所語兀底也焦弱侯云猶言此物耳楊升菴云猶唐人謂若箇今謂這箇也殷浩見佛經曰理亦應阿堵上顧愷之指目睛曰傳神寫照正在阿堵中謝安謂桓溫曰明公何須壁間著阿堵輩據此其義自見若胡盧山詩阿堵中藏徐稚來以為堵墻益可笑適安居士景伯仁弔假子新云適安居士舊知聞廓達靈根厭世紛辭罷親朋便歸去一籌今日又輸君吳旦生曰子新諱繼昌適安居士其别號也性嗜酒名之曰黃嬌蓋關中人謂兒女曰阿嬌故以酒比之一日天寒人遺之酒飲不盡而醉夜半忽驚起以衣衾覆酒缸僵卧榻上人為言酒自不氷先生將不為寒病乎子新笑曰人病猶可醫酒病不可療也臨終辭鄉里托以他適明日卧于黨氏園亭大石上視之已逝矣伯仁以詩弔之歷代詩話卷六十二
