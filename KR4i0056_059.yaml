body:
  text: 歴代詩話巻五十九歸安吳景旭撰辛集中之下宋詩警悟西清詩話曰魯直少警悟八嵗能作詩送人赴舉云送君歸去明主前若問舊時黄庭堅謫在人間今八年此巳非髫稚語矣吳旦生曰魯直七嵗巳作牧童詩警悟不待言其父為亞夫名庶有恠石一絶云山鬼水恠著薜茘天祿辟邪眠莓苔鈎簾對坐心語口曽見漢唐池館來洪駒父比之老杜之有審言其外父為謝師厚名景初有王左丞夜至一絶云倒著衣冠迎户外盡呼兒女拜燈前王直方謂編之杜集無愧也故魯直從謝公得句法嘗有詩云自往見謝公論詩得濠梁由此觀之以警悟之質源流有自又加之琢磨宜其卓絶矣嘗游灊皖山谷寺石牛洞樂其林泉之勝因自號山谷道人漢時廣陵有老翁釣於涪水自號涪翁魯直謫涪州别駕因稱涪翁一作涪皤范石湖云蜀中稱尊老者為波祖及外祖皆曰波宋景文謂當作皤魯直號涪皤或從其俗也又謫黔州號黔安居士黔中寓開元寺寺有摩圍泉因號摩圍老人至宜州號八桂老人陳後山呼魯直為金華仙伯故題李白真詩金華仙伯哦七字作事不復千金模蘇養真詩但見金華仙伯語筆端丘壑飽經心一䲭黄魯直以詩借書目於胡朝請云願公借我藏書目時送一䲭開鏁魚吳旦生曰昔稱借書一欷還書一欷欷後訛為嗤商芸小說引杜預云有書借人為可嗤借書送還亦可嗤或作癡字資暇集謂借一癡與二癡索三癡還四癡此皆頑鄙之極余按當作瓻蓋欷與瓻字近而訛耳廣韻云瓻丑飢切古之盛酒器大者一石小者五斗蓋云借書以一瓻酒還書亦以一瓻酒也瓻通作䲭按吳王取伍子胥屍盛以䲭夷革浮之水中應劭注云取馬革為䲭夷榼形又范蠡號䲭夷子皮又揚雄酒賦䲭夷滑稽腹大如壺盡日盛酒人復籍沽顔師古注云䲭夷革囊以盛酒也漢紀音義云滑稽酒器也轉注吐酒終日不已若今之燧尊也故語之響應無窮者取象今之注子是其遺音資暇錄云元和後酌酒用注子大和後中貴惡其名同鄭注改曰偏提說郛云猶今酒鱉水南翰記云韻書無字邵康節詩大􅜔子中消白日小車兒上看青天曽文清還鄭侍郎通鑑詩借我以一鑑餉公無兩瓻宋子虚五雜組云往復還借書瓻正徳中劉士亨詩借書不受銀瓻酒待客惟烹石鼎茶蘇子瞻和陶詩不持兩䲭酒肯借一車書蘇養直詩慚無安世書三篋濫得揚雄酒一䲭黄魯直又云莫惜借行千里他日還君一䲭元遺山詩䲭夷盛酒盡君歡嘉靖中王弇州詩宛爾並頭雙鑿落居然大腹一䲭夷糖霜山谷作頌答雍熈長老寄糖霜云逺寄蔗霜知有味勝於崔子水晶鹽正宗掃地從誰說我舌猶能及鼻尖吳旦生曰王灼糖霜譜唐大厯間有僧鄒和尚不知所從來跨白驢登繖山結茅廬以居須鹽米薪菜之屬即書於紙繫錢緡遣驢負至市區人知為鄒也取平直掛物於鞍縱驢歸一日驢犯山下黄氏諸蔗黄請償於鄒鄒曰汝未知因蔗糖為霜利當十倍吾語汝塞責可乎試之果信其色如琥珀遂為上品自是流傳其法鄒末年北走通泉縣靈鷲山龕中其徒追及之但見一文殊石像始知大像化身而白驢者獅子也則知山谷所言正宗蓋用此東坡有詩送遂寧僧圓寳云氷盤薦琥珀何似糖霜美亦指色如琥珀也容齋五筆云糖霜之名唐以前無所見自古食蔗者始為蔗漿宋玉招魂所謂胹鱉包羔有柘漿是也其後為蔗餳孫亮使黄門就中藏吏取交州獻甘蔗餳是也後又為石蜜南中八郡志云笮甘蔗汁曝成飴謂之石蜜本草亦云煉糖和乳為石蜜是也後又為蔗酒唐赤土國用甘蔗作酒雜以紫𤓰根是也唐太宗遣使至摩揭陁國取熬糖法即招揚州上諸蔗榨瀋如其劑色味愈於西域逺甚只是今之沙糖蔗之技盡於此不言作霜然則糖霜非古也歴世詩人模竒寫異亦無一章一句言之糖霜見於文字者實始蘇黄二公我鄉董遐周云猊糖見後漢顯宗紀販糖之妾見馮敬通與婦弟任武達書南箕無舌飯多沙糖見易林大畜之益飴䬵餹餳見廣雅餳謂之餹見揚子雲方言繭糖見齊民要術賣糖老姥見南齊書傅琰傳蘇酪沙糖見隋書真臘傳蠏之將糖躁擾彌甚見梁書鍾岏上何𦙍議酒無沙糖味為他通顔色見古樂府聖郎曲燋糖幸一柈見杜詩猶馬食之如糖故名馬唐見陳藏器本草唐以後不復憶矣千秋山谷詩穿花蹴踏千秋索挑菜嬉遊二月晴吳旦生曰古今藝術圖云北方寒食用鞦韆為戲以習輕趫者事物紀原云齊桓北伐此戲始傳荆楚嵗時記云施鈎之戲以綆作蔑纜相罥綿亘數里鳴鼓牽之湼槃經曰鬭輪骨輪索其鞦韆之戲乎鞦韆亦施鈎之類也天寳遺事云宫中寒食節競築鞦韆宫嬪笑樂帝呼為半仙之戲酉陽雜爼云寒食有内傷之虞令人作鞦韆以動盪之余按此出自漢武宫中本云千秋祝夀之詞王延夀作千秋賦指此蓋正作千秋字後世倒其語為秋千易其字為鞦韆皆俗譌也蔡林屋鞦􅀈怨又作􅀈非是觀山谷又詩云未到清明先禁火還依桑下繫千秋可証崇禎中陳卧子詩禁苑起山名萬嵗複宫新戲號千秋最得解按秦中記二月二日曲江拾菜士民遊觀其間者尤甚謂之挑菜節山谷用此劉禹錫淮隂行云無奈挑菜時俗本作脫葉時殆不可解清淮春浪軟東坡恵州詩水生挑菜渚蓋用劉語也鄭谷益州詩和暖又逢挑菜日寂寥未是采花人郝天挺引嵗時記人日挑七種菜作羮以注鄭句悞甚觀人日不得言和暖當是二月二日亦猶之春浪决非脫葉時耳今於山谷詩而益明用事類苑曰魯直善用事若填塞故實舊謂之㸃鬼簿今謂之堆垜死屍如咏猩猩毛筆詩平生幾兩屐身後五車書又云管城子無食肉相孔方兄有絶交書精妙穏宻不可加矣當以此語反三隅也吳旦生曰唐文粹猩猩說云阮研使封溪見邑人言猩猩喜著屐人設酒及屐乃為所擒刺其血又晉阮孚云未知一生能着幾兩屐又五車書莊子言恵施事蓋魯直上句借孚語以用研事下句借施事以言作筆鈔書耳極刻露處能餘其隠故不嫌其太作意也陸放翁詩强健猶穿幾兩屐榮華正似一鈎絲薩天錫詩山川幾緉履日月兩浮萍皆佳管城一聨謂之折句皆言此體剏自魯直不知唐巳有之野客叢書引張祜詩賀知章口徒勞說孟浩然身更不疑李益詩桞吳興近無消息張長公貧苦寂寥貫休詩郭尚父休誇塞北裴中令莫說淮西杜荀鶴詩巻一箔絲供鈎線種千林竹作漁竿皆此句法也其在宋時者詩林廣記引東坡詩五車經已留兒讀二頃田應為鶴謀漁隠叢話引歐陽修詩靜愛竹時來野寺獨尋春偶過谿橋盧賛元詩想行客過梅橋滑免老農憂麥隴乾苕溪亦云鸚鵡杯且酌清濁麒麟閣懶畫丹青雞距䑕鬚黄魯直詩宣城變様蹲雞距諸葛名家捋鼠鬚吳旦生曰此皆筆名白樂天雞距筆賦足之健兮有雞足毛之勁兮有兔毛就足之中奮發者利距在毛之内秀出者長毫合為手筆正得其要象彼足距曲盡其妙蘇東坡答文與可詩為愛鵝谿白繭光掃殘雞距紫毫芒陸放翁詩雞距鋒圜筆絶倫按均州出䑕鬚筆王右軍得用筆法於白雲先生先生遺之鼠鬚筆又永和九年曲水㑹用䑕鬚筆為蘭亭記叙最得意其後雖書數百本無一得及者鍾繇張芝皆用䑕鬚筆杜祁公酬吳殿院䑕鬚筆古律詩各一篇蔡君謨為永叔書集古錄序以䑕鬚栗尾筆為潤筆歐陽永叔送元甫詩贈之以宣城䑕鬚之管蘇東坡詩欲寄䑕鬚并繭紙請君章草賦黄樓又坡嘗以第一龍團茶比之諸葛䑕鬚筆其子叔黨有䑕鬚筆詩漁隠稱其步驟氣格殊有父風謝宗可䑕鬚筆詩莫笑硯池濡醉墨絶勝倉廩飽陳紅埤雅云鼬䑕俗謂之䑕狼一名鼪今栗䑕似之蒼黒而小取其毫於尾可以製筆世所謂䑕鬚粟尾者也其鋒乃健於兔太平清話云宋時有䑕尾筆狼毫筆矲矮挼莎黄魯直詩矲矮金壺肯持送挼莎殘蘜更傳桮吳旦生曰春官音注矲皮買反雉苦買反方言桂林之間謂人短為矲雉雉正作矮字呼也曲禮共飯不澤手注云澤挼莎也古雋考略云莎一作莎經典釋文云煩撋猶挼莏也蓋宋人用事貴出處相等傳注中用事必以傳注中對之故也陸放翁詩醉撫酒壺憐矲矮卧看香岫愛嶙峋謝薖初夏詩挼挲蕉葉展新綠從便榴花舒小紅船官山谷詩王侯文采似於菟洪甥人間汗血駒相將問道城南隅無屋止借船官居吳旦生曰按庾子山賦風吹雲夢凍合船官注云船官官船也或疑山谷詩當作官船居是未嘗看庾賦耳趙復送晏集賢南歸云船官風破浪闗吏鼓通晨秦西巴藝苑雌黄曰古人詩押字或有語顛倒而無害於理者如韓退之以參差為差參以玲瓏為瓏玲是也比觀王逢原有孔融詩虚云座上客常滿許下惟聞哭習脂黄魯直有和荆公六言云啜羮不如放麑樂羊終愧巴西按後漢有脂習而無習脂戰國有秦西巴而無巴西豈二公之悞耶吳旦生曰韓非子云樂羊為魏將攻中山中山君烹其子遺之羮樂羊啜之盡一杯文侯賞其功而疑其心又云孟孫獵得麑使秦西巴載歸其子隨之而啼秦弗忍而與之孟孫怒逐之復召以為子傅據此則魯直以西巴為巴西誠悞矣陳子昂感遇詩吾聞中山相乃屬放麑翁蓋西巴乃孟孫氏之臣子昂徒見樂羊中山事遂謂之中山相則益悞甚漢臯詩話云字有顛倒可用者如羅綺綺羅圖畫畫圖毛羽羽毛白黒黒白之類方可縱横惟韓愈孟郊輩才豪故有湖江白紅慨慷之語後人亦難倣效若不學矩步而學奔逸誠恐麟麒凰鳯朩草川山之句紛然矣紫綿黄魯直詩紫綿揉色海棠開吳旦生曰沈立海棠記言其花五出初極紅如燕脂㸃㸃然及開則漸成纈暈至落則若宿粧淡粉矣於葉間或三萼至五萼為叢而生其蘂如金粟蘂中有鬚三如紫絲陳去非詩日暮紫綿無數開此與魯直同意也張冕咏蜀中海棠云山朩𤓰開十顆顆水林檎發一攅攅注謂朩𤓰林檎花初發時與海棠相類余按紫綿色者謂之海棠豈與朩𤓰林檎類耶心竊非之後見漁隠叢話云閩中漕宇脩貢堂下海棠有二十四叢毎春着花有如紫綿揉色者亦有不如此者其種類不同不可一槩論也至其花落則皆若宿粧淡粉矣大率富沙多此並是帚子海棠正與蜀中相類今江浙間别有一種柔枝長蒂顔色淺紅垂英向下謂之垂絲海棠與蜀閩不類李贊皇花朩記云凡今草朩以海為名者悉從海外來如海棠海㯶海栁海榴海桐海朩𤓰之類是也羅大經云洛陽人謂牡丹為花成都人謂海棠為花尊貴之也亦如稱歐陽公司馬公之類不復指其名字稱號竹石牛室中語曰坐客論魯直巧自作格因舉其題竹石牛圖云石吾甚愛之勿使牛礪角牛礪角尚可牛鬭殘我竹如此語意甚新公徐云濁漉水中泥水濁不見月不見月尚可水深行人沒蓋是太白濁漉篇也山谷亦仿此語意耳吳旦生曰或稱魯直桃李春風一杯酒江湖夜雨十年燈以為極至魯直自以此猶砌合須竹石牛圖詩乃可言至耳余觀此詩機致圓美只將竹石牛三件頓挫入神自成雅調陵陽謂其襲太白濁漉篇法然按宋元嘉中語云寧作五年徒不逐王𤣥謨𤣥謨猶尚可宗越更殺我則太白之前早有此等句語矣况詩家老手體製縱横便直取古語如孟徳之呦呦鹿鳴淵明之犬吠深巷中老杜之使君自有婦而無車馬喧亦復何礙野客叢書云魯直詩角雖讀為祿實則角爾傅𤣥盤中詞曰與其書不能讀當從中央周四角亦以角為祿也禮黄鍾為角音祿又如字四皓中角里先生音禄孔氏秘記慮將來之悞直書為禄里繁欽禄里先生訓亦書為禄癸辛雜識云淳化中太宗問崔偓佺曰角姓或云用上加一撇或云用上加一㸃果何音偓佺曰臣聞刀下用乃𣙜音兩㸃下用乃鹿音用上一撇一㸃俱不成字天咫黄魯直詩湔祓瘴霧姿朝趨去天咫吳旦生曰任淵注引天威不違顔咫尺洪景盧謂國語楚靈築三城使子晢問范無宇無宇不可王曰是知天咫安知民則韋昭曰咫者少也言少知天道耳酉陽雜爼有天咫篇黄詩蓋用此徐師川翫月四言云君家近市所見天咫庭户之間容光能幾正祖述黄所用云說文咫中婦人手長八寸謂之咫周尺也人手却十分動脉為寸口十寸為尺尺所以指尺規榘事也周制寸尺咫尋常仞諸度量皆以人之體為法折綿潘子真詩話曰霜威能折綿之句予問折綿所從來山谷曰勁氣方凝海清威正折綿庾肩吾詩也吳旦生曰阮籍大人先生歌云陽和微弱隂氣竭海凍不流綿絮折呼吸不通寒冽冽一作則則按唐詩春寒側側掩重門王荆公詩側側輕寒剪剪風楊升菴謂側不正也側寒字甚新余意本此則則轉而側側蓋折綿字始此而肩吾詩用其事又觀張說詩塞上綿應折江南草可結則山谷以前常用之矣虎䕫藩湘煙錄載容齋隨筆曰魯直詩汲烹寒泉窟伐燭古松根相戒莫浪出月黒虎䕫藩䕫字甚新其意蓋言抵觸而莫究所出惟杜工部課伐朩詩序云課𨽻人入谷斬隂朩晨征暮返我有藩籬是缺是補旅次於小安山有虎知禁若恃爪牙之利必昬黒摚突䕫人屋壁列樹白桃鏝焉牆實以竹示式遏為與虎近混淪乎無良賔客其詩句有云藉汝跨小籬乳獸待人肉虎穴連里閭久客懼所觸魯直用此序中語也吳旦生曰此洪容齋一筆中語也此段下即繼之云杜公在䕫府所作詩所謂䕫人者述其土俗耳本無抵觸之義魯直蓋悞用之則是容齋駁魯直之悞用杜序也今湘煙錄刪末一段不載使人看之直是以杜序詮䕫字義矣其累後學不淺特為詳出藝苑雌黄亦言此詩䕫字不知作何訓因引老杜此序所謂䕫人正謂䕫府之人耳朱晦翁云山谷頌又用躨觸字按躨跜見靈光殿賦自為蚪龍動貎元無觸義不知山谷何所據也諌果山谷謝恵橄欖詩方懐味諌軒中果忽見金盤橄欖來想共餘甘有𤓰葛苦中真味晚方回吳旦生曰戎州蔡次律家小軒外植餘甘子乞名於山谷因名之曰味諌軒其後王子予以橄欖送山谷故賦及之因名二物為諌果山谷喜苦筍嘗從斌老乞之詩云南園苦筍味勝肉籜龍稱寃莫採錄煩君更致蒼玉束明日春風吹成竹東坡賦苦筍云苦而有味如忠諫之可活國陸放翁又云我見魏徵殊娬媚約束兒童勿多取世亦名諫筍海錄碎事云餘甘青實狀如山李味若橄欖生於近郊者肉脆而虛其味薄生於馬湖者肉堅而實在戎州蓋其味若橄欖故山谷以為有𤓰葛也異物志謂餘甘橄欖一物異名恐未必然觟䚦山谷呈吉老縣丞詩觟䚦今無種蒲盧教未形吳旦生曰舊注觟䚦此兩姓今無人按太𤣥難上九云角觟䚦終以直其有犯論衡云觟獬同䚦音齒一角羊也青色四足能知曲直性識有罪臯陶治獄其罪疑者令觸之有罪則觸無罪則不觸蓋天生聖獸助獄為驗即今所畫獬廌也神異經獬廌東北荒之獸也性忠觸邪故立獄皆東北依所在也異物志見人鬬則觸不直者聞人論則咋不正者一坐山谷詩畫出西樓一坐秋吳旦生曰唐詩吳淞一幀秋山谷本之坐本音靜陸魯望又作平聲押畫繒曰坐晉天文志東海氣如圓河水氣如引布别作㡠幀坐女冠桐江詩話曰暢姓惟汝南有之其族尤奉道男女為黄冠者十之八九時有女冠暢道姑姿色妍麗神仙中人也秦少游挑之不得作詩云瞳人剪水腰如束一幅烏紗裹寒玉超然自有姑射姿囘看粉黛皆塵俗霧閤雲窓人莫窺門前車馬任東西禮罷瑤壇春日靜落花滿地乳鴉啼吳旦生曰韓退之有洗粧拭靣着冠帔白咽紅頰長眉青之詩白樂天有綽約小天仙生來十六年之詩女冠宕逸文士輕儇往往致有此侮湘山野錄載申國公主為尼掖庭隨出者三十餘人詔兩禁送至寺賜齋傳㫖令各賦詩彭喬年一律最著都下好事者以鷓鴣天歌之蓋貴主敢爾其他又何如也有歌妓為尼復還俗吳融作詩頷聨云三峽卻為行雨客九天曽是散花人此只是體貼語頸聨云空門付與悠悠夢寳帳迎迴暗暗春可謂形容盡妙東臯雜錄云荆公在鍾山興國寺見一尼入寺使蔡天啟集句嘲之云不佳熏爐換好香為他人作嫁衣裳因過竹院逢僧話始覺空門氣味長駒隂冗記云饒州有女尼從士人張生者戴宗吉贈詩曰短髪鬔鬆緑未匀袈裟脫却着紅褌於今嫁與張郎去贏得僧敲月下門人鮓甕侯鯖錄曰瞿塘之下地名人鮓甕少游嘗謂未有以對南遷度鬼門闗乃用為絶句云身在鬼門闗外天命輕人鮓甕頭船北人慟哭南人笑日落荒村聞杜鵑吳旦生曰桯史載紹聖二年四月甲申山谷以史事謫黔南道間作竹枝詞二篇題歌羅驛曰撑厓拄谷蝮蛇愁入箐攀天猿掉頭鬼門闗外莫言逺五十三驛是皇州浮雲一百八盤縈落日四十九渡明鬼門闗外莫言逺四海一家皆弟兄自書其後曰古樂府有巴東三峽巫峽長狷鳴三聲淚沾裳但以抑怨之音和為數疊惜其聲今不傳余自荆州上峽入黔中備嘗山川阻險因作二疊傳與巴娘今以竹枝歌之前一疊可和云鬼門闗外莫言逺五十三驛是皇州後一疊可和云鬼門闗外莫言逺四海一家皆弟兄或各用四句入陽闗小秦王亦可歌也是夜宿於驛夢李白相見於山間曰予往謫夜郎於此聞杜鵑作竹枝詞二疊世傳之不子細憶集中無有三誦而使之傳焉其詞曰竹竿坡靣蛇倒退摩圍山腰猢孫愁杜鵑無血可續淚何日金雞赦九州命輕人鮓甕頭船日痩鬼門闗外天北人墮淚南人笑青壁無梯聞杜鵑今豫章集所刋蓋自謂夢中語也音響節奏似矣而不能揜其真亦寓言之流與余按趙徳麟所載少游之句與岳珂所載之末章辭義合符然覽其全文應屬山谷于湖楊升菴曰王敦屯于湖帝至于湖隂察營壘而去此晉紀本文于湖今之歴陽也帝至于湖為一句隂察營壘為一句温庭筠作湖隂曲誤以隂字屬上句也張耒作于湖曲以正之吳旦生曰張文濳謂遊蕪湖問父老湖隂所在皆莫之知按晉地志有于湖而無湖隂乃作于湖曲云武昌雲旗蔽天赤夜築于湖洗鋒鏑陸放翁入蜀記云漢丹陽郡有蕪湖縣吳陸遜屯蕪湖又杜預注春秋楚子伐吳克鳩兹亦在蕪湖至東晉乃改名于湖王敦反屯于湖今故城尚存又有玩鞭亭亦當時遺跡劉夢得歴陽書事詩云望夫人化石夢帝日環營蓋夢得自䕫州移牧歴陽過此邑也帝微行至其營敦夢日遶之覺而追不及處士牙珊瑚鈎詩話曰陳叔易居陽翟澗上村號澗上丈人無仕宦意崇觀間朝廷召之郡守勸駕不得已而起晁以道時致仕居嵩山有詩云處士誰人為作牙盡攜猿鶴到京華從今鄰壑堪惆悵六六峰前只一家蓋譏之也吳旦生曰終南曰徑巧宦曰媒虛聲曰盜種種不堪今復曰牙松篁掃地矣按韓退之雖與石洪温造李渤遊而多侮薄之所謂水北山人得名聲去年去作幕下士水南山人今又往鞍馬僕從照閭里少室山人索價高兩以諌官徴不起彼皆刺口論時事有力未免遭驅使讀者謂韓與處士作牙人商度物價也晁公句出此詩話縂龜云古所稱駔子黨切儈今謂牙也本謂之互郎主互市事耳唐人書互字作㸦㸦字似牙字因轉讀為牙余按說文牙牡齒也凢牙之屬皆從牙則是古牙字與唐之所書互作㸦殆相彷彿耶易大畜卦豶豕之牙鄭康成注謂牙讀為互則二字原相通矣詩話又言互作牙何得舉世同辭蓋不足恠今人以萬為力以千為丿亦人人道之也因觀田子藝云今隠語以千為撇以萬為方蓋俗萬作万故千舉其首而万加以㸃也二王帖中亦作万楊升菴云楚方城古作万城晁无咎王直方詩話曰曹輔字子方嘗為省郎交游間以為有智數者故無咎贈詩有兵甲胸中無敵國之語苕溪漁隠曰予纂集叢話歴覽羣賢詩說並無評議无咎詩者止有此一句不知當時羣賢偶遺之耶吳旦生曰按无咎詩有聲陳后山戲贈云聞道新詞能入様相州紅纈卾州花又東臯雜録云西池題壁一聨雨園鳩逐婦風徑燕將兒亦佳句也又許彦周詩話曰弔李誠之長短句措意高古深悲而善怨有似離騷又珊瑚鈎詩話云退之作羅池廟迎饗送神詩蓋出於離騷而无咎效之作楊府君碣系即雜之韓集中豈復可辨據余憶記之所及巳有如此漁隠謂並無評者何也石林詩話云高荷以五十韻見山谷極賞之作六言贈荷曰張侯海内長句晁子廟中雅歌高郎少加筆力我知三傑同科張則文濳晁則无咎也然余觀山谷贈无咎詩云執持荆山玉要我雕琢之蓋无咎從山谷作詩故其集中如豆葉黄諸作絶類山谷奈何降而與荷齊稱宜无咎聞之不平矣敖東谷謂東坡愛李廌之文山谷愛高荷之詩後來二子行檢齷齪使二公有愛才之累惜哉蘇門晁無咎詩云黄子似淵明城市亦復真陳君有道舉化行井閭淳張侯公瑾流英思春泉新高才更難及淮海一髯秦吳旦生曰蘇門最知名者黄魯直張文濳晁无咎秦少游世謂之四學士陳無巳以晚出其門故不及四人之著無巳答李端叔書云蘇公之門有客四人魯直少游无咎則長公之客也文濳則次公之客也然四客各有所長魯直長於詩辭秦晁長於議論魯直詩云晁子智囊可以括四海張子筆端可以回萬牛又與秦覯書云議論文字今日乃當付之少游及晁張無已足下可從此四君子一一問之文濳詩云黄門蕭蕭日下鶴陳子峭峭霜中竹秦文倩麗舒桃李晁論崢嶸走珠玉蓋諸子臭味互相推矜如此及觀無巳次韻黄樓詩云一代蘇長公四海名未巳少公作長句班馬安得擬文濳贈李徳載詩云長公波瀾萬頃海少公峭㧞千尋麓蓋其門之推矜二公又如此剪綵復齋漫錄曰荆楚嵗時記正月七日剪綵為人或鏤金箔貼屏風上亦戴之像人入新年形容改新無巳立春詩巧勝向人真奈老衰顔從俗不宜新更覺其工漁隠叢話曰閱荆楚嵗時記正月七日剪綵為人或鏤剪金箔為人貼屏風亦戴之頭鬢所云止此即無像人入新年形容改新九字復齋以無巳詩有衰顔從俗不宜新之句遂牽合撰此九字誣甚矣吳旦生曰余按荆楚嵗時記剪綵為人或鏤金箔為人以貼屏風亦戴之頭鬢其注又云剪綵人者人入新年形容改從新也初學記亦載之陳無已詩用此復齋因據此而合言之漁隠不詳攷謂本記無九字亦粗莽之極事物攷云賈充夫人剪綵為花勝或鏤金箔為人象瑞圖之形是綵勝起於晉也黄昬湯陳后山贈二蘇公詩如大醫王治膏肓外證巳解中尚彊探囊一試黄昬湯一洗十年新學腸吳旦生曰任子淵注引圖經本草云合歡夜合也一名合昬韋宙肺癰黄昬湯治之取夜合皮掌大一枚水煮服張世南以為其說牽合無義閱本草王孫味苦平無毒主五臓邪氣吳名白功草楚名王孫齊名長孫一名黄昬據此則詩中之意蓋指當時癖學為五臓邪氣須得蘇公一洗之耳取義精深如此急就篇注云牡䝉一名黄昬孫思邈有黄昬散夫妻反目服之必和注云黄昬朩續博物志云草部朩部黄昬為二物郭璞云守宫槐晝日聶合而夜舒布也江東有朩與此相反俗因名合昬古今注云合歡似梧桐枝葉互相結風來解使人不忿嵇康種之於舍前瓣香了翁雜鈔曰陳后山詩向來一瓣香敬為曽南豐按是時東坡正為郡守又后山元以坡薦得官瓣音版呉旦生曰元豐間曽鞏脩史薦后山有史才乞自布衣召入史館命未下而曽去故感其知已作妾薄命云云按東坡出知杭州道由南京后山時為徐州教授出界來謁孫覺不許往而后山不顧劉安世上彈文而后山不顧且送以詩云一代不數人百年能幾見此豈寡情於坡者哉送吳先生謁坡詩云為說人安在依然一秃翁時后山坐黨事廢錮故云秃翁灌夫傳與長孺同一秃翁注言無官位版授也蓋自謂不負蘇公之門也客兒陳后山云詩來巳作客兒語吳旦生曰鍾嶸詩品云錢塘杜明師夜夢東南有人來入其館是夕即靈運生於㑹稽旬日而謝𤣥亡其家以子孫難得送靈運於杜治養之十五方還都故名客兒治音稚奉道之家靜室也梁簡文云謝客吐言天㧞出於自然晏殊類要云靈運㑹稽人世不宜子息乃於錢塘杜明師舍寄養師是夜夢有賢人相訪及曉乃靈運至因名夢謝亭按白樂天詩夢賢亭古傳名謝歌妓樓新道姓蘇杭州靈隠寺山上有夢謝亭即杜明師夢所也施肩吾有登靈隠山夢謝亭詩山王陳后山詩從昔竹林雖小阮只今未可棄山王吳旦生曰宋書顔延之作五君咏以述竹林七賢山濤王戎以貴顯被黜故后山以為未可棄也東坡云他年五君詠山王一時數崇禎中陳卧子詩七子舊游思應阮五君新咏削山王困學紀聞云山濤欲釋吳以為外懼又言不宜去州郡武備其深識逺慮非清談之流也顔延之於七賢不取山王然戎何足以比濤亦猶䃉之於玉也燈闌步里客談曰陳無已詩睿思殿裏春將半燈火闌殘歌舞散自書小字答邊臣萬國風煙入長筭蓋燈火闌殘乃村鎮夜深景致睿思殿不應如是吳旦生曰王勉夫謂正所以狀宫中向夜蕭索之意非以形容盛麗也聞見錄載樂天長恨歌云夕殿螢飛思悄然孤燈挑盡未成眠豈有興慶宫中夜不㸃燭明皇自挑燈之理然天上雖非人間比使言高燒畫燭貴則貴矣豈復有此等恨意耶觀者味其情旨斯可矣藕花老學庵筆記曰吳幾先言參寥詩五月臨平山下路藕花無數滿汀洲五月非荷花盛時不當云無數滿汀洲亷宣仲云此但取句美若云六月臨平山下路則不佳矣幾先云只是君記得熟故以五月為勝不然止云六月亦豈不佳哉吳旦生曰風蒲獵獵應是五月事况自姑蘇歸西湖經臨平道中作乃其目擊氣候有遲蚤豈可概論若作六月則藕花處處皆滿何獨臨平為足異也高季迪送顧倅之錢塘云早向臨平過荷花已欲秋勉其早行良亦有意珍珠船云東坡一見此詩為寫而刻諸石宗婦曹夫人善丹青作臨平藕花圖谷董盤遊陸道士詩投醪谷董羮鍋裏闕窖盤遊飯盌中吳旦生曰二句皆摭實也羅浮頴老取凡飲食雜烹之名谷董羮坐客稱善王摩詰有露葵羮杜子美有錦帶羮陳思王製七寶羮唐明皇射生鹿取血瀹腸食之謂之熱洛河交趾俗牛羊腸臓畧洗為羮名不乃羮又有羊鹿雞猪肉和骨一釡煮之調以五味為不錄羮江南人好作盤遊飯餔鮓鱠炙無不有然皆埋之飯中故里諺云撅得窖子陸放翁引北户錄云嶺俗家富者婦産三日或足月洗兒作團油飯以煎魚蝦雞鵞猪羊灌腸蕉子薑桂鹽䜴為之即所謂盤遊飯也二字語相近必傳者之悞歴代詩話巻五十九
