body:
  text: 歷代詩話卷六十五歸安吳景旭撰壬後集上之上元詩月泉吟社詩評曰詩有六義興居其一凡隂陽寒暑草朩禽獸山川風景得於適然之感而為詩者皆興也風雅多起興而楚騷多賦與比漢魏至唐傑然如老杜秋興八首深詣詩人閫奧興之入律者宗焉春日田園雜興此蓋借題於石湖作者固不可舍田園而泛言亦不可泥田園而專及舍之則非此詩之題泥之則失此題之趣有因春日田園間景物感動性情意與景融辭與意會一吟諷頃悠然自見其為雜興者此真雜興也不明此義而為此詩他未暇悉論往往敘實者多入於賦稱美者多近於頌甚者將雜興二字體貼而相去益逺矣第一名羅公福三山人本姓連名文鳯字伯正號應山詩曰老我無心出市朝東風林壑自逍遙一犁好雨秧初種幾道寒泉藥旋澆放犢曉登雲外壟聽鶯時立栁邉橋池塘見説生新草已許吟魂入夢招評曰衆傑作中求其粹然無疵極整齊而不見邉幅者此為冠第二名司馬澄翁義烏馮澄字澄翁號來青詩曰編蘭春思倩吟鞭著面和風軟似綿黃犢烏犍秧榖候雄蜂紫蝶菜花天把鉏健婦踏煙壟抱甕丈人分野泉忙事關心在何處流鶯不聽聽啼鵑評曰起善包括兩聨説田園的而雜興寓其中末語亦不泥第三名髙宇杭州梁相字必大詩曰膏雨初晴布榖啼村村景物正熙熙誰知農圃無窮樂自與鶯花有舊期彭澤歸來惟種栁石湖老去最能詩桃紅李白新秧緑問著東風總不知評曰前聨妙於細合後聨引陶范不為事縳句法更髙末借言雜興的是老手吳旦生曰至元間浦江吳潛齋渭有月泉吟社預於丙戌小春月望命題至正月望日收卷月終結局請諸處吟社用好紙楷書以便謄副而免於差舛明書州里姓號以便供賞而不致浮湛聘詩人謝翺方鳯吳思齊為考官三月三日揭曉收二千七百三十五卷選中二百八十名刻至六十名止皆有詩賞者也第一名公服羅一縑七丈筆五帖墨五笏第二名公服羅一縑六丈筆四帖墨四笏第三名公服羅一縑五丈筆三帖墨三笏第四至十名各春衫羅一縑筆二帖墨二笏第十一至二十名各深衣布一縑筆一帖墨一笏第二十一名至三十名各深衣布一縑筆一帖第三十一名至五十名各筆一帖墨一笏吟箋二沓詩限五七言律以春日田園雜興為題余觀其韻事雅規標勝來今而評論詩題尤入神解凡作雜興者皆須領悟此旨也李西涯以未見此集為嫌閩中徐興公家有藏本録其佳句如屋角枯藤粘樹活田頭野水入溪渾青林伐鼓村村社緑水平疇處處秧土脈正融催觳􅑌林隂微合聽鉤輈田烏飛逐耕煙犢桑扈鳴隨喚雨鳩草青隨意牛羊卧門靜無人燕雀多麥壟風微牛睡穩芹塘泥滑燕歸忙小雨杏花村問酒淡煙楊栁巷巾車榆莢雨酣新水滑棟花風軟薄寒收升菴又拈其山歌聒耳烏鹽角村酒柔情玉練捶皆六十人中警句也誓詩壇文云月泉舊社久褰詩錦之華季子後人獨倣禮羅之意遂從昨嵗遍致新題春日田園頗多雜興東風桃李又是一番鄉邦之勝友雲如湖海之英遊雷動古囊交集巨軸橫陳誰揭青銅尚詢黃髮無舍女學何至教琢玉哉不用道謀是在主為室者俾得臣而寓目與舅犯以同心眷惟騷吟良出工苦所貴相親而善亦多自負所長能雄萬夫定羞與絳灌等伍如降一等乃待以季孟之間欲辛甘燥濕之俱齊固甚難以曲直輕重而見欺亦不可念偉事或偶成於戲劇彼讒言特借譽而揄揚我詩如鄶曹何幸縱觀於諸老此聲得梁楚誓將不負於齊盟一點無他三辰在上黃耳楊煥然詩音書黃耳絶兄弟白眉良吳旦生曰陸機有犬名黃耳後仕洛以竹筒盛家信繫犬頸走向吳至家取答書仍還洛詩僧所云青蠅為弔客黃犬寄家書是也後犬死還葬機村去機家二百步聚石為墳村人呼為黃耳塜袁海叟有過黃耳墓詩考之本傳俱為黃犬劉貢父詩話以為自洛至吳更歷江淮殆數千里安能諭人而從舟楫乎或者為奴名也余以奴子傳書有何足異至艷千古陳敬初詩家無黃耳傳鄉信門有蒼頭記客名其非奴子明矣五丁堯山堂外紀曰蜀人唐仲明子西孫也蜀破被俘鬻於燕市安陸趙仁甫作疏鳩資贖之疏中有云錦江秀色都為巴蜀之蕭條玉壘浮雲盡入峩眉之悲慘郝伯常讀而傷之作蜀亡歎畀仲明為行券云子規啼缺峨眉月嘉陵江月半江血青天蜀道為坦途馬蹄蹴落隂山雪芙蓉城碎朔風急虓虎磨牙綺羅穴不識兵戈三百年疊鼓一聲肝膽裂坡仙玉里子西孫挺身北走來中原峨岷秋色橫眉宇骯髒獨倚燕市門時望蘇門一回首漠漠萬里煙塵昏古言蜀險甲天下一夫扞禦足成霸前劉後李王復孟虎視中原雄並駕於今底事谷為陵錦城萬里趨龍庭當時不與秦塞通一天自可延千齡吾子莫漫嗟飄零厲階權輿實五丁吳旦生曰華陽國志云秦惠王作石牛五頭朝㵼金其後曰牛便金蜀人悅之乃遣五丁迎石牛既不便金怒遣還之乃嘲秦人曰東方牧犢兒秦人笑之曰吾雖牧犢當得蜀也惠王知蜀王好色許嫁五女於蜀蜀遣五丁迎之還到梓潼見一大蛇入穴中一人攬其尾掣之不禁至五人相助大呼抴蛇山崩時壓殺五人及秦五女并將從而山遂分為五嶺其後秦大夫張儀等從石牛道伐蜀蜀王敗績開明氏遂亡蓋常璩之所載止此而俗傳以為因金牛之詐蜀使五丁力士開山而谷道始通余按三皇乘祗車出谷口至黃帝為其子昌意娶蜀山氏之女生子髙陽是為帝嚳在禹貢為華陽黑水梁州之域及周武伐紂蜀亦從行則豈自秦時始通道中土哉正德中王子衡詩云古峽天中闢鴻荒不記年蔡蒙來禹貢彭濮記周篇自是并吞易非關疏鑿然金牛本茫昧世代浪相傳鴈帛輟耕録曰零落風髙恣所如歸期回首是春初上林天子援弓繳窮海纍臣有帛書中統十五年九月一日放鴈獲者勿殺國信大使郝經書於真州忠勇軍營新館右五十九字郝公書也公字伯常澤州陵川人中統元年拜翰林侍讀學士充國信使宋館於真州凡十有六年始得歸此書當在至元十一年是時南北隔絶但知紀元為中統也先是有以鴈獻命畜之鴈見公輒鼓翼引吭似有所訴者公感悟擇日率從者具香案北向拜舁鴈至前手書尺帛親繫鴈足而縱之後虞人獲之苑中以聞上惻然曰四十騎留江南曽無一人鴈比乎遂進師南伐吳旦生曰農田餘話郝經奉使於宋賈似道忌其露乞和之盟拘於儀真作帛書附鴈足帛博一寸髙五寸有陵川郝氏印三月虞人獲鴈於汴梁金明池為安豐教授王時若所得延祐五年集賢學士郭貫出持淮西使節知之奏於朝敕中使取之仁宗裝潢成卷命翰林集賢文臣題識之藏諸東觀或説世祖有四十騎留江南曽無一人如鴈之歎遂興師伐宋者妄也據此則始末與輟耕有異因思一鴈也為子卿則自北而南為伯常則自南而北然漢廷特飾説以紿之而陵川一寸帛則實有是事也姚牧菴輟耕録曰姚文公燧玉堂設宴歌妓羅列有一人秀麗間雅微操閩音公叩之泣而訴曰妾建寧人氏真西山之後也父官朔方時貸公帑無償賣入倡家流落至此公遣使詣丞相三寶努為落籍丞相意公欲侍巾櫛即檢籍除之公語一小史曰我以此女為汝妻女即以我為父也京師傳為盛事嘉興貝闕有詩曰斷絲棄道邉何日緣長松墮羽别炎洲不復巢梧桐昔在至元日六合車書同玉堂盛文士燕集來雍雍金刀手割鮮酒給葡萄濃坐有一枝春秀色不可雙叶娉婷劉碧玉綽約商玲瓏寶釧金雀叉已覺燕趙空或聞操南音未解歌北風上客驚且疑姓字初未通問之慚復泣乃起陳始終妾本建寧女逺出西山翁父母生妾時謂是金母童梨花鎖院落燕子窺簾櫳迢迢官朔方位卑食不充侵貸國有刑桎梏加父躬粥女以自贖白璧淪泥中秋娘教歌舞屢入明光宫永為倡家婦遂屬梨園工京華多少年門外嘶青驄不如孟光醜猶得嫁梁鴻自傷妾薄命失落似秋蓬客聞為三歎天道何懵懵遣使白宰相削籍歸舊宗小史十八九勿恨相如窮配爾執箕帚今夕看乘龍鴛鴦並玉樹鸚鵡開金籠棄汝桃花扇紅牙不復從提甕自汲水絺綌自禦冬時多困轗軻事或欣遭逢安知百尺井忽登羣玉峰借問為者誰內相姚文公吳旦生曰姚牧菴嘗與閻靜軒過張妓怡雲小飲姚偶言暮秋時三字張應聲作小婦孩兒且歌且笑曰暮秋時菊殘猶有傲霜枝西風了却黃花事又史中丞遇牧菴靜軒於道笑曰二先生所往容待行否因命騶從歸携酒饌同造怡雲姚命張耴酒先壽史張且歌雲間貴公子玉骨秀橫秋水調歌一闋史喜甚席終左右欲徹酒器皆金玉者史云休將去留待二先生來此受用後牧菴致政家居年八十猶為侍妾生一子蓋其情致風逸若此而獨於玉堂落籍為之擇嫁小史王㻖後至顯官誠盛德事也龍眼陳剛中作思明州詩元宵已似春深後龍眼花開蛤蚧鳴吳旦生曰荔枝龍眼並儷海南荔子自越王通貢楊妃命騎遂費詞人之形似而龍眼以荔過始熟名為荔奴亦名亞荔枝焉章碣詩却擁朩綿吟麗句便攀龍眼醉香醪東坡詩顛坑仆谷相枕藉知是荔枝龍眼來嗣是咏者寥寥而僅見之剛中也所云元宵似春深見其地暖即薩天錫閩土臘如春之意亦猶四月熟荔枝稱火山耳日詢手鏡云蛤蚧乃一甲蟲狀類蜥蜴守宫之屬其物二者上下相呼牝聲蛤牡聲蚧情洽乃交兩相抱負人以手分擘雖死不開桂海虞衡志云首如蟾蜍背緑色上有黃斑點若古錦文長尺餘尾絶短傳云自旦至暮變十二般色傷人必死海録碎事云大月三聲小月兩聲千里劉夢吉詩埋盆欲學魚千里試地先栽芋一區吳旦生曰關尹子以盆為沼以石為島魚環遊之不知其幾千萬里不窮也夢吉用此黃山谷詩爭名朝市魚千里亦此意耳或引陶朱公養魚經云以六畝地為池池中有九州則周繞無窮自謂江湖也然無千里字芥隱筆記云山谷屢用魚千里字尋師訪道魚千里蓋世功名黍一炊又小池已築魚千里隙地仍栽芋百區余按前二句山谷復改曰從師學道魚千里蓋世功名黍一炊後二句直是夢吉粉本滕韻吕徽之雪詩有云天上九龍施法水人間二鼠嚙枯藤鶩鵝聲亂功收蔡蝴蝶飛來妙過滕吳旦生曰天台吕徽之博學能文一日詣冨家易穀種值大雪立門下聞東閣中分韻作雪詩一人得滕字苦吟弗就不覺失笑閣中貴遊輩聞之詢其見笑之由乃曰我意舉滕王蛺蝶事耳始邀入坐衆以藤滕二字請即援筆書此二聨復請和曇字韻又隨筆寫云竹委長身寒郭索松埋短髮老瞿曇寫訖便出門問姓字亦不答皆驚訝曰嘗聞吕處士名豈其人耶惠之榖怒曰我豈取不義財必易之而去遣人尾其後雪晴往訪焉惟草屋一間忽米桶中有人乃妻也天寒故坐其中試問徽之先生何在答曰溪上捕魚始知真為徽之矣至彼果見之隔溪謂曰諸公先到舍我得魚換酒來也少頃携魚與酒至盡歡而散翌旦徽之已遷居矣玉帶輟耕録曰龍麟州過福建憲府設宴命官妓小玉帶佐觴憲使請曰今日之歡皆玉帶為也願酬以詩麟州負海內重名雅畏清議又不能違憲使之請遂書一絶句云菡蓞池邉風滿衣朩樨亭下雨霏霏老夫記得坡仙語病體難禁玉帶圍蓋前輩既不拂人之意又不失所守而且用事清切一時風致非野儒俗士所能及也吳旦生曰佛印住潤州金山寺東坡過潤見之師云內翰何來此間無坐處坡戲云暫借和尚四大用作禪牀師云山僧有一轉語內翰言下即答當從所請稍涉擬議所繫玉帶留鎮山門坡許之師云山僧四大本無五藴非有內翰欲於何處坐公未即答師呼侍者收此玉帶取衲裙相報因有二絶坡次韻云病骨難堪玉帶圍鈍根仍落箭鋒機欲教乞食歌姬院故與雲山舊衲衣後之用其事者如張起題納延金臺集云玉帶難圍老病身唐桂芳送程仲庸留金山寺云玉帶暫拋煩轉語楞伽曽寫悟前身皆遜步於麟州矣剔齒籖蓉塘詩話曰趙松雪老態詩老態年來日日添黑花飛眼雪生髯扶衰每藉過頭杖食肉先尋剔齒籖右臂拘攣巾不裹中腸慘戚淚常淹移床獨就南榮坐畏冷思親愛日簷徐延之云非身處老境真知灼見者不能諳此吳旦生曰仙人鄭思逺常騎彪故人許隱齒痛求治鄭拔彪鬚及熱插齒間即愈陸雲與兄機書云近日復案行曹公器物取其剔齒籖一筒今送兄一本趙詩籖作纎按即籖字也九鼎宋子虛詩列國皆貪禹鼎神周衰三代寶先淪不知璽奉髙皇日曽問當時果在秦吳旦生曰禹鑄九鼎於甘讒之地故曰讒鼎服氏注以為疾讒之鼎非是而韓非子作饞鼎亦誤也夏都乎陽及安邑桀亡鼎遷來亳乃隔河也書稱周遷商鼎武王遷河以南而安置未善故成王定鼎於郟鄏周本紀云秦取九鼎寶器而遷西周君於􅓆狐水經注云周顯王時九鼎淪沒泗淵秦始皇時而鼎見於彭城始皇自以德合三代大喜使數千人沒水求之不得所謂鼎伏也系而行之未出龍齒嚙其系故語曰稱樂太早絶鼎系潏水李氏辨之曰是時泗水在彭城宋之分九鼎何緣而至宋夫取九鼎者秦昭襄也始皇乃莊襄之子也然觀舒雅云周威烈王二十三年九鼎震震者淪之兆則能震豈不能沒哉蓋秦有并吞天下之志不得鼎無以取重於天下故託言入秦也乃知昭襄之世既書鼎入秦而始皇二十八年又書沒泗求鼎此史氏之微辭也文獻通考云赧王五十九年周亡秦昭王取九鼎其一飛入泗水餘八鼎入於秦中秦女宋子虛咏秦少遊女云父貶滕隂老淚澘黃金誰贖一姫還看來山抹微雲後直送娥眉出曉關吳旦生曰靖康間有女子自稱秦學士女道中題詩云眼前雖有還鄉路馬上曽無放我情讀者悽然曽裘父為作秦女行按少遊夢中作好事近長短句有醉卧古藤隂下了不知南北之句後自貶所歸卒於滕州殆成讖語故朝無咎弔詞云醉卧藤隂黃山谷詩西風吹淚古滕州陳剛中詩今夜更遊臺上月不堪重照古藤隂少遊蓬萊閣席上賦長短句首言山抹微雲天粘衰草極為東坡所稱呼之為山抹微雲君又嘗戲云山抹微雲秦學士露花倒影栁屯田故范元實祖禹之子為少遊壻作詩眼一卷嘗在歌舞之席終日不言妓有問之曰公亦解辭曲否笑答曰吾乃山抹微雲女壻也至他宋子虛詩壺臧固自知名久何處更能求郅他吳旦生曰史記韓長孺傳於梁舉壺遂臧固郅他皆天下名士索隱云郅音質他徒河反人姓名也漢書作至他蓋謂壺臧之外至於他有所舉皆名士也余按郅者商時侯國其在漢則自郅惲郅壽郅都郅伯尚而外無聞焉子虛作詩以正史氏之訛如啽囈一集當與楊鐵崕咏史樂府並傳馮海粟稱其五言律風調悽惋不勝江哀浦思之情悰如承恩金馬詔失意玉環詞落月今誰弔長星夜自明雖使太白復生亦應為之擊節七言律楊栁昏黃晚西月梨花明白夜東風秋千庭院人初下春半園林酒正中五言如乙鳥歸來社辛夷開過春如身黃松上鼠頭白竹間禽七言如桃葉歌殘秣陵酒梨花夢斷景陽鐘五言如採藥逢毛女焚香對羽人如客愁三月盡春夢五更初七言如縮地日携龍作杖卧雲時約鳯吹笙五言若蜀魄花成血山魈樹隱身竹枝歌峽夜椰子醉蠻春如空悲祖龍死但覺鮑魚腥如織女支機穩山人作枕便異或稱羊化疑應訝虎眠不須填碧海直欲補青天如勒銘留水寺應供宿江城夏減遊方興秋添住嶽情標致極似盛唐諸人而對偶之工興寄之永飄飄然自拔於王金陵含風鴨緑粼粼起弄日鵝黃裊裊垂北風吹樹徑西日照窗涼之頂𩕳病齒圗宋子虛題玉環病齒圗云一點春寒入瓠犀海棠花下獨顰眉內厨幾日無宣喚不問君王索荔枝吳旦生曰風刺隱約正以婉勝如馮海粟題云華清宫一齒痛馬嵬坡一身痛漁陽鼙鼓動地來天下痛則又以快勝矣余後觀薩天錫題云一點春酸入瓠犀雪色鮫綃濕香唾又云君不聞華清宫一齒作楚藏禍根又不聞馬嵬坡一身濺血未足多漁陽一日鼙鼓動始覺開元天下痛似合子虛海粟之語櫽括成文然其較本色加劣矣子虛又題玉環聨轡圗云赭袍紅映鏤金衣笑並花驄酒力微試問六龍西幸日有人曽侍翠華歸因考陳伯敷題楊妃上馬嬌圗云此索清平調詞赴沈香亭時耶抑聞漁陽鼙鼓聲赴馬嵬坡時耶上馬固相似情狀大不同觀者當審諸岑靜能題太真春睡圗有云漁陽鼙鼓邉塵動臺閣無言卿士懵婦人一睡四海昏主暗臣諛總如夢濟之宋子虛詩域開仁壽民能濟未濟還驅夭橫鄉吳旦生曰禮樂志王吉曰延及儒生述舊禮明王制驅一世之民濟之仁壽之域王吉本傳亦作濟今俗作躋顔氏注域界也若是躋字合注登陟之義域平履之區非有崇髙之意何故以登陟為文舒子史纂言曰未濟則民在夭橫之鄉既濟則民履仁壽之域濟字之義為長而世俗作躋莫知其故鴛瓦雅正卿咏洛神云鄴宫簷瓦似鴛飄蘭渚鳴鑾去國遙吳旦生曰鄴中記鄴城銅雀臺皆鴛鴦瓦又魏志文帝問周宣云吾夢殿屋兩瓦墮地化為鴛鴦何也宣曰後宫當有暴死者帝曰吾詐卿耳宣曰夫夢者意耳茍以形言便占吉凶言未卒黃門令奏宫人相殺杜子美詩殿瓦鴛鴦坼楊亷夫詩飄風吹落鴛鴦瓦皆用此意清容袁伯長芳思亭詩以兹一畝園髣像見疇昔幽葩與羣卉生意日不息朝陽潄靈根三咽妙紬繹曠懷事幽賞誓矣躬六籍吳旦生曰芳思亭者為其先尚書公治圃南郊有堂亭十五荒廢不可考築一亭髣其萬一故稱芳思又謝俞光逺為治别墅詩種竹澆花俟我還花成雲塢竹成山蓋其選勝結茆性耽恬適有足述者君諱桷字伯長清容其號所著詩為清容集本四明人讀書吳興有清容書院後人題云人同緑水長為主座有青山不計年至今葺其址新之署曰清容蘆花被貫酸齋賦蘆花被詩採得蘆花不涴塵翠蓑聊復籍為禋西風刮夢秋無際夜月生香雪滿身毛骨已隨天地老聲名不讓古今貧青綾莫為鴛鴦妬欸乃聲中别有春吳旦生曰酸齋過梁山濼有漁翁織蘆花為被欲易之以紬者翁郤紬曰君尚吾清願以詩輸之故為賦此竟持被去酸齋至錢唐因自號蘆花道人丘彥能家藏蘆花被圗一幅貢泰甫吳子立吳敬夫題其上自此以為佳事往往入咏成原常詩薺菜登盤甘似蜜蘆花紉被暖如綿洪武中孫彥舉詩竹葉杯中閲四時蘆花被底舒雙腳曹石倉云咏物詩如鶴骨笛賈䇿詩九臯聲斷楚天秋玉頂丹砂一夕休枯朽挽曰生死調姿涼吹盡古今愁魂歸遼海雲迷樹曲罷江城月滿樓惆悵主人三弄罷杳無消息到揚州走馬燈謝宗可詩飈輪擁轉駕炎精飛繞人間不夜城風鬣追星低弄影霜蹄逐電去無聲秦軍夜潰咸陽火吳炬宵馳赤壁兵更憶雕鞍年少客章臺踏碎月華明蘆花被之類極其工巧以求速肖而風人比興之義鮮矣然石倉終愛其詩有和蘆花被云輕如阿縞軟於綿疊上匡牀野性便一幅瀟湘全勝畫五更風雨不成眠回文豈藉秦娘織席地將同子敬氊白露蒹葭堪作伴伊人猶在夢江邉道衣薩天錫詩洞門花落無人迹獨坐蒼苔補道衣吳旦生曰輟耕録載王守素民家女其夫丁棄家為道士於吳山紫陽菴一日召守素入山書付四句云懶散六十三妙用無人識順逆兩俱忘虛空鎮常寂坐抱一膝而逝守素亦束髮簪冠著道士服奉夫遺尸二十年迹不下山年逾七十幾於得道者薩天錫贈之詩看雨間中今古録曰薩天錫有一詩送濬天淵入朝地濕厭聞天竺雨月明來聽景陽鐘聞者無不膾炙惟山東有一叟鄙之公以素愜意特步訪問其故叟曰此聨措辭固善但聞字與聽字一合耳公曰當以何字易之叟徐曰看天竺雨公詰其看字叟曰唐人有林下老僧來看雨公俯首拜為一字師吳旦生曰郎士元送錢大起句云暮蟬不可聽落葉豈堪聞間氣集謂謝朓工於發端比之於今有慚沮矣吳逸一則以兩句一意評之亦正嫌聞字與聽字一合也如姚崇夜渡江詩聽草遙尋岸聞香暗識蓮蓋從夜落想則又聽與聞不妨並用其結句云惟看孤帆影常恐客心懸唐仲言以暗中摸索忽下惟看字覺有礙改惟為怯則通篇渾成余謂怯看不成語此二句即楚王心搖搖如懸風中之旌之意仍是暗中作想凡詩家用看字都不可泥祖詠詩海色晴看雨鐘聲夜聽潮直是天錫二語先鞭不獨林下老僧句也考天錫本集作寄賀天竺長老欣笑隱召住大龍翔集慶寺蓋大欣住杭中天竺文宗召赴闕故云天竺雨景陽鐘也堯山堂外紀又以改看字為虞伯生秋宫詞古今説海曰薩天錫秋宫詞清曉宫車出建章紫衣小隊兩三行石闌干外銀燈過照見芙蓉葉上霜初讀若泛言一時事細玩之則見深宫寂寞望幸不到氣象且造語渾然追蹤盛唐若此者亦不多見吳旦生曰備遺録載天錫宫詞十八絶謂此第十五首也又楊亷夫宫詞小序云宫詞詩家之大香奩也不許村學究語為本朝宫詞者多矣或拘於用典故又或拘於用國語皆損詩體天厯間豫同年薩天錫善為宫詞且索豫和什通和二十章今存十二章然余觀天錫詩集止載春詞秋詞二章秋詞即前所録其春詞云深宫盡日垂珠箔别殿何人度玉箏白面內官無一事隔花時聽打毬聲二詞情事欲絶其餘所云者皆别立他題亦有本集所不載者讐書納延送葛子熙詩髙槐踈雨作新涼猶記讐書白玉堂吳旦生曰劉向别録言讐校書一人持本一人讀對若怨家故曰讐書漢庾乘傳諸生博士皆就讐問北齊書邢子才有書甚多而不甚讐校嘉祐中置編校官八員雜讐四館書馬虛中詩注易麻衣才脫藁讐書光祿罷傳經洪希文詩一春正坐讐書忙海録碎事云司馬遷為太史令紬書史記石室金匱之書注紬謂綴集之音胄劉蕡祠納延作劉蕡祠詩云鞠躬荒祠下低回想遺直劉君素忠憤伏闕論邦國痛陳腹心禍竟罹考功斥餘子盡騫騰鬱鬱負慚色鄉人仰髙誼千載崇廟食題下自注云唐劉蕡幽州昌平人謫死栁州歷遼金無能發潛德至本朝天厯間昌平驛官宫祺始奏建劉諌議書院吳旦生曰帝京景物略云昌平劉蕡唐文宗時憤宦官恃功專權應制對䇿極言禍福第䇿官左散騎長侍馮宿等讀蕡䇿嗟服而畏忌不敢取時參軍李邰登第乃上書自劾乞回所授以旌蕡直後七年甘露難作令狐楚牛僧孺皆表蕡幕府師禮禮之而宦官深嫉蕡誣以罪貶栁州司户參軍卒後昭宗感羅衮言贈諌議大夫諡文節封昌平侯元泰定間建祠州西南五里曰諌議書院至正間又建祠舊州東參政許有壬撰碑明𢎞治間談本彛移建學宫內今圮焉唐時李商隱贈云漢廷急詔誰先入楚路髙歌自欲翻萬里相逢歡復泣鳯巢西隔九重門及蕡卒復哭之曰已為秦逐客復作楚寃魂併將添恨淚一灑問乾坤後之謁劉祠作詩者李東陽詩香火制存身後廟䇿時書在閣塵封程敏政詩氣節可興天下士蒸嘗無愧社中師王鏊詩氣帶幽并多感慨䇿如鼂董亦迂疏同時下第誰云屈此外求言總是虛周用詩千古直臣唐諌議一篇正學魯春秋劉龍詩一介布衣天下計滿梁華月古人顔趙貞吉詩一䇿乾坤正氣收當時朋輩至今羞沙連塞草寒三畝葉和村煙覆一邱陳仁錫詩布衣修諌草愧已在三公何直登科日能生䇿士風胡江詩士賤豈經時宰慮主憂惟望侍臣知粧臺納延賦粧臺詩誰憐舊時月曽向日邉明吳旦生曰易之與危太朴等遊南城各賦十六首以紀遺迹粧臺其一也按梳粧臺在都城東北隅李妃所築今訛為蕭太后梳粧樓妃嘗與金章宗露坐上曰二人土上坐妃應聲曰一月日邉明上大悅貢泰甫云易之果囉羅氏也在西北金山之西與回紇壤相接俗相類其人便捷善射又能相時居貨媒取富貴易之世出其族而心之所好獨異焉宜乎見於詩者亦卓乎有以異於人也觱篥納延挽諤勒哲圖都元帥四首有云觱篥按歌吹落月髑髏盛酒醉西風吳旦生曰觱篥羌人吹角也以笳為首以竹為管其部在管音前故名頭管唐編鹵簿名為笳管樂書又名風管所法者角音故曰角即今畫角白樂天觱篥詩剪削乾蘆插寒竹九孔漏聲五音足差備其制諺云三九二十七籬頭吹觱栗言冬至後寒風吹籬落其聲似觱栗豳風所謂一之日觱發也豳風説文觱作畢朱晦菴云篳篥元名悲栗言其聲悲壯也悲觱畢三聲相沿按帥嘗漆倭人首為飲器送行乃賢送楊梓人守閬州兼寄宣慰家兄詩朱轓五馬出王庭父老西南望福星家世久聞清白吏文章爭誦太玄經岷江水落嘉魚美劍閣春晴榿朩青若過眉州見蘇子卯君京國尚飄零吳旦生曰起語道出守意三四指楊氏五六指蜀地以寄家兄作結自注云東坡稱子由為卯君藝苑雌黃云榿字遍尋字書皆無蜀中多此朩詢之蜀人則相傳以為丘宜切按介甫絶句榿與移字同押則知丘宜切為是也漁隱叢話云榿朩惟蜀中有之散材而美蔭易長而可薪杜子美覔榿朩栽詩飽聞榿朩三年大與致溪邉十畝隂堂成詩榿林礙日吟風葉籠竹和煙滴露梢蘇子瞻送戴蒙詩芋魁徑尺誰能畫榿朩三年已足燒次介甫韻詩斫竹穿花破緑苔小詩端為覔榿栽朩山詩二頃良田不難買三年榿朩行可槱宋子虛野步詩翳日榿隂翠幄遮葑圍髙下奕枰斜馬伯庸題畫詩蜀榿隂十畝閩荔熟千房正德中王守溪送劉規還蜀詩古柏祠前傷草色浣花溪上覔榿栽歷代詩話卷六十五
