  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0056_WYG_043-1a, image: WYG1483/WYG1483-0357a.png}
body:
  text: 厯代詩話卷四十三歸安吳景旭撰已集杜陵譜系上按新唐書宰相世系表杜預四子錫躋耽尹襄陽杜氏出自預少子尹晉𢎞農太守二子綝弼綝生襲襲生標標生沖沖生洪泰二子祖悅顒顒生景仲又公作姑萬年縣君墓志云曾祖某隋河內郡司功參軍獲嘉縣令王父某皇朝監察御史洛州鞏縣令考某修文館學士尚書膳部員外郎又舊唐書文苑杜甫傳云曾祖依藝終鞏令祖審言終膳部員外郎父間終奉天令公自稱預十三葉孫其世次可得而考也因觀舊唐書杜易簡傳易簡襄州襄陽人周硤州刺史叔毗曾孫又周書杜叔毗傳其先京兆杜陵人徙居襄陽祖乾光齊司徒右長史父漸梁邊城太守據此則洪泰與乾光為行顒與漸為行景仲與叔毗為行此尤井井有序者乃舊譜以叔毗為顒子景仲叔毗並系顒下其乖謬不待言即論者以獲嘉為叔毗子易簡審言同出叔毗下亦未為允當也恐人之猶多疑誤故併乾光一派附綴之范宣子曰昔丐之祖自虞以上為陶唐氏在夏為御龍氏在商為豕韋氏陶唐氏既衰其後有劉纍學擾龍于豢龍氏事孔甲賜氏曰御龍以更豕韋之後纍遷魯縣豕韋復國至商而滅纍之後世復承其國為豕韋氏在周為唐杜氏成王滅唐以封弟叔虞改封唐氏子孫於杜城後為宣王所滅杜泄奔魯因為氏公作萬年縣君杜氏墓志云其先系統於伊祁分姓於唐杜蓋謂此也楊升菴言士會之士作土為古杜字如詩言桑土音杜桑皮漢儒欲推漢為陶唐之後增為劉氏若作士上與唐杜下與劉氏何涉余按隰叔奔晉為晉士師為士氏曽孫士會為晉卿食采于范為范氏此宣子所以稱祖也士會適秦復歸晉有子留于秦為劉氏其後秦滅魏徙大梁生請徙沛生仁號豐公生惴字執嘉史記稱太公名執嘉生四子伯仲邦交諱邦為漢髙祖據此則士何煩作土讀而劉何得非唐後耶公寄族弟唐十八使君云與君陶唐後盛族多其人聖賢冠史籍枝派羅源津又送劉十弟判官云分源豕韋派别浦鴈賓秋年事推兄忝人才覺弟優即此二詩併題可證預父恕字務伯太和中散騎黃門侍郎恕父畿字伯侯魏尚書僕射封豐樂侯預襲祖爵豐樂亭侯以功進爵當陽縣侯似不宜祧蓋公于逺祖當陽君有祭公且祧當陽君前耶觀進雕賦表稱先君恕預以降則公非忘當陽君前者畿恕預錫至錫子乂字𢎞治光祿大夫美姿制世説𢎞治膚清各稱五世盛德又預五世孫銓字士衡中書侍郎有長者風諸杜稱為長老雖其支屬多賢不及載叔毗有兄君錫為參軍曹䇿所殺叔毗手創䇿自詣闕太祖赦之蓋叔毗派特附綴不詳舊唐書審言貶吉州司户參軍與州僚不叶司馬周季重與員外司户郭若訥共搆審言罪狀繫獄將因事殺之既而季重等府中酣宴審言子并年十三懷創以擊之季重中傷死而并亦為左右所殺按公萬年縣君墓志云兄升國史有傳又盧太君墓志云次曰升幼卒報復父仇國史有傳此志代父作公所稱兩作升字應從升舊史作并字恐誤祖母薛氏生三子間升専三女適巨鹿魏上瑜河東裴榮期范陽盧正均繼祖母盧氏生一子登二女適京兆王佑會稽賀撝母崔氏公祭外祖祖母文云紀國則夫人之門又云名播于燕公之筆按舊書紀王慎太宗第十子越王貞敗慎亦下獄改姓虺氏慎子義陽王琮等並遇害中興初追復官爵張燕公義陽王碑曰初永昌之難王下河南獄妃録司農寺惟有崔氏女犀屨布衣往來供饋中外咨嗟目為勤孝據此則公之外祖母紀王之孫義陽之女也母為崔氏甚明公于白水依崔十九舅于彬州欲依崔二十三舅尤為可據年譜謂先生之母微故歿而不書非也范陽太君志稱家婦盧氏乃傳寫之誤或載之世系曰母盧氏生母崔氏又非夫人楊氏元稹墓志云𢎞農楊氏女父曰司農少卿怡四十九年而終宗文小字熊兒宗武小字驥子按潤州刺史樊晃于公殁後采其遺文為小集序曰君有宗文宗武近知所在漂寓江陵黃鶴年譜載大厯四年夏宗文夭則是先公而喪誤矣公於宗武生日詩云詩是吾家事人傳世上情熟精文選理休覓綵衣輕又示宗武詩云覓句新知律攤書解滿床試吟青玉案莫羡紫羅囊公之屬意如此惜其詩亡傳蘇東坡送戴蒙赴成都詩拾遺被酒行歌處野橋官栁西郊路聞道華陽版籍中至今尚有城南杜楊仲𢎞序秋興詩格云甫于門人傳其法豫逰西蜀問九世孫杜舉而言之曹能始蜀中詩話云費著氏族譜稱少陵之後者係宗武所傳眉州志杜莘老青神人甫十三世孫蓋公衍緒於蜀有如此族父鴻漸劍南節度使從弟位考功郎中湖州刺使亞陜西觀察使侄佐大理正從侄勤年十六七射䇿落第從孫濟東川節度使兼京兆尹崇簡益州司馬參軍皆見於詩中者世系表崇簡佐出襄陽房至以濟與位同出景秀下並征南十四代孫則公稱位從弟稱濟從孫何謂宋孫洙作傳云牧之為甫族孫同出於預余按張禮逰城南記云東次杜曲前瞻杜固又雍録云杜固謂之南杜杜曲謂之北杜唐史中書侍郎杜正倫與城南諸杜通譜不許銜之建言鑿杜固世傳杜固有王氣故纍代衣冠既鑿血流十日蓋牧父從郁從郁父佑宰相封祁國公芙蓉園西有祁公家廟瓜洲村有祁公别業是南杜也公進封西嶽賦表云臣本杜陵諸生古杜伯國秦為杜縣漢宣帝修杜之東原為陵更名曰杜陵縣詩每稱少陵野老漢許后葬杜陵南園謂之小陵皆作少陵雍録云杜曲在啓夏門外西向即少陵原則公當是北杜杜氏之先在杜陵當陽之玄孫某隨宋武帝南遷遂為襄陽人後依藝為鞏令又徙居河南鞏縣故公之田園在鞏洛其族望本出杜陵歷代詩話卷四十三
