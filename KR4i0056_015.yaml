body:
  text: 歴代詩話巻十五歸安吴景旭撰丙集上之下賦宓妃曹植洛神賦臣聞河洛之神名曰宓妃吴旦生曰屈子天問妻彼雒嬪蓋言羿夢與洛神宓女交也子建改賦而名洛神倘亦有托於此乎宓妃一作虙妃離騷求虙妃之所在注云虙妃伏羲氏女溺洛水而死遂為水神一作宓妃劉向九歎云迎宓妃於伊雒按説文虙房六反虎行貌宓美畢反安也集韻虙與伏同虙犧氏蓋姓也宓與密同亦姓也俗作密非是顔子推云宓字本从虍虙子賤即伏犧之後濟南伏生又子賤之後則知虙伏古通用俗書作宓或加山而轉為密者耳祓除劉楨魯都賦素秋二七天漢指隅人胥祓除國子水嬉吴旦生曰野客叢書云觀漢書八月祓於灞上劉楨賦又用七月十四日因知漢人祓除亦有在秋間者不必春暮自漢以前上已不必三月三日必取已日自魏以後但用三月三日不必已也然余觀漢禮儀志三月上已士流祓禊飲酒於東流則是漢仍於三月用已日但不拘三日魏定於三日不拘用已爾後見楊升菴云禊有春禊秋禊王右軍蘭亭脩禊此春禊也馬融西第頌云西北戍亥𤣥石承輸蝦蟇吐瀉庚辛之域劉楨魯都賦素秋二七天漢指隅人胥祓禳原本作祓除升菴改為祓禳想以除與隅韻脚有妨也然古韻正不拘此齊都賦青陽季月上除之良無小無大祓於水陽蓋取除不祥之義謂上已為上除也依原本作祓除為是國子水嬉此七月十四日指秋禊也登樓王粲登樓賦挾清漳之通浦兮倚曲沮之長洲背墳衍之廣陸兮臨臯隰之沃流北彌陶牧西接昭丘蕐實蔽野黍稷盈疇吴旦生曰王仲宣避難荆州依劉表作登樓賦後人因稱為仲宣樓五臣注謂登江陵城樓而有此作王弇州仲宣樓記云江陵有仲宣樓後襄陽有樓亦曰仲宣而周紹稷脩楚乗斷以屬之襄陽其㫖以劉表始至宜城討平諸賊北據漢川以臨中土幾十五年而其子琮始降曹氏蓋終始不離襄陽而江陵特其支郡仲宣之依表為幕下叅佐不應去襄陽而登江陵之郡樓也盛𢎞之荆州記則直以為當陽其所稱陶牧昭丘云江陵西有陶朱公冢又當陽東南七十里有楚昭王墓登樓則見之按張華志稱范蠡葬南郡之華容又云濟州平隂東陶公山山有陶朱公塜則所謂陶牧者未必確而楚昭王避吴去郢北徙鄀為襄州之樂鄉其所謂昭丘者亦未必不在襄之近境也賦云曲沮注引地理志漢水房陵東山沮水所出今房陵實為襄壤邑而沮水至郢入江故不走江陵道然酈道元謂沮水南逕麥城西又南逕楚昭王墓東封麥城而據此賦語為證則仲宣之所登者一而後人之所擬者三其在襄陽去賦事辭稍逺而於理為近也𤣥的王粲神女賦施𤣥的兮結羽釵吴旦生曰的子藥切藝文類聚作華的按釋名以丹注面曰的的灼也此本天子諸侯有羣妾者以次奉御有月事者止而不御重以口説故注此於面灼然而識也張景陽扇賦皎質皦鮮𤣥的㸃絳潘岳芙蓉賦丹輝拂紅飛須垂的傅𤣥鏡賦㸃䨇的以發姿繁欽弭愁賦㸃圜的之熒熒黄帝内經云女子二七而天癸至月事以時下史記云濟北王侍者韓女病月事不下又五王世家程姬有所避不願進粧樓記云紅潮謂桃花癸水也又名入月王建詩宻奏君王知入月堯山堂外紀云陶榖奉使江南日韓熙載遣家伎奉盥匜及旦以書謝曰巫山之麗質初臨霞侵鳥道洛浦之妖姿自至月滿鴻溝舉朝不能㑹其辭熙載召家妓訊之云是夜忽當浣濯羣碎録云絆孌婦人有汗也絆變月事也漢律云見姅變不得侍祠田子藝云㓜女未通老媪當絶故其字從半女陽馬白間何晏景福殿賦承以陽馬接以圓方又云皎皎白間離離列錢吴旦生曰吕向注陽馬屋四角引出以承短椽者相連接或圓或方也此言誠是馬融西第頌騰極受檐陽馬承限卞蘭許昌宫賦覩陽馬之承阿亦謂此張銑注白間忩也以白塗之畫以錢文猶綺䟽青𤨏之類此言有二失焉按白間即今菱花忩􅀢音格則其亮􅀢處自生虚白非以白塗其上也杜子美詩白間剥畫蟲漫叟詩話嘗以白間對黄裏蔡邕獨斷云黄屋者蓋以黄為裏也雪浪齋日記云退之燈花詩所用黄裏事見前漢黄屋注中又按列錢金釭音工俗讀之音江非也雋言云趙后傳壁帯往往為黄金釭服䖍注釭壁中之横帯也晉灼注以金環飾之也師古注璧帯璧之横朩露出如帯者也於璧帯之中以金為釭若車釭之形也據此則列錢乃與白間對舉言之者豈謂白塗之為錢文哉如班孟堅西都賦金釭銜璧是謂列錢此其義益明吕延濟注金釭燈盞也鈿璧於中故言銜行列於室有似列錢盖悮認金釭為燈又譌壁字作璧附㑹舛錯此等注有悮後人不淺矣歴代詩話巻十五
