body:
  text: 歷代詩話卷三十一歸安吳景旭撰戊集中之下漢魏六朝泉明詩話類編曰靖節先生以義熙元年秋為彭澤令冬遂解綬去後十六年晉禪宋又七年卒晉史謂名潜字元亮南史謂名潜字淵明今按先生義熙中作孟傳及祭程氏妹文俱稱淵明元嘉中對檀道濟乃稱云潜是與年譜所載在晉名淵明在宋改名潜其字元亮則未嘗易者為相合矣所作詩曰撫已有深懷履運增慨然是可以想見也吳旦生曰隋志作陶潜集唐志作陶泉明集海録碎事云齷齪東籬下泉明不足羣淵明一字泉明野客叢書謂非一字泉明也不知稱淵明為泉明者蓋避唐髙祖諱耳猶楊淵之稱楊泉也顔氏家訓云髙祖諱淵淵字盡改為泉字龍淵為龍泉晉書劉淵為元海戴淵為戴若思北齊趙文淵為趙文深余觀耿湋詩何事學泉明李白詩酣歌一夜送泉明韓翃詩聞道泉明居止近籃輿相訪㑹淹留皆為此也宋玊釣賦宋玊與登徒子偕受釣於𤣥淵王伯厚云唐人改淵為泉古文苑又誤為洲屈子天問洪泉極深何以置之朱晦翁云泉當作淵唐本避諱而改之按南史陶潜或云字深明榮朩陶詩采采榮朩結根於兹吳旦生曰爾雅榮桐朩埤雅云桐朩華而不實故曰榮桐朩也今亦謂之華桐說文桐榮也長箋云桐榮互訓後人溷榮作􅀢華之􅀢而本訓晦矣方書桐有多種故從同青桐白桐梧桐又有束桐華名而滇南之桐又非前諸類實大而㯐其仁幾與松子相奪余按青桐即梧桐也槖卾皆五今人以其皮青號曰青桐賈思協云實而皮青者曰梧桐華而不實者曰白桐蓋白桐無子材中琴瑟命子命子詩於穆仁考淡焉虛止吳旦生曰長沙公侃懋功晉室乃其曽祖按侃女適孟嘉嘉之第四女適潜之父是生潜其父亦有隱操故詩云爾惜軼名命子又云天集有漢眷於愍侯按漢功臣表開封愍侯舍以左司馬從漢破代封侯昔髙祖功臣百有二十人舍其一也又云亹亹丞相允迪前從按功臣表開封愍侯舍封十一年薨十二年夷侯青嗣四十八年薨自青後未有顯者故詩又云時有語默運同隆窊也狗吠雞鳴冷齊夜話曰東坡嘗言淵明詩初視若散緩熟視有竒趣如曰曖曖逺人村依依墟里烟狗吠深巷中雞鳴桑樹巔大率才髙意逺則所寓得其妙遂能如此如大匠運斤無斧鑿痕不知者疲精力至死不悟吳旦生曰捫虱新語稱淵明犬吠深巷中雞鳴桑樹巔當與豳風七月相表裏按樂府古辭已云雞鳴髙樹巔狗吠深宫中陸士衡詩虎嘯深谷底雞鳴髙樹巔皇甫百泉云犬吠不如雞鳴詩云無使厖也吠後之作者如犬吠松間月又犬吠水聲中仙家犬吠白雲間犬吠奚足寄興而松月水雲遂成雅致此詩人善於形容也五日老學庵筆記曰淵明遊斜川詩自叙辛丑嵗年五十蘇叔黨宣和辛丑亦年五十蓋與淵明同甲子也是嵗得園於許昌西湖上故名之曰小斜川吳旦生曰逰斜川詩開嵗倐五日今行本作五十蓋叔黨為行本所誤而不深考放翁又從而記之益誤矣然觀放翁正月五日出逰詩云未為遼海千年别且繼斜川五日逰則又不誤者考作詩時行年八十蓋老而更核耶懶真子云按淵明乙丑生至乙巳嵗賦歸去來是時四十一矣今遊斜川詩或云辛丑嵗則方三十七或云辛酉嵗則已五十七而詩云開嵗倐五十皆非也若云開嵗倐五日則正叙所謂正月五日言開嵗倐忽五日耳近得廬山東林舊本作五日宜以為正卲康節手寫靖節詩直作五日余考遊斜川記首云辛丑正月五日天氣澄和風物閒美又王質作年譜云隆安五年辛丑年三十七正月有遊斜川詩據此則五日是馬隊示周續之祖企謝景夷云馬隊非講肆校書亦已勤吳旦生曰漁隱叢話引靖節本傳云江州刺史檀韶苦請廬山周續之出州與學士祖企謝景夷三人在城北講禮加以讐校所住公廨近於馬隊云耳輟耕録載王質所著栗里譜云君年五十六同隱周續之召至都為顔延之連挫義熙間檀韶為江州邀續之在城北講禮讐書故示以詩余按靖節續之與劉遺民號潯陽三隱觀所示詩大都皆招隱之辭知其契分深矣末引箕潁之事未嘗有意譏其通隱也失妾怨詩楚調云弱冠逢世阻始室喪其偏吳旦生曰靖節年二十失妾此詩所由作也然所謂夫耕於前妻耘於後乃翟氏妾當是翟湯家湯莊矯法賜四世以隱行知名靖節生於潯陽柴桑而翟亦家柴桑梁昭明作靖節傳云其妻翟氏亦能安勤苦與其同志少長與殷晉安别云遊好非久長一遇盡殷勤吳旦生曰舊本作遊好非少長一遇定殷勤蓋其意云吾與子非少時長時逰從也但今一相遇故定交耳此語最妙今本改少作久改定作盡則長字作平音便無意味柴桑令紹陶録曰劉遺民亦同隱有和劉柴桑詩云挈杖還西廬有酬劉柴桑云嘉穗眷南疇自西廬移南村有移居詩云聞多素心人樂與數朝夕遷居殆為遺民之徒尋還西廬度相距亦不逺與遺民更相酬酢不改賞文析義之時或恐劉柴桑似縣令劉或嘗為此縣存此呼或有命不為皆不可知吳旦生曰白樂天詩心知不及柴桑令一宿西林即便回注柴桑令指劉遺民也碧湖雜記云劉名程之字仲思遺民其號也曽作柴桑令侯鯖録云近見士子多使柴桑翁為陶淵明不知劉遺民曽作柴桑令也據此則遺民實宰此縣無疑按柴桑山在九江郡城西南九十里寰宇記云柴桑近栗里陶潜此中人皛皛夜行塗中詩昭昭天宇濶皛皛川上平吳旦生曰翰注謂月光照水上平净貌善注通白曰皛說文皛顯也從三白讀若皎烏皎切長箋云杜甫詩皛皛行雲浮日光全句可訓皛字矣洪武初髙季迪詩日光皛皛濃熏草又出於杜榮公詩眼曰貧士詩云九十行帶索飢寒况當年近一名士作詩云九十行帶索榮公老無依豫謂之曰榮啓期事近出列子不言榮公可知九十則老可知行帶索則無依可知五字皆贅也若淵明意謂至於九十猶不免行而帶索則自少壯至於長老其飢寒艱苦若常如此窮士之所以可深悲也古人文章必不虛設耳吳旦生曰列子載孔子遊於泰山見榮啓期行乎郕之野鹿裘帶索鼓琴而歌孔子問曰先生所以樂何也對曰吾樂甚多天生萬物唯人為貴而吾得為人是一樂也男女之别男尊女卑故以男為貴吾既得為男矣是二樂也人生有不見日月不免襁褓者吾既已行年九十矣是三樂也貧者士之常也死者人之終也處常得終當何憂哉孔子曰善乎能自寬者也此章誨人以貧冨死生之理故如此寓言能自寬者能推物理以自寬也杜詩江上小堂巢翡翠苑邉髙塜卧麒麟細推物理須行樂何用浮名絆此身便是此章之意余喜范元實之論陶可謂善於言詩但深悲二字恐失榮公本意特録列子以著其深樂非深悲也列子林注云以鹿皮為裘以索為帶文選劉履補注謂裘敝而以繩索連結也又淮南子榮啓期衣若懸蓑知道韻語陽秋曰東坡拈出淵明談理之詩有曰採菊東籬下悠然見南山二曰笑傲東軒下聊復得此生三曰客養千金軀臨化消其寶皆以為知道之言蓋絺章繪句嘲風弄月雖工何補若觀道者出語自然超詣非常人能蹈其軌轍也吳旦生曰按坡語云採菊東籬下悠然見南山採菊之次偶然見山初不用意而境與意㑹故可喜也作望南山便覺神氣索然又云笑傲東軒下聊復得此生靖節以無事自適為得此生則見役於物者非失此生耶又云客飬千金軀臨化消其寶寶不過軀軀化則寶亡矣人言靖節不知道吾不信也余服膺斯語大書屏右以為非淵明不能為知道語非東坡不能知知道語涪翁所云彭澤千載子瞻百世蓋不虛也後見南濠詩話謂其妙語亦不止是如云縱浪大化中不喜亦不懼應盡便須盡無復獨多慮如云望雲慚髙鳥臨水愧逰魚真想初在襟誰謂形迹拘如云朝與仁義生夕死復何求如云及時當勉勵嵗月不待人如云前途當幾許未知止泊處古人惜分隂念此使人懼觀是𢾗詩淵明真有得於道者深雪偶談云范石湖絶句中有可憐世上金和寶借爾閒看七十年可謂砭流俗之膏盲矣以軀為寶殆與斯言對壘人謂石湖未知道亦不之信也田子春擬古云聞有田子春節義為士雄吳旦生曰舊注田疇字子春北平無終人時董卓遷漢帝於長安幽州牧劉虞遣疇奔問行在得報還虞已為公孫瓉所滅疇謁虞墓哭而去遂入徐無山中然觀漢書劉澤傳云髙后時齊人田生遊乏資以書干澤澤大悅之用金二百斤為田生壽田生如長安幸謁者張卿諷髙后立澤為琅琊王晉灼曰楚漢春秋田生字子春黃子廉咏貧士云昔在黃子亷彈冠佐名州一朝辭吏歸清貧略難儔吳旦生曰風俗通潁川黃子亷每飲馬輒投錢於水故淵明以清貧許之按吳志黃蓋乃南陽太守黃子亷之後山海經讀山海經詩形夭無千嵗猛志固常在曽紘曰山海經有云刑天獸名口銜干戚而舞乃知此句是刑天舞干戚故與猛志相應二老堂詩話曰此題十三篇大概篇指一事此篇專說精衛銜朩填海無千嵗壽而猛志常在化去不悔周益公跋卲康節手寫靖節詩曰當專咏精衛不應旁及他物今觀康節只從舊本則曽紘言未可慿矣吳旦生曰按山海經竒肱之國刑天與帝至此爭神帝斷其首葬之常羊之山乃以乳為目以臍為口操干戚以舞又考酉陽雜爼云天山有神名刑天黃帝時與帝爭神帝斷其首乃曰吾以乳為目臍為口操干戚而舞不止此與山海經所載同則五字特㸃畫之訛耳其餘十三首中紕繆類多如此獨姚令威箋釋為確悉録於後西溪叢語曰第一篇泛覽周王傳乃周穆天子傳荀朂校定本是也流觀山海圖乃山海經十八卷郭璞注本是也第二篇云玊堂凌霞秀王母怡妙顔天地共俱生不知幾何年靈化無窮巳館宇非一山髙酣發新謡寧效俗中言西山經云西玊山是王母所居其狀如人豹尾虎齒而善嘯蓬頭戴勝是司天之屬主五殘大荒南經云西海之南流沙之濱赤水之後黑水之前有大山名曰崑崙之丘有人戴勝虎齒有尾火處名曰西王母又云大荒之中有山名豐沮玉門西有王母之山又云以崑崙為宫亦有離宫别窟郭璞云不専住一山也穆天子傳云吉日甲子天子賔於西王母執𤣥圭白璧以見西王母於瑶池之上又天子升於奄山即西王母之山也弇山即弇磁山也第三篇云迢遞槐江䫈是謂𤣥圃丘西南望崑墟光氣難與儔亭亭眀玕照落落清瑤流恨不及周穆託乘一來逰槐江之山丘時之水出焉其陽多丹粟其隂多采黃金銀惟帝之平圃郭璞注云即縣圃也南望崑崙其光熊熊其氣魂魂其上多藏琅玕爰有淫水其清洛洛淫音遙穆天子傳天子銘跡于𤣥圃之上第四篇云丹朩生何許乃在峚山陽黃花復朱實食之壽命長白玊凝素液瑾瑜發竒光豈伊君子寶見重我軒皇西山經云西北四百二十里曰峚音密山其上多丹朩圓葉而赤莖黃花而赤實其味如飴食之不飢丹水出焉西流注於稷澤其中多白玉是有玉膏其源沸沸湯湯黃帝是食是饗是生𤣥玊玊膏所出以灌丹水五色乃清第五篇云翩翩三青鳥毛色竒可憐朝為王母使暮歸三危山我欲因此鳥且向王母言在世無所須惟酒與長年三危之山三青鳥居是山廣圓百里青鳥主為西王母取食竹書云穆王西征至青鳥所解又拒巫之山一曰龜山西王母梯航而戴勝杖其南有三青鳥為西王母取食又言三足鳥主給使也第六篇云逍遙蕪臯上杳然望扶朩洪柯百萬尋森散覆暘谷靈人侍丹池朝朝為日浴神景一登天何幽不見燭黑齒國人黑手食稻使蛇其一蛇赤下有暘谷上有扶朩即扶桑朩十日所浴在黑齒北居水中有大水九日居下枝一日居上枝第七篇云粲粲三珠樹寄生赤水隂亭亭凌風桂八幹共成林靈鳳撫雲舞神鸞調玊音雖非世上寶爰得王母心歡未國在赤水之隂有三珠樹如柏葉皆為珠其樹若彗海內南經桂林八樹在賁隅東八樹而成林言其大也丹穴之山有鳥焉其狀如鶴五采而文乃鳳也自歌自舞女牀之山有鳥其狀如翟而五采文名曰鸞自歌見則天下康寧第八篇云自古皆有沒何人得靈長不死復不老萬嵗如平常赤泉給我飲員丘足我糧方與三辰遊夀考豈渠央列子云北海之北其國名曰終北四方悉平周以喬陟當國之中有山山名壺領狀若甔甀頂有口狀若圓環名曰滋穴有水湧出名曰神瀵臭過椒蘭味過醪醴一源分為四埒注於山下經營一國亡不悉遍土氣和亡扎厲不夭不病人倦則飲神瀵周穆王北遊過其國三年忘歸今赤泉山海經無之知古文缺失也第九篇云夸父誕宏志乃與日競走俱至虞淵下似若無勝負神力既殊妙傾河焉足有餘跡寄鄧林功竟在身後海外北經云夸父與日逐走渴欲飲於河渭不足飲大澤未至道渴而死棄其杖化為鄧林又云夸父不量力欲追日景逮之暘谷郭璞云隅淵也今作虞淵第十篇云精衛銜微石將以填滄海刑天舞干戚猛志故常在同物既無慮化去不復悔徒設在昔心良辰詎可待發鴆之山有鳥焉其狀如鳥而文首白喙名曰精衛其鳴自詨是炎帝之少女名曰女娃遊於東海溺而不反故為精衛常銜西山之朩石以堙東海竒肱之國刑天與帝爭神帝斷其首葬之常羊之山乃以乳為目以臍為口操干戚以舞第十一篇云巨猾肆威暴欽䲹違帝㫖窫窳強能變祖江遂獨死明明上天鍳為惡不可履長枯固邑劇鵕鶚豈足恃鍾山神其子曰鼓其狀人面而龍耳是為欽䲹殺葆江於崑崙之陽葆江即祖江也帝乃戮之鍾山之東曰瑤岸䲹音下邳之邳瑤音遙曰巨猾肆威暴者謂欽䲹殺祖江二負臣殺窫窳也猾作危字非是欽䲹化為大鶚亦為鵕鳥鶚音諤鵕音俊或云鵕䴊字非也窫窳者蛇身人面為二負臣所殺開明東有巫夾窫窳之尸皆操不死之藥以拒之窫窳變為龍首居弱水中食人窫窳音扎俞第十二篇云鴟鴸見城邑其國有放士念彼懷王世當時數來止青丘有竒鳥自言獨見爾本為迷者生不以喻君子拒山西臨黃北望諸毗東望長右有鳥焉其狀如鴟而人手其音如痺其名曰鴸其鳴自號見則其國有放士放逐也懷王之世謂屈原也青丘國有竒鳥不詳其狀鴟鴸或為鵃鵝或為鳴鵲皆非也第十三篇云巖巖顯朝市帝者慎用才何以廢共鯀重華為之來仲父獻誠言薑公乃見猜臨沒告飢渴當復何及哉竹書紀年堯欲禪舜共工鯀諫以為不可舜即位殛鯀於羽山流共工於幽州海內經云鯀竊帝之息壤以堙洪水不待帝命帝令祝融殺鯀於羽郊神異經云西北荒有人人面朱佛蛇身人手四足食五榖禽獸頑愚名曰共工東方有人焉人形而身多毛自解水土志加通塞為人自用欲為欲息名曰鯀下云仲父薑公未詳餘冬序録曰按仲父即管仲姜公齊桓公也吕氏春秋云管仲有疾桓公曰仲父何以教寡人對曰願君之逺易牙豎刁常之巫衛公子啓方公曰諾管仲死盡逐之居三年復召而反之公病易牙豎刁常之巫相與作亂塞宫門有一婦人踰垣入至公所公曰我飢欲食我渴欲飲而無所得何故對曰易牙輩作亂塞宫門築髙墻不通人食不可得矣公嘆曰我何面目見仲父乎蒙衣袂而絶乎壽宫靖節易桓曰姜者殆避長沙公諡之嫌耳挽歌漁隱叢話曰淵明擬挽歌辭三章秦太虛效之豫謂淵明之辭了達太虛之辭哀怨有不同耳吳旦生曰祁寬謂挽歌出於屬纊之際古聖賢惟孔子曽子能之見於曵杖之歌易簀之言趙泉山謂挽辭云嚴霜九月中送我出逺郊與自祭文律中無射之月相符知為將逝之夕作余觀挽辭云魂氣散何之枯形寄空朩可見此形之非我也故神釋形影詩人為三才中豈不以我故蓋寶其神為我有則天地可並此豈枯形之為我哉東坡和陶影答形云君如烟上火火盡君乃别我如鏡中像鏡去我不滅影因形而有無是生滅相所謂一切有為法如夢幻泡影也困學紀聞云左傳有虞殯莊子有紼謳挽歌非始於田橫之客歷代詩話卷三十一
