body:
  text: 歷代詩話卷五十二歸安吳景旭撰庚集下之上唐詩行馬韻語陽秋曰李商隱九日詩曽共山翁把酒時霜天白菊繞階墀十年泉下無消息九日尊前有所思不學漢臣栽苜蓿空教楚客咏江蘺郎君官貴施行馬東閣無因得再窺蓋令狐楚與商隱素厚楚卒子綯位致通顯略不收顧故商隱怨而有作然實商隱自取之也且商隱妻父王茂元與所依鄭亞皆李德裕黨也商隱與二人昵甚故綯以為忘家恩放利偷合者是綯惡其異已也後綯當國商隱亦歸窮自解綯雖與一太學博士然商隱亦厚顔矣吳旦生曰商隱依楚以箋奏受知其子綯踈之九日商隱造其廳事題此詩綯見之慚恨扃鎖此廳終身不處東坡九日詩聞道郎君閉東閣且容老子上南樓又云南屛老宿間相過東閣郎君懶重尋皆用其語也漁隱叢話云綯父名楚商隱又受知於楚詩中有楚客之語題於廳事更不避其家諱何耶名義考云本以禁馬曰行馬者反言之也演繁露云晉魏以後官至貴品其門得施行馬行馬者一朩橫中兩朩互穿以成四角施之於門以為約禁今官府前義讀作乍音子是也墅談云今制不論崇卑衙門前皆施之呼為鹿角義子三餘贅筆云鹿性警羣居則環其角圓圍如陳以防人物之害軍中寨柵埋樹朩外向名鹿角余按周禮掌舍設梐枑音互再重注梐枑謂行馬鄭玄謂行馬再重者以周衛有外內列漢官儀光祿大夫門外特施行馬以旌别之魏文帝拜楊彪光祿大夫令門施行馬晉孝武置檢校御史知行馬外事陳後主時蕭摩訶以功授侍中詔摩訶開閣門施行馬鮑防詩柴門豈斷施行馬蒼鶻李義山嬌兒詩忽復學參軍按聲喚蒼鶻吳旦生曰吳史徐知訓怙威驕淫調謔王無敬長之心嘗登樓狎戲荷衣木簡自號參軍令王髽髻鶉衣為蒼頭以從五代史吳世家云知訓為參軍隆演鶉衣髽髻為蒼鶻知訓嘗使酒罵坐語侵隆演隆演愧恥涕泣而知訓愈辱之輟耕録云唐有傳竒宋有戲曲唱諢詞説金有院本雜劇其實一也元朝院本雜劇始釐而二之院本則五人一曰副淨古謂之參軍一曰副末古謂之蒼鶻鶻能擊禽鳥末可打副淨故云一曰引戲一曰末泥一曰孤裝又謂之五花㸑弄或曰宋徽宗見㸑國人來朝衣裝鞋履巾裹傅粉墨舉動如此使優人效之以為戲然則義山詩蓋指嬌兒之戲弄也薛能吳姬詩此日楊花初似雪女兒絲管弄參軍正同此意古今説海云肅宗宴于宮中女優有弄假官戲其緑衣秉簡者謂之參軍樁此番將阿布思伏誅其妻配掖庭為假官之長所謂樁也然余按樂府雜録戲弄參軍始自漢館陶令石耽有贓犯和帝惜其才免罪每宴令衣白夾衫命優伶戲弄辱之經年乃放後為參軍則是漢時已然非始於唐也如五代王宗侃受維州參軍宋景德中張景斥為房州參軍皆以職名乃俳優所弄以是為恨蓋亦有由矣錦瑟緗素雜記曰山谷讀義山錦瑟詩殊不曉其意後以問東坡東坡云此出古今樂志錦瑟之為器也其絃五十其柱如之其聲也適怨清和按李詩莊生曉夢迷蝴蝶適也望帝春心托杜鵑怨也滄海月明珠有淚清也藍田日暖玉生煙和也吳旦生曰許彥周詩話錦瑟之聲適怨清和昔令狐楚侍人能彈此四曲詩中四句狀此四曲也聞見後録莊生望帝皆瑟中古曲名劉貢父詩話錦瑟是令狐楚家青衣名也審爾則義山真浪子矣東坡分釋四字詩意分明遂為定論王弇州云不解則涉無謂既解則意味都盡余以此詩有不容不解者故元遺山詩望帝春心托杜鵑佳人錦瑟怨華年詩家總愛西崑好獨恨無人作鄭箋蓋謂此也按世本云伏羲造瑟五十絃正史又言絙桑為三十六絃琴瑟中論云朱襄氏使士達製五絃之瑟呂氏春秋云瞽瞍作十五絃之瑟命之曰大章舜益之八絃以為二十三絃漢書泰帝命素女鼓瑟帝悲不止故破五十絃為二十五絃史記漢武帝因公孫卿言召歌兒作二十五絃隋志二十七絃蓋五絃十五絃小瑟也二十五絃中瑟也五十絃大瑟也同話録云秦人鼓瑟兄弟爭之破二十五絃而為二箏之名自此始今之制十三絃而古制亦有十二絃者謂之秦箏世俗有樂器而小用七絃名軋箏三素雲李義山送宮人入道詩九枝燈外朝金殿三素雲中侍玉樓吳旦生曰雲洞真經立春日清早北望有紫緑白雲為三元君三素飛雲乘八輿之輪上詣天帝天子候見再拜自陳某乞願侍輪轂三見元君之輦者白日升天唐試進士以立春日望三素雲為題出此故蘇子容作皇太妃閣春貼子云萬年枝上看春色三素雲中望玉晨許沖元作皇帝閣春貼子云三素雲飛依北極九農星正見南方倪雲林詩敷腴三素雲照耀青蓮臺翻案藝苑雌黃曰文人用故事有直用其事者有反其意而用之者李義山詩可憐半夜虛前席不問蒼生問鬼神雖説賈誼然反其意而用之矣林和靖詩茂陵他日求遺藳猶喜曾無封禪書雖説相如亦反其意而用之吳旦生曰杜少陵詩羞將短髮還吹帽笑倩傍人為正冠蓋孟嘉以落帽為勝而杜反欲正冠也王荆公詩茅簷相對坐終日一鳥不鳴山更幽蓋王文海有云鳥鳴山更幽而王亦反之也然此猶反前事與舊語耳至於自家語有時異用者如韋蘇州詩心同野鶴與塵遠詩似冰壺徹底清又送人詩冰壺見底未為清少年如玉有詩名黃常明云此可為用事之法蓋不拘故常也冰李義山詩碧玉冰寒漿吳旦生曰水凝曰冰作平聲所以寒物曰冰作去聲包佶詩春飛雪粉如毫潤曉潄瓊膏冰齒寒又玳瑁明珠閣琉璃冰酒缸皆作去呼容齋隨筆云唐人謂祠部曰冰廳冰音柄因話録云言其清且冷也歐陽詩獨宿冰廳夢帝闕蝶粉蜂黃李義山詩何處拂胸資蝶粉幾時塗額藉蜂黃吳旦生曰野客叢書引滿江紅詞云蝶粉蜂黃都褪却注蝶粉蜂黃唐人宮粧觀義山詩知詞注為不妄也鶴林玉露載道藏經云蝶交則粉退蜂交則黃退詞云蝶粉蜂黃渾退了正用此也説者以為宮粧且以退為褪誤矣田子藝云蜂之末岐者牝也末鋭者牡也蝶之翅文者牝也翅純者牡也豆蔻張好好年十三杜牧以善歌置樂籍中吟一絶云娉婷嫋娜十三餘豆蔻梢頭二月初春風十里揚州過捲上珠簾總不如劉孟熙引本草云豆蔻花未大開者謂之含胎花言年尚少而娠身也楊升菴謂其所引本草是言少而娠非也牧之本咏娼女言其美而且少未經事人如豆蔻花之未開耳吳旦生曰嵇含南方草朩狀云豈蔻花其苗如蘆其葉似薑其花作穗嫩葉卷之而生花微紅穗頭深色葉漸舒花漸出本草亦云豆蔻花作穗嫩葉卷之而生初如芙蓉穗頭深紅色葉漸展花漸出而色微淡亦有黃白色似山薑花花生葉間南人取其未大開者謂之含胎花言尚小如妊身也然則本草亦狀其花之吐而尚含藴於葉間有如人之娠耳孟熙正引此意非直謂少女之娠也升菴誤會少而娠之語添出求嗣一案可笑又别引十三餘為十三樓更無謂楊亷夫艷詞云從今不帶宜男草豆蔻含胎恐太并總是戲言耳黃山谷廣陵早春用其意作詩云春風十里珠簾捲髣佛三生杜牧之紅藥梢頭初繭栗揚州風物鬢成絲按禮記王祭之牛繭栗漢書天地牲角繭栗顔師古注牛角之形或如繭或如栗言其小山谷借用以言花苞之小末句謂風物如此惜其身之老也則知豈蔻含胎紅藥繭栗同出一意髙續古紅藥詞云紅翻繭栗梢頭遍薑堯章芍藥詞云繭栗梢頭弄張伯雨詩微雨催開繭栗花吳文可詩藥欄繭栗怯春寒猶是用山谷語耳如張思亷詩胡姬年十五芍藥正含葩直脫換牧之山谷間矣二喬許彥周詩話曰杜牧之作赤壁詩折戟沈沙鐵未消自將磨洗認前朝東風不與周郎便銅雀春深鎖二喬意謂赤壁不能縱火即為曹公奪二喬置之銅雀臺上也孫氏霸業繫此一戰社稷存亡生靈塗炭都不問只恐捉了二喬可見措大不識好惡吳旦生曰深雪偶談謂牧之以滑稽弄辭彥周雌黃之豈非與癡人言不應及於夢也禹錫題蜀主廟云凄涼蜀故妓歌舞魏宮前亦是此意惟增悽感却不主於滑稽耳牧之詩如四皓廟云南軍不袒左邊袖四皓安劉是滅劉如烏江亭云勝敗兵家未可期包羞忍恥是男兒江東子弟多才俊卷土重來未可知則東風春深數字較為含蓄深窈矣余以牧之數詩俱用翻案法跌入一層正意益醒謝疊山所謂死中求活也漁隱叢話云牧之題咏好異於人如赤壁四皓皆反説其事至題烏江則好異而叛於理項氏以八千渡江無一還者誰肯復附之其不能卷土重來決矣嗚呼此豈深於詩者哉承露囊懶真子曰杜牧之華萼樓詩千秋佳節名空在承露絲囊世已無漢以金盤承露而唐以絲囊絲囊可以承乎此不可解吳旦生曰述征記八月一日作五明囊盛取百草頭露洗眼令眼明也續齊諧記云𢎞農鄧紹嘗以八月旦入華山採藥見一童子執五綵囊承柏葉上露皆如珠滿囊紹問用此何為答曰赤松先生取以明目言終便失所在荆楚歲時至八月十四日以錦綵為眼明囊遞相餉遺余因考隋唐佳話云源乾曜張説以八月初五日明皇生辰請為千秋節百姓祭皆就此日名為賽白帝羣臣上萬歲壽王公戚里進金鏡綬帶士庶結絲承露囊更相問遺則牧之詩蓋紀實也楊仲𢎞早朝詩絲囊已進千秋録黼座還稱萬壽杯用此唐實録云天寶七載百官蕭照等請改千秋節為天長節從之張説上大衍厯序云謹以開元十六年八月端午赤光照室之夜獻之宋璟請以八月五日為千秋節云月維仲秋日在端午則凡月之五日皆可稱端午西子西溪叢語曰吳越春秋吳亡西子被殺杜牧之詩西子下姑蘇一舸逐鴟夷東坡詞五湖聞道扁舟歸去仍擕西子豫問王性之性之云西子自下姑蘇一舸自逐范蠡遂為兩義不可云范蠡將西子去也嘗疑之别無所據因觀景龍文館記宋之問浣紗篇云越女顔如花越王聞浣紗國微不自寵獻作吳宮娃山藪半潛匿苧蘿更蒙遮一行霸勾踐再笑傾夫差艷色奪常人效顰亦相誇一朝還舊都靚粧尋若耶鳥驚入松蘿魚畏沈荷花始覺冶容妄方悟羣心邪此詩云復還會稽又與前不同當更詳考吳旦生曰楊升菴引墨子云吳起之裂其功也西施之沈其美也又吳越春秋逸篇云吳亡後越浮西施于江令隨鴟夷以終謂子胥死盛以鴟夷今沈西施于江所以報子胥之忠故云隨鴟夷陳晦伯引吳地記云嘉興縣一百里有女兒亭勾踐令蠡獻西施路與潛通三年始達吳遂生子至此亭其子一歲能言因名語兒亭越絶書云西施亡吳國後復歸范蠡因泛五湖而去王弇州謂亭在嘉興縣南一百里為吳地蠡為越成大事豈肯作此無賴事未有奉使進女三年於數百里而不露露而越王不怒蠡吳王不怒越者也胡元瑞謂太史傳蠡三遷皆致千金又云長子偕吾力田起家則非在越服官日所産明甚亡吳之後成名畏禍而載麗冶以適他邦固其計所必出也諸説紛紛自余斷之蠡沈鷙善決䇿必不潛通於未獻之前而或載泛於既亡之後此與三致千金總不可於聲色貨利中位之也何必硬證沈江東坡詩他年一舸鴟夷去應記儂家舊姓西蓋用牧之語也按寰宇記云施其姓也是時有東施家西施家故山谷詩取笑如東施聖俞詩曲眉不想西家樣則是所居在西故稱西施非姓也然既姓西有何新舊恐是舊住西或傳寫之訛以住字作姓字罷亞杜牧之詩罷亞百頃稻西風吹半紅吳旦生曰詞林海錯罷亞稻多貌一作䆉稏又作䆉稏字學集要謂皆稻名蘇軾寄吳德仁詩門前罷亞十頃田清溪繞屋花連天毛滂禱雨詩百里飽看紅䆉稏一杯輕愧黑蜿蜒袁世弼百尺山詩瓊田收䆉稏玉溜注琅玕幸驪山遁齋間覽曰杜牧華清宮詩長安回望繡成堆山頂千門次第開一騎紅塵妃子笑無人知是荔支來據唐紀明皇以十月幸驪山至春即還宮未嘗六月在驪山也然荔支盛暑方熟詞意雖美而失事實吳旦生曰東城老父傳云玄宗元會與清明節率皆在驪山每至是日萬樂具舉六宮畢從則其幸驪山不止十月也長恨傳云天寶十年避暑驪山宫太真外傳云妃子生於蜀嗜荔支南海荔支勝於蜀者每歲馳驛以進然方暑熱而熟經宿則無味後人不能知也又云天寶十四載六月一日上幸華清宮乃貴妃生日於長生殿奏新曲未有名會南海進荔枝因以曲名荔枝香則其幸驪山正在荔枝熟時也遁齋未及考耳如王建華清宮詩二月中旬已進瓜注云唐置溫湯監監丞種瓜蔬隨時供奉瓜夏熟者二月而進瓜蓋譏明皇違時及物求口體竒巧之奉以恱婦人觀此則臨事而嗟先時而諷皆詩人微旨安可以故常論也息夫人珊瑚鉤詩話曰杜牧之息夫人詩細腰宮裏露桃新脈脈無言幾度春至竟希通録云至竟畢竟也後漢樊英傳朝廷若待神明至竟無他異息亡緣底事可憐金谷墜樓人與所謂莫以今朝寵能忘舊日恩看花滿眼淚不共楚王言語意遠矣蓋學有淺深識有髙下故形於言者不同也吳旦生曰楚伐息破之執其君將妻其夫人楚王出逰夫人道出見息君以死自誓遂自殺舊詩云金爐香絶玉樓空寂寞桃花委地紅按地志載漢陽有桃花夫人廟即息夫人也許彥周謂牧之詩為二十八字史論張表臣拈出學識更勝本事詩云寧王宅左有賣餅者妻王一見屬目厚遺其夫取之環歲問汝復憶餅師否默然不對王召餅師使見之其妻注視雙淚垂頰若不勝情時座客十餘人無不悽異王命賦詩王維詩先成有看花滿眼淚不共楚王言之句按左傳楚子以息媯歸未言楚子問之對曰吾一婦人而事二夫其又奚言故國秀集載維詩作息媯怨河嶽英靈集作息夫人怨二十四橋杜牧之詩二十四橋風月夜吳旦生曰揚州之盛唐世艷稱故張祜詩人生只合揚州死禪智山光好墓田徐凝詩天下三分明月夜二分明月在揚州舊稱牧之詩好用數目如二十四橋之類是也按筆談紀二十四橋云最西濁河茶園橋次東大明橋今大明寺前入西水門有九曲橋今建隆寺前次當正當帥牙南門有下馬橋又東作坊橋橋東河轉向南有洗馬橋次南橋見在今州城北門外又南阿師橋周家橋今此處為城北門小市橋今存廣濟橋今存新橋開明橋今存顧家橋通明橋今存太平橋利國橋出南水門有萬歲橋今存青園橋自驛橋北河流東出有參佐橋今開元寺前次東水門今有新橋非古迹也東出有山光橋見在今山光寺前又自衙門下馬橋直南有北三橋中三橋南三橋號九橋不通船不在二十四橋之數皆在今州城西門外侯鯖録云歐公自揚州移汝州作西湖詩曰都將二十四橋月換得西湖十頃秋後東坡自汝移揚作詩曰二十四橋亦何有換此十頃玻璃風用歐公詩也郵亭杜牧之籌筆驛詩郵亭自世換白日事長垂吳旦生曰籌筆驛在利州諸葛孔明籌畫于此故名殷潛之詩圜觚當入畫前箸此操持李義山詩徒令上將揮神筆終見降王走傳車羅隱詩拋擲南陽為主憂北征東討盡良籌説文郵境上行書舍從邑垂垂邊也徐云郵之言過使所過也廣雅郵驛也置亦驛也廣韻馬傳曰置步傳曰郵風俗通云漢改郵為置置者度其遠近之間置之也漢文帝詔餘皆給傳置師古注置者置傳驛之所因名置也田橫至尸鄉廄置臣瓉注謂置馬以傳驛者李陵因騎置以聞師古注騎置謂驛騎也三尸許渾詩夜寒初共守庚申吳旦生曰中山玉匱經云人身並有三尸九蟲常以庚申日夜上告天帝記人罪過絶人生籍欲令速死魂升于蒼天魄入于黃泉惟有蟲尸獨在地上遊走曰鬼或四時八節三牲祭祀不精輒與人作禍害伐人性命上尸名彭倨好寶物中尸名彭質好五味下尸名彭矯好色欲此三尸狀如小兒或似馬形狀皆有鬚髮毛長三四寸人既死遂出作鬼耳如人生時形象衣服長短親人見之謂是亡人還家實非亡人靈也上清無始録云每至庚申日夕不眠以守之令不得訴天帝罪滿五百條其人必死三守庚申三尸振扶七守庚申三尸長絶太玄鑊湯煮而死矣爾乃精神安定五臟恬和不復騷擾柳子厚有罵尸蟲文吳淵穎有三彭傳李頎王母歌云若能鍊魄去三尸後當見我天皇所溫庭筠詩風捲蓬根屯戊巳月移松影守庚申陸放翁詩積雨恐侵春甲子昏燈懶守夜庚申近董思白詩谷名子午真盈一坐守庚申不但三芝田録云朝士夜集終南太乙觀拉醫師同守庚申醫云不守庚申亦不疑此心良與道相依玉皇已自知行止任汝三彭説是非楸説文楸梓屬也箋云松楸墓朩也時至秋多悲傷故從秋謂楸為梓屬可謂即梓不可唐詩松楸遠近千官冡禾黍髙低六代宮吳旦生曰此許渾金陵懷古之頷聯也若如箋云則楸幾與白楊同蕭蕭愁殺矣然觀韻語陽秋云楸花色香俱佳又風韻絶俗而名不編於花譜何哉老杜云要把楸花媚遠天言其色也又曰楸樹馨香倚釣磯言其香也梅聖俞楸花詩云圖出帝宮樹聳向白玉墀髙艷不近俗直許天人窺言其韻也埤雅云楸美朩也故曰山居千章之楸其人與千戶侯等述異記云越人多橘柚園歲出橘稅謂之橙橘戶中山又有楸户此蓋名髙楸籍矣豈特墓朩堪悲而已哉董子曰朩名三時草命一歲若椿從春楸從秋檟從夏所謂朩名三時芓從子蔩從寅茆從卯莤從酉荄從亥艼從丁茂從戊芑從已莘從辛葵從癸命以一歲支干故曰草命一歲也罨畫許渾咏紫藤詩家住江南罨畫溪楊升菴謂當用􅨢字若罨乃魚網非其訓也張泌詩罨岸春濤打船尾謂魚尾遮岸也此最得其義然左思蜀都賦罨翡翠釣􅀈鯊其來古已吳旦生曰説文罨罕也於業切箋云奄取禽獸故從奄奄掩省也升菴又謂吳興有罨畫溪皆借罨字此字多為借義所專余寓此溪久喜其古藤老樹夾岸交羅非借一罨字不能盡此溪之勝鄭谷詩顧渚山邊郡溪將罨畫通劉濤詩欲識人間真罨畫朱藤倒影入青溪張西農詩風吹未歸去罨畫小溪平張伯雨客義興王氏詩路入秋隂罨畫間乃易之送吳月舟之湖州詩鳥程美酒臨池酌罨畫青山拄笏看按罨畫今之生色也張祜詩紅罨畫衫纒腕出楊汝士詩罨畫羅裙任嫂裁此其義也若作􅨢字反索然矣曽見楊亷夫苕山水歌云既到車山口還過􅨢水濆又漫興云􅨢畫溪頭翠水家升菴或據此為説耶漫興七首有云環沈溪頭買酒去髙堂寺裏看碑來長城女兒雙結了陳皇宅前第一家乃亷夫至雉城時作然蜀都賦八方菴藹王充論衡桃李梅杏菴丘蔽野正同罨畫之義金人劉致君詩罨畫溪山半是梅乃用論衡語意陵陽許渾霅溪詩誰堪從此去雲樹滿陵陽吳旦生曰烏程北二十一里為西陵山吳太子孫和葬此子皓繼統追尊文皇帝陵曰明以其在西故名西陵而吳興郡城在其南故以陵陽名之許詩指此又李涉在維揚見吳興劉全白之愛姬宋態作詩云陵陽夜宴使君筵解語花枝在眼前牟巘寓居城南因名其詩為陵陽集皆謂此也玉條脫溫庭筠傷李處士詩辜負南華第一篇唐詩鼓吹作第二篇吳旦生曰此條所載不同南部新書云大中好文嘗賦詩有金步搖未能對溫岐卿孫光憲云溫庭雲字飛卿或作筠字舊名岐沈徽云溫曽於江淮為親表檟檚由是改名以玉條脫應之宣宗令以甲科處之為令狐綯所沮除方城尉綯曽問其事於岐岐曰出南華真經非僻書也冀相公燮理之暇時宜覽古綯怒甚後岐有詩曰悔讀南華第二篇北夢瑣言云曽以故事訪於溫岐對以事出南華綯怒乃奏岐有才無行不宜與第所以岐詩曰因知此恨人多積悔讀南華第二篇野客叢書云真誥玉條脫事正在第一篇中謂華陽第一篇可也豈南華第二篇耶考溫集有題李羽詩曰終知此恨銷難盡孤負華陽第一篇無悔讀南華第二篇之句盧氏雜記云唐文宗博覽羣書一日問宰臣古詩云輕衫襯跳脫跳脫是何物宰臣未對上曰即今之腕釧也真誥言安妃有斫粟金跳脫是臂飾余竊有疑焉一云曾問其事一云曽以故事訪或者别事非明指條脫耶屬對是宣宗問古詩是文宗豈判然兩朝事耶南華則無華陽則有洵矣而載南華者云因知此恨載華陽者亦云終知此恨詩辭髣佛非抄紀之訛耶宛委餘編云真誥萼緑華贈羊權金玉條脫各一枚周處風土記作條達仲夏造百索繫臂又有條達等組織雜物相贈遺繁欽定情篇又作跳脫云何以致契濶繞腕雙跳脫蓋一物而三名傳寫之誤也秕言云條脫即跳脫韻書跳田聊切與條同音李義山詩羊權雖得金條脫溫嶠終虛玉鏡臺余於元音補遺見宋本大都雜詩有云朱門細婢金條脫紫禁材官玉鹿盧其工麗不減溫李額黃溫庭筠詩額黃無限夕陽山吳旦生曰言額上粧黃如殘陽斜抹於山西也極善形容昔稱文君眉色如望遠山亦此意近陳卧子蘭陵晚眺詩童山不待夕陽黃又於説黃處具有脫換之法按漢宮粧有額上塗黃謂之鴉黃王荆公所謂漢宮嬌額半塗黃也楊升菴引陳去非臘梅詩智瓊額黃且勿誇眼明見此風前葩智瓊晉代魚山神女也黃粧實自智瓊始則升菴未審其漢宮已有之耶然觀庾信詩眉心濃黛直點額角輕黃細安而後周天元帝禁天下婦人不得施粉黛自非宮人皆黃眉墨粧盧照憐纎纎初月上鴉黃則黃粧或塗額角或施眉上也又觀漢日給宮人螺子黛故云眉黛曹子建七啓玄眉弛兮鉛華落而後周墨粧即黛今婦人以杉朩炭研末抹即其制也則黑粧或以飾眉或以點額也二十雙溫庭筠詩招客先開二十雙吳旦生曰唐書南詔傳官給田四十雙謂是二百畝則以五畝為一雙也然觀輟耕録謂近讀雲南雜志曰蠻有田皆種稻其佃作三人使二牛前牽中壓而後驅之犁一日為一雙以二乏為已二已為角四角為雙約有中原四畝地則又以四畝為一雙矣相思子胡元瑞曰今骰子製甚小大者不過三數分無至寸者而唐人骰子凡四點當加緋者或篏相思子其中溫庭筠詩玲瓏骰子安紅豆入骨相思知不知相思子即今紅豆并四枚篏一面則唐時骰子將近方寸矣吳旦生曰此庭筠與裴諴所為新添聲楊柳枝詞也王摩詰詩紅豆生南國秋來發幾枝贈君多采擷此物最相思為梨園所唱李龜年奔放江潭曽於採訪使筵上唱之是也徐興公云嶺南閩中有相思朩歲久紅子色紅如大豆故名相思子每一樹結子數斛非即紅豆也溫飛卿詩樹名從此號相思注云相思樹其理邪交故名蓋此朩也程大昌摴蒱經云蔡澤説范睢曰博者或欲大投班固奕指曰博懸於投不必在行投者擲也桓元曰劉毅摴蒱一擲百萬皆以投擲為名也古惟斫朩為子一具凡五子故名五朩後世轉而用石用玉用象用骨故列子之謂投瓊律文之謂出玖瓊與玖皆玉名蓋借美名以命之未必真用玉也繁欽威儀針曰其有退食偃息間居操橩弄棊文局摴蒱言不及義勝負是圖注橩瞿營反博子也橩之讀與瓊同其字仍從朩知其初制本以朩為質也唐則鏤骨為竅朱墨雜塗數以為采亦有出意為巧者取相思紅子納置竅中此二者即今名骰子其體制全與朩異矣方其用朩也五子之形兩頭尖鋭中間平廣狀似今之杏仁尖鋭可轉躍平廣可鏤采凡一子為兩面其一面塗黑黑之上畫牛犢一面塗白白之上畫雉凡投子者五皆現黑則名盧盧者黑也此為最髙之采挼朩而擲往往叱喝故名呼盧也其次四黑一白則其采名雉比盧降一等矣自此而降白黑相雜每每不同故或名為梟即鄧艾言六博得梟者勝也至於骰子之制裁去五朩兩頭尖鋭而蹙長為方既有六面又著六數不比五朩但有白黑兩面矣李君實云骰色乃南宋冡宰朱河所造俗訛為朱窩流落詩話類編曰溫庭筠才思艷麗工於小賦李義山嘗謂曰近得一聨句云遠比召公三十六年宰輔未得偶句溫曰何不云近同郭令二十四考中書又藥名有白頭翁溫以蒼耳子為對他皆類此宣宗好微行遇於逆旅溫不識龍顔傲然詰之曰公非長史司馬之流帝曰非也又曰得非六參簿尉之類帝曰非也謫為方城尉竟流落而死杜悰自西川除淮海庭筠詣韋曲杜氏林亭留詩云卓氏壚前金線柳隋家堤畔錦帆風貪為兩地行霖雨不見池蓮照水紅祁公聞之遺絹千匹吳旦生曰唐書載庭筠才思神速多為人作文大中末試有司亷視尤謹庭筠私占授者已八人執政鄙之授方城尉詩話又云忤宣宗被謫大抵凌物府怨文士結習亦無足怪然未有流落之慘如庭筠之因身以及其後者舊傳其子憲於僖昭時就試有司值鄭延昌掌邦貢以其父傲毁朝士抑而不録遂題一絶於崇慶寺壁云十口溝隍待一身半年千里絶音塵鬢毛如雪心如死猶作長安下第人後鄭公登相因國忌行香見之暮歸召知舉趙崇謂曰某主文衡以溫憲庭筠之子深嫉之今見一絶令人惻然幸勿遺也於是成名使非鄭公之末悔不終流落長安哉又憲為李巨川草薦表盛述先人之屈云蛾眉先妬明妃為去國之人猿臂自傷李廣乃不侯之將人多憐之疑病全唐詩話曰雍陶為簡州牧投贄者稀得見馮道明下第請謁云與員外故舊閽者引進陶辭曰與公昧平生何云相識道明曰誦員外之詩仰員外之德詩集中日得相見何隔平生也遂吟曰立當青草人先見行傍白蓮魚未知又曰江聲秋入寺雨氣夜侵樓又曰閉門客到常疑病滿院花開不似貧陶聞吟欣狎待道明如曩昔之友吳旦生曰雲溪友議載此條作閉門賓到常推病余以推者在此事便實情便減疑者在彼事便虛情便溢一字之易相去尋丈蓋從主却客不若客自入而意度之也盧象詩主人非病常髙卧亦此意也又陶有哀蜀人為南詔所俘詩云漸到蠻城誰敢近一時收淚羡猿啼楊升菴云畏死吞聲而不敢哭所以羡猿聲之啼一羡字妙或改作聽非知詩者白蓮牡丹漁隱叢話曰陸龜蒙咏白蓮詩無情有恨何人見月冷風清欲墮時若移作白牡丹詩較更親切陳輔之詩話曰唐人牡丹詩紅開西子粧樓曉翠揭麻姑水殿春若改春作秋全是蓮花詩吳旦生曰魯望白蓮二句無論體物之工即月冷風清是何氣韻斷不屬三春物候東坡解人且道決非紅蓮詩也唐人牡丹二句若以紅樓近於粉房翠殿近於伎蓋此又東坡所誚作詩必此詩矣判斷兩家不若各給原主二公且莫硬扯楊升菴謂魯望為白蓮傳神然此詩祖李長吉咏竹詩無情有恨何人見露壓煙籠千萬枝余觀范石湖嶺梅詩花不能言客無語日暮清愁相對生又似脫胎魯望而韻格並絶漁隱謂胡武平白牡丹詩璧堂月冷難成寐翠幄風多不奈寒勝於裴璘所咏長安豪貴惜春殘爭賞新開紫牡丹别有玉杯承露冷無人起就月中看何燕泉云神仙吳猛傳猛登廬山見一叟坐樹下以玉杯承甘露授猛此語不徒然也余以胡句固佳即裴絶亦因看花三月奔走慈恩特發此咏故文宗一加諷念而此詩夕滿六宮矣總之詩家或感時事或體物情各有興觸不向死句較工拙也輔之又謂和靖梅詩踈影橫斜水清淺暗香浮動月黃昏近似野薔薇蓋以此咏桃李尚不可况野薔薇耶何處著此想不禁掩口胡盧王微笠澤叢書載自遣詩云月淡花間夜已深宋家微詠有遺音重思萬古無人賞露濕清香獨滿襟吳旦生曰按王微字景玄南宋人所著有詠賦是宜云宋王微詠賦也廣文選誤王為玉題作微詠賦下書宋玉之名楊升菴駁之而陳晦伯作正楊以為王微本傳不云有詠賦之作豈别有見耶余因考宋書南史俱云微少好學無不通覽善屬文能書畫兼解音律醫方隂陽術數為文古甚所著文集傳於世選注所稱亦如此而皆不及詠賦然史傳中載賦如司馬長卿者亦不槩見何得援以為辭若陸魯望篤學精思而亦云宋家微詠直誤信文選補遺與廣文選等書耳郗黃伯思法帖刋誤曰晉郗鑒其姓讀如絺繡之絺世人以俗書郗字作郤因讀為郤詵之郤非也郤詵乃春秋大夫郤縠之後郗鑒乃漢御史大夫郗慮之後姓源既異音讀逈殊後世因俗書相亂郗郤二姓遂不復辨陸魯望博古矣其詩有云一段清香染郤郎亦誤讀也吳旦生曰太傅别傳云郗鑒字道徽髙平金鄉人漢御史大夫郗慮後也世説云郗夫人謂二弟司空中郎云王家見汝輩來平平爾晉諺云後來出人郗嘉賔續晉陽秋云盛德日新郗嘉賓按諸書俱作郗字而王右軍為太傅選壻其帖反以郗為郤則又何也考萬姓統譜郗在平聲四支韻郤在入聲十一陌韻然於郗姓下注云山陽角音又望出濟南於郤姓下注云濟隂商音又望出山陽則似兩相系屬者而韻要云郤郤同姓也焦弱侯云春秋宣公九年晉郤缺救鄭成公十七年晉殺郤錡郤犨郤至郤讀為郤音隙漢有郤正晉有郤超郤鑒郤古郤字老杜贈鮮于京兆詩不得同朝錯吁嗟後郤詵直寫郤作郤字越窰雲麓漫抄曰青瓷器皆云出自李王號祕色又曰出錢王今處之龍溪出者色粉青越乃艾色唐陸龜蒙有進越器詩云九天風露越窰開奪得千峰翠色來好向中宵盛沆瀣共嵇中散鬬傳杯則知始於江南與錢王皆非也近臨安亦自燒之殊勝二處吳旦生曰虞有陶器三代秦漢謂甓器其後有祕色窑器言臣庶不得用也按周世宗姓柴氏時所造曰柴窑天青色細紋宋汝州造者曰汝窑淡青色蟹爪紋河北唐鄧耀州悉有之汝為魁江南則處州龍泉窑政和間京師自置窑燒造曰官窑色青帶粉紅有蟹爪紋紫口鐵足中興渡江邵成章倣故京遺製置窑於修內司名內窑他如烏泥窑餘杭窑續窑皆不逮官窑有章生一生二兄弟主龍泉之琉田窑生二所陶青器純碎生一所陶者色淡哥乃勝故曰哥窑鐵足紫口今羣隊者是元末新燒爾宣和政和間出定州曰定窑色白外有淚痕者是真劃花者佳素與繡花次之亦有紫定墨定東坡詩定州花瓷琢紅玉蓋定蚤出後以定之白磁器有芒不堪用始命汝造青窑器凡窑器有茅篾骨出者價輕蓋損曰茅路曰篾無油水曰骨市語也祕色一作賁色韓中孚過朱龍圖平生愛一賁色酒壺因宴出示之是也白閣陸魯望送浙東德師侍御西歸云詩懷白閣僧吟苦俸買青田鶴價偏吳旦生曰長安志終南有紫閣白閣二峰遊城南記云紫閣在終南山寺之西楊巨源詩晴明紫閣最髙峯杜子美詩紫閣峯隂入渼陂又云故山迷白閣秋水憶皇陂賈浪仙嘗嘆曰知豫素心者惟終南白閣隱者耳通志紫閣旭日射之爛然而紫白閣隂森積雪弗融相鶴經云青田之鶴永嘉郡記云有沐溪野去青田九里中有雙白鶴年年伏子長大便去惟餘父母一雙在耳精白可愛多云神仙所養翠碧陸魯望翠碧詩紅襟翠翰兩參差徑拂煙華上細枝春水漸生魚易得不辭風雨坐多時吳旦生曰爾雅翠鷸也廣志翡色赤翠色紺張揖上林賦注雄赤曰翡雌青曰翠其小者謂之翠碧唐韻鴗音立水狗也注小鳥青似翠食魚一名魚師一名魚虎崔德符通羊道中詩翠裘錦帽初相識魚虎彎環掠岸飛元僧良琦作魚虎子圖詩翠羽畫殊絶窺魚秋水深紅蓮陸魯望别墅懷歸詩近炊香稻識紅蓮吳旦生曰中吳紀聞云紅蓮稻從古有之至今以此為佳種後見楊亷夫宴於顧仲瑛浣花館主客聯句仲瑛云白􅀢魚乍刲亷夫云紅蓮米新臿乃紀吳之實也暖簧陸魯望詩妾思冷如簧時時望君暖吳旦生曰章伯深稱魯望此句巧於用韻按笙中有簧以火炙之樂家謂之暖笙蓋簧暖則字正而聲清越周美成詞有簧暖笙清之語吳郡王平原郡王兩家聲伎之盛只笙一部已是二十餘人自十月旦至二月終日給焙笙炭五十斤用錦燻籠藉笙於上復以四和香燻之笙賦􅗇力結反生簳裁熟簧注云簧以熟銅為之黃山谷詩傅粉未歸啼玉筯吹笙無伴澀銀簧説文笙十三簧象鳳之身也鳳尾諾皮襲美以紫石硯寄魯望詩石墨一研為鳳尾寒泉半勺是龍睛吳旦生曰晉元帝批箋奏曰諾草書若字尾如鳳尾也按唐六典太子令書畫諾宋至道初改為準陸魯望説云東宮曰令諸王曰教其事行則曰諾猶天子肯臣下之奏曰可也晉元批鳳尾諾時為琅邪王又南齊江夏王鋒五歲髙帝使學鳳尾諾一學即工帝以玉麒麟賜之則諸王亦畫諾矣後漢書云南陽宗資主畫諾梁江州刺史陳伯之目不識書得文牒辭訟惟作大諾則郡守刺史亦畫諾矣後不論崇卑衙門皆批曰準寇凖當國凡批文字去十作準至今相仍至正中王原吉詩書題鳳尾仙曹喜恩浹螭坳學士榮郝天挺云龍睛硯沼也綸巾皮襲美詩白綸巾下髮如絲吳旦生曰鄴中記石季龍以女騎千人為鹵簿著紫綸巾故陸魯望鄴宮詩曉日靚粧千騎女白櫻桃下紫綸巾按七修類藁云綸字世人皆知兩音一曰綸一曰關而不知其故蓋綸巾韻同而音近詩法所忌也故讀曰關韻會雖有兩收皆引釋於綸字之下而無一字及關字義且關字仍注龍春切則當為綸字矣所以二收因韻書起於沈約若説文止於一收矣楊升菴謂説文􅢆青絲綬也音關仲長統昌言身無半通青􅢆之綬而竊三辰龍章之服爾雅􅢆似􅢆組似組東海有之皆以草色似也􅢆鹿角菜組海中苔今之燕窠菜也詩人白􅢆巾紫􅢆巾皆合用此字而俗多用綸􅢆自􅢆綸自綸豈可混用也略見丙集蕭賦中石筍梅澗詩話曰張祜酷好太湖石三吳太守多以贈之故陸魯望以詩哭之曰一林石筍散豪家吳旦生曰石筍句乃皮襲美所作按張祜性嗜石常悉力致之後知南海間載羅浮石筍置于曲阿之宅死未二十年而故姬遺孕凍餒不堪顔𢎞至作詩哀之屬魯望和而魯望又邀襲美同作也魯望和詩云聞道生平偏愛石至今猶泣洞庭人洞庭山在太湖中丹陽曲阿屬焉祜所築室處洞庭出湖石嵌空玲瓏凡園林疊石以此為雅觀但取之甚難民多被其害吳融詩洞庭山下湖波碧波中萬古生湖石鐵索千尋取得來竒形怪狀誰能識鮠魚皮襲美詩因逢二老如相問正滯江南為鮠魚吳旦生曰廣韻鮠吾灰切魚名其狀似鮎集韻鮠吾回切魚名鯷之小者隋大業中吳郡嘗獻海鮠魚乾膾四缶遂以分賜達官本草河豚味甘溫無毒補虛去濕氣理腰腳按本草所載河豚乃今之􅥸魚亦謂鮠魚江浙間謂之回魚是也吳人所嗜河豚有毒本名侯彛魚本草注引日華子云河豚有毒以蘆根橄欖等解之肝有大毒又為吹肚魚此乃是侯彛魚非本草所載河豚也引以為注大誤矣吹肚魚以其肚脹如吹也南人捕法截流為柵待羣魚大下之時小拔去柵使隨流而下自相排蹙或觸柵則怒而腹鼓浮於水上人接取之輟耕録按類編魚部引博雅云鯸䱌盈之反魨也背青腹白觸物即怒其肝殺人正今人名為河豚者也然則豚當為魨坦齋筆衡云楊廷秀與尤延之食河魨問尤河魨原起何典尤因舉左太沖賦及劉淵材注答之楊檢驗二處信然呼尤為書厨此載説郛中亦作此魨字庫露真皮日休詩襄陽作髹器中有庫露真吳旦生曰露一作路按容齋四筆云新唐書地里志襄州土貢漆器庫路真二品十乘花文五乘庫路真者漆器名也然其義不可曉元豐九域志云真漆器二十事是以于頔傳頔為襄陽節度襄有髹器天下以為法至頔驕蹇故方帥不法者稱為襄樣節度舊唐書職官志武德七年改秦王齊王下領三衛及庫真驅嘻真並為統軍疑是周隋間西邊方言也楊升菴謂玲瓏空虛故曰庫露今諺呼書格曰庫露格是也偃曝談餘云庫露真是北酒名尚未的也鶴俸皮襲美新秋即事云酒坊吏到常先見鶴俸符來每探支吳旦生曰松陵倡和集注云吳都有鶴料案殊未詳鶴俸之説曽彥和知滁州有次韻趙仲美西齋自遣詩寧羡一囊供鶴料會看千里躍龍媒注云唐幕府官俸謂之鶴料今歲敕頭所得止此仲美省試下故云又宋宣獻有送黃祕丞倅蘇臺詩鶴料署文移鮆場收賦算此宣獻用襲美所云吳郡事也陸放翁詩末路敢貪請鶴料微官久厭駕雞棲㰂酒夜航中吳紀聞曰夜航船惟浙西有之然其名舊矣古樂府有夜航船之曲皮襲美答陸魯望詩明朝有物充君信㰂酒三瓶寄夜航廣韻㰂音式徑反朩名吳旦生曰竇子野酒譜云㰂酒江外酒名山海經㰂汁甘為酒齊民要術沈休文集皆有㰂酒按輟耕録云凡篙師於城埠市鎮人煙湊集去處招聚客旅裝載夜行者謂之夜航船太平之時在處有之則不獨浙西有也歷代詩話卷五十二
