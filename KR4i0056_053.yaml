body:
  text: 歷代詩話卷五十三歸安吳景旭撰庚集下之中唐詩袙腹帩頭段成式詩見説自能裁袙腹不知誰更著帩頭吳旦生曰段成式漢上題襟集與溫庭筠倡和詩章皆務用僻事按袙腹今之裹肚也王筠咏裁衣云裲襠雙心共一抹袙腹兩邊作八撮劉熙釋名云袙腹橫帕其腹也羅敷行少年見羅敷脫帽著帩頭古本作幧七消反方言趙魏之間曰幧頭或謂之承露或謂之覆䰂儀禮注如今著幓頭自項中而前交額上却繞髻也後漢書向栩好披髮著絳綃頭孫䇿傳南陽張津著絳帕頭老學菴筆記云帕頭者巾幘之類猶今言幞頭也韓退之詩以紅帕首已為失之東坡詩絳帕蒙頭讀道書增一蒙字益誤愛日齋叢抄云禹會塗山之夕有甲步卒千餘人其不被甲者以紅綃帕抹其額自此遂為軍容之服唐婁師德募猛士討吐蕃乃自奮戴紅抹額來應詔其云戴紅抹額亦帕首巾幘之物爾席上腐談云韓詩謂以紅綃轉其頭即今之抹額也帕首幞頭本只是一物今分為二物鹽薑桐江詩話曰唐人煎茶用薑故薛能詩鹽損添常戒薑宜著更誇據此則又有用鹽者矣近世有用此二物者輒大笑之然茶之中等者用薑煎信佳鹽則不可吳旦生曰鄴侯家傳載皇孫奉節王即德宗煎茶加酥椒之類泌戲云旋沫翻成碧玉池添酥散出琉璃眼則唐人茶用鹽薑又用酥椒矣續博物志云茶出銀生諸山採無時雜椒薑烹而飲之又觀陳后山詩愧無一縷破雙團慣下薑鹽枉肺肝東坡詩老妻稚子不知愛一手已入薑鹽煎子由詩北方俚人茗飲無不有鹽酪椒薑誇滿口則宋時茶猶然也山谷謂寒中瘠氣莫甚於茶或濟以鹽勾賊破家蓋茶性冷鹽導入下經非養生所宜更不可解者李義山雜纂以對花啜茶為殺風景雲溪友議云夔州遊符邀客看花而不飲酒至今荆襄花下斟茶者吟詩戲曰白帝城頭二月時忍教清醒看花枝想唐時有此俗諺故云爾然玄宗與江采蘋鬬茶此開元中事陸羽是大厯元和人創煎茶法撰茶經三卷至今鬻茶之家陶為其像置於煬器之間云宜茶足利于是茗粥漸著皎然茶訣陸魯望茶品溫庭筠採茶録張又新煎茶水記蘇廙十六湯品蓋蔎荈之事彰著若此而云殺風景何其背馳耶宋晏元獻以惠山泉煮日注從容置酒賦詩云嵇山新茗緑如煙靜挈都籃煮惠泉未向人間殺風景更持醪醑醉花前王荆公寄茶詩金谷看花莫謾煎猶戲指前事也柳枝容齋隨筆曰薛能晚唐詩人格調不髙而妄自尊大有柳枝詞五首最後一章曰劉白蘇臺總近時當初章句是誰推纎腰舞盡春楊柳未有儂家一首詩自注云劉白二尚書繼為蘇州刺史皆賦楊柳枝詞世多傳唱但文字太僻宮商不髙耳能之大言如此但稍推杜陵視劉白蔑如也今讀其詩正堪一笑劉之詞云城外春風吹酒旗行人揮袂日西時長安陌上無窮樹惟有垂楊管别離白之詞云紅板江橋青酒旗館娃宮暖日斜時可憐雨歇東風定萬樹千條各自垂其風流氣槩豈所可倣佛哉吳旦生曰皇甫湜有言讀詩未有劉長卿一句巳呼阮籍為老兵筆語未有駱賓王一字已罵宋玉為罪人書字未識偏傍髙談稷契讀書未知句度下視服鄭殆為能輩言耶黃山谷謂薛能欺世劉後村謂能無忌憚正自不誣按楊柳枝本歌亡隋之曲故陳子昻詩萬里長江一帶開岸邊楊柳幾千栽錦帆未落干戈起惆悵龍舟去不回韓琮詩行樂隋堤事已空萬條猶舞舊東風晉和凝詩萬枝枯稿怨亡隋似弔吳臺各自垂是也劉白晚年唱和此詞白云古歌舊典君休問聽取新翻楊柳枝又作楊柳枝二十韻注謂洛下新聲也劉云請君莫奏前朝曲聽唱新翻楊柳枝蓋稱白傅之别創詞也後黃鐘商有楊柳枝曲仍是七字四句但每句下各增三字一句乃唐時和聲如竹枝漁父皆有和聲也舊詞多側字起頭第三句亦復側字起聲度差穩雲溪子云杜牧詩巫娥廟裏低含雨宋玉堂前斜帶風滕邁詩陶令門前罥接㒿亞夫營裏拂朱旗不言楊柳二字為妙冷齋夜話云荆公詩含風鴨緑粼粼起弄日鵝黃裊裊垂此言水柳妙在於言其用而不言其名也然余觀鄭谷詩半煙半雨溪橋畔間杏間桃山路中漁隱叢話以為此乃柳謎子詩家又不可不知王崔王維鄭州詩他鄉絶儔侶孤客親僮僕崔塗旅中詩漸與骨肉遠轉於僮僕親楊升菴曰王語渾含勝崔王弇州曰王語雖極簡切入選尚未崔語雖覺支離近體差可要在自得之吳旦生曰詩有涉履所至吻喉筋節以直以促發人酸楚著不得些子文辭如蘇子卿之生當復來歸死當長相思傅休奕之志士惜日短愁人知夜長曹顔遠之冨貴他人合貧賤親戚離皆此類也何處下渾含二字亦誰能以體律之昔人謂崔塗此聯與鄭谷在處有芳草滿城無故人一聯可謂委曲形容旅况非富貴安逸不出户庭者口中所能道此謂知言焚書章碣焚書坑儒詩云坑灰未冷山東亂劉項原來不讀書吳旦生曰焚書坑在驪山下即坑儒谷昔人題云焚書祗是要人愚人未愚時國已墟惟有一人愚不得又從黃石讀兵書按黃石公記云黃石鎮星之精也黃者鎮星色也石者星質也東坡以圯上老人為隱君子萬厯中陳眉公詩雪滿前山酒滿觚一編常對老潛夫兒曹空恨咸陽火焚後殘書讀盡無天啓中葉聖野詩黃鳥歌殘恨未央可憐一夕葬三良坑儒舊是秦家事何獨傷心怨始皇一詰責後人一追咎前人各妙宋蕭森希通録云按史書所坑特侯生盧生四百六十餘人非盡坑天下儒者為其所坑又非儒者何以知之始皇三十二年使盧生求羡門刻碣石門壞城郭決通隄防又盧生入海還因奏録圖書有亡秦之語始皇乃遣蒙恬發兵三十萬人起臨洮築遼水又盧生説始皇曰日方中人主時為微行以辟惡鬼惡鬼辟真人至願上所居宮毋令人知然後不死之藥可得也其後建阿房宮千門萬落必自此言發之觀此皆盧生等稔其惡特方伎之流耳豈所謂儒者哉鄭夾漈論秦不絶儒學有曰陸賈秦之巨儒也酈食其秦之儒生也叔孫通秦時以文學召待詔博士數歲陳勝起二世召博士諸儒生三十餘人而問其故皆引春秋之義以對况叔孫通降漢時有弟子百餘人項羽之亡魯為守禮義之國則知秦時未嘗廢儒而始皇所坑者蓋一時議論不合者耳蕭何入咸陽收秦律令圖書則秦亦未嘗無書籍也其所焚者乃一時事耳簏簌李郢詩叉垂簏簌抱香懷吳旦生曰簏簌下垂之貌又作䍡􅝹李長吉劍子歌云挼絲團金懸䍡簌吳正子注䍡􅝹劍鹿盧貌李嶠寶劍篇鹿盧宛轉黃金飾枚乘傳作鹿盧韻會作樚櫨虎鈐經作轆轤金人李欽叔詩苔花錦斕斑懸溜珠䍡􅝹夜試進士容齋三筆曰唐進士入舉場得用燭故或者以為自平旦至通宵劉虛白有二十年前此夜中一般燈燭一般風之句及三條燭盡之説吳旦生曰唐制舉人試院日暮以燭三條為限白樂天集云試許燒朩燭三條燭盡不許再續韋永貽試先畢作詩云三條燭盡鐘初動九轉丹成鼎未開薛能省試夜賦詩云更報第三條燭盡文昌風景寫難成黃滔御試詩云九華燈作三條燭萬乘君懸四首題五代時敕進士並令排門齊入就試至閉門時試畢內有先了者上厯畫時旋令先出其入策亦須晝試應諸科對䇿並依此例宋時率由白晝不復繼燭隋唐嘉話云武后以吏部選人多不實乃令試日自糊其名暗考以定等第判之糊名自此始盧氏雜説云開成中髙諧知舉內出霓裳羽衣曲賦太學創置石經詩進士試詩賦自此始羣碎録云殿試唐武后天授元年始國史補云進士科始於隋大業中盛於貞觀永徽之際縉紳雖位極人臣不由進士者終不為美以至歲貢恆不減八九百其推重謂之白衣公卿又曰一品白衫其艱難謂之三十老明經五十少進士其有老死於文場者亦無所恨故有詩曰太宗皇帝真長算賺得英雄盡白頭其都會謂之舉場通稱謂之秀才投刺謂之鄉貢得第謂之前進士互相推敬謂之先輩俱捷謂之同年有司謂之座主京兆府考而升者謂之等第外府不試而貢者謂之拔解將試相保謂之合保羣居而賦謂之私試造請權要謂之關節激揚聲價謂之還往既捷列姓名於慈恩寺塔謂之題名大宴於曲江亭子謂之曲江會在關試後亦謂聞喜宴後同年各有所之亦謂為離會籍而入選謂之春闈不捷而醉飽謂之打毷氉匿名造謗謂之無名子退而肄業謂之過夏執業以出謂之夏課挾藏入試謂之書䇿賈公談録云李貯侍郎知貢舉夜放榜未畢書吏得疾暴卒更呼一吏方醉磨墨鹵莾或淡或濃一榜之字濃淡相半遂成淡墨書榜首蔡寬夫詩話云李程應舉時遇隂府吏於貢院前問登第人姓名則有李和而無程倉皇中用淡墨筆加王字於和下果得第後為相因命凡榜書人名皆用淡墨范蜀公詩淡墨題名第一人則所淡書者登第人姓名也今放榜但以黃紙淡墨前書禮部貢院四字餘皆濃墨豈流傳既久遂失其本耶唐書歐陽詹傳云詹舉進士與韓愈李觀李絳崔羣王涯馮宿庾承宣聯第皆天下選時號龍虎榜故詩曰一舉首登龍虎榜海録碎事云龍虎榜時陸贄知舉托言云狀元以下到主司宅下馬綴行而立斂名紙通呈與主司對拜主事云請狀元謝名第第幾人謝衣鉢托言云進士及第賜宴曲江狀元置司處謂之團司年最少者謂之探花郎蔡寬夫詩話云唐故事探花郎宋熙寧中始罷之太平興國三年馮拯為探花是歲登第七十四人太宗賜以詩曰二三千客裏成事七十四人中少年秦中歲時記云唐進士杏園初宴謂之探花宴差少俊二人為探花使遍遊名園若他人先折得名花則二使皆被罰南部新書云唐大中以來禮部放榜歲取二三人姓氏稀僻者謂之色目人亦曰榜花學林新編云隋無漏寺在長安唐武德初廢無漏寺貞觀二十年髙宗在春宮為文德皇后立寺於無漏寺故基以慈恩為寺名西院浮圖髙三百尺永徽五年沙門無楚所立國人謂之鴈塔唐故事進士及第列名於慈恩寺塔因謂之鴈塔題名托言云神龍以來杏園宴後皆於塔下題名同年中推善書者紀之他時有將相則朱書之及第後知聞或遇未及第時題名則為添前進士字或詩曰曽題名處添前字送出城人乞舊詩文昌雜録云唐慈恩題名起自進士張莒於長安慈恩寺間遊題其姓名於塔下遂為故事宋進士題名皆刻石於相國興國兩寺亦慈恩之比也逰城南記云按唐登科記有張台無張莒盧氏雜説云進士及第以泥金書帖附家書中報登科之喜至文宗朝遂寢此儀談苑云士人初登第必展歡宴謂之燒尾説者云虎化為人惟尾不化須為燒去乃得成人又説新羊入羣諸羊抵觸不相親附燒其尾乃定又説魚躍龍門化龍時必須雷電為燒其尾乃化石林燕語云唐書言大臣初拜官獻食天子名曰燒尾又唐人遷官朋僚慰賀皆盛置酒饌音樂宴之為燒尾北夢瑣言云宇文翃嫁女與竇璠致登第時杜尚書宅遭火家人云老鼠尾曵火入庫因而延燎京兆謂宇文曰魚將化龍雷為燒尾近日老鼠亦有燒尾之事用以譏之托言云羅玠貞元中及第關宴曲江泛舟玠以溺死後有關宴前卒者謂之報羅海録碎事云進士放榜後須有一人謝世名報羅使言報大羅天也十家鄭嵎津陽門詩十家三國爭光輝吳旦生曰唐梨園弟子以置院近於禁院之梨園也女妓人宜春院謂之內人亦曰前頭人謂在上前也骨肉居教坊謂之內人家有請俸其得幸者謂之十家家雖多亦以十家呼之三國謂秦韓虢三夫人也出侯鯖録紅綾餅餤盧延讓詩莫欺零落殘牙齒曽喫紅綾餅餤來吳旦生曰避暑録話唐御膳以紅綾餅餤為重昭宗光化中放進士裴格等二十八人以為得人會燕曲江令大官特作二十八餅餤賜之盧延讓在其間後入蜀為學士既老為蜀人所易延讓乃作此詩王衍聞知遂命供膳亦以餅餤為上品以紅羅裹之至今蜀人工為餅餤而紅羅裹其外公厨大燕設為第一洛中紀異云僖宗幸南內興慶池泛舟方食餅餤時進士在曲江有聞喜宴上命御厨依人數各賜紅綾餅餤所賜以金合進上命中官馳以賜潑火雨唐彥謙上巳日寄韓八詩上已接寒食鶯花寥落晨微微潑火雨草草踏青人吳旦生曰退齋雅聞云河朔人謂清明雨為潑火雨蓋以禁煙之後方舉火而雨若潑之也陸放翁詩霏霏潑火雨初晴三尺一抔唐彥謙題長陵一聮云耳聞明主提三尺眼見愚民盜一抔吳旦生曰石林詩話三尺一抔雖是著題然語皆歇後一抔事無兩出或可略土字如三尺則三尺律謂以三尺竹簡書法律也三尺喙皆可言獨劍乎東坡有買牛但自捐三尺射鼠何勞挽六鈞亦同此病六鈞可去弓字三尺不可去劍字然觀庚溪詩話引漢髙帝本紀曰吾以布衣提三尺取天下又韓安國傳髙帝曰提三尺取天下者朕也皆無劍字唯注曰三尺謂劍也則詩家用其本語何為不可余以長陵乃漢髙帝墓也庚溪之説為長故黃山谷每讀此詩稱賞不已劉後村謂三尺一抔之聯惜不多見蓋取其工而當也野客叢書云觀歐陽行周集有或掬一抔土焉或剪一枝材焉劉禹錫詩血汚城西一杯土歐陽詢藝文類聚於杯門編入長陵一抔土事是以抔字為杯盞字用矣又考之古詞中有以酒杯字作抔土字押者如隴西行是也因知古人嘗以此二字通用然觀藝苑雌黃引漢張釋之傳假如愚民取長陵一抔土師古注抔步侯反謂以手掬之也其字從手讀為杯勺之杯非也杯非應盛土之物也郭氏佩觽論杯抔二字云杯莾來切杯勺也抔步侯切手掬貌也駱賔王檄一抔之土未乾正用張釋之語僧惠洪有詩云人生如逆旅歲月苦逼催安知賢與愚同作土一杯其説蓋誤矣據此則二字安可通用雨淋鈴羅隱詩山雨霏微宿上亭雨中因想雨淋鈴吳旦生曰按梓潼縣有上亭驛明皇幸蜀問黃幡綽曰車上鈴聲頗似人言語對曰似言三郎郎當三郎郎當故又名琅璫驛明皇雜録云上初入邪谷霖雨彌旬於棧道中聞鈴聲與山相應上悼念貴妃因採其聲為雨淋鈴曲以寄恨焉魏鶴山詩弄成晚歲郎當曲正是三郎快活時俗所謂快活三郎者即明皇也巨勝曹唐詩白羊成隊難收拾喫盡溪邊巨勝花吳旦生曰唐詩紀事曹唐字堯賓桂州人初為道士作遊仙詩百餘篇唐詩鼓吹選十一首以為宋雍作恐未必然也此二語咏黃初平事按神仙傳初平牧羊隨道士入金華山其兄相見問羊何在曰在山東但見白石滿地乃叱石皆起成羊數萬頭參同契云巨勝可延年還丹入口廣雅云巨勝一名胡麻陶隱居云莖方者巨勝圓者胡麻可作蔬道人多食之形類麻故名胡麻蘇子瞻胡麻賦於此有草衆所嘗兮狀如狗蝨其莖方兮氣不長鄭谷咏十日菊云自緣今日人心别未必秋香一夜衰吳旦生曰休齋謂咏十日菊世以為工蓋其意不隨物而盡如酒盞此時須在手菊花明日更愁人自覺氣不長耳曾子固亦云詩當使人一覽語盡而意有餘乃古人用心處如咏十日菊是也荆公千花萬卉凋零盡始見間人把一枝其病亦在氣不長耳乃山谷反以咏十日菊為病在氣不長因言文章以氣為主西漢文字所以雄深雅健者其氣長故也其論不同須細參之何燕泉云陳無已九日詩人事自生今日異寒花祗作去年香鄭谷十日菊詩自緣今日人心别未必秋香一夜衰陳詩於菊無誇而鄭詩無貶人之視菊直繫其時焉耳當其時則重之而非為其有所加過其時則否而非為其有所損也噫亦可歎耳東坡小詞萬事到頭都是夢休休明日黃花蝶也愁達者處世盍於是求之其心休休何愁之有狀元北里志曰鄭合敬先輩及第後宿平康里詩曰春來無處不間行楚潤相看别有情好是五更殘酒醒時時聞喚狀元聲吳旦生曰唐新進士不問科甲髙下唱名出皇城則例喝狀元按鄭谷乃趙昌翰榜第八名注楚娘字潤卿妓之尤者托言作楚娘潤娘北里志云楚兒者素為三曲之尤晚以色衰嫁捕盜官郭煆以挑鄭光業為郭曵箠數十因貽鄭詩云蛾眉常被巨靈掌雞肋難勝子路拳潤娘字子美王團兒女少時聲譽藉藉崔垂休狎之題記于潤髀上為同年某人見之因戲贈一絶慈恩塔上新泥壁滑膩光華玉不如何事博陵崔四十金陵腿上逞歐書蝦蟆更張蠙詩篳篥調髙山閣迥蝦蟇聲促海濤寒吳旦生曰郝天挺謂江南以朩柝警夜故曰蝦蟆更豈以柝聲有似其鳴耶余作小詩亦有云翩翾蛺蝶方成夢腷膞蝦蟆已報更槐黃遁齋間覽曰俗語有云槐花黃舉子忙謂槐之方花乃進士赴舉之時而唐詩人翁承贊有詩云雨中粧點望中黃勾引蟬聲送夕陽憶得年當隨計吏馬蹄終日為君忙乃知俗語亦有所自也吳旦生曰南部新書言長安舉子自六月已後落第者不出京謂之過夏多借淨坊廟院及間宅居住作新文章謂之夏課亦有十人五人醵率酒饌請題目於知已朝達謂之私試七月後投獻新課并於諸州府拔解人為語曰槐花黃舉子忙據此則槐黃乃肄業之時而遁齋以為赴舉何耶李嶠咏槐云鴻儒訪業來則其義明矣然觀羅鄴槐花詩愁殺江湖隨計者年年為爾剩奔波羅隱詩别來愁悴知多少兩處槐花馬上黃則又與翁詩同意無定河何燕泉曰陳陶詩可憐無定河邊骨猶是春閨夢裏人少讀其詩謂無定者指河邊骨之飄流莫收耳比奉命過銀州見沙河一帶延迤邊塞問之人曰無定河也地皆沙水衝徙不常故以得名吳旦生曰無定河在青澗縣東六十里南入黃河一名奢延水又名銀水輿地記唐立銀州東北有無定河即圁水也後人因潰沙急流深淺無定故更今名升菴嘗言之得燕泉親厯尤信秦韜玉詩無定河邊蕃將死受降城外戰塵空陳祐詩無定河邊暮笛聲赫連臺畔旅人情蘇東坡詩故知無定河邊柳得共髙原雪絮春詩話類編云李華弔古戰場文其存其沒家莫聞知人或有言將信將疑涓涓心目寢寐見之陳陶二語蓋工於前也凝吳融杏花詩軟非因醉都無力凝不成歌亦自愁吳旦生曰自凝曰凝音佞作上聲讀今作平音失之音律亦不協也白樂天詩落絮無風凝不飛又云舞繁紅袖凝歌切翠眉低舞急紅腰凝歌遲翠黛低觀其屬對之末則非平音明矣觀國風膚如凝脂自見野馬墨莊漫録曰莊子言野馬也塵埃也乃是兩物韓偓云窗裏日光飛野馬以塵為野馬恐不然也野馬乃田野間浮氣耳遠望如羣羊又如水波佛書謂如熱時野馬陽焰即此物也吳旦生曰此致堯唐詩紀事云偓小字冬郎字致堯今日致光誤矣薦趙崇為相謫官入閩所作皇甫百泉以為是杜牧之詩誤矣余於丙集朩賦既明隂火之説又據內典龍樹大士云日光著塵微風吹之曠野中轉名之為陽焰愚夫見之謂之野馬渴人見之以為流水則以此證野馬益明莊子注云野馬春月澤中之遊氣塵埃之細者也調鷹過馬韓偓苑中詩外使調鷹初得按中官過馬不教嘶吳旦生曰注謂五坊外使以鷹隼初調習始能禽獲謂之得按又謂上乘馬必令中官為馭以進謂之過馬既乘之然後蹀躞嘶鳴也溫公詩話云北都使宅舊有過馬廳蓋唐時方鎮亦效之因而名廳事也東臯雜録云北都舊有過馬廳韓魏公為留守更新之榜曰雅集賦詩云過馬傳聞事莫詳我嚴賓席在更張不資金石升堂樂務接芝蘭入座香返魂韓偓詩玉為通體尋常見香號返魂容易回吳旦生曰致堯此詩其題云嶺南梅花一歲再發故言返魂也東坡詩返魂香入嶺南梅又和楊公濟梅花詩誰信幽香是返魂金人李致美梅詩冰骨有香魂乍返劉致君墨梅詩誰道神香解返魂皆用致堯語按東方朔云月氐國獻返魂香疾疫夭死者能起之以熏牙及聞氣者即活後長安疫帝分香燒之死未三日皆活鮑昭韋莊寄友詩西望長安白日遙半年無事駐蘭橈欲將張翰松江雨畫作屏風寄鮑昭吳旦生曰漁隱叢話謂南史本傳鮑照字明遠宋子京筆記云今人多誤鮑照為鮑昭李商隱詩濃烹鮑照葵又金陵有人得地中石刻作鮑照字潘子真詩話云景文殊不知武后時諱照唐人因以昭名之事具昭祠堂記故韋詩直作平聲叶韻有自來耳趙凡夫箋云昭照疑即一字加火轉注鮑昭一作鮑照鵒眼李咸用端溪硯詩鵒眼工諳謬羊肝士作刲吳旦生曰李之彥硯譜端石最貴鸜鵒眼眼之美者青黃緑三色相重多者自外至心凡九重或布列硯中如北斗心房之形其生於墨池之外者謂之髙眼生於內者曰低眼李賀端州青花石硯詩暗灑萇𢎞淚血痕則謂鸜鵒眼蘇易簡云端所出有四巖石為甲石屋次之西坑又次之後厯為劣又有活眼死眼之别圓暈數重黃黑相間黳精在內晶瑩可愛謂之活眼四旁浸漬不甚鮮明謂之淚眼形體略具內外皆白殊無光彩謂之死眼活眼勝淚眼淚眼勝死眼死眼勝無眼姚令威云端硯下巖色紫如豬肝密理堅緻溫潤而澤儲水發墨叩之有聲但性質堅礦斷裂尤多瑕疵秋楓巖石色微淡可亞下巖堅潤不及梅根巖一名中巖桃花巖一名上巖二巖石俱皆沙壤相雜無水泉色淡而燥肌理稍粗然中巖又勝上巖新坑石色帶紅紫其文細密材質厚大無瑕然止是崖石頗乏堅潤後厯石與新坑略相似又處其次西坑六崖石色青微黑佳者如歙石粗羅紋而發墨過之趙希鵠云下巖惟有舊坑無新坑上中二巖則皆有舊新坑松下楊升菴曰古人詩句不知其用意用事妄改一字便不佳孟蜀牛嶠楊柳枝詞吳王宮裏色偏深一簇煙條萬縷金不忿錢唐蘇小小引郎松下結同心按古樂府云何處結同心西陵松柏下牛詩用此意咏柳而貶松唐人所謂尊題格也後人改松下作枝下語意索然矣胡元瑞曰不如枝字本色一涉松字便著議論吳旦生曰唐人尊題往往強此而弱彼如舒元輿牡丹賦玫瑰羞死芍藥自失夭桃斂迹穠李漸出躑躅宵潰朩蘭潛逸朱槿灰心紫薇屈膝則是斥衆花以信牡丹也唐彥謙咏柳詩楚王宮裏三千女飢損蠻腰學不成是又尊柳而貶美人矣何况於松若作枝下幾不成語三和鄭培詩戎壘三和夕吳旦生曰文苑英華改和為秋楊升菴辨其訛矣按孫子兵法兩軍相對曰和戰國䇿章子為齊將與秦軍交和而舍又楚䇿開西和門注軍門曰和韓非子左和右和軍中左右門也漢制考云左右和之門注今謂之壘門立兩旌以為之疏云漢時軍壘為門名曰壘門與古和門同界堠後山詩話曰吳僧錢塘白塔院詩到江吳地盡隔岸越山多此謂分界堠子語也吳旦生曰後山在錢塘亦有句云語音隨地改吳越到江分何得以界堠譏處默也車若水謂吳越分界在今嘉興之境越敗吳于檇李檇李乃越地正嘉興也錢塘江乃越地吳山祀子胥亦錯而僧詩為不知界矣余謂不然一統志云吳山春秋時為吳南界以别于越故名上有子胥祠又名胥山按檇李越絶書作就李又云吳王曽醉西施于此號醉里史記載吳王傷指卒于此又府城東南三十里為張山因子胥伐越屯兵于此改名胥山則嘉興雖吳越分境而檇李非專越吳山應屬吳可證處默之詩不謬宜羅隱見此二句驚之為已有也薛逢送杭州牧詩吳江水色連堤濶越俗春聲隔岸還杜牧知睦州今嚴州詩溪山侵越角封壤盡吳根薩天錫送人之浙東詩出江吳水盡絶岸楚山稠同一機軸也歷代詩話卷五十三
